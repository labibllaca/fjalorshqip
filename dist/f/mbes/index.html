<script>window.__INITIAL_DATA__ = [{"slug":"mbes","term":"MBES","attributes":["jokal."],"definitions":["Qëndroj në vend, nuk shkoj dot më tutje; ngec diku e nuk lëviz dot më; nuk luaj nga vendi, qëndroj aty ku jam, ngel. Mbeti kali. Mbeti makina në baltë. Mbeti prapa (në fund, në bisht). Mbeti në Fier, s`e arriti trenin. Më ka mbetur ora. I mbeti kafshata në fyt. Mbeti sharra (pyka, gozhda) në dru. Mbeti tapa brenda në shishe. Mbeti mbyllur në dhomë. Mbeti në pus (në fund të detit).","fig. Ngec në diçka, nuk veproj a nuk shkoj dot më tej, ngel në vend. U doli një vështirësi në punë, po nuk mbetën, e kapërcyen. Mbetën në vend nuk po përparojnë. I mbeti goja s'fliste dot.","Vazhdoj të qëndroj diku ose në një gjendje të caktuar më shumë se ç'parashikohej, se ç'duhej a përgjithnjë; merrem gjatë me diçka, ngel mbi të. Mbeti me këmbë (shtrirë, varur). Mbeti në diell (në shi). Mbeti rrugëve. Mbeti në shtëpi tërë ditën. Mbeti edhe dy javë te prindërit. Mbeti në fshat. Mbeti në mërgim. Mbeti në klasë nuk e kaloi klasën (për nxënësit). Mbeti në aritmetikë. Dera mbeti hapur. Nuk mbeti asnjeri në zyrë. Mbeti duke folur. Mbeti mbi libra.","Bie ose ngelem në një gjendje të caktuar (zakonisht jo të mirë), ngel pa diçka a pa dikë, ngel, mbetem; pësoj diçka (edhe në një varg njësish frazeologjike); me një trajtë të shkurtër të përemrit vetor në r. dhanore më krijohet për një kohë një gjendje e caktuar. Mbeti me barrë (shtatzënë). Mbeti e ve. Mbet jetim. Mbeti i vrar ë(i plagosur, i ngrirë). Mbeti gjallë. Mbeti i kënaqur (i dëshpëruar). Mbeti i mahnitur (pa gojë, pa mend). Mbeti gojëthatë. Mbeti keq (si peshku pa ujë, si peshku në zall). Mbetsh me shëndet! ur. Mirë mbetsh! ur. Mbeti (është) teneqe (dërrasë, kripë, pip) mbeti pa asgjë, mbeti pa një lek në xhep.","Vazhdoj të jem si edhe më parë, ngel ai që kam qenë; vazhdoj të mbaj të njëjtin qëndrim; ruaj po ato veti, tipare, cilësi e pikëpamje që kam pasur, nuk ndryshoj (edhe në një varg njësish frazeologjike); me një trajtë të shkur atër muret shih te MUR, ~I. S’ka mbetur laraskë pa bisht fj.u. shih te LARASK/Ë, ~A. I mbeti lëkura në bisht të sëpatës dikujt shih te SËPAT/Ë, ~A. I mbeti luga në pilaf iron. shih te LUG/Ë,~A. I mbeti luga në qull iron. shih te LUG/Ë, ~A. Si mbeti pikë gjaku (gjak) në fytyrë shih te GJAK, ~U. U mbeti pushka në gozhdë vjet. shih te GOZHD/Ë, ~A. I mbeti (iu var) samari nën bark dikujt shih te SAMAR, ~I. S’i mbeti (s'i ngeli) sy e faqe shih te SY,~RI. Mbeti (rri, bën) në vend numëro shih te NUMËROJ."]}]</script>
