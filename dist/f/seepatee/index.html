<script>window.__INITIAL_DATA__ = [{"slug":"seepatee","term":"SËPATË","attributes":["f.","sh."],"definitions":["Vegël dore prej hekuri me teh të mprehtë nga njëra anë, me mykë nga ana tjetër dhe me një vrimë ku futet bishti prej druri, e cila përdoret për të prerë dhe për të çarë dru. Sëpatë latore. Sëpatë qafëgjatë. Sëpatë e mprehtë. Sëpatë e lashtë prej guri (prej bronzi). Presa e sëpatës. Tuni i sëpatës. Myka e sëpatës. Qafa e sëpatës. Bishti i sëpatës. Sëpata e druvarit. Mpreh sëpatën. Pres (çaj, shkurtoj) dru me sëpatë. Gdhend (trupoj) me sëpatë. I ra me sëpatë.","Vegël e tillë me qafë e me bisht të gjatë, që përdorej si armë lufte dhe për t'u prerë kokat të dënuarve me vdekje. Luftëtar me sëpatë. Sëpata e xhelatit. * I ra (ia preu) me sëpatë i ra shkurt e në mënyrë të prerë, nuk la vend për diskutime e kundërshtime. Si lata, sëpata keq. shih te LAT/Ë,~A I. Sëpatë pa bisht shih te BISHT,~I. Ia shkrepi me sëpatë shih te SHKREP. U bë bisht sëpate shih te BISHT, ~I. Ra si sëpata pa bisht dikush ra si i vdekur përdhe. Bien sëpatat në një vend pajtohen mendimet e qëllimet. I ra sëpata në gur shih te GUR,~I. I ra sëpata (luga, thika, sqepi, shpata) në mjaltë shih te MJALT/Ë,~I. Mban (fsheh) sëpatën nën gunë shih te GUN/Ë,~A. I priste fjalët me sëpatë fliste në mënyrë të prerë, nuk pranonte asnjë kundërshtim. E preu me sëpatë të madhe (me sëpatën e dardharit) ia preu shkurt e pa mëdyshje; nuk i bëri asnjë lëshim; nuk i dha mundësi të kundërshtonte ose të parashtronte arsyet e veta për diçka. Nuk i pret sëpata në një vend nuk thotë të njëjtën gjë, e ndryshon mendimin shpesh; flet kot e pa lidhje logjike, vend e pa vend. I mbeti lëkura në bisht të sëpatës dikujt nuk iu nda sëpata nga duart, mbeti gjithnjë duke prerë dru, mbeti tërë jetën druvar. I priste sëpata (palla, shpata, kordha) djathtas e majtas (nga të dyja anët) shih te PRES I. Shkoi (humbi) si sëpata pa bisht shih te BISHT, ~I. Është më i rëndë bishti se sëpata (sqepari) shih te BISHT,~I. Është sëpatë me dy pr
