<script>window.__INITIAL_DATA__ = [{"slug":"prish","term":"PRISH","attributes":["kal."],"definitions":["E rrëzoj përdhe diçka të ndërtuar, rrënoj, shemb; e shkatërroj; kund. ndërtoj. Prishi shtëpinë (murin, themelet). Pesha e borës e prishi çatinë. Po nuk prishe, nuk ndërton. fj. u.","Bëj që diçka të mos punojë më, e dëmtoj sa të mos hyjë në punë; e nxjerr jashtë përdorimit, e bëj të papërdorshme; kund. ndreq. E prishi orën (makinën, plugun). Prish bucela e bëj kënaçe. fj. u. Prish shtëpi e bën kasolle. fj. u. prish diçka të madhe e me vlerë për diçka të vogël e me vlerë te paktë. Mos e prish kazanin (jahninë) për një qepë! fj. u. mos e dëmto diçka të madhe për një gjë fare të vogël.","bised. E zbërthej diçka në pjesët e saj përbërëse, e shpërbëj; e shthur. Prishi qerren. Prishi fanellën (çorapët).","edhe fig. E ngatërroj diçka, e çrregulloj, e pështjelloj. I prishi flokët. Ua prishi këngën nuk mban ritmin a melodinë e këngës njësoj me të tjerët, e ngatërron. E prishi punën.","fig. Sjell humbje të rënda materiale ose ekonomike, e çoj në shkatërrim të plotë. dëmtoj rëndë; rrënoj. Prishi shtëpinë. Prishi ekonominë. Prishi vendin.","fig. Bëj që të dështojë diçka, shkatërroj. Ua prishëm imperialistëve planet djallëzore.","Shkriftoj diçka; përpush a lënur leshin, pambukun etj.; shprish.","E fshij atë që është shkruar; e shuaj duke i hequr vizë përsipër. Prishi një fjalë (një radhë). E prishi me gomë.","bised. E zhduk, e vras dikë; e shkatërroj; e mund në luftë. Pushka e parë e prishi. Ujku e prishi menjëherë delen. Armiku prishi shumë burra. Prishnin bletën vrisnin bletën duke thyer kosheren për të marrë mjaltin.","I bëj keq dikujt a diçkaje, e dëmtoj; e keqësoj. Duhani të prish mushkëritë. Drita e fortë të prish sytë. Alkooli të prish. Ia prishi shëndetin. Bryma (lagështia) i prishi perimet. Shirat prishën të mbjellat.","fig. Bëj që të humbasë vlerën a cilësitë e mira; zvetënoj, bastardoj. I prishi shijen (bukurinë). E prishin gjuhën duke përdorur fjalë të huaja pa nevojë. E prishi përmbajtjen e shkrimit.","fig. E shthur dikë nga ana morale, e bëj keq e çoj në udhë të keqe, duke i mësuar vese; i heq një cilësi të mirë. E prishi veten. E prishi moralisht. Njeriu i keq prish edhe të tjerët. Deshi t’ia prishte djalin. I prishi ndërgjegjen.","bised. Shtrembëroj fytyrën, buzët etj. për të shprehur një dhembje, një pakënaqësi etj. Prishi fytyrën (çehren). Prishi buzët.","bised. Thyej para, shkoq. Prishi njëqind lekë e i bëri të vogla.","Harxhoj diçka, shpenzoj. E prishi tërë rrogën. Më parë prishnin shumë për dasmë. Fiton pesë prish (ha) gjashtë. fj. u. Kush merr shtatë e prish tetë, s`ka nevojë për kuletë. fj. u. Nuk e prishim plumbin kot.","Ndot ajrin me një erë të keqe, e qelb; bëj që të bjerë erë diçka; fig. ndyj, fëlliq. Prishi ajrin (atmosferën).","fig. Shkel një marrëveshje, një kontratë etj. që kam lidhur me dikë, nuk i qëndroj më besnik diçkaje, nuk e zbatoj më, nuk e mbaj. I prishën fejesat që kishin bërë që në djep. Prishin marrëveshjen (lidhjen, besëlidhjen). Prishi kontratën. E prishi vendimin e mëparshëm.","Ndërpres rrjedhën e rregullt a zhvillimin e mëtejshëm të diçkaje, bëj që një gjendje të mos vijojë më. Prishi rehatinë (oreksin). Prishën zakonet e këqija. Prishi qetësinë (heshtjen).Prishte rregullin (disiplinën). Ia prishi gjumin e zgjoi. E prishën krushqinë (miqësinë).","I jap diçkaje një drejtim tjetër; ia ndërroj gjendjen, e luaj nga qëndrimi që ka. I prish e ekuilibrin diçkaje. I prish drejtimin.","fig. bised. E kundërshtoj dikë, nuk veproj sipas dëshirës së tij, nuk i plotësoj dikujt një dëshirë, ia kthej fjalën. Nuk ia prish nënës (babait). Nuk ia prishi qejfin (dëshirën). S`di kujt t’ia prishë e kujt t’ia ndreqë.","bised. Dhunoj një vajzë të re, e çnderoj, e zhvirgjëroj. * I prishi curlet me dikë i prishi marrëdhëniet e mira që kishte pasur me dikë; u zu, u prish me dikë. I prishën (i thyen) fjalët shih te THYEJ. E prishi (e rëndoi, e ndyu, e fëlliqi, e qelbi) gojën shih te GOJ/Ë,~A. Më prishi gjakun dikush më trembi shumë, më frikësoi duke më thënë diçka të keqe, më tronditi shumë; më shqetësoi shumë. Nuk e prish gjakun (terezinë) i merr punët shtruar, nuk shqetësohet, nuk trazohet fare; nuk pyet për të tjerët; nuk trembet, nuk frikësohet. E prishi hajatin me dikë shih te HAJAT,~I. Ia prishi mendjen (fiqirin) a) e bën të mendojë ndryshe, ia ktheu mendjen; b) e hutoi, e turbulloi. Më prishi nervat më mërziti shumë, më inatosi. I prishën (i çartën) pipëzat shih te PIPËZ,~A. S’prish punë s`ka gjë, s'ka rëndësi, s’ka gajle. E prishi (e nxori, e luajti) mendsh dikë e mërziti pa masë, e tërboi, e shkalloi, e çmendi. As prish, as ndreq punë nuk të bën as mirë as keq; as të ngroh, as të ftoh. Prishi syrin (e keq) e yshti dikë gjoja për ta shëruar nga ndonjë sëmundje, i bëri magji për syrin e keq (sipas besimeve të kota). E prishi zemrën a) u lëndua në zemër, u zemërua; b) i lindi një ndjenjë dashakeqe a një dyshim për dikë, mendoi keq për të. Ia prishi (ia qarti) zemrën dikujt e lëndoi, e preku në zemër; ia prishi qejfin, e mërziti, ia theu zemrën. Nuk ta prish tymin e duhanit është shumë i urtë, nuk trazon njeri, nuk ngacmon askënd. Prish (gris) gjirin, arno pëqirin! fj. u. shih te GRIS. Uthulla e fortë prish enën e vet fj. u. shih tek UTHULL,~A. Një dru i shtrembër prish (rrëzon) gjithë stavën fj. u. shih te STAV/Ë,~A."]}]</script>
