<script>window.__INITIAL_DATA__ = [{"slug":"leeshohem","term":"LËSHOHEM","attributes":["vetv."],"definitions":["Bie poshtë menjëherë, këputem e bie diku; ulem a shtrihem menjëherë diku; vet. veta III varet poshtë lirisht a mbështetet mbi diçka, derdhet. U lëshua përdhe (në dysheme, në shtrat). Koka iu lëshua mënjanë. Flokët i lëshoheshin mbi supe.","Lirohem nga diçka dhe iki, shkëputem, çlirohem. U lëshua qeni nga zinxhiri.","edhe fig. Shkoj diku me nxitim, sulem, turrem; i vërsulem dikujt a diçkaje, i hidhem, i sulem, e sulmoj me të gjitha forcat; ia hyj një pune me vrull, i përvishem me hov. Iu lëshuan tatëpjetë. Iu lëshuan qentë. U lëshuan mbi armikun. Iu lëshuan me gurë (me bomba dore, me shqelma, me grushte ). Iu lëshuan me të shara (me fjalë). U lëshua deri në Elbasan. Iu lëshuan kodrave (maleve, arave). Iu lëshuan grurit (kanalit) të gjithë së bashku. Iu lëshuan bunkerit gjerman.","fig. Jepem shumë pas diçkaje; ha ose pi me lakmi të madhe e me të shpejtë. Ishte lëshuar pas pijeve (pas qejfeve). Lëshohet pas ëmbëlsirave. Nuk lëshohet në të ngrënë.","fig. Nuk u qëndroj dot vështirësive, pengesave e fatkeqësive, përkulem; humbas guximin e vendosmërinë, s'kam më zemër për të vepruar, më priten fuqitë; e lëshoj veten. U lëshua keq. Nuk lëshohet para vështirësive.","fig. Dobësohem, bie nga shëndeti e s'kam fuqi të bëj diçka, të lëviz etj. I është lëshuar trupi. M'u lëshuan këmbët s'kam fuqi të qëndroj më në këmbë.","vet. veta III. Rrit vëllimin e vet, bymehet; zgjatet, varet. Hekuri (bakri) lëshohet. Lëshohet ky stof.","vjet. Ndahem nga burri a nga gruaja.","Pës. e LËSHOJ. * Iu lëshua gusha dikujt shih te GUSH/Ë,~A. Iu lëshua (iu vu) në shpinë dikujt shih te SHPIN/Ë, ~A. U lëshuan si miza në mjaltë shih te MIZ/Ë,~A."]}]</script>
