<script>window.__INITIAL_DATA__ = [{"slug":"shtroj","term":"SHTROJ","attributes":["kal."],"definitions":["Hedh diçka mbi një send a mbi një sipërfaqe, aq sa të formohet një shtresë pak a shumë e trashë, hap a ndej diçka mbi një send; e rrëzoj dhe e përhap në shesh. Shtroj bar (kashtë, fier, dushk). Shtroj rërë (zhavorr, dhe). Shtroj llaçin. Shtroj vrahun shtroj duajt në lëmë për t'i shirë.","Ndej përdhe a mbi një sipërfaqe tjetër diçka të gjerë ose të gjatë, shtrij në shesh, hap. Shtroj çarçafin (qilimin, dyshekun, shtresat). Shtroj një rrogoz. Shtroj një mbulesë mbi tryezë. Shtroj gunën. Shtroj petët në tepsi. Shtroj shtëpinë (dhomën) rregulloj shtëpinë (dhomën) dhe vë qilimat e mbulesat e mira. Shtroj shinat vendos shinat mbi kryqësoret e hekurudhës. Shtroj linjën shtrij telin e një linje. Shtroj poshtë.","Hedh çimento, zift etj. ose vë dërrasa, gurë, pllaka etj. pranë e pranë për të mbuluar një sipërfaqe. Shtroj dyshemenë. Shtroj pllakat (parketin). Shtroj rrugën me kalldrëm (me zhavorr, me asfalt). Shtroj trotuarin me pllaka. Shtroj oborrin me çimento. Shtroj dhomën me parket.","Përgatit shtratin për të fjetur, hap shtresat e mbulesat. U shtroi në dhomën e mirë. U shtroi përdhe (në shesh, pranë vatrës). Shtrona të flemë!","Përgatit tryezën a sofrën, vë në të gjellët, ushqimet e ndryshme, pijet dhe sendet që përdorim kur hamë e pimë; i vë përpara dikujt të ngrëna e të pira të shumta. Shtroj tryezën (sofrën). Shtroj drekën (darkën, mëngjesin). Shtroj bukën. Shtroj rakinë vë raki e meze në tryezë. Na shtroi arra (fiq të thatë, mollë e verë). Shtroj një drekë (një darkë, një banket) bëj a jap një drekë (një darkë, një banket) për nder të dikujt, duke ftuar me këtë rast edhe të tjerë. Ia shtroi mikut i vuri përpara të hajë e të pijë mirë që ta kënaqte.","E bëj diçka me nge, për një kohë të gjatë e me qejf (për të ngrënët, për të pirët, për muhabetin etj.). Ia shtruan hëngrën e pinë me nge e sa u deshi qejfi. Ia shtruan tërë natën me të pira (me të ngrëna). Ia shtruan muhabetit (bisedës). Ia shtronte për natë.","vet. veta III. E detyron të rrijë rënë në shtrat derisa të shërohet (për sëmundjet). E shtroi sëmundja (gripi) në shtrat.","Çoj një të sëmurë në një institucion shëndetësor që të rrijë aty për ca kohë për t`u mjekuar ose për ndihmë tjetër mjekësore. Shtroi gruan (vajzën). E shtroj në spital (në sanatorium, në shtëpinë e lindjes).","jokal. vet. veta III. Formon një shtresë pak a shumë të trashë duke mbuluar gjithë vendin (për borën); fillon të bjerë i dendur e pa pushim, fillon të bjerë me të butë (për reshjet). Shtroi bora. Shtroi shiu.","Ul, e bëj të ketë një sipërfaqe të sheshtë a të lëmuar; shtrij; e rrëzoj dhe e rrafshoj përtokë. Shtroj flokët. E shtroj me hekur (një rrobë). E shtroi grurin breshri.","Vë të ngrohin vezët e të nxjerrin zogj, vë klloçkë (për shpendët shtëpiakë); vet. veta III lëshon vezët në një vend të përshtatshëm për zhvillimin e tyre (për insektet e krimbat). Shtroi dy pula (një patë, një rosë, një pulë deti). Shtron vezët.","Paraqit një çështje, një problem etj. për shqyrtim; vë a nxjerr para dikujt çështje, probleme etj. që kërkojnë zgjidhje. Shtroj një çështje (një problem). Shtroi programin (planin). Shtroj diçka me të madhe (me forcë). Shtroj për diskutim. E shtroj në mbledhje (në organizatë, në parti, në drejtori, në sektor). E shtroi para popullit. Plani shtron kërkesa të reja (detyra të mëdha). E shtroi drejt (qartë, mirë). I shtroi vetes një pyetje.","Vë turshi. Shtroj speca (tranguj, domate, lakra). Shtroj (turshi) për dimër.","Vë dikë nën pushtetin a nën sundimin tim duke thyer me forcë qëndresën e kundërshtimin e tij; shtyp a thyej një kryengritje etj.; nënshtroj. Donte të shtronte vendin. Nuk i shtroi dot krahinat (fiset) kryengritëse. U përpoqën të shtronin malësitë.","E bëj të më bindet, e sjell në vete, e mbledh; e bëj të sillet mirë e të veprojë si duhet; e bëj të heqë dorë nga çapkënllëqet a nga marrëzitë. E shtroi puna (kolektivi). S`e shtronte dot të birin.","E vë për herë të parë të mësohet si kafshë ngarkese a shale, i vë samar a shalë për herë të parë. Shtroj kalin (mushkën, gomarin).","Vë të punojë një farë kohe për provë (një motor a një automjet fare të ri a pas riparimit të përgjithshëm) që të zënë vend e të përshtaten sa më mirë njëra me tjetrën pjesët e ndryshme dhe të përballojnë pa dëmtime punën e mëtejshme me ngarkesë të plotë. Shtroj motorin (makinën).","edhe jokal. fig. E bëj më të qetë e më të shtruar. E shtruan lojën. sport. E shtroi muhabetin. * E shtroi në dru (në dajak) dikë e rrahu shumë, e shqepi së rrahuri, e shqepi në dru. Shtroi çipat me dikë zhduk mosmarrëveshjet, rrafshoj pikat e kundërta me dikë për t'u pajtuar me të. Shtroi gunën u sheshua diku për të ndenjur gjatë e pa u bërë merak për asgjë; vajti në shtëpi të dikujt dhe ndenji një kohë të gjatë pa qenë i dëshiruar, i zuri derën dikujt. I shtroi (i ftohu, i uli, i shoi, i zbuti) gjakrat shih te GJAK,~U. Ia shtroi (e bëri dasmën) deri në gju shih te GJU,~RI. E shtroi nën havan dikë shih te HAVAN, ~I. Shtroj kuvend me dikë nis një bisedë të gjatë me dikë. Ia shtroi me lule shih te LUL/E, ~JA. E shtroi mendjen arriti në një përfundim të caktuar dhe mori një vendim për një çështje, e mblodhi mendjen dhe gjykon me gjakftohtësi. E shtroi (e uli) qafën (kurrizin) përb. shih te QAF/Ë,~A. Shtroj syrin marr shenjë. Edhe sikur të ma shtrojnë me flori shih te FLORI,~RI. Demin e shtron zgjedha fj. u. shih te ZGJEDH/Ë,~A. Si të shtrosh, ashtu të mbulojnë fj. u. si të sillesh me të tjerët, ashtu do të sillen edhe të tjerët me ty. Sofrën shtroje edhe me bukë e kripë (e qepë) fj. u. shih te SOF/ËR,~RA."]}]</script>
