<script>window.__INITIAL_DATA__ = [{"slug":"arrij-dhe","term":"ARRIJ dhe","attributes":["kal.","jokal."],"definitions":["jokal. Vij ose shkoj me këmbë a me një mjet në vendin për ku isha nisur, sosem në pikën e fundit të udhëtimit; mbërrij. Arrij në shtëpi (në shkollë, në punë). Arrij me këmbë. Arriti me aeroplan. Arriti vonë (herët, me kohë). Arriti i pari (i fundit). Arriti treni. Arriti letra (lajmi).","vet. veta III jokal. Vjen një kohë e caktuar; vjen një stinë e motit, një muaj, një ditë; vjen një ngjarje a një dukuri e caktuar. Arriti dreka (nata). Arriti dimri (pranvera). Arriti dita e festës (kongresi). Arriti dëbora (shiu). Arritën të korrat. Arriti radha ime.","kal. Kap dikë në të ecur, vij krahas me një tjetër që ecte para meje; vij deri te diçka; zë. E arrita në rrugë.","kal. fig. Barazohem me një tjetër, që është përpara në një punë, në një veprimtari etj. E arrij në mësime. E arrij në mjeshtëri. E arriti dhe ia kaloi.","kal. Zë, prek diçka që është pak si larg, duke u zgjatur. E arrij me dorë. E arrij me maja të gishtave.","kal. dhe jokal. fig. Vij te një qëllim ose rezultat i caktuar me anë të përpjekjeve; përmbush një dëshirë, kryej një detyrë. Arrij sukses (fitore). Arrij qëllimin (objektivat). Arrij në një marrëveshje. Arrij në një përfundim.","kal. dhe jokal. Vij deri në një cak, në një shkallë ose në një masë. Arriti shumën. Arriti kulmin. Arriti nivelin më të lartë (majat më të larta). Arrin deri në gju.","kal. Vij deri në një kohë të caktuar, rroj deri në një kohë të caktuar; mbush një moshë; jetoj që nga një kohë. Arrij moshën shkollore (të punës). Arriti të tetëdhjetat. Me arriti pleqëria. Ia arrita ditës. Ia ka arritur kohës së Turqisë. Mos arrifsh! mallk. Vdeksh i ri!","kal. Ia dal në krye një pune, mundem ta bëj diçka, ia dal mbanë. Arrij ta mbaroj. S'arrij ta kuptoj. S`arriti të nxirrte zë.","vet. veta III jokal. Është aq sa duhet, është mjaft, del, mjafton. Arrin për një fustan. Arrin e tepron. S`më arrijnë paratë. S`më arrin fuqia.","j
