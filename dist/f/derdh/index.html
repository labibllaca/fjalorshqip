<script>window.__INITIAL_DATA__ = [{"slug":"derdh","term":"DERDH","attributes":["kal."],"definitions":["Zbraz një lëng a diçka të imët nga një enë, nga një thes etj., duke e kthyer enën përmbys ose duke e shkundur me forcë në mënyrë që lëngu a lënda tjetër të bjerë vetë; hedh a flak diku atë ç'ka brenda një enë; zbraz. Derdhi fajin (ujin, qumështin, verën, rakinë). Derdh betonin (llaçin). Derdh miellin (sheqerin, grurin, orizin). Derdh plehrat. E derdhi shishen (pjatën, kovën, gotën). Derdh thesin (koshin, shportën). E derdhi përtokë (në dysheme). E derdhi padashur. Ngadalë, mos e derdhësh!","vet. veta III. Shkarkon, hedh; lëshon atë që përmban (kryesisht ujin). Lumi e derdh ujin në liqen. Derdh pesë metra kub në sekondë. Retë derdhën shiun (borën).","Nxjerr nga brenda (nga sytë etj.) zakonisht diçka të lëngshme, qit jashtë; e bëj të rrjedhë jashtë. Derdh lot qaj me lot.","I var poshtë e i përhap, i lëshoj lirshëm; ia sjell sipas trupit, ia bëj të derdhur. I derdhi flokët mbi supe. Ia ka derdhur fustanin.","edhe fig. Hedh me vrull e me shumicë mbi dikë a mbi diçka, i lëshoj diçka; përhap rreth e rrotull. Derdhi dritë mbi shesh. Trëndafilat derdhnin një erë të këndshme. Derdhën plumba mbi armikun. Derdhi vështrimin (shikimin) mbi të. E derdhi si lumë.","fig. Nxjerr ç'kam brenda, shpreh me vrull dhe pa u përmbajtur një ndjenjë; zbraz. E derdhi tërë gëzimin (dashurinë). E derdhi urrejtjen (zemërimin). E derdhi tërë vrerin (helmin). Derdhi një rrëke të sharash (mallkimesh). Derdhi një lumë fjalësh.","fig. Vë të gjitha forcat e mundësitë e mia dhe nuk kursej asgjë për të bërë diçka a për të arritur një qëllim, shkrij. Derdh aftësitë (talentin). Derdhi mundin. Derdhi tërë artin e tij.","tek. Hedh në kallëp një metal a një lëndë tjetër të shkrirë për t'i dhënë një formë të caktuar; bëj një detal, një statujë etj., duke hedhur lëndë të shkrirë në një kallëp të parapërgatitur. Derdh gizë. Derdh një unazë. Derdh shkronja. Derdhnin armë. Derdhën pjesë këmbimi. E derdhën bustin (monumentin). E derdhën në bronz.","fin. Jap një shumë të hollash në bankë, në arkën e kursimit etj. në emrin tim a të dikujt tjetër, paguaj. Derdh një shumë në bankë (në arkën e kursimit). Derdhi para në fondin e kooperativës. Derdhën ndihmat e tyre.","bised. Shpenzoj pa kursim, harxhoj shumë, e lëshoj dorën, nuk kursej (kryesisht për para). Ka derdhur para të madhe. E derdhte paranë lumë (me të dyja duart). E derdhi në dasmën e vajzës.","vet. veta III bised. Shkrifëron (për tokën). Ngrica e derdh tokën.","krahin. Kaloj një sëmundje nga ato që zakonisht u bien fëmijëve. E ka derdhur linë (fruthin, kollën e mirë). * I derdhi (i vuri) balsam shih te BALSAM,~I. I derdhi barkun (zemrën) dikujt shih I zbrazi (i hapi, i zbuloi) barkun dikujt te ZBRAZ. Derdh djersë (derdh djersën çurkë) punoj shumë e pa u kursyer. Ka derdhur gjakun ka luftuar me armë për një çështje të madhe, ka dhënë jetën. Derdh gjak vras a plagos rëndë dikë. Derdh jargët për diçka thjeshtligj. i lëshon goja lëng dikujt për diçka, e lakmon shumë. Derdh lot qan; vajton; i vjen shumë keq, i dhemb zemra. Derdh mendtë nuk e ka mendjen në një vend, e shpërndan mendjen sa andej-këtej. Derdh trutë lodhet shumë duke menduar a duke u marrë me punë mendore. Ia derdhi trutë dikujt thjeshtligj. e vrau duke e qëlluar në kokë, ia hodhi trutë në erë. Ia derdhi zorrët dikujt thjeshtligj. e vrau, duke e goditur me shpatë etj. në bark. Derdh (nxjerr, lëshon) mjaltë (sheqer) nga goja shih te MJALT/Ë,~I. I derdh (i tret) plumb në gojë (në grykë) e vras pa mëshirë, e asgjësoj (armikun)."]}]</script>
