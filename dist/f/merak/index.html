<script>window.__INITIAL_DATA__ = [{"slug":"merak","term":"MERAK","attributes":["m.","sh.","bised."],"definitions":["Dëshirë e madhe për të marrë vesh a për të mësuar diçka për një njeri, për një ngjarje ose për një gjë tjetër; kureshtje. Ka merak ta dijë. Sa për të hequr (sa për të nxjerrë) merakun.","Dëshirë e madhe a lakmi që ka dikush për të provuar diçka, për të pasur një gjë që nuk e ka etj. Kishte merak (i ka hipur merak) për një biçikletë të re. Plasi nga meraku për diçka. Hëngri dhe e nxori merakun.","Shqetësim i madh që ndiejmë për një njeri të afërm a të dashur kur është larg, kur është i sëmurë ose kur ndodhet në një gjendje të keqe; shqetësimi dhe përgjegjësia që ndiejmë për diçka. Ka merak për djalin (për vajzën). U sëmur nga meraku për të birin. Meraket e prindërve s`kanë të sosur. Ka merak për punën. Më ha meraku për diçka shqetësohem shumë, merakosem. S`e zë meraku për asgjë. E futi në merak e shqetësoi shumë. Jam në merak për dikë a për diçka shqetësohem, merakosem. Fle me merak. Mos ki merak! mos u shqetëso! E hoqi merakun nuk shqetësohet më, u qetësua.","Dashuri, sevda. Pati (zuri, hodhi) merak në të ra në dashuri. E zuri meraku. U martuan me merak. Iu bë merak ajo e dashuroi.","Kujdesi i madh që tregojmë për një punë a për diçka tjetër dhe përpjekja për ta kryer atë sa më mirë. Ndërtesë (punë) e bërë me merak. E punoi me merak.","Të dhënët me mish e me shpirt pas diçkaje, prirje për t'u marrë me diçka, gjakim. Ka merak për muzikë (për sport). Merakun e ka për gjueti i pëlqen gjuetia. Ka merak të madh pas librave.","Dyshim frikë a pasiguri që kemi përpara diçkaje të panjohur, të dëmshme a të rrezikshme, të papastër etj. Kishte merak se mos i ngjiste sëmundjen. Ka merak t`i japë dorën. Pije pa merak!","Dyshim që kemi për dikë. Më ha meraku se ai e ka bërë. Merakun e ka tek ai. M`u hoq meraku për të.","fig. Peng; gozhdë. Më mbeti merak që s`ia dhashë. I mbeti merak që s`e pa. Merak në zemër e kam që s`erdha. * E bëri për merak diçka e bëri shumë të
