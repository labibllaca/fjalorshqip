<script>window.__INITIAL_DATA__ = [{"slug":"plesht","term":"PLESHT","attributes":["m.","sh."],"definitions":["zool. Parazit i njeriut e i kafshëve, me trup shumë të vogël e në ngjyrë kafe të errët, që kërcen shumë, pickon e thith gjak. Pleshtat e dhive (e qenve, e shpendëve, e maces). Bar pleshtash. Sa një plesht shumë i vogël. Kishte zënë pleshta. Kërcen si plesht.","zool. Pjesë e parë e emërtimeve të pathjeshta për disa lloje kandrrash të vogla, me madhësi dhe ngjyra të ndryshme, që dëmtojnë zakonisht gjethet e perimeve, të pemëve etj. Pleshti i gjelbër kandërr e vogël me ngjyrë të gjelbër në të verdhë, që bren e dëmton zakonisht trangujt, jonxhën etj. Pleshti i bletës morri i bletës. Pleshti i drithërave. Pleshti i hardhisë (i mollës). Pleshti i panxharit (i lakrës, i patates). Plesht rëre kandërr si pleshti i zakonshëm, por që nuk kërcen. Pleshti i tokës kandërr si pleshti i zakonshëm, me trup vezak e ngjyrë hiri, që dimëron në të çarat e tokës, në gjethet e thata etj. dhe që dëmton gjethet e lakrës, të rrepës, të panxharit të sheqerit etj.","fig. Njeri jo i mirë, i paqëndrueshëm e i mërzitshëm. Ishte një plesht ai! * Si pleshti në dhallë kuturu, pa mend në kokë, si miza në dhallë. M'u bë plesht (në vesh) m’u ngjit e më mërziti shumë, m'u bë ferrë. I hynë pleshtat (në trup) filloi të shqetësohej e të hante meraku, i hynë mizat. Na marrtë pleshtat (pleshtat e tartabiqet, të këqijat)! thjeshtligj. mospërf. shih te MARR. E shtiu te pleshtat dikë e vuri në një gjendje të vështirë, i nxori telashe. Thes me pleshta shih te THES,~I. Zinte (shtypte) pleshta s'bënte asgjë; merrej me punë të kota, vriste miza. E ka gjumin si të pleshtit ka gjumë shumë të lehtë, ndien menjëherë. E bën pleshtin (mizën) buall (ka) e zmadhon shumë diçka, e fryn tej mase. S’del dhjamë nga pleshti fj. u. përçm. shih te DHJAM/Ë,~I. Ia futi (ia shtiu) pleshtat në vesh dikujt e ngacmoi për diçka, e bëri që të shqetësohej, i shtiu mizat. S`futen pleshtat në thes (s'mblidhen pleshtat në grusht) fj.
