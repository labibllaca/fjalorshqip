<script>window.__INITIAL_DATA__ = [{"slug":"eree-i","term":"ERË I","attributes":["f.","sh."],"definitions":["Rrymë ajri që lëviz në drejtime të ndryshme. Erë e ftohtë (e ngrohtë). Erë e lehtë (e fortë, e tërbuar, e hollë, e lagësht, e thatë). Erë pranverore. Era mëngjesore. Era e malit (e fushës). Era e diellit era që fryn nga lindja. Era e lindjes (e perëndimit, e veriut, e jugut). Erë bore (shiu) erë që sjell borë (shi). Erë me shi (me dëborë). Forca (shpejtësia) e erës. Drejtimi i erës. Matës i erës. Mot me (pa) erë. I shpejtë si era. Fryn erë. Fishkëllen era. Pushoi (ra) era. Të than (të pret, të shkurton, të gërryen) era. E rreh (e zë, e kap, e ha) era. Vend i mbrojtur nga era.","bised. Ajër. Vrimë (baxhë) për erë. Shtie (qëlloj) në erë. Fluturoi në erë. Marr erë marr frymë. * Erë me erë gjithkund, kudo. Fjalë në erë (në hava) fjalë të thëna pa u menduar, fjalë pa kuptim, fjalë të kota. U bë erë iku shumë shpejt, u zhduk menjëherë. Flet në erë flet pa u menduar, flet kot. Hedh në erë diçka. a) shpërthej, shkatërroj me lëndë shpërthyese diçka; b) prish, shkatërroj menjëherë planet e dikujt. E merr era dikë është i dobët me trup, s'mbahet dot më këmbë. E mori era diçka shkoi kot; nuk zuri vend; u zhduk pa lënë gjurmë. E ka sjellë era dikë a) s'dihet nga ka ardhur dhe përse ka ardhur; b) diçka është diçka e panjohur dhe e rastit. Ngopet me erë kënaqet me fjalë e me premtime të kota, ngopet me lugë të zbrazët. Prashit në erë flet fare kot, flet në tym; dërdëllit. Ruan erërat shih te RUAJ. Shkel në erë është shumë i shpejtë (për kalin, për kaprollin etj.). Bën (ndërton, ngre) kështjella në erë (në ajër) keq. shih te KESHTJELL/Ë,~A. Është si era e malit është shumë mendjelehtë e i papjekur. Fjalët i merr era fj.u. s'kanë vlerë fjalët, po qe se nuk shoqërohen me vepra; fjalët harrohen shpejt. Ia hodhi leckat në erë dikujt përçm. shih te LECK/Ë,~A. I hedh paratë në erë i prish paratë kot, i bën paratë rrush e kumbulla. Ia hodhi potkonjtë (në erë)shih te HEDH. Ia hodhi
