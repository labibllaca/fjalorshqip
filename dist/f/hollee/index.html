<script>window.__INITIAL_DATA__ = [{"slug":"hollee","term":"HOLLË","attributes":["as."],"definitions":["Ije, mes. Të hollët e njeriut.","Kërciri i këmbës. U vra tek të hollët e këmbës.","Të fikët. I ra të hollët."]},{"slug":"hollee","term":"HOLLË","attributes":["mb."],"definitions":["Që është shumë i ngushtë dhe i gjatë, që e ka gjerësinë e trupit të vogël, që e ka prerjen tërthore shumë të vogël; që nuk është i trashë, i fryrë a i shëndoshë dhe që duket i hijshëm, i hajthëm; që është i mprehtë e me majë; kund. i trashë. I hollë e i gjatë. Dru (lastar, shkop) i hollë. Shufër (purtekë) e hollë. Bar i hollë. Pe i hollë. Me trup (me shtat) të hollë. Me qafë të hollë. Me gishta të hollë. Me duar (me këmbë) të holla. Tipare të holla (të fytyrës). Me buzë (me vetulla) të holla. Gjemb i hollë. Sqep i hollë. Gjilpërë e hollë. Akrepi i hollë i orës. Me majë të hollë.","Që ka trashësi të vogël që është si cipë a si petë (për sende të rrafshëta e të shtrira); që është bërë prej diçkaje jo të trashë ose që në llojin e vet është i imët, që nuk ka trashësi; kund. i trashë. Letër (cipë, petë, lëvore) e hollë. Shtresë e hollë. Dërrasë (pllakë) e hollë. Xham i hollë. Libër i hollë. Rroba të holla. Çorape të holla. Perde e hollë. Jorgan (qilim) i hollë. Mur i hollë","Që ka gjerësi të vogël, i ngushtë kund. i gjerë. Brez i hollë. Rrip i hollë toke. Vijë e hollë uji.","Që përbëhet nga grimca, kokrriza a thërrmija: shumë të vogla ose nga pika të imëta; që është me vrima shumë të ngushta dhe lë të kalojnë grimca a pikla shumë të imëta; i imët. Rërë e hollë. Pluhur i hollë. Miell (sheqer) i hollë. Kripë e hollë. Barut i hollë. Sitë (kullore) e hollë. Shi i hollë. Breshër i hollë. Vesë e hollë.","I rrallë e i imët, që nuk është i dendur; që është i pakët e jo i ngjeshur, i rrallë e pak a shumë i tejdukshëm. Pyll i hollë. Mjegull e hollë. Tym i hollë.","Që është shumë i lëngshëm (sepse nuk ka brenda lëndë që ta trashin ose sepse ka shumë ujë); kund. i trashë. Qumësht i hollë. Kos i hollë. Supë e hollë. Baltë e hollë. Naftë e hollë.","Që është bërë me mjeshtëri e me kujdes të veçantë, nga që është shumë i ndërlikuar dhe ka pjesë shumë të vogla e të imëta; që është punuar me shumë shije e mprehtësi, që është i përsosur e i përpiktë. Punë e hollë. Punim i hollë. Vepër e hollë. Mekanizëm i hollë. Prerje e hollë. Qëndisje e hollë.","fig. Që është shumë i paktë a i vogël sa mezi vërehet, që shquhet me vështirësi, që mezi dallohet; që është shumë i vështirë për t'u kapur. Buzëqeshje (nënqeshje) e hollë. Dallime (ndryshime) të holla. Nuancat e holla të ngjyrave.","I lartë; i mprehtë (për tingujt dhe zërin). Zë (tingull) i hollë. Fishkëllimë e hollë. Cicërima e hollë e zogjve.","I ftohtë, që të pret, i mprehtë. Thëllim i hollë. Fryn erë e hollë.","Që është shumë i lehtë e i këndshëm. Parfum i hollë. Aromë (erë) e hollë.","fig. Që është shumë i ndjeshëm, që i kap edhe gjërat më të vogla a më të imëta (për organet e shqisave etj.); që preket shpejt nga diçka, që e ndien menjëherë atë. Ka vesh (nuhatje, shije) të hollë. Ka ndjenja të holla. E ka hundën të hollë i kap mirë erërat e ndryshme, ka nuhatje të fortë.","fig. Që i kap gjërat shpejt e si duhet, që depërton thellë deri në gjërat më të imëta, që vepron me shumë mprehtësi, i zgjuar, mendjemprehtë; që bëhet a paraqitet me shumë mprehtësi, shumë i thellë; që bëhet me shumë imtësi, i hollësishëm. Njeri (vëzhgues, psikolog) i hollë. Diplomat i hollë. Kritikë e hollë. Përgjigje (pyetje, vërejtje) e hollë. Arsyetim (mendim) i hollë. Shaka e hollë. Lëvdatë e hollë. Analizë e hollë. Është djalë i hollë. E ka mendjen të hollë është shumë i zgjuar e i mprehtë.","bised. I dobët, i pazhvilluar; dorëhollë, i varfër (edhe fig.). Tokë e hollë. Vende (vise) të holla. Bagëtitë dolën të holla nga dimri. Misrat ishin të hollë. Ishte në gjendje të hollë. Njerëzit kanë qenë të hollë. * Nuk hipën në degë të hollë vepron me shumë kujdes, nuk bën gabime në jetë. E ka hundën të hollë iron. nuk pranon çdo gjë, zgjedh shumë e bën naze. Ka nuhatje të hollë i parandien a i parashikon shpejt e mirë gjërat. I ka veshët të hollë dikush dëgjon shumë mirë, i ka veshët të mprehtë. Bagëti e hollë (e imët) shih te BAGËTI,~A 1. Kallamboqi i hollë bot. shih te KALLAMBOQ,~I. Para të holla para në njësi të vogla. Ujët e hollë (e vogël) euf. shih tek UJ/Ë, ~I","Vendi i hollë euf. organi seksual i mashkullit, vetja. Zorra e hollë anat. shih te ZORR/Ë,~A 1."]},{"slug":"hollee","term":"HOLLË","attributes":["ndajf."],"definitions":["Me trup të ngushtë, me prerje tërthore shumë të vogël, me gjerësi të vogël; me majë të mprehtë; kund. trashë. E tjerr perin hollë. E punon telin hollë. E griu duhanin (sallatën) hollë. E mpreh hollë lapsin.","Në pjesë që kanë trashësi të vogël, në rripa të hollë si cipë a si petë; me një shtresë a cipë të hollë; me rroba të lehta, me veshje të holla; kund. trashë. E preu hollë bukën (djathin). E suvatoi murin hollë. Është veshur hollë.","Në grimca, në kokrriza a thërrmija shumë të vogla, imët. E bluan hollë grurin (misrin, kafenë). E shtyp hollë kripën. E sit hollë miellin.","Ujshëm, jo trashë (kur del jashtë). Del jashtë hollë.","Me mjeshtëri dhe me kujdes të veçantë; me shumë shije e mprehtësi, me përpikëri. Punon hollë. E ka qëndisur hollë. Shtie hollë qëllon mirë me armë.","fig. Sa mezi duket, sa dallohet me vështirësi, paksa; sa mezi kapet. I buzëqeshi hollë.","Me zë të lartë. Këndonte (ia mori këngës) hollë.","fig. Me zgjuarsi e me mprehtësi; thellë; me shumë imtësi. Iu përgjigj hollë. Gjykon (mendon) hollë. I sheh punët hollë. Të flasim më hollë! Sa hollë i ditka gjërat! Pret (tjerr) hollë a) është shumë i zgjuar e i mprehtë, i kap gjërat shpejt; b) flet me fjalë të mençura e të mprehta; bën fjalë për diçka që duhet ta kuptosh vetë; mendon e vepron me pjekuri e me mençuri. I pret hollë mendja është i zgjuar, i kap shpejt gjërat.","bised. Në gjendje të varfër, me vështirësi; ngushtë, në gjendje të keqe. Kemi jetuar hollë. Ishte hollë nga gjendja (nga paratë). E ndiente veten hollë. E zuri hollë dikë. E pa veten hollë. Mbeti hollë."]}]</script>
