<script>window.__INITIAL_DATA__ = [{"slug":"daulle","term":"DAULLE","attributes":["f.","sh."],"definitions":["Vegël muzikore në trajtën e një cilindri të zbrazët, që i ka të dyja anët të mbuluara me lëkurë të nderë dhe që i bien me shkop, me thupër a me duar; zëri i veçantë që del kur i bien kësaj vegle; lodër. Daullet e kushtrimit. Bie (dëgjohet, ushton) daullja. I bie daulles. E çau fare daullen i bie daulles me forcë të madhe e pa pushim.","tek. Pjesë e një makine, e disa armëve të zjarrit a e një mekanizmi tjetër, e cila ka trajtën e një cilindri e zakonisht është e zbrazët përbrenda; kuti e gjerë në trajtën e një cilindri të shtypur, ku futet zembereku i sahatit. Daullet konike. Daullja e sahatit. Rrotullohet daullja.","anat. Daullja e veshit: cipë e hollë, që ndan kanalin e jashtëm të veshit nga veshi i mesëm.","krahin. Buhari. Daullja e oxhakut (e vatrës). * Daulle e shpuar keq. shih te SHPUAR (i, e). Daulle e çarë keq. shih te ÇARË (i, e). E bëri daulle dikë përçm. e la të vdekur në vend. U bë daulle dikush thjeshtligj. a) u ënjt, u fry (nga një sëmundje, nga të qarët etj.); b) u mërzit shumë, u fry nga mërzia, nga inati etj.; c) mospërf. ra i vdekur përdhe, vdiq në vend. I bie daulles jap kushtrimin, lajmëroj të tjerët për diçka të ngutshme. Bjeri daulles! mospërf. llomotit sa të duash!, gri lakra! I bie daulles së dikujt keq. bëhet tellall i dikujt, flet ashtu siç e udhëzon ai, i shkon pas avazit. Është (fare) daulle dikush mospërf. s'di gjë fare, e ka kokën fare bosh. E përzunë me daulle dikë e vunë në lojë dhe e përzunë me zhurmë e me potere, me të shara e me të tallura, që ta merrnin vesh të gjithë. I vunë daullen dikujt e vunë në lojë, e tallën para të gjithëve. U shqye daullja shih te SHQYHEM. E bëri rrip daulleje dikë a diçka a) e shkretoi fare, e la të shkretë; b) e la pa gjë fare, e bëri trokë. U bë rrip daulleje shih te RRIP,~I. Mbeti rrip daulleje shih te RRIP,~I. Rrip daulleje njeri i trashë nga mendja, njeri që nuk ia pret mendja; njeri i humbur Ia bëj kokën (mendjen) daulle dikujt ia marr mendtë, e trullos me fjalë; e mërzit shumë me fjalë. Iu bë koka daulle u trullos nga zhurma, nga telashet a nga fjalët e shumta e të kota; u mërzit shumë. E kam kokën daulle e kam kokën të rëndë nga zhurma, nga telashet a nga fjalët e shumta. E bëri barkun daulle (lodër) e mbushi barkun shumë, u fry së ngrëni. Iu bë barku daulle (lodër, kacek) iu fry shumë barku, u bë kacek. I bie daulles në një vend them e përsërit të njëjtën gjë disa herë, i bie fyellit në një vrimë. Mori rrethin e daulles iron. shih te RRETH,~I. Është daulle për derë diçka mund të ndodhë në çdo shtëpi, mund t'i ndodhë kujtdo. Kërcen (hedh këmbët, luan këmbët, hedh vallen) siç bie daullja (sipas daulles, siç bie lodra) keq. bën ashtu siç i thonë të tjerët, s'ka mendim e qëndrim të vetin, shkon pas avazit të të tjerëve. Bie daullja në vesh të shurdhët shih te SHURDH,~I. Daullja bie për ata që kanë veshë fj.u. e mira vjen për ata që e kuptojnë e dinë të përfitojnë; kush ka mend, e kupton. Ku i bie daulles unë e ku e hedh vallen ti! çfarë them unë e çfarë bën ti, tjetër gjë të them unë e tjetër gjë bën ti. Gjetkë daullet, gjetkë dasma nuk veprohet ashtu siç thuhet, fjala nuk përputhet me veprën. Nisën vallet kur pushuan daullet shih te VALL/E,~JA. Kur kërcente (luante, bënte dasmë) fukarai, çahej daullja i varfëri kurrë nuk gëzonte, të varfrin nuk e linin asnjëherë t'i shkonte puna mbarë. Po dëgjove daullen, dasmën e ke prapa (te dera) shenjat tregojnë se së shpejti do të ngjasë diçka më e madhe. Ku leh qen e ku del tym, ku bën daullja bum iron. shih te QEN,~I."]}]</script>
