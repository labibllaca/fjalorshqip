<script>window.__INITIAL_DATA__ = [{"slug":"degee","term":"DEGË","attributes":["f.","sh."],"definitions":["Pjesë anësore që del si krah nga trungu i drurëve a i shkurreve ose nga kërcelli i bimëve barishtore, zgjerohet me filiza e vishet me gjethe e me lule. Degë e madhe (e vogël, e hollë, e trashë). Degë e njomë (e thatë). Degë kryesore (anësore). Degë molle (dardhe, kumbulle). Degë lisi (ahu, plepi, dafine, thane, lajthie). Degë ulliri. Degë karafili (borziloku, mëllage, laboti). Degë plot kokrra. Maja (sqetulla) e degës. Me degë të varura (të mbledhura). Lëshon degë. I shtriu degët. Pres (këput, thyej) një degë. I pres degët. Ra nga dega.","bised. Kërcelli i disa bimëve së bashku me gjethet, rrënjë. Degë misri (duhani, domatesh). I ujitin degë për degë.","Rrymë më e vogël uji (lumë, kanal etj.) që derdhet në një tjetër më të madhe ose ndahet prej saj, mëngë, krah; rrugë e vogël automobilistike, hekurudhore etj. që lidhet me një rrugë kryesore a më të madhe. Degë lumi. Degë e Drinit (e kanalit të Myzeqesë). Degë rruge. Degë hekurudhe. Degët e galerisë.","anat. Zgjatimi i një ene gjaku, i një nervi a i një indi; rremb. Dega e aortës. Dega e nervit.","Nënndarje e gjerë administrative në një dikaster, në një ndërmarrje a në një institucion, që ka një detyrë të veçantë; pjesë e një organizate kulturore a e një institucioni që vepron në një rreth a qytet të caktuar. Dega ushtarake. Dega politike. Dega mësimore (metodike). Dega e kuadrit (e financës, e planit, e administratës). Dega e botimeve. Dega e shpërndarjes (e furnizimit, e shitjes). Dega e bankës. Dega e punëve të brendshme. Dega e Lidhjes së Shkrimtarëve dhe të Artistëve. Kryetar dege.","fig. Fushë e veçantë e diturisë, e artit, e shkencës etj.; pjesë a nënndarje e një veprimtarie shoqërore, e një shkence etj.; lëmë; fushë e veçantë a drejtim i ngushtë studimi në një shkollë profesionale a të lartë. Degët e shkencave. Degë e artit. Degët e ekonomisë. Degë sporti. Dega e gjuhës (e historisë, e fizikës, e biologjisë, e kimisë). Dega e pikturës (e muzikës, e pianos). Është i degës është specialist në një fushë të caktuar të shkencës a të teknikës.","Vijë gjenealogjike, pjesë a nënndarje e një fisi, familjeje etj. Degë të fisit (të familjes).","Secila nga fletët anësore të enëve të mëdha prej dërrase (të fuçisë, të kades etj.). Degë voze. Degët e kades.","përd. ndajf. Drejt, qiri; si i ngrirë, akull. Rrinte degë në këmbë. I rrinë rrobat degë. * Ka rënë nga dega i ka rënë autoriteti, nuk është më ai i pari, ka rënë nga pozita që kishte; nuk i shkon më fjala. Ka rënë nga shtatë degët ka shumë përvojë nga jeta, është i rrahur me jetën, ka kaluar në prova të vështira. Të hedh (të shpie, të çon) degë më degë e sjell fjalën rrotull e rrotull, sa andej-këtej, pa u përqendruar aty ku duhet e pa e sqaruar deri në fund një çështje; nuk të jep përgjigje të qartë, nuk të jep rrugë. I mbushur degë me degë i mbushur plot e përplot, buzë me buzë, rrafsh. E shqyrtuan (e panë) degë më degë e shqyrtuan me rrënjë, me themel; e zbërthyen hollësisht, fije e për pe. Kapet pas degëve (e jo pas trungut) niset jo nga hallka kryesore, por nga gjërat e dorës së dytë. E kap për degësh e kap diçka jo atje ku duhet e si duhet; merret me gjëra të vogla e anësore, duke lënë mënjanë ato kryesoret e të rëndësishmet; e kap diçka për flokësh. Mbeti lis pa degë (si pika në lis) shih te LIS,~I. Ka mbetur (është bërë) si qyqja në degë shih te QYQ/E,~JA. E njoh (e di) me rrënjë e me degë shih te RRËNJ/Ë,~A I. E shkulën (e ngritën) me rrënjë e me degë shih te RRËNJ/Ë,~A I. E shau me rrënjë e me degë (rrënjë me rrënjë) shih te RRËNJ/Ë,~A I. I shartuar në degë shih te SHARTUAR (i, e). Si torba (si trasta) në degë në hava, pezull, varur; pa ndonjë siguri. Thekë e degë shih te THEK,~U I. Dega e ullirit libr. shih tek ULLI,~RI. Tund degën e ullirit iron. shih tek ULLI,~RI. Vret degë më degë e mban veten për të madh, mburret shumë, është mendjemadh. Është tri në degë e dy në majë dikush është i papjekur, është i lehtë nga
