<script>window.__INITIAL_DATA__ = [{"slug":"keerkoj","term":"KËRKOJ","attributes":["kal."],"definitions":["Përpiqem të gjej dikë a diçka që nuk dihet se ku është a që ka humbur ose diçka të re a të panjohur, duke hetuar, duke gjurmuar, duke kontrolluar etj. Kërkonte shokët. Kërkonin një dele të humbur. Kërkoj në të gjitha anët (andej e këtej, në çdo skutë). Kërkoj nëpër shtëpi. E kërkoi vendin me pëllëmbë. Kërkoj rrugëdalje. Kërkoj shkakun. Kërkoj udhë (shtigje) të reja. E kërkuam, por s`e gjetëm. Nuk lanë vend pa kërkuar. Kush kërkon, gjen. fj. u.","Dëshiroj diçka dhe dua ta kem a ta marr; e thërres dikë, e ftoj që të vijë a të paraqitet tek unë; dua. Kërkonte shtëpi të re. Nuk kërkon shpërblim (dhurata, bakshish). Çfarë kërkon? Kë kërkoni? E kërkon drejtori. Ju kërkojnë në telefon. Kërkoi të birin para se të vdiste. Kërkon sisë (fëmija) do gji të pijë. S`di as vetë se ç`kërkon. Kërkonte më shumë nga shoqëria. Ujku mjegull kërkon. fj. u. Kush kërkon copën e madhe, humbet edhe të voglën. fj. u.","I bëj dikujt një kërkesë, i lutem për diçka; ngul këmbë që dikush të përgjigjet ose të japë sqarime a llogari për diçka. I kërkoi ndihmë (para). Kërkoi një muaj afat. Qeveria kërkoi votëbesimin. Kërkojnë llogari (hesap). Kërkoj të falur (ndjesi) i drejtohem dikujt që të më falë për një gabim etj.","Parashtroj një dëshirë, bëj një propozim etj.; shfaq mendimin tim për çmimin e një malli që dua ta shes ose ta këmbej me diçka tjetër. E kërkoi për grua. I kërkoi dorën. E kërkuan për drejtues. Sa kërkonte për atë? sa e shiste? Kërkonte shtrenjtë.","Vëzhgoj, gjurmoj dhe studioj me kujdes e në mënyrë sistematike një çështje etj. në një fushë të shkencës.","Përpiqem të arrij diçka, synoj. Kërkonte ta trembte. Kërkonte t'ua kalonte të tjerëve. Kërkonte t`ua hidhte.","jokal. Kam kërkesa të mëdha (ndaj vartësve, nxënësve etj.), jam kërkues. Ai kërkon shumë. Kërkon deri në një.","vet. veta III. Ka nevojë për diçka, do; meriton. Kjo punë kërkon durim (vëmendje, këmbëngulje, kujdes, djer
