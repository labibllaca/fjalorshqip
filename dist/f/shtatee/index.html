 I shkojnë (i venë) shtatë thjeshtligj. ka shumë frikë. I shkojnë shtatë (tetë) në qase ka shumë frikë, i ka hyrë lepuri në bark. Me shtatë zemra shumë trim, që nuk i trembet asgjëje, që nuk e di se ç'është frika. Të vrisje shtatë (nuk gjeje) ishte e pamundur të gjeje diçka. Ka rënë nga shtatë degët shih te DEG/Ë,~A. Java shtatë e ai tetë shih te JAV/Ë,~A. Për shtatë palë qejfe a) shumë i bukur, shumë i mirë, i shkëlqyeshëm; b) si s'ka më mirë, duke mos lënë gjë metë, duke u kënaqur pa masë. Shtatë pashë nën dhe shumë thellë. E pafsha shtatë pashë nën dhe! mallk. vdektë, e pafsha në varr. I bie ora (sahati) gjithnjë shtatë (dymbëdhjetë) shih tek OR/Ë,~A I. Është si grosha shtatë javë shih te GROSH/Ë,~A. E mbylli me shtatë kyçe (me shtatë palë çelësa) e mbylli mirë që të mos hapet, e fshehu thellë, në një vend të sigurt, që të mos e gjejë askush. Qante me shtatë palë lot qante me dhembje të madhe. I shkuan shtatë palë djersë e ndjeu veten shumë ngushtë, i shkuan djersë të ftohta. E kishin zënë shtatë palë ethe a) e kishin zënë ethe shumë të forta; b) ishte tmerruar deri në palcë. Të çon (të shpie) në shtatë kroje (në krua, në njëqind çezma) e s'të jep ujë shih te KRUA, KROI. Mat shtatë (tri, dhjetë) herë e pre një herë! fj. u. shih te MAT."]}]</script>
