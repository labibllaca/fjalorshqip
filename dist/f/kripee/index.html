<script>window.__INITIAL_DATA__ = [{"slug":"kripee","term":"KRIPË","attributes":["f.","sh."],"definitions":["Lëndë e bardhë dhe e fortë në trajtë kokrrizash të vogla të kristalta, e tretshme në ujë, me shije të njelmët, që nxirret nga uji i detit (nëpër kripore) a nga toka (në miniera) dhe që përdoret në gjelle ose u hidhet ushqimeve për t'i ruajtur për një kohë të gjatë. Kripë e bardhë kripë e pastruar mirë. Kripë gjellë. Kripë guri kripa që nxirret në miniera. Gjalpë (djathë, gjizë) me (pa) kripë. I hedh (i shtie) kripë gjellës. Vë (shtie) në kripë. E shoh gjellën për kripë. E ha me pak kripë. Për atë kripë! bet. vjet.","kim. Përbërje kimike, formuar nga zëvendësimi i plotë a i pjesshëm i hidrogjenit të një acidi me metal e me njëvlerës të tij. Kripëra organike (joorganike). Kripëra minerale. Kripa e potasit. Krip a e hekurit. Kripa e argjendit.","mjek. Lëndë e bardhë dhe e kristaltë që pihet për të dalë jashtë kur jemi kaps; sulfati i magnezit. Pi kripë.","fig. bised. Shije a lezet; ajo çka e bën të këndshme e tërheqëse një bisedë, një fjalë etj.; ajo që të bën ta pëlqesh dikë a diçka. Fjalë me kripë fjalë që thuhen me zgjuarsi e me mprehtësi. Bisedë (anekdotë) me (pa) kripë. Njeri pa kripë njeri që nuk të pëlqen ta shikosh ose ta dëgjosh. I hedh kripë bisedës. I doli kripa dikujt ose diçkaje u bë i mërzitshëm, s'ka më shije a lezet, nuk ndien më kënaqësi kur e shikon a kur e dëgjon.","përd, ndajf. Pa gjë në xhep, trokë. Ishin kripë (në diell). Mbeti kripë. I la kripë. * M'u bë kripë diçka nuk më vajti mbarë më shkoi ters (një punë), sepse më dolën pengesa të papritura. Buka e kripa e diçkaje shih te BUK/Ë,~A. Gjellë pa kripë shih te GJELL/Ë,~A. Me bukë e kripë (e zemër të bardhë) shih te BUK/Ë,~A. E ka lëshuar kripa dikë shih te LËSHOJ. Mbeti (është) kripë (dërrasë, teneqe, pip) shih te MBES","E bëri për ujë me kripë (të kripur) dikë shih tek UJ/Ë,~I. E do si kripën në sy dikë iron. e urren pa masë, s'do t'ia shohë sytë. Kemi ngrënë një barrë (një thes) kripë (një furrë bukë, një hambar miell) bashkë shih te FURR/Ë,~ A. Humbi si kripa në ujë iku diku dhe nuk dihet se ku është, u zhduk pa lënë gjurmë. U shkri (u tret) si kripa në ujë u dobësua menjëherë, ra menjëherë nga shëndeti; u shkri, u tret (nga një sëmundje e rëndë ose nga një hidhërim i madh). Është kripë derri është i varfër sa s'ka, s'ka as një lek në xhep. E ka kripën të thatë shih te THATË (i, e) i shtypi kripë mbi kokë dikujt shih te SHTYP. Ç'bën në det e gjen në kripë fj.u. shih te DET,~I. Gjella me kripë e kripa me karar fj.u. çdo punë ka një kufi, i cili nuk duhet kaluar; në çdo gjë duhet ruajtur masa. Mos shtjer kripë në gjellën e botës! fj.u. shih te SHTIE."]}]</script>
