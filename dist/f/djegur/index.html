<script>window.__INITIAL_DATA__ = [{"slug":"djegur","term":"DJEGUR","attributes":["f.","sh."],"definitions":["Plagë që shkaktohet në trup kur digjemi, vend i djegur, djegie; shenja që lë kjo plagë. E djegura në faqe (në dorë, në këmbë). Kish një të djegur.","Vend i djegur në diçka (në rroba etj.); pjesë e sendeve të ndryshme e dëmtuar nga zjarri, nga diçka e nxehtë, nga acidet etj. E kishte përparësen tërë të djegura.","shih DJEGËSIR/Ë,~A","E djegura e piperit. Ndjente një të djegur në fyt (në sy)."]},{"slug":"djegur","term":"DJEGUR","attributes":["mb."],"definitions":["Që është bërë shkrumb e hi në zjarr, që është shkatërruar a dëmtuar rëndë nga zjarri, që është djegur. Shtëpi të djegura. Fshatra (qytete) të djegura. Pyll i djegur. Libra të djegur.","Që është përcëlluar në zjarr a në flakë, që është djegur me zjarr, me hekur a me ujë të nxehtë etj. Me duar të djegura. Me qerpikë të djegur. E kishte faqen të djegur.","Që është skuqur, zier a pjekur jashtë mase në zjarr dhe ka marrë ngjyrë të errët a të zezë ose shije të hidhur; i ciknosur, i zhuzhitur, i shkrumbosur (për gjellët, bukën etj.). Vaj (gjalpë, sheqer) i djegur. Bukë e djegur. Mish i djegur. Gjellë e djegur. Lëng i djegur gjellë me miell të skuqur.","Që është prishur, ka dalë jashtë përdorimit dhe duhet zëvendësuar a duhet ndrequr (për mjetet elektrike dhe për aparatet, makinat etj. që punojnë me rrymë elektrike). Llambë e djegur. Motor i djegur.","Që është dëmtuar nga të nxehtët, nga thatësira a nga ndonjë sëmundje dhe është fishkur, është tharë e është prishur (zakonisht për bimët). Kallinj të djegur. Të lashta të djegura. Duhan i djegur. Gjethe të djegura.","Që është tharë fare nga të nxehtët a nga mungesa e ujit (për tokën, bimët); që ka etje të madhe nga që s'ka pirë ujë prej kohësh, nga zjarrmia që i jep sëmundja, nga lodhja etj., që është tharë e është përvëluar për ujë (për njerëzit, buzët); i përvëluar, i zhuritur. I djegur për ujë. Toka të djegura. Me buzë të djegura.","I skuqur shumë, i nxirë nga rrezet e diellit, që e ka zënë dielli mirë. Me fytyrë të djegur.","fig. Që vuan shumë nga malli, nga dëshira a nga dashuria për dikë a për diçka; që është lënduar e brengosur rëndë nga humbja e njerëzve me të dashur o nga ndonjë fatkeqësi e madhe, shumë i pikëlluar; i përvëluar, i zhuritur. I djegur për një copë tokë. I djegur nga malli për atdheun. I djegur për fëmijë (për një djalë, për një vajzë). I djegur nga dëshira (nga dashuria). Me zemër të djegur.","Që ka shkuar dëm, ngaqë nuk është përdorur në kohën e duhur, që është bërë i pavlefshëm, që s'mund të përdoret më; që ka humbur a ka dështuar (në një lojë etj.). Bileta të djegura. Fond i djegur. Lojtar i djegur. Qengja (viça) të djegur qengja (viça etj.) që kanë mbetur të dobët a pa u zhvilluar mirë.","Që është nxehur me zjarr e me flakë para se të vihet në përdorim (për një furrë të re); kund. e padjegur. Furrë e djegur.","Që është pjekur në furra të posaçme (për tullat, gurin gëlqeror). Tulla të djegura. Gëlqere e djegur. * Kartë (letër) e djegur plan, veprim, taktikë etj. ose njeri në shërbim të dikujt, që s'hyn më në punë, që s'mund të përdoret më se është zbuluar, se ka rënë shumë poshtë në sy të të tjerëve etj. Pleh i djegur pleh i dekompozuar mirë. Vaj i djegur tek. shih te VAJ,~I I,","Taktika (politika) e tokës së djegur shih tek TOK/Ë,~A."]}]</script>
