<script>window.__INITIAL_DATA__ = [{"slug":"mulli","term":"MULLI","attributes":["m.","sh."],"definitions":["Makinë e thjeshtë për të bluar drithë, që përbëhet nga pajisje të ndryshme, si edhe nga dy gurë të mëdhenj, të sheshtë e të rrumbullakët, të vënë njëri mbi tjetrin, nga të cilët i sipërmi lëviz me anë të fuqisë së ujit, të erës a me motor; ndërtesa me një makinë të tillë ku bluhet drithi. Mulli drithi. Mulli me ujë (me erë, me motor). Dishta (mokra, çakallja, gryka, penda) e mullirit. Koshi i mullirit. Gurët (mokrat) e mullirit. E bloi në mulli. Shkoi në mulli.","Makinë e posaçme me pajisjet e nevojshme, që shërben për të shtypur, për të thërrmuar a për të bluar diçka (gurë, ullinj etj.). Mulli vaji mulli ku shtypen ullinjtë e nxirret vaj. Mulli mineralesh. Mulli me çekiçë për bluarjen e ushqimeve të ashpra (për shtypjen e qymyrgurit). Çekanët e mullirit.","Vegël e posaçme, që zakonisht vihet në lëvizje me dorë dhe shërben për të bluar kafe, pipër etj. Mulli dore. Mulli kafeje (piperi, orizi).","Pjesë e revoles, në trajtën e një cilindri e me vende të caktuara për fishekët, e cila rrotullohet pas çdo shkrehjeje për të sjellë në grykë fishekun e radhës. Revole me mulli. * Flet në mulli mospërf. nuk ia dëgjojnë fjalën, këshillën etj.; s'ia vë veshin askush, i shkojnë fjalët kot. Është gur mulliri a) është shumë i rëndë; b) është shumë i fortë. Si mulliri me pellg herë e bën një gjë e herë jo. Ra si pula në mulli (në grurë) shih te PUL/Ë, ~A. Të lirit e të mullirit shih te LI,~RI. S'bluan më ai mulli shkoi e vajti ajo kohë, i iku koha dikujt a diçkaje dhe nuk është më në gjendje të punojë. Grin (bluan) si mulliri pa kokrra shih te KOK/ËRR,~RRA. Sikur është zënë në mulli mospërf. thuhet për dikë që nuk pushon së foluri ose që është llafazan i madh. S'e ha guri i mullirit shih te GUR,~I. Çon (shpie) ujë në mullirin e dikujt shih tek UJ/Ë,~I. I ka ardhur ujë në mulli dikujt shih tek UJ/Ë,~I. U bë leku gur mulliri ishte shumë e vështirë që të nxirrje lekun në atë kohë, s'fitohej lehtë paraja. I lëshon shumë ujë mullirit mospërf. shih te LËSHOJ. Ai mulli s'e bluan dot atë misër s'është i zoti dikush, s'është i aftë për atë punë. Mulliri bluan me aq ujë sa ka fj.u. s'mund të bëhet diçka jashtë fuqive, jashtë mundësive etj., secili bën aq sa ka mundësi. Kush vete në mulli doemos do të përmiellet fj.u. s'mund të rrish pa marrë pjesë në punën, në jetën, në veprimtarinë, në shqetësimet etj. të mjedisit që të rrethon; në qoftë se pranon të bësh një punë, atëherë do të pranosh edhe pasojat e saj."]}]</script>
