<script>window.__INITIAL_DATA__ = [{"slug":"petee","term":"PETË","attributes":["f.","sh."],"definitions":["Shtresë e hollë brumi në trajtë të rrumbullakët, që është hapur e është holluar me petës dhe që përdoret për të bërë byrek etj. Petë të holla (të trasha). Petë të pjekura. Petël e byrekut (e bakllavasë, e lakrorit). Byrek (qumështor) me petë. Hollojnë (bëjnë) petë. Shtrojnë petët në tepsi. Lyejnë petët me gjalpë (me vaj).","bised. Lakror a byrek i përgatitur me shtresa të tilla të holla brumi, ndërmjet të cilave zakonisht hidhet një gatesë; petanik.","Brumë i gatuar me vezë etj., që hollohet, pritet rripa-rripa dhe lihet të thahet, ose që thahet në diell pa u prerë e pastaj copëzohet për t'u përdorur si makaronat; vet. sh. petarishte. Petët e dimrit. Petë me gjalpë. Pulë me petë. Bëri ca petë.","Shtresë e hollë e rrasike e diçkaje; fletë a pllakë e hollë guri, metali etj. Petë guri. Petë akulli. Petë sapuni. Petë bakri. Teli (argjendi, ari) bëhet petë.","Një copë guri e hollë në trajtë të rrumbullakët ose copë tjegulle, që e përdorin fëmijët kur luajnë petash; gur petashuq. Luaj me peta luaj petash.","bised. Ajka e qumështit. Ka vënë petë qumështi. * E bëri petë a) e shtypi fare; b) e bëri rrafsh me tokën. U bë pet u dobësua shumë, u tret. I ka plasur peta dikujt i ka plasur cipa, është bërë i pacipë, i paturp. U bë petë përtokë u shtri rrafsh me tokën që të mos duket. Iu bë barku petë (dërrasë, gropë) shih te GROP/Ë, ~A. Ia bëri kokën petë e rrahu shumë, e bëri petë. Barkun petë, por shpatullat (kurrizin) drejt shih te SHPATULL,~A. Ia hoqi petën lakrorit ia zbuloi krejt të fshehtat dikujt, ia nxori të palarat fare në shesh, i nxori lakrat. I ka plasur peta (cipa) e ballit keq. shih te CIP/Ë,~ A."]}]</script>
