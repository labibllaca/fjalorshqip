<script>window.__INITIAL_DATA__ = [{"slug":"nxihem","term":"NXIHEM","attributes":["vetv."],"definitions":["Bëhem me të zezë; lyhem a ndotem me diçka të zezë ose të errët e të papastër. Nxihem me bojë. Je nxirë në ballë. U nxi pas murit.","vet. veta III. Bëhet i zi; merr një ngjyrë të murrme, të errët, si të zezë. I nxihen pendët (qimet). Nxihet qielli (deti). Nxihet rrushi. Nxihen fiqtë. Më nxihet buza (mishi) më mavijoset buza (mishi). U nxi koha u vrenjt, e mbuluan qiellin re të zeza.","Marr një ngjyrë si të bronzit nga dielli, zeshkem. Nxihem në diell (nga dielli). Iu nxi lëkura. Iu nxinë krahët (këmbët).","fig. keq. Mbushet një vend plot e përplot me diçka jo të dëshirueshme. U nxi mali me ushtarë. Nxihej fusha me jeniçerë. U nxinë rrugët me fashistë. U nxinë ledhet me kufoma.","fig. Bëhem i zymtë e i ngrysur në fytyrë, vrenjtem. U nxi i tëri. Nxihet nga inati.","Më erret vështrimi e më duket gjithçka e zezë. M`u nxinë sytë m'u veshën sytë, m'u err vështrimi, nuk pashë më tutje. M`u nxi bota.","pavet. Errësohet, ngryset.","Pës. e NXIJ 1,3. * Iu nxi balli u turpërua, u bë me turp, iu nxi faqja. U nxi me bojë shih te BOJ/Ë,~A I. Iu nxi dera shih te DER/Ë,~A. S'i nxihet faqja (fytyra) nuk turpërohet për asgjë, është i pacipë. Iu nxi jeta iu bë jeta e rëndë, e padurueshme, u bë fatkeq; humbi një njeri shumë të afërt e të dashur (zakonisht për gratë). S'i nxihet lara shih te LAR/Ë,~A. M'u nxinë vetullat shih te VETULL,~A."]}]</script>
