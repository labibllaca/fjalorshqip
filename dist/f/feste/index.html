<script>window.__INITIAL_DATA__ = [{"slug":"feste","term":"FESTE","attributes":["f.","sh."],"definitions":["Kësulë prej cohe të bardhë, që e mbajnë kryesisht burrat; takije (pjesë e veshjes sonë popullore). Vë (heq) festen.","Kësulë a kapelë pa strehë, zakonisht prej cohe të kuqe dhe me e ngushtë në majë, e cila mbahet kryesisht nga burrat në disa vende të Lindjes së Afërme dhe të Afrikës Veriore. Feste me xhufkë. Bojë festeje bojë e kuqe e errët, bojë speci. * Sipas kokës edhe festen (ajo kokë atë feste do; atë kokë ka, atë feste do) fj. u. shih te KOKË,~A. E ka mizën nën feste (nën kësulë, nën shapkë) shih te MIZ/Ë, ~A. E hodhi (e vuri, e ktheu...) festen (kësulën, qeleshen, kapelën, takijen) mbi sy (mënjanë) shih te SY,~RI. I vjen (i sillet) festja (takija) vërdallë (rrotull) shih te VËRDALLË. Djali pa lerë e festja (djepi) blerë iron, shih Peshku në det e tigani në zjarr te PESHK,~U. I ka mendtë në tufë të festes është shumë mendjelehtë, i ka fluturuar mendja, s’i ka mendtë në vend; është i hutuar, rri sikur s’është në tokë."]}]</script>
