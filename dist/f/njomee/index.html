<script>window.__INITIAL_DATA__ = [{"slug":"njomee","term":"NJOMË","attributes":["mb."],"definitions":["Që ka qenë i zhytur në ujë a në një lëng tjetër ose që ka thithur mjaft ujë dhe nuk është tharë ende a nuk është fshirë, që është pak i lagët, që përmban lagështi; kund. i thatë. Me rroba të njoma. Suva (çimento) e njomë. Rërë e njomë. Kripë e njomë. Dërrasa të njoma. Pllaka të njoma. Me duar të njoma.","Që ka lëng, që është ende i gjelbër dhe zakonisht jo i vyshkur; që është i përbërë prej bimësh të gjelbra; që i ka kokrrat si qumësht a si qull, që nuk ka zënë bukë; kund. i thatë. Bar i njomë. Sallatë e njomë. Qepë (hudhra) të njoma. Fasule të njoma. Filiz i njomë. Masë e njomë ushqim për bagëtinë, i përbërë kryesisht prej bimësh të gjelbra. Ushqim i njomë masë e gjelbër, e përzier shumë herë edhe me mbeturina të industrisë ushqimore, që u jepet bagëtive. Misra të njomë. Grunjërat janë të njoma.","Që sapo është prerë ose që s'ka shumë kohë që është prerë; që përmban ujë e nuk digjet lehtë; që sapo është hequr nga një kafshë; kund. i thatë. Dru të njoma. Degë e njomë. Lëkurë e njomë lëkurë që sapo është rrjepur nga një kafshë.","fig. Shumë i ri në moshë, i vogël, i mitur, që nuk ka arritur moshën e pjekurisë dhe që nuk ka përvojën e forcën fizike të nevojshme për ta përballuar vetë jetën; që duket shumë i ri, pak i dobët e i brishtë. Foshnjë e njomë. Djalë i njomë. Vajzë e njomë. Fytyrë e njomë. Organizëm i njomë. Në moshë të njomë. Me shpatulla (me supe) të njoma. Mendje e njomë. Shpirt i njomë.","I bërë a i prodhuar para pak kohe dhe pa kripë a i pakripur (zakonisht për bulmetin); i zënë atë ditë dhe i pakripur e i pangrirë (për peshkun etj.), i proshkët, i freskët. Djathë i njomë. Gjalpë i njomë. Gjizë e njomë. Peshk (qefull, krap) i njomë. Mish i njomë mishi i qengjit, i kecit ose i viçit të vogël.","bised. Që jep qumësht, që është në kohën kur ka me shumë qumësht (për kafshët). E ka lopën të njomë. E kishte të njomë buallicën.","Që bëhet me anë të një lëngu ose të diçkaje të lëngët; kund. i thatë. Dezinfektim i njomë. Mënyrë e njomë mënyrë që përdoret për heqjen e njollave duke i larë rrobat, për prodhimin e çimentos me anë të lëngjeve etj.","Përd. em. sipas kuptimeve të mbiemrit. * Druri ndreqet sa (kur) është i njomë fj. u. shih te DRU,~RI. Gjithkujt murrizi i vet i duket i njomë fj.u. shih te MURRIZ,~I. S'ka ç'i bën shkëndija eshkës së njomë (së lagur) fj.u. shih te SHKËNDIJ/Ë,~A. Shkoi (u dogj) edhe i njomi (bashkë) me të thatin thuhet kur bashkë me fajtorin e pëson edhe ai që s'kishte faj, kur prej të keqit e pëson edhe i miri. Shkoi (u dogj) i njomi për të thatin e pësoi ai që s'kishte faj në vend të fajtorit."]}]</script>
