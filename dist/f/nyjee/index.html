<script>window.__INITIAL_DATA__ = [{"slug":"nyjee","term":"NYJË","attributes":["f.","sh."],"definitions":["Lak në një litar ose në një fill, i tërhequr fort e i shtrënguar; vendi ku lidhen si xhungë dy skaje të një filli a të një rripi. Nyjë e litarit (e spangos, e perit). Nyjë e kravatës (e fjongos). Lidh nyjë. Bëj nyjë. Zgjidh nyjën.","fig. Diçka që shërben si lidhje midis dy njerëzve, dy palëve a dy dukurive, lidhje. Nyjë miqësore. Nyjë lidhëse midis dy epokave.","fig. Pika themelore e një çështjeje a pune të ndërlikuar, që kërkon zgjidhje; thelbi i diçkaje, pika e përqendrimit. Nyjë e ngatërruar (e ndërlikuar). Nyja e kontradiktave. Nyja e çështjes (e veprimit). Nyjë që duhet zgjidhur.","bot. Vendi i fryrë i një dege a kërcelli prej nga shpërthejnë gjethet; pjesë e fryrë e trungut, nga ku dalin degët; gdhe në një dëm a dërrasë. Nyja e gjethit. Nyjat e drurit (e pemës). Dërrasë me nyja.","anat. Vendi ku lidhen dy kocka njëra me tjetrën, kyç. Nyjat e duarve (e këmbëve). Sëmundjet e nyjave. Më dhëmbin nyjat.","anat. Lëmsh i vogël, që formohet nga grumbullimi a ndërthurja e shumë qelizave të një indi; gungë nga fryrja ose ngurtësimi i një ene, i një indi etj. Nyjë nervore. Nyjat limfatike. Duar gjithë nyja. Nyja e fytit fikthi, arra e fytit.","Vendi a pika ku bashkohen e kryqëzohen shumë rrugë. Nyjë rrugore (hekurudhore). Nyjë detare. Nyjë ujore.","tek. Pjesë e një mekanizmi ose e një pajisjeje, e përbërë nga disa vegla më të thjeshta të lidhura ndërmjet tyre. Nyjat dhe mekanizmat e traktorit. Prodhimi (montimi) i nyjave. Zbërthimi i nyjës në pjesë. Nyjë elektrike pika ku bashkohen disa përcjellës në një qark elektrik.","Tërësi pajisjesh, mekanizmash etj. që lidhen midis tyre, që kryejnë një punë të përbashkët a që prodhojnë diçka për ta përhapur në pika të tjera. Nyjë betoni (llaçi, bitumi). Nyjë hidroteknike.","gjuh. Pjesëz që shërben për të treguar nëse një emër ose një fjalë tjetër e barasvlershme me të është në trajtën e shquar apo të pashquar (p.sh. mali, vajza, krahu, mishtë dhe një mal, një vajzë, një krah); pjesëz që vihet përpara një emri ose një fjale tjetër të barasvlershme me të për të formuar trajtën e rasës gjinore (p.sh. pragu i derës, dritaret e shkollës, vepra të dikujt); pjesëz që hyn në ndërtimin e një tipi të pasur mbiemrash të shqipes (i kuq — e kuqe — të kuq; i përditshëm — e përditshme etj.), në ndërtimin e disa përemrave dëftorë, lidhorë, pronorë e të pakufishëm (i tillë — e tillë, të tillë; i cili — e cila — të cilët; i tij — e saj; të gjithë etj.), në ndërtimin e numërorëve rreshtorë (i parë, e dytë etj.) e të disa emrave femërorë e asnjanës (e hënë, e martë..., e bukura, e mira ..., të ngrënët, të hyrët etj.), duke u vendosur përpara temës së tyre pa u shkrirë me të. Nyjë e përparme (e prapme). Nyjë shquese (joshquese). Nyjë afrie.","let. Ngjarja e parë që shënon fillimin e vargut të ngjarjeve kryesore të subjektit në një vepër letrare. Nyja e një romani. Nyja e parë e dramës.","vjet., drejt. Neni. Nyjat e kodit.","det. Njësi matjeje e shpejtësisë për anijet, e barabartë me 1852 metra në orë. Anija bënte 13 nyja në orë. Ka shpejtësinë 20 nyja. * Nyja e dimrit palca e dimrit, kulmi i dimrit. Nyjë gordiane libr. punë a çështje shumë e vështirë për t'u zgjidhur. Iu lidh fjala nyjë (komb) dikujt shih te FJAL/Ë,~A. E lidh lekun (paranë) nyjë e kursen shumë paranë, është shumë dorështrënguar. Iu lidh (iu bë, iu mblodh) një nyjë në grykë (në fyt) iu bë një lëmsh në grykë nga një ndjenjë e fortë, nga ngashërimi, nga hidhërimi etj. Iu lidh nyjë jeta iu bë jeta e rëndë, e padurueshme nga ndonjë fatkeqësi që i ka ngjarë a nga ndonjë vështirësi që nuk e kapërcen dot. Zgjidh (pres) nyjën gordiane zgjidh një çështje të ngatërruar e të vështirë me një mënyrë të menjëhershme, të vendosur e të guximshme."]}]</script>
