<script>window.__INITIAL_DATA__ = [{"slug":"takoj","term":"TAKOJ","attributes":["kal."],"definitions":["Ndesh dikë në rrugë a në një vend tjetër; i jap dorën dikujt a përshëndet dikë kur e ndesh diku, pjek dikë që më del përpara. Takoi shokun. E takoi rastësisht.","Piqem me një mik, me një të njohur, me një të dashur etj. dhe rri me të një kohë për t'u çmallur, për të biseduar etj.; i dal përpara dikujt për ta përshëndetur, e pres si mik. Takoj shokun (shoqen). Takoj miqtë (delegatët). E takoi në mbrëmje. E takova në shtëpi.","Shkoj te dikush a thërres dikë për t'i thënë diçka, për të zgjidhur një çështje, për t'i marrë mendimin a për t'i dhënë llogari, për t'iu ankuar, për t'i kërkuar diçka etj. Takuan punëtorët (fshatarët). Takoi kryetarin (ministrin). S`e takoi dot. Shkoi për ta takuar.","Prek diçka me dorë, me këmbë a me ndonjë pjesë tjetër të trupit, arrij të prek diçka. Takoj me dorë. Takoj tokën (dyshemenë, truallin, fundin e lumit).","Puq një gjë me një gjë tjetër, afroj dy a më shumë gjëra sa të piqen njëra me tjetrën; bashkoj. Takoj anët (buzët) e dy tryezave. Takoj duart.","jokal. vet. veta III. Ndesh në diçka, prek, zë; i afrohet diçkaje aq shumë, sa përplaset, prek a zë në të. I takoi dora (koka) në mur. I takoi sharra (sqepari) në gozhdë. I takoi këmba në gur. Takon në fund të lumit.","Ndesh diçka në jetë, në punë etj., has diçka, më del përpara. Takuan ca vështirësi (ca pengesa).","vet. veta III (me një trajtë të shkurtër të përemrit vetor në r. dhanore). Më bie, më përket, është imi; lidhet me mua, ka të bëjë me mua. Pushteti i takon popullit. I takon e drejta ka të drejtë. I takon në bazë të ligjit. I takon së kaluarës. U takon burrave (grave, të rinjve, pleqve). Ç'më takojnë mua? Sa i takojnë atij? Na takon të gjithëve.","jokal. vet. veta III. Ndodh, rastis, ngjan, qëllon. Takojnë të papritura (ngjarje). Takon ndonjë herë (rrallë, shpesh). Takon dhe kështu. Takon (që) të thonë (të mendojnë, të dyshojnë).","jokal. Gjej a zbuloj diçka, më del diçka gjatë punës, gjatë studimit, gjatë kërkimit etj. Takoi në një mineral (në një thesar, në një shkrim të vjetër)."]}]</script>
