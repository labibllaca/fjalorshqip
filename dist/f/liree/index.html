<script>window.__INITIAL_DATA__ = [{"slug":"liree","term":"LIRË","attributes":["mb."],"definitions":["Që gëzon liri, që nuk është i pushtuar, i shtypur a i shfrytëzuar, që nuk është i robëruar; i pavarur; i çliruar. Popull i lirë. Vend (shtet) i lirë. Krahinë (zonë) e lirë. Qytetar i lirë. Jetë e lirë.","Që nuk është i burgosur, i internuar ose i arrestuar. Ishte i lirë.","hist. Që nuk ishte skllav a bujkrob, por kishte të drejtën e pronësisë mbi tokën, mbi mjetet e punës e mbi prodhimet, si dhe disa të drejta qytetare (në rendin skllavopronar e në atë feudal); që nuk i është nënshtruar sistemit të timareve e të çifligjeve (në vendin tonë gjatë pushtimit osman). Fshatarët e lirë dhe bujkrobërit. Fshatarësia e lirë e malësive.","Që ka të drejtën a mundësinë të veprojë sipas dëshirës së vet; që sillet a vepron në mënyrë të natyrshme, pa druajtje e pa ndonjë shtrëngim. Njeri i lirë. Është i lirë të bëjë si të dojë. E ndjen veten të lirë në skenë.","Që është i lëshuar, që nuk mbahet i lidhur ose i mbyllur, që nuk pengohet. Qentë janë të lirë. Kuajt i lanë të lirë në kullotë.","edhe fig. Që nuk kufizohet, nuk pengohet a nuk ndalohet nga dikush a nga diçka. Kalim (shteg) i lirë. Zgjedhje të lira. Gjueti e lirë. Det i lirë pjesa e detit ku anijet mund të lundrojnë lirisht si në hapësira asnjanëse. Tregti (shitje) e lirë. Bisedë e lirë. Energji e lirë. fiz. Pllenim i lirë. bot. Kryqëzim i lirë i bimëve. bot. Me sy të lirë pa përdorur mjete të tjera për të parë. Shkëmbim i lirë mendimesh. Rruga ishte e lirë. Hyrja është e lirë mund të hyjë kushdo pa pasur ftesë a biletë.","Që bëhet lehtë e pa ndonjë vështirësi; që nuk është ose nuk bëhet sipas disa rregullave a kërkesave të prera e të pandryshueshme; që mund të vendoset, të lëvizë a të ndryshojë sipas dëshirës e pa ndonjë kufizim. Frymëmarrje e lirë. Lëvizje të lira. Përkthim i lirë përkthim që nuk bëhet fjalë për fjalë sipas origjinalit. Gjuajtje e lirë. sport. gjuajtje në futboll ose në basketboll, gjatë së cilës kundërshtari nuk ka të drejtë të sulmojë a të ndërhyjë. Lojtar i lirë. sport. lojtar i vijës së mbrojtjes në lojën e futbollit, i cili nuk mbulon ndonjë lojtar të vijës së sulmit të skuadrës kundërshtare, por u vjen në ndihmë mbrojtësve të skuadrës së tij kur u ikën ndonjë sulmues për të shënuar gol. Mundje e lirë. sport. mundje, gjatë së cilës ata që ndeshen kanë të drejtë të kapin kundërshtarin në çdo pjesë të trupit, t'i përdredhin gjymtyrët etj. deri sa të mposhtet ndonjëri prej tyre. Stil i lirë. sport. stil noti në garat e shpejtësisë, kur notarët mund të notojnë në mënyra të ndryshme. Ushtrime me trup të lirë. sport. ushtrime gjimnastikore që bëhen duke lëvizur pjesët e ndryshme të trupit në mënyra e në drejtime të ndryshme. Ushtar i lirë. shah. ushtar në lojën e shahut, që nuk ka përpara në kolonën e tij ndonjë ushtar të anës kundërshtare. Togfjalësh i lirë. gjuh. Theks i lirë. gjuh. Rendi i lirë i fjalëve. gjuh. vendosja e fjalëve në fjali jo sipas një rendi të caktuar e të pandryshueshëm. Varg i lirë. let. Trup i lirë. fiz. trup që lëviz në hapësirë kur vepron një forcë mbi të. Rënia e lirë e trupit. fiz. rënia e një trupi nën veprimin e forcës tërheqëse të Tokës ose nën ndikimin e forcës së rëndesës.","edhe fig. I zbrazët, pa njeri a pa sende; që nuk është i zënë, që nuk përdoret nga ndokush e mund të shfrytëzohet nga ndokush tjetër a për diçka tjetër; që ka mbetur bosh dhe nuk është zënë ende nga dikush tjetër (për një vend pune në një institucion a ndërmarrje); kund. i zënë. Dhomë (shtëpi) e lirë. Kishte disa vende të lira në sallë. Hapësirë (fushë) e lirë. Karrige e lirë. Telefoni është i lirë. Para (mjete monetare) të lira. fin. Vend i lirë në organikë.","Që nuk është i lidhur fort; që nuk është i shtrënguar ose që nuk është i puthitur sipas trupit a pas një pjese të tij; i gjerë; kund. i shtrënguar; i ngushtë. Rrip i lirë. Lidhje e lirë. I ka këpucët (rrobat) të lira.","Që nuk është zënë me punë, me mësime ose me detyra të caktuara (për kohën); i pazënë me ndonjë punë; kund. i zënë. Koha e lirë. Ditën e kam të lirë. Nuk kanë asnjë orë të lirë. Sot jam i lirë.","spec. Që nuk lëviz pjesë të tjera të një mekanizmi; që nuk lidhet a nuk bashkohet me ndonjë pjesë tjetër. Rrotë e lirë me dhëmbëza. mek. Thekë të lira. bot. Organ i lirë. bot. organ që nuk është i ngjitur me trupin e një bime.","kim., fiz. Që nuk është në lidhje kimike me diçka tjetër; që është ndarë nga atomet duke u zhvendosur në hapësirën midis dy atomeve. Gaz (oksigjen, azot, squfur) i lirë. Elektron i lirë. fiz.","Që kushton pak, që shitet me çmim të ulët; i vogël, i ulët (për çmimin); kund. i shtrenjtë. Prodhim (mall) i lirë. Këpucë të mira e të lira.","fig. Që nuk është i kursyer, që i lëshon fjalët pa u përmbajtur; kund. i shtrënguar, i shtrenjtë. I lirë në fjalë, i shtrënguar në hesap. fj. u.","Përd. em. sipas kuptimeve 1-3, 9, 11-14. * Me duar të lira pa pasur pengesë prej ndokujt, lirisht, sipas dëshirës. I ka duart të lira (ka dorë të lirë) mund të veprojë si të dojë, nuk e pengon asgjë. Jeni i lirë! zyrt. mund të shkoni, mund të largoheni!, s'kemi më punë me ju! Në profesion të lirë që merret vetëm me punë krijuese në fushën e letërsisë e të arteve dhe nuk ka ndonjë detyrë tjetër shtetërore. Gjeti shesh (fushë) të lirë dikush nuk e pengoi askush, pati mundësi të veprojë lirisht e pa vështirësi. E ka dorën të lirë është dorëlëshuar. I la (i dha) dorë të lirë dikujt e lejoi të bënte si të donte, i la liri veprimi, i dha mundësi të veprojë lirisht. Ka hyrje të lirë diku hyn lirisht diku, nuk e pengon njeri të futet, vepron pa pasur ndonjë pengesë. I lë fushë (shesh) të lirë dikujt a diçkaje e lejon dikë që të veprojë lirisht, nuk i nxjerr pengesa; lejon që diçka të zhvillohet lirisht. E la me këmbë të lira dikë e lejoi që të vepronte si të donte pa ndonjë kufizim. I lë rrugë të lirë dikujt a diçkaje e lejon dikë a diçka që të kalojë, nuk e pengon; lejon që të zhvillohet lirisht diçka. I lirë në miell, i shtrenjtë në krunde fj. u. shih te KRUNDE,~T."]},{"slug":"liree","term":"LIRË","attributes":["ndajf."],"definitions":["Jo shtrënguar (për diçka të lidhur); pa u puthitur pas trupit ose pas një pjese të tij, gjerë, lirshëm; kund. shtrënguar; ngushtë. E lidhi lirë rripin. I rrinë rrobat (këpucët) lirë.","Jo shtrënguar, jo ngjeshur, lirshëm; kund. shtrënguar. Jemi mjaft lirë.","Pa pengesa e pa vështirësi, lirisht, lirshëm. Flet lirë. Lexonte fare lirë.","Pa njerëz a sende të tjera brenda, bosh; kund. lënë. Shtëpia ishte lirë.","Pa pasur ndonjë punë a pa shumë punë ose pa ndonjë detyrë tjetër; kund. zënë. Sot jemi lirë. Je lirë apo zënë?","Lëshuar. Qentë janë lënë lirë.","Jo shtrenjtë; me çmim të ulët; kund. shtrenjtë. E bleu lirë diçka. Kushton lirë. Të prodhojmë më shumë, më mirë e më lirë! Të ndërtojmë shpejt, mirë dhe lirë!"]}]</script>
