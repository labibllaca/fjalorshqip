<script>window.__INITIAL_DATA__ = [{"slug":"paree","term":"PARË","attributes":["m.","sh."],"definitions":["Ai që është në krye të një pune, të një veprimtarie a të një grupi njerëzish; ai që udhëheq a drejton një punë. I pari i shtëpisë (i fisit, i fshatit). I pari i valles. Kë keni të parë këtu! Ku ka shumë të parë, puna s`ecën mbarë. fj. u.","Ai që ka arritjet më të mira në një punë a që del në krye të një gare; ai që është më i zoti, më i aftë se të tjerët. I pari i klasës.","vet. sh. ~Ë, ~ËT(të). Stërgjyshërit, brezat më të vjetër. Të parët tonë. Zakonet e të parëve. Na e kanë lënë të parët.","vet. sh. ~Ë, ~ËT (të) vjet. Krerët e vendit, parësia. Të parët e vendit. * Nuk e pa i pari të dytin ikën me vrap në rrëmujë të madhe e në panik. Nuk e merr vesh (nuk e njeh) i pari të dytin është rrëmujë e madhe, s'e njeh qeni të zotin."]},{"slug":"paree","term":"PARË","attributes":["mb."],"definitions":["num. rresht. Që i përgjigjet numrit një në një varg njerëzish a sendesh, në një radhë a renditje në një klasifikim etj.; që është në krye të një radhe frymorësh, sendesh e dukurish të një lloji, që nuk ka tjetër para vetes; kund. i fundit. Radha e parë. Shtëpia (dera) e parë. Faqja e parë e librit. Tremujori (gjashtëmujori) i parë. Kati i parë. Klasa e parë. Java e parë e muajit. Dita e parë e shkollës. Veta e parë. gjuh. Lufta e Parë Botërore. Pjesa e parë e ndeshjes. Sulmi i parë. Me qitjen e parë. Gjella e parë. Plani i parë pesëvjeçar. Treni i parë. Shkolla e parë shqipe. Studiuesi i parë. Gruaja e parë. Dashuria e parë. Kur këndoi gjeli i parë. Për herë të parë.","Që vjen në krye, që del më parë nga të tjerët, që shfaqet në fillim; që i takon periudhës fillestare, i kreut, i fillimit; i hershëm. Lulet e para. Domatet e para. Dallëndyshet e para. Zogjtë e parë. Ngricat e para. Muajt e parë. Kohët e para. Periudha e parë e sëmundjes. Gjumi i parë. Rinia e parë rinia e hershme.","Që është më i rëndësishmi, që qëndron në krye të të tjerëve, që zë vendin kryesor; që është më i domosdoshmi, themelor. Sekretari i parë i Komitetit të Partisë. Kujdesi i parë... Kërkesa e parë. Qëllimi i parë... E meta e parë... Krushku i parë. etnogr. Detyrë e dorës së parë. Sende të metodës së parë.","Që është i cilësisë më të mirë ose më i mirë se çdo tjetër në llojin e vet; shumë i mirë. Raki e cilësisë së parë. Hotel i kategorisë së parë. Është verë e parë apo e dytë?","muz. Që luan pjesën kryesore, që është kryesori në ekzekutimin e një vepre muzikore. Violina e parë. Zëri i parë.","Që ka lidhje gjaku me një tjetër nga xhaxhai a halla ose nga daja a tezja, që nga lidhjet e afrisë vjen menjëherë pas vëllait ose pas motrës. Kushërinj të parë.","Që është në gjendje fillestare, që nuk është përpunuar, ndryshuar etj.; që është si në fillim, ashtu si duket, pa hyrë në thellësi, i sipërfaqshëm; që nuk ka marrë trajtën përfundimtare a të plotë, paraprak. Lënda e parë. Përshtypja e parë. Skica e parë e një ideje. Hartim me dorë të parë i temës. Në shikimin (në vështrimin, në pamjen) e parë. Nga të dhënat e para. Ndihma e parë. mjek. ndihma paraprake, ndihma e shpejtë. I është bërë vetëm përpunimi i parë.","Fillestar e i thjeshtë, elementar. Njohuritë e para. Shprehitë e para. Rregullat e para.","Që i përket një kohe shumë të vjetër, shumë i lashtë; që i përket një të kaluare të largët. Në kohët e para. Njerëzit e parë. Zakonet e para.","I mëparshëm. Nuk e ka më zellin (vullnetin) e parë. S'është më lojtari i parë. Nuk është më gjendja e parë.","Që ka moshë më të madhe se një tjetër, më i moshuar, më i rritur. Është më i parë se unë. Kush vjen më i parë nga ju?","Që është më i afërt nga koha, që do të vijë pas pak kohe. Me rastin e parë. Me automjetin e parë.","Përd. em. sipas kuptimeve të mbiemrit. Doli i pari. Erdhi e para. Jemi të parët. E pa i pari. E para nga të parat ajo që është shumë e mirë. S'është më ai i pari s'është më ai i mëparshmi ose ai që ishte në fillim, ka ndryshuar. * Me fjalën e parë shih te FJAL/Ë,~A. I orës së parë (i orëve të para) shih tek OR/Ë,~A I. Në radhë të parë para së gjithash, së pari, në vendin kryesor. Në radhët e para (në rreshtat e parë) në ballë, në krye, në vendin më të vështirë të punës a të luftës. Në vijë të parë në punën më të vështirë, në ballë. Hedh (bën) hapin e parë (hapat e parë) shih te HAP,~I","E priti me këmbët e para shih te KËMB/Ë,~A. B a r a z i m i gradës së parë mat. shih te BARAZIM,~I",""]},{"slug":"paree","term":"PARË","attributes":["mb.","krahin."],"definitions":["Çift; kund. tek. Numër parë. Parë a cup (a tek)."]},{"slug":"paree","term":"PARË","attributes":["ndajf."],"definitions":["bised. Pak kohë përpara, qëparë. Parë e pashë. Parë qe këtu.","Përpara; në një kohë para së tanishmes (zakonisht me pjesëzën «më»). Më parë shumë kohë përpara, më përpara, dikur. Sa më parë sa më shpejt që të jetë e mundur; sa më herët. E dinte një më parë. Dy vjet më parë. Më parë se gjithë të tjerët. Dëgjoje më parë, pastaj përgjigju! Më mirë se më parë. * Më parë e më dalë para së gjithash, pikësëpari. Një orë (çast, sahat) e më parë shih tek OR/Ë,~A 1."]}]</script>
