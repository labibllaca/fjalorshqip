<script>window.__INITIAL_DATA__ = [{"slug":"jam","term":"JAM","attributes":["jokal."],"definitions":["Rroj, jetoj, gjëllij. S`është më ka vdekur. Qofsh me jetë! ur. Rrofsh e qofsh! ur. Mos qoftë! mallk. Gjithë ç`jemi. Na ishte njëherë. Sot jemi, nesër s’jemi s’jemi të përjetshëm.","Ndodhem diku ose duke bërë diçka, gjendem. Jam në shtëpi (në shkollë, në punë, në mbledhje). Do të jemi te një shok do të vemi për vizitë te një shok. Është në udhëtim po udhëton. Jam në (me) shërbim. Është nën armë (në ushtri). Jemi në valën (në zjarrin) e punës. Është në përfundim e sipër. Nuk ishin të gjithë. Jemi që jemi me që ndodhemi. Jam brenda (jashtë). S`është këtu (atje). Kudo qoftë (kudo që të jetë). Ku je? Nga (ku) janë e nga (ku) s`janë të gjithë pa përjashtim. Të shohim ku jemi e ku s`jemi të shohim gjendjen, të shqyrtojmë punën etj.","Kaloj një gjendje, jetoj një gjendje të caktuar; kam një veti, një tipar, një aftësi a diçka tjetër që më vë në një gjendje të caktuar; kam arritur një gjendje të caktuar (edhe në një varg njësish frazeologjike). Është i ri (i zoti, trim). Është i gjatë (i madh, i shkurtër). Është e domosdoshme (e kuptueshme, e lehtë, e rëndë). Qofsh i lumtur (i gëzuar)! ur. Jeni i lirë! zyrt. Qenka i marrë! Sa është? Ç’moshë ka. I vetmi është. bised. është shumë i zoti, s'e ka shokun. Ishte i krimbur me para. Ishte gacë në para. A je burrë? Ishte fishek. Është lule. Jam akull. Qe nën barrë. vjet. Është gjethe plepi. Është djalli (shejtani) vetë. thjeshtligj. Është dora vetë. Është për t'i pirë dollinë. Nuk është prej guri. Është bilbil (shpatë) nga goja. Është qime e gjallë dikush. Është me gjashtë gishta. S`është nga ata burra. Është njeri pa njeri. Është i punës (i gojës, i fjalës, i pushkës, i gishtit). Jemi të mendimit se... Është me shkollë. Ka qenë me grip. Është në moshë. Qe në merak (në qejf). Është me dallgë dikush. S`është në gjendje (në rregull). Nuk është pa gjë. Është në hava. Është me vend. Jam me dysh. S`është në të (në vete). Je ndër mend?! Është jashtë botës. S`është në këtë botë (në këtë dynja). Është (ende, akoma, hala) te ura. S`është në orë të mira. Si je? Qofsh shëndoshë! ur. Gëzuar qofsh! ur. Të qofsha falë! ur. Është plot (bosh). Jam mirë (keq). Isha ngushtë. Isha krunde. Është kaluar. S`është dosido. S`është gjëkundi (asgjëkund). Është në pelena dikush. Ishte për tokë. Është për lumë. Është mbi ujë. Është (njeri) me vulë. Ishte me litar në grykë. Është në buzë të greminës (të humnerës). Ishte në ditë të hallit (për t`i qarë hallin). Është portë pazari. Është në shtratin e vdekjes. Është si grosha shtatë javë. Është me një këmbë në varr. Ishte në teh (në presë) të briskut (të shpatës, të thikës).","I përkas dikujt, kam lidhje farefisnie ose lidhje të tjera me të, kam të bëj me të. Është yni. Është i biri (e bija, e ëma). Është djali i Arbenit. Janë vëlla e motër (kushërinj, burrë e grua). Janë farefis. Janë bashkëfshatarë (bashkatdhetarë). Janë të një gjaku. Janë shokë (miq) të vjetër. Jam i popullit (i Atdheut) tim.","vet. veta III. I përket dikujt a diçkaje, është pronë e dikujt a pjesë e diçkaje; lidhet ngushtë me të, i takon. Libri është imi. Kjo është për ty. Është e të gjithëve. S`është e askujt. Kjo derë është e dhomës së gjumit. Kjo burmë është e sahatit. Kjo fushë është e kooperativës. Ato kodra janë të rrethit të Durrësit. Këto banesa janë të lagjes sonë.","E kam prejardhjen, vij, rrjedh. Jemi nga një fshat. Është nga një familje patriotësh. Është nga malësia (nga Elbasani, nga rrethi i Lezhës). Ishte nga ata të malit. Ishte nga një shtresë e varfër. Nga je?","Më duhet të bëj diçka, kam për të bërë diçka; kam prirjen për të bërë diçka, kam dëshirë për të, e pranoj a e pëlqej. Jam për rrugë. Jam për t`u nisur. Jam për ta vendosur nesër. S'jam me këtë zgjidhje. S`është për punë. Jam në anën e tij e përkrah atë. Jam me ty pajtohem me ty dhe të përkrah.","vet. sh. Bëhemi (si numër, si sasi). Ishin shumë (pak, mizëri, mizë lisi). Sa ishin? Ishin pesë vetë.","vet. veta III. Ndodh, ngjan, bëhet; fillon. Nesër janë zgjedhjet. Kur është mbledhja (ndeshja, shfaqja)?","vet. veta III. Ka. Janë ca punë që s`i lë dot. Janë ca njerëz që... Janë shumë (mjaft, boll).","vet. veta III. Duhet, do (me një folje në paskajore). Është për të vënë re. Është për të thënë. Është për të vënë në dukje. Janë për t`u lavdëruar. Është për të ardhur keq. Ishte për t`u bërë do të bëhej patjetër.","Përdoret me folje në përcjellore dhe së bashku me të jep gjendjen ose vijimin e një veprimi. Është duke punuar po punon. Isha duke mësuar po mësoja.","Përdoret si folje ndihmëse për të ndërtuar kohët e përbëra të foljeve pësore dhe vetvetore. Jam rruar. Është ftohur. I janë përveshur punës. Ishte mësuar. Qe mbyllur brenda. Si qenka bërë! * Duke qenë (që) për arsye..., meqenëse... Në qoftë se..., në është se..., po qe se..., po të jetë se .... (që...), me kusht që..., sikur ... Qoftë..., qoftë... edhe... edhe, si... ashtu dhe. Sido që të jetë sidoqoftë. Ç’paske qenë! iron., mospërf. s'i gjendet shoku!, i vetmi qenka!, s'e paskam njohur! Të qoftë! merre!, e mbajtsh me shëndet!, e gëzofsh! (edhe iron.). Ç’është e vërteta (e drejta) fj. ndërm. shih te VËRTET/Ë,~A (e). Për se është çështja? shih te ÇËSHTJ/E,~A. Është (ndahet) në shenjë shih te SHENJ/Ë~A. S'është e thënë... (që...) shih tek THËN/Ë,~A (e). Është (më duket) e udhës shih te UDH/Ë,~A. Jemi (qëndrojmë) bllok shih te BLLOK, ~U. Janë të një çanaku keq. shih te ÇANAK,~U. S’është për gjë s'di të bëjë asgjë, s'është i aftë as edhe për një gjë. Jemi (rrimë, banojmë) nën një kulm shih te KULM,~I. Janë shenjat që... shih te SHENJ/Ë,~A. Lipsur qoftë! shih te LIPSEM. Sa për të qenë brenda shih te BRENDA. Qoftë edhe një thua shih tek THUA, THOI. Jemi paq me njëri-tjetrin shih te PAQ. Nuk është punë (që bëhet) shih te PUN/Ë,~A. Është (bëhet) bark e shpinë me dikë shih te BARK,~U. Është (e ka, shkon) gjalpë e vaj me dikë shih te GJALP/Ë,~I. Janë gur e uror shih te GUR,~I. Është me këmbë në yzengji dikush shih tek YZENGJI,~A. E kam (jemi) lakra (presh) në kopsht dikë (me dikë) shih te LAK/ËR,~RA. Janë pe për një gëzof shih te GËZOF,~I. Është për të lëpirë gishtat shih te LËPIJ. Ishte me pushkë në faqe shih te PUSHK/Ë,~A. Janë (shkojnë) thikë e brisk (brisk e thua) shih te THIK/Ë, ~A. Janë në thikë e në pikë shih te THIK/Ë,~A. Është thikë me dy presa (tehe) shih te PRES/Ë,~A. Kjo është ç'është kjo është më e mira (më e bukura, më e çuditshmja etj.) nga gjithë sa kemi parë, sa kemi provuar e sa kemi dëgjuar. Them atë që është them të vërtetën, them atë që ka ndodhur në të vërtetë. Udhë e mbarë (i qoftë)! iron. shih tek UDH/Ë,~A. S'është cjap për atë zile shih te ZIL/E,~JA. Qe si qe u bë si ka shak. shih te KA,~U. Kudo oka katërqind dërhemë është shih tek OK/Ë,~A. Tymi të shkojë drejt, pa le të jetë oxhaku i shtrembër! fj. u. shih tek TYM,~I."]}]</script>
