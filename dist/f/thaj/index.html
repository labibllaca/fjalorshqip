<script>window.__INITIAL_DATA__ = [{"slug":"thaj","term":"THAJ","attributes":["kal."],"definitions":["I heq diçkaje ujin ose lagështinë që ka brenda a në sipërfaqe, bëj t'i avullojë a t’i ikë lagështia; kund. njom. Thaj rrobat në diell (me hekur). Thaj duart pranë zjarrit. E thau vapa (era). Thaj flokët me peshqir. Thaj bojën me hi.","I heq ujin që ka, e kulloj; e bëj të shterë (një burim etj.). E thanë kanalin (hendekun). I thanë kënetat (moçalet). I than tokat. Vapa i thanë burimet.","I heq njomështinë a lëngun nga fryti, një bime barishtore, një lloji perimesh, një ushqimi etj. për ta ruajtur e për ta përdorur për një kohë të gjatë; e pjek shumë diçka që të prishet; e bëj të humbas butësinë, e bëj të thatë, e përthaj. Thanë misrin (grurin, petët, domatet, specat, qepët, hudhrat) në diell. Barin e njomë e thajnë. Thaj fiqtë (kumbullat, rrushin, duhanin). Thaj mishin në tym. Thaj peshkun. Ia thau plagën.","bised. edhe shak. a iron. Nuk i lë asnjë pikë, e shteroj deri në fund; e pi ose e ha, të gjithë, e zbraz krejt; i marr çdo gjë që ka, s'i lë asgjë. E thau lopën kur e moli. Qengji e thau delen (kur piu). Macja e thau qumështin. E thau gotën të gjithë. Thau një shishe të tërë. E thau me dy gllënjka. E thau pjatën (gjellën). Ia thau qypin (e mjaltit, e gjalpit). Ia thau hambarin. Ia thau shtëpinë. Ia thau xhepin (paratë). Ai të than.","vet. veta III. E kthen në diçka pa jetë, që nuk ushqehet me gjak e nuk punon (për pjesët e trupit); e prish, e bën të mos jetojë, të mos prodhojë etj. (për bimët, për pemët e për pjesë të tyre). I thau krahun sëmundja. Ia thau gjethet vapa (vrugu). I thau, degët (rrënjët). I thau portokajtë (bajamet) ngrica.","E dëboj shumë, e tret, e holloj, bëj kockë e lëkurë. E ka tharë sëmundja.","edhe jokal. Kam shumë ftohtë, mërdhij shumë; vet. veta III. Më ngrin më bën të kem shumë ftohtë; ma ftoh shumë, ma mpin. Thava së ftohti. Thau si qeni. Më thau era (acari). Më thau duart. Të thante gjer në palcë.","fig. bised. E njoh diçka shumë mirë, e di me rrënjë (edhe iron.). E than gjuhën (matematikën, frëngjishten). E ka tharë fare mësimin. Të than për punë. Të than në teori e në praktikë. Ama ç'e paske tharë! iron. (kur dikush nuk e ka mësuar fare një mësim a e ka bërë keq një punë). * Thau barkun (gojën) ndenji pa ngrënë, e la barkun bosh; kurseu shumë në të ngrënë. Ia thau barkun (gojën) s'i dha gjë të hante, e la pa ngrënë. I thau derën ia zhduku të gjithë njerëzit e familjes a fëmijët, e la pa njeri, e la shkretë, ia mbylli derën, ia shoi pragun. I thau (i preu, i shkurtoi) duart (dorën, krahët) shih te DORË,~A. I thau kupën e la në varfëri, e varfëroi, ia la shtëpinë trokë. Të than kupën është shumë i shkathët, ta rrëmben kafshatën nga goja. Ia thau lugën dikujt ia hoqi bukën e gojës; e la pa gjë fare. Ia thau prehrin i vdiq, i iku përgjithnjë, e la të shkretë. Të than (të qan) qoshen shih te QAJ. Na thave sytë na ka marrë shumë malli për ty, se ka kohë që s'të kemi parë. Ia thau trutë dikujt ia lodhi aq shumë mendjen një punë sa s’është më në gjendje të merret me një veprimtari krijuese a të kuptojë mirë diçka, sa s'i hyn më gjë në kokë. I thau vatrën nuk i bëri fëmijë, i la shtëpinë mbyllur (për gruan). Ia thau zemrën dikujt a) e helmoi, e lëndoi rëndë (vdekja ose vrasja e një njeriu shumë të shushur); b) e la të vetëm e të shkretë, ia mori e ia zhduku të gjithë të afërmit; i vrau edhe djalin e vetëm. Rri duke tharë trahan dikush shih tek TRAHAN,~I. Luga mbush barkun, piruni than gurmazin fj.u. shih te LUG/Ë,~A."]}]</script>
