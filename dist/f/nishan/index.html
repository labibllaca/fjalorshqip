<script>window.__INITIAL_DATA__ = [{"slug":"nishan","term":"NISHAN","attributes":["m.","sh.","bised."],"definitions":["Shenja që përpiqemi ta godasim kur shtiem. Vë nishan. Qëlloi në nishan. Ka nishan është i zoti për të qëlluar, qëllon mirë në shenjë. E vuri në nishan i drejtoi armën për ta qëlluar. Mori nishan shënoi; përcaktoi vijën më të mirë për të goditur diçka. Një nishan pushke (dyfeku) largësi aq sa e rrok plumbi.","Njollë e vogël a kokërr me ngjyrë të errët në lëkurën e fytyrës ose të trupit, të cilën e ka njeriu prej lindjes; mbresë që mbetet nga një sëmundje ose nga një plagë; qukë. Nishan me qime. Ka një nishan të zi në mjekër. I la lia nishane në fytyrë.","etnogr. Unazat e dhuratat e tjera që shkëmbehen në fejesë, shenjë. Shkëmbimi i nishaneve. I dërgoi nishanet. Ktheu nishanin prishi fejesën.","Shenjë për të dalluar diçka nga një tjetër. Nishan dallues. I bëri një nishan. I vuri nishan. S'ka ndonjë nishan. Nishanet e mishit pjesët më të mira të një mishi të therur, që u jepen miqve më të shquar në një gosti.","vet. sh. Shenja paralajmëruese. Nishane të mira (të këqija). Siç duken nishanet...","vjet. Dekoratë. Nishan ari. E kishte gjoksin tërë nishane. Nuk i pranonin nishanet e sulltanit.","përd. mb. Që shquhet për bukuri, për sjellje të mirë, për zgjuarsi etj.; i shquar. Është një djalë (vajzë) nishan. Nishan ndër shokë (shoqe). * Me nishan i shquar; i shënuar. (Zhduk, prish, humbas) pa nishan pa lënë asnjë gjurmë, krejt, fare. U humbi (s'u gjendet) nishani nuk ka mbetur asnjë, nuk ka mbetur as edhe një i vetëm. Pa çikë e pa nishan shih te ÇIK/Ë,~A I. Pa nam e pa nishan (as nam, as nishan) shih te NAM,~I. E ka vënë në nishan (në shenjë) dikë shih te SHENJ/Ë,~A. Nuk i gjendet as nami as nishani shih te NAM,~I."]}]</script>
