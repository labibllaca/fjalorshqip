<script>window.__INITIAL_DATA__ = [{"slug":"shpie","term":"SHPIE","attributes":["kal."],"definitions":["Marr dikë me vete dhe e përcjell deri në një vend ose deri te dikush, çoj; e nis dikë që të shkojë diku për një qëllim të caktuar a për të ndenjur atje për njëfarë kohe, dërgoj; kund. sjell; bie. I shpuri fëmijët në fshat. E shpien djalin në kopsht. I shpuri nxënësit në muze. I shpuri lopët në kullotë. E shpuri larg.","Mbart një send deri në një vend ose deri te dikush për ta lënë atje; lëviz diçka deri në një cak; drejtoj një mjet transporti deri në një pikë; nis me një mjet ose me një mënyrë tjetër deri në një vend ose deri te dikush, çoj, dërgoj, kund. sjell; bie. I shpuri drutë. I shpuri kafenë. I shpuri një letër (një telegram). Shpjeri të hajë! Ia shpuri të zotit. E shpuri dorën te flokët (në ballë, në brez). E shpuri karrocën (makinën) mu te dera. E shpuri lundrën në breg. E shpuri me kamion (me qerre, me kalë). Ku do ta kenë shpënë? Ia shpuri në shtëpi. Shpjer gojën te buka e jo bukën te goja! fj. u. përpiqu, luaj këmbë e duar që të sigurosh atë që të duhet.","Ia bëj të njohur dikujt, e vë në dijeni për diçka, e njoftoj nga larg. U shpuri një lajm të mirë. U shpinin masave zërin e Partisë.","vet. veta III. Lë të kalojë nëpër të në një drejtim të caktuar, çon. Kanali e shpie ujin deri në fushë. Qypi e shpie lëngun në enë. Teli e shpie rrymën te llamba.","vet. veta III. Të drejton në një vend të caktuar, të çon, të nxjerr. Ku të shpie kjo rrugë? Shtegu të shpinte në një luginë.","fig. Udhëheq në një drejtim; ndihmoj që të zhvillohet, të përparojë, të ecë, çoj. Na shpie drejt fitores. Shpiem përpara revolucionin (prodhimin).","edhe fig. Bëj që të arrijë në një përfundim të mirë ose të keq, e çoj në një gjendje të caktuar; vet. veta III ka si rrjedhim a si pasojë; çon. I shpuri në përfundime të drejta. E shpuri në buzë të greminës. Në ç`gjendje e paskan shpënë! Ja ku të shpie mendjemadhësia (kokëfortësia, pakujdesia)!","E ngre a e ul deri në një cak ose deri në një shkallë; zmadhoj a zvogëloj deri në një numër; e bëj të arrijë një madhësi a një tregues të caktuar; çoj. E shpuri në fund (në majë, në kulm). E shpuri në zero. E shpure lart, ule ca! E shpuri në njëqind numrin e pikëve.","fig. Drejtoj, përqendroj, çoj, hedh. Shpie sytë (vështrimin). E shpie mendjen diku a te dikush.","vet. veta III. Më bën të shkoj diku, më detyron të vete, më çon. Nuk më shpie puna. E shpuri nevoja (halli,e keqja).","Shkoj kohën; kaloj jetën, jetoj në një mënyrë të caktuar, rroj; kam këto ose ato përfundime në një punë a në një veprimtari, vete, shkoj; çoj. Si ia shpini këtej? Si ia shpie me shëndet? Si ia shpini me perime? Si ia shpini me dimrin? Ia shpunë me këngë e me valle gjer ndaj të gdhirë. Ia shpie mirë (keq).","bised. E vijoj a e zgjat diçka për njëfarë kohe, merrem me diçka deri në njëfarë kohe. E shpuri gjatë e zgjati shumë. Mos e shpjer më tej! Gjer me sa ke ndër mend ta shpiesh sot? * E shpunë (e çuan) dardhë shih te DARDH/Ë,~A. Hedh (shpie) dëm diçka shih te HEDH. E shpuri (e çoi) fjalën për dikë a për diçka e zuri në gojë dikë a diçka, foli, e hodhi fjalën për dikë a për diçka. Nuk e shpie (s'e çon) më gjatë shih te GJATË. Ku të shpie (të çon)mushka! shih te MUSHK/Ë,~A. E shpie (e çoj) në vend (një fjalë, një urdhër, një porosi etj.) shih te VEND,~I. Shkonte nga (ku) e shpinin këmbët shih te KËMB/Ë,~A. Ia shpuri gojën te veshi shih te GOJ/Ë,~A. Shpie (bëj, vë) buzën në gaz qesh pak, buzëqesh. Shpie (çon) ujë në mullirin e dikujt shih tek UJ/Ë,~I. Shpie buzën vesh më vesh shih te VESH,~I. Të shpie (të hedh, të çon) degë më degë shih te DEG/Ë,~A. Të shpie (të çon) në njëqind (në dyzet) çezma (në krua, në shtatë kroje) e s'të jep ujë shih te KRUA, KROI."]}]</script>
