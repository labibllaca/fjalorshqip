<script>window.__INITIAL_DATA__ = [{"slug":"jonee","term":"JONË","attributes":["pron."],"definitions":["(gjin. dhan., rrjedh. SONË; kallëz. TONË) sh. TONA (kur prona shënohet nga një emër i gjinisë femërore). 1. Që na përket neve, pronari i së cilës jemi ne, që e kemi ne. Shtëpia (dhoma, toka) jonë. Familjes sonë. Në tokën tonë.","Që ka të bëjë me ne, që ka lidhje të ngushta, lidhje gjaku, lidhje farefisnie a ndonjë lidhje tjetër me ne (edhe kur i drejtohemi dikujt me dashuri). Nëna (gjyshja, vajza, motra, kushërira) jonë. Shoqja (mikja, fqinja) jonë. Mësuesja (drejtoresha) jonë. E dashura nëna jonë!","Së cilës i përkasim edhe ne, pjesëtarë a anëtarë të së cilës jemi edhe ne, në të cilën bëjmë pjesë edhe ne; që i përket vendit tonë; që e drejtojmë ne, në krye të së cilës jemi ne. Rruga (klasa, lagjja, ndërmarrja, fabrika, uzina) jonë. Brigada (çeta) jonë. Koha jonë. Shkolla jonë e re. Letërsia (shkenca) jonë.","Që është përgatitur a është hartuar nga ne, që e kemi bërë ne, që del a krijohet së pari nga ne; që merret a që prodhohet në vendin tonë; që e ushtrojmë ne. Vepra (fjala, ideja) jonë. Puna (mjeshtëria, detyra) jonë. Giza (nafta) jonë.","Që e kemi ne, që është te ne; që na dallon ne, që na përket neve, që na karakterizon ne; që lidhet me ne, që është a që bëhet për ne. Sjellja (zotësia, aftësia) jonë. Bindjet tona. Me forcat tona. Dëshirat tona. Rinia jonë. Fejesa (martesa, dasma) jonë. Lufta jonë. Për të mirën tonë.","Që na pëlqen më shumë, që e duam më shumë se të tjerët. Kënga (loja) jonë. Gjella jonë më e mirë.","përd. em. JONA sh. TONA. Një e afërt, me të cilën kemi lidhje gjaku, lidhje farefisnie ose lidhje të ngushta miqësie; ajo, me të cilën na bashkojnë të njëjtat synime, pikëpamje etj.; ajo, të cilën e duam dhe së cilës i besojmë shumë. Një jona. Një nga tonat. Është jona. Fituan tonat.","përd. em. sipas kuptimeve 1-6 të përemrit pronor. * E bëmë tonën bëmë gjithçka sa mundëm ne, e bëmë atë që na takonte neve. Në kohën tonë a) kur ishim ne të rinj; b) kur punët i kishim në dorë ne, kur ishim ne në krye të punëve etj. Është dora jonë shih te DORË, ~A. Erdhi dita jonë erdhi koha a çasti kur mund të vëmë në jetë dëshirat e qëllimet që kemi pasur; erdhi dita për ne."]}]</script>
