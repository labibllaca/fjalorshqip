<script>window.__INITIAL_DATA__ = [{"slug":"hesap","term":"HESAP","attributes":["m.","sh.","bised."],"definitions":["Llogari. Hesape të vjetra. Hesapi i shtëpisë. Mban (bën) hesapin. Nuk i doli hesapi.","thjeshtligj. Përdoret pas një emri për të shprehur mospërfillje ose përçmim për dikë a për diçka. Budalla (kalama) hesapi. Kungull hesapi. Rrëmujë (gjullurdi) hesapi. * Pa hesap shumë. Një hesap (është) njëlloj është. Për hesapin tim ... sipas mendjes sime..., për mua... Për hesap të tjetrit për interes të tjetrit. Nuk i dilte hesapi shih te DAL. Nuk i jep hesap askujt bën si mendon a si do vetë dhe nuk përgjigjet përpara askujt, vetë shkruan vetë vulos. Tjetër hesap ai është punë (çështje) tjetër ajo. Tjetër hesap (ky)! tjetër avaz ky, na nxjerr të tjera yçkla. Shkurt hesapi fj. ndërm. shih te SHKURT. Sa s'bëhet hesap (sa më s'bëhet) aq shumë sa s'llogaritet dot, pa hesap. Bëj hesap sa merre me mend sa ... përfytyro sa ... I hyri në hesap dikujt a) është përzier në punët e dikujt; b) mori, përvetësoi diçka që i takonte një tjetri, përfitoi në kurriz të një tjetri. Nuk hyn në hesap dikush a diçka nuk llogaritet fare, s'vlen. Ka hesap diçka ia vlen, ka leverdi. I kërkoi hesap për diçka kërkoi të përgjigjet, të japë llogari për një detyrë që i ka ngarkuar, për një çështje etj. I lau (i qëroi) hesapet me dikë shih te LAJ","I ndau (i qëroi) hesapet (llogaritë, lakrat) me dikë shih te NDAJ. I ndreqi hesapet me dikë shih te NDREQ. S'e vë (fare) në hesap dikë a diçka nuk e përfill fare, nuk e merr parasysh, nuk e llogarit; e nënvlerëson, e përçmon. I vjen pas hesapit (për hesap) i leverdis, i intereson. Nuk zihet në hesap nuk vlen diçka, nuk llogaritet fare. I ka bërë hesapet (llogaritë) pa hanxhiun shih te HANXHI,~U. I bën hesapet kaluar shih te KALUAR","S'më hyn gjë në hesap (në qese) shih te QES/E,~JA. Hesapi i shtëpisë nuk del në pazar fj. u. a) njeriut nuk i del gjithnjë ashtu siç e ka menduar më parë; b) thuhet edhe për të theksuar se çështjet e brendshme të familjes
