<script>window.__INITIAL_DATA__ = [{"slug":"butee","term":"BUTË","attributes":["as."],"definitions":["Të qenët i butë nga sjelljet, nga karakteri etj., butësi. Me të butë me të mirë, pa u grindur, pa u acaruar. Flas (sillem) me të butë. Qortoj me të butë. E marr me të butë. Ia hëngri shpirtin me të butë.","Të qenët i butë (për kohën, për motin etj.); butësi. Për së buti kur koha është e butë e me lagështi. Në të butë rrushi zë pajagë."]},{"slug":"butee","term":"BUTË","attributes":["f.","sh."],"definitions":["Bula e veshit. Shpoi butat për vathë."]},{"slug":"butee","term":"BUTË","attributes":["mb."],"definitions":["Që nuk të vret e nuk të gërvisht kur e prek, që nuk është i ashpër në sipërfaqe, që të lë ndjesi të këndshme në të prekur; që shtypet lehtë kur e prekim, që është si brumë; që përkulet a përpunohet lehtë (për metalet etj.); kund. i ashpër; i fortë. Lesh (stof) i butë. Flokë të butë. Dyshek i butë. Sustë e butë. Duar të buta. Lëkurë e butë. Miell i butë miell i bluar hollë. Dëborë e butë. Baltë e butë. Tokë e butë. Dhera të buta. Bukë e butë. Djathë i butë. Metale të buta. Tel i butë. Laps i butë. I butë si pambuk (si dyllë, si push). E bëj të butë. Lima e butë të ha trutë. fj.u.","Që nuk të vret veshin a syrin, që është i ulët, i shtruar e i ëmbël, që të pëlqen ta shohësh a ta dëgjosh; kund. I ashpër; i fortë. Dritë e butë. Ngjyrë e butë. Zë (tingull) i butë. Fjalë e butë.","fig. Që preket shpejt, që ndikohet lehtë (për karakterin e njeriut, për sjelljen etj.); që është i urtë, i dashur, i shtruar e i afruar me të tjerët (për njerëzit e për kafshët); që shpreh dhembshuri e shpirtmirësi; kund. i egër; i ashpër; i vrazhdë. Njeri (prind, tip) i butë. Qengj (qen, kalë) i butë. Fytyrë e butë. Me zemër (me shpirt) të butë. U bë (u tregua) i butë.","Që shpreh butësi, që s'është i ashpër; dashamirës; kund. i ashpër; i rëndë. Qëndrim i butë. Sjellje e butë. Qortim (dënim) i butë. Kritikë e butë.","Që s’ka pjerrësi a lartësi të madhe, që ka sipërfaqe jo shumë të thyer; që nuk ka male, fushor; kund. i thyer; i ashpër. Vende të buta. Kodër e butë. E përpjetë (e tatëpjetë) e butë. Shpat i butë.","Që është zbutur, që mbahet e rritet nga njeriu në shtëpi a në kushte të tjera të përshtatshme për t’i shërbyer atij; kund. i egër. Kafshët e buta. Derr i butë. Lepur i butë. Pëllumb i butë. Bletë e butë. Mollë (dardhë, kumbull) e butë. Ulli i butë. Gështenjë e butë. Man i butë.","I ngrohtë, i mirë, që s'ka të ftohtë (për kohën, për klimën etj.); kund. i ashpër; i ftohtë. Mot i butë. Kohë (klimë) e butë. Dimër i butë. Stinë e butë. Ditë (mbrëmje) e butë. Net të buta. Vende të buta.","I një grade të ulët, që s’të djeg fytin, jo i fortë (për pijet alkoolike, për duhanin etj.); kund. i fortë. Raki (verë) e butë. Uthull e butë. Duhan i butë.","Që është i imët dhe që bie shtruar e pa zhurmë (për shiun). Shi i butë.","Që është i lagur pak, i patharë mirë. Fanella ishte e butë s'ishte tharë mirë. Duajt ishin të butë nga vesa.","tek. Që bëhet pa u përplasur, pa u goditur me forcë, që bëhet lehtë e ngadalë (për uljen e anijeve kozmike në Hënë a në një planet tjetër). Ulje e butë (në Hënë etj.). * Lahutë (këngë) e butë muz. këngë lirike. Kalbëzim i butë kalbëzim i ngadaltë i pjesëve të bimëve, të cilat marrin një ngjyrë kafe. Me gjak të butë a) i urtë e i shtruar, gjakbutë; b) shtruar, pa u nxehur e pa u acaruar, me të urtë. Është ethe e butë të dëmton pa u dukur e pa u ndier, është thëngjill i mbuluar. Ka gjetur pelena të buta shih te PELEN/Ë,~A. Ia bëri kurrizin (shpinën) më të butë se barkun keq. shih te KURRIZ,~I. Ferrë e butë bot. shih te FERR/Ë,~A. Kulpër e butë bot. sumbullare. Qiellza e butë anat. shih te QIELLZ/Ë,~A 1. Ujë i butë (i lehtë) shih tek UJ/Ë,~I 1."]},{"slug":"butee","term":"BUTË","attributes":["ndajf."],"definitions":["Pa e vrarë e pa e gërvishtur, ngadalë e lehtë; ëmbël, si me përkëdheli, pa e përplasur me forcë; pa kundërveprim të fortë, si në gjë të butë; lehtë e pa u thyer; kund. ashpër; fort. Prek (fërkoj) butë. Godit (qëlloj) butë. Bie butë (dëbora). Shkruan butë (lapsi). E bluan butë (miellin). Shkel butë (në baltë) shkel në të butë. Bie butë bie në të butë (në krevat a në dyshek të butë).","Pa të vrarë veshin a syrin, duke dhënë një ndjesi të këndshme; me të mirë, ëmbël, këndshëm; pak, jo rëndë; kund. ashpër; fort. Tingëllon butë. Flas (pyes) butë. Qorton (kritikon) butë. Urtë e butë.","Në mënyrë jo shumë të pjerrët, jo thikë, jo menjëherë; pak e nga pak, jo ashpër. Ngrihet butë (një kodër). Merr (ngjitet, zbret) butë (një e pjerrët, një shpat etj.).","Ngrohtë, pa të ftohtë (për dimrin); pa thatësira (për verën); kund. ashpër; ftohtë. Bën (mban) butë. * Bie butë jam mirë, bie në rehati."]}]</script>
