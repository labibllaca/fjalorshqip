<script>window.__INITIAL_DATA__ = [{"slug":"kuti","term":"KUTI","attributes":["f.","sh."],"definitions":["Arkë shumë e vogël prej druri, prej kartoni, prej metali a prej ndonjë lënde tjetër, në trajta të ndryshme e zakonisht me kapak, e cila shërben për të mbajtur sende të ndryshme. Kuti e rrumbullakët (katërkëndëshe). Kuti e madhe (e vogël). Kuti druri (metali, sermi). Kuti duhani. Kuti cigaresh. Kutia e lugëve farashkë. Kuti pudre. Kuti sheqeri (kafeje, kripe). Kuti boje (bojërash). Kutia e postës arkëz e metaltë, me dy të çara anash, ku hidhen letrat ose kartolinat që dërgohen me postë. Kutia e votimit arkëz druri e mbyllur mirë, me një të çarë përsipër, ku zgjedhësit hedhin votat. Kutia e ndihmës së shpejtë. Kapaku i kutisë. Hap (mbyll) kutinë. E futi në kuti. E nxjerr nga kutia. E ka gojën si kuti e ka gojën të vogël e të bukur.","Enë e metaltë, e mbyllur mirë, ku ruhen ushqime të gatshme që të mos prishen për një kohë të gjatë. Kuti mishi (peshku, qumështi). Hapi kutinë. Bleu pesë kuti qumësht.","Katror i vizatuar ose i gdhendur në fletore, në rrobë, në dërrasë etj. Fletore me kuti. Bluzë me kuti. Derë (tavan) me kuti. Shkruaj në kuti. * I mbyllur në kuti keq. i veçuar nga të tjerët, i ndarë (për njerëzit që nuk përzihen me të tjerët e shikojnë vetëm punën e tyre). Kutia e shpejtësisë tek. mekanizëm i përbërë prej disa rrotash të dhëmbëzuara, që shërben për ndryshimin e shpejtësisë ose të lëvizjes në automobilat, në traktorët etj."]}]</script>
