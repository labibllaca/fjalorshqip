<script>window.__INITIAL_DATA__ = [{"slug":"mbush","term":"MBUSH","attributes":["kal."],"definitions":["Shtie një lëng a një lëndë çfarëdo brenda në një enë ose në diçka tjetër të zbrazët a të thelluar aq sa mund të nxërë e të rrafshohet; e zë a e mbuloj krejt me diçka një vend të zbrazët a një hapësirë; kund. zbraz. Mbush plot (buzë më buzë). Mbush gotën me ujë. Mbush shishen me verë (me raki). Mbush kovën. Mbush pjatën (tasin) me gjellë. Mbush thesin me miell. Mbush trastën (torbën) me bukë. Mbush koshin (shportën) me rrush (me mollë). Mbush jastëkët (dyshekun) me lesh (me pambuk). Mbush hambarin (depon) me drithë (me grurë). Mbush kasollen me bar (me kashtë). Mbush mushkëritë me frymë. E mbushën gropën me gurë (me dhe). Lumi e mbushi bregun me zhavorr. Mbushi xhepat me mollë. Mbush çibukun me duhan.","Shkoj e marr ujë me një enë në burim, në çezmë, në pus etj. Mbush ujë në çezmë (në burim, në pus).","Mbyll një vrimë, një të çarë etj. duke i shtënë diçka në gjithë hapësirën e saj, e zë me diçka; shtupoj. I mbushën vrimat (të çarat) e murit. I mbushi plasat me shtupë. Mbush dhëmbin (dhëmballën) zë me një lëndë të posaçme vrimën e dhëmbit a të dhëmballës së prishur.","Shtie barut, predhë a fishekë në një armë dhe e bëj gati për qitje; kund. zbraz. Mbush pushkën (revolen, topin). Mbush çiften.","Shtoj shumë numrin e njerëzve në një vend, e bëj të plotë; e plotësoj; e zë me njerëz të gjithë një hapësirë. Mbushnin sheshin (shkallët, sallën, stadiumin). Na mbushën shtëpinë nipërit e mbesat. Mbushën radhët e ushtrisë (e klasës punëtore).","edhe fig. E bëj të plotë diçka që është e mangët, plotësoj atë që mungon ose që nuk është bërë. Mbush numrin e kërkuar. Mbush sasinë e nevojshme. Mbush orët e caktuara. Mbush programin. Mbush zbrazëtitë në dijet e mia.","vet. veta III. Ia zmadhon vëllimin e vet, e bën të plotë, të fryrë etj. Qershia i mbushi kokrrat. Gruri e mbushi kallirin. Ia mbushi faqet e shëndoshi, ia bëri të plota faqet.","Prashit për herë të dytë një bimë duke afruar dheun pranë rrënjës, mbath, përdhej. Mbushin misrin.","Plotësoj me të gjitha të dhënat e duhura një formular, një fletanketë etj.; shkruaj një faqe të tërë të një flete a gjithë fletët e një fletoreje, të një blloku etj.; plotësoj me shkrime një gazetë, revistë etj. E mbushi fletën (bllokun) me shënime. I mbushin fletoret me detyra. Mbush një formular (regjistrat, një fletanketë). I ka mbushur shtyllat e gazetës me lajme e me fotografi.","I jap dikujt një gjë me shumicë aq sa të ngopet ose të mos ketë më nevojë për të; e plotësoj diçka me çdo gjë të nevojshme, e pajis me të gjitha sa duhen; vë a shtoj diçka me tepri, e kaloj masën; ngop (edhe fig.). E mbushi me ushqime (me të gjitha të mirat). E mbushi me dhurata. E mbushi shtëpinë a) solli në shtëpi shumë ushqime, orendi etj.; b) me ardhjen e tij (e saj) duket sikur shtëpia është plot me njerëz (thuhet kur vjen në familje një anëtar i saj a një i afërm shumë i rëndësishëm, shumë i zoti e veprues a shumë i dashur). E ka mbushur tregimin me fjalë të huaja (me fjali të gjata). E mbushi me llafe (me gënjeshtra).","fig. I ngjall dikujt një ndjenjë të fortë (kënaqësie, gëzimi, urrejtjeje etj.), e bëj të pushtohet i tëri nga një ndjenjë. Na mbush me gëzim (me hare, me besim, me optimizëm). Na mbushën (zemrat) me urrejtje.","fig. keq. I flas vazhdimisht dikujt dhe e nxit kundër një tjetri, e fryj kundër dikujt. E mbushi me fjalë. E mbushi kundër shokut. Kush e kishte mbushur ashtu! E kishin mbushur të tjerët.","Plotësoj një kohë a një afat të caktuar; arrij një moshë të caktuar. Mbushi javën (muajin, vitin) që ka ardhur. Mbushi dy vjet që ka vdekur. Mbushi njëzet vjet. Mbushi moshën për martesë. Në mars mbush vitin.","fig. bised. Përmbush një kërkesë, një detyrë etj., plotësoj. E mbushi qëllimin. E mbushi detyrën (dëshirën). I mbush kushtet (kërkesat).","jokal., bised. (me trajtat e shkurtra të përemrit vetor në r. dhanore e kallëzore). Iki me vrap, vrapoj me të gjitha forcat, ua mbath këmbëve. Ia mbushi për në shtëpi. Ia mbushi me të katra. Ua mbushi këmbëve. * E mbushi barkun (plëndësin) mospërf. u ngop mirë me të ngrënë. E mbushi kokën (i mbushi trutë) i mësoi të gjitha, i futi në kokë (ato që duhen ditur). E mbushi kupën ka bërë veprime të tilla të këqija që nuk mund të durohen më, e ka kaluar masën, është bërë i padurueshëm. Ia mbushi mendjen (kokën) dikujt e bindi më në fund për diçka. E mbushi qindin shih te QIND,~I. I mbushi sytë (me lot) është gati më të qarë, u rrëmbush. Nuk ta mbush (nuk ta zë) syrin nuk të duket kushedi se çfarë; nuk të pëlqen, nuk të kënaq a nuk të bind në dukje se është ashtu si duhet a siç e duam, ose se ka atë vlerë që ka në të vërtetë. E mbushi (e kaloi) të shtatën shih te SHTATË (i, e). E mbushi thesin dikush shih te THES,~I. Na mbushi vrer shih te VRER,~I. I mbushi xhepat fitoi shumë para, u bë i pasur. E mbushi zorrën hëngri sa u ngop. Ia mbushi kokën me ashkla shih tek ASHK/ËL, ~LA. Mbush (mban, merr) ujë me shoshë (me shportë) shih te SHOSH/Ë,~A. Luga mbush barkun, piruni than gurmazin fj. u. shih te LUG/Ë,~A."]}]</script>
