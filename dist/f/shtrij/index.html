<script>window.__INITIAL_DATA__ = [{"slug":"shtrij","term":"SHTRIJ","attributes":["kal."],"definitions":["Hap, ndej a sheshoj mirë për së gjati e për së gjeri diçka të mbledhur ose të zhubrosur. Shtrij çarçafin (pëlhurën). Shtriu flokët.","Hap e ndej duke e tërhequr, duke e shtyrë etj. një fill ose diçka tjetër të mbledhur a të mbështjellë; e drejtoj duke e lëvizur, e hap, e ndej (për gjymtyrët); zgjat në një drejtim të caktuar, drejtoj. Shtrij metrin. Shtrij telin (linjën). Shtrij këmbët (krahët). Shtriu flatrat. Shtrij hapin. Shtriu qafën përpara. Shtriu dorën drejt s'ëmës. Shtriu jataganin përpara. Shtrin rrënjët në tokë (në ujë).","Vendos dikë a diçka rrafsh mbi një sipërfaqe, e ndej. Shtrijnë shinat. E shtrinë në shtrat (në tokë). Shtrijeni me kujdes!","E vë dikë në shtratin e vdekjes a në arkivol. Më shtrifsh! bised. më qafsh! (përdoret kur i drejtohemi një shoku a një të afërmi me lutje për diçka). Të shtrifshin! mallk. vdeksh!","Zmadhoj sipërfaqen e diçkaje duke e shtypur a duke e goditur sipër me forcë; e zgjat a e zgjeroj duke e holluar. Shtrij brumin (baltën).","E bëj të bjerë i vdekur përdhe duke e qëlluar me armë, vras. Shtriu shumë armiq. I shtriu dy ballistë.","E përhap në një sipërfaqe më të madhe, i jap përpjesëtime më të mëdha; ia zgjeroj fushën e veprimit, e zbatoj edhe në fusha a në sende të tjera. Shtrij punimet (punën). Shtriu veprimtarinë (bashkëpunimin). Shtrinë forcat. usht. i vendosën forcat gjatë një brezi a drejtimi të caktuar. Shtrinë zjarrin e luftës (agresionin). Shtriu sundimin mbi... E shtrinë prashitjen në gjithë sipërfaqen. E shtrinë kontrollin punëtor në të gjitha ndërmarrjet. E ka shtrirë mjaft ndikimin. E shtriu rrezen e veprimit. Shtrij disa parime (një teori) mbi diçka.","E shpërndaj brenda një periudhe kohe të caktuar, e zgjat. E shtrinë programin e gjuhës shqipe në katër vjet.","krahin. Vrapoj, rend; Shtrin më shumë se unë. Shtriu sa pati çapin. * Shtriu dorën (duart) mbi (në) diçka u përpoq ta vinte në dorë, ta kishte për v
