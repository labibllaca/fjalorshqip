<script>window.__INITIAL_DATA__ = [{"slug":"ccoj-i","term":"ÇOJ I","attributes":["kal."],"definitions":["E marr me vete dhe e përcjell deri në një vend tjetër ose deri te dikush, shpie; e nis dikë që të shkojë deri në një vend për një qëllim, për të bërë një punë, për të mbaruar një porosi etj., dërgoj; kund. sjell. E çoi djalin në fshat. E çoi në shtëpi. E çoi në punë (në luftë). Çoj në shkollë (në aksion). E çoi me shërbim. I çoi krushqit. E çoi me lopë (me dhen). E çoj për dore. E çoj zvarrë.","Bart deri te një vend ose deri te dikush për ta lënë atje; nis me një njeri, me një mjet ose me një mënyrë tjetër deri në një vend tjetër ose deri te dikush, dërgoj; kund. sjell, bie. I çoj librin (gazetën). I çoj një letër (një telegram); I çova ca plaçka. Ia çoi drutë. I çoj kafen. I çoi të hajë e të pijë. I çoj me postë diçka. Ma ço me djalin. Ia çoj në shtëpi (në shkollë, në punë). E çoj në vend. I çuan me anije (me tren).","Ia bëj të njohur diçka nëpërmjet një njeriu ose me letër, njoftoj nga larg; i shpreh nëpërmjet dikujt ose me letër urime, përshëndetje etj., i dërgoj nga larg. I çoj fjalë (haber). I çoj zë për diçka. I çoj të fala (përshëndetje, urime).","E drejtoj diçka që të shkojë a të godasë në një vend ose në një shenjë, dërgoj. E çoj në shenjë. Çoj topin në rrjetë. Çoj plumbin në tabelë. Çoj sytë (vështrimin) hedh sytë, shoh në një drejtim.","vet. veta III. Lë të kalojë nëpër të në një drejtim të caktuar, shpie. Kanali e çon ujin shumë larg. Gypat e çojnë lëngun te kazanët. E çon rrymën elektrike deri në fshatrat më të largëta.","vet. veta. III. Të drejton në një vend të caktuar, të shpie. Rruga të çon në fshat. Kjo udhë të çon në Shkodër. Ku të çon kjo kthesë? Të çon në veri (në jug).","fig. Udhëheq në një drejtim; ndihmoj që të zhvillohet, të përparojë, të ecë; shpie. E çoj drejt fitores. E çon përpara revolucionin. E çoi në rrugë të drejtë. Përpiqet ta çojë prapa.","Bëj që të arrijë në një përfundim të mirë ose të keq, e shpie në një gjendje të caktuar; vet. veta III ka si rrjedhim a si pasojë; shpie. E çoi në litar (në greminë, në varr). E çoi në fitore (në shkatërrim të plotë). E çoi dëm diçka e prishi, e dëmtoi. Këtu të çon kokëfortësia (mendjemadhësia, pakujdesia).","E shpie deri në një cak a në një shkallë; rrit a zmadhoj deri në një numër. E çoi numrin e golave në pesë. E çoj numrin e lopëve deri në dyqind. E çoi në kulm. E çoj deri në fund. E çoj më tej (më përpara).","vet. veta III. Më bën të shkoj diku, më detyron të vete, më shpie. Më çon puna. Më çoi detyra. E çoi nevoja (halli).","Kaloj a shkoj kohën; kaloj jetën; jetoj në një mënyrë të caktuar; rroj; shpie. E çon shumë mirë në fshat. E çoi jetën në mërgim. Si ja çoni andej? Si ia çon me punë? Ka çuar jetë ka rrojtur mirë. Si ia çoni me fqinjët? Ia çoj mirë (keq).","vet. veta III. jokal. bised. Shkon edhe ca kohë, përdoret diçka edhe për një farë kohe; rron. E çojnë edhe ca muaj këto këpucë. Nuk më kanë çuar shumë (gjatë).","bised. E vazhdoj a e zgjat diçka për një farë kohe; jokal. zgjat a vazhdon për një kohë të caktuar. E çoi gjatë kuvendin (bisedën). E çuan gjatë luftën. Nuk e çon shumë kjo luftë. S'po e çojmë më tutje (më tej) nuk po e zgjatim më bisedën, po e lëmë me kaq.","bised. E gëlltit a e kapërcej në grykë një ushqim; e shkoj poshtë a e thith në mushkëri. S'e çoj dot më bukën. Mezi e çoj duhanin e fortë.","bised. Drejtoj a ngas një kafshë pune ose një mjet transporti a udhëtimi; nis. Çoj qetë (kuajt). Çoj biçikletën. E çoj makinën (veturën): S'di ta çojë mirë!. * Çoj më andej (më tej) e shpie më përpara diçka, bëj që të arrijë në një cak më të përsosur. E çon batbat diçka shih te BATBAT. E çuan (e shpunë) dardhë! shih te DARDH/Ë,~A. E çoi (e dërgoi) në djall (në dreq) dikë a diçka thjeshtligj., keq. shih te DJALL,~I. E çoi (e shpuri) fjalën për dikë a për diçka shih te SHPIE. S'e çon (nuk e shpie) më gjatë shih te GJATË. E çoj (e shpie) mendjen diku a te dikush e sjell ndër mend diçka a dikë, nis të mendoj për diçka a për dikë. E çoi poshtë dikë a diçka shih te POSHTË. E çoi (e nxori, e pruri) rruga (udha) shih te RRUG/Ë,~A. E çon trashë dikush shih tek TRASHË. E çoi në varr dikë shih te VARR,~I. E çoj (e shpie) në vend (një fjalë, një urdhër, një porosi etj.) shih te VEND,~I. E çoj (e marr, sjell)për veshi dikë shih te VESH,~I. Të çon (të shpie, të hedh) degë më degë shih te DEG/Ë,~A. E çofshin me katër veta! mallk. vdektë! Mos e çoftë kryet (kokën) shëndoshë! mallk. vdektë! Ku të çon (të shpie) mushka! shih te MUSHK/Ë,~A. Çon (shpie) ujë në mullirin e dikujt shih tek UJ/Ë,~I. Ta çon (ta shkon, ta lëshon, ta fut, ta kalon) ujin nën rrogoz (nën hasër, nën vete) shih te RROGOZ,~I. E çoi në vend të vetën shih te VEND, ~I. Çon një pelë e ha një thelë fj. u. shih te PEL/Ë,~A."]}]</script>
