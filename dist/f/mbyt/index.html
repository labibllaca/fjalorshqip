<script>window.__INITIAL_DATA__ = [{"slug":"mbyt","term":"MBYT","attributes":["kal."],"definitions":["E bëj të vdesë një njeri a të ngordh një kafshë, duke i shtrënguar fort grykën sa të mos marrë dot frymë, duke e zhytur në ujë etj. E mbytën në lumë (në det, në pus). E mbyti me duar (me tel). I mbyti bletët me tym.","krahin. Ther ose vras duke e goditur me diçka. Mbyti një gjel për mikun. E mbyti me thikë (me sëpatë). E mbytën me gurë.","Fundos një mjet lundrimi duke e dëmtuar ose duke e përmbysur. E mbytën anijen (barkën).","vet. veta III edhe fig. bised. Nuk e lë të marrë frymë lirisht, i vështirësoj frymëmarrjen dikujt, i zë frymën. Ajo jakë është tepër e ngushtë, të mbyt. Na mbyti tymi (pluhuri). E mbyti kolla. Na mbyti vapa. E mbyti malli.","bised. E rrah shumë dikë, e rrah për vdekje; i jap shumë goditje. Na e mbyti djalin. E mbyti me grushte (me shkelma).","I hedh diçkaje shumë ujë, qumësht, sherbet a diçka tjetër të lëngshme sa të zhytet plotësisht për ta zbutur, për ta ëmbëlsuar etj.; e ngop me një lëng, e përmbyt. E mbyti miellin me ujë. Mbyt kadaifin (bakllavanë) me sherbet. E ka mbytur byrekun (tavën) me vaj (me gjalpë). Mbyt gëlqeren me ujë e shuaj. Mbytin finjën i hedhin ujë hirit për të bërë finjë.","vet. veta III. Del me shumicë sipër diçkaje, e mbulon të tërë dhe nuk e lë të zhvillohet; përhapet me shumicë gjithandej, vjen me tepri sa të pengon, sjell dëme etj.; ka me shumicë; përmbyt, vërshon. I mbyti bari i keq grunjërat (të lashtat, arat). E mbyti lumi fushën. E mbyti balta udhën. Na mbyti shiu (dëbora). E mbytën lotët qau me shumë lot. E mbytën djersët i dolën shumë djersë, u bë qull në djersë. E mbytën fëmijët kishte shumë fëmijë.","fig. Nxjerr diçka me shumicë, e mbush gjithandej me të, e përmbyt; jap diçka me shumicë a e bëj me tepri sa e lodh dikë e s'e lë të marrë frymë, e dynd, e shemb. E mbytën tregun me mallra (me perime). E mbyti me të mira. E mbyti me fjalë (me të shara). E mbyti me pyetje.","fig. E ngarkoj dikë rëndë me punë, me detyrime etj. sa s'mban dot më; e lodh dikë jashtë mase, e mundoj në punë; vet. veta III më dërrmon, s'më lë të marr frymë, më rëndon shumë. E mbyti në punë (me detyra). I mbyste, u merrte shpirtin. I mbyti me borxhe. I mbyti puna. I mbytnin hallet.","Mbuloj një tingull a një zë me anë të një tingulli më të fuqishëm ose me anë të një zhurme. Zhurma i mbyti bisedat. Duartrokitjet i mbytën fjalët e folësit. Këngëtarin e mbyti kori (orkestra).","fig. Shtyp me dhunë (një kryengritje etj); e mposht dikë, e nënshtroj, e bëj të heshtë; shuaj, asgjësoj. E mbytën me gjak kryengritjen (lëvizjen, luftën) popullore. E mbyti me zjarr e me hekur. Mbyste zërin e masës (kritikën).","fig. E pengoj diçka që të marrë udhë e të zhvillohet lirisht; mposht një ndjenjë ose diçka tjetër që më mundon; përpiqem të harroj një brengë duke u marrë me diçka, duke pirë etj. E mbytin menjëherë çdo shfaqje të huaj. Mbyt një ndjenjë (një dëshirë). Mbyste hidhërimin (dëshpërimin, dhembjet shpirtërore).","bised. Fut në dhe ose mbuloj me dhe një degë bime, një rrënjë a një kalem druri që të mbijë. Mbyt pjergullën (hardhinë). * S'e ka mbytur macen iron. nuk e ka treguar forcën që në fillim që t’u shtinte frikën të tjerëve, nuk ia dinë egërsinë që t'i tremben. E mbyt që në vezë diçka e pengon ose e asgjëson diçka që në fillim që sapo shfaqet, nuk e lë të zhvillohet. Edhe vau të mbyt fj.u. shih te VA,~U. Zhyt e mbyt shih te ZHYT. Shumë babo e mbytin fëmijën fj.u. shih te BABO,~JA."]}]</script>
