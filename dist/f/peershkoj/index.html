<script>window.__INITIAL_DATA__ = [{"slug":"peershkoj","term":"PËRSHKOJ","attributes":["kal."],"definitions":["E kaloj diçka nëpër një vrimë a hapësirë, e shkoj tejpërtej; vet. veta III kalon diçka nëpër një trup tejpërtej. Përshkoj perin në gjilpërë. E përshkoi plumbi tejendanë.","Kaloj nëpër një vend nga njëra anë e dal në anën tjetër; shkoj në të gjitha anët, shkel të gjithë vendin, i bie kryq e tërthor; i bie përmes një vendi a hapësire; kapërcej. Përshkoi fusha e male. Përshkuan shtigje të pashkelura. Drini e përshkon gjithë Shqipërinë e Veriut. Rrudhat i përshkonin ballin.","Kaloj një rrugë brenda një kohe të caktuar, e kryej; bëj. Përshkoj një largësi (një rrugë). Treni e përshkon rrugën në dy orë.","fig. Jetoj e kaloj përmes ngjarjesh e rrethanash të ndryshme. Populli shqiptar ka përshkuar një rrugë të lavdishme (heroike).","vet. veta III (me një tratë të shkurtër të përemrit vetor në r. kallëzore). Më kalon nëpër gjithë trupin. E përshkoi një dridhmë. Ia përshkoi trupin (kurrizin) një rrëqethje.","Qep diçka me dorë, duke e shkuar perin larg e larg, para se ta qep përfundimisht, ildis. Përshkoi palën e fustanit (mëngën e xhaketës).","Bëj varg, i kaloj në një fill, shkoj. Përshkoj në varg gjethet e duhanit (fiqtë).","vet. veta III fig. Kalon e lë mbresë në mendje a në zemër; prek thellë. Fjalë që përshkojnë mendjet dhe zemrat e njerëzve. E përshkoi një ndjenjë mallëngjimi (mëshire, krenarie).","fig. E karakterizon të tërin, hyn në të tejendanë dhe e dallon si të tillë, është a bëhet pjesë përbërëse kryesore ose tipar i përgjithshëm i tij. E përshkon fryma e humanizmit socialist (dashuria për njeriun e punës)."]}]</script>
