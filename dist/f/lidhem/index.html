<script>window.__INITIAL_DATA__ = [{"slug":"lidhem","term":"LIDHEM","attributes":["vetv."],"definitions":["vet. veta III. Bashkohen vetë skajet e një filli, litari etj. ose skajet e fijeve të ndryshme, ngatërrohen, shtrëngohen e bëhen nyjë; i kapen lidhëset diçkaje në një verigë etj.; kund. zgjidhet. U lidh peri. U lidhën fijet (lidhëset). U lidh nyjë (komb).","vet. veta III. Kapet pas një druri a një sendi tjetër, mblidhet rreth tij. Është lidhur mirë hardhia (rrushi) në pemë. Është lidhur fort trëndafili i egër pas gardhit.","vet. veta III. Kapet mirë një send me një tjetër; ngjitet, bashkohet fort; kapen mirë pjesët e diçkaje dhe kjo bëhet më e fortë ose më e qëndrueshme; kap, mban. Gurët e themelit u lidhën mirë. Muri lidhet më mirë me llaç. Toka lidhet kur plehërohet.","vet. veta III spec. Mbërthehet a bashkohet me një pjesë tjetër ose me tokën; mbyllet, kyçet. U lidh qarku. fiz.","kim. I bashkohen grimcat (një elementi kimik) me ato të një tjetri dhe ndryshon gjendja e tij e lirë. Lidhen kimikisht. Hidrogjeni lidhet me oksigjenin dhe jep ujin.","Hyj në marrëdhënie me dikë a me diçka me anë të një mjeti ndërlidhjeje; vet. veta III bashkohet me rrugë a me mjete ndërlidhjeje me një qendër, me një qytet tjetër etj. Lidhem me telefon (me radio). Të gjitha fshatrat lidhen me rrugë automobilistike.","fig. Afrohem me dikë, hyj në marrëdhënie të ngushta e të drejtpërdrejta, bashkohem. U lidhën bashkë për gjithë jetën. U lidhën me martesë u martuan.","fig. Bëj një marrëveshje me dikë; bashkohem me dikë për një veprimtari të caktuar. U lidhën me besë (me besa-besë, me fjalë). U lidhën me kusht vunë bast.","vet. veta III fig. Ka marrëdhënie të ngushta a të pandara me diçka; bashkohen gjëra a çështje si të ishin pjesë të një të tëre; ka të bëjë me diçka a me dikë ose varet prej saj a prej tij. Teoria lidhet me praktikën. Shkolla lidhet me jetën. Këto gjëra lidhen ngushtë. Kjo lidhet me shkaqe (me rrethana, me kushte) të caktuara.","fig. bised. Jepem shumë pas dikujt a diçkaje, nuk shkëputem dot prej tij a prej saj dhe kjo më pengon të merrem me diçka tjetër. U lidh me fëmijët. Është lidhur shumë me punën. Mos u lidh pas tij!","fig. Më zihet goja, zihem ngushtë në një bisedë me dikë dhe hesht, ngec. U lidh keq.","Pës. e LIDH. * U lidha pas bishtit të dikujt keq. shih te BISHT, ~I. Iu lidhën duart (krahët) mbeti pa punë pasi e pengonte dikush a diçka; nuk mundi të bëjë dot gjë, nuk ishte i lirë të vepronte. Iu lidh (iu pre) goja (gjuha, fjala) s'tha dot asnjë fjalë, s'mundi të fliste (nga një tronditje e fortë, nga frika etj.). Nuk lidhet në një hu shih te HU,~RI. Nuk lidhet lehtë (dot) dikush është vështirë ta bindësh a ta detyrosh të bëjë diçka, nuk dorëzohet lehtë. Iu lidhën këmbët nuk mund të shkojë gjëkundi, sepse e pengon diçka a dikush. U lidh këmbë e duar s'ka mundësi të bëjë asgjë, pasi e pengon dikush a diçka, nuk mund të bëjë asnjë veprim. Iu lidh nyjë jeta shih te NYJ/Ë,~A. As lidhet, as zgjidhet qëndron në të tijen, mbahet fort në atë që mendon a që di vetë dhe s’pranon asgjë tjetër; është shumë kokëfortë. S’di si (nga) lidhet gomari mospërf. nuk merr vesh as nga gjërat më të thjeshta, s'di të bëjë as diçka të vogël, s'është i aftë për asgjë. S'di si lidhen poturet mospërf. nuk është në gjendje të bëjë as diçka të thjeshtë, s’është i aftë për asgjë. Është për t'u lidhur në grazhd dikush shih te GRAZHD,~I. S'lidhet as për bisht as për krye dikush nuk i mbushet mendja kurrsesi, nuk ha fare arsye. Iu lidh buka (në grykë, në fyt) i ngeci buka në grykë, nuk përcillej dot (nga një tronditje etj.); nuk i bëhej fare, i iku fare dëshira për të ngrënë. Iu lidh fjala komb (nyjë) dikujt shih te FJAL/Ë,~A. Është lidhur me pe merimange diçka shih te PE,~RI. Koha s’lidhet me litar fj.u. nuk mund të pengohet zhvillimi dhe përparimi i diçkaje, asgjë nuk qëndron në vend, por ecën përpara. Sillet aga sillet, bie në kunj e lidhet shih te KUNJ,~I."]}]</script>
