<script>window.__INITIAL_DATA__ = [{"slug":"hapur","term":"HAPUR","attributes":["f.","sh."],"definitions":["Hapësira ndërmjet pjesëve të diçkaje, hapësira që krijohet kur hapet a ndahet diçka; e çarë. E hapura e derës. E hapura e murit. Të hapurat e gardhit."]},{"slug":"hapur","term":"HAPUR","attributes":["mb."],"definitions":["Që lejon të hyjë brenda, të dalë a të kalojë lirisht dikush a diçka, i çelur; kund. i mbyllur. Derë (portë) e hapur. Dritare e hapur. Kanat i hapur. Dhomë e hapur.","Që i është hequr tapa, kapaku, mbyllësja a mbështjellja; kund. i mbyllur. Shishe e hapur. Arkë e hapur. Kuti e hapur. Enë (tenxhere) e hapur. Zarf i hapur. Dry i hapur. Zinxhir i hapur. Letër e hapur letër postare e pambyllur në zarf, e cila në njërën anë ka të shkruar adresën dhe në anën tjetër vetë përmbajtjen e letrës.","Që i ka pjesët a anët të larguara ose të mënjanuara njëra nga tjetra, i shpalosur, i shtrirë e i drejtuar; i çelur; kund. i mbyllur. Me perde të hapura. Me libër të hapur. Me sy të hapur. Me buzë të hapura. Me sqep të hapur. Me krahë të hapur. Me jakë të hapur. Jelek i hapur.","Që është gërmuar a është shpuar, i çarë; që nuk është mbuluar a nuk është mbushur; që është punuar a është kthyer për herë të parë (për tokën); që nuk është përtharë a nuk është mbyllur (për plagën). Gropë e hapur. Varr i hapur. Galeri e hapur. Tokë e hapur.","Që ka filluar veprimtarinë, që punon, i çelur. Vendburim i hapur. Dyqanet janë të hapura.","Që është i zbuluar; që i është hequr diçka, e cila e kishte mbuluar; i sheshtë e i zbuluar. Vend i hapur. Rrugë e hapur. Me gjoks të hapur. Me ballë të hapur.","fig. Që lë mundësi për të ecur përpara, që nuk ka pengesa a vështirësi. Rrugë të hapura. Horizonte të hapura. E ka rrugën të hapur. I ka dyert të hapura.","Që ka shtrirje të madhe e të pakufizuar; që është i gjerë dhe nuk e pengon shikimin e njeriut; i hapët. Vend i hapur. Qytet i hapur. Në fushë të hapur. Në det të hapur në mes të detit, larg brigjeve.","I shpërndarë, i përhapur, i përndarë; kund. mbledhur. Fshatra të hapura. Shtëpi të hapura. Pyll i hapur. Lojë e hapur. sport. lojë me lojtarë të shpërndarë në të gjithë fushën. Shkronja të hapura. shtypshkr. shkronja të rralluara.","Që është i zbuluar, që nuk ka çati a mbulesë lart ose rrethim anash; që nuk është i mbuluar a i mbyllur, që është në natyrë. Makinë e hapur. Stadium i hapur. Pishinë e hapur. Poligon i hapur. Kinema e hapur kinema verore. Minierë e hapur. Vendburim i hapur. Në ajër të hapur jashtë. Në fushë të hapur. Në qiell të hapur jashtë.","Që është vënë në veprim, që është lëshuar të punojë; që është i lirë për të kaluar, për të hyrë e për të dalë etj. (edhe fig.); kund. i mbyllur. Me drita të hapura. Kufi i hapur. Port detar (aeroport) i hapur.","fig. I tillë ku mund të marrin pjesë edhe njerëz të tjerë së bashku me ata që kanë të bëjnë drejtpërdrejt. Mbledhje e hapur partie (e organizatës-bazë). Mësim i hapur. Gjyq i hapur.","fig. Që nuk ka përfunduar, i pazgjidhur; që ka mbetur pezull. Diskutim i hapur. Çështje e hapur. Bisedim i hapur.","fig. Që vepron ballë për ballë ose drejtpërdrejt, që nuk mbulohet nga asgjë, që nuk bëhet fshehurazi; që shfaqet haptas, që del sheshit, i hapët. Ndeshje e hapur. Tradhti e hapur. Provokim i hapur. Diktaturë e hapur fashiste. Kritikë e hapur. Në kundërshtim të hapur me...","fig. Që bëhet përpara syve të pjesëmarrësve të tjerë, që bëhet haptas dhe zakonisht duke ngritur dorën, që nuk bëhet fshehurazi; kund. i fshehtë. Votim i hapur. Zgjedhje të hapura.","fig. Që ia tregon tjetrit haptas mendimet, ndjenjat, hallet etj., që ua hap zemrën të tjerëve; i çiltër; kund. i mbyllur. Njeri i hapur. Bisedë e hapur.","Që ka ngjyrë jo të theksuar, e cila afrohet me të bardhën, i çelur; kund. i mbyllur, i errët. Ngjyrë e hapur. E kuqe (e gjelbër) e hapur.","tek. Që është ndërprerë a është këputur në një vend (për diçka që ka qenë e mbyllur ose e lidhur); kund. i mbyllur. Qark i hapur.","mjek. Që zhvillohet duke dhënë shenja të dukshme; kund. i fshehtë. Formë e hapur e sëmundjes.","fin. Që i vijon veprimet me të holla, që nuk është mbyllur përfundimisht, që nuk i ka përfunduar veprimet; i çelur. Kredi e hapur. Llogari e hapur.","Që nuk është zënë, i lirë. Vend i hapur në organikë.","Që i kanë çelur burbuqet ose boçet; i lulëzuar. Lule e hapur. Syth i hapur. Boçe pambuku e hapur.","I kthjellët, që nuk ka re. Qiell i hapur. * Me ballë të hapur (të çelur) ballëhapur. Me dyer të hapura që zhvillohet a bëhet duke pasur të drejtë të marrin pjesë edhe njerëz të tjerë, me hyrje të lirë (për një gjyq, një mbledhje). Me gjoks të hapur pa u frikësuar, trimërisht. Letër e hapur dokument në trajtën e një letre, që shpallet botërisht dhe që u drejtohet masave të gjera punonjëse për një çështje të rëndësishme; letër që botohet në një gazetë a revistë. Me letra (me karta) të hapura pa fshehur asgjë, duke i thënë gjërat sheshit. Plagë e hapur dhimbje shpirtërore e pambyllur, dhimbje e pafashitur. Me zemër të hapur (të çelur) me çiltëri, çiltërisht. Politika e dyerve (e portave) të hapura shih te POLITIK/Ë,~A 1. Doli me flamur të hapur i shfaqi haptazi idetë, pikëpamjet e qëllimet e veta, doli hapur. E hapur në të dyja kanatet shih te KANAT,~I. Është varr i hapur dikush është shumë plak a shumë i sëmurë, është afër vdekjes, nuk ka asnjë shpresë shpëtimi. E kam ballin të hapur jam ballëhapur. E kam gojën të hapur jam ballëhapur, s'kam pse të druhem a të ngurroj, s'kam pse të hesht; kam plotësisht të drejtë të bëj një kërkesë. E ka syrin të hapur a) është ballëhapur; b) është i ditur. Si rrufe në qiell të hapur shih te QIELL,~I. Shpërtheu një derë (një portë) të hapur u përpoq të zgjidhë një gjë që ishte zgjidhur prej kohësh. Troket në derë (në portë) të hapur thotë diçka të njohur, merret me diçka që ka gjetur zgjidhje më parë. Rrokje e hapur gjuh. rrokje që mbaron me një zanore. Zanore e hapur gjuh. zanore që shqiptohet me gojën më të çelur se zakonisht."]},{"slug":"hapur","term":"HAPUR","attributes":["ndajf."],"definitions":["Në mënyrë që lejon të hyjë brenda, të dalë a të kalojë lirisht dikush a diçka, çelur; pa çelës; kund. mbyllur. E la derën hapur. Mbeti dritarja hapur. Mbaje hapur.","Me pjesët a anët të larguara ose të mënjanuara njëra nga tjetra, çelur; kund. mbyllur. Me sytë hapur. Me gojë hapur.","Duke punuar, duke zhvilluar veprimtari, çelur (për një institucion, një shkollë, një dyqan etj.); kund. mbyllur. E gjeti dyqanin hapur. Rri hapur gjithë ditën.","fig. Drejtpërdrejt, ballë për ballë, pa u fshehur, haptas; kund. fshehtas. I doli hapur. E kundërshtoi hapur.","fig. Me zemër të hapur, me çiltëri; shkoqur, sheshit, shqip. I foli hapur. Ia tha hapur. * Me ballë hapur (hapët) ballëhapur. Me gojë hapur (hapët) a) me habi të madhe, i mahnitur a i shastisur nga diçka e papritur a e pabesueshme; b) me padurim, me dëshirë të madhe. Me gjoks hapur ballë për ballë e pa druajtje; trimërisht. Me krahë hapur (hapët) me dashuri e ngrohtësi, me përzemërsi të madhe. Me sy hapur (hapët) ballëhapur, pa druajtje; syhapur. Ëndrra me sy hapur (hapët, çelur) shih tek ËND/ËRR,~RRA","Fle me një sy hapur (hapët) shih te FLE. E ka derën hapur (çelur) hyn lirisht; vepron lirisht; nuk ka pengesë për të ecur përpara. E ka rrugën (udhën) hapur (hapët) është i lirë për të bërë diçka, nuk ka ndonjë pengesë. E mban derën hapur (çelur) a) pret kurdoherë me bujari miq e shokë; b) vjet. është vazhdues i mëtejshëm i atyre që rrjedhin nga një fis a nga një familje, bën që të mos i shuhet fisi. E la me gojë hapur dikë shih te GOJ/Ë,~A. I mbaj sytë hapur shoh me kujdes e me vëmendje, i hap sytë. I mbaj veshët hapur (hapët) rri e dëgjoj me kujdes e me vëmendje të madhe; tregohem syhapur. Mbeti me gojë hapur shih te GOJ/Ë,~A. E priti me gojë hapur shih te GOJ/Ë,~A. Thur livadhin e lë shtegun hapur shih te THUR."]}]</script>
