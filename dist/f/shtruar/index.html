<script>window.__INITIAL_DATA__ = [{"slug":"shtruar","term":"SHTRUAR","attributes":["f.","zakon."],"definitions":["Rrobat që shtrojmë për të fjetur, shtresat e mbulesat; shtrojë. Bëri gati (solli, ngriti) të shtruarat. Ra në të shtruarat. U ngrit nga të shtruarat.","vet. sh. krahin. Turshi."]},{"slug":"shtruar","term":"SHTRUAR","attributes":["m.","sh."],"definitions":["Ai që shtrohet në një institucion shëndetësor për t’u mjekuar ose për të marrë ndihmë mjekësore. Numri i të shtruarve. Kishte njëzet të shtruar."]},{"slug":"shtruar","term":"SHTRUAR","attributes":["mb."],"definitions":["Që është ndrequr e ka qilima të hapur në dysheme, mbulesa të reja etj. Dhomë (shtëpi) e shtruar. E mbajnë shtëpinë të shtruar.","E mbushur me gjellë e ushqime të ndryshme, me pije etj. dhe e pajisur me sendet e me mjetet që përdorim kur hamë e pimë. E gjetën tryezën (sofrën) të shtruar.","I asfaltuar ose i veshur me kalldrëm, me pllaka etj.; kund. i pashtruar. Rrugë të shtruara. Oborr i shtruar.","I sheshtë, i rrafshët, i butë (për relievin e një vendi, për sipërfaqen e diçkaje etj.) Vend i shtruar. Tokë e shtruar. Rrugë e shtruar. Kodër e shtruar. Flokë të shtruar.","Që bie qetë e ngadalë dhe mban shumë (për shiun). Shi i shtruar.","fig. I urtë, i bindur, i dëgjueshëm; që nuk rrëmbehet, që i gjykon punët qetë e pa u ngutur; që punon qetë e me durim. Grua e shtruar. Njeri (burrë, djalë) i shtruar. Është i shtruar në punë (më shokët).","fig. I qetë, i ngadalshëm, jo me ritëm të shpejtë. Zë i shtruar. Bisedë e shtruar. Valle (këngë) e shtruar.","Që ka rënë klloçkë. Ka dy pula të shtruara.","krahin. I vënë turshi, i regjur. Tranguj të shtruar. * Me mendje të shtruar duke e parë punën me gjakftohtësi; i qetë, me mendje të mbledhur."]},{"slug":"shtruar","term":"SHTRUAR","attributes":["ndajf."],"definitions":["Ndenjur shesh. Rri (ulem) shtruar.","Duke qenë çdo gjë gati. E gjeti shtruar.","Ngadalë, butë, qetë. Bie shiu (bora) shtruar. Ia nisi shtruar.","Pa hasur pengesa e vështirësi, pa ngecur, qetë; pa ngjitje e zbritje (edhe fig.). Lumi rridhte (ecte) shtruar. Shkoi shtruar puna. Veprimi në roman zhvillohet shtruar. Nuk ecën shtruar gjithçka.","Me qetësi, qetë, pa u nxehur, jo me rrëmbim; duke e parë nga të gjitha anët e duke e peshuar mirë. Ta marrim punën shtruar. Të flasim (të bisedojmë, të kuvendojmë) shtruar. Merre më shtruar. E ka zënë shtruar.","Ngadalë dhe qetë e qetë. Ia ka marrë shtruar (këngës). * Gënjen (rren) shtruar (përtokë) gënjen në mënyrë aq të hollë e me gjakftohtësi të madhe, saqë të tjerët e besojnë. E gjeti lëmin shtruar shih të LËM/Ë,~I. E gjeti sofrën shtruar shih te SOF/ËR,~RA. I rri sofra gjithnjë shtruar dikujt shih te SOF/ËR,~RA. Guri që punon shtruar, bën miell të butë fj. u. njeriu këmbëngulës dhe fjalëpakë bën punë të mirë."]}]</script>
