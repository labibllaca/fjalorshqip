<script>window.__INITIAL_DATA__ = [{"slug":"pranoj","term":"PRANOJ","attributes":["kal."],"definitions":["E marr diçka që më jepet, nuk e kthej. E pranoi dhuratën. Nuk pranon peshqeshe (bakshishe). E pranoi ftesën. E pranoi me kënaqësi. Ia dha, po s`e pranoi.","edhe jokal. Jap pëlqimin për të bërë një punë a një veprim që më kërkohet; pajtohem me dikë a me diçka; dua. E pranoi detyrën e re. E pranoi si bashkëpunëtor. E pranoi për burrë (për grua). Pranoi të vinte (të fliste, të zgjidhej). S`pranon ashtu ai. Pranon, s’pranon, do të niset patjetër. - E si thua? Pranon? -Po, pranoj.","E quaj të drejtë diçka, e quaj të vërtetë a të ligjshme; miratoj. E pranuan vendimin (ligjin, propozimin). Pranojnë statutin. I pranoi kushtet (afatet). E pranoi gabimin (fajin). I pranoi të gjitha. Pranon luftën e klasave (diktaturën e proletariatit). E pranuan për (si) të vërtetë. Pranoi se nuk kishte të drejtë.","Jap pëlqimin që dikush të marrë pjesë në një organizatë, të punojë diku etj., nuk jam kundër; e fut dikë në përbërjen e një organizate, e bëj anëtar; marr. E pranoi në punë. S`i pranonin në shkollë.","vet. veta III. Gjen mjedis të përshtatshëm për t'u rritur a për t'u zhvilluar mirë; është i përshtatshëm për diçka, është në përshtatje me diçka; duron. Ulliri nuk i pranon tokat me lagështirë. Kjo tokë nuk pranon këtë farë. Nuk i pranon gjuha jonë këto ndërtime të huaja."]}]</script>
