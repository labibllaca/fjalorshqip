<script>window.__INITIAL_DATA__ = [{"slug":"prej","term":"PREJ","attributes":[],"definitions":["I. parafj. Përdoret me një emër në rasën rrjedhore për të treguar: 1. Vendin nga vjen, nga nis lëvizjen dikush a diçka; burimin nga del diçka; nga. Erdhën prej fshatit. Buron prej malit. Del prej toke. Nis prej veriut.","Vendin ose sendin nga i cili përcaktohet një largësi; nga. Prej Tirane në Peshkopi. Prej shtëpie e deri këtu.","Sendin a vendin, nga sipërfaqja a brendësia e të cilit merret, largohet a hiqet diçka; nga. E nxori prej xhepi. Zbriti prej makine.","Një tërësi, nga e cila veçohet një pjesë; nga. Disa prej nesh do të nisen qysh tani. Shumë prej tyre janë bërë bujq të dalluar. Kjo është njëra prej çështjeve.","Njeriun, kafshën a sendin nga kërkohet ose merret diçka, shkëputet ose largohet dikush etj.; nga. E kërkon prej teje. E larguan prej familjes. Mezi e shkëputën prej s`ëmës. I ndanë qengjat prej deleve.","Punën, veprimtarinë, detyrën etj. që e vë dikush ose nga e cila largohet; nga. U lirua prej ushtrie. U largua prej pune.","Gjendjen nga e cila dalim a shpëtojmë; diçka së cilës i shmangemi, i shpëtojmë etj.; nga. U zgjuan prej gjumit. Nuk heq dorë prej luftës. Nxjerr prej prapambetjes. Shpëtoi prej rrezikut (prej sëmundjes, prej gripit).","Zanafillën ose prejardhjen e dikujt a të diçkaje; mjedisin, rrethin, grupin etj., të cilit i përket dikush a diçka; nga. Prej një familjeje punëtore. Prej një dere të njohur. Prej fisit të lashtë të dardanëve. Me burim prej ilirishtes. Fjalë e formuar prej në rrënje të vjetër.","Lëndën nga e cila është bërë diçka. Shtëpi prej guri (prej tullash, prej druri). Shkallë prej mermeri. Kasolle prej kashte. Stof (prej) leshi. Fustan (prej) kadifeje. Çantë (prej) lëkure. Litar (prej) liri (kërpi). Raki (prej) rrushi.","Vendin a pjesën nga e kapim dikë ose diçka; për. E kapi prej dore. E zuri prej bishti. E mbërtheu prej xhakete.","Tiparin e dikujt a të diçkaje; atë që ka një tipar të dallueshëm e të përhershëm; cilësinë që dallon dikë a diçka nga një tjetër, atë që është karakteristik për dikë a për diçka dhe e kufizon nga të tjerët. Mendim prej revolucionari. Pamje prej luftëtari. Sjellje prej komunisti. Qëndrim prej burokrati. Dallohet prej flokëve. E njohu prej syve. E kuptova prej zërit.","Kohën kur nis një veprim, fillimin e një periudhe kohe të caktuar; sasi kohe. Prej kohësh (prej shumë kohësh). Prej më se njëzet vjetësh. Prej vitesh nuk e kam parë. Po punojmë prej disa muajsh. Prej sot e tutje.","Një periudhë të caktuar kohe (së bashku me një emër tjetër me parafjalët në, deri në); nga. Prej mëngjesit deri në mbrëmje. Prej orës katër deri në shtatë. Prej fillimit deri në mbarim.","Shkakun a arsyen e diçkaje; shkaktarin e diçkaje; nga. E bëri prej frikës (prej dëshpërimit). U dogj prej vapës. Ishin tretur prej urisë. E ka prej lodhjes. Vdiq prej pike. Prej tij e pati atë të keqe.","Sendin a gjedhen, sipas të cilit a sipas së cilës veprohet ose bëhet diçka; nga. Frymëzohemi prej heroizmit të dëshmorëve. Marrim shembull prej më të përparuarve.","Njeriun me të cilin përcaktohet një lidhje afrie a gjaku, vijën a anën e lidhjes; nga. Kushëri prej nënës (prej babait). Mik prej vëllait.","Sasinë e diçkaje sipas një mase të caktuar. Ngastër prej dhjetë hektarësh. Miting prej mijëra vetësh. Me shpejtësi prej pesëdhjetë kilometrash në orë. Thellësi prej gjashtë mijë metrash.","Njeriun veprues ose sendin veprues; nga. Ushtonte pylli prej erës. Mora letër prej motrës. Është nënshkruar prej saj.","Vend, marrëdhënie në hapësirë ose sasi (në disa togje me ndajfolje); nga. Prej afër. Prej poshtë. II. lidh. Përdoret, zakonisht në togjet «prej ku», «prej nga», për të lidhur një fjali të varur përcaktore me fjalinë drejtuese. Qëndruam në një kodër të lartë, prej ku shihej fusha e gjerë."]}]</script>
