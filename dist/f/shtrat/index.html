<script>window.__INITIAL_DATA__ = [{"slug":"shtrat","term":"SHTRAT","attributes":["m.","sh."],"definitions":["Orendi prej druri a prej hekuri, që shërben për të fjetur ose për t'u shtrirë mbi të dhe që përbëhet nga një sustë a nga një radhë dërrasash të ngritura mbi katër këmbë, ku shtrohen dysheku e mbulesat e nevojshme. Shtrat i gjerë (i ngushtë, i ulët, i lartë, i dyfishtë, i butë). Shtrati bashkëshortor. Shtrati i nusërisë. Shtrat dërrase (hekuri). Shtrat me sustë. Shtrat fëmijësh. Në shtratin e vdekjes. Regjim shtrati. Këmbëzat e shtratit. Balli i shtratit. Hotel (spital) me dyqind shtretër. Shtroj shtratin. Bie (shtrihem, ulem) në shtrat. Shkoj shpejt në shtrat shkoj të fle herët. Fle (rri, lëngon, dergjet) në shtrat. Zuri shtratin (krevatin, dyshekun, jatakun) u sëmur e u dergj në shtrat për një kohë të gjatë. Nuk ngrihet nga shtrati është shumë i sëmurë.","Vend në një dhomë a gjetiu, i ngritur mbi këmbëza dhe i shtruar me dërrasa, që shërben për të ndenjur ose për të vënë diçka mbi të. Shtrati i minderit. Shtrati i shtresave. E vë mbi shtrat.","Vend i ngritur mbi drurë në mes të arës, i shtruar e zakonisht i mbuluar, ku fle ose ku rri roja; vend i shtruar e i rrethuar si kolibe, që bëjnë peshkatarët në gjol për të zënë peshk. Shtrat peshkimi. Bëri një shtrat te bostani. Hipi në shtrat.","Pjesa e sheshtë e qerres ku vihet ngarkesa. Shtrati i qerres. Hunjtë (dërrasat) e shtratit.","Vend i shtruar, i përgatitur posaçërisht dhe zakonisht pak i ngritur, ose pjesa e një vegle ku mbështetet, mbërthehet a lëviz diçka; pjesa e poshtme a mbështetja e diçkaje; pjesë e armëve të rënda ku mbështetet gryka e zjarrit. Shtrati i mullarit. Shtrati i avlëmendit. Shtrati i tornos (i dinamos). Shtrati i shulit (i shënjestrës). Shtrati i topit (i mitralozit të rëndë). Shtrati i lëshimit të raketës ndërtim i posaçëm që shërben për të lëshuar raketën e për t'i dhënë asaj drejtimin e duhur.","Ndërtim me drurë e hunj ose me hekura, të ngulur në tokë e të mbërthyer sipër, mbi të cilin hidhet hardhia ose ndonjë bimë tjetër kacavarëse që formon tendë; ndërtim i tillë ku varen vargjet e duhanit për t'u tharë. Shtrati i hardhisë. Shtrat duhani. Bëj (ngre) një shtrat. Hedh (var) në shtrat.","Tabani i sheshuar, mbi të cilin hidhet shtresa e themelit të rrugës. Shtrati i rrugës (i hekurudhës).","Lugu nëpër të cilin rrjedh uji i një lumi, i një përroi etj.; gjithë fundi i një liqeni, i një deti a i një oqeani. Shtrat i gjerë (i ngushtë, i thellë). Shtrati i vjetër (i ri). Shtrati i lumit (i përroit, i liqenit, i detit, i oqeanit). Doli lumi nga shtrati vërshoi lumi. Gërryen shtratin. Ka ndërruar shtrat lumi. Është thelluar (është ngritur, është mbushur) shtrati.","Pjesa nën vete (midis këmbëve) e të mbathurave ose e pantallonave. Shtrati i pantallonave. I ka të ngushta në shtrat. Janë ngrënë (janë grisur) në shtrat.","bot. Pjesa e sipërme e bishtit të lules, që është më e gjerë e që mban lulen. Shtrati i lules.","Lehe e punuar imët dhe e plehëruar mirë, ku mbillen fara perimesh, duhani etj., për të marrë rasate; farishte; shtresa e tokës ku mbin fara e zhvillohet bima. Shtrat i ngrohtë (i nxehtë) lehe, zakonisht e mbuluar, që ka në fund një shtresë degësh të thata, në mes një shtresë të gjerë plehu të pakalbur dhe sipër një shtresë dheu të thërrmuar, ku farat mbijnë më shpejt për shkak të nxehtësisë së plehut. Shtrat i ftohtë lehe me dhe të thërrmuar e të përzier me pak pleh, ku farat mbijnë më vonë se në shtratin e ngrohtë. Shtretërit e rasateve. Shtrati i mbirjes. Mbjell në shtretër.","fig. Tabani mbi të cilin lind, krijohet a zhvillohet diçka. Shtrat i shëndoshë. Shtrati kombëtar i këngës popullore.","fig. keq. Tërësia e kushteve dhe e rrethanave që shkaktojnë lindjen dhe zhvillimin e shfaqjeve e të dukurive të dëmshme për moralin e shoqërisë sonë, mjedis jo i shëndoshë. Shtrati i grindjeve (i thashethemeve). Gjente shtrat dembelizmi. I bënte shtrat tarafllëkut.","Shtresa e parë e borës; shtresë bore; borë e imët dhe e përzier me shi a me breshër, që bie para se të nisë bora mirë, llohë. Shtrat bore. Ra një shtrat bore. Bie bora shtrat mbi shtrat. Nuk ka (zënë) shtrat dëbora ka rënë pak dëborë ose kjo është e re dhe e shkrifët, sapo ka rënë.","Shtresë e trashë si pelte që formohet në uthull nga shtimi e përqendrimi i mikroorganizmave, shpretka e uthullës; e trasha e qelbit në një të thatë a në një pagë. Shtrati i uthullës. Ka zënë shtrat uthulla. I doli shtrati të thatit.","anat. Cipë e mishti si sfungjer, që mbështjell e ushqen pjellën te gruaja shtatzënë ose të femrat barrsa të gjitarëve dhe që del jashtë bashkë me të. E nxori shtratin. I doli (i ra) shtrati.","Pëlhura e merimangës, cerga. Ia prishi shtratin merimangës.","fig. bised. Burrë e grua, një çift bashkëshortësh.","Çerdhe e mizash nëpër drurë. Shtrati i mizave. * I është bërë shtrat dikujt a diçkaje keq. i është bërë mbështetje, e përkrah dhe e mbron; i ka krijuar kushte të përshtatshme për të vepruar a për t’u zhvilluar. E la shtratin (krevatin, dyshekun, jatakun) u shërua. Është mbërthyer në shtrat shih te MBËRTHEHEM. U ngrit nga shtrati (nga krevati, nga dysheku, nga jataku ) u shërua. I vuri krahët shtratit shih te KRAH,~U","Është (përpëlitet) në shtratin e vdekjes shih te VDEKJ/E,~A. Shtriji (zgjati) këmbët sa ke shtratin (jorganin, plafin) fj. u. shih te JORGAN,~I."]}]</script>
