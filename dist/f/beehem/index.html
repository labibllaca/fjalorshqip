<script>window.__INITIAL_DATA__ = [{"slug":"beehem","term":"BËHEM","attributes":["vetv."],"definitions":["Ndryshoj përbërjen, përmasat, trajtën etj., kthehem në një gjendje tjetër; filloj të jem...; edhe fig. kthehem, shndërrohem; fitoj cilësi a tipare të tjera, jetoj e veproj si i tillë (edhe në një varg njësish frazeologjike). Bëhet i butë (i fortë, i lehtë, i lëmuar). Bëhet i bardhë (i zi,i kuq). Bëhet i ëmbël (i hidhur, i kripur). Bëhet i gjatë (i madh, i hollë, i gjerë). Bëhem i mirë (i urtë, i zellshëm, i shkathët, i bukur). U bë i pasur (i varfër). U bë i njohur (i famshëm, i fortë). U bë trim (hero). U bë i mërzitshëm (rrugaç). U bë budalla (qesharak). U bë qull. Bëhet akull. U bë një metër. Bëhet palë. U bë copë-copë (retra). U bë vrima-vrima (shoshë, shportë). U bë vendi gropë (breg, rrafsh). U bë qumështi hirrë. U bë dhëndër (nuse). U bë nënë. Bëhet shprehi (zakon, ligj, rregull). T'u bëftë gjak e dhjamë! ur. U bë brumë. U bë daulle (kacek, fuçi) u fry shumë. U bë fill (fshikull, furkë, finjë, gisht, trëndelinë...) u dobësua shumë, u tret e u hollua. U bë lopë (lundër) u shëndosh shumë, u fry. Ishte bërë pastërma ishte tretur e ishte tharë. Ishte bërë qiri ishte tretur. U bë dyllë (dhe, baltë, ftua, limon, gëlqere, çarçaf, mehit) në fytyrë u zbeh, u zverdh shumë në fytyrë, u irnos. U bë ujë (lëng) u lag shumë. U bë flakë (prush, spec, lulëkuqe) u skuq shumë në fytyrë. U bë tym (tym e mjegull). U bë një grusht (një dorë, lëmsh, gogël) u mblodh kruspull; u rrudh nga të ftohtët, nga frika etj. U bë lis u rrit shumë nga shtati. Bëhet kështjellë (kala, shkëmb graniti). U bë lolo (qole, palaço, brashnjë, leckë). U bë gogol (bubë). U bë pengesë (gardh, mburojë, barrikadë, prag, shteg). U bë simbol (flamur). U bë shembull. Të bëhet mësim! Bëhem shkak. U bë vegël e dikujt. U bë finjë toka u varfërua. U bë sterrë u nxi. U bë hi (shkrumb, thëngjill) u dogj krejt. U bë varr për dikë. Iu bë barku daulle (hambar, lodër) iu fry shumë barku. Iu bë qafa palë-palë. Iu bë barku petë (dërrasë, gropë) kishte uri të madhe, vdiq (ngordhi) për të ngrënë. M'u bë goja helm (pleh, shkrumb). U bë gjysmë njeriu u dobësua shumë; e humbi krejt. Iu bë jeta pus (skëterrë, varr). U bë çengel (kockë e lëkurë) u dobësua shumë. M`u bë koka dhallë (tym, daulle, finjë). M`u bë mendja dhallë (lëmsh, mulli, çorap). M`u bë mendja ujë e humba toruan. I bëhem (i gjendem) nënë e baba. M`u bë vëlla e shkuar vëllait m'u gjend si vëlla. M`u bë (si) burri i nënës (njerk) dikush përb. më është mërzitur shumë, s'e duroj dot, s'e shoh dot me sy. Themeli çati s'bëhet. fj.u. U bëftë gur! mallk.","vet. veta III. Rritet dhe piqet, arrihet (për pemët, për perimet); jep prodhim të mbarë, rritet e jep prodhim. U bë gruri. U bënë shpejt qershitë (fiqtë, manat). U bë rrushi. U bënë bathët (bizelet, kungujt, pjeprat). Nuk u bë misri atë vit.","Zhvillohem, rritem ose arrij në një gjendje a në një moshë të caktuar; vet. veta III është koha, është e domosdoshme a është e nevojshme për të kryer një veprim me diçka a me dikë ose për të marrë masa. U bë burrë (plak). M'u bë mjekra. Iu bë djali shok (vëlla) iu rrit i biri e u bë burrë. U bë për brisk u bë burrë. U bë gruri për të korrur. Iu bë vajza për martesë (për nuse). U bë kali për shalë. U bë djali për shkollë. U bë demi për zgjedhë. U bë buka për të hedhur në furrë. Është bërë dhoma për të fshirë. U bë toka për të mbjellë. Iu bënë flokët për të qethur. Është bërë për t`u rruar. Është bërë për faqe të zezë. Ishte bërë për hekura. U bë për pikë të hallit. Ç'u bë në këtë ditë! U bë për shkop u plak. Iu bë goja për arapash. Është bërë për ujë të ftohtë. Është bërë për në plasë të derës. Është bërë për të kuar është dobësuar shumë, s'është në gjendje të ushqejë veten nga pleqëria a nga ndonjë sëmundje. Ishte bërë për të qarë hallin. Është bërë për të vrarë. shak. U bëfsh njëqind vjeç! ur. Mos u bëftë të bëhet! mallk.","vet. veta III. Përgatitet; përfundon, mbaron, kryhet. Po bëhet gjella. U bë dreka (darka). U bë kafeja. U bë shtëpia. Detyra u bë. Bëhem gati përgatitem. Gur, gur bëhet mur. fj.u. S`bëhet vreshti me urata, po me shata e me lopata. fj.u.","vet. veta III edhe fig. Formohet, krijohet, ngrihet; më shfaqet diçka në trup etj.; më del, më kthehet në diçka, më shndërrohet. U bë një vrimë e madhe. U bë rrugë (shteg). U bë një vijë. U bë gropë. Iu bë koka me xhunga. Iu bënë buzët me plagë. Iu bë fytyra me puçrra. M'u bënë duart me kallo. Iu bë një gungë (një plagë). Iu bë lëkura pulla-pulla. M'u bë një lëmsh (një nyjë, një komb) në fyt (në grykë). Iu bë lak në fyt (në grykë). Më bëhet xhumbë në grykë (në bark). Iu bë buka drokth (gorricë, gjemb, shirit) nuk i shkonte buka poshtë, nuk i hahej (për shkak të një hidhërimi, shqetësimi etj.).","vet. veta III. Ndodh, ngjet, zhvillohet; veprohet në një mënyrë të caktuar. U bë një mbledhje. Ndeshja nuk u bë. Sot nuk u bë mësim. U bë dasmë e madhe. U bë konferenca (kongresi). U bë një demonstratë (një grevë, një manifestim). Bëhet një parakalim (një paradë). Gjyqi u bë. U bë luftë (kasaphanë). Ç'u bë me të? Si i bëhet? Ç`po bëhet aty? U bë ç`u bë. Le të bëhet ç`të bëhet! S`u bë kiameti!","fig. Vij në gjendje shpirtërore a shëndetësore të caktuar. U bë i lumtur (i pakënaqur). U bë me inat (me qejf). U bë helm (vrer, pikë e vrer). Bëhem merak merakosem, shqetësohem. Bëhem shend e verë. U bë keq u sëmur rëndë. U bë më mirë u përmirësua nga shëndeti.","vet. veta III. Kthehet në pronë të dikujt, i përket, i takon; vlen si..., kthehet. Pasuritë u bënë të popullit. Arti është bërë i masave. U bë qëllimi i jetës së tij.","Fitoj një profesion, një mjeshtëri etj.; marr një gradë a një titull; caktohem, emërohem në një punë a zgjidhem në një organ; marr përsipër një detyrë, kryej detyrën e... U bë mekanik (tornitor, traktorist, minator, mësues). U bë shkrimtar (piktor, muzikant). U bë mjek (inxhinier). U bë Artist i Popullit (Mësues i merituar). U bë kryetar (drejtor, brigadier, deputet). U bë dëshmitar (dorëzënës).","Merrem vesh a lidhem me dikë për një punë, hyj në marrëdhënie a në lidhje me të; pajtohem në mendime me dikë; bashkohem, shkoj me dikë, afrohem shumë. Bëhemi miq (shokë, krushq). U bë aleat. Bëhem me të. U bë kundër dikujt. Bëhem i shtëpisë familjarizohem. Nuk bëhen midis tyre. bised. nuk kanë marrëdhënie të mira, nuk japin e marrin, nuk hyjnë e dalin.","Lyhem me diçka; fëlliqem, përlyhem, ndotem. Bëhem me shkumë. Bëhej me pudër (me të kuq). U bë me baltë (me pluhur, me bojë). U bë me njolla. U bënë me gjak.","bised. Pajisem me diçka që më mungonte; më shtohet në familje dikush që më mungonte; gjej për vete diçka, siguroj. U bë me shtëpi. U bë me orë (me biçikletë). U bë me nuse (me grua). U bë me djalë (me çupë, me fëmijë). U bë me nip (me mbesë). U bë me prindër (me baba, me nënë). U bë me vëlla (me motër). U bë me shokë.","vet. veta III. Kalon një kohë e caktuar, mbushet një afat; arrin, është. U bënë dhjetë vjet. U bë viti (moti). Po bëhen tre muaj. U bënë tri orë. U bë ca kohë që.. . Sa ditë u bënë? U bë një jetë e tërë. U bënë ditët. U bë koha për t`u nisur. U bë vonë.","kryes. veta III vet. kr. thj. mospërf. Nuk është i asaj moshe a i asaj shkalle ose nuk ka atë vlerë, që të krahasohet me mua; nuk është i denjë për t'u barazuar me dikë, nuk meriton të përfillet. U bë dhe ai... U bëtë dhe ju.. . U bëre dhe ti... U bë dhe koka e tij! U bë veza të mësojë pulën! iron.","bised. Hiqem, mbahem si...; shtirem. Bëhej për i ditur (për i zgjuar). Bëhej për budalla (si i paditur). U bë i sëmurë (si i vdekur).","edhe pavet. Më duket, më del, më shfaqet, më ngjan si... Më bëhet sikur.. . Më bëhet në ëndërr. M`u bë si im vëlla. M`u bë fytyra e nënës para syve.","fig. bised. Më del emri për diçka të keqe, fitoj nam të keq; më ngjitet diçka, krijohet mendim i keq rreth meje. U bë me fjalë (me llafe). U bë me njollë (me cen). U bë emër (u bë nam) ia zënë emrin në gojë për të keq, ka marrë nam të keq.","kryes. sh. bised. Arrijmë një sasi të caktuar, jemi (si numër); bashkohemi disa veta, mblidhemi së bashku. Bëhemi tetë veta në shtëpi. U bëmë pesë shokë. U bënë dyqind kokë dele. Sa thasë bëhen gjithsej? Sa veta bëhen? U bënë gjashtë brigada pune. Nuk bëhen shumë. U bënë njëqind lekë. Bëhen a s`bëhen dhjetë.","bised. Ndodhem diku; vet. veta III gjendet, është. Ç`u bëre? Nga bëhet ai? Se nga bëhet. Ç`u bënë këpucët? Ç`m`u bë lapsi?","bised. Lëviz, zhvendosem. Bëhu më tutje! Bëhem mënjanë.","vet. veta III bised. Përbëhet. Fshati bëhej nga dyzet shtëpi.","pavet. S'kam dëshirë për diçka, nuk më pëlqen, nuk më vjen për mbarë. S`më bëhet të ngrihem. S`më bëhet të iki. S`më bëhet ta shoh. S`më bëhet të lexoj. S`më bëhet ta zë me dorë.","pavet. Vjen një mot i caktuar; krijohet një gjendje tjetër e kohës ose e mjedisit. U bë ditë (natë). Bëhet mëngjes. U bë vapë (nxehtë, zagushi, ftohtë, fresk). U bë thatësirë (lagështi). U bë mjegull. U bë errësirë (dritë). U bë qetësi (rrëmujë). U bë pus u vrenjt shumë, u err fare.","Përd. pavet. sipas kuptimeve të foljes BËJ. S`ka si bëhet. Sipas vendit bëhet kuvendi. fj. u.","Pës. e BËJ. * U bë abanoz shih tek ABANOZ,~I. M’u bë akrep shih tek AKREP,~I I. Janë bërë ashër shih tek ASH/ËR,~RA. U bë edhe (një herë) kaq (aq) shih te KAQ. U bë barut shih te BARUT,~I. I bëhet barrë shih te BARR/Ë,~A","U bë begun shih te BEGUN, ~I. U bë behar shih te BEHAR,~I. Iu bë (i ra) bela dikujt shih te BELA,~JA. U bë bërllok shih te BËRLLOK,~U. U bë bilbil shih te BILBIL,~I. U bë bishë (ujk) shih te BISH/Ë,~A. U bë bisht (sëpate) shih te BISHT,~I. U bë bishtajë shih te BISHTAJ/Ë,~A. U bë bllacë shih te BLLAC/Ë,~A. U bë bozë shih te BOZ/Ë,~A. U bë buburrec shih te BUBURREC,~I. U bë bunacë shih te BUNAC/Ë,~A. Bëhem burrë shih te BURR/Ë,~I 1. U bë byk shih te BYK,~U. Sa më s'bëhet sa s`ka ku të vejë më shumë. U bë cironkë shih te CIRONK/Ë,~A. M'u bë cjepurr shih te CJEPURR,~I. U bënë cokla shih te COK/ËL,~LA. Bëhem copë (copa, copash) shih te COP/Ë,~A. Copë të bëhet! shih te COP/Ë,~A. I bëhem çandër shih te ÇAND/ËR,~RA. U bënë çull shih te ÇULL,~I. Bëhu def! shih te DEF
