<script>window.__INITIAL_DATA__ = [{"slug":"thur","term":"THUR","attributes":["kal."],"definitions":["Bashkoj, tërheq e shtrëngoj fort dy a më shumë fije, degë, thupra etj., duke i gërshetuar njërën me tjetrën; i bëj si gërshet; i lidh në një të vetme e bëj diçka me to; kund. shthur. Thurin kosha (rrogoza, litarë, shporta). Thur kurora. Thur flokët gërsheta. Thur një cigare pleks një cigare, mbështjell duhanin me letrën e tij në një cigare.","E rrethoj diçka me gardh, i vë gardh një vendi, i bëj një thurimë, gardhoj. Thur me gardh. Thuri livadhin (kopshtin) me driza. I thurën pemët me kallama.","Bëj çorape, triko a një veshje tjetër me fije leshi, pambuku, mëndafshi etj., punoj çorape triko etj. me shtiza, me grep, me makinë; kund shthur. Thur çorape (triko, fanella). Thur me shtiza. E thuri lirshëm (shtrënguar).","fig. Lidh në mënyrë të harmonishme dy a më shumë pjesë përbërëse, dukuri a veprime, ndërthur, gërshetoj; bashkoj mirë disa pjesë në një të tërë të vetme; ndërtoj a sajoj diçka duke bashkuar në një të vetme pjesët përbërëse. Thur ngjarjet. I thur bukur mendimet.","fig. Krijoj me gojë a me shkrim diçka, shkruaj një vepër letrare, artistike etj., hartoj; e sajoj, e nxjerr vetë i pari një gjë. Thur një histori (një përrallë, një tregim, një hartim, një legjendë). Thur një këngë. Thur me mend. I thur lavde dikujt e lavdëron shumë dikë, e ngre në qiell.","fig. Krijoj diçka të ngatërruar e djallëzore për të dëmtuar dikë, për ta shkatërruar etj.; kurdis një gjë të keqe për një tjetër. Thuri një intrigë. Thurnin komplote (plane kriminale).","bised. përçm. E mbyll; i vë gardh, nuk e lë hapur. Ia thuri gojën! Thure grykën! U thurtë ajo shtëpi! mallk. u mbylltë, u shoftë e u shkretoftë ajo shtëpi! * Thur e shthur bën e prish, nuk e rregullon, s'e ndreq (për një punë që s'mbaron). Thur livadhin e lë shtegun hapur bën një punë, po s'e çon deri në fund; s'ka vlerë puna që s'përfundohet."]}]</script>
