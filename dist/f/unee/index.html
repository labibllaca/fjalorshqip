<script>window.__INITIAL_DATA__ = [{"slug":"unee","term":"UNË","attributes":[],"definitions":["(dhan., kallëz. MUA, tr. e shkurt. MË; rrjedh. MEJE) vetor. 1. Përdoret nga ai që flet a që shkruan për veten. Unë vetë pikërisht unë. Unë dhe ti. As ti as unë. Unë fola. Unë e njoftova. Vetëm unë isha. Do të shkoj edhe unë. E di unë. E presin nga unë. Më vjen keq. Më lajmëruan. S'më takon mua. S'më kujtohet. Ç'ke me mua? S'është as për mua as për ty. Këtë e ka prej meje.","si em. m. UNI. Tërësia e tipareve që përbëjnë thelbin e njeriut si individ i caktuar dhe për të cilat ai është i vetëdijshëm, qenia e vet, vetvetja në botën që e rrethon njeriun; let., art. veçoritë e botës së krijuesit, të shprehura në vepër; filoz. subjekti; keq. tërësia e vetive të një njeriu, të cilat ai përpiqet t'i vërë në dukje në çdo kohë e me çdo kusht, vetja; bota e ngushtë e dëshirave dhe e interesave vetjake të një njeriu, të cilën ai kërkon ta vërë mbi çdo gjë tjetër, mbi interesin e përgjithshëm. Uni poetik (lirik). Fryma e unit. Ngre krye (nxjerr kokë) uni. Shpreh unin e vet. Flet uni. Vë (nxjerr) përpara unin. E bren (e pengon) uni. S'e lë uni. E mposhti (e mundi) unin."]},{"slug":"unee","term":"UNË","attributes":["f.","sh."],"definitions":["Veprimtari e dobishme që kryen njeriu, duke përdorur forcën e vet të krahut e të mendjes dhe vegla e mjete të ndryshme, për të shndërruar natyrën sipas nevojave të veta, për të prodhuar të mira materiale, për të krijuar vlera shpirtërore a për një qëllim tjetër të vetëdijshëm; veprimtari e ndërgjegjshme prodhuese, krijuese, organizuese etj. e njeriut ose e shoqërisë dhe mënyra si kryhet kjo; lloji i veprimtarisë a detyra që kryen çdo ditë një njeri ose një grup njerëzish në industri, në bujqësi, në shkencë a në një fushë tjetër; lloji i shërbimit që i bëhet diçkaje; mjeshtëri, zanat, profesion. Në marrëdhënie pune. Me (pa) shkëputje nga puna. Metodë pune. Metoda dhe stili në punë. Ndarja e punës. hist. Ndarja e punëve në familje. Shprehitë e punës. Ndjenja (edukata) e punës. Disiplina në punë. Frytet e punës. Rendimenti në punë. Analiza e punës. Krahët (mjetet, veglat, forcat) e punës. Kafshë pune. E drejta për punë. Dashuria për punën. Këngët (vallet) e punës. Paaftësi e përkohshme në punë. Aksident në punë. Punët e ditës (e stinës) në bujqësi. I ngarkuari me punë. dipl. Ministria e Punëve të Jashtme. Ministria e Punëve të Brendshme. Ministria e Punëve Botore. vjet. Medalja e Punës. I mbaroi të gjitha punët. Ka shumë punë. Puna ecën mirë (mbarë). Filloi (u ndërpre) puna. Hyri në punë. Ka punë e punë. Puna të mëson vetë. Punë me (pa) përgjegjësi. Mos bëj punë shkel e shko! Qëndrimi kundrejt punës. Me ç`punë merret? Duhet punë. Filloi nga puna. Puna është nder. Puna hap (sjell) punën po punove, të dalin patjetër edhe punë të tjera. Zuri (gjeti) punë. Ia mori dorën punës. Është njeri i punës. Puna e njeh njeriun. fj. u. Puna çan malet. fj. u. Pa punë s`ka gunë. fj. u. E ka punën në gjak. Fjalë pak e punë shumë. Punë, punë natë e ditë që të shohim pakëz dritë. fj. u. Nga secili sipas aftësive, secilit sipas punës. Punën e sotme mos e lër për nesër. fj. u. Fjala fjalë e puna punë! nuk duhen ndarë fjalët nga veprat, atë që thua duhet ta bësh. Puna e mbarë! ur. Puna për hapjen e tokave të reja. Puna me normë. Puna në klasë. Në punë e sipër. Në valën (në kohën) e punës. Gjatë (pas) punës. Në ballë të punës. Me punë jashtë orarit. Ishte i zënë me punë (i mbytur në punë). Kam një mal me punë (një kalë punë) kam shumë punë. Nuk rri pa punë. Zien puna punohet me vrull. Vrulli në punë. Është me punë në... Shkoi në punë. I ngarkoi një punë. Kategoria e punës. Plani (orari) i punës. Dita e punës. Ditë pune. Librezë pune. Qendra e punës. Vend (front) pune. Brigadë pune. Tryezë (dhomë, rroba) pune. Punë vetëmohuese (këmbëngulëse). Punë me hope. Punë e lehtë (e rëndë, e vështirë, e detyrueshme). Punë e pamjaftueshme (e përciptë, e dobët). Punë laboratorike. Punë praktike. Punë dore. Puna me dru (me metal). Punë me shkrim. Puna jashtëshkollore. Punë vullnetare. Punë në prodhim. Punë angari. Punë me mëditje. Punë fizike (mendore). Punë prodhuese. Punë shkencore (kërkimore, krijuese). Punë mësimore (edukative, bindëse, sqaruese). Punë politike (ideologjike, ideopolitike). Punë shoqërore (administrative, drejtuese, e përbashkët). Punë propagandistike (kulturore, artistike). Punë përçarëse (minuese). Puna e gjallë (e diferencuar) me njerëzit (me nxënësit). Punë përgatitore (paraprake). Program pune. Iu vu (i hyri, iu përvesh) punës. Ia vari punës. S`ia del njeri për punë është shumë i fortë a i zoti për punë. Është i shtruar në punë. S`i ka duk (grat) puna nuk ka ndonjë dobi nga puna e tij, i shkon puna kot. I rri punës mbi kokë (mbi krye) kujdeset shumë për punën a për një çështje që duhet zgjidhur, nuk i ndahet. S`i bën bisht punës. Nuk i lë punët zvarrë. I ka vënë gjoksin (shpatullat) punës. I shtie hile punës dikush punon me hile. I vunë punët përpara.","bised. Vendi (ndërmarrja, institucioni etj.) ku punon dikush; kolektivi ku punon dikush. Shokët e punës. E mori djalin në punën e vet. Ku ke punën, shtro (edhe) gunën. fj. u. I erdhi gjithë puna.","Diçka që duhet bërë; çështje që duhet sqaruar a zgjidhur; çështje që ka të bëjë me dikë ose që varet nga dikush a nga diçka; çështje që të shqetëson, hall; bised. shkak, arsye. Punë boshe. Punë burrash. iron. Punë grash. mospërf. Punë fëmijësh. mospërf. Punë pa krye. Puna është se ... Si do të vejë puna?! U pa kjo punë. Këto janë punë të thella. Merrej me punën e... I bie punës prapa kujdeset për një çështje, e ndjek atë derisa të zgjidhet. I vlen rreth punës (asaj pune) dikush kujdeset për një çështje, i bie prapa punës. I vuri punët me radhë i vuri punët në rregull, i vuri në vijë. I ka punët në vijë (për fije) i ka punët fare mirë, çdo gjë i vete mbarë. Janë punët kokë e këmbë (këmbë e krye) janë ngatërruar punët, janë herë lëmsh. E di ujë atë punë dikush e di shumë mirë, e njeh fare mirë. Ia bëri punën livadh (shesh me lule) dikujt ia paraqiti diçka si shumë të lehtë për t'u bërë. S`më prish ndonjë punë. Është punë kohe (ditësh). Nuk pret puna. Është puna ime. Është punë për mua. S'është punë për ty. S`është puna aty. U trash puna. Si qëndron puna? Na hapi punë. I hopi punë vetes. I nxori shumë punë. U mbyll ajo punë. T’i vëmë kapak kësaj pune! ta mbyllim këtë çështje!, të mos e zgjatim më tej, t'i vëmë pikë! U jep udhë punëve. I merr punët shtruar. I lë punët varur dikush i zgjat gjërat e i lë pa zgjidhur, nuk thotë as «po», as «jo». I lë punët gjetur dikush nuk përpiqet fare ta sqarojë a ta zbërthejë diçka; e lë ashtu siç është, nuk vepron a nuk kujdeset fare për diçka. I bëri punët lëmsh. Puna bëri bujë (ra në erë), ia tregoi punën me hollësi. S'ka gisht në atë punë. I ra në të punës. S'e çan kokën për atë punë. Ja si qenka puna! Kam punë me të. Ndalohet hyrja pa punë! Më solli puna këtu. S`më shpie (s`më çon) puna atje s'kam të bëj me dikë a me diçka. E pleqëroi punën me të. E peshoi mirë punën. Ç`punë ke ti me të? Ai e ka punën në dorë prej tij varet gjithçka, ai vendos. Ashtu e kishte punën. S`dihet si e ka pasur punën. Mos fut hundët në punët e botës! Ua prishi punët u hapi telashe, i pengoi. Ishte punë inati. S` është punë për të qeshur (për t'u tallur) është punë me rëndësi, duhet marrë seriozisht kjo çështje. U zunë për punë librash. U shqetësuan për punë të djalit. U lodh shumë nga puna e dasmës. Nuk erdhi dot për punë të sëmundjes. Për ç'punë e bëre këtë? Ndodhi pa punë ndodhi kot, pa asnjë shkak. Punë e pa punë me arsye e pa arsye, me shkak e pa shkak. Kësaj i thonë (kjo është) punë pa punë! të bësh punë pa nevojë e pa dobi, t'i nxjerrësh vetes punë kot.","Lëvizja që bën e veprimtaria që kryen një organ, një organizëm, një aparat, një mjet etj. Puna e zemrës (e stomakut, e veshkave). Puna e orës (e motorit, e makinës). Puna e muskujve të krahëve. Regjimi i punës (së një makine). mek. E vë makinën në punë. E bëri gati për punë.","Fryti i veprimtarisë prodhuese me cilësitë dhe vlerat e tij të tjera, ajo që arrin të bëjë dikush gjatë procesit të prodhimit; sendi, vegla etj. që prodhon punëtori a punonjësi; rezultati i veprimtarisë së dikujt; punim. Punë shkencore. Punë e mirë. Punë vjetore (diplome). Punë kryq (punë shkop, punë zinxhir) Hoje qëndisjesh. Punë me vlerë. Cilësia (sasia) e punës. I mati punën. Nxori punë të pastër. I mori punën në dorëzim. Kishte marrë edhe punën me vete.","fiz. Rezultati i veprimit të një forcë mbi një trup, e cila e zhvendos trupin në një drejtim të caktuar dhe shoqërohet me harxhim energjie. Punë mekanike. Njësitë e punës. Formula e punës. Treguesit e punës. Pa forcë nuk mund të bëhet punë. Harxhohet punë.","Gjendja, rrethanat në të cilat ndodhet dikush lidhur me diçka; gjendja e marrëdhënieve të dikujt me dikë. E ka punën pisk (keq, mirë). E ka punën grurë me dikë. Nuk i kanë punët mirë.","bised. Rasti. Me që ra puna. Ra puna kështu. Puna e solli që... Më ka rënë puna të dëgjoj. Puna e nxori në një fshat.","bised. Diçka e ngjashme me një send, lloj, farë. I ra si një punë damllaje. U duk një punë mize. * Bën punë diçka vlen, sjell dobi. Më bëri punë të madhe (më bëri shumë punë) dikush a diçka më ndihmoi shumë, më zgjidhi një hall të madh, më dha dorë, më lehtësoi shumë. Djall (dreq) o punë! thjeshtligj. shih te DJALL,~I. E do puna është e domosdoshme, duhet. Ia do puna i duhet; është i detyruar ose ka interes të veprojë në këtë ose në atë mënyrë, s'ka si të veprojë ndryshe. Hyn në punë diçka vlen, është e dobishme. S'më hyn në punë edhe poh. shih te HYJ. Kryet e punës ai që është kryesori, ai që ka përgjegjësinë më të madhe, drejtuesi, kryetari. Të lan me punë dikush është punëtor i madh, është shumë i zoti për punë, s'e ka shokun për punë. I mbaroj punë dikujt shih te MBAROJ. S'të mbaron punë shih te MBAROJ. Ndryshon puna shih te NDRYSHOJ. E para e punës shih te PARA (e). Nuk më pret puna (koha) shih te PRES II. M'u prish puna! mospërf., iron. shih te PRISHEM. S'prish punë shih te PRISH. Punë dreqi! shih te DREQ,~I. Punë e madhe! mospërf. nuk ka gjë, nuk prish punë. Punë e madhe fort! nuk e çaj kokën fare, nuk më bëhet vonë, nuk merakosem fare. Punë e verdhë shih te VERDHË (i,e). Flet puna vetë është e qartë, s'është e nevojshme që të jepen shpjegime a sqarime. Sa për t'u gjendur (Kola) në punë shih te GJENDEM. Hyri në punë (në bukë) të qeverisë u bë nëpunës shtetëror. Nuk është punë që bëhet është e pamundur, nuk bëhet. E këput (e ndan, e pret, e qëron) punën dikush i ka gjërat të qarta e të prera, po-në e ka po dhe jo-në jo, nuk i zvarrit gjërat. E ndau punën dysh shih te DYSH. I qan puna në dorë dikujt është tepër i ngathët e i plogët, s'është i zoti për punë. Qan puna për të zotin çdo punë kërkon njeriun e përshtatshëm (thuhet sidomos kur dikush është i paaftë e nuk e përballon dot një punë a detyrë). Sheh puna punën shih te SHOH. E kam shkrehur të punë nuk mendoj e nuk shqetësohem më për diçka, kam hequr dorë, ia kam hequr fillin një pune. S'është gjë puna e tij nuk të mbaron punë ai, mos prit të mira prej tij. Vajti puna e tij! mbaroi, kaq e pati! Fjalët të ëmbla, punët të tharta shih te FJAL/Ë,~A. Kur s’ke punë, luaj derën! mos rri asnjëherë pa punë!, diçka duhet të bësh patjetër, sado e vogël qoftë! Një rrugë (udhë) e dy punë shih te RRUG/Ë,~A. Për çdo punë puth dorën e tij shih te PUTH. Ajo punë euf. sëmundja e tokës, epilepsia. Punë e gjallë ek. puna që bëhet nga njeriu duke përdorur vegla dhe objekte të ndryshme për të dhënë një prodhim të ri. Puna e herës euf. sëmundja e tokës, epilepsia. Puna e hënës euf. sëmundja e tokës, epilepsia. Puna e truallit euf. sëmundja e tokës, epilepsia."]}]</script>
