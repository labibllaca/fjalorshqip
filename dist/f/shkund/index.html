<script>window.__INITIAL_DATA__ = [{"slug":"shkund","term":"SHKUND","attributes":["kal."],"definitions":["Tund me forcë një pemë ose godas me shkop degët e saj që të bien kokrrat e pjekura. Shkund manin (dardhën). Shkund ullinjtë. Shkund me purtekë. I ka shkundur era.","Tund me forcë rrobat, qilimat etj. ose i rrah me shkop a me diçka tjetër që t'u ikë pluhuri e t'u bien papastërtitë; bëj që të shkëputet e të bjerë diçka nga një send, duke e tundur këtë me forcë. Shkund rrobat (çarçafët, qilimin, mbulesën e tryezës). Shkund thesin. Shkund shportën e bukës. Shkund llullën (çibukun). Shkund hirin e cigares. Shkund thërrimet nga përparësja. Tjetër i shkund, tjetër i ha. fj. u.","E kthej menjëherë dhe e pi deri në fund, s'lë asnjë pikë, e shkulloj, e shpik, e përmbys (zakonisht për gotën a shishen me pije alkoolike). E shkundi gotën menjëherë. I shkundën shishet.","fig. bised. I marr e i harxhoj a i shpërndaj të gjitha ç'ka brenda një send, një enë, një vend etj. ose marr a harxhoj një sasi shumë të madhe prej tyre; e zbraz fare diçka, e lë pa gjë (zakonisht për paratë, për plaçkat e mallin e shtëpisë etj.); e detyroj dikë që të harxhojë shumë të holla a ushqime për mua. E shkundi qesen (kuletën). I shkundi xhepat. E shkundi shtëpinë. E shkundi hambarin. I shkundën dyqanet blenë shumë gjëra. Na shkundi fare.","fig. Rrëzoj me forcë një pushtet shtypës a një sundim të huaj; përmbys. E shkundën zgjedhën e huaj (robërinë).","fig. E gjallëroj dikë, e vë në lëvizje, e bëj të mendojë e të veprojë duke e nxjerrë nga plogështia e nga mefshtësia; e bëj të vetëdijshëm për përgjegjësinë që ka, e sjell në vete, e bëj që të heqë dorë nga pikëpamjet, qëndrimet e sjelljet e gabuara. E shkundi kritika (fletërrufeja). E shkundi nga gjumi (nga plogështia). Duhen shkundur mirë burokratët. * Aq mundi, aq shkundi bëri atë që mund të bënte, aq e kishte fuqinë a aftësinë. Shkund pemët e të tjerëve rron duke zhvatur nga njëri e nga tjetri, rron në kurriz të të tjerëve. E shkundi qesen a) i shpenzoi gjithë të hollat; bëri shpenzime të mëdha; b) nuk la gjë pa thënë, i nxori të gjitha ç'kishte. E shkundi thesin harxhoi gjithçka, harxhoi edhe gjënë e fundit, s`i mbeti gjë. E shkundi tërë thesin i tha të gjitha ç'dinte, e zbrazi barkun. Shkund urët nxit një punë që të kryhet, bëj përpjekje për ta shpejtuar një punë. Është shkund e ha atë që fiton sot e ha sot, nuk mendon fare për të nesërmen. Është tund e mos shkund punon, por pa dobi; nuk i ka duk puna. I peshon arrat pa i shkundur shih te PESHOJ. Ia ka shkundur era trutë nuk ka mend në kokë, është fare mendjelehtë. E shkund manin në prill (arrën në korrik) nuk ka durim fare, ngutet a rrëmbehet shumë; është i papjekur. Shkund me duar e shtyp me këmbe bën diçka të dobishme, por vetë e prish menjëherë; e mbush kusinë dhe pastaj e derdh me një shkelm."]}]</script>
