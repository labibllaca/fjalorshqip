<script>window.__INITIAL_DATA__ = [{"slug":"qiell","term":"QIELL","attributes":["m.","sh."],"definitions":["Hapësira e lirë me ajër që rrethon Tokën dhe që duket si kube mbi kokën tonë. Qiell i kaltër (i pastër, i kthjellët, i vrenjtur, i zënë, i errët, i zi). Qiell me (pa) re. Kupa e qiellit. Lart në qiell. U vrenjt (u nxi, u zu) qielli. U mbulua qielli me re. U kthjellua (u pastrua) qielli. U bë qielli pus u nxi, u vrenjt shumë. Fluturon në qiell. Ngrihet në qiell. Bojë qielli i kaltër. Bie shi gjerbë qiejsh bie shi shumë i rëndë, me shtambë. Asgjë nuk vjen (nuk bie) nga qielli asgjë nuk bëhet vetvetiu, çdo gjë arrihet me punë e mundim.","Hapësira e lirë dhe e pafund, në të cilën shihen nga Toka Dielli, Hëna e yjet; hapësira e lirë dhe e pafund që duket nga një trup tjetër qiellor. Qielli i Tokës (i Hënës, i Marsit). Harta e qiellit. Yjet e qiellit. Qiell me yje. Ra një meteor nga qielli.","fet., vjet. Vendi ku, sipas besimeve të kota fetare, gjoja banojnë perënditë, engjëjt, shenjtorët etj.; hyjnia, forca e mbinatyrshme që, sipas paragjykimeve fetare, gjoja sundon mbi njerëzit. Perënditë (engjëjt) e qiellit. Nuk besojmë më te qielli. Nuk presim ndihmë nga qielli. Nuk i mbajmë sytë nga qielli.","fet., vjet. Parajsë. Besonin se u shkonte shpirti në qiell. * Ra nga qielli u bë ose erdhi vetvetiu a papritur. M'u hapën (m'u çelën) qiejt u gëzova shumë. Hidhu në qiell (hidhu përpjetë)! shih te HIDHEM. Me krye (me kokë) në qiell a) shumë i gjatë, shumë i lartë; b) keq. mendjemadh. Mbretëria e qiellit fet. shih te MBRETËRI,~A. E ngriti (e hipi, e çoi) në qiell dikë e lëvdoi shumë dikë a diçka; e mburri sa s'ka ku të shkojë më. I pikuar (i pikur) nga qielli shumë i mirë a shumë i bukur, që dallohet shumë nga të tjerët për veti të mira e të rralla. Në qiell të hapur libr. jashtë, në natyrë. Sikur qielli të përmbyset (të shembet) në asnjë mënyrë, kurrë. Si qielli me tokën shumë larg njëri nga tjetri. (Si) i rënë nga qielli a) shumë i mirë, shumë i bukur, pa ndonjë të metë,
