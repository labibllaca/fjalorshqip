<script>window.__INITIAL_DATA__ = [{"slug":"ndihem","term":"NDIHEM","attributes":["vetv."],"definitions":["vet. veta III. Rroket me anë të veshit, dëgjohet, tingëllon, i vjen zëri a tingëllima. Ndihen hapat e tyre. Ndihet zhurma e ujit. Ndihej një këngë.","Bëj zhurmë duke lëvizur, duke folur etj.; kuptohet se jam i pranishëm nga zhurma që bëj ose nga zëri, dëgjohem. Nuk ndihet njeri në shtëpi. Ecën pa u ndier. Foshnja nuk u ndie më. Mos u ndiej!","fig. (zakonisht me pjesëzat mohuese nuk, s, mos). Has ose veproj për ta treguar veten, përpiqem të dëgjohem; kundërshtoj me fjalë. Njeri që nuk ndihet njeri i qetë, i shtruar; njeri i urtë.","Kam një ndjenjë fizike ose shpirtërore, jam në një gjendje të caktuar. Ndihem lehtë (mirë). Ndihem i lodhur (i këputur). Ndihej i gëzuar. Ndihem ngushtë e shoh veten në një gjendje të vështirë. Si ndihesh?","vet. veta III. Është i dukshëm, vihet re, mund të shihet a të kapet me shqisat ose me ndjenjat. Ndihet nevoja (mungesa). Ndihet një atmosferë entuziazmi. Ndihet afrimi i pranverës. U ndien lëkundje tërmeti.","vet. veta III. Ushtron një veprim, sjell një pasojë, lë një gjurmë. Ndihet ndikimi. U ndien pasojat. U ndie jehona e revolucionit. Ndihet dora e tij.","Pës. e NDIEJ 1, 3-6. * Nuk u ndie i gjallë a) ndenji krejt i qetë, nuk pipëtiu, heshti; b) nuk veproi në një rast kur duhej. Nuk ndihet (nuk dëgjohet) as miza shih te MIZ/Ë,~A. Do t'i ndihet (do t'i dëgjohet) shurukama shih te SHURUKAM/Ë,~A."]}]</script>
