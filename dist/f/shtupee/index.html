<script>window.__INITIAL_DATA__ = [{"slug":"shtupee","term":"SHTUPË","attributes":["f.","sh."],"definitions":["Pjesa me fije më të trasha që del pas krehjes së lirit a të kërpit dhe që përdoret për të mbushur dyshekë, shilte etj. ose për të zënë të çarat e vozave, të barkave etj. Shtupë kërpi (liri). Ndaj gjethin nga shtupa. Zë të çarat (vrimat) me shtupë. Mbush shilten (samarin) me shtupë.","Një copë leckë e mbledhur shuk, misërishte, dru etj., që përdoret në vend të tapës për të mbyllur një shishe, një shtambë, një bucelë etj.; leckë a diçka tjetër (fije liri etj.), që përdoret për të zënë të çarat e vozave, të barkave etj.; leckë që përdoret për të larë enët ose dyshemenë, sukull. Shtupë lecke. Shtupë enësh. Shtupa e shishes (e katruves, e bucelës). I vë (i heq) shtupën. Zë (mbyll) me shtupë. I shkoj (i bie) një shtupë dhomës (shtëpisë).","min. Lënda me të cilën shtupohen birat e minave.","Diçka e thatë, pa lëng dhe e ngjeshur; shuk mishi a i një ushqimi tjetër, që ka mbetur pa lëng nga të përtypuri e të mbajturit gjatë në gojë dhe nuk gëlltitet dot. Shtupë djathi. Shtupë mishi.","përd. mb. I thatë, i ngjeshur e që mezi përtypet (zakonisht për disa ushqime që duhet të jenë të buta e me lëng). E paska bërë përsheshin shtupë. Iu bë shtupë mishi në gojë. * Ia la shtupë dikujt ia la dikujt një punë në gjendje të atillë, që të mos dijë se nga t'ia mbajë, ia la punët shuk. E ka bërë shtupë enësh dikë e ka bërë leckë fare dikë, e ka marrë nëpër këmbë. I ishte bërë zemra shtupë e ka humbur fare guximin, i është ligështuar zemra, i është bërë zemra leckë. I doli puna shtupë i doli puna bosh, s'pati asnjë dobi, s'nxori gjë në dritë. Ia kanë mbyllur (ia kanë zënë, ia kanë vulosur) gojën me shtupë nuk e lënë të flasë, e kanë detyruar të heshtë. I vuri shtupën (tapës) gojës e mbylli gojën, nuk flet fare, e kyçi gojën."]}]</script>
