<script>window.__INITIAL_DATA__ = [{"slug":"prag","term":"PRAG","attributes":["m.","sh."],"definitions":["Brez i trashë prej guri, prej betoni a prej druri, që vihet për së gjeri në pjesën e poshtme të derës dhe që shërben si mbështetje për këtë. Pragu i derës. Pragu i shtëpisë. Prag prej guri. Kaloi (kapërceu, hodhi) pragun. Doli (rri) te pragu. U ul në prag. U rrëzua (u pengua) fëmija te pragu.","Brez prej guri, prej betoni a prej druri, që vendoset në pjesën e poshtme të dritareve; rrasë e gjatë dhe e trashë katërkëndëshe prej guri që vihet mbi këmbët e oxhakut, buhari. Pragje dritaresh. Pragu i oxhakut.","fig. Vendi i banimit, shtëpia; familja; atdheu. Pragu im. Prag më prag shtëpi më shtëpi, në çdo shtëpi. Miq na pastë pragu! S'ka dalë nga pragu sot ka ndenjur brenda në shtëpi, s'ka dalë fare jashtë. S`do të lejojmë kurrë të na shkelë armiku pragun (pragjet tona). S`ia kam shkelur (s`ia kam parë) pragun s'kam qenë asnjëherë në shtëpinë e tij, s'ia kam shkelur derën. Iu shua pragu mbeti pa njeri, u shkretua. Rri në prag nuk largohet nga shtëpia a nga fshati i tij, nuk shkon për të punuar në një vend tjetër.","Pllakë e trashë guri, aq e madhe sa mund të rroket me duar. Mori një prag.","Dru i gdhendur me katër faqe, që vendoset zakonisht në pjesën e përparme të shtratit të qerres, të sajës, të lesës etj., ku mbërthehen pjesët e tjera. Pragu i qerres (i lesës, i sharrës).","Pjesë e ngritur e me pjerrësi të vogël në shtratin e një lumi; brez guri që ndërtohet në shtratin e lumit për ta bërë rrjedhjen më të qetë; diçka që ka trajtën e një shkallareje ose të trarit. Pragje bore. Ka pragje lumi. Ndërtuan disa pragje.","Copë prej druri; ose prej ndonjë lënde tjetër të fortë, që vendoset për trupin e një vegle muzikore e mbi të cilën mbështeten telat, urë.","fig. Pengesë. Iu bë (i doli) prag dikujt. E kaloi pragun. S'ka prag që s`kapërcehet.","fig. Kohë që i paraprin një ngjarjeje të caktuar; koha para fillimit të diçkaje (zakonisht me parafjalën në). Në pragun e revolucionit (e çlirimit, e fitores). Në prag të zgjedhjeve (të festes). Në prag të martesës (të pleqërisë). Në prag të pranverës. Në pragun e jetës i ri në moshë, që sapo ka hyrë në moshën madhore.","spec. Madhësia më e vogël e diçkaje; kufiri, caku më i lartë i shfaqjes së diçkaje; shkalla a forca e shfaqjes së diçkaje. Pragu absolut i ndijimi. psikol. madhësia më e vogël e një ngacmuesi që shkakton lindjen e ndijimit. Pragu i dëgjimit. psikol. Intensiteti më i vogël i një tingulli që mund të shkaktojë ndijimin e të dëgjuarit. Pragu i dhembjes kufiri më i lartë i intensitetit, përtej të cilit ndijimi shkakton dhembje. * E kapërceu pragun dikush a diçka shih te KAPËRCEJ. Puthe pragun (po dole që këtej)! shih te PUTH. Është (ka ardhur, e kam) në prag të derës (në derë, te dera, prapa derës) shih te DER/Ë,~A. I bie pragut të dëgjojë dera nuk e thotë drejtpërdrejt atë që kërkohet, i drejtohet dikujt tjetër që ta kuptojë vetë ai që duhet, flet tërthorazi, i bie dritares të dëgjojë dera. I la një qime ujku te pragu (te dera) dikujt shih tek UJK,~U I."]}]</script>
