<script>window.__INITIAL_DATA__ = [{"slug":"kthej","term":"KTHEJ","attributes":["kal."],"definitions":["Sjell diçka nga ana tjetër (që të piqet, të skuqet, të thahet etj.). Kthej bukën (byrekun). Kthej petullat (patatet, qoftet). Kthej barin. Kthej qilimin.","E vë përmbys diçka që është mbarë, e përmbys një enë etj. Kthej gotën (filxhanin). Kthej pjatat. Kthej përmbys (një enë).","Lëroj tokën thellë në mënyrë që shtresa e poshtme të dalë me faqe sipër. Kthej arën (me traktor).","Shqep një veshje dhe e qep përsëri, duke vënë për faqe të jashtme atë që ishte e brendshme; nxjerr jashtë faqet e brendshme të një thesi, të një xhepi etj.; sjell mbarë një veshje. Kthej pallton (xhaketën, pantallonat). Kthej thesin (xhepin). Kthej nga astari. Kthej së mbari.","Përthyej anët a fundin e një pëlhure ose të një veshjeje dhe i qep. Kthej fundin e fustanit (e palltos, e pantallonave). Kthej anët e përparëses. Kthej pak mëngët.","Përvesh (mëngët). Kthej mëngët e këmishës.","E përkul diçka, i jap trajtë të lakuar; e përkul në anë të kundërt a në një anë tjetër. Kthej hekurin (gozhdën).","Rrotulloj; përdredh. Kthej timonin. Kthej kyçin. Ia ktheu dorën.","Lëviz trupin tim, një gjymtyrë të trupit, sytë etj. në anën e kundërt a në një anë tjetër; lëviz diçka dhe e vë në një drejtim tjetër a në një drejtim të caktuar; i drejtoj dikujt diçka; vë. Kthej kokën prapa (përpara, anash). Kthej trupin. Kthej sytë. Kthej këmbët. I ktheu krahët. I ktheu bajonetën.","Ndryshoj drejtimin e lëvizjes së diçkaje, i jap asaj drejtim tjetër nga ai që kishte më parë. Kthej veturën (kamionin). E ktheva nga rruga. Kthej vijën e ujit. Ktheu drejtimin e lumit.","I jap dikujt atë që ia kam marrë a që më ka dhënë. I kthej librin (gazetën, revistën). Ia ktheu huan (borxhin).","I jap dikujt një përgjigje, i dërgoj një letër etj.; bëj një veprim për t'iu përgjigjur një veprimi të mëparshëm të dikujt; i jap diçka dikujt si shkëmbim a si shpërblim për atë që më ka dhënë. I kthej përgjigje. Ia ktheva letrën. Ia ktheu përshëndetjen. I ktheva vizitën. Ia ktheu të mirën me të mirë.","Pi me fund; pi; derdh një enë a një gotë të mbushur. E ktheu tërë shishen. Kthyen nga dy gota birrë. Ktheu një gllënjkë. Ta kthejmë me fund!","bised. Zëvendësoj diçka me një tjetër; ndryshoj diçka sipas kohës, sipas kushteve të vendit ku jetoj etj.; shndërroj. Ktheu veshjen. Ktheu zakonet (gjuhën). E ktheu mbiemrin. Ktheu shtetësinë. E ktheu (rrugën) ndërroi rrugë, mori rrugë tjetër.","Shndërroj në një njësi tjetër, e llogarit me një njësi tjetër; e sjell në një gjendje a në diçka tjetër; bëj (edhe fig.). Kthej në centimetra (në decimetra, në metra). I ktheu në lekë (në dollarë). Kthej në gjendje të gaztë. Kthej fjalët në vepra. E kthej në festë.","Ia ndryshoj dikujt sjelljen ose qëndrimin, e bëj që të ndryshojë sjellje a qëndrim; bëj. Kthej dikë në udhë të drejtë (të mbarë). E kthej nga rruga e keqe. E ktheu pas vetes dikë.","Lë dikë në një provim, rrëzoj. Nuk ktheu shumë.","bised. Përkthej; sjell në një gjuhë më të kuptueshme. Kthej në gjuhë të huaj. E kthej në gjuhën e sotme (në gjuhën letrare). E ktheu nga poezia në prozë.","jokal. bised. shih KTHEHEM 1. Ktheu në shtëpi. Ktheu në atdhe.","jokal. bised. shih KTHEHEM","Ktheu djathtas (majtas). Rruga kthen nga e majta.","jokal. shih KTHEHEM","Ktheu te nëna.","jokal. (me një trajtë të shkurtër të përemrit vetor në r. dhanore). Ia marr këngës që ka filluar këngëtari i parë me një zë tjetër, ia hedh, ia thyej. Ia kthen djali (vajza, plaku).","I përgjigjem dikujt menjëherë a flakë për flakë. Ia ktheu ashpër. Ia ktheu me të butë (me inat).","jokal. bised. Rifitoj shëndetin, marr veten pas një sëmundjeje a pas një fatkeqësie. Ka kthyer krejt. Ktheu shpejt.","jokal. Ndryshoj qëndrim, ndërroj idetë a pikëpamjet, jam i paqëndrueshëm në bindjet e mia. Kthen nga të fryjë era. Kthen si t'i thonë. * I kthej armët (armikut) e kundërshtoj me armë, hidhem kundër tij, e pres me luftë. I ktheu (i vuri) pushkën (dyfekun) dikujt shih te PUSHK/Ë,~A. Ktheu barkun (nga dielli) tall. vdiq. I ktheu (i tregoi, i drejtoi) bërrylin dikujt shih tek TREGOJ. Kthej bukë shtroj për të ngrënë. Ia ktheu dalë shih te DAL. Ia ktheu dorën a) nuk ia pranoi kërkesën për martesë (për vajzat që i kërkojnë për martesë); b) nuk pranoi të marrë diçka që i dhanë. Nuk kthen dorë edhe poh. nuk i bie dikujt që e godet, nuk i përgjigjet me të goditur. I ktheu fjalë e kundërshtoi, iu përgjigj dikujt pa respekt, i ktheu përgjigje të ashpër. E ktheu fjalën nuk e mbajti fjalën e dhënë, e hëngri fjalën, dredhoi. S'e kthen fjalën mbrapsht e mban fjalën e premtimin e dhënë. Kthej fytyrën nga diçka e përqendroj gjithë vëmendjen te diçka. Ia kthen me grykë shih te GRYK/Ë,~A. E ktheu gjuhën e ndryshoi fjalën, ndërroi qëndrim. I ktheu (i solli) krahët (shpatullat, kurrizin, shpinën) dikujt e la a e braktisi dikë atëherë kur ai kishte nevojë; nuk u kujdes më për të, s'desh të dinte më për të; nuk e përfilli më. Ia kthej (ia ndërroj) mendjen dikujt e bind dikë që të mos bëjë atë që kishte ndërmend, ia prish mendjen. Ia ktheu nga myka dikujt shih te MYK/Ë,~A. E ktheu përmbys diçka shih te PËRMBYS. E ktheu (e ndërroi) pllakën (fletën) shih te PLLAK/Ë,~A. Kthej sytë nga dikush a nga diçka shih te SY,~RI. Kthej (sjell) në një emërues të përbashkët libr. shih tek EMËRUES,~I. E ktheu (e hodhi, e vuri) festen (kësulën, qeleshen, kapelën, takijen) mbi sy (mënjanë) shih te SY,~RI. E ktheu me kokë poshtë diçka shih te POSHTË. E ktheu (e solli) mbrapsht shtëpinë shih te MBRAPSHT. Ia ktheu (iu përgjigj, ia shpërbleu) me të njëjtën monedhë libr. shih te MONEDH/Ë,~A. I ktheu këmbët (këpucët, potkonjtë, thundrat) nga dielli përb. shih te DIELL,~I. E ktheu (e hodhi, e ngriti) me këmbë përpjetë mospërf. shih te KËMB/Ë,~A. Ktheu sytë nga qielli shih te QIELL,~I. S'lë gur pa kthyer (pa luajtur, pa trazuar) shih te LË. Si të jetë moti, kthen gëzofin ndërron shpejt bindjet sipas interesit vetjak, kthen gunën nga fryn era. E kthen barkun nga del dielli përçm; ndryshon sipas leverdisë a përfitimit, kthen gunën nga fryn era. Kthen ganën (gëzofin, shpinën, kurrizin, krahët) nga fryn era nuk është njeri parimor, për të mbrojtur interesat e ngushta vetjake i ndryshon bindjet e tij politike etj., nuk qëndron në një mendim dhe anon herë andej e herë këtej. E kthen thesin me grykë poshtë shih te GRYK/Ë,~A. Një vijë nuk e kthen lumin prapa fj. u. shih te LUM/Ë,~I."]}]</script>
