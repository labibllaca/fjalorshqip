<script>window.__INITIAL_DATA__ = [{"slug":"kapeercej","term":"KAPËRCEJ","attributes":["kal."],"definitions":["Kërcej e hidhem matanë një pengese, një hendeku etj., duke marrë vrull a duke shkuar mbi të etj.; kaloj mbi dikë a mbi diçka pa e shkelur; kaloj përtej një pengesë natyrore. Kapërcej hendekun. Kapërcej lumin (përruan). Kapërceu murin (gardhin). Kapërcej pragun (e shtëpisë). Kapërcej me not. Kapërcej matanë (në bregun tjetër).","Marr dikë a diçka në shpinë a në dorë ose mbi një mjet dhe e kaloj matanë një hendeku, një lumi etj.; e kaloj përtej, e hedh matanë. Kapërceu qengjat në lumë.","Përshkoj një hapësirë (mal, fushë etj.) me këmbë, me makinë, me aeroplan, me anije etj.; kaptoj. Kapërceu qafën e malit (shtegun). Kapërcyem male (fusha, qytete). Kapërcyen dete e oqeane.","fig. Kaloj nga një gjendje ku isha në një gjendje tjetër; mënjanoj një gjendje të vështirë, një pengesë etj. duke vënë të gjitha forcat; mund, mposht. Kapërcyem vështirësitë (prapambetjen). Nuk e kapërcejnë dot krizën.","edhe jokal. Kaloj një kohë a një periudhë, kaloj në një moshë më të madhe; kalon më tej, shkon më tej se një çast i caktuar (për kohën), shkon. Kapërcyem dimrin. I kapërceu të dyzetat. Kishte kapërcyer mesi i natës. Kapërceu behari.","Gëlltit, kapërdij. Kapërcej kafshatën. Kapërcej pështymën. Mezi i kapërcen aspirinat (hapet).","Jam më i gjatë, më i lartë, më i rëndë, më i zoti etj. se dikush, ia kaloj dikujt; kaloj një madhësi, një cak, një numër etj., tejkaloj. E kapërcen vëllanë një kokë. Ia kapërcen në bukuri. Ua kapërceu të gjithëve. E kapërcen numrin njëzet. E kapërceu parashikimin. I kapërcen fuqitë e mia.","Lë pa e përmendur, pa e lexuar etj.; lë të kalojë. Kapërceu disa radhë (disa fletë). E kapërceu fjalën e la me qëllim pa përmendur diçka; e kaloi bisedën në një temë tjetër me qëllim.","jokal. mospërf. Flas fjalë të pamenduara mirë, flas e veproj pa gjykuar; bëj veprime që nuk duhen bërë. Ndonjëherë kapërcente fare. * E kapërceu bregun e kapërceu masën e arsyeshme, e kapërceu kufirin. E kapërceu pragun dikush a diçka e kaloi masën a kufirin, shkoi më tej nga ç'duhej. E kapërceu (e kërceu, e hodhi) gardhin shih te GARDH,~I. E kapërceu kufirin (masën) u bë i padurueshëm, nuk durohet dot më, e teproi. I kapërceu (i iku, i luajti) mendja (e kokës) shih te MENDJE,~A. E kapërceu (e hodhi, e kaloi) lumin pa u lagur (pa lagur këmbët) shih te LAGEM. Flet për uthullën e kapërcen tek qumështi fj. u. shih tek UTHULL,~A."]}]</script>
