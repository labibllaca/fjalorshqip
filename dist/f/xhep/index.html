<script>window.__INITIAL_DATA__ = [{"slug":"xhep","term":"XHEP","attributes":["m.","sh."],"definitions":["Pjesë e një rrobe në trajtën e një qeseje të qepur nga brenda ose si copë përsipër, e cila shërben për të vënë sendet që mbajmë me vete ose për zbukurim. Xhep i brendshëm (i jashtëm). Xhep i vogël (i madh). Xhep i thellë. Xhep i rremë. Xhepi i xhaketës (i pantallonave, i jelekut). Xhep me zinxhir. Mbush (zbraz) xhepat. Mbaj (fut) në xhep.","Ndarje e vogël e veçantë, e qepur nga tri anë në një çantë, në një valixhe etj. Xhepi i çantës (i valixhes, i kuletës).","Përdoret në tog me një emër tjetër për të shënuar diçka të vogël a të paktë, që mund të mbahet me vete. Orë (sahat) xhepi. Shami xhepi. Bllok xhepi. Fjalor xhepi fjalor shumë i vogël. Thikë xhepi. Para xhepi të holla që mban njeriu me vete për shpenzime të vogla.","spec. E thelluar a gropë në një send, në tokë etj., në të cilën mblidhet, grumbullohet një lëndë a futet diçka. Xhep nafte (gazi). min. Xhepat e pistës. Xhepat e bilardos gropat anës tryezës së bilardos, ku futen bilat. Xhepi i plagës qeskë me qelb në një plagë. Xhepat e malit. Xhepat e syve qeska nën sy. Hapin xhepa.","usht. Depërtim i thellë i një pale ndërluftuese në një pjesë të ngushtë prapa vijës mbrojtëse të kundërshtarit. Krijuan një xhep. E asgjësuan (e rrafshuan) xhepin.","fig. bised. Të hollat, paratë që ka një njeri; të ardhurat, pasuria e dikujt. Me xhepin e huaj. Pagoi (shtoi) nga xhepi. Është e shtrenjtë për xhepin tim. S`ia mbante xhepi. Kujdeset për xhepin e vet. Nga një xhep dalin. * E futi në xhep dikë e shtiu në dorë dikë, e bëri për vete. Të fut ndër xhepa është i vetmi për të mashtruar. E ka në xhep diçka e ka në dorë diçka, nuk i mungon, e nxjerr kur të dojë; e ka të sigurt një gjë. E ka në xhep dikë e ka futur në dorë dikë, nuk ka nga luan. Kruaj xhepat shih te KRUAJ","I mbushi xhepat shih te MBUSH. Ia ngrohu xhepin dikujt shih te NGROH. I preku xhepin dikujt e mori vesh sa të holla ka, e pa a e kuptoi sa para ka. I është
