allra (artikuj) të përdorimit të gjerë. Për nevojat e gjera.","Që shquhet a dallohet për vëllim të madh dijesh e njohurish në shumë fusha të jetës, i gjithanshëm; që lidhet me një fushë të madhe dijesh, njohurish a veprimtarie; kund. i ngushtë, i kufizuar. Horizont i gjerë. Njohuri (dije)të gjera. Arsim i gjerë. Profit i gjerë.","fig. Që është i durueshëm e me shpirt të madh; që nuk kapet pas cikërrimave e të metave të vogla; zemërgjerë; kund. i ngushtë. Njeri i gjerë. Me shpirt (me zemër) të gjerë.","mat. Që është më i madh se këndi i drejtë, por më i vogël se këndi i shtrirë, që është më i madh se nëntëdhjetë gradë, por më i vogël se njëqind e tetëdhjetë gradë. Kënd i gjerë.","gjuh. Që shqiptohet duke hapur gojën sa më shumë që të jetë e mundshme dhe që është e zëshme në shkallën më të lartë (për një zanore). Zanore e gjerë. * Me zemër (me bark) të gjerë i durueshëm, zemërgjerë. E ka gjoksin të gjerë shih te GJOKS,~I."]},{"slug":"gjeree","term":"GJERË","attributes":["ndajf."],"definitions":["Me gjerësi të madhe, shumë lirshëm në trup ose në një pjesë të trupit; kund. ngushtë. I rrinë gjerë rrobat (pantallonat, këpucët).","Me hapësirë të mjaftueshme për të banuar, për të punuar etj.; jo ngjeshur njëri pranë tjetrit, lirë, lirshëm; kund. ngushtë. Është gjerë me shtëpi.","fig. Në mënyrë të shtjelluar, duke e trajtuar nga të gjitha anët a drejtimet, pa u kufizuar, hollësisht. Foli gjerë. Ka shkruar gjerë. U ndal (e trajtoi) gjerë.","fig. Në mënyrë të gjerë, pa u kapur pas çikërrimave e të metave të vogla, duke i peshuar të gjitha anët e rrethanat; kund. ngushtë. E gjykoi (e shikoi) gjerë.","fig. Në një masë të madhe njerëzish, në mënyrë të gjerë; kudo, gjerësisht. Përdoret gjerë. Ka hyrë gjerë. * Gjerë e gjatë (gjatë e gjerë) a) në të gjithë gjerësinë dhe gjatësinë; b) për të gjitha gjërat a me të gjitha hollësitë, fill e për pe, hollësisht; nga të gjitha anët. Sa gjerë gjatë (sa gjatë e gjerë) shih te GJATË. Trashë e gjerë shih tek TRASHË."]}]</script>
