<script>window.__INITIAL_DATA__ = [{"slug":"qit","term":"QIT","attributes":["kal."],"definitions":["E heq nga brenda, e nxjerr nga thellësia e diçkaje, e bëj të dalë përjashta; nxjerr; kund. shtie, fut. Qiti shpatën. E qiti nga xhepi. E qiti nga shtëpia. E qitën nga gropa (kanali, nga pusi). E qiti nga sirtari.. E qiti nga furra. Qit nga uji. Qit jashtë.","E shpie jashtë caqeve ose kufirit të diçkaje, e vë përjashta, në vend të hapur; nxjerr. E qiti topin jashtë fushës. Qit kokën nga dritarja. Qit në diell (në ajër).","Heq prej diku ku është ngulur, lëviz nga vendi i vet i zakonshëm, shkul; nxjerr. Qiti dhëmballën. Qiti këmbën (krahun) e ndrydhi. I qiti syrin. I qiti rrënjët.","Shtrij përpara; e bëj të dalë përpara, e nxjerr. I qit dorën. Qiti gjoksin përpara.","Lë të dalë, të përhapet, të mbijë, të rrjedhë etj. nga vetja, lëshoj, nxjerr. Qit tym (avull). Qit shkëndija. Qit lule (gjethe, kalli). Qit tinguj. Qit flluska. Qit frymën (ajrin).","E lëshon, nuk e mban e nxjerr. E qit bojën. E qit ajrin. Kadja ka nisur të qitë.","bised. Heq një veshje, një rrobë etj. nga trupi. Qit kapelën. Qit këpucët.","I heq cipën e sipërme a mbulesën; e bëj të duket pa atë që e mbulonte sipër, zbuloj, tregoj të zhveshur, nxjerr. I qit bojën. I qiti cipën. Qiti llërat (krahët).","Largoj prej diku, nxjerr, dëboj. E qitën nga dhoma (nga shtëpia). E qiti në rrugë. E qiti jashtë me shkelma. E qiti birërie nuk e quan më për djalë a për vajzë të vetën, e dëbon nga gjiri i familjes.","E largoj nga gjiri i familjes a nga puna kur arrin një moshë të caktuar, nxjerr. E qiti vajzën e martoi vajzën. E qitën në pension.","Marr me vete dhe e shpie diku, nxjerr. E qiti në shëtitje. E qiti në ajër të pastër. E qitën bagëtinë të kullosë.","Shpie në një drejtim, nxjerr diku. Ku të qit kjo rrugë?","bised. E bëj të dalë diku që ta shohin të tjerët, nxjerr. E qiti në skenë. E qiti në film. E qiti para kolektivit. E qiti në dritë.","E përgatit, e botoj dhe e përhap diçka, vë në qarkullim. Qit një vepër (një roman).","Hartoj dhe bëj të njohur; shpall, nxjerr. Qit një lajmërim. Qit një fletërrufe. Qitën rregulla të reja. Qiti një urdhër dha urdhër, urdhëroi.","bised. Prodhoj, jap, nxjerr. Qit qumësht. Qit gjëra të mira nga duart. Kjo arë qiti mirë sivjet.","Marr një lëndë ose një prodhim, nxjerr. Qit naftë nga nëntoka. Qit vaj nga ullinjtë. Qit sheqer nga panxhari.","Përgatit duke i dhënë njohuritë e duhura, nxjerr. Qit kuadro.","fig. Jap nga gjiri im. Vendi ynë ka qitur heronj (mendimtarë të shquar).","Siguroj me punë, fitoj, nxjerr. Qit bukën. Qit fitime. Qit me djersë.","bised. I siguroj dikujt diçka, nxjerr. I qitën të drejtën e studimit.","Paraqit, nxjerr, parashtroj. Qit kundërshtime. Qit arsye (shkaqe).","I krijoj rrethana të vështira, i shkaktoj diçka të padëshirueshme; nxjerr. I qiti bishta. I qiti ngatërresa. Na qiti punë.","I krijoj kushtet dikujt që të paraqitet në një mënyrë të caktuar, e paraqit, e nxjerr. E qitën të pafajshëm. E qiti faqebardhë. E qitën të paaftë.","Plotësoj, kënaq një dëshirë, një ndjenjë; heq; largoj një ndjenjë, një gjendje shpirtërore; shfryj, nxjerr. Qit dufin. Ia qita frikën. Ia qitën gjumin. Qit mallin çmallem. E qiti zinë.","Flas, tregoj, nxjerr; e bëj të flasë a të tregojë diçka të fshehtë. Nuk qiti asnjë emër. Nuk qiti zë. Nuk qiti asnjë fjalë. Ia qiti fjalët me zor. Fashistët e shtrënguan, por s'i qitën gjë.","E shpëtoj nga një gjendje e vështirë a e keqe, nxjerr. E qitën nga prapambetja. E qiti nga balta. E qiti nga telashet.","E bëj të paaftë, të pavlefshëm, nxjerr. Qit jashtë përdorimit.","E vë në një vend të caktuar kundrejt të tjerëve, nxjerr. E qitën në krye (në ballë). E qitën në fund.","Nxjerr për të shitur. E qitën në treg. E qitën në shitje. 31. bised. Riprodhoj nga një gjë tjetër ose sipas diçkaje tjetër, nxjerr. Qit në fotografi. I qiti bashkë (familjarisht). 32. I vë përpara, gostit, qeras. U qiti bukë djemve. Ia qiti përpara. I qiti kafe (pije, ëmbëlsirë). 33. bised. Kaloj një periudhë kohe, kapërcej, hedh; nxjerr. E qiti vitin (dimrin). 34. bised. Krijoj, bëj, trilloj. I qitën një vjershë (një këngë). I qitën fjalë. 35. E përcjell në një mënyrë të caktuar. E qiti duarbosh. E qiti pa pjesë. E qiti me gisht në gojë. 36. I shtie, i hedh brenda; fut, shtie. I qiti sheqer kafes. I qiti vaj gjellës. I qiti verës ujë. E qiti në thes. 37. E hedh tutje, e flak. E qiti poshtë. Qite tutje! 38. Qëlloj me armë zjarri, shtie. Qit me pushkë. Qit me top. Qiti pushkë shtiu, qëlloi. 39. krahin. Nis, filloj. * E qiti (e nxori, e ngriti, e çoi) nga balta dikë shih te BALT/Ë,~A. I qiti (i lëshoi) be shih te LËSHOJ. Qet e bërtet rropatet me çdo mjet të vërtetojë ose të kundërshtojë diçka. Ia qiti (ia hoqi, ia nxori) bojën keq. shih te BOJË,~A I. E qiti bosh (fjalën) shih te BOSH. E qiti borxh shih te BORXH,~I. E qiti (e nxori) në breg dikë shih te BREG,~U. Qit cekën shih te CEK/Ë,~A. E qiti (e bëri, e nxori) çirak dikë edhe iron. shih te ÇIRAK,~U I. E qiti nga defteri e fshiu nga defteri. E qiti në doçe shih te DOÇ/E,~JA I. I qiti në dorë diçka shih te DOR/Ë,~A. E qiti (e nxori) në dritë shih te DRIT/Ë,~A. E qit (e nxjerr) nga dheu shih te DHE,~U. E qiti (e nxori) fare shih te FAR/Ë,~A. Ia qiti fishekët një pune shih te FISHEK,~U. I qiti (i nxori, i gjeti) fundin diçkaje shih te FUND,~I. E qiti (e nxori) për fushë (në fushë) diçka shih te FUSH/Ë,~A. E qiti në harresë e harroi. Ia qiti (ia nxori) nga hundët (nga hunda, për hundësh) diçka keq. shih te HUND/Ë,~A. Sikur e ka nxjerrë (e ka qitur) nga hunda (për hundësh) shih te HUND/Ë,~A. E qiti (e solli, e pruri) në jetë shih te JET/Ë,~A. Të qiste (të nxirrte) pa kapuç shih te KAPUÇ,~I. E qiti kokën e tregoi se kush është; filloi a rifilloi të veprojë. Qit (nxjerr) krye (kokë) shih te NXJERR. Qit (nxjerr) më (në) krye diçka shih te KRYE,~T. U qiti (ia nxori) në lëndinë diçka shih te LENDIN/Ë,~A I. E qiti (e nxori) lyç diçka shih te LYÇ. E qiti mbanë e përfundoi me sukses një punë, ia doli në krye. E qiti mendsh e luajti mendsh. Ia qiti (ia nxori) mendtë (trutë) dikujt shih te MEND,~TË. I qiti puplat u rrit, filloi ta ndiejë veten gjallë e të lëvizë. I qiti (i bëri) rrethin shih te RRETH,~I. I qiti stërdhëmbët shih te STËRDHËMB,~I. I qiti (i nxori) sytë dikujt shih te NXJERR. Qet (hedh, shtie) shkelma shih te SHKELM,~I. E qiti pas shpine shih te SHPIN/Ë,~A. I qiti (i nxori, i mori) shpirtin dikujt shih te SHPIRT,~I. E qiti (e nxori) në shteg shih te SHTEG,~U","Ia qiti (ia nxori) tëmthat dikujt shih tek TËMTH,~I. I qiti në ujë (paratë) i prishi, i harxhoi kot, pa asnjë dobi (paratë). Qiti (nxori) veshët shih te VESH,~I. I qiti (i shurdhoi, i nxori) veshët shih te SHURDHOJ. E qiti prej zemre dikë shih te ZEM/ËR,~RA. Qit (flet) dokrra në hi shih te DOK/ËRR,~RRA. Qit (nxjerr) dhjamë nga pleshti shih te DHJAM/Ë,~I. Nuk qit (nuk nxjerr) gjë në breg shih te BREG,~U. Nuk qit (nuk nxjerr) gjë në shesh (në treg) shih te SHESH,~I. Ia qiti (ia nxori) için lakrorit shih tek IÇ,~I. I qit (i lëshon, i nxjerr) koka tym shih tek TYM,~I. Nuk qit (nuk nxjerr, nuk çon) lepur nga strofulli shih te LEPUR,~I. Ia qiti (ia nxori) lakrat në shesh shih te LAK/ËR,~RA. Ia qiti mishin copë dikujt e shqepi në dru, e zhdëpi, ia bëri kurrizin me të butë se barkun. I qiti shkumë nga goja i nxori shkumë nga goja. Qit (nxjerr) vaj (mjaltë, ujë) nga guri dikush shih te VAJ,~I I. Qit (hidh) farë, nxirr (merr) farë shih te FAR/Ë,~A. I zoti e qit (e nxjerr) gomarin nga balta fj. u. shih te BALT/Ë,~A."]}]</script>
