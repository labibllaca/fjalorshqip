<script>window.__INITIAL_DATA__ = [{"slug":"hije-sh","term":"HIJE sh","attributes":["f."],"definitions":["Hapësirë e errët a me fare pak dritë pas një trupi, i cili nuk lë të kalojnë nëpër të rrezet e diellit ose të një burimi tjetër drite; mungesë drite ose errësirë jo e plotë pas dikujt a diçkaje që e zë dritën; faqja e errët e trupit në anën e kundërt të ndriçimit të tij; vendi që gjendet në këtë errësirë, zakonisht ku nuk bien rrezet e diellit, vend që s'e rreh dielli. Hije e madhe (e dendur, e lehtë). Hija e drurëve (e lisit, e fikut, e arrës). Hija e reve. Në hije të shtëpisë (të mullarit). Pyll me hije. Vend (rrugë) me hije. Koni i hijes së një planeti. Ana në hije e Hënës. Gjysmërruzulli i zhytur në hije. Bën (lëshon) hije. I bën hije. Ka hije. Vë në hije. Rri (shtrihet, futet, hyn) në hije. Rritet në hije. Mat temperaturën në hije. Lisit shihi hijen, njeriut shihi mendjen. fj. u.","Errësirë; gjysmerrësirë. Hija e mbrëmjes (e natës). Në hijen e bodrumit (e pusit).","Figura e errët e një trupi jo të tejdukshëm, që pasqyrohet në një sipërfaqe pas këtij trupi, i cili ndriçohet në anën e kundërt; figurë e errët që duket në një pjesë të trupit (figura e kockave, e zemrës etj.), kur e shohim me një aparat; vendi ku duket kjo figurë. Hije e plotë (e gjatë, e shkurtër). Hija e njeriut në tokë. Hija e trupit (e kokës, e dorës, e gishtërinjve). Hija e aeroplanit. Hija e një trupi në mur. Hija e mushkërive. Gjatësia e hijes. Drejtimi i hijes. Teatër (shfaqje) me hije në perde. E ndiqte pas si hije.","Figurë e paqartë e një njeriu ose e diçkaje tjetër në errësirë, pamje e turbullt e dikujt ose e diçkaje në errësirë a në mjegull. Hije e turbullt. Hija e një njeriu. Hija e një shtëpie. Dukej një hije. Lëviznin disa hije.","Njollë e errët në diçka, pjesë e errët rreth diçkaje. Hijet e faqeve (e fytyrës). I ka sytë me hije. E ka lëkurën me hije.","art. Njollë e errët a vija që tregojnë pjesët më pak të ndriçuara në një pikturë. Hije e thellë (e lehtë). Dritë dhe hije.","edhe fig. Vend i mënjanuar që nuk bie në sy; vend i qetë larg telasheve e kokëçarjeve; pozitë shoqërore pa rëndësi, pa nderime e pa lavdi. Zuri një hije. U struk në një hije. E kaloi (e shkoi) jetën në hije. Doli nga hija.","fig. Diçka që i ul a i errëson vlerat e meritat e një njeriu, diçka që krijon një dyshim për sjelljen ose për qëndrimin e dikujt, që ia prish a ia njollos emrin e mirë; njollë. I hodhi një hije krijoi një dyshim për të. Bie një hije mbi të. Kjo ngjarje i la një hije. Kishte një hije në biografi.","fig. Pamja e një njeriu a e një sendi, ajo që na bie në sy në tërësinë e tipareve të një njeriu a të një sendi dhe na krijon një përshtypje të caktuar; shprehja e gjendjes shpirtërore të trishtuar a të shqetësuar në fytyrën a në sytë e njeriut. Hije e zymt ë(e frikshme). Ka hije të rëndë. Mori një hije tjetër. Ka ndërruar hije. Ishte në hije të babait kishte pamjen si i ati, i ngjante t'et. I ra një hije e zezë në fytyrë. Shtëpia kishte hije të keqe (të zezë).","Pamja e një njeriu shumë të dobësuar e të tretur nga sëmundja etj. Ishte bërë hija e vetvetes ishte dobësuar shumë. U bë hije nga sëmundjet u dobësua shumë. I ka mbetur vetëm hija është tretur fare, është bërë kockë e lëkurë.","fig. Pamje e bukur dhe e mirë e diçkaje; të qenët i hijshëm; hijeshi, bukuri; pamje, dukje. Hija e vashave. Hija e vendit. Duket gjithë hije. Ka marrë hije dhëndri. I ka rënë hije burri. I bëj hije diçkaje e zbukuroj, e bëj të hijshme. I kanë hije rrobat i rrinë bukur rrobat, i shkojnë mirë. Nuk i ka hije të flasë kështu nuk është e hijshme, nuk është mirë të flasë kështu. Shtat e hije, mend asnjë fije. fj. u.","fig. Vegimi i diçkaje, që i duket një njeriu me fantazi të sëmurë sikur e sheh me sy fantazmë; xhind (sipas besimeve fetare e paragjykimeve). Hije e ligë. Hijet e rënda. Hijet e bardha. euf. hijet e liga. Hijet e natës. Hija e t'et. Hija e Skënderbeut (e Naimit). Hija e vdekjes. Besonte se e ndiqnin (e kishin zënë, e kishin shkelur) hijet. I doli (iu shfaq) hija e të vrarit. I rëntë hija! mallk. Pastë hijen e vet! keq. Vjen si hije vjen befas, vjen papritur.","fig. Shfaqje a shëmbëlltyrë e dobët e diçkaje; mbresë e vogël a gjurmë e parëndësishme e diçkaje; gjurmë, përjetim. Hija e së vërtetës. Hije dëshpërimi (trishtimi, shqetësimi, dyshimi). Hije gëzimi. Hijet e së kaluarës. La hije diku a në diçka. * Bën hije diku (bën hije mbi dhe) keq. është, gjendet, është i gjallë, rron pa kryer ndonjë punë të dobishme, bën hije dikujt a) i shërben me shumë besim një njeriu, i shërben verbërisht; b) e vë brenda në një vend, e mbyll diku; e strehon; c) rri pa punë, tund peshqirin, luan derën (pas një tjetri që punon). Nuk i bën hije askujt nuk pengon asnjeri, nuk i nxjerr pengesa askujt. Iu bë hije dikujt a) u lidh ngushtë me një njeri dhe nuk i ndahet asnjëherë; e ndjek hap pas hapi dhe i shërben me besnikëri; b) e mbron dikë, i bëhet mburojë. Ia hëngri hijen dikujt shih te HA. Hedh hije diçka shih te HEDH. I hedh hije diçkaje shih te HEDH. Është (jeton, rron, rri) në hijen e dikujt keq. a) është nën mbrojtjen e dikujt, e mbron dikush; b) është nën sundimin e dikujt. Rri në hije nuk do të duket, nuk do të shfaqet, rri mënjanë e nuk përzihet në një çështje. Lë në hije diçka e lë në errësirë një çështje, nuk e zbuloj, nuk e ndriçoj. Mbeti në hije diçka nuk u sqarua a nuk u ndriçua. I la hijen dikujt iron. shih te LË. Më marrtë hijen! mallk. vdektë! Të shkel hijen (prapa) dikush shih te SHKEL. E vuri në hije dikë e futi brenda në një vend; e strehoi; e mori nën kujdes, u kujdes për dikë. Nuk bën hije në diell është njeri fare pa rëndësi; nuk e përfill askush. Nuk i bën hije (as) vetes është i pazoti për të bërë një punë, nuk është i zoti për asgjë. Frikësohet (ka frikë, tutet) nga hija e vet është frikacak i madh, ka shumë frikë. Fshihet pas hijes së gishtit tall. mbrohet me mjete e mënyra të dobëta, kujton se nuk ia shohin të metat. Nuk ka hije lisi për dikë nuk ka vend të rehatshëm, që dëshirohet mjaft nga dikush. I la hije të zezë dikujt e njollosi dikë, i hodhi baltë dikujt; e bëri me turp, e turpëroi. Matet me hijen (me diellin) e mëngjesit (e mbrëmjes) keq. shih te MËNGJES,~I. Matu me hijen tënde! vlerësoji drejt aftësitë dhe mundësitë e vërteta që ke, peshoji mirë gjërat pa u mburrur; shtriji këmbët sa ke jorganin. Matet me hijen e vet i duket vetja i madh, i është rritur mendja. E mban nën hijen e tij dikë kujdeset shumë për dikë; e mbron. E mban (e vë) në (nën) hije të hostenit dikë kujdeset shumë për dikë, e mban në pëllëmbë të dorës. Iu shoftë hija e diellit! mallk. shih te SHUHEM. E vë në hije të rigonit dikë kujdesem shumë për dikë, tregoj kujdes të madh për një njeri që nuk e meriton. Vret barkun në hije iron. shih te VRAS. Lëshon hije pa dalë dielli mospërf. e bën diçka para kohe, nxiton e bën një punë të papjekur. Nuk ia ka shkelur njeri hijen prapa është shumë i shpejtë dhe s'e zë dot asnjeri."]}]</script>
