 lau rrugët me lot qau shumë; vuajti shumë në jetë. Iu mbushën sytë me lot shih te SY,~RI. E priti me lot në sy e priti shumë i përmalluar ose i mallëngjyer. I vajtën lotët pas kokës nuk ka më asnjë dhimbje për dikë, të cilin e ka qarë më parë, nuk ndien më dhimbje. I ka lotët në majë të syrit qan lehtë; është gati të qajë edhe për gjënë më të vogël. Qante me shtatë palë lot shih te SHTATË. Lot qyqeje shih te QYQ/E,~JA."]}]</script>
