<script>window.__INITIAL_DATA__ = [{"slug":"shkelm","term":"SHKELM","attributes":["m.","sh."],"definitions":["Goditje e fortë me këmbë që i japim dikujt a diçkaje; lëvizje e menjëhershme dhe e fortë që bëjnë kafshët thundrake me këmbët e prapme për të goditur diçka prapa tyre. I dha (i këputi, i futi) një shkelm. I ra me shkelma. E goditi (e qëlloi, e zuri) me shkelma. Kjo mushkë shtie (qet, hedh) shkelma. I jap shkelmin e parë topit. sport. * Hedh (qet, shtie) shkelma kundërshton me kokëfortësi e pa ndonjë arsye të shëndoshë për një punë a detyrë që i ngarkohet, nuk rri urtë, nuk bindet, hedh vicka. I dha shkelmin dikujt e dëboi dikë, e përzuri me zemërim e në mënyrë të vendosur. Punë me shkelma punë me pahir. Punon me shkelma punon vetëm po ta detyrosh me pahir a ta kërcënosh. I vuri shkelmin diçkaje e hodhi poshtë diçka, e prishi, e shkatërroi, e përmbysi. I bie së mirës (bukës) me shkelm (me këmbë) nuk e vlerëson a nuk e kupton si duhet gjendjen e mirë që ka ose një të mirë që i bëhet dhe heq dorë prej saj, duke dëmtuar veten. I ka vënë shkelmim (gjunjët) në bark dikujt e shtyp dhe e mundon pa mëshirë, e ka vënë nën zgjedhë të rëndë. I ka vënë shkelmin (këmbën, duart) në fyt (në grykë, në gjoks) dikujt e ka shtrënguar keq, e ka vënë në gjendje shumë të vështirë, po i merr shpirtin, i ka vënë litarin në grykë. Më mirë shkelmi se helmi fj. u. më mirë të ta thonë a të ta bëjnë të keqen hapur, sesa të të godasin tinëz e me të pabesë."]}]</script>
