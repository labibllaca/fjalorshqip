<script>window.__INITIAL_DATA__ = [{"slug":"rheq","term":"RHEQ","attributes":["kal."],"definitions":["E kap dikë a diçka dhe e lëviz me forcë nga vetja ose pas vetes pa e ngritur peshë; heq; zvarrit. Qetë tërheqin qerren. Lokomotiva tërheq vagonët. Tërheq varkën në breg. Tërheq sirtarin e tryezës. E tërhoqi pas derën e dhomës e mbylli derën. Tërhiqte këmbët zvarrë. E tërhoqi pas vetes. Tërhoqi këmbëzën e pushkës e shkrehu. E tërhoqi zvarrë. E tërhoqi për dore (për krahu, për mënge). E tërhoqi për veshi (për flokësh, për gërsheti, për bishti). E tërhiqte për kapistre (për litari). Mos më tërhiq kështu! E tërhoqi mënjanë.","Kap diçka në një skaj ose nga të dy skajet dhe e tendos me forcë për ta shtrirë, për ta drejtuar, për ta zgjatur a për ta zgjeruar; tendos. Tërheq fijet e pëlhurës. Tërheq litarin (telin). Tërhiqte llastikun. Tërhoqi mëngët poshtë. Tërhoqi çorapet. Tërhoqi jorganin (batanijen, çarçafin).","E kap dhe e nxjerr diçka nga vendi ku është futur, e shkul; e nxjerr, e marr. Tërhoqi shpatën nga milli. Tërhoqi një shkop (kur hidhet short). Tërhoqi një letër (në lojën me letra). Tërhoqi një biletë lotarie.","vet. veta III. Ka fuqi të sjellë diçka drejt vetes, e lëviz ose mund ta lëvizë diçka drejt vetes me anë të forcës së rëndesës ose të forcës magnetike. Toka tërheq çdo trup që bie mbi të. Trupat qiellorë tërheqin njëri-tjetrin. Magneti tërheq gozhdët.","E pi a e thith diçka; e fut në mushkëri, e shkoj poshtë; e heq. Tërheq tymin. Tërhoqi burrnot (tabak). Tërheq një lëng me gyp (me zorrë, me pompë) nga një enë a nga një vend.","vet. veta III. E kërkon, e heq nga vetja; e thith; lëviz lirisht diçka në të, heq; fig. kërkon, ndjell. Pylli tërheq lagështi. Pema e tërheq rrufenë. Oxhaku e tërheq tymin. Kanali e tërheq mirë ujin. Tërheq gota gotën (në pije).","Marr një shumë të hollash nga arka e kursimit a nga banka; marr e nxjerr diçka prej diku, e mbledh dhe e vë në një vend tjetër, nuk e lë më atje. Tërhoqi ca të holla. Tërhoqi një libër nga biblioteka. Tërhoqi ca materiale nga magazina. E tërhoqën misrin nga ara. Tërhoqën të plagosurit (të vrarët) nga fusha e betejës. E tërhoqi nga tregu (nga shitja, nga qarkullimi).","usht. Zhvendos trupat në mënyrë të organizuar nga një vijë më e përparuar në një vijë më prapa për t'i ruajtur nga kundërshtari ose për qëllime të tjera taktike. Tërhoqi skuadrën (kompaninë). I tërhoqi përkohësisht.","fig. I pëlqej shumë dikujt dhe e bëj për vete me një veti a cilësi që kam; vet. veta III më bën për vete diçka, më pëlqen shumë, më josh, më pushton me tërë forcën; më thith. I tërhiqte me bukurinë (me mençurinë) e saj. I tërhoqi me fjalët e zjarrta. Më tërheq muzika (kënga, piktura, sporti). Më tërheq natyra (deti, pylli). Libër (roman, film) që të tërheq. S’të tërheq fare.","fig. I mbush mendjen dikujt dhe e bëj të më ndjekë në një punë, në një çështje, në një veprimtari etj.; e bëj të marrë pjesë a të punojë diku. Liria tërhoqi gjithë popullin (rininë) në luftën për çlirim. Tërhoqën gratë në prodhim (në punët shoqërore, në arsim, në tregti, në shëndetësi). I tërhoqën të gjithë fëmijët në shkollë.","fig. Marr vesh mendimet a pikëpamjet e dikujt dhe përfitoj prej tyre. Tërheqin mendimin (gjykimin) e punëtorëve (e masës).","edhe fig. E marr përsëri diçka që kam dhënë; e rishikoj diçka që kam thënë a kam vendosur më parë, e heq. E tërhoqi padinë (akuzën). E tërhoqi urdhrin (mendimin). Mos e tërhiq fjalën. E tërhoqi kërkesën (propozimin, lutjen).","Bëj një vijë a një shenjë mbi diçka, heq. Tërheq një vijë (një drejtëz). * E tërhoqi (e hoqi) në baltë dikë shih te BALT/Ë, ~A. Mos e tërhiq prej gjuhe! shih te GJUH/Ë,~A I. E tërheq (e heq) për hunde (për hundësh) dikë e mashtron, e sjell vërdallë, e bën të sillet si do ai. E tërheq (e heq) për kapistalli (për kapistre) dikë shih te KAPISTALL,~I. Tërhiq (hiq) e mos e këput shih te HEQ. I tërhoqi (i hoqi, i zgjati, i shkuli) veshin (veshët) shih te VESH,~I. E tërheq (e heq) për veshi shih te VESH,~I. Më tërheq vëmendjen (vërejtjen) diçka a dikush më bie në sy diçka a dikush, më bën ta shikoj a ta vërej me kujdes. I tërheq vërejtjen (vëmendjen) dikujt e qortoj, e kritikoj. E tërheq (e heq) zvarrë një punë e zvarrit diçka, e vonoj një punë. E tërheq (e merr) zvarrë diçka shih te ZVARRË. I tërheq fjalët zvarrë shih te ZVARRË. E tërhoqi (e hoqi) këmbën zvarrë (rrëshqanë) shih te ZVARRË. I tërheq (i heq) kërraba nga vetja keq. shih te KËRRAB/Ë,~A. Shati tërheq nga vetja fj. u., keq. shih te SHAT,~I."]}]</script>
