on mirë. Vjen me duar plot vjen me arritje të shumta. Djepi plot e këmbët jashtë iron. shih te DJEP,~I. Syri plot e dora thatë shih te SY,~RI. Urtë e butë e plot tiganin fj. u. shih tek URTË."]}]</script>
