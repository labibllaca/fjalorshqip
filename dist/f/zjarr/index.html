<script>window.__INITIAL_DATA__ = [{"slug":"zjarr","term":"ZJARR","attributes":["m.","sh."],"definitions":["Prush e flakë që bëhen nga djegia e druve, e qymyrit etj. në vatër, në sobë, në furrë, në vend të hapët etj. dhe që japin nxehtësi e dritë; djegie e fuqishme e me flakë e gazeve të nxehura ose e sendeve të tjera; flakë. Zjarr bubulak (i madh). Zjarr i ngadalshëm. Zjarr dimri zjarr i madh. Zjarri partizan zjarr i madh, që ndizet në një vend të hapët (ashtu siç e ndiznin partizanët), rreth të cilit mblidhen shumë njerëz me rastin e përkujtimit të një ngjarjeje të Luftës Nacionalçlirimtare. Zjarr me prush (me flakë). Zjarr me dru (me qymyr, me shkarpa, me kashtë). Drutë e zjarrit. Urë zjarri. Masha e zjarrit. Oda (shtëpia, dhoma) e zjarrit dhoma ku rrinë pjesëtarët e familjes dhe gatuhen gjellët. Flaka (shkëndijat) e zjarrit. Afshi i zjarrit. Në dritën e zjarrit. Rrezik zjarri. Fikës zjarri. Mjete kundër zjarrit. Ndez (shuaj, fik) zjarrin. I fryn zjarrit. Zjarri bubulonte. Ngrohej në zjarr. Rri afër zjarrit. Vuri enën në zjarr. Pjek (djeg) në zjarr. Me hekur e me zjarr. Për këtë zjarr! betim. Mori një zjarr u ngroh pak. Sa për të marrë zjarr për pak kohë. Mori zjarr u ndez. I vuri zjarr (zjarrin) e ndezi. Mban zjarr. Ka rënë zjarr. E përfshiu (e dogji) zjarri.","etnogr. Familje, shtëpi, fis. Zjarri i kumbarës (i ndrikullës). Janë nga një zjarr. Janë një zjarr e një vatër me dikë. Të ndarë prej një zjarri. Nga një burrë për çdo zjarr. U shua zjarri i tyre.","vet. nj. Të nxehtë i lartë, që i shfaqet dikujt kur është i sëmurë, zjarrmi; ethe. Ka zjarr. Është me zjarr. I hipi zjarri. I iku (i ra) zjarri.","vet. nj. usht. Qitje me armë me barut a me lëndë tjetër plasëse; breshëri të shtënash. Zjarr anësor (pengues, i kryqëzuar, i dendur, i përqendruar). Zjarr thikë qitje me armë në krahë të armikut, që rrok shumë armiq me një herë. Zjarr me kate qitje me armë të vendosura në lartësi të ndryshme të një kodre a faqeje mali. Zjarri i artilerisë. Armë zjarri armë me barut e shih te JAP. Luan me zjarrin përzihet në diçka të rrezikshme që mund të dëmtojë rëndë atë vetë, rrezikon shumë duke bërë diçka. Mori zjarr (hëna, horizonti) shih te MARR. Merr zjarr (flakë) diçka shih te FLAK/Ë, ~A. Mori zjarr puna etj. shih te MARR. Prova e zjarrit një detyrë e vështirë, me kryerjen e së cilës dikush provon se është i aftë a i përshtatshëm për punë, për t`i besuar diçka. Solli (futi) zjarrin (në shtëpi) solli grindjen e përçarjen në shtëpi. E shoi zjarrin shih te SHUAJ. Si uji me zjarrin që nuk i bashkon asgjë, që janë kundër njëri-tjetrit. Vatër zjarri vend që mund të shërbejë si pikënisje për të ndezur luftën. I vuri zjarrin (flakën, fitilin, pishën) shih te PISH/Ë,~A. Zjarr (flakë) kashte shih te KASHT/Ë,~A. Zjarr për zjarr pa e zgjatur fare, menjëherë, aty për aty, flakë për flakë. Iu bë vendi zjarr nuk i rrihej më në atë vend, rrinte si mbi prush. I del zjarr (tym, flakë) nga koka shih tek TYM,~I. E do si zjarrin në gji nuk e do fare, nuk mund ta durojë dot; e urren. Fut zjarrin në kashtë shih te KASHT/Ë, ~A. I hedh benzinë (vajguri) zjarrit shih te BENZIN/Ë, ~A. I hodhi dru zjarrit shih te DRU,~JA. I hedh ujë zjarrit shih tek UJ/Ë,~I. Është flakë e zjarr (zjarr e flakë) shih te FLAK/Ë, ~A. I dha zjarr barutit shih te BARUT,~I. E kam çerepin në zjarr kam një telash të madh mbi kokë ose një punë shumë të ngutshme. S'ka tym pa zjarr shih tek TYM,~I. E ka zemrën zjarr (prush) është guximtar e i hedhur; i vlon dashuria në zemër. Marr një bark zjarr shih te BARK,~U. I mori fytyra zjarr u skuq në fytyrë nga zemërimi, nga turpi etj. E ndan bukën në zjarr është shumë mikpritës, të pret me gjithë zemër. E ndez zjarrin në ujë shih tek UJ/Ë,~I. Vë (fut) dorën (duart) në zjarr (në prush) për dikë jam shumë i sigurt për dikë, kam besim të plotë për qëndrimin e tij. Nuk e vë ujin në zjarr nuk bëhet merak fare, nuk e çan kokën, as që do t'ia dijë për një punë. Në vijën e parë të zjarrit (të luftës) shih te VIJ/Ë,~A. Bie (është, ndodhet) në mes dy zjarresh nuk di nga t'ia mbajë, është në një gjendje të vështirë e pa rrugëdalje, e ka keq andej e keq këtej. Iku nga tymi e ra në zjarr fj.u. shih tek TYM,~I. Lepuri në mal e vala (kusia) në zjarr fj.u. iron. shih te LEPUR, ~I. Ndezja e zjarrit nuk fillon aga trungu fj.u. shih tek TRUNG,~U. Peshku në det, tigani në zjarr fj.u. iron. shih te PESHK,~U. I nxjerr gështenjat aga zjarri me duart e të tjerëve (e botës) shih te GËSHTENJ/Ë,~A. Gur zjarr i lloj guri, që kur fërkohet me çelik a me ndonjë gur tjetër, nxjerr xixa, gur shkrepës, strall. Lule zjarr i bot. shih te LUL/E,~JA. Zjarri i egër (zjarri i duhanit) sëmundje që u bie gjetheve të duhanit e që shfaqet me njolla të murrme."]}]</script>
