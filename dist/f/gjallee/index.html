<script>window.__INITIAL_DATA__ = [{"slug":"gjallee","term":"GJALLË","attributes":["as."],"definitions":["Të qenët gjallë, koha kur dikush është në jetë, gjallje; jetë. Në të gjallë. Me të gjallë të tij kur ai jetonte. Për të gjallë sa kohë që jemi gjallë, sa të kemi frymë. * S’e deshi të gjallët (veten) shih te DUA."]},{"slug":"gjallee","term":"GJALLË","attributes":["m.","sh."],"definitions":["Ai që jeton, njeri i gjallë; kund. i vdekur. I gjalli me të gjallët. I gjalli ka nevojë për të gjitha."]},{"slug":"gjallee","term":"GJALLË","attributes":["mb."],"definitions":["Që ka aftësinë të shkëmbejë lëndët me botën e jashtme dhe të shumëzohet, që ka jetë, që i përket botës shtazore a bimore. Krijesë e gjallë. Qenie e gjallë. Organizëm i gjallë. Gjë e gjallë a) çdo qenie që jeton; b) bagëtia, kafshët shtëpiake. Natyra (bota) e gjallë bimët, kafshët dhe njerëzit. Lënda (materia) e gjallë. Natyra jo e gjallë.","Që është në jetë, që jeton, që nuk ka vdekur, nuk ka ngordhur a nuk është tharë; kund. i vdekur; i ngordhur. Njeri i gjallë. Kafshë të gjalla. Bimë të gjalla. Peshë e gjallë pesha e një kafshe me këmbë, pa e therur e pastruar. E kapi (e zuri) të gjallë. E mban të gjallë. Nuk e la të gjallë e vrau a e mbyti.","Që është i përbërë prej njerëzish ose prej kafshësh a bimësh. Mur i gjallë. Gardh i gjallë. a) gardh prej shkurresh të mbjella dendur; b) varg njerëzish të ngjeshur njëri pranë tjetrit. Forcat e gjalla njerëzit dhe kafshët që përdoren në një punë ose në luftë (të dalluara nga mjetet teknike). Inventari i gjallë kafshët e punës dhe bagëtitë që japin prodhime. Kënd i gjallë vend i posaçëm në një shkollë, ku mbahen kafshë dhe shpendë për qëllime mësimore.","edhe fig. Që është i zhdërvjellët dhe plot forca; që është shumë i lëvizshëm; që vepron me shkathtësi dhe ia del mbanë çdo gjëje, i hedhur. Njeri i gjallë. Fëmijë i gjallë. Tip i gjallë. Është shumë i gjallë.","Që shpreh forcë e shkathtësi, që shpreh gjallëri. Me sy të gjallë. Me fytyrë të gjallë.","Që ka një veprimtari të dendur e të vazhdueshme, që është plot veprim e lëvizje; që bëhet a që zhvillohet me gjallëri; që ka të bëjë drejtpërdrejt me njerëzit, me jetën, me nevojat e me kërkesat e tyre. Jetë e gjallë. Qytet i gjallë. Mbledhje e gjallë. Bisedë e gjallë. Diskutim i gjallë. Interesim i gjallë. Punë e gjallë me njerëzit. Lidhje të gjalla lidhje të ngushta, të drejtpërdrejta e të pandërprera.","fig. Që është i vërtetë si në jetë a që është nxjerrë nga vetë jeta; që shëmbëllen krejt me atë që është në jetë; që jepet me forcë e në mënyrë shumë shprehëse; i qartë e i theksuar. Provë (dëshmi, shprehje) e gjallë. E vërteta e gjallë. Përvojë e gjallë. Stil i gjallë. Shembull i gjallë. Përshkrim i gjallë. Portret i gjallë. Me ngjyra të gjalla. Fjala e gjallë e mësuesit.","Që është në përdorim ose që vazhdon të veprojë edhe sot e kësaj dite, që e ruan vlerën e forcën dhe që nuk është zhdukur a shuar; që vazhdon të ruhet në mendjen tonë, që nuk është harruar a shlyer. Gjuhë e gjallë. Vullkan i gjallë. Përshtypje (mbresë) e gjallë. Kujtime të gjalla. Mbaj të gjallë. E kam të gjallë në kujtesë.","Që është i pazier a i papjekur, i pagatuar (për ushqimet); që nuk është përpunuar a përgatitur në ndonjë mënyrë. Mish (peshk) i gjallë. Qepë e gjallë. Vaj i gjallë. Gëlqere e gjallë gëlqere e pashuar.","Përdoret pas emrit të një sendi, në kuptimin «gjithë, tërë; krejt, tërësisht a pothuajse tërësisht» (prej një lënde etj.). Është baltë e gjallë. Vendi ishte gur (shkëmb) i gjallë. Zallishtë e gjallë. Pishë e gjallë.","Përdoret pas një emri në trajtë të pashquar, në kuptimin «njësoj si..., ashtu si..., pikërisht si...» për të treguar një tipar cilësor nëpërmjet krahasimit. Është flutur e gjallë është (e shpejtë) si flutur. Është shpend i gjallë është (i shpejtë) si shpend. * S'u bë i gjallë a) nuk u ndie fare, nuk e hapi gojën; nuk lëvizi fare nga vendi; b) humbi, nuk dihet se ç'u bë, nuk u dëgjua më gjë për të. Bibliotekë e gjallë libr. ai që ka njohuri të shumta, të fituara nga leximi i librave, erudit. Enciklopedi e gjallë bised. shih tek ENCIKLOPEDI,~A. E ha të gjallë shih te HA. E hëngri të gjallë shih te HA. Kufomë e gjallë a) shumë i dobët e i tretur, si i vdekur; b) njeri që jeton akoma, por s'është në gjendje të bëjë ndonjë punë. Nuk u ndie i gjallë shih te NDIHEM. E nxjerr në rrasë të gjallë shih te RRAS/Ë,~A. E përpiu të gjallë shih te PËRPIJ. Plagë e gjallë plagë e pambyllur. Re e gjallë shumë i zoti, shumë i shkathët. Të rrjep të gjallë (të rrjep lëkurën) shih te RRJEP. E futi (e vuri, e shtiu) në varr (në dhe) të gjallë (për së gjalli) shih te VARR,~I. Është qime e gjallë dikush shih te QIM/E,~JA. Është sheqer i gjallë dikush shih te SHEQER,~I. Është shpatë e gjallë shih te SHPAT/Ë, ~A. S'ka njeri të gjallë diku s'ka asnjeri, s'ka njeri fare, s'pipëtin asnjeri. Rron (edhe) në rrasë të gjallë shih te RRAS/Ë,~A. S'ia ka thënë (s'ia ka treguar) njeriu të gjallë s'ia ka thënë njeriu, s'ia ka thënë askujt. Faqe e gjallë shtypshkr. shih te FAQ/E,~JA. Punë e gjallë ek. shih te PUN/Ë,~A. Qime e gjallë zool. shih te QIM/E,~JA."]},{"slug":"gjallee","term":"GJALLË","attributes":["ndajf."],"definitions":["Në jetë; ende pa vdekur. Gjallë e shëndoshë. Sa të jem gjallë sa të rroj. Mbeti gjallë. E gjeti gjallë babanë. Mbahet gjallë rron, jeton në një farë mënyre. Mban shpirtin (frymën, veten) gjallë me diçka rron me diçka; ushqehet me diçka. E ndjeu fëmijën gjallë në bark. Pak gjallë gjysmë i vdekur.","fig. Si në jetë a në të vërtetë; me forcë a në mënyrë shprehëse. E jep (e përshkruan) gjallë.","bised. Jo aq keq, çka. — Si je? — Gjallë. Gdhiu pak më gjallë.","Krejt, njësoj si dikush tjetër (nga vetitë trupore a morale), gjithë, tërë. Gjallë i ati. Gjallë e ëma. Gjallë ai. Ecën (flet) gjallë i ati (i vëllai, e motra). * Gjallë e për gazep në gjendje shumë të keqe e të vështirë, në pikë të hallit. Gjallë e ngushtë (e keq) në gjendje shumë të vështirë, në varfëri e në vështirësi, keq. Gjallë a vdekur me çdo kusht, patjetër, medoemos. As gjallë as vdekur a) duke dhënë shpirt; me gjysmë fryme; b) me frikë të madhe, shumë i trembur. Gjallë e në zall në gjendje të vështirë, në të keq, shumë ngushtë. Mbaj gjallë diçka a) nuk e lë të shuhet a të ndërpritet, i jap jetë e gjallëri; e ushqej, e mbaj të gjallë; b) nuk e lë të harrohet. Ra pikë gjallë ra i vdekur në vend. Gjallë me krye nuk i jep (nuk i dorëzon) sa është vetë gjallë nuk i jep, për së gjalli nuk i dorëzon. E ka orën gjallë vjet. shih tek OR/Ë,~A II. E la (e lëshoi) pikë gjallë e vrau në vend, e la top në vend. Shpëtuan gjallë me krye mbetën të gjallë njerëzit, nuk vdiq njeri, e shpëtuan kokën (kur ndodh ndonjë fatkeqësi natyrore)."]}]</script>
