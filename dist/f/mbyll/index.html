<script>window.__INITIAL_DATA__ = [{"slug":"mbyll","term":"MBYLL","attributes":["kal."],"definitions":["Lëviz derën, kanatin, kapakun e diçkaje etj. dhe e afroj a e puthit në hapësirën e vet ose në vendin që shërben si kalim për të penguar hyrjen e daljen, për të ndërprerë lidhjen ndërmjet mjedisit të brendshëm e atij të jashtëm etj.; zë me diçka një hapësirë që shërben si kalim; i vë çelësin, shulin a diçka tjetër një dere, një kapaku etj. që të mos hapet; kund. hap, çel. Mbyll derën (dritaren). Mbyll dollapin. Mbyll arkën (valixhen, kutinë). Mbyll sirtarin. Mbyll xhamin e veturës. Mbyll me çelës (me lloz). E mbyllën kalimin (rrugicën) me mur. E mbyll derën nga brenda (nga jashtë). E mbylli përgjysmë.","E fut dikë a diçka brenda në një dhomë ose në një vend tjetër dhe i vë një pengesë që të mos dalë, të mos e marrin etj.; e ndryj brenda, e kyç; fut diçka brenda në një mbështjellëse dhe e ngjit, e palos a e lidh këtë. E mbylli brenda në shtëpi. I mbylli fëmijët në dhomë. I mbylli kuajt në haur. E mbyllin bagëtinë në vathë. E mbylli me kyç. E mbyllën në burg e burgosën. E mbylli letrën në zarf.","Bashkoj a puthit pjesët e diçkaje njëra me tjetrën ose me pjesën kryesore, i afroj a i mbledh kur janë të hapura, të shtrira etj.; palos a mbledh diçka të shtrirë; kund. hap. Mbyll dorën (gishtat, grushtin). Mbyll sytë (gojën). Mbylle! mos fol! Mbyll çadrën. Mbyll librin (dosjen). Mbyll qarkun. elektr. Mbyll fizarmonikën.","I vë tapën, kapakun etj. një ene; kund. hap. Mbyll shishen. Mbyll tenxheren. E mbylli me tapë (me lecke, me kapak).","Zë me diçka një të çarë, një vrimë, një gropë etj., mbush; mbuloj. Mbyll vrimat (plasat, të çarat). Mbyll veshët zë veshët me dorë. E mbylli me lecka (me pambuk, me baltë).","Ndërpres lëvizjen a qarkullimin nëpër një vend, pengoj a ndaloj kalimin nga një vend në një tjetër; kund. hap; çel. E mbyllën kufirin. E mbyllën shtegun (kalimin, daljen, hyrjen). I mbylli rrugët.","Ndërpres një rrjedhë a një rrymë që kalon nëpër një gyp a nëpër një përçues; e vë një aparat, një mekanizëm etj. në një gjendje të tillë që të mos punojë ose të pengojë kalimin e diçkaje; ndal, fik, shuaj; kund. hap; çel. Mbyll ujin (gazin). Mbyll çezmën (musllukun). Mbyll dritën (çelësin). Mbyll radion (televizorin).","edhe jokal. Ndërpres punën sipas një orari a afati të caktuar në një dyqan, punishte etj.; ndaloj veprimtarinë e një ndërmarrjeje, të një institucioni etj. për një kohë të caktuar a përgjithnjë, i jap fund veprimtarisë së tyre; kund. hap; çel. E hapin dyqanin në orën tetë dhe e mbyllin në orën njëzet. Mbyllën disa fabrika. I mbyllën gazetat. E mbyllën ekspozitën. E mbylli përfaqësinë (ambasadën). Mbyllën shkollat. Dyqani mbyllet në orën","Shpejt, se do të mbyllim!","I jap fund diçkaje, nuk e vijoj më tej, e ndërpres; e lë me aq sa është diçka, nuk i shtoj më; kund. hap; çel. Mbyll mbledhjen (konferencën, kuvendin). Mbyll diskutimet (punimet, bisedën). Mbyll fushatën. Mbyll mbrëmjen (festivalin, konkursin, programin). Mbyll listën (regjistrimet, pranimet). E mbylli fjalimin (ligjëratën) me një thënie të zjarrtë. E mbyllën çështjen.","edhe fig. E rrethoj, e qarkoj, e vë në mes; i vë kufi aty ku është, e vë midis kufijsh të caktuar; e vë midis shenjash ose i vë shenjën e fundit. E mbyllën qytetin (fshatin) nga të katër anët. E mbyllën në mes. E mbyllën në portë skuadrën kundërshtare. sport. Mbyll ndër kllapa. Mbyll kllapën (thonjëzat).","bised. Vë diku për t`i ruajtur (para, ushqime etj.). Kishte mbyllur para në bankë. Kanë mbyllur mjaft drithë (ushqime) për dimër.","Mbaroj punë, arrij pikësynimin ose atë që duhet e plotësoj detyrën, përmbush. E mbyllën planin vjetor një muaj para afatit. E mbyllën buxhetin. fin. E mbylli llogarinë. fin.","fig. Mbush një kohë të caktuar, e jetoj deri në fund; plotësoj një moshë; ngrys. E mbylli ditën (javën, vitin). E mbylli të ritë e tij (e saj) hoqi dorë nga gëzimet e rinisë. E mbylli jetën me nder. * Çel e s'mbyll keq. shih te ÇEL. E mbylli defterin (i mbylli defterët) shih te DEFTER,~I. E mbylli derën (shtëpinë) vdiq pa lënë njeri pas nga gjaku a nga familja e tij. Ia mbylli derën dikujt ia shoi të gjithë pjesëtarët e familjes, e la pa njeri; e la vetëm e të shkretë, e mjeroi. Ia ka mbyllur derën dikujt nuk e qas në shtëpi të vet. I mbyll derën (dyert, portën, shtegun, rrugën) a) dikujt i sjell pengesa të mëdha dikujt, nuk e lë të shkojë përpara; b) diçkaje ndaloj përhapjen e një ideje, të një ndikimi etj.; nuk e lejoj, e pengoj, ia pres rrugën. Mbylle gojën! pusho!, hesht!, mos fol! S'e mbyll gojën (kurrë, asnjëherë) s'pushon së foluri, është llafazan i madh, s'i rri gjuha, s'i pushon goja. E mbylli (e kyçi) gojën a) heshti, nuk foli më, nuk nxori më zë nga goja; b) e ruajti një të fshehtë; nuk ia tregoi askujt ato që dinte. Ia mbylli gojën dikujt a) e detyroi të heshtte, të mos fliste; s'e la të fliste a të shprehte mendimet e tij; b) e mbërtheu me fjalë a me fakte, e zuri ngushtë sa s'kishte ç'të thoshte ose s'mund të kundërshtonte. Ia mbylli (ia shoi) oxhakun ia mbylli derën, ia shoi pragun. I mbyllën plagët e së kaluarës (e luftës) i kapërcyen pasojat e këqija ose të rënda, e përmirësuan gjendjen, e morën veten. Mbylli sytë a) nuk vuri re asgjë, bëri sikur nuk shikonte; b) nuk mori parasysh asnjë vështirësi a rrezik, u hodh në rrezik pa vënë re asgjë; c) euf. vdiq. Mbyll një sy bën ndonjë lëshim, bën sikur nuk i vë re disa të meta e gabime, i lë të kalojnë; tregohet i mëshirshëm e lëshues. I mbylli sytë dikujt shih te SY,~RI. Ia mbylli sytë dikujt ia paraqiti diçka në mënyrë të atillë që t'i mbushte mendjen a ta kënaqte, ia zuri sytë. I mbylli sytë përgjithmonë shih te SY,~RI. S'mbyll sy s'fle fare, s'e zë gjumi. Mbyll veshët para diçkaje shih te VESH,~I. E mbyll në zemër një ndjenjë e mbaj brenda, nuk e shfaq; e kyç në vetvete. Hap e mbyll dollapin shih te DOLLAP,~I. Ia mbylli derën me ferra shih te FERR/Ë,~A. Ia mbylli derën përpara hundës shih te HUND/Ë,~A. Sa hap (sa çel) e mbyll sytë shih te HAP."]}]</script>
