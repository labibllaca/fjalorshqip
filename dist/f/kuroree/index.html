<script>window.__INITIAL_DATA__ = [{"slug":"kuroree","term":"KURORË","attributes":["f.","sh."],"definitions":["Rreth i thurur me degë, me lule, me gjethe a me diçka tjetër të bukur a të çmuar, që vihet në kokë për zbukurim, për të nderuar dikë që ka fituar në një ndeshje sportive etj. Kurorë me luleshqerra. Kurorë shelgu. Kurorë trëndafilash. Kurorë ari (argjendi). Kurorë dafine. hist. kurorë me degë e gjethe dafine që u vinin në kokë zakonisht poetëve të shquar. Bëj një kurorë.","Rreth i madh me lule e me gjethe dhe me një shirit të kuq a të zi kushtimi, që vihet në shenjë nderimi mbi varrin e dikujt ose pranë një lapidari, pranë një monumenti etj. Mbaj kurorën. Çoj një kurorë. Vendosën kurora në varret e dëshmorëve.","Rreth prej rrobe, që vënë nganjëherë gratë mbi kokë për të mbajtur shtamba, tepsi etj.; kokorreth. Vë kurorën në kokë. E mbante shtambën me kurorë.","hist. Rreth i metaltë, zakonisht i stolisur me ar e me gurë të çmuar, që mbanin (e që në disa vende mbajnë edhe sot) në kokë perandorët, mbretërit etj. si shenjë të pushtetit të tyre; pushteti, sundimi i monarkut; vetë mbreti a perandori; përmb. familja mbretërore. Kurora mbretërore. Kurora e perandorit (e mbretëreshës). Pasuritë e kurorës. Fjalimi i kurorës fjalimi i mbretit në parlament në disa vende borgjeze.","vjet. Rreth i zbukuruar, që u vinin në kokë nuses e dhëndrit ditën e ceremonisë fetare të martesës; lidhja bashkëshortore që krijonte ky rit, martesa; besnikëria bashkëshortore. Kurora e parë (e dytë) gruaja e parë (e dytë). Grua me (pa) kurorë. Theu (shkeli) kurorën e tradhtoi burrin (gruan), nuk i qëndron besnik (besnike). Fëmijë i lindur jashtë kurore fëmijë i lindur jashtë martese. Sot nuk martohen me kurorë.","Lidhje bashkëshortore, burrë e grua; djalë ose vajzë në moshë martese që banon bashkë me pjesëtarët e tjerë të familjes; çdo njeri që ka të drejtë të krijojë familje më vete. Familje me katër kurorë. Bëheshin tri kurorë. U ndanë sipas kurorave.","bot. Pjesa e sipërme e një druri, që
