<script>window.__INITIAL_DATA__ = [{"slug":"qiri","term":"QIRI","attributes":["m.","sh."],"definitions":["Shkop prej dylli, dhjami a stearine me përmasa të ndryshme e me një fitil në mes, që ndizet për të bërë dritë. Qiri i bardhë (i verdhë, i kuq, i trashë, i hollë). Qiri dylli (stearine). Fitili i qiririt. Në dritën e qiririt. Mbajtëse qirinjsh. Ndez (shuaj) qiriun. Bëj dritë me qiri. E ka hundën (si) qiri e ka hundën të drejtë. I zbehtë si qiri. Qëndron si qiri rri drejt e pa lëvizur. U tret si qiriri.","fiz. Njësia e matjes për forcën e dritës. Llambë 75 qirinjsh. Sa qirinjsh është?","tek. Vegël që shërben për të ndezur përzierjen e ajrit me lëndët djegëse në motorët me djegie të brendshme. Qirinjtë e motorit. I ndërroj qirinjtë.","Diçka në trajtë të një shkopi, që varet teposhtë. Qirinjtë e akullit hejtë e akullit. * Është bërë qiri është tretur, është dobësuar shumë. E kërkoi me qiri e kërkoi në çdo anë, s'la vend pa e kërkuar. Kishte mbetur qiri ishte ngushtë, ishte në gjendje të vështirë, e kishte punën pisk. I ndezën qiririn presin që të vdesë dikush nga çasti në çast. I rri qiri (më këmbë) dikujt i rri gati dikujt për t'i plotësuar çdo kërkesë, i rri më këmbë; kujdeset shumë për dikë. U gjend qiri në këmbë u ngrit menjëherë në këmbë. E kërkon sherrin me qiri kërkon me çdo mënyrë shkak për t`u grindur, është i gatshëm për të bërë sherr. Mbeti qiri në këmbë a) qëndroi në këmbë pa lëvizur për shumë kohë; b) priti shumë."]}]</script>
