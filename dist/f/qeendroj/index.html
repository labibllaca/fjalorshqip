<script>window.__INITIAL_DATA__ = [{"slug":"qeendroj","term":"QËNDROJ","attributes":["jokal."],"definitions":["Rri në këmbë pa lëvizur, pa rënë a pa u shtrirë; rri me trupin drejt. Qëndron drejt (pingul). Qëndron në këmbë. Qëndroj përpara pasqyrës. Qëndroi me orë të tëra. Mezi qëndronte më këmbë nga lodhja.","Ndërpres lëvizjen, nuk vazhdoj më tej, ndaloj. Qëndroi në vend. Qëndroi te dera (te shkallët). Treni qëndroi në stacion. Në vend qëndro! Qëndro, mos ik!","Rri diku pa u larguar për një kohë; ndalem diku dhe nuk iki. Qëndron brenda. Qëndroi pak dhe iku. Nuk mund të qëndroj më gjatë. Vend për të qëndruar. Qëndro aty!","fig. Ndalem në një çështje për ta shqyrtuar më mirë. Të qëndrojmë në këtë pikë!","Banoj, jetoj përkohësisht diku, mbetem. Qëndroj në hotel. Qëndroj me shërbim.","Jam në gjendje të caktuar; rri. Qëndron i menduar (i qetë). Qëndroj në heshtje. Qëndron duarlidhur (duarkryq) rri kot, nuk punon, nuk merret me asgjë; nuk vepron, nuk kundërvepron.","Rri në një vend për të bërë një punë, zë një vend dhe merrem me diçka ose pres për të bërë diçka. Qëndron roje. Qëndron në pritë.","fig. Sillem në një mënyrë të caktuar; mbaj një qëndrim kundrejt dikujt a diçkaje; mbahem, rri. I qëndron besnik. Ka qëndruar mirë. Më qëndron rëndë (me inat). I qëndron ftohtë. Qëndron mënjanë nuk merr pjesë, nuk përzihet. Si ka qëndruar gjatë luftës?","fig. Mbaj një pozitë të caktuar; rri në një mënyrë të caktuar; jam. Qëndron në gatishmëri. Qëndroj vigjilent. Qëndron në pozita revolucionare. Qëndron në pararojë (në mbrojtje). Qëndron në krye (në bisht) të situatës.","Ngul këmbë në një mendim a pohim, nuk heq dorë nga ajo që kam thënë ose kam bërë. Qëndron në të vetën. Qëndron në mendimet e para.","I përmbahem diçkaje, nuk e hedh poshtë; e mbaj (fjalën e dhënë). I qëndron fjalës (zotimit). U qëndron besnik traditave.","vet. veta III. I bën ballë një force, një veprimi a një ndikimi të jashtëm, nuk prishet a nuk dëmtohet, duron. U qëndron goditjeve. I qëndron dimrit (të ftohtit, të nxehtit, thatësirës).","fig. Përballoj pa u tërhequr e pa u përkulur një sulm a goditje, kundërshtoj me forcë, i bëj ballë pa u zmbrapsur, nuk dorëzohem. Qëndroi burrërisht. Qëndroi me vendosmëri. U qëndruan heroikisht sulmeve të armikut. Qëndroi deri në vdekje. I qëndroi ballë për ballë.","fig. Përballoj pa u përkulur e me durim vështirësitë, tronditjet, fatkeqësitë etj., i bëj ballë, duroj. U qëndroi fatkeqësive. U qëndroi torturave (kërcënimeve). Qëndroi i paepur.","vet. veta III edhe fig. Zë një vend të caktuar në lidhje me diçka; është në një pikë a në një gjendje të caktuar. Kjo çështje qëndron para nesh e kërkon zgjidhje. Qëndron si detyra më e rëndësishme. Ky problem qëndron në plan të parë. Si qëndrojnë punët? si janë punët, në ç'gjendje janë?; deri ku kanë arritur?","vet. veta III libr. Ka të bëjë me diçka, ka si përmbajtje, është. Pikërisht këtu qëndron e vërteta. Ku qëndron shkaku i ... Në se qëndron?","vet. veta III fig. Ka vlerë, është me bazë të shëndoshë; është e vërtetë; nuk bie. Vepra (drama) qëndron. Prova qëndron. Kjo çështje (kjo akuzë, kjo kërkesë) nuk qëndron. Arsye të tilla nuk qëndrojnë.","kal. Ndaloj lëvizjen e dikujt a të diçkaje. Qëndroj kalin. E qëndroi karrocën (makinën). E qëndroi afër (larg). * I qëndron (i rri) afër dikujt shih tek AFËR","Qëndron (mbetet) në ajër shih tek AJ/ËR,~RI. Qëndroi (mbeti) në bisht shih te BISHT,~I. Qëndrojmë (jemi) bllok shih të BLLOK,~U. I qëndron (i rri) me fyt dikujt shih te FYT,~I. Qëndron (rri) gatitu përpara dikujt shih te GATITU. Qëndron (është, mbeti) në hava shih te HAVA,~JA. Qëndron me (në) këmbë diçka shih te KËMB/Ë,~A. I qëndroj (i rri) mbi (në) kokë (krye) dikujt a diçkaje shih te KOK/Ë,~A. I qëndron (i rri) kokërr shih te KOK/ËRR,~RRA. Qëndrojnë larg shih te LARG","Qëndron më lart shih te LART","Qëndron lis shih te LIS,~I. Qëndron (rri) si statujë shih te STATUJË,~A. Qëndron (vepron) prapa shpinës së dikujt keq. shih te SHPIN/Ë,~A. Ku i qëndron shpirti! shih te SHPIRT,~I. Qëndron (rri, mbeti
