<script>window.__INITIAL_DATA__ = [{"slug":"rrah","term":"RRAH","attributes":["kal."],"definitions":["Qëlloj dikë me dorë, me shkop a me diçka tjetër disa herë, duke i shkaktuar dhembje; i bie. E rrahu djalin (vajzën). E rrahu fort (shumë, rëndë, tepër, paq, keq). E rrahu me pëllëmbë (me grushte, me thupër, me shkop, me kamxhik, me kërbaç). E rrahu për vdekje.","fig. bised. Fitoj kundër dikujt (në një lojë), e mund. E rrahu dy me zero. E rrahu në domino (në shah, në pingpong).","Përpunoj një lëndë, duke e goditur, duke e përzier a duke e ngjeshur me forcë shumë herë me një mjet a me duar; bëj një punë duke goditur, duke trokitur etj., i bie shumë herë. Rrah qumështin (kosin). Rrah vezët. Rrah baltën (brumin) gatuaj baltën (brumin). Rrah grurin (qeshqekun). Rrahin orizin (fasulet) zhveshin orizin (fasulet) duke i goditur me shkop. Rrah leshin (pambukun) shkrifëroj leshin (pambukun) me shkop. Rrah hekurin (bakrin) farkëtoj hekurin (bakrin). Rrah lopatat vozit me lopata. Rrah strallin me uror. Rrah çekanin. Rrah dyshekun (qilimin, rrobat) godas me shkop për të shkundur dyshekun (qilimin, rrobat). Rrah me shkop (me çekan, me tundës). Rrah me pallë (me kopan). Rrah me makinë. bised. shtyp në makinë shkrimi.","fig. Shqyrtoj me imtësi e nga shumë anë, bisedoj hollësisht për diçka; trajtoj. E rrahën mirë çështjen. I rrahën mendimet. E rrahën dhe e shoshitën nga të gjitha anët. Do të rrahë një çështje (temë) me rëndësi.","Përplas diçka me një tjetër ose pas një tjetre; përplas në ajër (krahët). Rrah duart (shuplakat) duartrokas. Rrah këmbët (thembrat). Rrahin krahët (për shpendët). Rrah qepallat (qerpikët). I rrah shpatullat (krahët) dikujt e godit lehtë disa herë me pëllëmbë në shpatulla. Topi rrahu shtyllën.","Qëlloj një vend shumë herë me armë zjarri; vet. veta III godet, qëllon shumë herë një armë zjarri. Rrahën llogoret (kodrën). E rrahu me top (me mitraloz, me mortajë). E rrahën me zjarr. Rreh topi (mortaja, mitralozi). E rrahën pa pushim.","vet. veta III. Godet me forcë duke u përplasur mbi diçka, bie me vrull e dendur mbi diçka (zakonisht për dukuritë e natyrës). E rreh shiu (breshri, era, dëbora). Era u rrihte fytyrat. Rrufetë rrahin pyllin. Deti rreh brigjet. E rrihte të ftohtët (thëllimi). E rreh dielli e zë dielli.","I bie diçkaje disa herë duke nxjerrë një zhurmë a krismë; trokas. Rrah derën. Rrahin bankat. Rrah daullen. Rreh kambanën. Rrah kohën trokas këmbën ose dorën për të përcaktuar ritmin, kur luhet një pjesë muzikore.","fig. Shkoj e vij rregullisht nëpër një rrugë, e bëj zakonisht rrugën nga një vend në një tjetër; endem për shumë kohë në një vend, zakonisht të largët, shkel, bredh. Ka rrahur rrugët (fshatrat, qytetet).E ka rrahur vendin pëllëmbë për pëllëmbë. Ka rrahur botën (detet). Rreh rrugën Tiranë-Shkodër. Ka rrahur dheun (dynjanë) ka udhëtuar shumë, nuk ka lënë vend pa shkelur. Rrihte dyert e botës shkonte derë më derë duke lypur a duke kërkuar punë.","jokal. Anoj; mbaj anën e dikujt. Ai rreh nga unë.","bised. Hekuros. Rrah këmishën (rrobat, pantallonat). Rrah me hekur.","euf. Tredh. Rrahën demin (dashin, cjapin).","vet. veta III jokal. Punon duke trokitur me rregull, regëtin (për zemrën, damarët etj.). Rreh zemra. Rreh pulsi. Rrahin tëmthat. Rrahin damarët. Pushoi së rrahuri zemra e dikujt. lart. vdiq. Më rreh zemra nga gëzimi (nga frika) ndiej një shqetësim të brendshëm nga gëzimi (nga frika), që bën të më punojë më shpejt zemra. Më rreh plaga ndiej dhembje të vazhdueshme në një plagë që po zë qelb, më lufton plaga.","jokal. fig. (me një folje në mënyrën lidhore). Përpiqem të bëj diçka, mundohem, bëj çmos. Rrah të tregoj. Rrihte ta gjente me mend. Rrahin ta sjellin në udhë të drejtë. Rrahin të dalin të parët. Rreh të dalë jashtë.","jokal. fig. E kam syrin te diçka ose diku, synoj, kam qëllim, më punon mendja diku (edhe në një varg togjesh frazeologjike); bëj me ngulm diçka. E di ku rreh ai e di ku synon, e di ku kërkon të dalë. Aty rreh të dalë. Të gjithë në një vend rrahin. Aty rreh ajo fjalë. Më rreh mendja atje për diçka. Aty i rreh çekani. Rreh larg ai me këto fjalë. Këtu duhet të rrahim më shumë.","vet. veta III. Lëshon vezët (për peshqit). Krapi rreh. * Rrahu benë vjet. bëri be, u betua. Të rrahë (të bjerë) çekani diku ose në diçka shih te ÇEKAN,~I. Rreh gjoksin (kraharorin) a) merr përsipër me bujë të kryejë patjetër diçka, i del për zot me mburrje një pune të vështirë; mburret, shet mend; b) e bën veten fajtor përpara të gjithëve, i bie gjoksit me grushte. E rrah në havan diçka shih te HAVAN, ~I. Rrahu jetën nuk la vend pa shkuar e pa kërkuar, rrahu dheun. Rreh (vret) lart (rëndë) shih te LART. Rrah mendjen mendohem mirë e mirë për diçka, e lodh mendjen. Rrah (bluaj) me mend shih te MEND, ~TË. Qan pa rrahur shih te QAJ. Sa rreh qerpiku shih te QERPIK,~U. I rreh shpatullat (krahët, supet) dikujt a) i shpreh miratimin për diçka duke e përgëzuar për një punë të mirë; b) i bën lajka, e merr me të mirë. I rreh supet (i bie supeve) dikujt shih te SUP,~I. Rrah telin (telat) vjet. telegrafoj. Rrahu (çau, kërkoi) vendin (dheun, dynjanë) kërkoi gjithandej, nuk la vend pa kërkuar. Nuk e rreh veshin (dikush për një punë) shih te VESH,~I. Më rreh zemra për dikë a për d i ç k a shih te ZEM/ËR,~RA. Sa të më rrahë zemra shih te ZEM/ËR,~RA. Nuk rreh (nuk i bie) në atë krah edhe poh. shih te KRAH,~U. I rrihte dyfeku lart dikujt keq. shih te DYFEK,~U. Është për të rrahur murin me të mospërf. është pa asnjë vlerë, nuk bën fare. Shtatë i rreh (i bie) sahati shih te SHTATË. Rrahim thekrën e botës (hamë bukën tonë e bëjmë davanë e botës) shih te BUK/Ë,~A. Rreh (shtyp) ujë në havan merret me një punë të kotë, humbet kohën pa dobi, mundohet kot për diçka; flet kot. Breshri e rreh e hunda me majë iron. shih te HUND/Ë,~A. Të ha shalqirin e të rreh me lëkura shih te SHALQI,~RI. S'ka kohë as te rrahë qerpikët a) i ka mbetur fare pak kohë për të bërë diçka; b) është shumë i zënë me punë, s'ka nge të marrë frymë. Më rrahin shumë çekanë (çekiçë) mbi krye (në kokë) shih te ÇEKAN,~I. E mori vesh (e kuptoi) ku rrihte çekani shih te ÇEKAN, ~I. Hekuri do rrahur sa është në zjarr (sa është i nxehtë) fj. u. shih te HEKUR,~I. Një thumb, njëqind herë ta rrahësh, një majë nxjerr fj. u. shih te THUMB,~I."]},{"slug":"rrah","term":"RRAH","attributes":["m.","sh."],"definitions":["Tokë buke a kullotë, që hapet në pyll duke prerë drurët e shkurret ose duke i djegur. Rrah në mes të pyllit. Rrah në mal. Hapën (çelën) rrahe. U bë rrah.","përd. ndajf. Shtrirë (për tokë, në shtrat). U rrëzua rrah përdhe. Ishin të gjithë rrah nga gripi."]}]</script>
