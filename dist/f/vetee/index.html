<script>window.__INITIAL_DATA__ = [{"slug":"vetee","term":"VETË","attributes":["përem.","vetv."],"definitions":["Përdoret zakonisht pranë një emri e një përemri vetor (të shënuar e të nënkuptuar) ose në vend të tij dhe tregon se dikush e bënë një veprim ose e përjeton diçka drejtpërdrejt, unë (ti, ai ne ...) dhe jo tjetërkush. Ai e pa vetë. E kanë ndërtuar vetë nxënësit. U bënë vetë punonjësit zotër të vendit. E lashë vetë. Të rroni vetë! ur. Kur ngushëllojmë dikë për vdekjen e një të afërmi. Vetë e di ç'kam hequr. Edhe ata vetë duhet të marrin pjesë.","Përdoret për të treguar se bëhet fjalë për një njeri a për një send të caktuar, për ta dalluar atë nga të tjerët, me kuptimin «pikërisht ai ose ajo, askush tjetër përveç atij a asaj; pikërisht edhe ai ose ajo». E dëgjova nga vetë goja e tij. Ajo vetë më tha. Ata vetë nuk e dinë. E zgjidh vetë jeta. E tregon vetë puna. Të vijë ai vetë.","Përdoret për të treguar e një veprim a një gjendje shkon ose shtrihet deri te një njeri a send i caktuar, me kuptimin «gjithashtu, edhe». As unë vetë nuk e prisja. Punojnë vetë drejtpërdrejt në prodhim.","përd. ndaj. Pa ndihmën a pa ndërhyrjen e të tjerëve, me forcat e veta, vetëm; vetiu; në mënyrë automatike. E bëj vetë këtë punë. Gatuan vetë. Erdhi vetë. I qepte rrobat vetë. I plotëson të gjitha nevojat vetë. Ia doli mbanë vetë. Mbin vetë. Plaga u mbyll vetë. Dera u hap vetë. Ngarkohet (shkarkohet) vetë. * Vetë i dyti.. . së bashku me një tjetër, dy veta. Vetë me vete shih te VET/Ë,~JA. E di vetë është puna ime, më përket mua, e zgjidh unë, e di unë si e zgjidh diçka. Flet puna etj. shih te PUN/Ë,~A. Është dora vetë (vetë dora) shih te DOR/Ë,~A. Është dora vetë për diçka shih te DOR/Ë,~ A. Është vetë ind e vetë majë shih tek IND,~I. Vetë shkruan, vetë vulos shih te SHKRUAJ. Vetë zot, vetë shkop shih te ZOT,~I II. Kush i bën varrin shokut, bie vetë brenda fj.u shih te VARR, ~I."]}]</script>
