<script>window.__INITIAL_DATA__ = [{"slug":"rapa","term":"RAPA","attributes":[],"definitions":["I. ndajf. 1. Në një vend ose në një farë largësie nga ana e shpinës së dikujt a të diçkaje; pas; kund. përpara. Rri prapa. Është prapa. E la prapa. Mbeti prapa. Të tjerët janë prapa. I vuri duart prapa. E fshehu (e futi) prapa.","Në drejtim të kundërt me lëvizjen që ka bërë dikush a diçka më parë; në drejtim të anës së pasme të dikujt a të diçkaje; në drejtim të vendit ku ishte, mbrapsht; pas; kund. përpara. U kthye (u tërhoq) prapa. Lëvizje sa para e prapa. Ktheu kokën prapa. Bëri dy hapa prapa. E ktheu veturën prapa. E qëlloi nga prapa. Uji që rrjedh, nuk kthehet prapa. fj. u.","Në faqen nga ana e shpinës së dikujt a të diçkaje, në anën e pasme; kund. përpara. Fustan me kopsa prapa. Fletë e bardhë nga prapa. Ishte nxirë prapa.","Me të, pas tij; me vete, pas vetes; si shoqërues. Iu vu prapa. Iu qep prapa. E ndoqi prapa. Mori dy veta prapa. S`e donte prapa.","Jo në kohën që duhet të shënojë në të vërtetë, por duke ngelur (për orën); kund. përpara. Ora është (mbeti) prapa. E ka prapa orën. Shkon prapa.","Pas vdekjes, pas vetes, pas. La pesë djem prapa. S`la gjë prapa.","fig. Në një gjendje më të prapambetur, më pas se të tjerët a në krahasim me atë që duhet, më keq se të tjerët, në fund, pas; në një shkallë më të ulët në krahasim me të tjerët a me një periudhë kohe; kund. përpara. Është prapa me detyrën (me planin, me mbjelljet, me plugimet). Qëndrojnë (janë) shumë prapa në krahasim me vendin tonë. Mbeti prapa.","Këtej e tutje; pastaj, më vonë; pas. Disa ditë e prapa. Nesër e prapa do të vijë rregullisht. Pak më prapa erdhën edhe të tjerët. Të mos kemi fjalë prapa! Do të të dalë mirë më prapa. Nga ajo ditë e prapa ai s`u pa më.","Në një kohë më të hershme, në të kaluarën, më parë. Prapa, shumë prapa, në kohët e lashta.","përd. mb. I prapmë. Ndodhet në pjesën prapa. II. parafj. Përdoret me një emër a përemër në rasën rrjedhore për të treguar: 1. Njeriun, sendin etj., në anën e prapme të të cilit ndodhet dikush ose gjendet a bëhet diçka; pas; kund. përpara. Prapa meje. Prapa shtëpisë. Prapa mureve. Prapa mullarit (gardhit). Prapa malit. I mblodhi gërshetat kurorë prapa kokës.","Njeriun, sendin etj. në anën e pasme të të cilit lëviz dikush a diçka ose që e shoqëron a e ndjek pas; kund. para. Prapa tij vinte i vëllai. Qeni shkonte prapa të zotit.","Një njeri, një vend etj., në krahasim me të cilin dikush ka mbetur pas në plotësimin e një pune a detyre ose në zhvillimin e përgjithshëm. Prapa gjithë të tjerëve ishte ai. Janë prapa vendit tonë.","Diçka, pas së cilës fshihet një gjë tjetër ose bashkë me të cilën nënkuptohet a shprehet diçka tjetër. Prapa kësaj fjale ka diçka. Prapa çdo emri dëshmori ka një heroizëm. * Prapa gardhit shih te GARDH~I. Prapa (pas) perdes libr. shih te PERD/E,~JA. Bëri prapa u pendua për diçka, u tërhoq, pranoi gabimin; ndryshoi qëndrimin e tij të mëparshëm. I bie prapa (pas) dikujt a diçkaje shih te PAS. S’kthehet prapa dikush është i vendosur në rrugën e tij. E mori prapa dikë e ndoqi në një punë a në një veprimtari, i shkoi pas. E mori prapa diçka e tërhoqi (një fjalë, një mendim etj.). I shkoi prapa dikujt e ndjek, bën siç thotë ai ose siç bën ai, ndjek rrugën e tij. Shiko edhe prapa! mos e harro të kaluarën, mos harro ç`ke qenë, nga ke dalë; shiko edhe të tjerët që nuk janë aq mirë sa ti; mos u shkëput prej njerëzve të thjeshtë. I ra mendjes (prapa) shih te MENDJ/E, ~A. I bie sherrit prapa e kërkon vetë sherrin, do të zihet. Ka bërë hapa prapa ka mbetur prapa të tjerëve ose ka shkuar më prapa nga ç'ka qenë. Hodhi gurë prapa dikush shih te GUR,~I. Iu ktheftë qafa prapa! mallk. shih te QAF/Ë, ~A. Punon me hosten prapa shih te HOSTEN,~I. Shkoi (vajti) prapa diellit shih te DIELL, ~I. I varën këmborën prapa (në qafë) dikujt shih te KËMBOR/Ë,~A. Më vajti barku prapa (në kurriz) shih te BAR/K,~KU. I vuri bisht prapa shih te BISHT,~I","Erdhi me bisht prapa shih te BISHT,~I. Dardha e ka bishtin prapa fj. u. shih te DARDH/Ë,~A. Përpara rripë e prapa thikë shih te RRIP/Ë,~A. Nuk ia ka shkelur njeri hijen prapa shih te SHKEL. I vajti goja te veshi (prapa veshit) shih te VESH,~I. I shkoi (i vajti, i doli) gjuha prapa u lodh së foluri duke e përsëritur diçka shumë herë ose duke i folur dikujt; i shkoi goja prapa. Po dëgjove daullen, dasmën e ke prapa (te dera) shih te DAULL/E,~JA."]}]</script>
