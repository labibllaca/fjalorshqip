<script>window.__INITIAL_DATA__ = [{"slug":"djersee","term":"DJERSË","attributes":["f.","sh."],"definitions":["Lëng i tejdukshëm si ujë, që del nga disa gjëndra të nënlëkurës kur bën shumë nxehtë, kur dikush vrapon a kryen një punë të lodhshme, kur është i sëmurë etj. Djersë të nxehta (të ftohta). Djersa e ballit. Sumbulla (bula, pika) djerse. Erë djerse. I bien (i rrjedhin, i shkojnë, i kullojnë) djersët çurkë (palë-palë). I hëngri (i grin, i grisi) djersa rrobat (jakat, këpucët). Fshin djersën. Ka djersë djersit shpejt. Është me djersë. U bë qull në (me) djersë. Iu tha djersa. U mbyt (u la, u bë ujë) në djersë.","Shtresë e lagët ose me bulëza uji që formohet mbi sipërfaqen e sendeve të ndryshme, kur këtë e prekin avuj të nxehtë. Djersa e shishes (e gotës, e shtambës). Ka zënë djersë xhami (muri, kapaku). Rakia është djersë kazani.","fig. Punë e lodhshme dhe e ndershme, përpjekje këmbëngulëse për të arritur diçka; mundim, mund; fryti i kësaj pune a i këtyre përpjekjeve. Djersa e popullit. Njeri i djersës njeri i punës, njeri që s'i përton punës, njeri që punon ndershmërisht. Me djersën tonë me punën e me mundin tonë, pa ndihmën e askujt. Me djersë e gjak. Ka derdhur djersë ka punuar shumë, është munduar. Rron me djersën e ballit rron me punën e me mundin e vet. I hëngri djersën dikujt i përvetësoi frytet e punës. Aq sa i peshon djersa aq sa ka punuar, aq sa është lodhur vetë. * Derdh djersë (derdh djersën çurkë) shih te DERDH. I kulloi djersa u lodh shumë për të bërë një punë, bëri përpjekje të mëdha. E lagu me djersë diçka shih te LAG. E lanë me djersë shih te LAJ","I nxori djersë dikujt shih te NXJERR. I ka pirë djersën dikujt shih te PI. I doli djersa në lug shih te LUG,~U. I dolën djersët e mortjes (e vdekjes) shih te MORTJ/E,~A. I shkojnë (i bien, i dalin, e mbulojnë) djersë të ftohta shih te FTOHTË (i, e). I shkuan shtatë palë djersë shih te SHTAT/Ë,~A."]}]</script>
