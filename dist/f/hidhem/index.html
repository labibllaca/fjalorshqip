<script>window.__INITIAL_DATA__ = [{"slug":"hidhem","term":"HIDHEM","attributes":["vetv."],"definitions":["Kërcej me vrull e me shpejtësi përpjetë a në një drejtim tjetër, zakonisht pa u mbështetur gjëkundi; lëshohem shpejt nga lart poshtë. U hodh përpjetë (poshtë, përpara, anash). Iu hodh përsipër. Iu hodh në qafë iu turr dhe e përqafoi. U hodh nga shkallët (nga çatia, nga pema). U hodhën nga aeroplani (me parashutë). U hodh në lumë (në det).","E kaloj një pengesë e i dal matanë, e kapërcej, kaloj në anën tjetër. U hodhën matanë (përtej lumit, përtej hendekut, përtej gardhit). Hidhu këtej!","bised. Shkoj shpejt e shpejt në një vend të caktuar; vete diku. Hidhej nga një fshat në një tjetër. U hodh gjer te fqinji.","fig. Ia nis me vrull një pune a një veprimtarie, i përvishem me të gjitha forcat; veproj menjëherë kundër dikujt; futem me vrull e me shpejtësi në një mjedis të caktuar. U hodhën në sulm (në luftë, në aksion). U hodhën në mes të zjarrit (të stuhisë, të tufanit). U hodh në ilegalitet. U hodhën të gjithë kundër armikut.","fig. bised. Ngjitem një a disa shkallë më lart; kaloj në diçka tjetër, ia nis diçkaje tjetër. U hodh në klasën e pestë (në kategorinë e shtatë). Po hidhemi në një çështje tjetër. U hodh në pikën e dytë.","fig. Nis me shpejtësi të flas a të ndërhyj, filloj menjëherë diçka; ngrihem, kërcej. Hidhet e flet. U hodh papritur e tha ... Mos u hidh kështu! Hidhet shpejt ai.","vet. veta III bised. Rritet, zhvillohet, merr shtat; harliset, azdiset. Po hidhen misrat. Është hedhur gruri. Janë hedhur pjergullat.","Pës. e HEDH 1-10, 12-25. Hidhen hapat e parë. Hidhen bazat (themelet). Nuk hidhet përroi (lumi). Hidhet në votë. * Hidhet (futet) në flakë (në zjarr) shih te FLAK/Ë, ~A. Iu hodh në grykë (në fyt) dikujt shih te GRYK/Ë,~A. Hidhet (kërcen) si gjel shih te GJEL,~I. U hodh (ra) në krahët e dikujt shih te KRAH,~U. U hodh (ra) në prehrin e dikujt shih te PREH/ËR,~RI","U hodh (kërceu) përpjetë a) u habit a u trondit shumë nga diçka e papritur; u trem
