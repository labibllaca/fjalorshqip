<script>window.__INITIAL_DATA__ = [{"slug":"mbyllem","term":"MBYLLEM","attributes":["vetv."],"definitions":["vet. veta III. Lëviz vetë dhe afrohet a puthitet në vendin e hapur për kalim ose për punë të tjera (për një derë, një kanat, një kapak etj.); zihet me diçka që e mbyll; kund. hapet, çelet. U mbyll dera (dritarja). U mbyllën kanatet. U mbyll valixhja. Mbyllet vetë.","Futem a rri diku brenda, nuk dal jashtë, sepse merrem me diçka pa ndërprerje e me këmbëngulje; rri për një kohë të gjatë në një mjedis të mbyllur; ngujohem, ndryhem. U mbyll në shtëpi (në zyrë, në laborator, në bibliotekë). Mbylleshin në kulla për shkak të hakmarrjes. Armiku u mbyll në qytet.","vet. veta III. Bashkohet, puthitet ose afrohet me një pjesë tjetër a me pjesën kryesore (për diçka që është e hapur); paloset, mblidhet (për diçka që është e shtrirë); kund. hapet. Mezi i mbylleshin gishtat. Iu mbyllën sytë (qepallat). Nuk mbyllet çadra.","vet. veta III. Zihet vetë me diçka, mbushet (një e çarë, një vrimë, një gropë etj.); mbulohet. U mbyllën vrimat (plasat). U mbyllën gropat. U mbyll plaga zuri dregëz e u përtha, u shërua.","vet. veta III. Ndërpret veprimtarinë e vet (një ndërmarrje, një institucion etj.); nuk punon më për një kohë a përgjithnjë; kund. hapet; çelet. Dyqanet mbyllen në orën tetë të mbrëmjes. Shkollat mbyllen në fund të qershorit dhe çelen me një shtator. U mbyll ekspozita. U mbyllën shumë sipërmarrje.","vet. veta III. Ndërpritet diçka, merr fund, nuk vijon më tej; mbetet me aq, nuk i shtohet më gjë tjetër. U mbyll mbledhja (kongresi). U mbyllen diskutimet. U mbyll ajo çështje.","fig. Rri i veçuar nga të tjerët, nuk shoqërohem a nuk përzihem me ta; nuk u hapem të tjerëve; merrem me një punë të kufizuar duke iu kushtuar tërësisht asaj, duke lënë punët e tjera e duke mos u shqetësuar për asgjë tjetër. Është mbyllur në vete (në vetvete).U mbyll vetëm në punën e tij.","vet. veta III. Mbushet një kohë e caktuar, merr fund, i vjen fundi, mbaron. U mbyll java. Pa u mbyllur mirë viti.","vet. veta III. Nxihet, erret; vrenjtet (për motin); ngryset. U mbyll moti. U mbyll fare qielli.","Pës. e MBYLL. * Iu mbyll dera (shtëpia) vdiq e s'la njeri pas, u shkretua, mbeti fare vetëm. T'u mbylltë dera! mallk. u shofsh me të gjithë sa ke! Nuk i mbyllet goja dikujt nuk pushon së foluri. Është mbyllur në lëvozhgën (në guaskën) e vet shih te LËVOZHG/Ë,~A. Iu mbyll plaga u qetësua pas një dhembjeje të thellë, ka nisur të harrojë fatkeqësinë. Më mbyllen sytë më flihet shumë. Është mbyllur brenda (katër) mureve të shtëpisë (të zyrës etj.) shih te MUR,~I. Iu mbyll dera me ferra shih te FERR/Ë,~A. Është mbyllur në kullën e fildishtë keq. shih te KULL/Ë,~A."]}]</script>
