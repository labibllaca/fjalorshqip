<script>window.__INITIAL_DATA__ = [{"slug":"brenda","term":"BRENDA","attributes":[],"definitions":["I. ndajf. 1. Në vendin a në hapësirën që përfshijnë kufijtë e diçkaje, në pjesën e brendshme të diçkaje, në brendësi; në hapësirën që kapin kufijtë e një vendi; në një vend të mbyllur; kund. jashtë. Brenda në shishe (në kusi). Brenda në det (në lumë). Brenda në shtëpi (në dhomë). Brenda në pyll. Brenda në qytet. Brenda në tokë. Brenda në trup (në kokë). Hyri brenda. Mbetën brenda. Kush i bën varrin shokut bie vetë brenda. fj.u.","Në pjesën e brendshme të diçkaje, në pjesën që nuk duket, në sipërfaqen e brendshme; kund. jashtë. Lyej (vesh) nga brenda.","Në gjirin e një grupi shoqëror, të një familjeje, të një njësie administrative, të një ndërmarrjeje, të një organizate etj.; kund. jashtë.","Në zemrën e në shpirtin e dikujt, në botën e brendshme, përbrenda. E mbaj brenda nuk e shpreh, nuk e shfaq atë që ndiej.","përd. em. Pjesa ose ana e brendshme e një sendi, pjesa ose ana që nuk duket; kund. jashtë. Është kalbur nga brenda. E nxori nga brenda. II. parafj. Përdoret me një emër të rasës rrjedhore: 1. Kur diçka ndodhet a kryhet në pjesën e brendshme të sendit ose në vendin që shënon emri, në hapësirën që përfshijnë kufijtë e një vendi, në pjesën që nuk duket të diçkaje etj.; kund. jashtë. Brenda shtëpisë (dhomës, klasës). Brenda mureve të oborrit. Brenda portës. Brenda vendit (shtetit). Brenda kufijve (caqeve). Brenda fushës. sport.","Kur dikush a diçka ndodhet ose kur diçka kryhet në gjirin e një grupi shoqëror, të një njësie administrative, të një ndërmarrjeje, të një organizate a të diçkaje tjetër të shënuar nga emri, në brendësi të asaj që shënon emri; kund. jashtë. Brenda ndërmarrjes (organizatës, partisë). Brenda lëvizjes. Brenda garës. Brenda listës. Brenda radhëve.","Kur diçka nuk i kalon kufijtë, masën, numrin, mundësitë etj., kur bëhet ashtu si është vendosur a pranuar; kur diçka kryhet në përputhje me atë që shënon emri, sipas asaj që shënohet nga emri; kund. jashtë. Brenda planit. Brenda programit. Brenda zotimit (parashikimit). Brenda numrit. Brenda mundësive. Brenda rregullit. Brenda rregullores. Brenda radhës. Brenda ligjeve. Brenda temës.","Kur diçka kryhet në kohën e caktuar ose gjatë kohës që shënon emri, ndërmjet kufijve të kësaj kohe; kund. jashtë. Brenda ditës (javës, vitit). Brenda prillit (shtatorit...). Brenda orarit. Brenda orëve të mësimit (të punës). Brenda një kohe të shkurtër. Brenda tre muajsh (pesë minutash). * Dhëndër brenda ai që ka hyrë dhëndër në shtëpi të vjehrrit, kollovar. Ra brenda (me këmbët e tij) a) ra plotësisht në një gabim, e pësoi; ra në grackë; b) thjeshtligj. u dashurua, ra në dashuri; c) thjeshtligj. ra në burg, u burgos. E futën (e rrasën) brenda thjeshtligj., mospërf. e futën në burg, e burgosën. I hyj (i futem) brenda diçkaje e kuptoj, e kap, e marr vesh mirë; njoh thelbin e një çështjeje. Është brenda a) nuk vjen në kundërshtim me një rregull, me një kërkesë të përgjithshme etj.; keq. i përmbahet formalisht diçkaje, përpiqet të zbatojë, së paku në dukje, një masë, një rregull, një ligj etj; b) e di diçka, e njeh një çështje mirë. Sa për të qenë brenda sa për të qenë në rregull me diçka, që të mos jem në kundërshtim me të. E mori kalanë nga brenda ia arriti një qëllimi, ia doli në krye një pune, duke shfrytëzuar rrethanat e brendshme dhe njerëzit që lidhen me këtë punë. Për të lënë thonjtë brenda shih te THUA, THOI."]},{"slug":"brenda","term":"BRENDA-","attributes":["fjalëform."],"definitions":["Pjesë e parë e fjalëve të përbëra, të cilat shënojnë vendin ndërmjet kufijve të diçkaje, ku gjendet një send a ku kryhet një punë etj.; p.sh. brendabërthamor, i brendambyllur, brendamolekular, i brendashkruar etj."]}]</script>
