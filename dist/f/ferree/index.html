<script>window.__INITIAL_DATA__ = [{"slug":"ferree","term":"FERRË","attributes":["f.","sh."],"definitions":["bot. Emërtim i përgjithshëm për shkurre të ndryshme me shumë degë e me gjemba, që mbijnë vetiu nëpër vende të papunuara, nëpër ledhe, anës udhëve etj. Gjinia e ferrave.","bot. Shkurre që mbin vetiu nëpër vende të papunuara, anës udhëve etj., me shumë degë të holla e të mbuluara me gjemba të shkurtër, me gjethe të dhëmbëzuara në trajtë zemre dhe me lute të bardha, që bën kokrra si të manit, të cilat kur piqen marrin ngjyrë të zezë e bëhen të ëmbla; manaferrë. Degë (gjethe) ferre. Gjemb ferre. Mana ferre. Gardh me ferra. Pres ferrat.","Degë a kërcell nga kjo shkurre; gjemb. I hyri një ferrë. U shpua me një ferrë.","bot. Gjembaç.","fig. Diçka e keqe ose njeri i keq që na pengon të ecim përpara, që na nxjerr vështirësi e telashe; gjë e keqe; hall i madh. Pastroj (qëroj, heq, shkul, zhduk) ferrat. Mbillte ferra nëpër këmbë. S’ka gardh pa ferra. fj.u.","fig. Njeri që u ngjitet pas të tjerëve e i mërzit, që nuk të ndahet e s’të lë të qetë. Është ferrë. E kam ferrë. * Iu bë ferrë (rriqër, rrodhe. . .) shih te BËHEM. Çau ferrën (dushkun) shih te ÇAJ. I hynë ferrat filloi të shqetësohet, i hyri krimbi. I vuri ferrën (drizën) diçkaje e la, e braktisi. I bëhet ferra Brahim ka frikë për çdo gjë, trembet për çdo gjë, i bëhet gogol. E bën ferrën pëlle shih te PËLLE. Hodhi një gur në ferrë (në lumë, në ujë) shih tek UJ/Ë,~I. Nuk i ka hyrë ferrë (gjemb) në këmbë nuk ka vuajtur fare, nuk ka hequr keq në jetë; nuk ka pësuar asgjë, s’ka pasur asnjë humbje. Jam (rri) si në (mbi) ferra (gjemba, vezë) shih te GJEMB, ~I. E kam ferrë për qafe diçka me shqetëson vazhdimisht, me bezdis shumë. E ka ferrë (gjemb, halë, shushull) në sy shih te HALË,~A. Kërkoi derë e ferrë shih te DER/Ë,~A. E mori ferra fjalën u përhap fjala kudo, e morën vesh të gjithë. E mori ferra uratën mori fund puna, nuk rregullohet me (thuhet kur diçka nuk mund të prapësohet a të ndreqet më). Mban ferra lakuriq shih
