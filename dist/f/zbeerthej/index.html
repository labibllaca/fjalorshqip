<script>window.__INITIAL_DATA__ = [{"slug":"zbeerthej","term":"ZBËRTHEJ","attributes":["kal."],"definitions":["E ndaj diçka në pjesët përbërëse, shkëput njërën nga tjetra të gjitha pjesët që e përbëjnë (për një makineri, një pajisje etj.); shkul, heq diçka që është ngulur a është mbërthyer te diçka tjetër; kund. mbërthej. Zbërtheu dërrasat. E zbërtheu makinën të gjithë. Zbërtheu pushkën (mitralozin). E zbërtheu me sqepar. Armë — zbërthe! usht.","Nxjerr a heq diçka nga vendi ku është futur, është mbërthyer a është kapur; shkopsit; kund. mbërthej. Zbërtheu rripin. Zbërtheu parashutën (çantën e shpinës). Zbërtheu kopsat. Zbërtheu xhaketën (këmishën, jakën).","spec. Shpërbëj. Zbërthen albuminën.","fig. Shqyrtoj një çështje, një vepër a diçka tjetër, duke e ndarë në pjesët a në elementet përbërëse dhe duke e vështruar nga të gjitha anët, për ta bërë të qartë e të kuptueshme, për të nxjerrë përfundime e detyra, për t'ua përshtatur më mirë kërkesave etj.; analizoj; shtjelloj. E zbërthyen mirë çështjen (problemin, veprën). Zbërtheu një ushtrim. Zbërthyen fjalimin (detyrat, udhëzimet, vendimet).","fig. E bëj dikë të flasë, ia arrij që të m'i thotë të gjitha sa di për diçka a për dikë. E zbërtheu mirë (plotësisht, deri në fund).","Heq nga zgjedha, çmbreh; kund. mbërthej. Zbërtheu qetë. I zbërtheu nga qerrja.","krahin. Hap, çaj diçka duke e thyer; shkallmoj, bëj pjesë-pjesë, shpërthej. Zbërtheu dy vezë. I zbërtheu kokën. Zbërtheu derën. U zbërtheu muret. Ia paska zbërthyer qerren fare. * I zbërthen brinjët keq. a) e rrahu shumë, e rrahu fort, e shqepi në dru; b) e detyroi që t'i nxirrte të gjitha ç'kishte; ia zbuloi të gjitha. I zbërtheu gojën (gjuhën, dhëmbët) dikujt e bëri të fliste, e detyroi t'ia thoshte të gjitha ç'dinte."]}]</script>
