<script>window.__INITIAL_DATA__ = [{"slug":"ngrihem-i","term":"NGRIHEM I","attributes":["vetv."],"definitions":["Çohem në këmbë, merr qëndrimin drejt (për dikë që ishte ulur a kishte rënë përdhe) çohem; kund. ulem. Ngrihem në këmbë. U ngrit nga vendi (nga karrigia). U ngrit nga toka (nga dyshemeja). U ngrit në mbledhje mori fjalën në një mbledhje, duke u çuar nga vendi. Ngrihem nga tryeza largohem nga tryeza, pranë së cilës isha ulur. Ngrihet arithi (has, sus). Mezi ngrihet.","Largohem nga shtrati ose nga vendi ku isha shtrirë për të fjetur, zgjohem; lë shtratin pas një sëmundjeje; çohem; kund. bie. Ngrihem herët (shpejt, vonë). Ngrihem që me natë. U ngrit i sëmuri nga shtrati (nga dysheku) nuk dergjet më i sëmurë, u shërua. Ngrihet me gjelat ngrihet shumë herët në mëngjes.","Nis të eci, mëkëmbem (për foshnjat). U ngrit fëmija me këmbë. Është ngritur shumë vonë.","bised. Largohem nga një vend, ku banoja ose ku isha vendosur përkohësisht. U ngritën nga Tirana. U ngrit me gjithë familje. U ngritën të gjithë të huajt.","vet. veta III. Shton lartësinë; shkëputet nga toka ose nga një sipërfaqe tjetër dhe ngjitet lart; kund. ulet, zbret. Ngrihen retë. Ngrihen zogjtë. Ngrihet aeroplani (helikopteri, raketa). Ngrihet nga aerodromi (nga pista).","vet. veta III. Shkëputet ngadalë nga një sipërfaqe dhe përhapet në ajër. Ngrihet pluhuri (avulli) nga toka. Ngrihet tymi shtëllunga-shtëllunga.","vet. veta III. Shkon më lart nga rrafshi i sipërfaqes, bëhet më i lartë ose më i bymyer; çohet, fryhet. U ngrit toka (vendi). I ngrihej gjoksi. Ngrihet brumi.","vet. veta III. Zë një vend duke dalë më lart se sendet e tjera përreth, duket mbi sendet e tjera. Atje tej ngrihet një mal (një kodër, një shkëmb). Anës rrugës ngrihej një përmendore (një lapidar). Ngrihen oxhakët e fabrikave.","vet. veta III. Duket në horizont, si pasojë e rrotullimit të Tokës, çohet, lind, del. U ngrit dielli tre peshë.","Drejtoj trupin, pasi kam qenë shtrirë a i përkulur; drejtohet lart diçka që rrinte varur ose ishte përkulur, merr drejtimin pingul. U ngrit drejt. U rritën degët. U ngrit përsëri gruri pas shiut. Më ngrihen flokët (qimet e kokës) përpjetë.","Ngre krye, bëj kryengritje, çohem në luftë; nuk pranoj t'i nënshtrohem më. U ngritëm kundër pushtuesit. U ngrit i gjithë populli. U ngritën masat e gjera si një njeri (si një trup) i vetëm. Një bie, mijëra ngrihen.","vet. veta III. I shtohet madhësia, vlera, masa shkalla, bëhet më i madh, rritet. Ngrihet temperatura (shtypja, trysnia). Ngrihet niveli. Ngrihet mirëqenia. Ngrihet në mënyrë të ndjeshme.","vet. veta III. I shtohet vrulli ose shkalla e shfaqjes a e zhvillimit, i zmadhohet forca, bëhet më i fuqishëm. Ngrihet vigjilenca (fryma revolucionare). Ngrihet gjendja shpirtërore. In ngritën nervat u zemërua, u nevrikos.","vet. veta III. I shtohet forca e ndriçimit ose e zërit. Ngrihet drita. Iu ngrit zëri.","Marr një punë a një vend më të lartë se më parë, ngjitem. U ngrit ne detyrë (në përgjegjësi). U ngrit lart.","vet. veta III. Më rritet vlera ose rëndësia përpara të tjerëve. I është ngritur autoriteti (prestigji).","Fitoj përsëri vendin a gjendjen e mëparshme; përmirësoj gjendjen ekonomike; kund. bie. U ngritën pasi hynë në kooperativë.","vet. veta III. Krijohet, themelohet. U ngrit një çetë (një rreth, një organizatë). U ngrit kooperativa.","vet. veta III. Fillon, nis me forcë. U ngrit një erë e madhe.","E ndërpres a i jap fund një pune, të cilën e kryeja ndenjur. U ngritën nga tryeza (nga buka, nga sofra). U ngrit nga puna.","Para një foljeje tjetër tregon fillimin e një veprimi a një përpjekje më të madhe për të kryer diçka. U ngrit e vajti (e shkoi). Ngrihet e punon. Ngrihen dhe e mbrojnë shokët.","Pës. e NGRE. U ngrit flamuri. U ngritën dolli. * U ngrit (doli) nga balta shih te BALT/Ë,~A. Ngrehu e bjer (bjer e çohu) shih te BIE I. Iu ngrit (i hipi, i kërceu, e zuri) damari shih te DAMAR,~I. Iu ngrit (i hipi, kërceu) dielli i ballit shih te DELL,~I. Iu ngrit mendja shih te MENDJ/E, ~A, Ngrihet (çohet) peshë shih te PESHË. Ngrihet me vesë (për vesë) shih te VES/Ë,~A. Iu ngritën (iu çuan) flokët (qimet, leshrat e kokës) përpjetë shih te FLOK,~U. I ngrihet ( i çohet) pluhuri nga prapa dikujt shih te PLUHUR,~I. Iu ngritën (i erdhën, iu mblodhën) zorrët te goja (në grykë, në fyt) shih te ZORR/Ë,~A. Ngrihu prift të ulet (të rrijë) hoxha! shih te PRIFT,~I I. Ngrihen (çohen) këmbët e bien kokës shih te KËMB/Ë, ~A. Kush fle me qenin (me qentë) ngrihet me pleshta fj.u. shih te QEN,~I."]}]</script>
