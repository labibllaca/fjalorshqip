<script>window.__INITIAL_DATA__ = [{"slug":"inat","term":"INAT","attributes":["m.","sh.","bised."],"definitions":["Ndjenjë shqetësimi, trazimi e hidhërimi që na pushton kur nxehemi me dikë a për diçka; humbja e gjakftohtësisë, e durimit etj., zemërim, egërsim. Inat i madh. Në inat e sipër. Mori inat. Ka inat. Shfryn (nxjerr, e përmban) inatin. E zuri (e kapi, i hipi) inati. Më vjen inat. I ra inati. Flet (përgjigjet, thërret) me inat. U tërbua (plasi) nga inati. Qan nga inati. Inati — dëmi i kokës. fj. u.","Ndjenjë pakënaqësie, zemërimi, hakmarrjeje a armiqësie kundrejt dikujt, urrejtje për dikë a për diçka; mëri. Inate të vjetra. Mban inat me dikë. S`ka më inat me të. E ka marrë inat. E kam inat dikë a diçka e urrej. I mbaj inatin i rri i zemëruar, i mbaj mëri gjatë. Ia kam inatin ruaj ende një ndjenjë pakënaqësie, zemërimi, urrejtjeje etj. ndaj dikujt, i mbaj dikujt zemërimin e përpiqem t'ia nxjerr. E pa me inat. Ia bëri për inat.","Kokëfortësi, kryeneçësi. Inat prej derri. E mori me inat një punë. Nga inati nuk e bëri. * Për inat (si për inat) fj. ndërm. për fat të keq, për dreq. Për inat të dikujt për të zemëruar a për të inatosur me qëllim dikë. Sa inat! fj. ndërm. sa keq! E bëri me inat me dikë e bëri me bast me dikë, u hëngër me ngulm me dikë për një punë. S’është me inat (s'është punë inati) nuk ia del dot me të keq, nuk mund të arrish gjithnjë me forcë atë çka dëshiron. Ha inat shih te HA. Ka lidhur inat shih te LIDH. Ia nxori inatin dikujt e trajtoi keq dikë a e ndëshkoi pa të drejtë në inat e sipër; gjetiu e kishte inatin e gjetiu e nxori. Nxjerr inatin (dufin) shih te NXJERR","S’vihet inat me dikë a me diçka nuk ia del dot me dikë a me diçka, nuk mund të hahesh me të, nuk mund ta mposhtësh. Kija inatin dhe foli hakun! (kija inatin, po hakun mos ia ha!) jepi dikujt atë që i takon, vlerësoje drejt dikë a punën e tij pavarësisht nëse të pëlqen a s’të pëlqen, rri shtrembër e fol drejt."]}]</script>
