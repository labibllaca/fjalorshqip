<script>window.__INITIAL_DATA__ = [{"slug":"djeg","term":"DJEG","attributes":["kal."],"definitions":["I vë zjarrin diçkaje a e hedh në zjarr dhe e bëj shkrumb e hi, e shkatërroj, e asgjësoj a e prish në zjarr; e dëmtoj diçka me zjarr a me një send shumë të nxehtë, e shkrumboj. Djeg drutë (barin, kashtën). I dogjën shtëpinë. Djeg me benzinë. Djeg në zjarr (në flakë). E dogji fare. I dogjën kufomat. Dogji flokët (vetullat). Dogji këmishën (fustanin, pantallonat). E dogji rrobën me hekur.","Përcëlloj një pjesë të trupit në zjarr a në flakë; bëj një plagë në trup me zjarr, me hekur a me ujë shumë të nxehtë, me lëndë gërryese etj.; përvëloj; përcëlloj. Dogji dorën (këmbën, gishtat, gjuhën, buzët). E dogji me acid. I dogji duart në gëlqere.","Skuq, ziej a pjek jashtë mase diçka në zjarr, sa merr një ngjyrë të errët a të zezë ose shije të hidhur (zakonisht për gjellët e lëndët ushqimore); ciknos, zhuzhit, shkrumbos; skuq shumë miellin, gjalpin etj. për të gatuar një gjellë. E dogji gjellën (bukën, mishin, tavën, lakrorin). Djeg vajin (gjalpin). Djeg sheqerin (miellin).","Harxhoj një lëndë në zjarr a në flakë për ngrohje, për ndriçim, për gatim etj.; konsumoj. Djeg dru (qymyr, vajguri). Djeg shumë benzinë (elektrik). Mos e digj kot dritën!","Prish gjatë përdorimit një llambë elektrike, një mjet elektrik a një aparat, motor etj. që punon me rrymë elektrike. E dogji llambën (motorin, radion).","Dezinfektoj një plagë, një lungë etj. me një bar të caktuar a e përcëlloj me hekur të nxehtë për ta mjekuar. E dogji vendin e prerë me alkool (me jod). Më parë i digjnin plagët me hekur.","vet. veta III. E than shumë, e dëmton aq shumë sa fishket a thahet dhe prishet. E dogji vapa duhanin. I dogji thatësira të lashtat.","Lëshon nxehtësi të madhe, është shumë i nxehtë, përvëlon. Djeg shumë dielli. Djeg hekuri. Të djeg gjella. Të djeg dielli i mesditës.","vet. veta III (zakon. me një trajtë të shkurtër të përemrit vetor në r. kallëzore). Ta përcëllon a ta bën plagë lëkurën ose të jep djegësirë në gojë, në fyt, në stomak etj, (për disa bimë, disa lëndë e mjete gërryese, disa lloje ushqimesh etj.). E dogjën hithrat. Ia dogji duart acidi. Më djeg brisku. Qepa (hudhra, piperi) të djeg. E dogji rakia në grykë.","vet. veta III (me një trajtë të shkurtër të përemrit vetor në r. dhanore). Kam zjarrmi ose ndiej djegësirë në trup a në një pjesë të tij. I djeg balli (fytyra, koka). I djegin duart. Më djegin sytë. Më djeg fyti (stomaku).","fig. (me një trajtë të shkurtër të përemrit vetor në r. kallëzore). Më bën të brengosem e të vuaj shumë, më mundon, s'më lë të qetë. E dogji malli (dashuria, dëshira).","fig. bised. E marr me qafë dikë, e fik; e bëj të humbasë e të dalë jashtë lojës ose jashtë garës. E dogji, e përvëloi. E dogji keq. E dogjën pa të drejtë. E dogji kundërshtarin. Ia dogjën dy lojtarë.","fig. (me një trajtë të shkurtër të përemrit vetor në r. dhanore). Më vjen hidhur, s`më pëlqen diçka; më ngacmon, më ther. I dogjën fjalët e mia. I dogji kritika (shakaja). I dogji ai shikim. E di unë ku i djeg atij.","edhe fig. bised. Bëj që diçka të shkojë dëm, e bëj të pavlefshëm; bëj t`i dështojë dikujt plani që kishte përgatitur. Ia dogjën biletat. E dogjën fondin. Ia dogji planet. Ia dogji diskutimin.","bised. Pi duhan, e ndez. E djeg ndonjëherë.","Nxeh shumë me zjarr e me flakë një furrë të re para se ta vë në përdorim; nxeh furrën para se të fut në të diçka që të piqet. Djeg furrën.","Pjek në furrë tullat; pjek në furrë gurin gëlqeror për të bërë gëlqere. Djeg tulla (tjegulla). Djeg gëlqere. Dogji pesë furra gëlqere. * Ia dogji lëkurën dikujt shih te LËKUR/Ë,~A. I djeg miza trembet se mos e kuptojnë të tjerët që ai e ka fajin (për një njeri që vërtet është fajtor). Djeg e pjek dikush vret e pret këdo, bën dëm në masë, shkatërron çdo gjë. Djeg raki (kazanin) bëj raki duke zier rrush etj. në një kazan të posaçëm. Dogji shaminë u gëzua shumë, bëri festë të madhe. I dogji shpirtin e hidhëroi shumë, e pikëlloi (thuhet sidomos kur dikujt i vdes një njeri shumë i dashur). I digjnin veshët shih te VESH,~I. Edhe i ha, edhe i djeg thjeshtligj., iron. shih te HA. Ku të dhemb e ku të djeg shih te DHEMB. Kujt i djeg le të kruhet thjeshtligj. ai që ka gabuar le ta kuptojë; nuk bëhem merak fare. Ia dogji kartat (letrat) në dorë dikujt ia kuptoi qëllimet që më parë dhe nuk e la t'i plotësojë ato, ia zbuloi planet dhe ia prishi para se t'i vërë në jetë. Ia ka djegur qulli (luga) buzën shih te QULL,~I. Për një plesht djeg jorganin shih te PLESHT,~I. Kur ka mashën, pse të djegë dorën fj. u. shih te MASH/Ë,~A","Sot i bën hunjtë, nesër i djeg shih te BËJ."]}]</script>
