<script>window.__INITIAL_DATA__ = [{"slug":"ccorbee","term":"ÇORBË","attributes":["f."],"definitions":["gjell. Gjellë e lëngët, si supë e trashë që gatuhet zakonisht me oriz ose me makarona të holla dhe me të brendshmet e bagëtive. Çorbë me oriz. Çorbë pule (qengji). Një pjatë çorbë. Lugë çorbe. Ndaj çorbën.","gjell. Brumë i thartë me miell gruri që zihet me kos a me qumësht e pastaj thahet në diell e thërrmohet; një lloj qulli pak i thartë që bëhet me këtë brumë. Çorbë e thartë. Çorbë me kos. Çorbë tigani. Trazoj çorbën.","fig. keq. Diçka e përzier në mënyrë të parregullt e pa shije, diçka e ngatërruar dhe e paqartë; rrëmujë e madhe, pështjellim. Çorbë citatesh. Çorbë dialektesh. E kam kokën çorbë. * Çorbë derri a) gjellë shumë e keqe e pa shije; b) përzierje krejt e parregullt dhe e papëlqyeshme, pështjellim i padurueshëm. E bëj çorbë e pështjelloj keq, e bëj lesh e li. Pështyu në çorbë (në gjellë) shih te PËSHTYJ. Ia ka ngrënë çorbën dikujt e njeh mirë dikë; ia ka pirë lëngun dikujt. E ka ngrënë çorbën përpara dikujt di më shumë se një tjetër, ka përvojë më të madhe se dikush tjetër, e ka parë diellin para një tjetri. Ia bëj kokën (mendjen) çorbë e ngatërroj shumë, ia prish mendjen, ia bëj mendjen dhallë. M'u bë mendja çorbë (dhallë, bozë, përshesh, lëmsh, tym...) shih te DHALL/Ë,~I. U zunë (u prishën) për një lugë çorbë shih te LUG/Ë,~A. S'bartet çorba me kaçile fj. u. është punë që s'bëhet, s'mbahet uji me shoshë."]}]</script>
