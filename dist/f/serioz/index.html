<script>window.__INITIAL_DATA__ = [{"slug":"serioz","term":"SERIOZ","attributes":["mb."],"definitions":["Që vepron e sillet në mënyrë të matur, duke i menduar dhe vlerësuar gjërat mirë; që e njeh mirë punën e vet, e kryen me ndërgjegje e me ndjenjë të thellë përgjegjësie dhe është kërkues ndaj vetes e ndaj të tjerëve; që nuk është mendjelehtë. Njeri serioz në punë (në shoqëri). Studiues serioz. Nxënës serioz.","Që bëhet a thuhet me kujdes e me përgjegjësi, duke e menduar mirë e si duhet; që bëhet a thuhet me gjithë mend; që është i vërtetë, i qëndrueshëm e i thellë, jo i cekët. Fjalë serioze. Mendim serioz. Punë serioze. Qëndrim serioz ndaj punës (ndaj detyrave). Dashuri serioze.","Që ka një rëndësi të veçantë, që nuk është bërë sa për të kaluar radhën ose me të qeshur, i mbështetur, me përmbajtje të thellë e të pasur, jo i lehtë. Vepër serioze. Libër serioz. Bisedë serioze. Këshilla serioze. Opera serioze. muz. opera pa skena komike, me përmbajtje zakonisht tragjike. Muzikë serioze muzikë klasike.","Që është i rëndë a që mund të ketë pasoja të dëmshme e të rrezikshme, që është mjaft shqetësues; që është mjaft i madh për ta përballuar e për ta kapërcyer. Gabim serioz. Të meta serioze. Sëmundje serioze. Gjendje serioze. Pengesa (vështirësi) serioze. Paralajmërim serioz. Kërcënim serioz për lirinë e pavarësinë e popujve.","Që nuk i qesh fytyra, që ka pamje të menduar ose të vrenjtur nga një kujdes, një shqetësim etj.; që nuk pranon shaka, hijerëndë, i vrenjtur; kund. i qeshur. Me pamje serioze. Rri serioz.","Që shpreh qortim a pakënaqësi për diçka, i rreptë. Shikim serioz. Ton serioz.","Që e ruan nderin vetjak dhe nuk luan në marrëdhëniet me të tjerët; që është në përputhje të plotë me normat morale; kund. mendjelehtë. Vajzë serioze. Djalë serioz. Qëndrim serioz."]}]</script>
