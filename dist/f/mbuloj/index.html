<script>window.__INITIAL_DATA__ = [{"slug":"mbuloj","term":"MBULOJ","attributes":["kal."],"definitions":["I vë diçkaje përsipër një pëlhurë, një mushama, një kapak etj. për ta mbrojtur ose për ta ruajtur; i hedh dikujt përsipër një rrobë a një mbulesë (kur fle, kur ka të ftohtë etj.); kund. zbuloj. Mbuloj tryezën. Mbuloj fëmijën (të sëmurin). Mbuloi supet me shall. E mbuloi me kapak. Mbuloj me batanije (me mushama). E mbuloi me jorgan.","I hedh çatinë një ndërtese; vë tjegullat etj. në çati. Mbuloi shtëpinë (kasollen). Mbuloj me tjegulla (me kashtë, me beton).","Lyej sipërfaqen e një sendi me diçka; i hedh diçka përsipër ose e vesh me diçka, e mbështjell; kryes. veta III i bie a i rri përsipër një shtresë prej diçkaje, e zë të gjithë sipërfaqen sa nuk duket më; vjen a del me shumicë sipër diçkaje sa e fsheh të gjithë, e mbush. E mbuloj me bojë vaji (me llak, me një shtresë dylli). E mbulon një cipë (një push i hollë). Bora mbuloi malet. Blerimi (bari) mbuloi fushat. Arat i mbuloi uji. Orenditë i mbuloi pluhuri. Mbuloj me dhe (me rërë, me baltë). Mbuloj zjarrin me hi. Luginën e mbuloi mjegulla. Ia mbuluan varrin me lule. E mbuluan thinjat.","Fut në dhe një të vdekur, e varros. E mbuluan me nderime të mëdha. E mbulofshin të gjallë! mallk.","Fsheh një send me diçka, e zë me diçka që të mos duket. Mbuloj sytë me duar. E mbulonin fytyrën me perçe. Retë mbuluan diellin.","fig. Përpiqem në mënyra të ndryshme të fsheh një faj, një gabim ose një të metë, e fsheh; e mbyll, i jap fund pa e zgjidhur. Donte ta mbulonte fajin (krimin). S'i mbulon dobësitë (të metat) e veta. Mbulojnë qëllimet e vërteta. Mbulonin gabimet e njëri-tjetrit. E mbuloi me fjalë (me fraza) të bukura. E mbuluan atë çështje.","E mbush plot me diçka, i jap me shumicë; e pllakos, e mbyt (edhe fig.). E mbuloi me të puthura. E mbuloi me para (me të gjitha të mirat). E mbuloi me të shara. E mbuluan me lavdi. E mbuluan lotët. I mbuloi varfëria. E mbuluan hallet (punët). E mbuloi frika. E mbuloi turpi.","usht. I bëhem dikujt mburojë a mbështetje në një luftim; e mbroj me zjarr që të mos dëmtohet nga armiku, e ndihmoj me zjarr. Mbuluan veprimet e batalionit. E mbuluan me artileri (me top, me mitraloz, me zjarr).","sport. Përshkoj një largësi (në garat e vrapimit, të notit, të çiklizmit etj.) brenda një kohe të caktuar; bëj. E mbuloi largësinë për 13 minuta e 10 sekonda.","fin. Siguroj mjetet e nevojshme financiare për të përballuar një shpenzim a detyrim; përballoj, shlyej. Mbuloi borxhin. I mbuloi shpenzimet vetëm 50%. I mbuloi humbjet. Mbulon nevojat e ndërmarrjes. Të ardhurat u përdorën për të mbuluar ndërtimet e reja.","zyrt. Kam nën varësi a drejtoj një sektor pune. Mbulon një fushë të gjerë veprimtarie. Secili përgjigjet për sektorin që mbulon. * E ka mbuluar bari (ia ka mbuluar varrin bari) shih te BAR,~I I. E mbuloi dobiçin e mbuloi, e fshehu fajin a gabimin që ka bërë (për të mos u turpëruar në sy të botës etj.). I mbuloi (i humbi, i fshehu) gjurmët shih te GJURM/Ë,~A. E mbuloj në hi (e ngrohi në hi) shih te HI~RI. I mbulon këmbët është fsheharak, nuk shfaqet siç është, i fsheh qëllimet e këqija. I mbulon (i fsheh) letrat shih te FSHEH. E mbuloi me plaf diçka shih te PLAF,~I. E mbuloi me turp dikë e turpëroi. Ra qielli dhe e mbuloi (e zuri) shih te QIELL,~I. Mbuloi balta baltën përb. shih te BALT/Ë, ~A. Si të shtrosh, ashtu të mbulojnë fj.u. shih te SHTROJ."]}]</script>
