<script>window.__INITIAL_DATA__ = [{"slug":"mbaj","term":"MBAJ","attributes":["kal."],"definitions":["E shtrëngoj diçka a dikë me dorë ose me anën e një sendi dhe nuk e lë të bjerë, të shkasë, të lëvizë, të ikë etj. E mban drejt timonin. Mbaj hekurin e skuqur me mashë. E mbante me dhëmbë. Mbaj fëmijën për dore (për krahu). E mbante fort e nuk e lëshonte. I mbaj pallton (çadrën) dikujt. Në njërën dorë mbajmë kazmën, në tjetrën pushkën.","Qëndroj duke pasur mbi vete diçka a dikë ose e çoj këtë vetë a me një mjet nga një vend në një tjetër; mbart. E mbajti mbi kurriz (në qafë, në krahë). Mbanin ujë me bucela. E mbajti me karrocë (me kamion). Nuk e mban dot vetëm.","E kam ose e marr diçka a dikë me vete, s'e ndaj nga vetja për një kohë të gjatë; kam; vesh a mbath, përdor si pjesë të veshmbathjes sime, ngjesh pas trupit. Mbante shkop (bastun). Letërnjoftimin e mbajmë me vete. S`mban gjë nëpër xhepa. Mbante armë. Mban syze. S`mban unaza. Mbartin xhoke me kinda. Mban këpucë me qafa. Mban çorape leshi. Nuk mban kapelë. Mban brez. Mbante rroba pune. Mban mustaqe. E mbaj për (si) kujtim. E mbante djalin gjithnjë pas. I mbajtsh me shëndet! ur.","fig. Kam një emër a mbiemër, një titull, një dekoratë etj. Mban mbiemrin e mëparshëm (e burrit). Brigada mban emrin e heroit. Mban disa urdhra e medalje (dekorata). E mbajtshi me nder! ur.","Ndal në vend dikë a diçka, nuk e lë të lëvizë, të ecë a të veprojë më tej, e pengoj të rrjedhë etj.; ndal, ndaloj; pengoj, vonoj. Shoferi e mbajti makinën te sheshi. Mbaje kalin (qenin)! Më mbajti pak në rrugë. E mbajti me fjalë. E mbajti në këmbë. E mbajtën me zor. E mbajtën për darkë. S`e mbajti njeri, vetë qëndroi. Nuk po ju mbaj më gjatë. E mbajti vrapin në oborr. Mbaj këmbët (hapin) ndalem. Mbaj frymën ndal frymëmarrjen. Mbaje dorën! mos qëllo!","E përmbaj diçka e nuk e lë të shfaqet a të shpërthejë; ndrydh në veten time (një ndjenjë etj.); e fsheh diçka, nuk e tregoj, nuk e shfaq. Mbaj teshtimën. Mezi i mbajti lotët. E mbajti të qeshurën (gazin). E mbajti zemërimin. Mbaj gjakftohtësinë. E mbaj në zemër (në shpirt). E mban përbrenda. E mbaj të fshehtë. S`mban gjë ai.","vet. veta III. I lidh e i rrit kokrrat derisa piqen, nuk i bien kokrrat (për një pemë); e rrit pjellën deri sa lind, nuk e dështon (për kafshët). Kjo mollë nuk i mban kokrrat. Nuk e mbajti lopa viçin, e dështoi.","Marr, pranoj diçka nga dikush. Nuk ia mbajti dhuratat (peshqeshin). Mbajti për vete vetëm gjysmat, të tjerat ua dha shokëve.","E ndal dikë, nuk e lë të kthehet në vendin a në familjen e vet, nuk e lë të ikë; e detyroj dikë të qëndrojë në një vend a në një gjendje të caktuar; e ndal diçka, nuk e jap, nuk ia kthej diçka të zotit. I mbajtën peng dy fëmijë. E mbajtën tre muaj në spital. E mbajtën pesë vjet në burg. I mbajti dy lekë më shumë. S`më mbajti asgjë. S`të mban gjë çfarë ka e jep.","E bëj të qëndrojë diçka në një gjendje a në një drejtim që i kam dhënë (edhe fig.). E mban trupin (shtatin) drejt. E mbante kokën përpjetë. I mbajnë krahët hapur (shtrirë, varur). I mban sytë poshtë (ulur). E mbante gojën mbyllur (kyçur). I mban dritaret hapur. I mbajmë gjithnjë lart flamujt e revolucionit.","zakon. veta III. Është mbështetje për diçka, shërben që diçka të qëndrojë në një gjendje të caktuar, të mos rrëzohet, të mos çahet etj.; i qëndron një force, një peshe, një goditjeje etj., e përballon; nuk thyhet a nuk këputet; është i fortë a i qëndrueshëm, është në gjendje të mirë (edhe fig.). Çatinë e mbajnë trarët. Urën e mbajnë këmbëzat (qemerët). Peshën kryesore të ndërtesës e mbajnë shtyllat. Frontin e mbajtën pesë divizione. Nuk e mbanin këmbët (gjunjët). Si e mban gjithë atë peshë! Ky litar (pe, tel, tra) nuk mban. Kjo fuçi nuk mban ujë (nuk e mban ujin).","fig. I siguroj jetesën dikujt, e ushqej dhe e rrit me të ardhurat e mia, kujdesem për dikë; ushqej. Mban pleqtë (fëmijët, shtëpinë). I mbante me bukë. E mbajti gjallë. E mban në pëllëmbë të dorës (me të gjitha të mirat). E mban babai. I mban i biri (e bija). Na mban puna (toka). E mban shteti. E mbajnë me bursë.","E ruaj ose e lë diçka për një farë kohe në një gjendje të caktuar; e trajtoj dikë në një mënyrë të caktuar ose e lë në një gjendje të caktuar. E mban të ngrohtë gjellën. Kjo sobë e mban nxehtësinë. Kjo tokë nuk e mban ujin (lagështirën). I mban mirë rrobat. E mban pastër shtëpinë. I mban keq fletoret. I mbante mirë (keq) fëmijët. E mbante me hatër.","E fut diçka në një vend a në një lëndë të caktuar dhe e lë atje për disa kohë, e vë diku përkohësisht. E mbajnë mishin në frigorifer. E mbaj birrën në akull. E mbajmë djathin në shëllirë. E mbante koburen në xhep (nën jastëk). E mban në dollap (në shishe). I mban paratë në arkën e kursimit. Mbaj mënjanë. E mbante fshehur (në shtëpi).","Rrit kafshë a shpendë; kam mbjellë pemë, bimë etj. e kujdesem për to. Mban pula (rosa, derra, lepuj). Mban bletë. Mban mollë (rrush, fiq, kumbulla). E mban për damaz.","bised. edhe vjet. Zotëroj diçka që e përdor për tregti ose për një veprimtari tjetër; vë në shitje a në qarkullim, shes. Mbante një hotel (një han, një pijetore). Mbante një dyqan. Mbante një gazetë. Mban verë të mirë. Nuk mbajnë pije alkoolike. Kjo librari mban edhe sende shkollore.","E ngarkoj dikë të kryejë një punë a detyrë të caktuar në një ndërmarrje a institucion; vjet. e marr ose e pranoj dikë në shtëpi a në punë për një shërbim a qëllim të caktuar, kam. E mbajtën si normist (si llogaritar). Mbante qiraxhinj në shtëpi. Mbanin shërbëtorë (hyzmeqarë, shegertë, kopile). Mbanin qehallarë.","Bëj gati diçka për një punë, e shtrij, e hap etj. Mbaje thesin, të të hedh miellin! Mbaje shishen, të të hedh verën! Mbanin çarçafin për të shkundur manat.","E lë dikë të vijojë punën ose të kryejë një detyrë të caktuar, nuk e largoj, nuk e heq. Disa vetë i mbajtën në laboratorin qendror. Pjesën më të madhe të punëtorëve e mbajtën në perimore, të tjerët i dërguan në pemishte.","fig. E quaj, e vlerësoj, e çmoj dikë a diçka për një tipar a cilësi të caktuar; e kujtoj për të tillë, e pandeh. E mbante për të mençur (për budalla). E mbanin për trim (për frikacak). E mbanin për nxënësin më të zgjuar. E mbajnë për mjekun më të aftë. E mban veten (si) të ditur. E mbajnë veten farefis (të afërt) me të. E mbajnë si romanin më të mirë të kohës sonë. Për kë më mban ti mua? E mbanim për të mirë, po doli i keq.","Zbatoj disa rregulla të caktuara në mënyrën e jetesës, në punë etj., bëj siç kërkohet; i vë vetes kufi në të ngrënë e në të pirë sipas disa kërkesave e porosive. I mban të gjitha rregullat. Mbaj porositë (këshillat) e dikujt. Mban pehriz (dietë). S`mbante të kremte. S`mbajnë më as kreshmë, as ramazan.","fig. I qëndroj besnik fjalës që kam dhënë ose zotimit që kam marrë. E mbaj fjalën (zotimin). E mbajti besën si burrat.","edhe jokal. Eci ose shkoj në një drejtim të caktuar, i bie; nisem. Mbaj krahun (nga e djathta). Mbaj drejtimin. Ia mbajtën drejt (djathtas, majtas, nga lindja, nga jugu). Mbaja bregut e bregut! Ia mbajti për në Durrës. Ia mbajti me të katra. Nga po ia mban? Nuk dinë nga t’ia mbajnë.","Përqendroj sytë, mendjen etj. në një drejtim ose në një vend. Vështrimin e mbante nga rruga (nga dera). Aty e mbante mendjen.","Lexoj një leksion, një raport etj.; flas për diçka. Mban leksione në fakultet. Mbajti raportin. Mbajti një ligjëratë (një fjalim, një kumtesë, një bisedë).","Bëj, organizoj një mbledhje etj.; zhvilloj. Mbajtën një mbledhje (një konferencë, një kongres).","Shkruaj diçka; kam e përdor diçka për një punë. Mbaj protokollin. Mbaj shënime. Mbaj ditar. Mbajnë dosje të veçanta për çdo çështje.","Zë (radhën), rri (në radhë); edhe fig. zë një vend të caktuar (në një radhë, në një renditje a në një shkallëzim). Mbaj radhën. Mban vendin e parë. Mban rolin kryesor.","edhe fig. Kam; ruaj. Secili mban vendin e tij. Mbajnë marrëdhënie të mira. Mbaj lidhje të rregullta me dikë. E mbajnë miqësinë. Mbaj qetësi. Mbaj rregullin. Mbaj një minutë heshtje (zi). Mban qëndrim të mirë. Mban përgjegjësi.","bised. Qëlloj dikë a diçka me armë ose me një send tjetër; shënoj me armë përpara se të qëlloj, marr nishan. Ia mbajti me pushkë (me dyfek). Ia mbajti me pëllëmbë. Ia mbajti në kokë (në lule të ballit). Mbaja pak më poshtë (më lart)! 31. Duroj. Nuk e mban rakinë. Nuk mban shaka. Si e mban atë turp? Mban shumë ai. 32. edhe fig. Kam një erë të caktuar, më vjen era; bie erë, kundërmon. Mban erë myk. Mban erë të mirë (të keqe). Mban erë vajguri. I mban erë goja. Mban erë formalizëm (burokratizim) ka formalizëm (burokratizëm). 33. bised. Kërkoj një shumë të caktuar për diçka që dua ta shes, shes. Sa e mbante? E mbante lirë (shtrenjtë). 34. vet. veta III. Të bën të jesh i ngopur e i aftë për punë për një kohë të gjatë. Mishi të mban. Kosi (gjiza) nuk të mban shumë. 35. jokal. vet. veta III. Zgjat në kohë, vazhdon (një punë, një udhëtim, një dukuri etj.); rron, qëndron (për veshmbathjet, orenditë etj.). Sa mbajti mbledhja? Shfaqja nuk mbajti shumë. Mbajti deri vonë. Rruga mbajti dy orë. Shiu mbajti gjithë ditën. Dasma mbante një javë. Mbajnë shumë këto këpucë. Mbajnë edhe ca kohë. 36. vet. veta III bised. Nxë, merr. Shishja mban një litër. Ena s`mbante shumë. 37. muz. Shoqëroj me zë të dytë ose me iso, ia kthej; shoqëroj dikë që hedh valle. Njëri ia merr e tjetri ia mban. Ia mbante vallen. 38. E bëj dikë të presë a të durojë (me premtime, me shpresa etj.) sa për të fituar kohë; vet. veta III ka ende, nuk e ka lënë (shpresa etj.). E mbajti me shpresa (me fjalë, me gënjeshtra). E mbajti me kurajë. E mban shpresa ka ende shpresë, shpreson. 39. pavet. bised. Bën (për kohën, zakonisht kur bën kohë e mirë a e përshtatshme për punët bujqësore). Mbajti mirë (butë) koha. Nuk ka mbajtur këtë javë (këtë vit). Ka mbajtur dimër (behar) sivjet. * Nuk ia mban thjeshtligj. nuk ka guxim për të bërë diçka a për t`i dalë zot një pune; ka frikë. E mbaj afër dikë shih tek AFËR","I mban anën dikujt shih tek AN/Ë,~A I,7. Ia mban avaz shih tek AVAZ,~I. Mban një avaz (i bie një [po atij] avazi) keq. shih tek AVAZ,~I. I mban avazin (i shkon pas avazit, i vete pas avazit) shih tek AVAZ,~I. I mban bishtin (i shkon pas bishtit) shih te BISHT,~I. Mbajti (mblodhi) çaklat shih te ÇAK/ËL,~LA. Mban dizgjinët mban drejtimin si duhet, mban frenat në dorë. Mbaj dorën e përdor diçka me kursim, nuk harxhoj shumë. Ia mbaj dorën dikujt kujdesem për të më shumë se për të tjerët. Mban një drugë përsërit gjithmonë të njëjtën gjë, mban të njëjtin avaz. S'më mban dheu shih te DHE,~U. Ma mbajti dhëmbi shih te DHËMB,~I. I mbaj erë diçkaje i marr erë, e nuhat. Mban flamurin a) është në krye, qëndron në radhë të parë, qëndron në ballë, kryeson; b) edhe keq. është me nam. Mban frerin drejton, udhëheq; sundon. E mban në fre dikë shih te FRE,~RI I. E mbajti (e la) frymën diku shih te FRYM/Ë,~A. Mezi mbanin frymën ishin shumë të varfër, rronin si mos më keq. Mbaj gojë! mos fol më! (për dikë që është duke përdorur fjalë të rënda a të ndyra). E mban në gojë dikë a diçka e kujton vazhdimisht, e përmend gjithnjë. E mban (e merr, e heq) nëpër gojë dikë a diçka shih te GOJ/Ë,~A. E mban (e ka) në grusht shih te GRUSHT,~I. Mbaj gjallë diçka shih te GJALLË. Mban inat me dikë shih tek INAT,~I","I mbaj inatin shih tek INAT, ~I","I mban ison (i bën ison) dikujt keq. shih tek ISO, ~JA. I mban zërin dikujt shih te ZË,~RI. S’i ka mbajtur kandilin (bishtukun, pishën) dikujt thjeshtligj. shih te KANDIL,~I. S'e mban (s'e ngre, s'e çon, s'e heq) kandari shih te KANDAR,~I. E mbaj me këmbë diçka shih te KËMB/Ë,~A. I mban konferencë dikujt iron. i flet dikujt gjatë për një çështje a për t'i mbushur mendjen për diçka. Mbajti (mori) krahun e dikujt shih te KRAH,~U. Nuk ia mban kurrizi (shpina) edhe poh. nuk është punë për mundësitë a aftësitë e tij, nuk është në gjendje ta përballojë, nuk mund ta bëjë. Ç’mban lëkura e tij! shih te LËKUR,Ë,~A. Mbaj mend edhe moh. shih te MEND, ~TE. Mbaj mendjen! eja në vete! E mbaj në mend e ngul në kokë që të mos e harroj; e shtie në kokë. Mbaj parasysh diçka e kam në mendje, nuk e harroj; e kam parasysh. E mban përbrenda diçka shih te PËRBRENDA","Mban sehir bën sehir. I mbaj (i kam) sytë te dikush a te diçka shih te SY,~RI. I mbaj sytë hapur shih te HAPUR. Mbaj (marr) shënim për diçka shih te MARR. Mbaje me shëndet iron. shih te SHËNDET,~I. E mban në shenjë dikë shih te SHENJ/Ë, ~A. Sa për të mbajtur shpirtra (frymën) sa për të jetuar, sa për të mos vdekur urie, shumë pak (për ushqime). Nuk e mban toka diçka nuk durohet, nuk mund të pranohet kurrsesi (për një veprim të ulët, për një sjellje shumë të keqe etj.). Nuk e mban toka (vendi) dikë është shumë i shqetësuar ose i gëzuar, sa që nuk i rrihet në një vend. Mbaj mbi trup shih tek TRUP,~I. Mbaj udhën! shiko punën tënde, mos fut hundët në punët e të tjerëve! Mbaj vendin! keq. mos fol, mos ndërhy, mëshoji vendit! E mbaj në vend shih te VEND,~I","E mbaj (e mbërthej, e gozhdoj) në vend shih te VEND,~I. Mbaj vesh dëgjoj, përgjoj se çfarë thotë dikush. I mbaj vesh dikujt a diçkaje shih te VESH,~I. E mban veten a) mbahet mirë; vishet e mbathet mirë; b) është i matur dhe i kujdesshëm në marrëdhënie me të tjerët, është i përmbajtur; c) është kryelartë, nuk e lë veten ta marrin të tjerët nëpër këmbë. Nuk ia mbante xhepi nuk kishte para, nuk i dilte hesapi për më tepër, s'e përballonte dot atë shpenzim. Nuk ia mban zava nuk është i zoti, nuk është në gjendje ta kryejë një punë etj. Mban zi është në zi për vdekjen e një njeriu të afërt a të dashur. S'ka nga ia mban s'di si t'ia bëjë që të shpëtojë nga një hall i madh etj.; s'di a s'ka ç'të bëjë. Mbaj ballin lart shih te BALL/Ë,~I. Mbaj barkun (brinjët, ijët) me dorë shih te BARK,~U. Mban barkun me dorë shih te BARK,~U. S'i mban barku gjë (nuk mban gjë në bark) shih te BARK,~U. E mbajmë barutin thatë shih te THATË. E mban bishtin cakërr keq. shih te CAKËRR. Mban bishtin përpjetë shih te PËRPJETË. E mban derën hapur (çelur) shih te HAPUR. S'i mban goja arra dikujt shih te GOJ/Ë, ~A. S'mban gjë në trup shih tek TRUP,~I. E mban nën hijen e tij dikë shih te HIJ/E,~A. E mban (e ka) hundën lart (përpjetë) iron. shih te HUND/Ë,~A. E mban hundën në qiell shih te QIELL,~I. Ma mban kokën mënjanë shih te KOK/Ë,~A. Ku ta mbaj unë e ku ma mban ti tjetër gjë bëj a them unë, tjetër gjë bën a thua ti. Rri e mban murin shih te MUR,~I. Nuk mban më pluhur në vesh shih te PLUHUR,~I. Nuk mban pluhur mbi vete shih te PLUHUR,~I. S’e mban (s'e duron) as qielli, as dheu (as toka) shih te QIELL,~I. E mbante qefinin me vete shih te QEFIN, ~I. I mban sytë dollap shih te DOLLAP,~I. I mbaj sytë hapur shih te HAPUR. I mbaj (i bëj) sytë katër shih te KATËR. I mbanin (i ngrinin) sytë nga qielli shih te QIELL,~I. Mbaj syrin në shtjekëz shih te SHTJEKËZ,~A. E mban sahatin në ujë dikush shih tek UJ/Ë,~I. Shtëpinë shite, shokun mbaje! fj. u. shih te SHES. Nuk mban më ujë orizi (pilafi, kosi, vera) shih tek UJ/Ë,~I. Mban (mbush, merr) ujë me shoshë (me shportë) shih te SHOSH/Ë,~A. Mban (mbart) verë e pi ujë shih te VER/Ë,~A II. Ia mbajti (u nis) va pa va shih te VA,~U. E mban (e vari, e vuri, e ka) vath në vesh diçka shih te VESH,~I. I mbaj veshët hapur (hapët) shih te HAPUR. I mban veshët kapëz shih te KAPËZ,~A. I mban veshët përpjetë (ngritur) shih te PËRPJETË. I mban (i ngre) veshët pipëz shih te PIPËZ,~A. Mban vezë në tundës shih te VEZ/Ë,~A. Mbaje (ruaje) zogun sa e ke në dorë! fj. u. shih te ZOG,~U."]}]</script>
