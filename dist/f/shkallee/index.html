<script>window.__INITIAL_DATA__ = [{"slug":"shkallee","term":"SHKALLË","attributes":["f.","sh."],"definitions":["Mjet prej druri a prej metali, që përdoret për t'u ngjitur diku dhe që përbëhet nga dy binarë të gjatë paralelë, tek të cilët janë mbërthyer ose janë futur shulas e në largësi të barabartë disa copa drurësh a hekurash. Shkallë e vogël (e shkurtër, e madhe, e gjatë). Shkallë dyshe. Shkallë e drunjtë (e hekurt). Shkallë të lëvizshme. Shkallë suedeze. sport. shpinore, shpatullore. Shkallë druri (hekuri). Shkallë litari. Shkallët e zjarrfikësve. Një palë shkallë. Mbështet shkallën pas murit. Ngjitem me shkallë. Hipi në shkallë. Ra (u rrëzua) nga shkallët.","kryes. sh. Varg shkallaresh të palëvizshme prej guri, prej betoni, a prej dërrasash, që ndodhen jashtë një ndërtese a brenda saj e që shërbejnë për t'u ngjitur e për të zbritur; hapësira që zë kjo pjesë në ndërtesë, bashkë me parmakët e me muret mbajtëse. Shkallë të gjera (të ngushta, të larta). Shkallë guri (mermeri, betoni, dërrasash). Parmaku (basamaku, muri) i shkallëve. Në krye (në fund) të shkallëve. Lyej (fshij) shkallët. Ngjit (zbres) shkallët.","Hyrje e përbashkët, që nga kati më i ulët deri në më të lartin, për një varg apartamentesh në një ndërtesë shumëkatëshe; përmb. bised. të gjitha apartamentet që ndodhen në këtë hyrje dhe njerëzit që banojnë në të. Shkalla e parë (e dytë...). Ndërtesë me tri shkallë. Mbledhja e shkallës. Përgjegjësi i shkallës. Në cilën shkallë banon? Shkalla 5, apartamenti","","Shkallare. Shkallët e stadiumit (e amfiteatrit). Shkallët e tribunës. Shkalla e skelës. vjet. vend i shtruar në port, ku afrohen anijet. I zbres (i ngjit) shkallët dy e nga dy.","gjeogr. Udhë e përpjetë dhe e ngushtë në një grykë mali, që është si me shkallare; vend me shkëmbinj e me gurë të mëdhenj në një faqe mali. Shkalla e malit. Shkalla e Tujanit (e Priskës, e Mirakës, e Valshit). top. Kaluan nëpër shkallë.","fig. Masë, madhësi; shtrirja e diçkaje, përpjesëtim; nivel. Në shkallë të gjerë. Në shkallë të ndryshme. Në shkallën e duhur. Në shkallë kombëtare (ndërkombëtare, botërore). Në shkallë republike (rrethi). Në një shkallë më të madhe (më të lartë). Deri në një farë shkalle. Shkalla e përgatitjes (e pjekurisë, e njohurive, e gatishmërisë, e zhvillimit, e ndikimit). Shkalla e ndërgjegjes. Shkalla e rrezikshmërisë (e fajësisë, e përgjegjësisë). Shkalla e elektrifikimit. Shkalla e qëndrueshmërisë. Shkalla e ndriçimit. spec. Shkalla e fortësisë. spec. Shkalla e lagështisë. spec. E ngre diçka në një shkallë të re.","fig. Gjendje, pikë, cak. E solli punën në atë shkallë, sa... Në ç`shkallë ka arritur puna? Si u katandis në këtë shkallë?","fig. Klasë (për dekorata e urdhra); cilësi, kategori, grup, rend. Çmimi i Republikës i Shkallës së Parë (së Dytë, së Tretë). Gjykatë e shkallës së parë (së dytë). Gatishmëri (ushtarake) e shkallës së parë (së dytë). Djegie (në trupin e njeriut) e shkallët së parë (së dytë, së tretë). Veprime aritmetike të shkallës së parë (së dytë...). Fjali të varura të shkallës së parë (së dytë).","fig. vjet. Vendi i dikujt në shoqëri, gjendja shoqërore e tij, shtresë; dorë. Shkallë shoqërore. Nga shkalla e lartë (e ulët). Nuk ishin të një shkalle. Ishte i shkallës tonë. E ulën shkallën e lartë. Më parë i vështronin shkallën njeriut.","fig. Pjesë e një vargu gjërash a dukurish që përbëjnë një të tërë ose që ndjekin njëra-tjetrën, shkallëzim; brez. Shkallë ngjyrash. Shkallë njerëzish brez njerëzish të një moshe.","Çallatë në një send të ngurtë; e prerë në flokët etj. Iu bë një shkallë sëpatës. U bëjnë deleve nga një shkallë në vesh. Ia preu (ia qethi) flokët me shkallë.","spec. Vijë e ndarë në pjesë të vogla e të barabarta, që shënojnë të zvogëluar disa herë e në përpjesëtime të caktuara gjatësinë e vërtetë të asaj që hidhet në një hartë, në një vizatim, në një skicë, në një rrafsh etj.; raporti ndërmjet gjatësisë së vërtetë dhe zvogëlimit të saj në hartë, në vizatim etj. Shkallë grafike. Shkallë e vogël (e mesme, e madhe). Shkallë numerike. Shkallë hartografike. Shkalla 1: 50000. Zvogëloj (zmadhoj) shkallën.","spec. Tërësia e vijave ndarëse dhe e shifrave përkatëse të shënuara në fushën e një vegle a të një aparati matës, shkallëzim. Shkalla e termometrit. Shkallë milimetrike. Shkalla e një aparati. Shkallët e vizores llogaritëse.","muz. Varg tingujsh muzikorë në rend ngjitës ose zbritës, që përfshin zakonisht një oktavë. Shkallë muzikorë (melodike, harmonike).","Laku i samarit, shkallare. Vuri këmbën në shkallë.","Furkaçe, ngarkaçe. Vëri shkallën!","Gradë. Të nxehtët arriti tridhjetë e shtatë shkallë. Ishin në 46 shkallë gjerësi gjeografike.","gjuh. Kategori gramatikore e mbiemrave cilësorë dhe e disa ndajfoljeve, që tregon masën e shfaqjes së cilësisë a të tiparit të shënuar prej tyre (në mënyrë të krahasuar ose jo të krahasuar). Shkalla pohore (krahasore, sipërore). Shkallët e krahasimit.","mat. Treguesi më i madh i fuqisë të së panjohurës në një ekuacion ose i ndryshores në një polinom, gradë. Shkalla e një ekuacioni (e një polinomi). Ekuacion i shkallës së parë (së dytë). * Shkallë e thyer mospërf. shih te THYER (i,e). Aq i arrijnë shkallët dikujt aq i ka mundësitë ose aftësitë, nuk bën dot më shumë se aq, s'është i zoti për më tepër. Ra nga shkallët dikush a) humbi pozitën e lartë shtetërore a shoqërore që kishte; b) pësoi një dëm a një fatkeqësi të rëndë, e gjeti një e keqe e madhe. E hodhi nga shkallët dikë përçm. e dëboi me forcë, e nxori jashtë me shkelma. I hoqi shkallët dikujt shih te HEQ. Ngjitet edhe pa shkallë dikush është shumë i shkathët, i zgjuar e dinak; i kapërcen vështirësitë me zgjuarsi e dredhi, duke përdorur edhe mënyra e mjete jo të rregullta. I ngjit shkallët një nga një dikush shih te NGJIT. Mos i shiko shkallët, por shikoji oborrin! (dikujt) fj. u. mos e vlerëso dikë nga ajo që ka trashëguar prej të tjerëve, por çmoje nga puna që bën ai vetë e nga aftësitë që ka. Burri në shkallë, po shkalla në mur fj. u. njeriu duhet të punojë e të luftojë me guxim, por me mend në kokë; të ecim përpara duke e menduar e peshuar mirë atë që bëjmë. Kur s'ke shkallën, merr litarin (është i mirë edhe litari) fj.u. për të kryer një punë, kur nuk i ke mjetet më të mira, mund të përdorësh edhe mjete të tjera jo aq të volitshme, mjafton që puna të bëhet; kur s'ke pulën, ha edhe sorrën. Në çati ngjiten me shkallë fj. u. çdo punë kërkon mjetet e nevojshme. Shkalla e lartë do (kërkon) këmbë të forta fj. u. duhet t'i matim mirë fuqitë e të përgatitemi me kujdes kur ia hyjmë një pune të rëndësishme."]}]</script>
