<script>window.__INITIAL_DATA__ = [{"slug":"meesoj","term":"MËSOJ","attributes":["kal."],"definitions":["I jap dikujt arsim e edukatë ose njohuri nga një fushë e dijes nëpërmjet mësimit sipas një programi të caktuar; i jap mësim dikujt, jam mësuesi i dikujt. Mësoi nxënësit. U mësoi teorinë marksiste.","edhe jokal. Marr njohuri, përvetësoj dije nga një fushë e caktuar, studioj një lëndë mësimore etj.; nxë. Mësoj mësimet. Mësoj filozofinë marksiste. Mësoj fizikën. Mësoj një vjershë përmendsh. Kishte mësuar shumë mirë. Shkojnë në shkollë për të mësuar. Sa të rrosh, do të mësosh. fj. u. Të mësojmë duke punuar dhe të punojmë duke mësuar. fj. u.","jokal. Ndjek mësimet, jam nxënës në një shkollë a në një kurs; synoj të pajisem me njohuri për diçka. Mëson në shkollë (në kurs, në universitet). Mëson për elektricist (për muzikë).","Ndihmoj dikë nëpërmjet ushtrimeve e mësimeve që të fitojë shprehi për të bërë një punë të caktuar; stërvit një kafshë për ta bërë të aftë të kryejë veprime sipas dëshirës së njeriut; ushtroj dorën, gishtat etj. për të bërë veprime të caktuara; stërvit. E ka mësuar të ngasë makinën. Mëson dorën për vizatim. Mësoj veshin për të dalluar tingujt. Mëson kafshët në një cirk. Mëson qenin për gjah. I mësoi biçikletën (notin) të birit.","Bëj përpjekje për të fituar shprehi për punë a për të bërë veprime të caktuara, përpiqem të përvetësoj a të zotëroj një mjeshtëri, një detyrë etj.; stërvitem në diçka, ushtrohem me diçka, nxë mënyrën se si të përdor diçka a të bëj një punë. Mësoj një zanat. Mësoj të përdor një aparat. Mësoj përdorimin e armëve. Mësoj biçikletën (notin). S’mëson kali revan në pleqëri. fj. u.","Këshilloj dikë se si duhet të sillet e të veprojë; i tregoj rrugën që duhet të ndjekë, e udhëzoj; e edukoj. Si më mëson të bëj? E mëson mirë. E ke mësuar keq. U bë veza të mësojë pulën! iron.","jokal. Vë mend, fitoj përvojë nga një pësim; përfitoj nga përvoja e dikujt a nga diçka, marr mësim. Mësoi nga pësimi (nga gabimet). Mësova shumë prej tij.","I t
