<script>window.__INITIAL_DATA__ = [{"slug":"nderoj","term":"NDEROJ","attributes":["kal."],"definitions":["Sillem mirë e me respekt të veçantë kundrejt dikujt; shpreh vlerësimin e lartë dhe respektin për dikë. Nderon prindërit (pleqtë, më të mëdhenjtë). Nderoj kujtimin e dikujt. Nderojmë dëshmorët. E nderojnë si mësues.","I nxjerr emër të mirë dikujt a diçkaje, e nxjerr faqebardhë, i bëj nder; bëhem i denjë që të më vlerësojnë të tjerët, më bën nder; kund. turpëroj. Nderuan atdheun (popullin, Partinë). Nderoi kooperativën (brigadën). Na nderoi në shkollë (në punë). Nderoi veten dhe shokët. Kjo sjellje nuk i nderon.","I jap diçka si shenjë të veçantë vlerësimi; i bëj nder me një mënyrë të caktuar. E nderuan me flamur (me medalje). Na nderojnë me pjesëmarrjen e tyre. Na nderoi me një letër.","Përshëndet me një lëvizje të dorës ose të kokës; usht. përshëndet duke ngritur dorën pranë kapës ose duke kthyer kokën në një drejtim. Nderoj me grusht (me dorë, me kokë). Në qendër-ndero! Majtas (djathtas)-ndero!"]}]</script>
