<script>window.__INITIAL_DATA__ = [{"slug":"tundem","term":"TUNDEM","attributes":["vetv."],"definitions":["Lëviz disa herë e në mënyrë të rregullt sa nga një anë në anën tjetër, sa lart poshtë; lëkundem, përkundem. Tundem në kolovajzë. Tundej mbi degë.","Lëkundem a shkundem fort, zakonisht disa herë, sa nga një anë në tjetrën, sa para prapa ose sa lart poshtë; tronditem lëkundem me forcë. U tundem në karrocë (në qerre). U tundën xhamat.","vet. veta III. Lëkundet lehtë; lëviz lehtë a valëvitet në ajër (për gjethet, për flamurin etj.). Gruri tundej ngadalë. Flamurët tundeshin në ajër.","edhe fig. Eci duke kërcyer pak sa nga e majta në të djathtë; shkoj duke u lëkundur sa nga një anë në tjetrën, lëkundem (nga lodhja a nga të pirët). Tundej si i pirë. Tundej e shkundej mbahej me të madh, kapardisej. Tundej rëndë-rëndë. Shkonte (ecte) duke u tundur.","edhe fig. bised. Lëviz nga vendi ku jam ngulur, luaj nga vendi; shkundem nga plogështia, nis të punoj, lëviz. Tundu, ç’pret? S’tundet nga vendi. S’ka ndërmend të tundet që andej. E bëri që të mos tundet nga vendi e rrahu shumë. Ra dhe s’u tund. Po s’u tunde vetë, s’fiton gjë.","moh. Nuk jepem, nuk dorëzohem, nuk luaj nga imja; nuk tutem, s’më trembet syri. Luftoi dhe s’u tund fare. Partizanët qëndruan pa u tundur. Mbahu, mos u tund! S’u tund nga e tija. Pushka bam, po ai nuk tundej. Muri tundet, burri s’tundet. fj. u.","Pës. e TUND. * U tund vendi a) lëvizën të gjithë, s’mbeti njeri pa luajtur; b) u ndie kudo, s’mbeti njeri pa e dëgjuar, bëri shumë bujë. S’tundet (s’lëviz) nga vendi shih te VEND, ~I."]}]</script>
