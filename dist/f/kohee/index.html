<script>window.__INITIAL_DATA__ = [{"slug":"kohee","term":"KOHË","attributes":["f.","sh."],"definitions":["vet. nj. Vazhdim e kalim i pandërprerë i minutave, i orëve, i ditëve, i muajve, i viteve etj. nga e shkuara në të ardhshmen dhe pa kthim prapa; gjatësia e gjëllimit të çdo gjëje dhe e vazhdimit të dukurive e të ngjarjeve, që matet me shekuj, me vite, me muaj, me ditë, me orë etj. Ndarjet e kohës. Njësitë e matjes së kohës. Në periudha të shkurtra kohe. Gjatë kohës. Me kalimin e kohës (me kohë). Koha ecën (ikën, shkon). Ndajfolje kohe. gjuh. Plotës kohe. gjuh. Koha është flori. fj. u.","vet. nj. filoz. Formë objektive e ekzistencës së materies dhe kusht themelor i lëvizjes së saj, që shpreh se sa zgjatin sendet, dukuritë, ngjarjet ose proceset, se si vijnë këto njëra pas tjetrës. Koha dhe hapësira. Nuk ka asgjë jashtë kohës dhe hapësirës.","edhe sh. Pjesë e papërcaktuar mirë e një periudhe, në të cilën vazhdon një dukuri a një proces, ndodh diçka ose bëhet një punë. Kohë e gjatë (e shkurtër). Kohë e humbur. Kohët e para në fillim; ditët, javët e para a muajt e parë. Kohët e fundit tani vonë; ditët, javët a muajt e fundit. Për një kohë të pacaktuar. Koha e të vjelave. Në kohën e të mbjellave (e të korrave). Në kohë paqeje (lufte). Në kohën e lulëzimit. Koha e pushimeve. Gjysmën e kohës. Gjithë kohën vazhdimisht, pa ndërprerje. Ca (pak) kohë. Prej kohësh. Në pak kohë. Kaq kohë një periudhë të gjatë. Pas pak kohe. Për një farë kohe. Që prej shumë kohësh. Pak kohë më parë (më pas). Kaq pak kohë. Gjatë gjithë kësaj kohe. Pa humbur kohë. Ka ca kohë ca kohë më parë. S’ka shumë kohë pak kohë më parë. Ka një kohë të gjatë (ka shumë kohë) shumë kohë përpara. Humbas (fitoj, kursej) kohë. Rifitoj kohën e humbur. Kërkon (do, duhet) kohë. Sa kohë zgjati (jetoi)?","vet. nj. Periudhë gjatë së cilës punojmë, bëjmë diçka ose pushojmë; minutat, orët, ditët etj. që i përdorim për punë a për pushim. Kohë e lirë. Në kohën e punës. Koha e pritjes. Në kohën e pushimit. Jashtë kohës së punës. Kam kohë jam i lirë; kam nge. Nuk kam kohë jam i zënë; nuk kam nge. Gjej kohën. I zë gjithë kohën. Përdor gjithë kohën. I kushtoj gjithë kohën. I merr kohën. Më merr shumë kohë. Nuk më mjafton (nuk më del) koha. I jap (i lë) kohë. Pa i dhënë kohë të fliste (të mendohej). Pagesë me kohë. ek. pagesë që bëhet sipas orëve të shpenzuara për punë dhe jo sipas sasisë së prodhimit.","vet. nj. Periudhë historike në jetën e shoqërisë njerëzore, të një populli ose të një shteti; epokë. Koha e Luftës Nacionalçlirimtare. Koha e gurit (e hekurit, e bronzit). Koha e mesme mesjeta. Në kohën tonë. Në kohën e Skënderbeut. Historia e kohës së re.","kryes. sh. Periudhë e përafërt prej muajsh, vitesh a shekujsh, në të cilën ndodh, kryhet ose zhvillohet diçka me rëndësi në jetën e një populli; periudhë që dallohet nga disa kushte të veçanta, nga një gjendje e caktuar etj. Koha e sotme. Në kohët e kaluara. Në kohët tona. Në kohët e para dikur në të kaluarën. Në kohët e lashta. Në kohën e zisë. I të gjitha kohëve. I një kohe tjetër. Rrojmë në kohë të lumtura (heroike, të vrullshme). Ishin kohë të vështira (të këqija, të rënda). Kanë ndryshuar kohët. Kanë ardhur të tjera kohë. Iku ajo kohë (ikën ato kohë).","vet. nj. Periudha a epoka në të cilën jetojmë, e sotmja, e tanishmja; periudha bashkëkohore (e sotme ose e kaluar). Njeri i kohës. Vepër e kohës. Detyrë (kërkesë) e kohës. Çështje e kohës. Me frymën (me hapin) e kohës. Në shtypin e kohës. Ecën me kohën. I ka kaluar koha (s`është më i kohës) është vjetruar, nuk është më i përshtatshëm për të sotmen.","edhe sh. Periudhë e jetës a e moshës së një njeriu; periudha e jetës që ka kaluar një njeri. Koha e rinisë (e djalërisë, e vajzërisë). Koha më e lumtur (më e bukur) e jetës. Në kohën tonë kur ishim ne të rinj. Në kohën e vet kur ishte në moshën më të mirë.","Pjesë e ditës ose e natës, orë; pjesë e stinës. Në kohën e drekës (e darkës). Në kohën e vapës. Në kohën e gjumit. Në kohën e dimrit. Në kohën më të ftohtë (më të nxehtë). Pret në çdo kohë. E gjen në punë në çdo kohë. Në çfarë kohe ndodhi? Jap kohën. bised. përshëndet sipas pjesës së ditës, jap vaktin.","Çast prej të cilit llogariten përafërsisht ditët, muajt e vitet që kanë kaluar ose që do të vijnë; çasti kur ndodh a bëhet diçka. Prej asaj kohe. Që nga ajo kohë. Deri në atë kohë. Deri në një farë kohe. Në të njëjtën kohë (po në atë kohë) njëkohësisht.","vet. nj. Ora, dita etj. që caktohet për fillimin ose për mbarimin e një pune; afat; çasti i përshtatshëm kur duhet bërë një punë a një veprim; rast. Koha e mbledhjes. Koha e fillimit të punës (të mësimit). Para kohe para afatit. Në kohë në afat; kur duhej, në çastin e duhur. Me kohë para afatit, para se të jetë vonë; kur duhej. Erdhi pa kohë. Derisa të vijë koha. Është koha të... Nuk ka më kohë. Ka kohë do edhe ca; nuk është për ngut. I kaloi koha. Nuk pret koha. Caktoj (vendos) kohën (e mbledhjes). I gjej kohën. I dhanë dy ditë kohë. Çdo gjë në kohën e vet. Në kohën dhe në vendin e duhur.","vet. nj. Tërësia e rrethanave objektive, që zhvillohen e që sjellin ndryshime dhe që përfytyrohen si një forcë vepruese. Nën veprimin e kohës. E ndryshoi koha. E shëron koha. Le t`ia lëmë kohës. Koha do ta tregojë.","astr. Përcaktimi i orëve, i ditëve e i viteve, që bëhet për t'u llogaritur ato me përpikëri, duke u mbështetur në disa dukuri periodike të qëndrueshme; orë. Koha astronomike (diellore) ora që përcaktohet në bazë të pozitës së Tokës kundrejt Diellit. Koha ligjore shtytja një orë më përpara se sa koha lokale për të shfrytëzuar pjesën e ditës me dritë të mjaftueshme. Koha lokale ora sipas mesditësit që kalon nëpër një vend.","vet. nj. Tërësia e kushteve atmosferike a gjendja e motit në një vend dhe për një periudhë të caktuar; mot. Kohë e mirë (e keqe). Kohë e ftohtë (e ngrohtë, e butë, e thatë, e lagësht). Kohë e kthjellët (e bukur). Kohë e paqëndrueshme (e ndryshueshme). Kohë me shi (me erë, me ngricë). Parashikimi i kohës. Koha sot dhe nesër. Ditë me kohë të mirë. Kohë e pa kohë edhe në mot të keq. Ndërroi (u prish, u zbut, u ftoh) koha. U ndreq (u përmirësua, u rregullua) koha. Po të mbajë koha po të jetë kohë e mirë. Ka bërë kohë e keqe. U hap koha doli dielli, u larguan retë. Koha e mirë duket që në mëngjes. fj. u.","tek. Secila nga fazat e ciklit të plotë të punës së një motori. Motor me katër kohë.","muz. Secila prej nënndarjeve të barabarta të masës, që përcaktojnë ritmin e pjesës; secila nga pjesët në të cilat ndahet simfonia, suita, sonata etj. Me një ritëm të caktuar. Koha tri të katërta. Simfoni në katër kohë.","sport. Secila nga lëvizjet e thjeshta, që përbëjnë një ushtrim gjimnastikor ose rreshtor. Koha e parë e ushtrimit. E marr armën në sup me dy kohë.","gjuh. Kategori gramatikore e foljes, që shpreh marrëdhënien e veprimit a të gjendjes me çastin kur flasim ose kur shkruajmë dhe që ka trajtat e veta t ëveçanta. Kohë të thjeshta (të përbëra). Koha e tashme (e shkuar, e ardhme). Përshtatja e kohëve. * Koha e artë (shekulli i artë) shih tek ARTË (i, e). Kohë (orë) e vdekur shih te VDEKUR (i, e)","Që në kohën e qyqes shih te QYQ/E,~JA. Në kohën që (kur)... ndërsa, kur, gjatë. Për sa kohë që... përderisa. Për aq kohë sa... përderisa. Kohë më kohë (kohë pas kohe, nga koha në kohë) herë pas here, në periudha pak a shumë të largëta e jo rregullisht. Në kohën e vet kur ishte në fuqi, kur kishte pushtet në dorë. Orë e kohë shih tek OR/Ë,~A I. Orë e pa kohë shih tek OR/Ë,~A I. Në të njëjtën kohë gjithashtu, krahas kësaj. Njëherë e një kohë (njëherë motit) shih te NJËHERË. Në kohën e baba Qemos shumë kohë më parë, në një periudhë të largët sa nuk mbahet mend mirë. E ka shkelur koha dikë shih te SHKEL. Vret kohën shih te VRAS. Kroi (pusi) i mirë njihet në kohë të thatë fj. u. shih te KRUA, KROI. Shkoftë kohë e shkoftë mot, e vërteta del në not fj. u. shih te VËRTE/Ë,~A (e)."]}]</script>
