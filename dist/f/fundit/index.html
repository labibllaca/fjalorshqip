<script>window.__INITIAL_DATA__ = [{"slug":"fundit","term":"FUNDIT","attributes":["mb."],"definitions":["Që është në fund a në skajin më të tejmë të një vargu ose të një radhe frymorësh, sendesh, dukurish etj.; që vjen pas gjithë të tjerëve; kund. i parë. Vagoni i fundit. Rreshti i fundit. Shtëpia e fundit. Pema e fundit. Stacioni i fundit. Qesh mirë ai që qesh i fundit. fj. u.","Që ka mbetur në fund e një i vetëm, pasi janë larguar ose janë harxhuar gjithë të tjerët. Dallëndyshja e fundit.","Që ndodhet në fund të një vendi të thelluar, të një ene etj. Shtresa (pjesa) e fundit.","Që shënon mbarimin e një kohe të caktuar; që nga ana kohore kryhet në fund të një vargu ngjarjesh, veprimesh, punësh a dukurish; që shënon cakun kohor kur dikush a diçka mbaron së qeni e nuk vijon më tej. Dita e fundit e javës. Muaji i fundit i vitit. Viti i fundit i pesëvjeçarit. Perandoria e fundit.","Që ka të bëjë me kohën më të afërt përpara çastit kur flasim, që sapo është bërë e ka ndodhur; më i ri. Kohët e fundit. Ditët e fundit. Zbulimet e fundit. Vendimet e fundit. Udhëzimi (fjalimi) i fundit. Të rejat (lajmet, ngjarjet) e fundit. Sipas të dhënave (njoftimeve) të fundit. Prodhimi i fundit.","Që është para vdekjes, që e thotë në çastin para vdekjes. Në orën (ditën, çastin) e fundit. Fjala e fundit. Në grahmat e fundit. Dëshira e fundit. Vullneti i fundit porosia që lë dikush përpara se të vdesë.","Më i lartë; më i rëndë. Masa e fundit. Shkalla e fundit. Dënimi i fundit.","Përfundimtar; vendimtar. Qëllimi i fundit. Grushti i fundit. Goditja e fundit.","fig. Që ka më pak vlerë ose rëndësi; që është më i prapambetur se të tjerët. Njeriu (më) i fundit.","përd. em. sipas kuptimeve 1, 2, 9 të mbiemrit. S'është as i pari, as i fundit. * Së fundi kohët e fundit. Më së fundi tekembramja, më në fund. Tek e fundit në fund të fundit. Në analizë të fundit libr. shih tek ANALIZ/Ë,~A. Banesa e fundit euf. varri. I dorës së fundit i një cilësie shumë të dobët. Në dorë të fundit gati në përfundim. F
