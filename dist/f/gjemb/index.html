<script>window.__INITIAL_DATA__ = [{"slug":"gjemb","term":"GJEMB","attributes":["m.","sh."],"definitions":["Zgjatim i vogël, i fortë e me majë të mprehtë, që del në kërcellin e disa bimëve ose në trungun a në degët e disa drurëve e shkurreve; një pjesë e bimës (gjethe, kërcell, degë etj.), që ka formën e këtij zgjatimi të vogël e me majë të mprehtë. Gjemb i fortë. Gjemb ferre (drize, murrizi). Gjemb trëndafili. Gjembat e portokallit (e shegës, e kumbullës, e kullumbrisë). Degë me gjemba. I hyri një gjemb. Nxjerr gjembin.","Emërtim i përgjithshëm i disa bimëve me zgjatime të tilla; ferrë. Fushë me gjemba.","Zgjatimi i fortë me majë të mprehtë në trupin e kafshëve; gjilpërë. Gjembat e iriqit.","Majë e mprehtë metalike ose diçka me maja të mprehta e pak të kthyera. Tel me gjemba","fig. Njeri i keq, që u bie më qafë të tjerëve; diçka e keqe, diçka që pengon dhe sjell dëm. I qëruan gjembat.","Halë e hollë e peshkut. Peshk me gjemba.","krahin. shih. SFUR/K~KU 1.","krahin. Pirun. * Flet me gjemba thumbon të tjerët kur flet, e hedh fjalën te njëri e tek tjetri për t'i qortuar a goditur, flet me thumba. Fut gjemba fut grindjen, përçarjen, fut spica. I hyri gjembi iu ndez dëshira ose kureshtja për diçka, i hyri krimbi. Jam (rri) si mbi (në) gjemba (ferra, vezë) nuk e ndiej veten të qetë; rri i shqetësuar. Kurorë me gjemba libr. simbol i vuajtjes dhe i mundimit. Qen me gjemba (me kreshta) keq. shih te KRESHT/Ë,~A. Rri gjemb mbahet i veshur mirë dhe shumë i pastër e i rregullt, rri spicë. I rri gjemb dikujt i rri mbi kokë dikujt e nuk e lë të qetë; i rri çekan mbi kokë. Sikur shkel mbi gjemba (mbi vezë) me shumë kujdes, në majë të gishtave (për mënyrën e të ecurit). I vuri gjembin dikujt e shtrëngoi keqas, ia mblodhi rripat. Iu bë buka gjemb (gorricë) nuk i shkonte buka poshtë, i mbeti buka në grykë (nga një lajm i keq etj.). Nuk i ka hyrë gjemb (ferrë) në këmbë shih te FERR/Ë,~A. E ka gjemb (halë, ferrë, shushull) në sy shih te HAL/Ë,~A. Kërkon këmbë për gjemb nxjerr ndonjë shkak që të zihet, kërkon njeri që të grindet. Nuk la gjemb këmbe i zhduku, i shfarosi të gjithë, shkatërroi gjithçka. E mban si zogun majë gjembit dikë e mban me të gjitha të mirat, e mban në pëllëmbë të dorës. Flutura e gjembave zool. lloj fluture dëmtuese, vemjet e së cilës janë të përhimëta, me dy vija anësore të verdha dhe me gjemba të verdhë ose kafe. Lule gjembi bot. shih te LUL/E,~JA."]}]</script>
