<script>window.__INITIAL_DATA__ = [{"slug":"gjethe","term":"GJETHE","attributes":["f.","sh."],"definitions":["Pjesë e rëndësishme e bimëve si fletë e hollë, zakonisht e gjelbër, me trajta të ndryshme, që del në degë, në kërcell ose drejt nga rrënja dhe që shërben për përftimin e lëndëve ushqyese nën veprimin e dritës, si edhe për shkëmbimin e gazeve; kjo pjesë e bimëve që përdoret për ushqim nga njerëzit ose kafshët. Gjethe e gjelbër (e zverdhur). Gjethe të njoma (të thata). Gjethe vezake (gjatore, heshtore). Gjethe e madhe (e vogël, e gjerë). Gjethe e përbërë. Gjethe të këmbyera (të përkundërta). Gjethe të dhëmbëzuara (të lëmuara). Gjethet e bimëve (e drurëve, e pemëve). Gjethe molle (fiku, mani, rrushi...). Gjethe lakre (sallate, spinaqi). Bishti i gjethes. Kurora e gjetheve. Shumëzimi me gjethe. Degë me gjethe. Nxjerr (lëshon) gjethe. Mbushet me gjethe. I mban gjethet. I bien gjethet.","përmb. shih GJETH,~I 2,","Çeli gjethja.","Thika e zdrukthit me teh të gjerë. * Me bar e me gjethe shih te BAR,~I I. Gjethe (fletë) fiku shih te FI/K,~KU. E ka gjethe dikë e mund a e mposht lehtë dikë, s'e ka për gjë, as që matet dot me të ai. U bë gjethe plepi u dobësua shumë, u tret; u zverdh. Dridhej si gjethe lofate (plepi) kishte shumë frikë, ishte trembur shumë, i kishin hyrë drithmat nga frika. Është gjethe plepi a) është shumë i lehtë në peshë; b) e ndien veten shumë mirë, është i lehtë si gjethja (pas një sëmundjeje); c) iron. është pa asnjë lek në xhep. Luan si gjethja e plepit nuk e mban fjalën a premtimin. Si gjethja në verë shih te VER/Ë,~A I. Kur (sa) të bëhet gjethja sa këmba e patës shih te PAT/Ë,~A."]}]</script>
