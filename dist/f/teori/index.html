<script>window.__INITIAL_DATA__ = [{"slug":"teori","term":"TEORI","attributes":["f.","sh."],"definitions":["Përgjithësim mendor i përvojës, që lind nga praktika, që pasurohet e vërtetohet në praktikë e që pasqyron dukuritë thelbësore dhe ligjet e zhvillimit të natyrës, të shoqërisë e të mendimit; dije e fituar nga jeta dhe e përgjithësuar, që zbulon shkaqet e thella të sendeve e të dukurive, si edhe lidhjet e marrëdhëniet ligjësore ndërmjet tyre. Teori revolucionare. Teori shkencore. Lidhja e teorisë me praktikën. Shkëputja e teorisë nga praktika.","Tërësia e parimeve, e tezave dhe e përgjithësimeve, që formojnë një shkencë a një degë të saj, bazat e përgjithshme të një shkence; tërësia e rregullave dhe e ligjeve, që janë të domosdoshme për të njohur thellë një mjeshtëri, një art etj.; shkenca që ka si objekt studimin e këtyre parimeve, rregullave e ligjeve. Teoria marksiste-leniniste. Teoria e makinave. Teoria e muzikës (e letërsisë, e kompozimit, e përkthimit). Teoria e gjuhës. Teoria e pilotimit.","Tërësia e ligjeve shkencore, që shërbejnë si bazë për një parim të përgjithshëm dhe që shpjegojnë një fakt a një dukuri; mënyra se si e shpjegon dikush një fakt, një dukuri, etj. në bazë të këtyre ligjeve e të këtij parimi; sistem pikëpamjesh për diçka; mendim i caktuar i dikujt për diçka, pikëpamje, bindje etj., sipas së cilës sillet e vepron dikush. Teori shkencore (materialiste, revolucionare). Teoria leniniste e njohjes (e pasqyrimit). Teori idealiste (reaksionare). Teoria atomike e ndërtimit të lëndës. Teoria darviniste e evolucionit. Teoria e mbivlerës.","Gjykim a përfytyrim abstrakt, që pranohet në parim dhe nuk merr parasysh praktikën; trajtimi i diçkaje në një plan shumë të përgjithshëm abstrakt. I pranueshëm vetëm në teori. Në teori ashtu është, po duhet vërtetuar edhe në praktikë. Flet vetëm në teori. Teoria e artit për art. Kish teorinë e tij për punën (për jetën, për dashurinë).","kryes. sh. keq. Fjalë e gjykime të kota, që nuk ndihmojnë punën, fjalë boshe
