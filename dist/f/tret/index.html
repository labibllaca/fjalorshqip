<script>window.__INITIAL_DATA__ = [{"slug":"tret","term":"TRET","attributes":["kal."],"definitions":["Shkrij në ujë ose në një lëng tjetër një lëndë zakonisht të ngurtë, e bëj atë të lëngshme, duke e përzier e duke e shkrirë në një lëng. Tret sheqerin (kripën). Tret gëlqeren në ujë. Benzina i tret yndyrat.","Kthej në gjendje, të lëngët një lëndë të ngurtë duke e ngrohur a duke e nxehur, e shkrij. Tret gjalpin (dhjamin, dyllin). Tret kallaj (plumb).","Bluaj mirë ushqimin, në stomak të hollohet e të thithet nga organizmi. S'ma tret stomaku.","Prish; kalb. E treti dheu. E treti ndryshku.","vet. veta III. E dobëson shumë nga trupi, e lig nga shëndeti, e bën të hequr e të brishtë. E ka tretur sëmundja.","fig. Shpenzoj diçka shpejt e pa kursim, prish, shkrij, harxhoj zakonisht kot. I treti paratë. E treti pasurinë. I treti të gjitha fuqitë.","fig. E përvetësoj mirë diçka, duke e përsëritur ose duke e përpunuar, e thith, e bluaj. E ka tretur mirë mësimin. Nuk e tret dot këtë pjesë.","fig. keq. Pranoj, duroj, honeps. Nuk, m'i tret mideja këto lëvdata. Nuk i tret dot gënjeshtrat e tij.","E hedh tej diçka si të pavlefshme, e flak poshtë. E treti bishtin e cigares.","edhe jokal. E humbas diçka e nuk e di ku është; më humbet dikush nga sytë e nuk e di ku ndodhet a nga shkoi; nuk jam më me dikë, nuk kam më dikë a diçka, sepse e kam harruar a e kam lënë diku ose më ka rënë diku; humb. Një pjesë e dorëshkrimeve kanë tretur. I treti shamia rrugës. I treti ndër sy dikush. Nuk e di se ku i treti syzet.","Ngatërroj rrugën a gaboj drejtimin, nuk di nga të shkoj më tej; nuk e ndjek dot më tej atë që kërkoj, humb. Ka tretur rrugën (drejtimin). I treti gjurmët.","edhe jokal. E dërgoj dikë në një vend të largët, e dërgoj në humbje, e syrgjynos; shkoj në mërgim, larg të afërmve të mi, larg atdheut; iki larg. Fashistët na i tretën bijtë dhe bijat burgjeve të Italisë. Mjedën e kishin tretur në një fshat të largët. Treti në dhe të huaj.","fig. Largo diçka, bëj të ikë a të zhduket. Ia treti druajtjen. Ia treti gëzimin. * I treti (i humbi, nuk i duket) boja shih te BOJ/Ë, ~A. S'e tret dheu (besën, amanetin) nuk humb kurrë, nuk harrohet kurrë. Goja tret edhe malet fj. u. shih te MAL, ~I. Treti (hodhi) shikimin (vështrimin) larg vështroi larg, hodhi vështrimin tutje si i harruar. Ia treti (ia humbi, ia shoi) farën dikujt a diçkaje shih te FAR/Ë, ~A. Treti (humbi) mendja e kokës shih te HUMB. I tret (i derdh) plumbin në gojë dikujt përd. shih te DERDH",""]}]</script>
