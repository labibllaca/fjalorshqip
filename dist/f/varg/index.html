<script>window.__INITIAL_DATA__ = [{"slug":"varg","term":"VARG","attributes":["m.","sh."],"definitions":["Radhë sendesh të një lloji, që janë shkuar në pe, në tel etj. ose që janë lidhur a gërshetuar njëri me tjetrin. Varg duhani. Një varg rruazash. Varg qepësh (hudhrash). Vargje me fiq. Shkoj (duhanin) në varg.","Zinxhir. Vargu i sahatit. Vargu i zjarrit vargoni.","Grup sendesh të një lloji, që janë vendosur njëri pas tjetrit në një radhë; radhë njerëzish, kafshësh etj., që lëvizin a që ecin në të njëjtin drejtim e zakonisht për një. Varg i pafund. Vargu i njerëzve. Vargu i shtëpive. Vargu i makinave. Vargu i patave. Vargu i maleve. Varg shkëmbinjsh.","kryes. nj. fig.:Një radhë gjërash a ngjarjesh që vijnë njëra pas tjetrës në mënyrë të pandërprerë. Varg aksionesh. Varg fitoresh. Në vargun e sukseseve. Varg fjalësh (mendimesh). Në vargun e viteve. Në vargun e ngjarjeve.","let. Njësi poetike, që përbëhet prej fjalësh e fjalish të shkruara në një radhë dhe që ka një ritëm e një numër të caktuar rrokjesh; vet. sh. Vjershë, poezi. Varg i bardhë vargu që nuk ka rimë me ndonjë varg tjetër. Varg i dyzuar dy lloje vargjesh të lidhura në një varg të vetëm. Varg heroik varg në metrikën e lashtë që ka dhjetë rrokje e pesë theksa dhe që rimon me vargun vijues. Varg i lirë lloj vargu që nuk ka një numër të caktuar rrokjesh, theksash ritmikë e pauzash ose nuk formon strofa me rima, sipas skemave tradicionale të metrikës. Varg pesërrokësh. Varg i përzier. Varg i thyer varg që për arsye theksimi, intonacioni etj. copëzohet a shkruhet i ndarë. Strofë me katër vargje. Roman në vargje. Shkruan (thur) vargje.","spec. Tërësi madhësish të vendosura në një radhë të caktuar; grup bashkimesh kimike që kanë një lidhje të caktuar me njëri-tjetrin. Varg gjeometrik. Varg numerik. Varg natyror. Varg radioaktiv. Vargu i numrave. Vargu i uranit.","edhe-fig. Numër i madh, sasi e madhe qeniesh, gjërash a dukurish që vijnë njëra pas tjetrës, ose që formojnë një grup; disa. Një varg shokësh e shoqesh
