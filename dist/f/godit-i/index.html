<script>window.__INITIAL_DATA__ = [{"slug":"godit-i","term":"GODIT I","attributes":["kal."],"definitions":["I bie dikujt a diçkaje me dorë, me këmbë a me një send tjetër, qëlloj dikë; e rrah. E goditi me dorë (me grusht, me pëllëmbë). E goditi me këmbë (me shkelm). E goditi me guri. E goditi me kamxhik. E goditi në fytyrë.(me kokë). Godit fort (rëndë, lehtë).","usht. Shtie a qëlloj me armë zjarri kundër dikujt a diçkaje; sulmoj dikë a diçka. Godit armikun. Godit me artileri. Godit aeroplanin me kundërajror.","sport. I bie topit me forcë (me dorë, me këmbë ose me kokë) në një drejtim të caktuar. Godit topin. Godit me dorë (me këmbë, me kokë).","krye. veta III. Prek diku a diçka me forcë, rreh diçka; i bie, e merr (plumbi etj,). Topi goditi shtyllën (në shtyllë). Plumbi e goditi në shpatull.","Lëndoj a plagos një pjesë të trupit duke përplasur a duke u përpjekur pas diçkaje, vras. Goditi dorën (këmbën). Goditi kokën (ballin).","vet. veta III. E lë në vend, e vret; i bie rrufeja; i bie një sëmundje e rëndë dhe e papritur etj., e cila bën që të humbasë vetëdijen ose i shkakton vdekjen menjëherë. E goditi rrufeja. E goditi dielli. E goditi. bised. i ra pika; i ra damllaja. E goditi në zemër vdiq menjëherë nga zemra.","fig. Qortoj rreptë dikë për gabimet e të metat e tij, për qëndrimin a sjelljen e tij me qëllim që të ndreqet; vë në dukje me forcë gabimet e të metat për t`i zhdukur këto; kritikoj rëndë. Godit dembelët (parazitët, rrugaçët). Godit gabimet (dobësitë veset).Godit pikëpamjet e gabuara (zakonet prapanike). Godit ashpër. E goditi pas shpine (prapa krahëve).","fig. Dëmtoj rëndë a shkatërroj krejt dikë a diçka, i jap dërrmën, e shpartalloj. Godit kulakët. Godit armiqtë e popullit. Godit sektorin privat. Godit pa mëshirë.","vet. veta III. E prek, e kap një e keqe, që i shkakton dëm të madh. E goditi thatësira. E goditi tërmeti. I goditi kriza ekonomike. E kanë goditur shumë fatkeqësi (të këqija).","(zakon. me një trajtë të shkurtër të përemrit vetor të r. kallëzore). Më prek thellë në ndjenja, më ther. Më goditi në zemër.","jokal. vet. veta III. Rreh me një trokitje (për zemrën, damarët, tëmthat ose për një mekanizëm). Godet zemra. Goditin damarët (tëmthat).","jokal. vet. veta III bised. Bie (për orën e murit). Ora goditi dymbëdhjetë.","jokal. fig. E kam qëllimin diku, synoj diku, rrah. E di ku godet ai. Aty godet ajo fjalë. Godet larg ai me këto fjalë.","jokal. pavet. Ndodh, rastis, qëllon. Godit të vijë. Goditi që u ndodha në shtëpi. * Goditi (qëlloi) në shenjë shih te SHENJ/Ë,~A."]}]</script>
