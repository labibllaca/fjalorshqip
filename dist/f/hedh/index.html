<script>window.__INITIAL_DATA__ = [{"slug":"hedh","term":"HEDH","attributes":["kal."],"definitions":["E lëshoj diçka me forcë a me shpejtësi larg vetes ose në një drejtim të caktuar, flak tutje, poshtë a përpjetë diçka që kam në duar. Hedh gurin (shkopin, topin). Hedh granatën. Hedh shigjetën (shtizën, diskun). Hodhi kapelën në erë. E hedh larg (afër, lart, përpjetë).","I jap dikujt diçka duke e flakur drejt tij, ia vërvit për t'ia dhënë; i shtie, i jap. I hedh mollën. I hedh lapsin (fjetoren, librin). I hedh kutinë e duhanit (një cigare). U hedh pulave misër. I hedh qenit kocka. U hedh kafshëve bar.","edhe fig. E flak tutje si gjë të panevojshme dhe pa vlerë; e përzë dhe e braktis dikë. Hedh mbeturinat (plehrat). E hedh poshtë diçka. E hedh në kosh (në shportë, në pleh). E hedh në zjarr. E hodhi në rrugë të madhe (në mes të katër rrugëve).","E shtyj dikë a diçka për ta rrëzuar ose e lë të bjerë, e bëj të bjerë; e lëshoj nga lart poshtë, nuk e mbaj; e lëshoj për tokë. E hodhi nga shkallët. E hodhi jashtë dritares. E hodhi në gropë (në greminë, në hendek, në batak). E hedh për tokë. E hedh poshtë.","E hodhi në ujë (në pus, në det, në fund të detit). Hodhën bomba (parashutistë, ushqime) nga aeroplani. I hodhi era tjegullat nga çatia. Hedh farën në arë. Hedh grurë (misër, fasule) mbjell. Po i hedhin fiqtë kokrrat. I hodhën gjethet (lulet) pemët. Kanë hedhur pemët. Hedh grepat për të peshkuar.","edhe fig. E shtyj në një drejtim të caktuar, e çoj drejt një vendi të caktuar, e nxjerr diku. E hodhi vala në breg. E hodhi era diku. Atje e hodhi fati.","Bëj që të bjerë diçka që është me këmbë, e rrëzoj përdhe. E hodhi tërmeti shtëpinë. E hodhi lisin për tokë. E hedh poshtë dikë e rrëzoj përtokë; e mund.","Vërvit drithin përpjetë në erë, e ngre në ajër me lopatë a me një enë dhe e lëshoj për të ndarë kokrrat nga kashta a nga byku. Hedh drithin (grurin, misrin, orizin, fasulet).","E marr dhe e vë diçka në një vend për një qëllim të caktuar, e vendos; e shtrij mbi diçka a mbi dikë për ta mbuluar. Hedh pushkën në krah. Hedh gunën. Hedh pallton krahëve. Hedh shallin në qafë. I hedh jorganin përsipër. I hedh mbulesën krevatit. I hedh kalit një velenxë. U hedh shuaj këpucëve. I hedh kupat (ventuzat) një të sëmuri.","E lë diçka pa kujdes e pa rregull, nuk e vë në vendin e vet, e vë ku mund andej-këtej. I ka hedhur rrobat nëpër dhomë. I ka hedhur lodrat nëpër shtëpi. I hodhi librat andej-këtej. I hodhi drutë grumbull.","edhe fig. E fut diku, e shtie brenda diçkaje; shtie një lëng në një enë a në një vend ose ia shtoj një lëngu tjetër; e lyej a e spërkat diçka me një lëng. Hedh ujë në gotë. Hedh raki (verë). U hedh ujë luleve ujit lulet. Hedh gjellën në pjatë. Hedh drutë në sobë. Hedh grurin në thes. Hedh bukën në furrë. I hedh kripë (salcë, gjalpë) gjellës. I hedh vaj (uthull) sallatës. I hedh ujë verës. Hedh votën votoj. Hedh letrën në kuti (në postë). Hedh diçka në shportë. E hodhën në burg. bised. e burgosën.","bised. Pi, kthej. Hodhi një gotë raki (verë, birrë). Hodhi një teke.","Vë a shtie diçka mënjanë për ta ruajtur për një kohë tjetër; mbledh, grumbulloj diçka. Hedh zahire (dru) për dimër. Hedhin pastërma. E kanë hedhur bereqetin sivjet. Hedh gjethe (bar, dushk) për bagëtinë.","edhe fig. Lëshoj a nxjerr diçka; nxjerr, shtroj, parashtroj. Gjarpri hodhi helmin. Ka hedhur lastarë (gjethe). Hedh rrënjë bima. Hedh shkëndija (xixa). Dielli hedh rreze. Hedh shkelma qëllon me shkelma. Hedh një mendim. Hodhi idenë. Hedh parullën. I hedh një fjalë i them diçka, bëj fjalë për diçka. I hedh romuze dikujt.","Bëj të lëvizë shpejt, e çoj në një drejtim të caktuar (për një pjesë të trupit). Hedh hapin (këmbët, çapat). Hedh kokën mënjanë. Hedh flokët prapa. Hedh këmbën mbi këmbë. I hedh krahët në qafë. Hedh valle kërcej.","edhe fig. E çoj dikë a diçka me shumicë e me vrull në një vend të caktuar; e drejtoj diku, e bëj që të veprojë; e nxjerr dhe e përhap; e vë. I hedh trupat në luftë. I hedh të gjitha forcat në betejë. Hedh forcat rezervë. Hedh mallrat në treg. Hedh librin në qarkullim. E hedh në aksion.","edhe fig. I vë diçka për një qëllim të caktuar (për ta kapur, për ta penguar a ndaluar, për ta mbyllur, për të marrë diçka prej dikujt etj.). I hodhën prangat (hekurat, zinxhirët). I hedh lakun (kapistrën, frerin, litarin). I hedh llozin (shulin) derës. I hodhën gjobë.","bised. Ndërtoj diçka në një vend, bëj; vë. Hedh themelet e shtëpisë. Hedh një urë. Hedh një kat të ri (në një ndërtesë). I hedh çatinë shtëpisë. I hedh trarët (tjegullat).","E shkruaj një mendim a e rishkruaj diçka në një vend tjetër; vë (nënshkrimin etj.). I hedh mendimet në letër. E hedh në regjistër (në fletore). I hedh shënimet në të pastër. Hedh nënshkrimin.","edhe fig. E drejtoj diku, e përqendroj. Hedh sytë diku. I hodhi një vështrim. E hedh mendjen diku. I hodhi shpresat tek ai.","edhe fig. bised. E kaloj diçka, i dal matanë; e kapërcej. E hodhi lumin (përruan, vaun, hendekun) i kaloi vështirësitë, e kapërceu pengesën. E hodhi gardhin. E hodhi klasën (provimin). Do ta hedhë edhe këtë herë sëmundjen. E hodhën dimrin. E hodhi lehtë.","fig. bised. E çoj me punë në një vend tjetër; e emëroj, e caktoj. E kanë hedhur me punë në Elbasan. Ku e kanë hedhur?","edhe jokal. Bëj një fall, një lotari etj. për të provuar diçka; përpiqem të mësoj a të provoj diçka me anë të fallit (sipas paragjykimeve); shtie. Hedh shortin. Hidhte fall (me letra). E hodhi në lotari. Hodhi zaret provoi fatin. Hodhi qiqrat. bised. shtiu fall. Hodhi në yll shtiu fall.","fig. E shtroj diçka para të tjerëve për ta gjykuar a për ta vendosur. E hedh në diskutim. E hedh për gjykim. E hedh në votë. E hedh në provë. E hedh para masës. E hedh në gjyq e ngre në gjyq, e padit.","fig. Krijoj për dikë një gjendje të caktuar, zakonisht të rëndë. E hodhën në dëshpërim. I hodhën në mjerim (në varfëri, në skamje).","fig. Ia ngarkoj dikujt, ia vë përsipër (një faj, një gabim etj.). Ia hodhi fajin një tjetri. Ia hedh përgjegjësinë dikujt. Ua hedh gabimet të tjerëve.","fig. bised. E gënjej dikë, e mashtroj me dredhi, ia shkoj ujët nën vete. U përpoq t`ia hidhte. Atij s`ia hedh dot. Kujt do t`ia hedhësh?!","jokal. bised. Roit, shtie (për bletën). Hodhi bleta.","bised. Dështoj; shtie (për njerëzit e kafshët). Hodhi delja (dhia). Ka hedhur dy fëmijë.","jokal. Bie me shumicë (për borën e shiun). Po hedh borë. Po hedh metale. Po hedh shi. * Hodhi (dorëzoi, la, lëshoi, dha, uli) armët shih tek ARM/Ë,~A. I hedh baltë dikujt (hedh baltë mbi dikë ) e poshtëron dikë duke shpifur, e përlyen, e njollos; ia nxin emrin. Hedh në baltë shih te BALT/Ë, ~A. Hedh bazat (themelet) e diçkaje themeloj. I hodhi një brez (rakisë) hëngri pak meze kur pinte raki. I hedh çakëll ndërhyn me fjalë në një bisedë për të ngatërruar sqarimin e diçkaje. I hedh çeçen vjet. shih te ÇEÇ/E,~JA. Hodhi çengelin (grepin) bëri përpjekjen e parë për të arritur diçka. Ka hedhur çengelat dikush a diçka ka lëshuar rrënjë, ka zënë vend të qëndrueshëm e për një kohë të gjatë. Ka hedhur (ka shtënë) dashuri është dhënë shumë pas dikujt, është lidhur fort me të, e dashuron, e do. Hedh (shpie) dëm diçka e prish kot. Hodhi dorë a) diku vodhi; b) mbi diçka e pushtoi, e zaptoi. I hedh dorën dikujt i jap ndihmë, e ndihmoj, e përkrah. E hodhi (e vuri, e shtiu, e futi) në dorë dikë a diçka shih te DOR/Ë, ~A","Hedh dritë e ndriçon, e bën më të qartë, e sqaron. Hedh në erë diçka shih tek ER/Ë,~A I. E hodhi (e rrëzoi) me një gisht shih te GISHT,~I. E hodhi në greminë dikë shih te GREMIN/Ë,~A. E hodhi grepin diku shih te GREP,~I. Ia hodhi grepin dikujt shih te GREP,~I. Ia hodhi grykës e hëngri a e piu vetë të gjithë, s'la gjë për të tjerët. I hodhi (i vuri) gunën diçkaje e mbuloi, e mbylli pa e zgjidhur. Hodhi gurë mbi dikë e qortoi a e shau rëndë dikë. E hodhi në hava shih te HAVA,~JA. E hodhi në hendek dikë shih te HENDEK,~U. I hodhi hapëset u dorëzua. Hedh hije diçka rritet, zhvillohet; lartësohet, hedh shtat. I hedh hije diçkaje a) e mbulon një punë a një çështje, e bën të errët, e bën të paqartë; b) e bën të dyshimtë diçka a dikë, e paraqit në një dritë jo të mirë. Hodhi kanxhat u vendos përgjithnjë diku, zuri rrënjë, hodhi çengelat. I hodhi kanxhat dikujt e zuri dhe e bëri për vete. E hodhi kapërcyellin e kapërceu një vështirësi, doli nga një gjendje e vështirë. Ia hodhi kapistrën dikujt e kapi dhe e përdori për të plotësuar dëshirat e qëllimet e veta, e hodhi në grackë. Hedh krahë rritet, forcohet, zhvillohet. E hedh pas (prapa) krahëve (shpinës, kurrizit) diçka shih te KRAH,~U. I hedh kripë (bisedës, muhabetit) shih te KRIP/Ë,~A","Hodhi kurorë vjet. u martua me dikë. S'i hedh dot ledh punës edhe poh. shih te LEDH,~I I. I hedh lule dikujt i thur lëvdata, të cilat zakonisht nuk i meriton. Hedh ndyrësira mbi dikë shih te NDYRËSIR/Ë,~A. Ia hodhi potkonjtë (në erë) dikujt përçm. e la në vend të vdekur. E hodhi (e rrëzoi) në pluhur dikë a diçka shih te PLUHUR,~I. E hedh poshtë diçka nuk e pranoj, e rrëzoj si të rreme a si të padrejtë; e mohoj, e përgënjeshtroj. E hodhi poshtë dikë ia uli vlerat, nuk i dha vlerën që ka. I hodhi prangat e arrestoi, e lidhi. Hodhi një pushkë a) qëlloi një herë me pushkë; b) luftoi pak. Hedh (lëshon, zë, ngul) rrënjë shih te RRËNJ/Ë,~A I. I hodhi një sy diçkaje e shikoi a e lexoi shpejt e shpejt. Hedh (qit, shtie) shkelma shih te SHKELM,~I. E hodhi nga shkallët dikë përçm. shih te SHKALLË,~A. Ka hedhur (ka lëshuar) shtat shih te SHTAT, ~I. E hedh (e flak) tej (tutje) diçka shih tek TEJ. I ka hedhur thonjtë (kthetrat) e ka vënë nën sundim, e ka mposhtur, e shtyp dhe e shfrytëzon në mënyrë të egër. I hedh thumba dikujt e ngacmoj dikë me fjalë, e shpotit. E hodhi (e flaku, e nxori, e la) në udhë (në mes të udhës, në udhë të madhe, në mes të katër udhëve) shih tek UDH/Ë,~A. I hedh benzinë (vajguri) zjarrit shih te BENZIN/Ë,~A. Hodhi cipën e zezë shih te ZI (i) ZEZË (e). Të hedh (të shpie, të çon) degë më degë shih te DEG/Ë,~A. I hodhi dru zjarrit shih te DRU, ~JA. Më hedh (më ngre) dheu përpjetë shih te DHE,~U. E hodhi (e fugu, e vuri, e ktheu) kësulën (festen, qeleshen, kapelën, takijen) mbi sy (mënjanë) shih te SY,~RI. Hedh farë në ujë (në lumë, në det, në shkëmb) shih te FAR/Ë, ~A. Ia hedh (ia sjell, ia bie) fjalën rrotull (larg e larg) shih te RROTULL. Hodhi gurë prapa dikush shih te GUR,~I. Hedh (vë) gurë nën rrota shih te GUR,~I. I hodhi (i futi) një gur në shollë (në opingë, në këpucë) dikujt shih te GUR,~I. Hodhi një gur në ujë (në lumë, në ferrë) shih tek UJ/Ë,~I. Hedh (bëj) hapin e parë shih te HAP,~I","I hodhi hi (pluhur) syve dikujt shih te HI,~RI. I hodhi kashtë syve dikujt shih te KASHT/Ë,~A. Hedh këmbën sipas valles shih te VALL/E,~JA. E hodhi (e ktheu, e ngriti) me këmbë përpjetë mospërf. shih te KËMB/Ë,~A. Të hedh kodër më kodër shih te KOD/ËR,~RA. E hodhi në koshin (në shportën) e plehrave shih te KOSH,~I. Ta hedh (ta vë) kopilin (dobiçin) në prehër thjeshtligj. shih te KOPIL,~I. I hodhi (i vuri) lakun (litarin) në fyt (në qafë, në grykë) dikujt shih te LAK,~U. Ia hodhi leckat në erë dikujt përçm. shih te LECK/Ë,~A. Hedh (luaj, përdor) letrën (kartën, gurin, zarin) e fundit shih te FUNDIT (i, e). I hedh paratë në erë shih tek ER/Ë,~A 1. Nuk i hedh pluhur faqes shih te PLUHUR, ~I. I hodhi (i vuri) rezen derës (shtëpisë) shih te REZ/E,~JA. E hodhi (e la) në shportën e lugëve diçka shih te SHPORT/Ë,~A. I hodhi trutë në erë keq. shih tek ER/Ë,~A 1. I kanë hedhur (i kanë shtënë) trutë e gomarit shih te GOMAR,~I. I hedh ujë verës shih tek UJ/Ë,~I. I hedh ujë zjarrit shih tek UJ/Ë,~I. Është për t'ua hedhur qenve është shumë i keq (për ushqimet). Është për t'i hedhur telat është shumë e bukur, është si nuse e re. Hidh (qit) farë, nxirr (merr) farë! shih te FAR/Ë, ~A. E hodhi (e kaloi, e kapërceu) lumin pa u lagur (pa lagur këmbët) shih te LAGEM. S'ke ku të hedhësh mollën (majën e gjilpërës) ka shumë njerëz të ngjeshur njëri pranë tjetrit, s'ka asnjë vend të lirë. E bëri të hedhë valle (të kërcejë, të luajë) në tepsi shih tek TEPSI,~A. Hedh gurin e fsheh dorën është tinëzar; e bën të keqen dhe e mbulon. Hedh këmbët (hedh vallen, luan këmbët, kërcen) siç bie daullja (sipas daulles, siç bie lodra) keq. shih te DAULL/E,~JA. Hedh skortin të zërë troftën shih te SKORT,~I. Ku i bie daulles unë e ku e hedh vallen ti! shih te DAULL/E,~JA."]}]</script>
