<script>window.__INITIAL_DATA__ = [{"slug":"torbee-i","term":"TORBË I","attributes":["f.","sh."],"definitions":["Trastë. Torbë e madhe (e vogël). Mbushi (zbrazi) torbën. * E futi në torbë e bëri për vete plotësisht duke ia hedhur, e shtiu në grackë. Me kokë (me krye) në torbë (në trastë, në thes) me rrezik të madh për jetën, duke rrezikuar jetën. Si torba (si trasta) në degë shih te DEGË, ~A. Me torbë me trastë shih tek TRASTË, ~A. Nuk ia var torbën (trastën, kapistrën, kapistallin, këmborën, hejbetë) shih te VAR. S'ka gjë në torbë (në trastë) nuk ka siguruar gjë, nuk ka gjë në dorë nuk i ka punët mirë, nuk ka gjë në vijë (për një punë, një çështje). Iu qep me bukë në torbë (në trastë) dikujt shih te BUK/Ë, ~A. E vuri kokën (kryet) në torbë (në trastë) rrezikoi kokën, ndërmori një veprim duke rrezikuar jetën. Fjalë të mira e gurë në torbë (në trastë) shih te GUR, ~I. As në thes, as në torbë shih te THES, ~I. E mban në torbë bukën e barutit është gati për gjithçka, me bukë e me armë, është gati për të përballuar çdo rrezik."]}]</script>
