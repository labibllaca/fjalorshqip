<script>window.__INITIAL_DATA__ = [{"slug":"pjesee","term":"PJESË","attributes":["f.","sh."],"definitions":["Copë, ndarje a njësi që hyn në një të tërë ose që mund të veçohet prej saj; një nga copat a njësitë, në të cilat ndahet diçka; vendi që zë kjo copë a njësi në të tërën. Pjesë e madhe (e vogël). Pjesa e sipërme (e poshtme, anësore, qendrore) e diçkaje. Pjesa e parë (e dytë) e lojës. Pjesa e parë (e dytë, e fundit) e ditës. Pjesa e poshtme (e sipërme) e lumit. Pjesa veriore (lindore) e vendit. Pjesa e punuar e arës. Pjesët përbërëse të fizikës (të biologjisë). Pjesa e dalë e murit (e gurit, e hurit...). Pjesa e kalbur (e krimbur) e mollës. Pjesa e thyer e enës. Pjesa e grisur (e shqepur) në rrobë. Pjesa dhe e tëra. E ndau në pjesë. I dha tri pjesë. Pjesa e parë e nxënësve u nis (erdhi).","Send a element që hyn në përbërjen e një organizmi, mekanizmi etj. dhe kryen një punë të caktuar brenda së tërës; gjymtyrë. Pjesët përbërëse. Pjesët e trupit. Pjesët e shtëpisë. Pjesët e makinës (e motorit). Pjesët e dollapit. Pjesët e pushkës (e topit). Pjesët e qerres (e parmendës, e mullirit). Pjesët e xhokës (e gunës). Pjesët e figurës. gjeom. Pjesët e numrit (e shumës). mat. Pjesët e materies. filoz. Pjesë ndërrimi. tek. Përbëhet nga shumë pjesë. Mbërtheu pjesët. E zbërtheu në pjesë. I zëvendësoi një pjesë.","Sasi e diçkaje që hyn në lidhje të caktuar me një sasi të diçkaje tjetër për të formuar një të tërë. Pjesa e ujit në bimët (në trupin e njeriut, në gjak). Pjesa e fortë (e butë) e një lënde. Pjesa drusore e bimës. Pjesa kërcore e veshit. Një pjesë gëlqere e tri pjesë ujë.","Ndarje a grup që është më pak se e tëra, sasi jo e plotë e diçkaje; jo të gjithë frymorët, sendet etj., disa, një sasi (zakonisht me numërorin një). Pjesa më e madhe (dërrmuese) e zgjedhësve shumica. Një pjesë e mirë e tyre. Pjesa më e përparuar e shoqërisë. Një pjesë e punëtorëve (e nxënësve). Bëri një pjesë të punës. Një pjesë e shokëve nuk e dinte. Një pjesë mendon ndryshe.","Diçka nga një e tërë, që i përket dikujt a është caktuar për dikë; ajo që i bie dikujt kur ndahet një trashëgim a diçka tjetër; detyrë, punë, veprim etj. që duhet të kryejë a kryen dikush. Pjesa jonë. Kërkoi (donte, mori) pjesën e vet. I bëj pjesë dikujt. Ia ruajtën pjesën. Kam pjesë në diçka. Më bie në pjesë. I hyri në pjesë dikujt ia mori diçka pa të drejtë. E ndau në pesë pjesë. E lanë pa pjesë. Secili bëri pjesën e vet të punës. Ka edhe ai pjesë në këtë punë (në këtë faj).","Anë e hapësirës; krahinë e një vendi; vend. Në çdo pjesë të rruzullit tokësor (të botës). Nga të gjitha pjesët e vendit.","Ndarje në një vepër letrare, shkencore etj., ku shtjellohet a trajtohet një çështje e caktuar a një anë e veçantë e saj; copë e vogël e një libri a e një shkrimi, që shkëputet prej tij e qëndron më vete. Roman (poemë, studime) me pesë pjesë. Pjesë të nxjerra nga libri. Përmbledhje me pjesë të ndryshme.","Vepër dramatike; roli që luan në skenë një aktor. Pjesë satirike. Vunë në skenë një pjesë të re. Mësoi pjesën e vet. Luan pjesën kryesore.","muz. Vepër jo e madhe muzikore; një copë nga kjo vepër muzikore; melodia e kësaj vepre a cope. Pjesë të lehta (të zgjedhura). Pjesë për violinë dhe orkestër. I ra një pjese të njohur.","Periudhë nga jeta a veprimtaria e dikujt; diçka që është e lidhur ngushtë me jetën ose me veprimtarinë e dikujt. Pjesë nga jeta e shkrimtarit. Pjesë nga puna e tij si revolucionar. Pjesë e pandarë e luftës sonë.","bised. Palë, anë. Pjesa shqiptare. Është i pjesës sonë. * Bëj pjesë jam anëtar a pjesëtar i diçkaje; me foljen në vetën III është pjesë përbërëse a njësi e diçkaje. E luan pjesën dikush mospërf. shih te LUAJ. Marr pjesë diku hyj diku, bashkohem me të tjerë në një punë a veprimtari. Më ra në pjesë diçka më erdhi një e keqe pa e pritur, më ra një fatkeqësi. Pjesa e luanit libr. iron. shih te LUAN,~I. Sa për pjesën time... nga ana ime, për sa më takon mua... Pjesët e fjalisë gjuh. gjymtyrët e fjalisë. Pjesët e ligjëratës gjuh. klasat kryesore, në të cilat ndahen fjalët e një gjuhe, sipas kuptimit të përgjithshëm leksikor, veçorive morfologjike e fjalëformuese dhe funksioneve sintaksore (p.sh. emri, mbiemri, përemri, folja, ndajfolja, parafjala etj.)."]}]</script>
