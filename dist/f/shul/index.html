<script>window.__INITIAL_DATA__ = [{"slug":"shul","term":"SHUL","attributes":["m.","sh."],"definitions":["Dru i drejtë e i gjatë, i pastruar nga degët, që përdoret për punë të ndryshme, hu i gjatë. Shul i fortë (i gjatë). Shul mullari strumbullar. Shul tende. Shut gardhi.","Dru i trashë e i fortë që u vihet tejetej kanateve të portës nga prapa për t`i mbajtur mbyllur; vegël me një shufër hekuri të lëvizshme, që shërben për të mbyllur nga prapa derën ose një kanat të derës, të dritares, të dollapit etj.; lloz. Shul i drunjtë (i hekurt). Shuli i portës (i derës). I vë (i heq) shulin. E mbyll me shul.","Çdonjëri prej dy drurëve të rrumbullakët të avlëmendit (të çarë në mes për së gjati sa gjerësia e pëlhurës), në njërin prej të cilëve mbështillet pëlhura e punuar, ndërsa në tjetrin mbështillen fijet e majës. Shuli i përparmë (i prapmë). Shulat e vegjës. Shuli i pëlhurës.","tek. Vegël që hap e mbyll folenë e fishekut të pushkës e të mitralozit ose grykën e topit nga ana ku vihet predha dhe që ka gjilpërën për të goditur kapsollën. Shuli i pushkës (i automatikut, i mitralozit). Hap (mbyll) shulin.","bised. Direk. Shuli i barkës.","Trari i mesit në çatinë e shtëpisë, mbi të cilin mbështeten baballëkët.","Tredhës. I vuri shulin.","krahin. Vig. E prunë me shul.","fig. bised. Njeri me trup të shëndoshë e të ngjeshur; njeri me trup tepër të gjatë, stërhell, zdap, lloz. Ç`ishte gjithë ai shul?! * Shul gardhi mospërf. budalla, i trashë nga mendja, hu gardhi. Hyri (shkoi) shul e doli (erdhi) lloz nuk mësoi asgjë, s'përfitoi fare nga një mësim, nga një përvojë etj., si hyri doli; si vajti erdhi. Mbyll dymbëdhjetë dyer me një shul është shumë i zoti, shumë i shkathët."]},{"slug":"shul","term":"SHUL","attributes":["ndajf."],"definitions":["Kryq a tërthor me dikë ose me diçka tjetër; për së gjeri a për së gjati mbi një tjetër ose mbi diçka; pjerrtas, shtrembër; keq. Brezat vihen shul. I vuri drutë shul. Ra shul përdhe. E gjetën shul në shtrat. I ka degët shul. Ishte rrëzuar shul mbi
