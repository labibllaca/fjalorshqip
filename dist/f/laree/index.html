<script>window.__INITIAL_DATA__ = [{"slug":"laree","term":"LARË","attributes":["f.","sh."],"definitions":["Pullë a shenjë me ngjyrë tjetër nga ngjyra e përgjithshme, që kanë disa kafshë në trup; njollë. Larat e lëkurës. Larat e trupit (e kokës, e kurrizit). Lopë me lara. Pulë me lara.","Kafshë shtëpiake (zakonisht dele, dhi a lopë) ose shpend, që është me pulla në trup. Viçi i larës.","Zbukurim në ngjyra të ndryshme, që qëndiset në rroba ose bëhet në çorape. Larat e rrobave. Çorape me lara.","Pjesë e ndritshme e diçkaje, që shquhet në një mjedis me të errët; njollë e ndritshme. Larat e borës. Larë drite. Larat e reve (e qiellit).","Gunë e larme, e punuar zakonisht me lesh deleje. Hodhi larën krahëve.","Vend i zhveshur në një shpat mali të mbuluar me pyje; copë toke e zhveshur a e punuar. Një larë dhe (tokë).","përd. mb. I larmë. Dhi (dele, lopë) larë. * S'i nxihet lara nuk pyet fare, nuk do t'ia dijë, s’ka gajle."]},{"slug":"laree","term":"LARË","attributes":["mb."],"definitions":["Që është pastruar me ujë, me ujë e me sapun a me diçka tjetër duke u fërkuar; që është futur në ujë a në një lëng tjetër dhe është fërkuar për t’iu hequr pluhuri, balta, njollat etj., që i janë hequr papastërtitë me ujë a me diçka tjetër. Me duar të lara. Me fytyrë të larë. Rroba (çorape) të lara. Shami e larë. Lesh i larë. Me dhëmbë të larë. Enë (pjata) të lara. Xham i larë. Dysheme e larë. Kripë e larë.","Që është përpunuar me lëndë kimike për t'u bërë i pandjeshëm ndaj dritës dhe për t'u bërë e dukshme ajo që është fotografuar. Film i larë.","Që është veshur me lëngun e një metali të çmuar, zakonisht me ujë floriri; i praruar; që është lyer me bojë a me një lëndë tjetër të shndritshme. Armë të lara. Shpatë (kordhë) e larë. Filxhan i larë.","Që i është hequr ndryshku duke e fërkuar, që është fshirë e pastruar sa shkëlqen, i shkëlqyer; i kallajisur. Thikë e larë. Tepsi (kusi) e larë.","bised. Që i janë hequr gjërat e huaja e të panevojshme, të cilat e prishin a e dëmtojnë (për barishtet, dheun, baltën, papastërtitë e mbledhura, kashtën, gëzhutat etj.), i gërryer, i pastruar, i qëruar. Hendek (pus) i larë. Tokë e larë (nga shiu).","bised. Që është bërë i sheshtë e i lëmuar duke u gdhendur a duke u zdrukthuar, i qëruar. Dërrasë e larë. Shkop i larë. Tra i larë. Qereste e larë.","bised. edhe fig. Që i është kthyer dikujt një borxh; që i është kthyer dikujt e mira me të mirë a e keqja me të keqe; i paguar; i shlyer. Borxh i larë. Dëm i larë. Gabim (faj) i larë.","fig. Që ka dalë pa faj, i pafajshëm, i papërlyer. E ka ndërgjegjen të larë. Doli i larë.","Që është pa re, i pastër, i kthjellët, i qëruar. Qiell i larë. Kohë e larë.","si em. LAR/Ë,~A (e) f. dhe LARË,~T (të) as. Larje me ujë e me sapun etj. e trupit a e një pjese të tij, e një rrobe pse e diçkaje tjetër, zakonisht duke e fërkuar. Një e larë vlen sa një e ngrënë. fj.u. E lara dhe e ngrëna shkojnë bashkë. fj.u.","si em. LARË,~A (e) f. dhe LARË,~T (të) as. Larja e një detyrimi, sasia e një huaje a e një detyrimi tjetër që duhet shlyer. Kishte edhe një të larë për të dhënë. S`kam të larë me të nuk lahem kurrë me të, nuk kam mundësi t'ia kthej kurrsesi të mirën që më ka bërë, nuk jam në gjendje t'i bëj një të mirë aq të madhe sa më ka bërë ai. * Me ballë të larë i pafajshëm; sy hapët, krenar, ballëlarë. Doli lugë e larë doli i pafajshëm e i papërlyer, nuk është ngatërruar fare në një çështje. Është lugë e larë s'ka asnjë mjet jetese, s'ka gjë prej gjëje; është shumë i varfër, është i këputur. E kam faqen të larë jam i ndershëm, e kam ndërgjegjen të pastër, nuk jam përlyer në një punë të keqe; nuk jam fajtor."]}]</script>
