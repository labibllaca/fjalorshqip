<script>window.__INITIAL_DATA__ = [{"slug":"mbahem","term":"MBAHEM","attributes":["vetv."],"definitions":["Qëndroj në një gjendje të caktuar pasi jam kapur pas dikujt a pas diçkaje që të mos bie; qëndroj diku pa u rrëzuar; mbështetem diku që të mos bie. Mbahej me shkop. Mbahej me duar (me këmbë). Mbahej pas krahut të nënës... Mbahej pas parmakëve. Mbahu pas meje. Mbahej në degën e një peme. Ecte pa u mbajtur gjëkundi. Mbahej mirë në kalë.","fig. Jetoj, qëndroj e veproj duke u kapur pas diçkaje, duke u përpjekur të përfitoj nga diçka a dikush. Mbahet pas meritave të kaluara. Mbahet pas lidhjeve e krushqive. Mbahet pas fijes së kashtës (pas flokëve të vet).","vet. veta III. Qëndron, nuk këputet, nuk thyhet, nuk bie etj.; fig. nuk është prishur ose zhdukur plotësisht, qëndron, rron. Këpucët (rrobat) mbahen ende. E vjetra kërkon të mbahet me çdo mënyrë.","Jam në gjendje të qëndroj, i bëj ballë një peshe, lodhjes etj.; jam mirë me shëndet, nuk më ka mposhtur sëmundja a pleqëria; kam ende forca për të jetuar, për të punuar a për të luftuar, qëndroj, nuk dorëzohem; kam ende mjete a mundësi ekonomike etj. për të jetuar ose për të kryer një veprimtari. Plaku mbahet mjaft mirë. Batalioni u mbajt deri sa i erdhën përforcimet. Mezi mbahej më këmbë. S`i mbaheshin këmbët nga lodhja. A mbahesh? si je, si shkon? (përshëndetje).","fig. Qëndroj i fortë e i patundur moralisht, nuk zmbrapsem para asnjë pengese a vështirësie, nuk më mposhtin dot hallet a fatkeqësitë. Mbahu, mos e lësho veten! U mbajt si trime. Mbahet mirë.","Përmbahem; e mbaj veten. Nuk mbahet nga gëzimi. S`u mbajt pa ia thënë të gjitha.","Tregoj kujdes për veten time; ushqehem, vishem e mbathem mirë; bëj jetë të mirë e të rregullt. Mbahet mirë. Mbahet pastër.","Jetoj, rroj (edhe fig.). Njerëzit mbahen me bukë. Bagëtitë mbahen me bar e me kashtë. Nuk mbahet shtëpia me miell hua. fj. u.","fig. E quaj a e vlerësoj veten, e heq veten, e pandeh, sillem në një mënyrë të caktuar; mburrem. Mbahet si i mençur (si budalla). Mbahet si shkrimtar. Mbahej për trim. Mbahet me të madh (rëndë). Mbahet se i di të gjitha. Mbahet si mik i shtëpisë. Si shumë na mbahet!","libr. (me një trajtë të shkurtër të përemrit vetor në r. dhanore). I qëndroj besnik diçkaje a dikujt, nuk i kapërcej caqet e diçkaje, nuk lëviz; i përmbahem. I mbahet pikë për pikë tekstit. U mbahet rregullave e udhëzimeve. I mbahem mendimit të parë.","vet. veta III (me një trajtë të shkurtër të përemrit vetor në r. dhanore). Më pengohet, më zihet, nuk shkon, nuk lëviz a nuk rrjedh lirisht. I mbahet goja. Më mbahet fryma. I mbahej ujët e hollë.","fig. bised. Lidhem me dikë, mbaj anën e tij. Me cilën anë mbahet? Me kë mbahesh ti?","vet. veta III. Zhvillon punimet, bëhet. Kongresi u mbajt më 1976. U mbajt një mbledhje e jashtëzakonshme.","Pës. e MBAJ. * Nuk i mbahet gjaku shih te GJAK,~U I. Mbahet gjallë (në këmbë) rron ende, është, jeton. Nuk mbahet mend qysh kur ka kaluar një kohë e gjatë qysh atëherë; nuk dihet se kur ka ndodhur. Mbahet (varet) në një qime shih te QIM/E,~JA."]}]</script>
