<script>window.__INITIAL_DATA__ = [{"slug":"hapem","term":"HAPEM","attributes":["vetv."],"definitions":["vet. veta III. Lëviz dera, kanati etj. dhe krijohet vendkalim i lirë për të hyrë diku a për të dalë prej andej ose për t'u lidhur mjedisi i brendshëm me të jashtmin; çelet; kund. mbyllet. U hap dera. U hapën dritaret. Hapet nga jashtë (nga brenda). U hap vetë. U hap me vrull.","vet. veta III. I hiqet tapa, mbyllësja a mbështjellja diçkaje të mbyllur ose të mbështjellë; çelet, zbërthehet a shqitet diçka e mbyllur, e mbërthyer ose e ngjitur. U hap shishja. U hap karfica. U hap zinxhiri i çantës. U hap zarfi.","vet. veta III. Çlirohet nga pengesat, pastrohet; bëhet i tillë që ta ketë më të lirë kalimin; kund. zihet. U hap gypi (qyngji). U hap pipthi. Iu hap fyti (gryka). M’u hapën veshët. U hap rruga (kalimi).","fig. vet. veta III. Krijohet mundësia për të ecur përpara, mënjanohen pengesat ose vështirësitë për të arritur diçka, çelet. Hapen horizonte të reja (perspektiva të mëdha). U hapën rrugë të reja.","vet. veta III. Shpaloset diçka e palosur, e mbledhur a e mbyllur, shtrihet e drejtohet diçka e përthyer; ndahen e largohen dy gjëra ose anët e puthitura a të afruara të diçkaje, shkon mënjanë; kund. mbyllet. U hap perdja. U hap çadra. Nuk i hapen sytë (gishtat). Iu hap goja për gjumë. U hap thesi. U hap çanta. Është hapur muri. U hapën dërrasat.","vet. veta III. Përhapet ose shpërndahet diçka e mbledhur a e grumbulluar; shtrihet hollë diçka, përhapet; shprishet, lënuret (leshi etj.). U hapën fletët nëpër oborr. Ushtarët u hapën për luftë. U hapën njerëzit nëpër arë. U hapën lojtarët në fushë. U hap bagëtia nëpër livadhe. Iu hapën flokët në erë. I hapej boja. Hapet lehtë. Ky lesh mezi hapet.","vet. veta III. Shtrihet përpara a zgjerohet më tej; rritet, shtohet, zmadhohet diçka; përhapet (edhe fig.). Përpara hapej qyteti. Nga veriu hapet fusha. Shtëpitë hapen në faqen e kodrës. U hap sëmundja (epidemia, gripi, kolera). Është hapur pjergulla. U hap puna. Hapet në të djathtë (në të majtë).","fig. Merrem me shumë punë njëherësh pa u përqendruar në njërën prej tyre a në një fushë të caktuar; e shtoj punën tej mundësive; përhapem. Është hapur shumë.","Largohem prej dikujt a mënjanohem në një vend për të lënë të lirë kalimin; vet. veta III lejohet kalimi, lihet i lirë një vend për të kaluar. Hapem mënjanë. U hap kufiri. U hap vendi. Hapuni!","fig. Bëhem më i gjallë e i zhdërvjellët në jetë; gëzohem, më qesh fytyra, çelem. Është hapur ca. U hapën njerëzit. U hap në fytyrë.","fig. Ia zbuloj një tjetri mendimet, ndjenjat, të fshehtat ose hallet e mia, i hap zemrën. Nuk hapet me këdo. S`më është hapur kurrë. S`hapet lehtë ai.","vet. veta III. Çel burbuqja, sythi etj., shpalosen petlat ose gjethet duke u rritur; lëshon lule, lulëzon, çel. U hap trëndafili (zambaku). U hapën pemët.","vet. veta III. Nis të zbardhë, agon (për dritën e ditës). U hap drita (dita). U hap mëngjesi (agimi).","vet. veta III. Kthjellohet, pastrohet nga retë, çel. U hap koha (moti). U hap qielli.","vet. veta III. Më vritet, më çahet a më ngacmohet; më dhemb shumë nga lodhja, nga një plagë etj. Iu hapën duart nga sapuni. Iu hap plaga. M`u hap koka. M’u hapën shpatullat.","Pës. e HAP 1-17. * M'u hap (më iku) barku shih te BARK,~U. S'i hapet (s'i pëlcet, s'i digjet) barku për dikë përçm. shih te BARK,~U. T'u haptë dera! shak. qofsh i uruar, paç mbarësi! Iu hap (iu çel) dera dikujt siguroi vijimësinë e familjes me lindjen e një fëmije, zakonisht të një djali (sipas paragjykimeve patriarkale). U hapën detet (u hap deti) shih te DET,~I. Iu hap (iu çel) goja ka filluar të flasë pa druajtje. S'i hapet goja nuk ka fare oreks, nuk ka fare dëshirë për të ngrënë; nuk do të flasë, nuk i pëlqen të shprehet për diçka. Iu hap (iu ça) hunda (për duhan) nuk duron dot më pa pirë duhan. Iu hap (iu çel) oreksi a) iu ngjall dëshira për të ngrënë; b) iu ndez lakmia për diçka. M'u hap punë më dolën kokëçarje të paparashikuara, m'u krijuan ngatërresa e vështirësi. M'u hapën qiejt shih te QIELL,~I. I janë hapur (i janë çelur) sytë a) ka filluar t'i shohë gjërat ashtu siç janë në të vërtetë; e ka zbuluar të vërtetën; b) ka marrë arsim, dije e kulturë; merr vesh ç'bëhet, ka njohur njerëz e vende të tjera. Iu hap syri a) mori zemër, mori guxim; b) e përkrahin jashtë mase a e llastojnë. M'u hapën trutë më dhemb koka shumë, kam dhimbje të madhe koke. Iu hap zemra a) u tremb shumë; u trondit thellë; b) i erdhi shumë keq, iu këput shpirti për dikë. Iu haptë varri (dheu) nën këmbë! mallk. vdektë! Është hapur si vaji në lakra (në ujë) shih te VAJ,~I I."]}]</script>
