<script>window.__INITIAL_DATA__ = [{"slug":"shkoj","term":"SHKOJ","attributes":["jokal."],"definitions":["Lëviz nga një vend në një tjetër duke ecur më këmbë, kaluar ose me një mjet transporti; eci në një vend në një mënyrë a në një tjetër. Shkoj me këmbë (kaluar). Shkoj me kali (me tren, me autobus, me biçikletë, me aeroplan.) Po shkonte udhës. Shkonte poshtë e lart. Shkoj shpejt (ngadalë, me vrap). Shkonte çalë-çalë. Shkonte trapa-trapa shkonte duke u tundur a lëkundur sa andej këtej (zakonisht për të dehurit).","Vete; mund të vete, mund të arrij; kaloj nëpër një vend. Atje tani shkon automobili. Ai shkon edhe në majë të malit. Lumi shkon përmes fushës. Këtej shkoi ushtria. Shko ku të duash!","Marr udhën a nisem për diku; vete diku dhe qëndroj atje për një farë kohe; vete diku për një punë a për një qëllim të caktuar. Shkoi në fshat (në qytet, në Shkodër, jashtë shtetit). Shkoj në shtëpi (në dyqan, në teatër). Shkoj në punë. Shkoj me shërbim (me leje). Shkonte me dhen (me dhi, me lopë). Shkoi për peshk (për gjah). Shkoj për urim (për ngushëllim). Shkoi pas të birit. Ka shkuar të lahet (të qethet, të mjekohet). Shkoi partizan (vullnetar, ushtar). Shkoi mësues në malësi. Nesër shkon nuse. Shkuan së bashku. Ku ka shkuar? I shkuan në ndihmë shokët.","Lëviz nga një vend a nga një pikë për të arritur në një vend a në një pikë tjetër, duke përshkuar një rrugë të caktuar (për mjetet e transporti e për disa vegla makinash a aparatesh); zhvendosem a lëviz në një drejtim të caktuar, vete. Autobusi shkon për Kukës. Nuk shkon më tej gjilpëra (shigjeta) e aparatit. Shkon në fund. Shkon lart (poshtë, përpara, prapa, majtas, djathtas).","Ndjek një shkollë, marr pjesë rregullisht në një veprimtari, vete vazhdimisht. Shkon në shkollë. Shkoj në stërvitje. Nuk shkon më në pijetore.","kal. bised. Kaloj, kapërcej (zakonisht për rrjedha uji); e bëj të kalojë përmes një vendi. Sa të shkojmë këtë mal. Lumin e shkuan me trap. E shkoi ushtrinë përmes liqenit. E shkuan nëpër pazar. Inxhinieri e shkoi rrugën rrëzë malit.","Largohem diku për të jetuar a për të punuar, ndërroj vend; largohem nga vendi ku jam, iki. Shkoj në një shtëpi të re. Kanë shkuar në lagjen tetë. Ka shkuar në një punë tjetër. Shkoi nga shtëpia. Shko tutje! Mos shko që këtej! Shko më tej!","vet. veta III. Arrin te një pikë e caktuar duke përshkuar një largësi; arrin atje ku duhet, soset; kalon, vete; përhapet. Ushqimet u shkojnë me kafshë. Shtypi u shkon shpejt. Qarkorja u ka shkuar të gjitha rretheve. Uji u shkon të gjitha bimëve. Nuk i shkon benzina (vaji). Shkoi fjala (zëri) larg. I shkoi lajmi. I shkoi në vesh fjala.","vet. veta III. Rrjedh jashtë, del (për lëngje). I shkuan lot. I shkoi shumë gjak. Shkoi gjaku lumë. U shkonte djersa rrëke. I shkuan djersë të ftohta (shtatë palë djersë). I shkuan hundët gjak (i shkoi gjak nga hundët). I shkojnë jargët. I shkon bark e heq barku.","edhe kal. Më kalon poshtë, më zbret në stomak, më vete (për ushqime); gëlltit, kapërdij, kaloj poshtë; futet, hyn, ngulet. Më shkoi çaji shtrembër. Shkoj pështymën. S`i shkoj dot ilaçet. Nuk shkon gozhda (pyka, vidha) më tej. Nuk i shkon as buka, as uji as i hahet, as i pihet.","vet. veta III. Shtrihet ose kalon përmes a përgjatë diçkaje; shtrihet në hapësirë a në kohë deri në një cak. Rruga shkon nëpër pyll (përmes arave, anës liqenit). Bredhi shkon gjer në dyzet metra. Zona e ahut shkon deri në 1600 metra lartësi. Drita elektrike ka shkuar në çdo fshat. Ka shkuar bora (deri) në gju. Shkoi flaka në qiell. Rrushi shkon deri në nëntor. Mbledhja shkoi deri në orën tetë. Nuk shkoi gjatë.","edhe kal. vet. veta III. Arrin një tregues të caktuar; kushton, arrin një çmim; mbush një moshë të caktuar; vete (edhe fig.). Sa shkoi ora? Sa ka shkuar temperatura? Sa shkoi bereqeti? Ai do të shkojë deri në njëqind vjet. Ka shkuar atje ku s`mban më (në gradë të fundit). Nuk shkon deri atje ai. Shkoi deri atje sa...","fig. Lëviz pa ndërprerë drejt diçkaje; eci përpara duke ndjekur një rrugë a një drejtim të caktuar ose duke pasur një qëllim a synim të caktuar; kaloj nga një gjendje në tjetrën. Shkojmë drejt komunizmit. Kapitalizmi shkon drejt shembjes. Grafiku shkon në ngritje (në rënie). Shkojmë nga fitorja në fitore. Shkon në udhë të mbarë. Shkoi në udhë të keqe.","edhe kal. Kaloj një kohë të caktuar; jetoj në një mënyrë të caktuar; kapërcej; kalon, ikën, ecën (për kohën). Shkojnë ditët (javët, muajt, vitet). Shkoi një orë. Shkoi dimri. Shkoi rinia (djalëria). Shkonin mirë (hollë, me kët). Shkuan një jetë bashkë. Shkoi tre vjet me atë pallto. Shkuam dhjetë vjet në këtë shtëpi. U shkoi koha këtyre gjërave. Vitin që shkoi. Sa shkoi ora? E shkon gjithë ditën me punë. E shkuan dimrin në Vlorë. E shkoi pleqërinë te djali i madh. Shkoj kohën me diçka merrem me diçka për të mos u mërzitur. Shkoj jetën jetoj, kaloj jetën. Shkojnë jetë bëjnë jetë të mirë.","vet. veta III bised. Punon (për mekanizmat e aparatet). Si të shkon ora (televizori)? Shkon mirë.","fig. Jam në një gjendje të caktuar fizike a shëndetësore; kam këto ose ato përfundime a arritje; vete, ecën; zhvillohet, përparon. Shkoj mirë (keq). Si shkon me shëndet (me mësime, me punë)? Si je, si shkon? - Mirë. Si shkon puna (stërvitja)? Bujqësia shkon mirë. Të shkoftë puna mbarë! Biseda nuk shkonte. Nuk po u shkonte kënga.","edhe fig. Ndjek dikë në mendimet e sjelljet e tij, e miratoj; i përshtatem diçkaje; veproj në pajtim me të; veproj, punoj. Shkon pas dikujt. I shkon prapa dikujt. I shkon pas qejfit (pas avazit, pas fyellit, pas oreksit) dikujt. Shkoj pas rregullores. Shkon pas modës. Shkon pas qerres (pas mendjes) së dikujt. Shkon nga të fryjë era. Shkon pas berihasë. Shkoi pas rrymës. I shkon pas ujërave dikujt. Shkonin me anësi (me paramendim). Shkonte me qëllime të këqija. Shkonte me shpresë.","bised. I vij rrotull, përpiqem t'i pëlqej dikujt për të arritur një qëllim a për të nxjerrë një përfitim; kam marrëdhënie dashurie a lidhje të ngushta me dikë; shoqërohem. I shkon pas. Shkonte pas grave (me femra). Shkonte me djem. Më thuaj me kë shkon, të të them se kush je. fj. u.","vet. veta III bised. Blihet a shitet lehtë, gjen blerës, qarkullon (për mallrat); e marrin, ka vlerë (për monedhat); bën punë, vlen, merret parasysh, ecën. Shkonte mirë bereqeti (bagëtia). Ai mall nuk shkonte (shkonte me zor). Paraja letër nuk shkonte. Sa shkonte napoloni flori? Nuk shkonte zanati (diploma). I shkonte fjala (vula). Nuk i shkon firma. Nuk shkon ryshfeti. Si shkuan hiletë (dredhitë, lajkat). Një arsye që s`shkon. Nuk të shkojnë këto. Nuk të shkon me mua! I shkoi edhe këtë radhë. Nuk i shkoi e tija. Shkoftë fjala jote!","Pajtohem me dikë nga karakteri, nga mendimet, nga shijet etj. kuptohem lehtë me të, merrem vesh; kam marrëdhënie të mira shoqërore a familjare me dikë. Shkon mirë me prindërit (me vëllanë). Shkojnë si vëllezër (si motra). Nuk shkonin ndërmjet tyre. Shkojnë shumë mirë (grurë, si mollë e pandarë, mjaltë, qumësht). Shkonin shumë keq (si macja me miun). Shkonin majë e brisk (thikë e brisk, majë me majë).","vet. veta III. Përshtatet a pajtohet me diçka; më bie për shtat, është e përshtatshme për diçka; më ka hije; është e drejtë, qëndron; i vete (me një trajtë të shkurtër të përemrit vetor në r. dhanore). Nuk i shkon kjo ngjyrë (kjo kravatë). Syzet i shkojnë shumë. Këpucët i shkojnë me pallton. S`i shkon për shtat nuk i ka hije, nuk i vete. Nuk shkon ëmbëlsira pas frutave. Buka e ngrohtë shkon me djathë. Ka diçka që nuk shkon në këtë dhomë (në këtë punë). Misri shkon në tokat e rënda. Nuk të shkon kjo sjellje (ky veprim, kjo shaka, kjo fjalë). Kjo që tha nuk shkon fare.","kryes. veta III. Përfundon diku, i kalon dikujt; bashkohet me dikë; i bashkëngjitet diçkaje. Shkoi me grupin e të rriturve. Prindërit shkuan me djalin e vogël. Shtëpia u shkoi të bijve. Bashkëtingëllorja që ndodhet ndërmjet dy zanoresh, shkon me zanoren që vjen pas (në ndarjen e fjalëve në fund të rreshtit).","kryes. veta III fig. bised. Vdes, nuk jetoj më, vete, shuhem. Shkoi i shkreti! I shkoi djali. Shkoi kot. Na shkoi nëpër duar. Shkoi për tri ditë. Shkoi i ri (e re). Thashë se shkova.","vet. veta III bised. Harxhohet, mbaron, ikën, prishet, vete. I shkuan paratë. Shkoi dëm tërë ai mall. Sa të shkonte në muaj? I shkoi fuqia. I shkuan këmbët u lodh shumë, s'i lëviz dot më këmbët, s'ecën dot më. U shkoi mundimi kot. I shkoi shija (lezeti). I shkoi zëri. I shkoi ëmbëlsira. Shkoi kot. Për një gozhdë shkoi potkoi. fj. u. Për një pe, për një gjilpërë shkoi dëm një gunë e tërë. fj. u.","edhe kal. bised. Kaloj një sëmundje e shërohem; vet. veta III kalon, shërohet (për një sëmundje); ikën, largohet, fashitet (për një dhembje, një gjendje, një ndjenjë etj.). E ka shkuar fruthin (kollën e mirë). S`ka shkuar asnjë sëmundje. Më shkoi dhembja. Më shkoi kolla (rrufa). Më shkoi plaga. Më shkoi këmba (dora, barku) m'u shërua këmba (dora, barku). Më shkoi koka (dhëmballa) më pushoi dhembja e kokës (e dhëmballës). Shkon lehtë ky grip. I shkoi frika (turpi, inati). Më shkoi gjumi. Shkoi shiu (vapa). Një fytyrë i shkonte, një i vinte.","vet. veta III. Dërgohet diku për t'iu nënshtruar një veprimi të mëtejshëm a për të bërë një punë; jepet për ta futur në një punë, caktohet a harxhohet për një qëllim. Shkon në shtyp (në përpunim). Fonde që shkojnë për arsimin. Kafshët që shkojmë për mish.","kal. Ia nënshtroj dikë a diçka një veprimi që kryhet me një mjet, kaloj; i bëj diçka. Shkoj në sitë (në shoshë). Shkoj leshin në krehër. I shkuan në thikë (në satër, në plumb). I shkoj një lesë tokës. I shkoj një fshesë shtëpisë. I shkoj një tegel. I shkoj një sapun. I shkoj një zdrug. I shkoi edhe një dorë i kaloi edhe një herë furçën me bojë. I shkoi një sherbet dhomës. I shkoj kosës një grihë. I shkoj makinën. bised. e qeth deri në rrënjë. Shkon të kuq (të bardhë) në faqe. Nuk ka shkuar brisk në faqe s'është rruar asnjëherë, është fare i ri. Shkoi rrobat në krua (në lumë) i shpëlau.","kal. Kaloj diçka sipër a përmes diçkaje tjetër, fut, shtie, ve; fërkoj, kaloj; vesh. Shkoj dorën mbi fytyrë (sipër flokëve). Shkoj gjuhën mbi buzë. Shkoj perin në gjilpërë. Shkoj unazën në gisht. Shkoj një mish në hell. Shkoj rruazat. Shkoj duhanin (fiqtë) në spango. I shkon krahun dikujt. I shkoj llozin portës. Shkoj në dhe një lastar hardhie. I shkoj boshtin rrotës. Shkoj këmishën në trup.","vet. veta III (me një trajtë të shkurtër të përemrit vetor në r. dhanore). Më përshkon trupin një ndjenjë që shfaqet dhe largohet shpejt. I shkuan të prera. Më shkuan të ngjethura (të dredhura) në trup. Më shkoi një e therur.","vet. veta III. Lëviz padashur, luan në mënyrë të pavullnetshme. I shkonin këmbët sa andej këtej. Trupi i shkonte sa para prapa. I shkonin sytë një andej një këtej. Më shkoi dora padashur. 31. edhe kal. bised. Ia kaloj dikujt a diçkaje në një gjë, ia dal. S`ia shkon (dot) njeri për këngë. Ua shkon edhe të rinjve. Ky i shkon të gjithë fiqtë nga ëmbëlsira. I ka shkuar shoqet. 32. fig. I hyj diçkaje për ta njohur a për ta zgjidhur, thellohem në një çështje, depërtoj, futem. Nuk i ka shkuar problemit deri në fund. I ka shkuar mjaft thellë trajtimit teorik. I shkoj në taban diçkaje. 33. bised. Dështoj; lind pa kohë. I shkoi barra. I kanë shkuar dy fëmijë. U rrëzua dhe i shkoi fëmija. 34. Përdoret në bashkëvajtje me një folje tjetër në përcjellore ose në të tashmen a në të pakryerën e dëftores për të treguar se veprimi rritet a forcohet shkallë-shkallë e vazhdimisht. Shkon duke u përmirësuar (duke u keqësuar, duke u pakësuar). Sa shkon e zgjerohet (rritet, trashet). Sa shkonte e dobësohej (tretej, zbukurohej). 35. Përdoret para një foljeje tjetër në të njëjtën kohë, duke u lidhur me të me lidhëzën «e», për ta paraqitur veprimin më të gjallë ose për të shprehur edhe qëndrimin jomiratues të folësit. Shkoi e ra me këmbët e veta. Shkoi e e vrau. Shkon e ia thotë. Ku shkoi e e gjeti tani! * Sa s'ka ku të shkojë (ku të vejë) më (sa s'ka më) shih te KAM. Ishte larë e shkuar shih te LAHEM. Shkel e shko shih te SHKEL. Më shkon bic shih te BIC,~I. I shkon pas bishtit (i mban bishtin) shih te BISHT,~I. I shkoi bokë (puna) shih te BOK/Ë,~A. Shkoi (vajti) prapa diellit shih te DIELL,~I. Shkoi (vajti) në djall shih te DJALL,~I. Në djall të shkojë (të vejë)! mallk. shih te DJALL,~I. I shkon (i vete, ia sjell) djathtazi shih te DJATHTAZI. I shkon (i vjen) për dore (ndoresh) shih te DOR/Ë,~A. Si do t'i shkojë (si do t'i vejë, si do t'i dalë) filli dikujt a diçkaje shih te FILL,~I. Ka shkuar (është) në fije dikush shih te FIJ/E,~A. I shkon (i vjen) pas fijes (pas fillit) dikujt shih te FIJ/E,~A. Shkon (vete) firë shih te FIR/Ë,~A","I shkoi gand shih te GAND,~I. Shkon (vete) gjym shih te GJYM,~I. E shkoi në hell dikë shih te HELL,~I. Shkoi pa hoxhë dikush a diçka iron., vjet. shih te HOXH/Ë,~A. Shkoi huq shih te HUQ. I shkoi (i kaloi) koha dikujt a diçkaje është vjetruar, nuk është më i përshtatshëm, nuk përdoret më. I shkoi (i iku) koka shih te KOKË,~A","Më shkon lak shih te LAK,~U. Ka shkuar (ka vajtur) larg shih te LARG. I shkoi (i ra) lodra euf. shih te LOD/ËR,~RA. Më shkon (më vete) mendja për diçka shih te MENDJ/E,~A. Shkoj në mendje (ndër mend) diçka shih te MENDJ/E,~A. Më shkon ndër mend (në mendje) shih te MEND,~TË. Shkoj (vete) me mendje (me mendimin) se... shih te MENDJ/E, ~A. Shkon (bën) përpjetë shih te PËRPJETË. I shkon për piri (e ka për piri) shih te PIR,~I. Shkoi (vajti) plep shih te PLEP, ~I. Shkon (bën, merr) poshtë shih te POSHTË. Sa për të shkuar (për të kaluar) radhën shih te RADH/Ë, ~A. Më shkon (më vete) syri te dikush a te diçka shih te SY,~RI. S'pa (udhën) nga shkoi (nga vajti) shih te SHOH. I shkon (i vete) për shtat dikujt shih te SHTAT,~I. I vjen për shtat dikujt shih te SHTAT, ~I. I shkojnë (i venë) shtatë thjeshtligj. shih te SHTATË. Shkoi (iku) me të shumtët mospërf. shih te SHUMT/Ë,~I (i). Shkon tatëpjetë shih tek TATËPJETË. E shkoj tatëpjetë diçka shih te TATËPJETË. Shkoi te teshat shih tek TESH/Ë,~A. I shkojnë urov prej dikujt shih tek UROV,~I. Shkoi (doli) va pa va shih te VA,~U. Shkon (ecën) si në vaj shih te VAJ,~I. Shkon në v
