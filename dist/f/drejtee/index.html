<script>window.__INITIAL_DATA__ = [{"slug":"drejtee","term":"DREJTË","attributes":["f.","sh."],"definitions":["vet. nj. Tërësia e normave që rregullojnë marrëdhëniet shoqërore ndërmjet njerëzve në një vend të caktuar, të citat ndërtohen sipas vullnetit, qëllimeve e interesave të klasës në fuqi, vendosen nga shteti e mbrohen me ligj ose janë të pashkruara dhe zbatohen brez pas brezi nga një popull, nga një fis, nga një klasë etj.; tërësia e ligjeve, e vendimeve dhe e urdhëresave të shtetit, që lidhen me këtë ose me atë anë të jetës e të veprimtarisë shoqërore. E drejta socialiste. E drejta borgjeze (feudale, skllavopronare). E drejta kanunore (zakonore, dokesore). E drejta romake.","vet. nj. Shkenca që merret me studimin e këtyre ligjeve, normave e urdhëresave; degë e kësaj shkence për një anë të veçantë të jetës e të veprimtarisë shoqërore. E drejta civile (penale, kushtetuese, ndërkombëtare).","Lënda mësimore që jep njohuritë e nevojshme të kësaj shkence në shkollë; bised. teksti që përmban këto njohuri. Programi i së drejtës penale (civile). Provimi i së drejtës ndërkombëtare.","Mundësi që sigurohet me ligj a me vendime të ndryshme shtetërore për të gëzuar a për të përdorur diçka, për të kërkuar diçka, për të vepruar në një mënyrë të caktuar etj.; mundësia që i jepet dikujt sipas ligjeve në fuqi për të bërë diçka. Të drejtat demokratike. Të drejta të barabarta(të plota). Të drejtat e qytetarëve (e shtetasve, e grave). Të drejtat e autorit. Të drejtat dhe detyrat. E drejta e votimit (e arsimit, e fjalës, e mbledhjes, e shtypit). E drejta e trashëgimisë. E drejta për të zgjedhur e për t`u zgjedhur. E drejta për punë (për pushim, për pension). Me të drejtën e prindit. Zgjerimi (ngushtimi) i të drejtave. Gëzojmë të gjitha të drejtat. Shkelin (mohojnë) të drejtat. Kërkojnë të drejtat e tyre. Luftojnë për të drejtat. U jepet e drejta e strehimit shtetasve të huaj. I dha të drejtën që të nënshkruajë në emrin e tij (që ta përfaqësojë). Me ç`të drejtë e kërkon (e pyet)? Kush i dha të drejtën ta marrë?","Diçka që është në përputhje me parimet e një shoqërie ku nuk ka shfrytëzim të njeriut nga njeriu dhe që u përgjigjet kërkesave të moralit komunist; diçka që është e vërtetë, që përputhet me gjendjen e me faktet reale; mendim, gjykim a veprim i drejtë. Thotë të drejtën. Kërkon gjithnjë të drejtën. E gjetën të drejtën. Jemi me të drejtën. E ka me të drejtë. E drejta dërmon hekurin. fj. u. E drejta vonon, por nuk mungon. fj. u. E drejta rri si vaji mbi ujë. fj. u. e drejta fiton gjithnjë, e drejta nuk mund të mposhtet. E drejta i ka pemët te dera. fj. u. kush punon a vepron me drejtësi del gjithmonë i fituar.","Arsye a shkak që përligj një veprim; diçka që quhet a mendohet se është e drejtë dhe e lejueshme. Me (pa) të drejtë. Ka të drejtë. I dhanë të drejtë. * Ç'është e drejta (e vërteta) fj. ndërm. shih te VËRTET/Ë,~A (e). Të them (të themi) të drejtën (të vërtetën) fj. ndërm. shih te VËRTET/Ë,~A (e). Fiton (merr) të drejtën e qytetarisë libr. shih te QYTETARI,~A. I jep të drejtën e qytetarisë libr. shih te QYTETARI,~A."]},{"slug":"drejtee","term":"DREJTË","attributes":["m.","sh."],"definitions":["Njeri i drejtë, që gjykon e vepron drejt; njeri i çiltër e me zemër të pastër. I drejti fiton. I drejti e mund të shtrembrin. Me mirë fshikulli i të drejtit se llokumja e të shtrembrit. fj. u. * Gjumi i të drejtit gjumë i qetë."]},{"slug":"drejtee","term":"DREJTË","attributes":["mb."],"definitions":["Që është pa lakime, pa dredha, pa shtrembërime e nga njëri skaj tek tjetri pa kthesa, që shkon në një drejtim, që zgjatet drejt; që nuk pritet me një tjetër; kund. i shtrembër. Vijë e drejtë. Rrugë (udhë) e drejtë. Gardh (mur) i drejtë. Fill i drejtë. Shkop i drejtë. Me trup të drejtë. Me këmbë të drejta. E ka hundën të drejtë. I ka degët të drejta.","Që ka sipërfaqe të sheshtë e të papërkulur, që nuk është me gropa, me nyja a me gunga; kund. i shtrembër. Trung (tra, dërrasë) me faqe të drejta. Dysheme e drejtë. Kalldrëm i drejtë. Çati e drejtë.", në krezat e pistilit të po kësaj luleje. * I drejtë si drapri iron. shih te DRAP/ËR,~RI. Në vijë të drejtë me lidhje të pandërmjetme gjaku. Kënd i drejtë gjeom. shih te KËND,~I. Kundrinë e drejtë gjuh. shih te KUNDRIN/Ë,~A. Ligjëratë e drejtë gjuh. shih te LIGJËRAT/Ë, ~A I. Rasë e drejtë gjuh. shih te RAS/Ë,~A I 1."]}]</script>
