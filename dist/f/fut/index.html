<script>window.__INITIAL_DATA__ = [{"slug":"fut","term":"FUT","attributes":["kal."],"definitions":["E shtie a e vë diçka brenda në një vend (në një orendi, në një vend tjetër të mbyllur); e shpie dikë a diçka në një vend të mbyllur, të rrethuar, të mbrojtur a të fshehtë; kund. nxjerr, qit. I futi fshehurazi. E futi në sirtar. I futi rrobat në dollap (në valixhe). I futi librat në raft. I futi në kasolle (në vathë). E futën në burg. E futi në këllëf (në kuletë, në çantë, në arkë, në kuti, në qese, në thes). Fut në xhep (në gji, në gojë). E futën drithin në hambar. I futi dhentë në vathë. E futi nga dera (nga dritarja).","E zhyt në ujë etj., e kredh diku në thellësi; kund. nxjerr. E futi në ujë (në liqen, në pus). E futi në baltë. I futi këmbët deri në gju.","Ngul në tokë a në një trup; e shtie diçka në një vrimë a në zbrazëtinë e një sendi; vë. E futi gozhdën thellë. E futi nurin në tokë. I futi një gjilpërë në trup. Ia futi thikën. Ia futi thonjtë. E futi qafën në zgjedhë. Fut krahun në mëngë. Fut dorën në qyp. Fut çelësin në derë. Fut gishtin në unazë (unazën në gisht). I fut tapën shishes.","edhe fig. Bëj që të hyjë e të zërë vend midis njerëzve a sendeve; bëj që dikush të ndërhyjë për diçka. E futën në mes. Futi ndërmjetës (dorëzanë).","Hedh diçka në një gjë tjetër, shtie. I futi ujë verës. I fut kripë (piper) gjellës.","fig. Bëj që ta njohë e ta kuptojë me thellë diçka ose të ketë të qartë thelbin e një çështjeje; bëj që të marrë vesh diçka të fshehtë a të panjohur; e bëj të rrahë diçka në mendje, e zhyt. E futi në thelbin e çështjes. E futi në mendime të thella.","fig. Bëj që të hyjë thellë e të zërë vend diku, bëj që diçka të kuptohet e të përvetësohet mirë nga dikush ka futur në gjak. Ia futi në kokë. E kanë futur në jetën e përditshme.","bised. Vendos një arnë, një copë etj. në një rrobë, në këpucë etj.; vë, hedh. I futi një arnë këmishës. U futi gjysma këpucëve.","Vë mënjanë para, prodhime, ushqime etj. Dhe i ruaj për t’i përdorur me vonë ose për një qëllim të caktuar, shtie në shtëpi; jap një sasi të hollash bashkë me të tjerët për një qëllim të caktuar; vë. I futën zahiretë e dimrit. Futën nga njëqind lekë secili.","Vë dikë në një punë, e caktoj në një detyrë; e bëj anëtar të një organizate, e pranoj të marrë pjesë diku; kund. heq, nxjerr, përjashtoj. E futi në punë (në shkollë). E futi djalin në zanat. E futën si kujdestar. E futën në parti (në organizatën e rinisë). E futën në kategorinë e parë.","fig. E përfshij brenda diçkaje, e vë a e shtoj diku; kund. heq. E futën në rendin e ditës. E futi në listë. Nuk e kanë futur në këtë numër të revistës.","fig. E shpie dikë në një gjendje të caktuar i bëj që dikush a diçka të vijë në një gjendje të veçantë; i kail dikujt një ndjenjë etj. I futi në grindje (në sherr). E futi në kurth (në grackë, në kllapë). E futi në bela, i futi frikën. E futi në merak e merakosi. I futi të dridhurat.","bised. Veproj shpejt me një mjet, kryej një punë a një veprim me një mjet; i heq, i shkoj; vë diçka në një makinë ose në një aparat që të punohet a të përpunohet. Ia futi me kazmë (me shat) e gërmoi shpejt e shpejt. I futi një kosë e kositi një herë. Ia futi me fshesë oborrit e fshiu shpejt e shpejt. I futi një përdaf murit e sheshoi murin me përdaf. I futi një të larë me makinë. E fut në vegjë (në tezgjah) e punoj me vegjë. E futi në makinë.","bised. I bie me diçka, e godas fort; i jap, ia këput; i vë. Ia futi me pëllëmbë (me shkelm, me kokë). Ia futi surratit (turinjve). I futi një dru të mirë e rrahu shumë. Ia futi me pushkë e vrau. Ia futi vetes vrau veten (me një armë). I futi një të sharë. Ia futi një vulë (një firmë).","fig. Bëj që dikush të nisë e të veprojë ose të marrë pjesë në diçka; hedh, vë. E futi në veprim (në lëvizje). I futi trupat në luftë. E futi në garë. E futi në valle e bëri të marrë pjesë në një punë. E futin nusen në magje e vunë të gatuajë bukë etj. E futën në avlëmend e vunë të punojë në avlëmend.","fig. bised. Nis diçka, e përdor a e vijoj më tej; vë; kund. heq. E futi rakinë (duhanin). E fut në përdorim (në qarkullim).","bised. Flas në një farë mënyre; them diçka; flas kot; kryej diçka në tym. Ia futi qorrazi (në tym, në erë). Mos ia fut kot!","bised. Ha ose pi diçka me një frymë a me shumicë; bëj diçka që me kënaq. Ia futi një pilaf (nja dy pjata gjellë). I futi nja dy gota raki (nja dy shishe birrë). Ia futi një gjumi të mirë fjeti mirë e mirë.","bised. Iki me të shpejtë e si të mundem, çaj diku. Ia futi fushës (pyllit, rripave). Ia futën përpjetë (tatëpjetë).","jokal. vet. veta III. bised. Bie me shumicë (për reshjet); fryn papritur, me forcë (për erën etj.). Ia futi një shi (një borë, një breshër). Ia futi një erë. * E fut (e lë) në arkiv libr. shih tek ARKIV,~I. E futi (e vuri, e shtiu) në bigë dikë shih te BIG/Ë, ~A. E futi (e vuri) në brazdë shih te BRAZD/Ë,~A. E futën (e rrasën) brenda thjeshtligj. mospërf. shih te BRENDA. Fut (shtie) cita (fite, fitila, fitme, kalla, kunja, spica) e shtyn, e nxit dikë për të bërë një punë të keqe, e shtyn dikë me qëllim të keq kundër një tjetri. S’e fut (s’e vë, s’e shtie, s’e shkruan, s’e ka) në defter dikë a diçka edhe poh. shih te DEFTER, ~I. E futi në dollap shih te DOLLAP,~I. Fut duart diku keq. ndërhyn, merr pjesë në një punë, në një çështje etj. që s’i takon. E futi (e shtiu) në dorë dikë a diçka shih te DOR/Ë,~A","Ia fut dushk thjeshtligj. shih te DUSHK,~U. I futi flakën (zjarrin) i futi grindjen, e përçau. I futi (i kalli) flamën (murtajën) dikujt a diçkaje thjeshtligj. shih te KALL. Fut (vë) në fre dikë shih te FRE,~RI I. I futi (i vuri) gërshërën shih te GËRSHËR/Ë,~A. Fut gishtin diku shih te GISHT,~I. Ia ka futur në gjak diçka shih te GJAK,~U I. Fut gjemba shih te GJEMB,~I. I futi gjilpërat dikujt shih te GJILPËR/Ë,~A. Fut hundët (bundën, turinjtë) në diçka keq. ndërhyn në një çështje që s’i takon, përzihet në një punë, në të cilën nuk duhet të përzihet. E futi në kallëpe shih te KALLËP,~I. I fut (gjërat) në kallëpe shih te KALLËP,~I. E futi (e vuri) në katror dikë libr. shih te KATROR, ~I. Ia fut katundit thjeshtligj. shih te KATUND,~I. Fut (vë) këmbët (këmbën) diku shih te KËMB/Ë,~A. I futi krimbin dikujt shih te KRIMB,~I. E futi (e vuri) në lesë dikë shih te LES/Ë, ~A. Ia fut (ia shtie) në (ndër) mend (në mendje) diçka shih te MEND,~TË. I fuiti (i shtiu) mizat (xixat) dikujt e shtyu, e nxiti dikë për diçka; i ngjalli një dëshirë të fortë a një shqetësim për diçka. S’e fut (s'e vë, s’e zë, s’e shtie) në numër shih te NUM/ËR, ~RI. E futi (e vuri) në pushkë dikë shih te PUSHK/Ë,~A. Fut pyka shih te PYK/Ë,~A","Futi qafën diku shih te QAF/Ë,~A. E futi (e vuri) në sirtar keq. shih te SIRTAR,~I. E futi nën sqetull dikë shih te SQETULL,~A","E ka futur (e ka vënë) në shënjestër dikë shih E ka vënë në shenjë te SHENJ/Ë,~A. E futi në shtrungë dikë shih te SHTRUNG/Ë,~A. E futi në thekër dikë shih te THEKËR,~RA. E fut në një thes (me një tjetër) shih te THES,~I. E futi (e shtiu) në thes (në grackë, në kurth, në lak, në kllapë) dikë shih te SHTIE. Nuk futi (nuk shtiu) gjë në thes shih te THES,~I. I futi (i nguli) thonjtë dikujt keq. shih te THUA, THOI","E futi ndër thonj dikë shih te THUA, THOI","I futi thumba dikujt shih te THUMB, ~I","E futi (e shtiu, e vuri) në valle dikë shih te VALLE,~JA","E futi (e vuri) në vathë dikë shih te VATH/Ë,~A. I futi (i shtiu) veremin dikujt a) e hidhëroi shumë dikë, e futi në dëshpërim të madh; b) e mërziti shumë dikë, ia plasi shpirtin dikujt. Ia futi (ia shtiu) në vesh diçka shih te VESH, ~I. I futi (i hoqi, i vuri) vizë (vijë) dikujt a diçkaje shih te VIZ/Ë,~A. E futi nëpër xibërrishta dikë shih te XIBËRRISHT/Ë,~A. E fut (e vë, e ruaj) në xhep shih te XHEP,~I. E futi në xhep dikë shih te XHEP,~I. Të fut ndër xhepa shih te XHEP,~I. E futi në zdrukth dikë shih te ZDRUKTH,~I. Fut (vë) duart (dorën) në zjarr (në prush) për dikë shih te ZJARR, ~I. I ka futur duart deri në bërryl keq. shih te BËRRYL,~I. E futi (e vuri, e shtiu) në dhe (në varr) për së gjalli (të gjallë) shih te VARR,~I. Sa t’i futësh gishtat në sy shih te SY,~RI. Ua futi një grusht miza shih te GRUSHT,~I. Nuk e fut dot në grykën e pushkës shih te GRYKË,~A. I futi (i hodhi) një gur në shollë (në opingë, në këpucë) dikujt shih te GUR,~I. Futi (vuri) kokën në gërshërë shih te GËRSHËR/Ë,~A. I futi lugët në kosh shih te LUG/Ë,~A. Ia futi (ia shtiu) pleshtat në vesh dikujt shih te PLESHT,~I. Fut (shtie) shejtanin (djallin) në shishe shak. shih te SHEJTAN,~I. I fut (i vë) shkopinj në rrota shih te SHKOP,~I. I futi (i nguli) thikën prapa shpine (prapa kurrizit, prapa krahëve) shih te KURRIZ,~I. Fut ujkun në vathë shih te VATH/Ë,~A. Fut zjarrin në kashtë shih te KASHT/Ë,~A. Futi (solli) zjarrin (në shtëpi) shih te ZJARR,~I. Mos e fut në hambar pa e shoshitur fj. u. shih te SHOSHIT. Ia futi (ia vuri, ia shtiu) të dyja këmbët në një këpucë (në një opingë) dikujt shih te KËMB/Ë,~A. S’di ku të futë (të vërë) kokën ka shumë halle e telashe sa nuk di ç’të bëjë me parë. E futi (e kaloi, e shkoi) në vrimë të gjilpërës dikë shih te GJILPËR/Ë,~A."]},{"slug":"fut","term":"FUT","attributes":["m.","sh."],"definitions":["Masë gjatësie e barabartë me 30,5 centimetra. këmbë."]}]</script>
