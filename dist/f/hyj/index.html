<script>window.__INITIAL_DATA__ = [{"slug":"hyj","term":"HYJ","attributes":["jokal."],"definitions":["Shkoj e futem diku brenda, duke ecur me këmbë a duke lëvizur; futem në një vend të mbyllur a të rrethuar; kund. dal. Hyri fshehurazi (papritur). Hyri zvarrë. Hyri me vrap (me nxitim, me vrull, me forcë, me zor). Hyri në shtëpi (në dhomë, në kasolle, në vathë). Hyri në klasë (në shkollë). Hynë në shpellë. Hyj në oborr (në kopsht, në stadium, në fushë). Hyri në pyll (në kopsht, në vresht). Vapori hyri në port. Nuk hyjnë rrezet e diellit. Hyri nga dera (nga dritarja). Në barkë kishte hyrë shumë ujë. Era hynte tejembanë. Ku hyn dielli nuk hyn mjeku. fj.u.","Zhytem diku në thellësi, bie brenda në diçka. Hyj në ujë (në lumë, në det, në liqen, në pus). Hyri në baltë. Hyri thellë deri në gju.","vet. veta III. Ngulet në thellësinë e diçkaje; futet brenda në diçka; arrin të futet e të vendoset brenda në diçka, e merr a e nxë diçka. Hyri thellë gozhda. I ka hyrë plumbi në mish. Ka hyrë në tokë (huri, urithi). I ka hyrë një gjemb. Thoi ka hyrë në mish. Nuk hyn në xhep s'e nxë xhepi.","Futem e zë vend midis njerëzve a sendeve; ndërhyj për dikë a për diçka. Hyri në mes (ndërmjet tyre). Hyri si pykë. Hyri ndërmjetës (dorëzanë, lajmës). Kjo çështje nuk hyn këtu. Mos hyr në punët e tij.","Futem a depërtoj në një vend ose në një hapësirë (e prek, e shkel a e pushtoj). Hynë në qytet (në fshat). Partizanët hynë në lagjet e jashtme (në prapavijat e armikut). Aeroplani hyri në hapësirën ajrore. Anija hyri në ujërat territoriale.","fig. Futem diku, prek një çështje të fshehtë a të panjohur, arrij te diçka e mbyllur; futem thellë në diçka, depërtoj thellë, zhytem. Hyri në të fshehtat e dikujt. I hyj në botën e brendshme dikujt. Hyri në temë (në thelbin e çështjes). Hyri në hollësira. Ka hyrë shumë në atë punë. Hyri në mendime të thella.","fig. Bie në një gjendje të caktuar; më kap diçka, më zë dhe vij në një gjendje të veçantë shpirtërore a trupore. Hyri në rrezik. Hyri në sherr (në grindje). Hyri borxh (në borxh) mori hua. I hyri frika u frikësua. I hyri lakmia. I hyri meraku për dikë a për diçka u merakos. Na hyri të ftohtët kemi të ftohtë. I hynë të dridhurat (nga të ftohtët, nga frika).","vet. veta III. Ulet, bie, fundoset. Ka hyrë toka. Kanë hyrë themelet. I kanë hyrë faqet (sytë). I ka hyrë gjoksi brenda.","Jam a bëj pjesë diku; vet. veta III përfshihet brenda diçkaje, është diku. Hyri në radhë. Hyri në listë. Në këtë përmbledhje hyjnë disa tregime. Kjo fjali ka hyrë thellë në gjuhë. Sa herë hyn pesa te njëzeta?","Bëhem anëtar a pjesëmarrës i diçkaje, marr pjesë diku. Hyj në parti (në organizatën e rinisë, në organizatën e bashkimeve profesionale). Hyri në kooperativë.","vet. veta III fig. Futet thellë te dikush a te diçka, përvetësohet nga dikush. I ka hyrë (i është futur) në gjak. Ka hyrë në jetën e përditshme. Hyn në jetë diçka bëhet e zakonshme në jetën a në punën e përditshme. Ka hyrë në modë është bërë e modës.","fig. Filloj a nis të marr pjesë në diçka; filloj të merrem me një punë, nis të bëj diçka; vendos e nis të veproj, i futem a i përvishem diçkaje. Hyj në punë. Hynë në luftë. Hyj në garë. Hynë në bisedime (në kuvend, në marrëveshje). Hyri në lidhje. Hyj në valle. Hyn në përdorim. Ia hyj një punë. Ia hyri me dru nisi ta rrihte. Hyri në vegjë (në tezgjah) nisi të punonte në vegjë. Hyri në govatë nisi të lante rrobat. Hyri në magje filloi të gatuante bukë etj. Ia hyri me drapër nisi ta korrte. I hyri me kazmë nisi ta gërmonte. Hyn në fuqi (një ligj).","fig. Filloj një periudhë të re kohe; vet. veta III nis një kohë e caktuar. Hyri në të tetin (hyri për tetë) ka filluar moshën tetë vjeç. Hymë në një epokë (në një fazë, në një periudhë) të re. Kemi hyrë në vitin jubilar. Hyri prilli (marsi). Hyri dimri.","vet. veta III. Tkurret a mblidhet diçka, zvogëlohet, shkurtohet. Kanë hyrë rrobat nga të larët. Ky dok nuk hyn në ujë. Hyn për së gjati (për së gjeri).","vet. veta III bised. Perëndon. Hyri dielli (hëna).","pavet. HYHET. Ti hyhet revolucionit! Nuk hyhet atje. Delet andej nga hyhet. * I hyj (i futem) brenda diçkaje shih te BRENDA. U ka hyrë bukla shih te BUK/ËL,~LA. Hyjmë e dalim me dikë kemi marrëdhënie të mira, shkojmë e vijmë. Si hyri doli dikush s'përfitoi asgjë; nuk mësoi asgjë. Hyri (doli) nga deriçka shih te DERIÇK/Ë, ~A. I hyri dorë a) diçkaje ia nisi një pune, iu fut me vrull, iu përvesh mirë; b) dikujt nisi dhe e rrahu dikë shumë. Hyri në dhe a) vdiq, mbaroi; b) u fsheh nga turpi, u zhduk nga sytë. I hynë ferrat shih te FERR/Ë,~A. I ka hyrë fitili shih te FITIL,~I. I hyri në fjalë dikujt shih te FJAL/Ë,~A. Hyri (ra) në gojë të dikujt shih te GOJ/Ë,~A. I hyri gjembi shih te GJEMB,~I. I hyri në gji (ndër petka) dikujt shih te GJI,~RI. I hyri në hak dikujt shih te HAK,~U. I hyri në hesap dikujt shih te HESAP, ~I. Nuk hyn në hesap dikush a diçka shih te HESAP, ~I. Hyri në histori edhe shak. shih te HISTORI,~A. I hyn ndër hundë dikujt shih te HUND/Ë,~A. Hyj në jetë shih te JET/Ë,~A. Nuk hyn në kallëp dikush a diçka shih te KALLËP, ~I. I hyri në kokë (në krye) diçka iu ngul në mendje, i hipi. S'i hyn në kokë (në krye) s'arrin ta kuptojë a ta mësojë. I hyri në krah dikush shih te KRAH,~U. I kishte hyrë (e brente, e hante) krimbi shih te KRIMB,~I. Hyri (ra) në lak (në grackë) shih te LAK,~U","Hyri nëpër lakra shih te LAK/ËR, ~RA. I hyri me laps diçkaje shih te LAPS,~I. Hyri në lojë shih te LOJ/Ë,~A. I hyri në llaf dikujt shih te LLAF,~I","I ka hyrë (i është futur) me gjithë opinga diçkaje shih tek OPING/Ë,~A. Hyri në pazar me dikë nisi të merret vesh me dikë për të arritur një marrëveshje. I hyri në pjesë dikujt shih te PJES/Ë,~A","I hynë pleshtat (në trup) shih te PLESHT,~I. S'më hyn në punë edhe poh. a) s'më nevojitet, s'më vlen për diçka, nuk më duhet; b) s'më intereson. Hyri në pus shih te PUS,~I. Hyn (futet) si pykë shih te PYK/Ë,~A. I hyri pyllit shih te PYLL,~I. Më ka hyrë në qejf dikush a diçka shih te QEJF,~I. Nuk më hyn në qese (në trastë, në kut) diçka nuk më duhet diçka, s'kam punë me të. Mos hyrë (mos u fut) në atë qull! shih te QULL,~I. Ka hyrë në një rabush me dikë keq. shih te RABUSH,~I. S'më hyn në sy dikush a diçka shih te SY,~RI. I ka hyrë në shpirt dikush a diçka shih te SHPIRT,~I. I ka hyrë tenja shih tek TENJ/Ë,~A. I kanë hyrë në torishtë (punët etj.) shih tek TORISHT/Ë,~A. Hyn në një thes me dikë a me diçka shih te THES,~I. Hyri në thikë bised. u operua. Hyn nën udhë shih tek UDH/Ë,~A. Hyri (u fut) në valle (ia hyri valles) shih te VALL/E,~JA","Hyri në vathë shih te VATH/E,~A. I hyri veremi për dikë a për diçka shih te VEREM,~I. I hyri (i ra, i shkoi, i erdhi) në vesh diçka shih te VESH,~I. I ka hyrë (i ka hipur, i ka kërcyer) zekthi (miza) shih te ZEKTH,~I. Hyri në zgjedhë u nënshtrua. I hyri zjarri (në shtëpi) shih te ZJARR.~I. Hyn derri e dosa keq. shih te DERR,~I. Hyri (u fut) në bri të kaut (të buallit) shih te BRI,~RI. I ka hyrë djalli (dreqi, shejtani, macja, maçoku) në bark shih te BARK,~U. Nuk i ka hyrë ferrë (gjemb) në këmbë shih te FERR/Ë,~A. I ka hyrë frika në palcë (në bark, në mish) shih te PALC/Ë,~A","I ka hyrë lepuri në bark (ka lepurin në bark) shih te LEPUR,~I. Hyri në livadh të huaj shih te LIVADH, ~I. I ka hyrë (i është futur) mirë rolit libr. shih te FUTEM. Ka hyrë në rrugë pa krye shih te KRYE,~T. Ka hyrë në rrugë të shtrembër shih te SHTREMBËR (i, e). I hyri uji (ujët) nën rrogoz (nën hasër) shih te RROGOZ,~I. S'më hyn gjë në thes shih te THES,~I. Nuk më hyn gjë në xhep shih te XHEP,~I. I ka hyrë (i ka vajtur, i ka shkuar) thika (gjer) në kockë shih te THIK/Ë,~A. I ka hyrë vetja në qejf shih te VETE,~JA. Me sa hyn bualli në veshin (në vrimën) e gjilpërës shih te BUALL,~I. Hyr e dil e tund peshqirin mospërf. s'bën asgjë, vjen rrotull pa punë, tund derën. Hyri në këtë derë, doli në atë derë shih te DER/Ë, ~A. I kanë hyrë në kokë miza të këqija dikujt shih te MIZ/Ë,~A. I hyn në një vesh e i del nga tjetri (nga një vesh i hyri, nga tjetri i doli) mospërf. nuk kupton, nuk merr vesh asgjë. Këtej i hyri këtej i doli mospërf. nuk kuptoi asgjë fare, nuk mori vesh asgjë nga ato që dëgjoi. Hyn me mend e del pa mend diku shih te MEND,~TË. Hyri mish e doli peshk mospërf. shih te MISH, ~I. Hyn në pus e del pa u lagur shih te PUS,~I. Hyri (shkoi) shul e doli (erdhi) lloz shih te SHUL,~I. Lëre lëngun e hyr në thela! iron. shih te LËNG,~U. E nxorën nga dera, hyri nga deriçka (nga dritarja) shih te DER/Ë, ~A."]},{"slug":"hyj","term":"HYJ","attributes":["m.","sh."],"definitions":["Zot; perëndi."]}]</script>
