<script>window.__INITIAL_DATA__ = [{"slug":"gradee-i","term":"GRADË I","attributes":["f.","sh."],"definitions":["Njësi e matjes së temperaturës, të shtypjes atmosferike etj.; shenja me vijë ose me shifër në një aparat a në një vegël që shërben për të matur temperaturën, shtypjen atmosferike etj.; shkallë. Gradat e termometrit (e barometrit). Dy grade nën zero. Në temperaturën njëzet grade.","sh. ~Ë,~ËT gjeom. Njësi e matjes së këndit ose të harkut, e barabartë me një të treqindegjashtëdhjetën pjesë të rrethit (simboli °); shenja me vijë ose me shifër në një aparat a në një vegël që shërben për të matur këndet ose harqet. Gradë këndore (harkore). Kënd nëntëdhjetë gradë.","sh. ~A, ~AT bised. Termometër. Vë (heq) gradën.","sh. ~Ë, ~ËT. Njësi e matjes së dendësisë së nja lëngu ose të sasisë së alkoolit në të. Sa gradë është kjo raki?","sh. ~Ë, ~ËT gjeogr. Njësi matjeje e barabartë me një të treqindegjashtëdhjetën pjesë të paralelit a të meridianit. Gradë gjeografike. Gradë e gjerësisë veriore (jugore).","sh. ~A, ~AT usht. Secila prej shkallëve të hierarkisë ushtarake; emërtim i çdo shkalle dhe shenja dalluese e saj (në ushtritë që kanë shkallë të tilla). Gradë oficeri. Gradë koloneli. Heqja e gradave.","sh. ~Ë, ~ËT muz. Secili tingull në shkallën muzikore që shënohet me shifër nga nota e ulët deri në më të lartën. Grada e parë (e dytë, e tretë...).","sh. ~A, ~AT. Emërtim që i jepet një punonjësi shkencor a mësimor ose një specialisti të lartë të prodhimit pasi ka plotësuar kërkesat e shkallës së parë a të dytë të kualifikimit pasuniversitar. Grada shkencore «kandidat i shkencave» («doktor i shkencave»).","sh. ~Ë ~ËT mat. shih SHKALL/Ë, ~A","Ekuacion i gradës së parë (së dytë).","Rend a hallkë në një sistem të shkallëzuar; shkallë, instancë. Gjykim i gradës së parë (së dytë).","fig. Shkallë, gjendje; cak. Në gradën e fundit në gjendje shumë të rëndë a shumë të keqe. Në ç`gradë ka arritur puna? Gjer më një farë grade."]}]</script>
