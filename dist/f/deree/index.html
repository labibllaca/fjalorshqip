<script>window.__INITIAL_DATA__ = [{"slug":"deree","term":"DERË","attributes":["f.","sh."],"definitions":["Vend i hapur në matin e një ndërtese, të një dhome etj., që shërben për të hyrë e për të dalë dhe që mbyllet me kanat a me diçka tjetër; kanati që mbyll këtë vend të hapur; hyrje. Derë e ngushtë (e gjerë, e lartë, e ulët). Derë e hapur (e çelur, e mbyllur, e kyçur). Derë e jashtme (e brendshme, e fshehtë). Derë druri (hekuri, xhami). Dera e shtëpisë (e dhomës, e sallës, e zyrës). Dera e kopshtit. Dera e oborrit (e udhës) porta. Pragu i derës. Kanati (kapaku) i derës. Doreza e derës. Kyçi (çelësi) i derës. Vë (vendos) dyert. Hap (mbyll, kyç) derën. Shkallmoi (theu) derën. Përplasi derën. Trokiti në derë. I ra derës. Rri (fshihet, përgjon) prapa derës. E vunë rojë te dera. S`ka derë. I bëri (i hapi) një derë. E la derën hapur. E gjeti derën mbyllur.","Vend i hapur në një mjet transporti në një aparat, në një orendi etj., që shërben për të hyrë e për të dalë ose për të futur e për të nxjerrë diçka dhe që zakonisht mbyllet me kanat a me kapak; kanati a kapaku që mbyll këtë vend të hapur. Dera e autobusit (e vagonit). Dera e furrës. Dera e dollapit. Dera e sobës. Dera e kafazit. Dera e frigoriferit.","fig. bised. Familja, shtëpia; fisi. Derë e mirë (e dëgjuar, e madhe, e fisme, e parë). Derë e huaj. Derë pushke. Derë trimash. Dera e babait. I vajti në derë. Nga një njeri për derë. Punonte dyerve të botës. Ua heq dera trimërinë e kanë për fis trimërinë. Mbeti në derë të prindërve nuk është martuar (për vajzat, kur u kalon koha). E nxori nga dera (vajzën) e martoi. Erdhi me derë pas erdhi me të gjithë njerëzit e vet pa përjashtim.","fig. bised. Rrugëdalje, zgjidhje. E ka një derë. S`kishte derë tjetër. S`i gjejnë dot derë kësaj pune. Nuk ka shtëpi pa derë. fj. u. në çdo rast mund të gjendet një rrugëdalje, s'ka punë që nuk zgjidhet. * I fiku derën i bëri dëm shumë të madh, e mori me qafë; e la të shkretë, e la pa njeri. Ia ferrosi derën (shtëpinë) dikujt shih te FERROS. Gëzim për derë iron. diçka që më ndodh mua sot, mund të të ndodhë edhe ty nesër. Hap (çel) dyert shih te HAP. I hapi (i çeli) derën (dyert, portën) shih te HAP. Iu hap (iu çel) dera dikujt shih te HAPEM. T'u haptë dera! shak. shih te HAPEM. Me dyer të hapura shih te HAPUR (i, e). Na e harroi derën (shtëpinë) nuk na vjen më dikush në shtëpi. S'të hiqet nga dera dikush vjen shpesh e të mërzit, s'të ndahet. Në derë të huaj shih te HUAJ (i,e). E humbi derën shih te HUMB. Është (ka ardhur, e kam) në derë (te dera, prapa derës, në prag të derës) është fare pranë, zëre se ka ardhur. Ia la në derë dikujt a) ia ngarkoi atij përgjegjësinë për një punë ose për një gabim a faj; b) i bëri një të keqe, e turpëroi dhe iku. Matu në derë! mospërf. largohu prej këtej!, thyej qafën!, qërohu! Më mbeti (më ngeli) në derë a) dikush më është qepur për një punë a për diçka tjetër, nuk më ndahet; më vjen orë e çast; b) diçka më mbeti përgjithnjë si barrë, s'më hiqet. I mbiu në derë keq. shih te MBIN. Ia ka mbyllur derën dikujt shih te MBYLL. Ia mbylli derën dikujt shih te MBYLL. I mbyll dyert diçkaje shih te MBYLL. E mbylli derën (shtëpinë) shih te MBYLL. I mbyll derën (portën, shtegun, rrugën) dikujt a diçkaje shih te MBYLL. Iu mbyll dera (shtëpia) shih te MBYLLEM. Me dyer të mbyllura shih te MBYLLUR (i, e). Iu nxi dera e gjeti një e keqe e madhe, i ra një fatkeqësi e rëndë në familje. E preva derën e dikujt shih te PRES I. I pres derën dikujt shih te PRES I. Shikon derën (portën) shih te SHIKOJ. Nuk ia ka shkelur derën (pragun) shih te SHKEL","Nuk ia kam parë derën dikujt nuk kam qenë kurrë në shtëpinë e tij, nuk e di fare se ku banon dhe si jeton. Të shuan derën (binanë, pishën) shih te SHUAJ. Iu shua dera u shkatërrua krejt, mbaroi me gjithçka; u fik. I tregoi derën dikujt e përzuri, e nxori jashtë. I trokas në derë dikujt i drejtohem për të më ndihmuar, për të më plotësuar një kërkesë, për të më kryer një punë etj.; i kërkoj diçka, i lutem për diçka. Troket në derë diçka shih tek TROKAS. Tund (luan) derën mospërf. nuk bën asnjë punë, rri fare pa punë; merret me gjëra të kota, bën sikur punon. I thau derën ia zhduku gjithë njerëzit e familjes a fëmijët, e la pa njeri, e la të shkretë, i mbylli derën, i shoi pragun. Dera e vogël euf. nevojtorja. I zuri derën dikujt i shkoi dikujt në shtëpi pa e ftuar e pa dëshirën e tij; e mërziti dhe e rëndoi dikë duke i vajtur shpesh në shtëpi a në zyrë, kur ai nuk e do një gjë të tillë. Banojnë derë me derë banojnë shumë afër, janë pranë e pranë me shtëpi. Është bërë për në plasë të derës shih te PLAS/Ë,~A. Për çdo derë (për çdo shteg) ka një lesë shih te LES/Ë, ~A I. Është daulle për derë diçka shih te DAULL/E, ~JA. Hap e mbyll derën hap e mbyll dollapin. I hodhi (i vuri) rezen derës (shtëpisë) shih te REZ/E,~JA. E ka derën hapur (çelur) shih te HAPUR. I ka kënduar qyqja në derë shih te QYQ/E,~JA. Kërkoi derë e ferrë kërkoi gjithkund, s'la vend. Ia la kopilin (doçin, dobiçin) në derë (në prehër) thjeshtligj. shih te KOPIL,~I. Ia la turpin (koren) te dera shih tek TURP, ~I. Ma la peshqesh në derë ma hodhi mua, ma ngarkoi (për dikë a për diçka që nuk e duam). E mban derën hapur (çelur) shih te HAPUR. I mbiftë ferra në derë! mallk. shih te FERR/Ë,~A. Ia mbylli derën me ferra shih te FERR/Ë,~A. Politika e dyerve (e portave) të hapura shih te POLITIK/Ë,~A 1. Pyll në prag të derës shih te PYLL,~I. Shkon derë më derë shkon sa te njëri te tjetri, nga një familje në tjetrën, shkon shtëpi më shtëpi. Shpërtheu një derë (një portë) të hapur shih te HAPUR (i, e). I shtiu (i vuri) krahët derës (murit) shih te SHTIE. Troket në derë (në portë) të hapur shih te HAPUR (i, e). Troket në derën (në portën) e shurdhit shih te SHURDH,~I. Po troket në derën tënde iron. për ty po flasin, për ty është fjala (i thuhet dikujt që bën sikur nuk merr vesh që po flitet për të). Ia thye qerrja në derë shih te QERR/E,~JA. I vuri ferrën derës (shtëpisë) shih te FERR/Ë,~A. I erdhi vera te dera shih te VER/Ë,~A I. Ia zuri këmbët me derë e përcolli shpejt e shpejt, thuajse e përzuri (për dikë që e përzë tjetrin nga shtëpia ose nga zyra, sepse nuk e do etj.). Ia ka zënë kokën me derë shih te ZË. I bie pragut të dëgjojë dera shih te PRAG,~U. I flas derës të dëgjojë qilari shih te FLAS. Po i hape derën, të rrëmben shtëpinë thuhet për dikë që kur i bën një lëshim a një të mirë të vogël, të kërkon një gjë më të madhe, po i dhe gishtin të rrëmben dorën. Hyri në këtë derë, doli në atë derë nuk mori vesh se ç'u bë, nuk kuptoi asgjë. Është më afër dera se qilari fj. u. thuhet me ironi kur dikush sheh me parë interesin vetjak a të rrethit të tij të ngushtë, pastaj atë të përgjithshmin. Dy Kamberë në një derë vjet. dy të mira ose dy të këqija në të njëjtën kohë a në të njëjtin vend; mospërf. dy a më shumë njerëz të pazotë në një vend. Lyp për derë e ndan për shpirt është shumë bujar, edhe atë që e lyp e ndan me të tjerët. Ia mbylli derën përpara hundës shih te HUND/Ë,~A. Ia përplasi derën në fytyrë shih te FYTYR/Ë,~A. Mbyll dymbëdhjetë dyer me një shul shih te SHUL,~I. E nxorën aga dera, hyri nga deriçka (nga dritarja) e dëbuan dikë a e hodhën poshtë diçka botërisht, por u rikthye përsëri pa rënë në sy duke përdorur dredhi a mënyra të stërholluara. E pafsha në (nëpër) dyert e botës (dyerve të botës)! mallk. e pafsha duke lypur! Po dëgjove daullen, dasmën e ke te dera (prapa) shih te DAULL/E,~JA. Është nga ata (nga ato) që çelin njëqind (dyzet) dyer në ditë keq. shih te ÇEL. Këtej të pi verën, andej të shan derën shih te PI. E drejta i ka pemët te dera fj. u. shih te DREJT/Ë,~A (e)",""]}]</script>
