jë ajrore (ujore, detare). Vijë telefonike. Vijë lundrimi.","Varg njerëzish a sendesh njëri pas tjetrit; varg lojtarësh të caktuar me një detyrë kur luajnë me top (në një ndeshje futbolli, volejbolli etj.); rresht, kolonë. Vija e parë. Vija e sulmit. Vija e mbrojtjes. Në vijë të zhdërvjellët. usht. Në një vij ë(në dy vija).","Drejtimi i diçkaje. Vija e shikimit (e të parit). Vijë shënimi. usht. Vija e fluturimit të plumbit.","fig. Rruga që ndjek një parti, një qeveri etj; mënyra si mendon, vepron, drejton a udhëheq ajo, mënyra si i zgjidh çështjet themelore dhe pikësynimet që ka. Vija e drejtë (parimore, oportuniste, reaksionare). Vija e përgjithshme. Vija themelore. Vija e masave.","Vijueshmëri e rregullt e notave a e toneve në muzikë. Vija melodike (muzikore).","përd. ndajf. Me shumicë, shumë, rrëke, çurg. I shkonte gjaku vijë. * Varg e vijë shih te VARG,~U. E ka bërë vijë (vazhdë) diçka po e përsërit gjithnjë, e ka bërë gjë të zakonshme. I hoqi (i vuri, i futi) vijë (vizë) dikujt a diçkaje shih te VIZ/Ë,~A. Është në vijë a) diçka është në rregull; b) dikush është në rrugë të mbarë a të drejtë. E vuri në vijë (në udhë, në rrugë, në binarë) shih tek UDH/Ë,~A. Erdhi në vijë (në udhë, në rrugë, në binarë) shih tek UDH/Ë,~A. Në vijë të drejtë shih te DREJTË (i,e). Në vija të përgjithshme (kryesore, të trasha) në përgjithësi, pa hyrë në hollësira. E zhduku me një vijë (me një të rënë) pene diçka libr. e fshiu diçka me lehtësi si krejt të parëndësishme a pa vlerë, e quajti të padobishme e pa vlerë pa u menduar e pa u thelluar. Nuk i ecën kali në vijë nuk i ecën puna, nuk i shkon mbarë. E ka punën në vijë dikush e ka punën në rregull, i ecën puna. Vë (heq) vijën (shenjën) e barazimi shih te BARAZIM,~I. Në vijën e parë të luftës (të zjarrit) ballë për ballë me armikun, aty ku luftohet më shumë, në ballë të luftës. Nuk nxjerr gjë në vijë nuk ia del dot mbanë një pune, s'nxjerr gjë në krye; nuk është i zoti për diçka. Është një nga dhia, dy nga vija shih te DHI,~A. Një vijë
