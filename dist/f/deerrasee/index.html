<script>window.__INITIAL_DATA__ = [{"slug":"deerrasee","term":"DËRRASË","attributes":["f.","sh."],"definitions":["Fletë prej druri jo shumë e trashë, zakonisht e ngushtë, që nxirret duke sharruar një trung për së gjati dhe që përdoret si lëndë ndërtimi; copë nga kjo fletë me përmasa të ndryshme. Dërrasë e hollë (e trashë, e shkurtër, e gjatë). Dërrasë pishe (lisi, ahu). Copa dërrasash. Shtrat (nim) prej dërrasë. Dysheme (tavan) prej dërrase. Urë prej dërrasë. Parmakë me dërrase. Valixhe dërrase. Gjerësia (gjatësia) e dërrasës. Sharron (çan) dërrasa. Pres dërrasën. E shtroi (e veshi) me dërrasa.","Diçka që është ndërtuar me fletë të tilla druri ose me copa prej tyre. Dërrasa e zezë faqe prej fletësh të tilla druri, e lyer me bojë të zezë, që shërben për të shkruar mbi të me shkumës. Dërrasë shahu (dame) fushë shahu (dame). Dërrasa e basketbollit tabela e basketbollit. Dërrasa e dritares parvazi i dritares. Dërrasa e mishit copë prej flete të trashë druri, mbi të cilën presim mishin. Laj (pastroj, kruaj) dërrasat laj dyshemenë. Ulem në dërrasë ulem në dysheme.","Pllakë guri, rrasë. Dërrasa të zeza (të bardha). Nxori dërrasa në mal. E mbuloi çatinë me dërrasa.","zakon. sh. bised. Veshëzat e parmendës. Dërrasat e parmendës.","përd. mb. fig. bised. I sheshtë, i rrafshët; petë. E ka gjoksin dërrasë (zakonisht për një vajzë a grua me gjoks të pazhvilluar).","përd. mb. fig. bised., keq. I trashë nga mendja, budalla; që s'di gjë fare. Është fare dërrasë. Ishte dërrasë në aritmetikë. * Çan dërrasa (kopalla, dokrra) shih te ÇAJ. Çan dërrasa pa pykë shih te ÇAJ. Si gozhda në dërrasë shih te GOZHD/Ë,~A. I kanë ikur dërrasat ka luajtur mendsh. I ka krisur një dërrasë është si i luajtur mendsh. I krisi një dërrasë (koka, mendja) dikujt shih te KOK/Ë,~A. Mbeti dërrasë (teneqe, kripë) shih te MBES","Ka mbetur në dërrasë është fare bosh, s'ka asgjë brenda (për shtëpinë, dhomën etj.); ka mbetur pa asnjë mjet jetese e pa para (për njerëzit). I mungon një dërrasë ka një dërrasë mangët.
