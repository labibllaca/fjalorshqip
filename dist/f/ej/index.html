<script>window.__INITIAL_DATA__ = [{"slug":"ej","term":"EJ","attributes":["kal."],"definitions":["Zbuloj diçka a dikë që ka humbur ose është zhdukur, fshehur a mbuluar; kund. humb, humbas. E gjeti librin. E gjetën fëmijën. E gjeti poshtë shtratit (pas raftit). Mezi e gjeta. E kërkova, po s'e gjeta. Gjej rrugën nëpër errësirë.","Ndesh rastësisht diçka a dikë; shtie në dorë rastësisht. Gjeti ca të holla (një kuletë). Gjeti një letër mbi tryezë. Nuk i kam gjetur në rrugë i kam siguruar me punë e me mundim.","Ndeshem, has me diçka a me dikë që po e kërkoja; shoh, vë re diçka a dikë që më duhet ose diçka që duhet ndrequr a rregulluar. Gjej emrin në listë. Gjej faqen në libër. Gjeti një shembull (një citat). Gjen gabimet e shtypit. Gjej të metat. E dërgoi të gjente mjekun. Rrallë e gjen. Nuk gjej fjalë ta shpreh.","Siguroj ose arrij të kem diçka a dikë që më duhet pas kërkimesh ose me përpjekje; shtie në dorë diçka që më duhet. Gjeti punë. I gjeta biletë (makinë). Gjen treg. Gjej forca. Gjej mjetet (fondet) e nevojshme. Gjeti një burrë (një grua) të mirë. bised. E gjeti mundësinë. Gjeti strehë. Kush kërkon, gjen. fj. u. Gjej njëherë bari, pastaj shko e bli dhi. fj. u.","Përcaktoj duke e menduar diçka; arrij përfundimin që kërkohet duke bërë veprime me mend, zgjidh me mend; i bie në të pasi e mendoj. Gjej shumen (përfundimin). Gjej zgjidhjen. Gjej pjesët e një fjale. Gjej rrënjën katrore të një numri. Gjej një gjëegjëzë. Gjeje sa janë (sa bëjnë)! Gjeje kush ma ka thënë!","Zbuloj diçka pas kërkimesh e studimesh të veçanta; bëj një zbulim; shpik. Gjetën naftë (mineral). Gjej një mënyrë (metodë) të re prodhimi. E gjetën burimin e lumit. Gjej të vërtetën.","Zgjedh diçka që përputhet a që shkon me diçka tjetër. I gjej drynit një çelës. I gjej ngjyrën që i përshtatet. Ia ka gjetur si duhet.","Zbuloj rrugën, mjetin, mënyrën a anën për të bërë diçka, për të dalë nga një gjendje ose për të siguruar përkrahjen e dikujt (edhe në një varg njësish frazeologjike). Gjej rrugën. Gjej mënyrën (mjetin). Ia gjeti veglën. Ia gjeti anën (shtegun, vaun). Ia gjeti vjegën (verigën, rrëfanën). Ia gjetën ilaçin (dermanin). Ia gjeti vidhat (burgjitë, burmat) dikujt.","Shkëput një pjesë kohe nga koha e punës a e veprimtarisë së zakonshme për të bërë diçka tjetër a për të shkuar diku. Gjeti pak kohë. Gjej ndonjë ditë dhe eja nga ne! S’gjen dot një minutë edhe për këtë?","E zë në një vend ku ishte, e kap diku; e zë dikë a diçka në një gjendje të caktuar; kap. E gjeta në shtëpi. Lufta e gjeti në fshat. Mirë që të gjeta. Ku të të gjej? E gjeti sëmurë. E gjeti të papërgatitur. E gjeti në befasi. E gjeti derën hapur. E gjeti në gjumë edhe fig. E gjeta shëndoshë e mirë. E gjeti shtëpinë rrëmujë. Mirë ju gjetsha! përshëndetje kur ndahemi e largohemi nga një vend, ku do të kthehemi përsëri. Mirë se ju gjejmë! përshëndetje kur vijmë a hyjmë diku.","Më ndodh një e keqe, më bie në kokë, pësoj (edhe në një varg njësish frazeologjike). E gjeti një e keqe (një fatkeqësi). Ç'më gjeti! Mirë na gjeti! E gjeti belaja. Ku të gjeti edhe ty! Ç'të ka gjetur sot kështu? çfarë ke sot kështu? E gjeti si breshka te nallbani. I gjeti mushka drutë. E gjeti kokën e kandilit.","Shpreh një pikëpamje për diçka, vlerësoj diçka, shfaq një mendim a gjykim për diçka, e quaj. E gjetëm të drejtë (të arsyeshme, të nevojshme, të tepërt, të gabuar). E gjeti me vend. E gjeti të udhës.","Has një qëndrim a një pritje të caktuar; kam. Gjeti miratim. Nuk gjeti kundërshtim. Gjen pengesa (vështirësi). Gjeti një pritje të ngrohtë. Gjeti mbështetje (përkrahje). Gjeti jehonë.","E kam në vetvete si veti ose si aftësi dhe e shfaq, e vë në veprim; i lejoj vetes ta shfaq a ta vë në veprim. Gjen guxim. Gjen forca në vetvete. Ku e gjen ai këtë të drejtë?","Kërkoj diçka për t'u përligjur, zakonisht për diçka të padrejtë a të parregullt; nxjerr. Gjen shkak. Gjen arsyetime.","Ruaj dikë për t'i bërë diçka të keqe, për ta kapur a për t'i zbuluar anën e dobët. I gjeti rastin. I gjeti ditën. Ia gjeti vaun dikujt. I gjeti pikën e dobët.","Ndiej a provoj diçka; bie në një gjendje të caktuar; kam dëshirë, dëshiroj shumë; më pëlqen, më vjen mirë të jetë. Ku ta gjej të vij edhe unë! Ku ta gjej të jetë ashtu! Gjej kënaqësi (gëzim, lumturi, qetësi). Gjeti karar. Gjeti rehat u rehatua. Nuk gjen vend lëviz, nuk rri në një vend.","I shkoj pas shijes a ëndjes dikujt; pajtohem me dikë në mendime e në shije, merrem vesh me dikë, bie në ujdi (edhe në një varg njësish frazeologjike). E gjeti fjalën me dikë. Ia gjeti zemrën. I gjeti midenë. Ia gjeti telat dikujt. I kanë gjetur telat bashkë. I kanë gjetur pipëzat. Kanë gjetur një gjuhë të përbashkët. Kanë gjetur shoku-shokun. Gjeti mendja mendjen. Ka gjetur rrasa vegshin (vorbën). keq. Ka gjetur tenxherja kapakun (u rrokullis tenxherja, gjeti kapakun). keq. Ka gjetur shkopi doçen. keq.","I drejtohem dikujt për të ngritur një dolli së bashku, duke thënë një urim për dikë tjetër. Të kam gjetur me dy dolli. Ti që më ke gjetur mua, të gjettë e mira!","iron. Përdoret për të shprehur mospëlqim e ironi për diçka që është thënë a është bërë pa vend, që nuk e vlen ose për një njeri, tek i cili nuk kemi besim a i cili nuk është i përshtatshëm për atë që kërkohet. Gjete çfarë të thuash! Gjete me se të merresh! Gjete kujt t`ia japësh. Gjeti si të arsyetohet! Gjeti kishë (xhami) ku të falet!","vet. veta III. Përdoret së bashku me emra prejfoljorë dhe formon togje të qëndrueshme, që kanë kuptimin e foljeve, me të cilat lidhen gjymtyrët e dyta të këtyre togjeve nga pikëpamja fjalëformuese. Gjen zbatim zbatohet. Gjen zgjidhje zgjidhet. Gjen përhapje përhapet. Gjen shtrirje shtrihet. Gjen miratim miratohet. Gjen pëlqim pëlqehet. Gjen mbështetje mbështetet. Gjen përkrahje përkrahet. Gjen mishërim mishërohet. Gjen shpëtim shpëton. Gjen strehim strehohet. Gjen vdekjen vdes. * Gjeti belanë me dikë a me diçka u ngatërrua keq me dikë a me diçka, i ndezi me të. Ia gjej fillin shih te FILL,~I","Gjen (bën, ngre, zë) fole shih te FOL/E, ~ JA. I gjeti (i nxori, i qiti) fundin diçkaje shih te FUND,~I. Gjeti hazinenë shih te HAZINE, ~JA. Gjen jetë zbatohet, vihet në jetë. Nuk ia gjen dot këmbët dikujt a diçkaje shih te KËMB/Ë, ~A. E gjeti për kollaj zgjodhi rrugën më të lehtë. E gjeti (e zuri, e kapi) ndër lakra shih te LAK/ËR, ~RA. E gjen rrugën (udhën) për diku nis të hyjë diku, fillon të përhapet, depërton diku. Gjeti talën shih tek TAL/Ë, ~A. Gjeti ustanë (ra në usta) shih tek USTA, ~I. Gjej vend shih te VEND,~I. Gjen vend diçka shih te VEND,~I. Gjeti vendin shih te VEND,~I. Gjen verigë për diçka shih te VERIG/Ë,~A. E gjeti veten libr. shih te VET/E,~JA. Gjejmë një emërues të përbashkët shih tek EMËRUES,~I. E gjeti guri vendin shih te VEND,~I. E gjeti lëmë të shirë shih te SHIRË (i, e). E gjeti lëmin shtruar shih te LËM/Ë,~I. E gjeti lugën në pilaf keq. shih te LUG/Ë, ~A. S'i gjen majë vetes shih te MAJ/Ë,~A. E gjen e mira vetë shih te MIR/Ë,~A (e). Ka gjetur pelena të buta shih te PELEN/Ë,~A. E gjetën (e kapën, e zunë) me presh në dorë (me duar në presh) shih te PRESH, ~I. Gjen (shikon) qimen në vezë (në të bardhën e vezës) shih te VEZ/Ë,~A. E gjeti sofrën shtruar shih te SOF/ËR,~RA. Gjeti shesh (fushë) të lirë dikush shih te LIRË (i, e). S'gjen vend ku të futet (s'i gjen dot vend vetes) shih te VEND,~I. Gjeti vezët e thëllëzës shih te THËLLËZ/Ë~A. S'ka ku të gjejë (të nxjerrë) qime shih te QIM/E,~JA. Gjen shesh e bën përshesh shih te SHESH, ~I."]},{"slug":"ej","term":"EJ","attributes":["pasth.","bised."],"definitions":["shih HEJ. Ej, ti, ku shkon?","shih EH. Eh si po zbukurohen qytetet tona!"]}]</script>
