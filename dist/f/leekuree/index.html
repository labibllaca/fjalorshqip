<script>window.__INITIAL_DATA__ = [{"slug":"leekuree","term":"LËKURË","attributes":["f.","sh."],"definitions":["Shtresë e hollë, që mbështjell trupin e njeriut ose të kafshëve; kjo shtresë që u rripet kafshëve dhe përpunohet për qëllime të ndryshme; lëkurçe. Lëkurë e holl ë(e trashë, e butë, e ashpër). Lëkurë e regjur. Lëkurë artificiale (sintetike). Lëkura e duarve (e fytyrës). Lëkurë deleje (qengji, keci, dhie, lope, kau, viçi, bualli, derri). Lëkurë dhelpre (kunadheje, ujku, tigri). Lëkurë gjarpri. Qimet e lëkurës. Gjëndrat e lëkurës. Sëmundjet e lëkurës. Opinga (këpucë) lëkure. Rrip (çantë, pallto) lëkure. I është plasaritur lëkura. Rrjep lëkurën. Regj (përpunoj) lëkurët. Vishen me lëkurë. E ka shtruar nimin me lëkurë. Shkurti shkurton urët, marsi rrjep lëkurët. fj. u. S'dalin dy lëkurë nga një dele (nga një berr). fj. u. nuk duhet kërkuar nga një njeri më tepër se sa janë mundësitë.","bised. Kacek; shakull. Lëkurë vaji. Djathë lëkure. Bie shi me lëkurë bie shi me rrëshekë.","sh. ~A, ~AT. Lëvorja e trungut a e degëve të drurëve. Lëkurë e re (e vjetër). Lëkurë dushku (ahu, frashri, shelgu). Bori me lëkurë lofate. U zhvoshket lëkura drurëve.","sh. ~A, ~AT. Lëvorja a cipa e disa pemëve, e disa perimeve dhe e farave të disa bimëve. Lëkurë molle (dardhe, ftoi, limoni, shege, fiku). Lëkurë domateje. Lëkurë pjepri. Lëkura e patates. Lëkura e fasules bishtaja pa kokrra. Portokalli me lëkurë të trashë (të hollë).","bised. Zhapë mishi, lapër. I dha të hajë një lëkurë.","bised. edhe fig. Veshja e trupit; pamja e jashtme; mbulesë që fsheh diçka. Ndërroi lëkurën. E zhveshi (e hoqi) lëkurën.","bised. keq. Jeta a qenia e dikujt; trupi, vetvetja; jetesa (edhe në disa njësi frazeologjike). Ruan lëkurën e vet. I dhimbset lëkura. Shpëtoi lëkurën. La lëkurën diku mospërf. a) vdiq, la kokën; b) u mundua shumë, u copëtua, u bë copë për diçka. Vuri lëkurën në rrezik rrezikoi jetën. Ia bëri lëkura e ka fajin vetë. E bluajti (e fshehu) nën lëkurë e mbajti të fshehtë. I ka hequr shumë lëkura ka vuajtur shumë. Çka parë lëkura e tij ç'mundime ka hequr në jetë.","bised. Cipë që zë një lëng në sipërfaqe. Ka zënë uthulla lëkurë.","përd. mb. Shumë i dobët (për mishin). Mishi ishte lëkurë. * E bëri lëkurë thjeshtligj. e rrahu keq, e zhdëpi mirë, e bëri petë. U bë kockë e lëkurë shih te KOCK/Ë, ~A. I ra lëkura, (në punë) u rraskapit së punuari; u dërrmua në punë. Çahet për lëkurë nuk i rrihet, s'e mban vendi; pëlcet nga inati, s'duron dot më. Sa i di lëkura (koka) dikujt shih te DI. Ia dogji lëkurën dikujt ia punoi keq, ia bëri me të pabesë dhe e dëmtoi rëndë, e mori më qafë. I ha lëkura dikujt shih te HA. Humbet nën lëkurë përçm. nuk ndjehet fare, struket diku dhe s'e bën veten të gjallë. Jetojnë në një lëkurë jetojnë njëlloj, në të njëjtat kushte. Ia kripi lëkurën dikujt thjeshtligj. shih te KRIP. Për një lëkurë lepuri për diçka të vogël a të parëndësishme, për hiçgjë. Ç'mban lëkura e tij! fsheh shumë gjëra në vetvete, ka qëllime të këqija, por nuk i shfaq. Nuk ia mban lëkura diçka nuk e duron dot. Nuk e nxë lëkura shak. është shumë i shëndoshë, është ngjallur tepër. Iu regj lëkura shih te REGJEM. Të rrjep (të merr) lëkurën (të rrjep të gjallë) shih te RRJEP. I është trashur lëkura shih tek TRASHEM. Ia vë lëkurën me dikë e krahasoj me një tjetër për të nxjerrë se sa vlen, e mat me një tjetër. Sa para i bën (i vlen) lëkura edhe iron. sa vlen, sa i zoti a sa trim është (zakonisht për dikë që e mbivlerëson vetveten). Është bërë si lëkurë maceje është dobësuar shumë (zakonisht për bagëtitë). I është bërë lëkura rrogoz shih te RROGOZ,~I. I është bërë lëkura (e ka lëkurën) shollë shih te SHOLLË,~A. Të bën të dalësh prej lëkure (nga lëkura) dikush të mërzit a të prek aq shumë sa të bën ta humbësh durimin e gjakftohtësinë. Ia bëfshin lëkurën def! mallk., thjeshtligj. shih te DEF,~I. Ja bëri lëkurën (e bëri) për pesë (për dy) para shih te PARA,~JA. Nuk i bën (nuk i vlen) lëkura një para dikujt shih te PARA,~JA. Ia bëri lëkurën postiqe shih te POSTIQ/E,~JA. I ra gjaku në lëkurë (në sy) shih te GJAK,~U 1. Ha veten nën lëkurë e bren fort diçka përbrenda. Ishte lëkurë për të hequr ishte një punë që duhej bërë patjetër; ishte diçka që nuk durohej. Ka lëkurë bualli (e ka lëkurën si të buallit) e ka lëkurën të trashë. E ka lëkurën të trashë dikush shih tek TRASHË (i, e). Ka lëkurën (qimen) e ujkut shih tek UJK,~U 1. Ia la plumbin në lëkurë (në mish, brenda) i tha diçka që e merakosi, e shqetësoi dhe iku. E pagoi si ujku me lëkurë shih tek UJK,~U 1. E shiti lëkurën shtrenjtë shih te SHES. Shiti rrobat dhe lëkurën shih te SHES. I tregon lëkurën e ujkut dikujt shih tek UJK,~U 1. Iu thaftë lëkura e barkut! mallk. shih te THAHEM. Ujk me lëkurë qengji shih tek UJK,~U 1. Vajti si lëkurë dashi shkoi kot, vajti dëm. I vuri lëkurën e gomarit dikujt e bëri me turp dikë, ia nxiu faqen. E vë veten në lëkurën e dikujt e mendoj a e zë sikur të isha në vend të një tjetri (kur është fjala për të vlerësuar qëndrimin e dikujt). Të ha shalqirin e të rreh me lëkura shih te SHALQI, ~RI. Ka lëkurën e ujkut në kurriz (në shpinë) shih tek UJK,~U 1. Gjalpë (dhjamë, djathë i mirë) në lëkurë të qenit shih te QEN,~I. I mbeti lëkura në bisht të sëpatës dikujt shih te SËPAT/Ë,~A. Ç'i bën dhia, shqemes, shqemja ia bën lëkurës fj. u. shih te SHQEM/E,~JA."]}]</script>
