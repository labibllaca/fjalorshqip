<script>window.__INITIAL_DATA__ = [{"slug":"thembeer","term":"THEMBËR","attributes":["f.","sh."],"definitions":["Pjesa e prapme e shputës së këmbës, që vjen si e rrumbullakët dhe është pak e dalë; pjesa e prapme e çorapit ose e këpucës që mbulon këtë anë të shputës së këmbës pjesa e prapme e këpucës, në anën e poshtme, që është zakonisht me shollë a me gomë të trashë, takë. Thembra e këmbës. Thembra e çorapit. Vrau thembrën. I dolën (iu grisën) thembrat. U janë ngrënë thembrat këpucëve.","Pjesa, anësore e bukës, kore në anë të bukës; pjesa anësore e lakrorit, e bakllavasë etj., anë, qenar. Thembër buke. Thembrat bakllavasë. I ktheu thembrën lakrorit. S'i ha thembrat. Preu një thembër. * Nën thembrën e dikujt i shtypur nga dikush, nën sundimin e tij. I dha një thembër i dha fare pak, i dha diçka fare të vogël sa për të kaluar radhën. Nga koka deri te thembrat i gjithi, kokë e këmbë. I ndershëm gjer në thembër shumë i ndershëm. Ngul thembrat shih te NGUL. E ka në thembër (e ka ngjitur për thembre) e ka shumë afër, i gjendet pranë. Thembra e Akilit libr. pika më e dobët e dikujt, ana në të cilën dikush e ndien veten të pasigurt e të pambrojtur; diçka që kërkon kujdes të veçantë e që është mjaft e vështirë. As në thembër s'ia arrin s'i afrohet fare, as që mund të krahasohet a të matet me të. Ka jetuar me thembrat e botës ka jetuar, në varfëri të madhe, ka bërë një jetë të mjerë. I shkoi (i ra) zemra te thembra a) u frikësua shumë, i humbi guximi; b) ka rënë fare moralisht, s'ka forca e dëshirë të bëjë gjë. Vëri majat (gishtat) nga (ke) thembrat! iron. shko andej nga ke ardhur, mbathja, mbushu! I vunë thembrën (këmbën) në qafë shih te QAF/Ë,~A. Nga vë ballin, vë thembrat (thembrën) tall. shih te BALL/Ë,~I."]}]</script>
