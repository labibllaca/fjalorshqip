<script>window.__INITIAL_DATA__ = [{"slug":"qepem","term":"QEPEM","attributes":["vetv."],"definitions":["Kap me pe, të shkuar në gjilpërë, rrobat e mia aty ku janë grisur o ku kanë nevojë. Qepem vetë. U qepën e u arnuan.","vet. veta III fig. Puthitet fort, bashkohet shtrëngohet fort me diçka tjetër. Iu qepën sytë për gjumë. Iu qep buza e nuk foli më.","fig. Kapem fort pas dikujt a diçkaje e nuk shqitem, mbërthehem pas dikujt a diçkaje me duar e me këmbë. Iu qep pas trupit. U qep pas degës.","fig. Përleshem, kacafytem me dikë. U qep keq me të. U qepën trup me trup.","fig. Ngjitem lart në një vend a send shumë të pjerrët ose pingul me mundim e vështirësi; kacavarem me duar e me thonj për të dalë në majë. Iu qep malit përpjetë. Iu qepën shkëmbit (shpatit, kodrës). Iu qep kullës. Iu qep kamionit.","fig. bised. I vihem pas dikujt e nuk i ndahem, e ndjek hap pas hapi; gjurmoj këmba-këmbës. Iu qep hap pas hapi (këmba-këmbës). Iu qep pas armiqve. Iu qepën qentë.","fig. bised. I kërkoj me ngulm diçka një tjetri e nuk i ndahem, e mërzit gjersa të më mbarojë një punë; i bëhem ferrë.","fig. I vihem me ngulm një pune a diçkaje tjetër, merrem me diçka pa iu ndarë. I është qepur punës. Të rinjtë i janë qepur bujqësisë.","vet. veta III. Më kap një sëmundje a diçka e keqe dhe nuk më ndahet ose më përsëritet herë pas here. I është qepur gripi keq. I janë qepur fatkeqësitë.","Pës. e QEP. * Iu qep me bukë në trastë (në torbë) dikujt shih te BUK/Ë,~A. I është qepur mulla për shpine shih te MULL/Ë,~A. Iu qep (iu ngjit, iu bë) si pullë poste dikujt shih te POST/Ë,~A."]}]</script>
