<script>window.__INITIAL_DATA__ = [{"slug":"rrugee","term":"RRUGË","attributes":["f.","sh."],"definitions":["Brez ose rrip toke i rrahur a i shtruar për të kaluar njerëzit, kafshët dhe mjetet; vija në ajër ose në det, nëpër të cilën kalojnë mjetet e fluturimit a të lundrimit; udhë. Rrugë e ngushtë (e gjerë, e drejtë, e shtrembër, e mirë, e keqe, e shtruar, e asfaltuar, e pashtruar). Rrugë e madhe xhade. Rrugë kryesore (anësore). Rrugë e hekurt hekurudhë. Rrugë malore (pyjore, fushore). Rrugë kombëtare. Rrugë këmbësore (për këmbësorë). Rrugë automobilistike. Rrugë ajrore (detare, lumore). Rrugë e verbët (qorre, pa krye, pa dalje). Rrugë dhish (mushke, qerresh). Rrugë me kalldrëm. Bërryli i rrugës. Kthesa e rrugës. Në krye (në cep, në anë, në buzë, në mes, në fund) të rrugës. Në kryqëzim të rrugëve. Mirëmbajtja e rrugëve. Pastrues i rrugëve. Hapën (çelën) një rrugë. Ndreqin (shtrojnë) rrugët. Shkoj rrugës. Dal në rrugë. Ndalem në rrugë. I lidhën me rrugë të gjitha fshatrat. Rrihet dendur kjo rrugë. Rrugë e pa rrugë në vende të rrahura e të parrahura për të kaluar, nëpër çdo vend nga mund të kalohet. Sipër rrugës. Mbi (nën) rrugë.","Rrip toke në një qendër të banuar, zakonisht i shtruar, me ndërtesa në të dyja anët dhe që mban një emër; tërësia e ndërtesave që ndodhen në të dyja anët e këtij kalimi. Rruga «Naim Frashëri». Banoj në rrugën «Katër dëshmorët». Fëmijët e rrugës sonë.","kryes. sh. Vendi jashtë banesës ose qendrës së punës. Fëmijë rrugësh rrugaç. Vajzë (grua) rrugësh vajzë (grua) e pamoralshme, rrugaçe. Qen rrugësh qen endacak. Fjalë rrugësh fjalë e pahijshme. Bredh (shëtit) rrugëve.","Hapësirë e lirë për të kaluar përpara; vendi, shtegu nga mund të kalojmë e të ecim më tutje; kalim. Rrugë e lirë (e zënë). Rrugë kalimi. I zë (i pres) rrugën dikujt a diçkaje. Mbyllen (zihen) rrugët. Hapet rruga. I lë (i hap, i bëj) rrugë. Çaj rrugën bëj përpara. Largohu (hiqu) nga rruga! Nuk i lëshoj rrugë.","Largesa që duhet të përshkojmë për të shkuar nga një vend në një tjetër; koha që duhet për të shkuar në një vend tjetër. Rrugë e gjatë (e shkurtër, e largët). Bëmë një copë rrugë. E bëri rrugën me biçikletë. Sa mban kjo rrugë? Sa rrugë kemi bërë?","Udhëtimi për të shkuar në një vend tjetër. Rrugë e largët (e gjatë, e shkurtër). Rruga e mërgimit (e kurbetit). Shpenzimet e rrugës. Gjatë rrugës. Në rrugë e sipër. Kostum për rrugë. Nisem për rrugë. Marr (zë, nis) rrugën nis udhëtimin. Bëj rrugë me makinë udhëtoj me makinë. Vihem në rrugë (për rrugë) nis udhëtimin. Kam një rrugë për të bërë. Mbetem në rrugë (në gjysmë të rrugës) nuk përfundoj udhëtimin. Kthej nga rruga. Vij nga rruga. E zuri nata në rrugë. E kemi rrugën bashkë. Rruga e mbarë! urim për t'i shkuar mbarë dikujt një udhëtim i gjatë.","Drejtimi i lëvizjes për të shkuar deri në një vend. Ndërroj (ndryshoj, kthej) rrugën. Gjej rrugën. E di rrugën. Humbas (ngatërroj) rrugën. I heq (i prij) rrugën dikujt përçoj, drejtoj, udhëheq. Më bie rruga për diku.","fig. Drejtimi në të cilin zhvillohet një dukuri, një ngjarje a një proces, ecuria që ndjek zhvillimi i diçkaje; vija që ndjek dikush drejt një qëllimi. Rrugë e drejtë (e shtrembër, e gabuar). Rruga e jetës. Rruga e fitores (e lirisë, e lavdisë, e begatisë, e së vërtetës). Rruga e çlirimit (e kryengritjes, e revolucionit, e luftës). Rruga e zhvillimit (e përparimit). Rruga e socializmit (e kolektivizimit, e industrializimit). Rruga e shpëtimit. E vetmja rrugë. E gjeti rrugën. I tregoi (i mësoi) rrugën. Ndërroi (ktheu) rrugën. Nisi (zuri) një rrugë të mirë. Ndoqi një rrugë të kundërt me ... E vuri në rrugë të drejtë (të mbarë). Mori rrugë të drejtë (të shtrembër, të keqe, të gabuar) puna. Eci në rrugë të njohura (të panjohura, të pashkelura).","fig. Mundësia e lirë për të ecur përpara, për t'u zhvilluar a për të shkuar më tej; mundësia e lirë për të shprehur ndjenjat, mendimet. Rrugë të ndritura. I hapi (i çeli) rrugën. Çau rrugën. I mbylli (i zuri) rrugën. I la rrugë. I preu rrugën. E ka rrugën të lirë (të hapur, të mbyllur, të zënë).","fig. Mënyra, metoda që ndiqet a që duhet ndjekur për të zgjidhur diçka a për të arritur diçka; mënyra e zakonshme a e rregullt e zgjidhjes së çështjeve; zgjidhje. Rruga e zgjidhjes. Me (në) rrugë shtetërore (shoqërore, zyrtare, ligjore, administrative, diplomatike). Me (në) rrugë partie (revolucionare). I jap rrugë diçkaje e zgjidh; vendos se ç'duhet bërë, si duhet vepruar; i jap zgjidhje. U jap rrugë punëve (çështjeve). Mori rrugë puna. Zgjedh rrugën më të përshtatshme. Përdor të gjitha rrugët. Me rrugë të tërthortë.","fig. Mënyra e sjelljes ose e veprimeve të dikujt. Rrugë e mirë (e mbarë). Ecën në rrugë të drejtë vepron ose sillet me çiltëri, siç e kërkon e drejta. Mori rrugë të shtrembër (të keqe, të gabuar). Zuri një rrugë (jo) të mirë. Erdhi në rrugë të drejtë. E solli (e vuri) në rrugë të mbarë e ndihmoi të veprojë a të sillet mirë, siç duhet.","fig. Periudha e përshkuar nga dikush a nga diçka deri në një pikë; ngjarjet, veprimet dhe zhvillimi deri në një kohë. Rrugë e lavdishme. Rruga historike. Populli shqiptar e ka çarë rrugën e historisë me shpatë në dorë. Rruga luftarake e një brigade.","bised. Vajtje e ardhje nga pika e nisjes gjer në pikën e arritjes zakonisht me kafshë barre, me qerre a me automjete për të bartur diçka, udhëtimi deri në një vend e kthimi përsëri në pikën e nisjes. Bëri dy rrugë. Ka mbajtur tri rrugë gëlqere. Bëri një rrugë bosh (pa ngarkesë).","kryes. sh. anat. Gyp i zbrazët, nëpër të cilin kalon ushqimi, gjaku, ajri etj. Rrugët e tretjes. Rrugët e frymëmarrjes.","Qilim i ngushtë e i gjatë ose rrip linoleumi, që shtrohet në korridor ose nëpër shkallë për të shkelur mbi të; udhëz, udhishtë. Rrugë të ngushta (të gjera). Rrugë leshi. Rrugë prej leckash. Shtroj rrugët. Ngre (shkund) rrugët. * Rrugë (udhë) pa krye shih te KRYE,~T. Rruga (udha) e mesme zgjidhje që përpiqet të jetë në mes të dy anëve të kundërta pa anuar as nga njëra as nga tjetra; mënyrë veprimi që synon të shmanget nga të kundërtat ose t'i pajtojë ato. Rrugë (udhë) e verbër (qorre) shih te VERBËR (i,e). I bëj (i lëshoj, i hap) rrugë (udhë) dikujt tërhiqem përpara dikujt a diçkaje, mënjanohem, e lë të lirë të veprojë si të dojë. E bën rrugë (udhë) diçka përhapet më tej; gjen përkrahje, gjen mbështetje. E bëri rrugë (udhë) e bëri zakon, e përsërit diçka aq sa e tepron. Bën (flet, punon) me rrugë (me udhë) shih tek UDH/Ë,~A. Bën (flet, punon) pa rrugë (pa udhë) shih tek UDH/Ë, ~A. Ia bëri pa rrugë ia bëri me të padrejtë, ia bëri me hile. E pruri (e nxori, e çoi) rruga (udha) u ndodh rastësisht në një vend, rastisi diku. Çaj rrugën (udhën, shtigjet) shih te ÇAJ. Doli rrugë (nga rruga) sillet a vepron në mënyrë të shtrembër dhe keq. E gjen rrugën (udhën) për diku shih te GJEJ. S'e kam gjetur në rrugë (në udhë) e kam bërë me mund e me djersë, e kam nxjerrë ose e kam arritur me përpjekje; e kam rritur vetë (për fëmijët). Si ta kërkojë (ta dojë) rruga si të jetë nevoja, si të jetë më mirë. E hodhi (e flaku, e nxori, e la) dikë në rrugë (në mes të rrugës, në rrugë të madhe, në mes të katër rrugëve) a) e dëboi, e përzuri pa pyetur fare për të; b) e flaku në mëshirën e fatit, e la pa asnjë ndihmë e pa përkrahje, e braktisi. S'më hiqet nga rruga (nga udha) më del gjithnjë si pengesë, më pengon, më ngatërron vazhdimisht. Është në rrugë (në udhë) e sipër është në të ardhur e sipër, arrin së shpejti. I dha rrugët (udhët) shih te JAP. I dha rrugë (fill, majë) punës shih te FILL, ~I. I la rrugë (udhë) diçkaje shih te LË. E la në rrugë (në mes të rrugës) nuk e çoi deri në fund, nuk e ndoqi derisa të përfundonte, e la pa e përfunduar, e la përgjysmë. Mori rrugë (udhë) diçka nisi të zhvillohet, të përhapet a të bëjë përpara, erdhi në gjendje që të ecë mbarë; nisi, filloi. Mori rrugët (udhët) a) la shtëpinë dhe u nis për të gjetur vend jetese e pune ku të rastisë; s'dihet se ku ka shkuar, humbi pa gjurmë; b) nuk pa nga shkoi, iku nga sytë këmbët. Mat rrugët endet, bredh pa punë poshtë e përpjetë. Mbeti rrugëve (në mes të rrugës, në rrugë të madhe) dikush a) humbi shtëpinë e gjithçka tjetër, mbeti pa asnjë ndihmë e përkrahje; b) bredh poshtë e përpjetë kot. Mbeti rrugëve (udhëve) dikush iku e s'u kthye më, humbi; vdiq. Mbeti në rrugë (në mes të rrugës) diçka nuk shkoi deri në fund, mbeti pa u përfunduar, mbeti përgjysmë. I mbyll rrugën (derën, portën, shtegun) diçkaje shih te MBYLL. E përpiu rrugën shih te PËRPIJ. I pres rrugën (udhën, shtegun) diçkaje shih te PRES I. Rruga (udha) e mbarë (të qoftë)! iron. shih te MBARË (i,e). Në rrugë (në udhë) e sipër shkarazi e shpejt e shpejt, pa u ndaluar me hollësi në diçka, kalimthi. I tregoi (i rrëfeu) rrugën (udhën) dikujt mospërf. shih tek UDH/Ë,~A. E vuri në rrugë (në udhë, në vijë, në binarë) shih tek UDH/Ë,~A. Erdhi në rrugë (në binarë, në vijë, në udhë) shih tek UDH/Ë,~A. I zuri rrugën (udhën) dikujt shih te ZË. Ka hyrë në rrugë pa krye shih te KRYE,~T. I erdhi në rrugë (në binarë, në hulli, në brazdë) dikujt pranoi kushtet që i shtroi dikush, bën ashtu si do e si i pëlqen dikujt. E dinë (e morën vesh) edhe gurët e rrugës shih te GUR, ~I. I la rrugët me lot shih te LOT,~I. I la kockat rrugëve (udhëve) shih te KOCK/Ë,~A. Rruga vade s’ka fj. u. vjet. nuk i dihet se ç’mund të ndodhë. Shiko rrugën (punën) tënde! shih te SHIKOJ","Një rrugë (udhë) e dy punë thuhet kur mund të zgjidhen njëkohësisht disa punë, kur mund të bëhet njëherazi diçka krahas me një tjetër. E pafsha në rrugë të madhe! mallk. e pafsha keq e mos më keq! Rruga (Udha) e Qumështit astr. shih tek UDH/Ë,~A."]}]</script>
