<script>window.__INITIAL_DATA__ = [{"slug":"futem","term":"FUTEM","attributes":["vetv."],"definitions":["Hyj në një vend të mbyllur, të rrethuar, të mbrojtur a të fshehtë; depërtoj e vendosem diku. U fut me zor (me forcë, fshehurazi). U fut në shtëpi (në dhomë, në klasë, në stadium). U futën në pyll. Futem në shtrat. U futën nën urë (nën strehë). Futem në çadër. U futën lopët në arë (në jonxhë). U futën në qytet (në kështjellë, në fshat, në prapavijat e armikut). U fut në ujërat tokësore (për anijen). U fut në hapësirën ajrore (për aeroplanin).","Zhytem në ujë, kridhem diku në thellësi, hyj; kund. dal. Futem në ujë (në lumë, në det). Futem në baltë (në dëborë). U fut deri në brez.","vet. veta III. Ngulet në tokë a në një trup; hyn në një vrimë a në zbrazëtinë e një sendi; vendoset brenda në diçka; e merr, e nxë. U fut thellë pyka. Iu fut plumbi në trup (në mish). Iu fut një gjemb në këmbë. U fut tapa brenda.","edhe fig. Hyj e zë vend midis njerëzve a sendeve; ndërhyj për dikë a për diçka. U fut ndërmjet tyre. Futet si pykë. U fut ndërmjetës.","fig. Njoh e kuptoj thellë diçka; prek thelbin e një çështjeje; arrij të marr vesh diçka të fshehtë a të panjohur; rrah diçka në mendjen time, zhytem (në mendime etj.). Futem në temë. U fut në hollësira të panevojshme. Futem në botën e brendshme të dikujt.","Hyj në një punë a nis një veprimtari; bëhem anëtar a pjesëmarrës i diçkaje, marr pjesë diku, hyj. Futem në shkollë. U fut në kooperativë.","fig. Bie në një gjendje të caktuar; vij në një gjendje të veçantë; hyj në marrëdhënie të caktuara me dikë; me kap a me pushton diçka, me zë. U fut në borxh mori hua. Iu fut frika (dyshimi). Iu fut lakmia (babëzia). M’u fut të ftohtët kam të ftohtë.","vet. veta III. Ulet, bie, fundoset, thellohet. I janë futur faqet (sytë). I është futur gjoksi brenda.","fig. Tregohem i afrueshëm me dikë, afrohem me njerëzit. Futet shumë në shoqëri.","vet. veta III fig. Hyn thellë në mendjen e dikujt, kuptohet e përvetësohet mirë nga dikush (për një ide, një pikëpamje etj.). I është futur në kokë.","Filloj të marr pjesë në diçka, hyj; vendos e nis të veproj, filloj të merrem me një veprimtari të caktuar, ia hyj një pune, i përvishem diçkaje. U futëm në garë. U fut në valle. Iu futën punës. Iu futën bujqësisë (blegtorisë). U fut në vegjë (në tezgjah) nisi të punonte në vegjë. U fut në govatë nisi të lante rrobat. U fut në magje filloi, të gatuante bukë etj.","Filloj një periudhë të re kohe a moshe; nis një etapë të re zhvillimi. U fut në të pestin (u fut për pesë) ka filluar moshën pesë vjeç. U fut në një epokë (në një fazë) të re.","vet. veta III. Tkurret, mblidhet, zvogëlohet, shkurtohet (për një pëlhurë, një rrobë etj.). Është futur mjaft këmisha (nga të larët).","bised. Kryej një punë a një veprim shpejt e shpejt me një mjet; i heq, i shkoj; filloj të bëj diçka me një mjet a në një mënyrë të caktuar (edhe fig.). Iu fut me drapër e korri shpejt e shpejt. Iu fut me fshesë e fshiu shpejt e shpejt. Iu fut me të mirë filloi ta marrë me të mirë.","bised. Filloj t’i bie a ta qëlloj me diçka; filloj ta godas fort; i hyj. Iu fut me grushte (me shkelma). Iu fut me dru (me kopaçe) filloi ta rrihte.","bised. Filloj të ha a të pi diçka me një frymë a me shumicë; e bëj zakon të ha a të pi diçka vazhdimisht; e bëj diçka me një frymë e me kënaqësi. Iu fut byrekut (mishit të pjekur, gjellës, vezëve, mollëve). I është futur rakisë (duhanit) e s’po e lë dot.","vet. veta III bised. Perëndon. U fut dielli (hëna).","Pës. e FUT. * I futem (i hyj) brenda diçkaje shih te BRENDA. U fut dhëndër u martua e jeton së bashku me prindërit e nuses. I është futur (i ka hyrë) në gjak diçka shih te GJAK,~U I. I është futur (i ka hyrë) me gjithë opinga diçkaje shih tek OPING/Ë,~A. Futet (hyn) si pykë shih te PYK/Ë,~A. Mos u fut (mos hyr) në atë qull! shih te QULL,~I. I futem (i shkoj) në taban diçkaje shih tek TABAN,~I. Futem thellë shih te THELLË. U fut (hyri) në valle shih te VALL/E,~JA","Futet (hidhet) në flakë (në zjarr) shih te FLAK/Ë,~A. U fut (hyri) në bri të kaut (te buallit) shih te BRI,~RI. I futet detit me këmbë shih te KËMB/Ë,~A. I është futur (i ka hyrë) mirë rolit libr. e përvetësoi mirë një detyrë të re; është mësuar me një gjendje të re. Futet pesë para në grosh shih te GROSH,~I. S’gjen vend ku të futet (s’i gjen dot vend vetes) shih te VEND,~I. Nuk lë vrimë pa u futur shih te LË. Ku futet gjilpëra do të futet dhe peri fj.u. shih te PE,~RI."]}]</script>
