<script>window.__INITIAL_DATA__ = [{"slug":"gjurmee","term":"GJURMË","attributes":["f.","sh."],"definitions":["Shenjë që lë shputa e këmbës së njeriut ose putra e kafshëve mbi tokë ose mbi një sipërfaqe. Gjurmë të reja (të vjetra). Gjurmë në dëborë. Gjurma e këmbës. Gjurmë kali (lepuri, ujku, ariu). Lë (mbeten) gjurmë. Prish gjurmët. Ndjek gjurmët. Eci (shkoj) pas gjurmëve. Bie në gjurmët e një kafshe. Humbas (ngatërroj) gjurmët.","Vijë e thelluar, që lë mbi sipërfaqen e diçkaje një send i cili lëviz a rrëshqet. Gjurmët e rrotave (e qerres). Gjurmët e skive. Gjurmët e lotëve. Gjurma e kërmillit. Lë gjurmë nga pas.","Shenjë, njollë etj., që ngel mbi sipërfaqen e diçkaje nga prekja e një lënde ose nga shtypja e një sendi; diçka që ka mbetur në sipërfaqe prej një lënde. Gjurmët e gishtave. Gjurmët e goditjeve. Gjurmët e lagështirës. Gjurmë gjaku.","zakon. sh. Shenja të veçanta karakteristike, të cilat dëshmojnë se diçka që kërkohet ndodhet aty; sasi e vogël e një lënde që gjendet në diçka tjetër. Gjurmët e mineralit. Gjurmët e ujit. Gjurmët e helmit.","zakon. sh. Pasojat e një veprimi, e një dukurie, e një pune etj. Gjurmët e tërmetit (e zjarrit, e luftës). Gjurmët e sëmundjes. Gjurmët e lodhjes. Ai ka lënë gjurmë në këtë fushë.","zakon. sh. Gërmadhat, rrënojat a dëshmi të tjera që kanë mbetur nga diçka që ka qenë në të kaluarën. Gjurmët e qytetit. Gjurmët e lashtësisë. Gjurmët e qytetërimit","zakon. sh. fig. Përshtypje, mbresa. Gjurmë të thella në ndërgjegje. Gjurmë në kujtesë. Lë gjurmë.","zakon. sh. fig. Rruga ose shembulli që duhet ndjekur. Në gjurmët e partizanëve. Në gjurmët e rilindësve. Ndjek gjurmët e tyre. Shkon në gjurmët e tij. Shkel në gjurmët e dikujt ndjek shembullin e dikujt,veproj sipas shembullit të tij, eci në rrugën që ka çelur dikush.","Shputa e çorapit; pjesa e çorapit pa qafën.","krahin. kryes. sh. Gjurmashka. Një palë gjurmë.","vjet. Masë gjatësie sa shputa e këmbës, këmbë. E hedh tetëdhjetë gjurmë. Është dhjetë gjurmë. * Gjurmë për gjurmë pa iu ndarë, këmba-këmbës, hap pas hapi. Bie në gjurmë të dikujt a të diçkaje mësoj se ku ndodhet, e diktoj, i bie në erë. I humbi (i mbuloi, i fshehu) gjurmët i fshehu, i mbuloi të gjitha shenjat, që mund të zbulonin një veprim jo të mirë që ka kryer. Ia humbi gjurmët diçkaje e fshehu a e zhduku diçka që të mos e gjejnë a zbulojnë. Humbas gjurmën nuk jam në gjendje ta ndjek më tej diçka, humbas fillin. I marr gjurmën dikujt a diçkaje mësoj se ku ndodhet, diktoj. E marr në gjurmë dikë e ndjek sipas gjurmëve, e gjurmoj; e ndjek pas. E ndjek (e marr) gjurmën mbrapsht e nis keq një punë a diçka tjetër. U zhduk (humbi) pa lënë gjurmë a) nuk dihet fare se ku gjendet, nuk dihet se ç'është bërë; b) u zhduk pa nam e nishan. Mbledh këmbët për të fshehur gjurmët shih te KËMB/Ë,~A. Unë them «ja ujku!», ti kërkon gjurmët (kur ke ujkun, mos i kërko gjurmët!) fj. u. shih tek UJK,~U."]}]</script>
