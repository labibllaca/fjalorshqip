<script>window.__INITIAL_DATA__ = [{"slug":"zvarree","term":"ZVARRË","attributes":["f.","sh.","krahin."],"definitions":["Lesë ugari, zvarranike. Bëri një zvarrë."]},{"slug":"zvarree","term":"ZVARRË","attributes":["ndajf."],"definitions":["Duke e tërhequr dikë a diçka me forcë për tokë, duke e zvarritur përdhe; rrafsh me tokën, rrëshqanë. E hoqi (e tërhoqi) zvarrë. E mori (e çoi) zvarrë. I hiqte këmbët zvarrë.","fig. Me zor, pa dëshirë, me pahir; me forcë (për njerëzit). I mblodhi njerëzit zvarrë. I mori zvarrë në shtëpi. E mori zvarrë për drekë.","fig. Pa e bërë në kohën e duhur, ngeshëm e me vonesë (për një punë, për një çështje etj.). I la (mbetën) punët zvarrë. E ka marrë zvarrë.","fig. Ngadalë, duke e zvarritur (zhvillimin e diçkaje); duke e zgjatur më shumë se zakonisht (për zërin, për bisedën etj.). E heq zërin zvarrë. I tërheq fjalët zvarrë. Biseda hiqej zvarrë biseda zhvillohej pa gjallëri e me pahir. * Me brekë zvarrë (nëpër këmbë, nëpër shalë) thjeshtligj. tall. shih te BREKË,~T. Hiqet zvarrë (rrëshqanë) a) vepron shumë ngadalë për të kryer diçka; b) mezi mbahet, e kalon jetën me vështirësi. E merr (e tërheq) zvarrë diçka nuk e lë që të ngrejë kokë, e merr nëpër këmbë, e fut përfund. E hoqi (e tërhoqi) këmbën zvarrë (rrëshqanë) ka dëshirë që të bëjnë edhe të tjerët atë që bëri ai, që të ecin edhe të tjerët në gjurmët e tij; i paraprin diçkaje, sjell mbarësi; ndjell diçka të ngjashme me atë që ka bërë ai. E heq shkopin zvarrë shih te SHKOP,~I. I lë litarët zvarrë shih te LITAR,~I. Merr hekurat zvarrë shih te HEKUR,~I."]}]</script>
