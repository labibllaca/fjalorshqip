<script>window.__INITIAL_DATA__ = [{"slug":"kapak","term":"KAPAK","attributes":["m.","sh."],"definitions":["Pjesa e sipërme që mbyll a mbulon një enë, një arkë etj.; mbulesë mbrojtëse prej metali, prej druri etj. Kapak hekuri (druri). Kapaku i pusit. Kapaku i enës (i tenxheres). Kapakë kavanozash.","Fletë dërrase, që u vihet dritareve nga jashtë ose nga brenda për të mbrojtur xhamat ose për të errësuar dhomën; kanat. Kapakët e dritareve. Mbyll kapakët.","Mbulesa e trashë, zakonisht prej kartoni, e një libri, e një fletoreje etj. Kapaku i librit (i bllokut, i fletores).","anat. Pjesa që mbyll dhe mbron një organ të trupit. Kapaku i syrit qepalla. Kapaku i kokës mbulesa eshtore e kafkës në majë të kokës. Kapaku i gjurit kupa e gjurit.","Pllakë guri që përdoret për të shtruar oborrin, lëmin etj. Oborr (lëmë) me kapakë.","Secili nga dy drurët e latuar që vihen në anën e përparme e të prapme të shtratit të qerres.","Secila nga të dy faqet e mitanit, të xhaketës a të palltos, që kopsiten përpara. * Kapak floriri shih te FLORI,~RI. I vuri kapak një çështjeje a një bisede etj. e mbylli; i dha fund, e përfundoi. I ka sahanët pa kapak flet hapur, pa doreza, copë a pa frikë. Më luajti (më iku) kapaku (tepeleku, tabani) i kokës (kafka, tepja e kokës) a) kam dhembje të mëdha në kokë; b) kam shumë shqetësime, telashe e probleme që mezi po i zgjidh, më luajti mendja; c) u çudita shumë, u mahnita. Ka gjetur tenxherja kapakun (u rrokullis tenxherja e gjeti kapakun) keq. shih tek TENXHER/E,~JA. Gënjeshtra e bën vegshin, por nuk ia vë kapakun fj. u. shih te VEGSH,~I. Kapaku i fytit anat. njerithi."]}]</script>
