<script>window.__INITIAL_DATA__ = [{"slug":"rjedh","term":"RJEDH","attributes":["jokal."],"definitions":["kryes. veta III 1. Ecën duke rrëshqitur mbi një sipërfaqe, derdhet teposhtë pareshtur si rrymë ose si curril (për ujin dhe lëngjet e tjera). Rrjedh lumi. Rrjedhin currilat. Rrjedh nën tokë. Rrjedh nëpër gypa (në kanal). Rrjedh gjaku në damarë. Rrjedh ngadalë (i qetë, i turbullt).","Del prej diku dhe derdhet lirisht; derdhet e përhapet diku ose mbush një vend. Rrjedh ujët nga burimi. I rrjedhin lot nga sytë. I rridhte djersa çurg. I rrjedh gjak nga plaga. Rrjedh pika-pika. Rrjedh si krua. I rrjedh curril. Rrjedh lumë (rrëke) derdhet me shumicë.","E lë të kalojë ujin ose një lëng tjetër nëpër vrimat a të çarat, nuk e mban; kullon; pikon. Rrjedh kova (kazani, fuçia, bucela, ena). Rrjedh çatia. I rrjedh gjiri. I rrjedhin hundët. I rrjedhin sytë i nxjerrin sytë lot, i lotojnë sytë.","Kalon nëpër një vend, përshkon (për lumenjtë a përrenjtë). Rrjedh afër një fshati. Rrjedh nëpër një luginë.","fig. Kalon shpejt ose pa u ndier, vjen e shkon pa ndërprerje, rrëshqet (për kohën, për jetën); kalon në një mënyrë të caktuar ose në rrethana të caktuara. Rrjedhin ditët (muajt, vitet). Rrjedh jeta. Rrjedh koha. Rrjedh më ngadalë (me vrull, me shpejtësi). Vitet (shekujt) që rrodhën më pas.","fig. Kalon a shtjellohet pa ndërprerje dhe pa u penguar, ecën varg lirisht (për fjalët, mendimet etj.). Rrjedhin fjalët (mendimet). Rrjedhin ngjarjet vetvetiu. Biseda rridhte qetë-qetë. I rrjedh goja flet lirisht, pa u penguar.","edhe veta I. E kam prejardhjen nga një popull, nga një fis, nga një familje ose nga një mjedis i caktuar. Shqiptarët rrjedhin nga ilirët. Rrjedh nga një familje punëtore (fshatare, e varfër). Rrjedh nga klasa punëtore.","Buron nga diçka tjetër, e ka prejardhjen a vjen prej diçkaje tjetër. Njeriu rrjedh nga majmuni. Qeni rrjedh nga ujku. Shqipja rrjedh nga ilirishtja.","fig. Lind si pasojë e diçkaje, vjen si përfundim i diçkaje, ndodh a lind nga një shkak; buron; del. Rrjedhin pasoja (gabime). Konkurrenca rrjedh nga prona private. Nga ajo rrodhën të gjitha të këqijat. Të mirat që rrjedhin nga puna. Detyrimet që rrjedhin nga marrëveshja. Që këtej rrjedh se ...","Mblidhet me shumicë në një vend nga anë të ndryshme, shkon shpejt si rrymë diku; derdhet si rrymë, si një masë e ngjeshur; rend me vrap, zbret shpejt diku. Rrodhi i gjithë fshati (vendi). Rrodhën grupe-grupe. Rrodhën të gjithë poshtë.","fig. Shkon ose derdhet me shumicë. Fitimet (paratë) rridhnin në xhepat e kapitalistëve.","fig. Ngjet, ndodh; bëhet në një mënyrë të caktuar, zhvillohet. Si rrodhi? Çdo gjë rrodhi ashtu siç ishte parashikuar. Si e qysh kishin rrjedhur punët.","fig. bised., mospërf. Humbas aftësinë për të gjykuar qartë e në mënyrë të shëndoshë, matufosem. Ka rrjedhur në pleqëri. Rrodhi nga trutë (nga mendtë, nga mendja). I kanë rrjedhur trutë është bërë matuf. * Rrodhën (u shpuan) qiejt shih te QIE/LL,~LLI. I rrodhën sytë shih te SY,~RI. Në mos rrjedhtë, pikon shih te PIKON. Ku ka rrjedhur, do të pikojë thuhet për dikë që ka qenë i pasur dhe ka rënë ekonomikisht etj., por vazhdon të gjejë ende disa mjete e mënyra për të pasur disa të ardhura, qoftë edhe të pakta. Më rrjedh (më lëshon, më shkon) goja lëng shih te LËN/G,~GU. Rrodhi (shkoi) gjaku rrëke (lumë) shih te RRËKE,~JA. I rrjedh goja mjaltë shih te MJALT/Ë,~I. Ka rrjedhur (ka kaluar) shumë ujë shih tek UJ/Ë,~I. Më rrjedh (më kullon, më pikon) zemra gjak shih te ZEM/ËR,~RA."]}]</script>
