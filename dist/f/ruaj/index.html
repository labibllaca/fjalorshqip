<script>window.__INITIAL_DATA__ = [{"slug":"ruaj","term":"RUAJ","attributes":["kal."],"definitions":["Kujdesem për një njeri a për një kafshë që ta mbroj nga ndonjë e keqe, mbikëqyr me kujdes; e mbroj nga dikush a diçka që mund ta dëmtojë. Ruaj fëmijët. Ruaj bagëtinë (tufën, kopenë, lopët). Ruaj nga zjarri (nga uji, shiu, era, dëbora, të ftohtët). Ruaj nga armiqtë. Ruaj nga rreziqet.","Rri diku për të mbikëqyrur a për të mbrojtur diçka, që të mos e sulmojnë, të mos e dëmtojnë a të mos e grabitin; bëj rojë; mbroj. Ruaj shtëpinë. Ruaj vreshtin. Ruaj dyqanin (kazermën). Ruaj rrugën. Ruaj kufirin (bregdetin). Frika i ruan vreshtat. fj. u.","Pengoj dikë të dalë, të ikë a të arratiset, duke e mbikëqyrur me shumë kujdes. Ruaj të burgosurin. Ruaj robërit.","E ndihmoj dikë, duke u kujdesur që të mos bëjë diçka të gabuar, të keqe; mbroj. E ruaj nga gabimet. Ruaj kuadrot të pastra. Ruaj të rinjtë nga veset.","Mbaj në gjendje të mirë diçka të vlefshme që të mos dëmtohet; mirëmbaj; kund. prish. Ruaj rrobat (këpucët, librat). Ruaj armën. Ruaj pasurinë e popullit.","Vazhdoj të kem a të mbaj në gjendjen e mëparshme diçka pa e ndryshuar, nuk e lë të prishet, të hiqet, të zhduket, të humbasë; mbaj; kund. humbas. Ruaj largësinë (forcën, fuqinë). Ruaj qetësinë (rregullin). Ruaj gjakftohtësinë. Ruaj miqësinë (dashurinë). Ruaj marrëdhëniet. Ruaj lirinë (pavarësinë). Ruaj traditat. Ruaj shëndetin (bukurinë). Ruaj të drejtën. Ruan koncepte të vjetra. Ruaj vendin e parë.","Mbaj veçan diçka për ta mbrojtur nga dëmtimi a prishja ose për ta përdorur më vonë, kur të duhet; heq, ndaj mënjanë diçka për të kursyer; vloj. Ruaj ushqimet (verën). Ruaj për farë. Ruaj për dimër. Ruaj një pjesë nga rroga. Ruaj në arkën e kursimit. Ruaj një pjesë nga ushqimet.","Vë mënjanë diçka për dikë, e lë për dikë, ia lë dikujt. I ruaj pjesën. Ruaj një vend (në teatër). Ruaj një biletë. Ruaj një libër për dikë. Ruaj për shokët.","fig. Ngul në mendje, në kujtesë diçka; mbaj (në veten time); kund. harroj. Ruaj kujtime të mira. Ruaj amanetin e dikujt. Ruaj në kujtesë (në zemër, në mendje).","Shoh me vërejtje, vështroj; vëzhgoj me vëmendje dikë a diçka që të mos më shpëtojë, nuk ia ndaj sytë; e përgjoj fshehurazi. Ruaj anash (jashtë) Ruaj një të dyshimtë. I ruaj çdo lëvizje. E ruan në sy. E ruan si macja miun. Ruaj të vdekurin kaloj gjithë natën pranë një të vdekuri para se të varroset.","Pres çastin e volitshëm për të bërë diçka; gjej rastin e duhur; përgjoj. Ruaj rastin. Ruaj ditën që të...","E mbaj të fshehtë, nuk e zbuloj; nuk e përhap. Ruaj të fshehtën (sekretin). * Ruan erërat është njeri me dy faqe, kthen nga të fryjë era. E ruan faqen ruhet para të tjerëve të mos i dalë boja, ruan nderin para botës. Ruan lëkurën i largohet rrezikut; shikon vetëm veten e vet, nuk çan kokën për të tjerët. E ruaj (e vë, e fut) në xhep shih te XHEP,~I. E ruan (e mban) si breshka dheun shih te DHE,~U. E ruaj (e dua) si sytë e ballit (si dritën e syve) shih te SY,~RI. E ruan si syrin e vetëm shih te SY,~RI. E ruan si qeni mishin (si qeni mëlçitë) iron. shih te QEN,~I. E ruan si i varfri kaun shih te KA,~U. Ruaje (mbaje) zogun sa e ke në dorë! fj. u. shih te ZOG,~U."]}]</script>
