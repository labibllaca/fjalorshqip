<script>window.__INITIAL_DATA__ = [{"slug":"mbath","term":"MBATH","attributes":["kal."],"definitions":["Vesh në këmbë (këpucët, çorapet etj.); vesh diçka në trup nga mesi e poshtë; i vesh dikujt këpucët etj.; kund. zbath. Mbath këpucët (çizmet, opingat). Mbath pantallonat. E mbathi fëmijën.","I siguroj dikujt për një kohë këpucët, çorapet e veshjet e tjera që vihen në trup nga mesi e poshtë. E ka veshur dhe e ka mbathur i ati.","I vë potkonj një kafshe të barrës. Mbath kalin (pelën, mushkën).","I vë një copë të re (zakonisht në majë) një vegle prej hekuri a prej ndonjë metali tjetër që është ngrënë ose është thyer, arnoj. Mbath shatin (lopatën, kazmën). Mbath sëpatën (sqeparin). Mbath plorin.","E mbush me dhe, me gurë etj. një gropë, një vend të zbrazët, një sipërfaqe etj., i vë një shtresë tjetër e mbuloj; zë me diçka. E mbathin vendin me dhe e me gurë. Lumi e mbathi tokën me baltë. Era e mbathi matin me borë. Rrugën e mbathën me kalldrëm. Mbathën anët e kanalit. I mbathën me shtupë të çarat e vozës.","bujq. Mbush me dhe rrëzën e një bime, mbledh dhe rreth e rrotull saj kur e prashit, përdhej; i mbledh dhe rreth e rrotull rrëzës një druri. Mbath ullinjtë. Mbath misrin (duhanin, patatet).","bujq. I hedh shumë pleh (tokës). E mbathën tokën (arën) me pleh.","bised. Ngop, ngjesh (me bukë a me të ngrëna). E mbathi me të ngrëna.","fig. bised. I vesh dikujt tjetër një faj, një gabim a një të metë, ia ngjit dikujt. U ngjesh; ia hedh dikujt. Ia mbathi fajin tjetrit. I mbathën gjëra që s'i ka bërë. Mos ia mbath atij.","fig. bised. Ngjesh (me të rrahur ose me të shara). E mbathi mirë (me dru).","jokal. (me trajta të shkurtra të bashkuara të përemrit vetor në r. dhanore kallëzore) bised. Largohem menjëherë, nisem me vrap, iki me të katra. Ia mbathi për në shtëpi. Ballistët ia mbathën nga frika. Ia mbathi me të katra (nga sytë këmbët). Mbathja shpejt! * U mbathi (ua dha, u ra) këmbëve shih te KËMB/Ë,~A. Ia mbathi këpucët dikujt mospërf. ia tregoi qejfin, ia tregoi vendin, ia mb
