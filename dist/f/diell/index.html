<script>window.__INITIAL_DATA__ = [{"slug":"diell","term":"DIELL","attributes":["m."],"definitions":["edhe astr. Trupi i zjarrtë qiellor që gjendet në qendër të sistemit tonë planetar dhe që është burim drite e ngrohtësie. Drita (ngrohtësia, energjia) e diellit. Rrezet e diellit. Lindja e diellit. Perëndimi i diellit. Eklipsi i Diellit. Njollat e Diellit. Rrotullimi i Tokës rreth Diellit.","Drita dhe ngrohtësia që lëshon ky trup qiellor; rrezet e këtij trupi qiellor. Diell i ngrohtë (përvëlues, i nxehtë, i fortë, verbues). Dielli pranveror. Dielli i mëngjesit. Diell me dhëmbë diell që shkëlqen, po nuk ngroh; diell dimri. Banja dielli. Çadër (kapelë) dielli. Syze dielli syze me xhama të errët, që përdoren për të mbrojtur sytë nga drita e fortë e diellit. Ditë me diell. Vend me diell. I nxirë nga dielli. Në pikë të diellit në pisk të vapës. E zë (e rreh, i bie) dielli (edhe moh.). E përvëloi (e dogji) dielli. Marr një diell rri në diell që të ngrohem pak. Sot ka diell. Rrushi do diell. Është zbardhur (është tharë) nga dielli. E ka zënë dielli është nxirë në diell. I ra (e goditi) dielli në kokë.","Vend që e rrahin rrezet e këtij trupi qiellor; kund. hije. Nxjerr (qit, vë) në diell. E la në diell. Dal (thahem) në diell. Rrinte (fliste, ngrohej) në diell. U thek në diell.","fig. Diçka që është burim jete e të mirash materiale, burim përparimi, gëzimi e lumturie etj. Dielli i jetës sonë.","edhe sh. ~J, ~JT astr. Trup i madh qiellor që ndodhet në qendër të një sistemi planetar. Diejt fqinjë. Lëvizja e diejve. Në gjithësi ka diej të panumërt.","përd. mb. fig. Shumë i bukur, që i ndriçon fytyra, që ndrit i tëri. Nusja hënë e djali diell. * Nën diell mbi tokë, në botë. T'u bëftë diell! ur. shih te BËHEM. Ra (u fal) dielli perëndoi dielli. Si bryma në diell shih te BRYM/Ë,~A. Doli në diell doli nga gjendja e vështirë ku ndodhej, doli në dritë. E dërgoi prapa diellit (prapa botës) dikë e çoi në një vend të largët nga ku të mos kthehet më, e çoi në humbësirë; e hoqi qafe, e treti. Diell me diell a) gjithë ditën, që nga mëngjesi deri në mbrëmje, që kur lind e deri sa perëndon dielli; b) njëzet e katër orë nga mëngjesi kur lind dielli e deri në mëngjesin tjetër kur lind përsëri. Ditë pa diell diçka jo shumë e mirë, jo aq e këndshme a e dobishme. Ditën për (me) diell në mes të ditës, në sy të të gjithë njerëzve, hapur, sheshit. Në dritën e diellit në mes të ditës, në sy të të gjithëve. Si drita e diellit shih te DRIT/Ë,~A. Ëndrra në diell ëndërrime të kota; gjëra të pabesueshme, gjepura. Gënjeshtra (rrena) në diell gënjeshtra që duken sheshit, gënjeshtra të cilave nuk u beson askush. Diell e paç! ur. të shkoftë mbarë!, paç gjithnjë gëzim e lumturi! Me këmbë nga dielli mospërf. shih te KËMB/Ë,~A. Mbeti në diell mbeti pa gjë, mbeti me gisht në gojë, mbeti pa asnjë mjet jetese, mbeti në mes të katër rrugëve. Ngrihem (zgjohem) me diellin ngrihem (zgjohem) sapo del dielli. Ngrohet në diell (në shullë) shih te NGROHEM. Jemi ngrohur nga (nën) një diell iron. shih te NGROHEM. E nxori në diell dikë e la pa gjë, ia mori të gjitha dhe e la pa asnjë mjet jetese. Si rrezja e diellit shih te RREZ/E,~JA. Në syrin e diellit shih te SY,~RI","Shi e diell shih te SHI,~U. Shkoi (vajti) prapa diellit shkoi shumë larg, shkoi në një vend nga i cili zor se kthehet, shkoi në humbësirë. Prapa diellit të vejë! mallk. mos ia pafsha sytë!, në djall të vejë! Bën shiun e diellin shih te SHI,~U. Nuk bën hije në diell shih te HIJ/E, ~A. Edhe dielli ka njolla libr. shih te NJOLL/Ë,~A. Dielli lind (ngroh) për të gjithë fj. u. secili ka të drejtë të jetojë i lirë, të gjithë kanë të drejtë ta gëzojnë jetën e tyre. Dielli duket (shihet) që në mëngjes (që kor lind) fj. u. duket që në fillim nëse një punë do të shkojë mirë, nëse diçka do të ecë mbarë ose nëse dikush do të jetë i mirë. Ishin kripë në diell shih te KRIP/Ë,~A","Ishte pykë në diell shih te PYK/Ë,~A. Nuk lyhet (nuk fëlliqet) dielli me baltë fj. u. nuk përlyhet dot e vërteta e madhe (kur dikush përpiqet më kot ta bëjë këtë). Mori dhenë dielli ka kohë që ka dalë dielli, u bë vonë. Matet me diellin (me hijen) e mëngjesit (e mbrëmjes) keq. shih te MËNGJES,~I. Ka mbetur rrasë në diell shih te RRAS/Ë,~A. Nuk mbulohet (nuk zihet, nuk fshihet) dielli me shoshë fj. u. nuk fshihet dot një gjë që është fare e qartë, e vërteta nuk mund të mbulohet (kur dikush përpiqet me kot ta bëjë këtë). Nuk zihet (nuk mbulohet) dielli me plisa fj. u. nuk mund të mbulohet një gjë shumë e madhe me diçka të vogël, nuk mund të fshihet diçka që shihet nga të gjithë; nuk mbulohet dielli me shoshë (kur dikush përpiqet më kot ta bëjë këtë). Ndal diellin me fjalë shih te FJAL/Ë, ~A. I ktheu potkonjtë (thundrat, këpucët, këmbët) nga dielli përb. ngordhi; vdiq. Punon me diell e me hënë punon ditë e natë, punon shumë e pa pushim. Ka shkuar (ka vajtur) dielli një hosten ka disa orë që ka dalë dielli, po afron mesdita; u bë vonë. E ka parë diellin para teje shih te SHOH. Mos paftë diell me sy! mallk. a) vdektë!, b) e shkoftë jetën nëpër burgje!; c) mos paste gëzim e lumturi, e shkoftë jetën me hidhërime! Iu shoftë hija e diellit! mallk. shih te SHUHEM. I tregoi se nga lind dielli iron. shih te LIND. Ia tregoi potkonjtë (këpucët) diellit (qiellit) përb. ngordhi; vdiq. Tund këmbët në diell mospërf. rri kot; nuk punon, theket në diell, shullëhet. U zhduk (humbi, shkriu) si vesa në diell (si vesa e mëngjesit) shih te VES/Ë,~A. E kthen barkun nga del dielli përçm. shih te KTHEJ. Lëshon hije pa dalë dielli mospërf. shih te HIJ/E,~A. S'mund të jetë diell për të gjithë (për gjithë botën) dikush nuk mund të jetë i mirë për të gjithë, s'mund t'u bëjë mirë të gjithëve. Ia solli diellin dy gisht (dy kuti) mbi kokë (mbi krye) dikujt e solli në një gjendje shumë të vështirë, ia solli të keqen te dera. Dielli i mëngjesit të ngroh më mirë se i pasdrekes fj. u. duhet të punosh me këmbëngulje që kur je i ri; duhet ta rregullosh jetën që në moshë të re. Lule dielli bot. shih te LUL/E,~JA. Pika (sëmundja) e diellit mjek. shih te PIK/Ë,~A."]}]</script>
