<script>window.__INITIAL_DATA__ = [{"slug":"gozhdee","term":"GOZHDË","attributes":["f.","sh."],"definitions":["Kunj metali me përmasa të ndryshme, që është në njërën anë me majë dhe në anën tjetër me kokë dhe që ngulet për të mbërthyer diçka, për të mbathur kuaj, për të varur në të sende të ndryshme etj. Gozhdë e madhe (e vogël, e trashë, e hollë). Gozhdë e shtrembër (e ndryshkur). Gozhdë trarësh (këpucësh, potkonjsh). Koka (maja) e gozhdës. Fabrika e gozhdëve. Ngul (mbërthej) një gozhdë. Heq (shkul) gozhdën.","fig. Merak i madh që të bren përbrenda; peng. Me ka mbetur gozhdë. Ia la gozhdë në zemër. E ka gozhdë në zemër. * Si gozhda në dërrasë i ngulur mirë, që ka zënë vend përfundimisht. Pilaf me gozhdë diçka që nuk mund të pranohet në asnjë mënyrë; diçka që s'hahet, që s'përtypet. Preu gozhdë (thumba) shih te PRES I. Dimri ha gozhdë (gurë, kashtë) shih te DIM/ËR,~RI. Rri si mbi gozhdë s'rri dot i qetë, i lirshëm e i shkujdesur në një vend, nuk jam i qetë, rri si mbi gjemba. E ka bërë syrin gozhdë nuk preket fare nga vuajtjet e fatkeqësitë e të tjerëve, nuk i vjen aspak keq për të tjerët, është i pamëshirshëm, është shpirtkazmë. I bie po asaj gozhde (po atij avazi, po atij teli) shih te BIE I. E do (e kërkon) si breshka gozhdën shih te BRESHK/Ë, ~A. U mbeti pushka në gozhdë vjet. nuk lindi ndonjë mashkull në shtëpi që të mbante pushkën, mbeti shtëpia pa burra. I ngeci (i ngeli) sharra në gozhdë shih te SHARR/Ë,~A. I zuri (i ndeshi, i hasi, i ra) sharra në gozhdë shih te SHARR/Ë,~A. I pret gjuha (goja) gozhdë (brisk, hekur) shih te PRES I. Ngre këmbën e vë gozhdën shih te KËMB/Ë,~A. Për një gozhdë (thumb) shkoi (humbi) potkoi fj.u. shkoi dëm një gjë e madhe, me vlerë etj. për diçka të vogël, për hiçmosgjë; për një plesht u dogj jorgani. Njëri i bie gozhdës (thumbit), tjetri potkoit secili bën sipas kokës së vet, nuk veprohet në mënyrë të bashkërenduar e të harmonishme, nuk ka mirëkuptim, nuk merren vesh njëri me tjetrin. Në vend që t'i bjerë gozhdës, i bie potkoit nuk qëllon aty ku duhet, godit atje ku nuk duhet. Myka e di sa e fortë është gozhda fj. u. shih te MYK/Ë,~A."]}]</script>
