<script>window.__INITIAL_DATA__ = [{"slug":"peergatit","term":"PËRGATIT","attributes":["kal."],"definitions":["E bëj gati diçka, që të jetë në gjendje të përdoret për një punë a të shfrytëzohet; mbledh, grumbulloj e përpunoj diçka për ta përdorur më vonë a në një kohë të përshtatshme; mbledh gjërat që më duhen e i rregulloj në një vend (në një arkë, valixhe, bohçe, çantë) për t'i marrë me vete; ndreq, rregulloj, bëj gati. Përgatit makinën (motorin, tornon). Përgatit veglat e punës. Përgatit rrobat e dimrit (e verës). Përgatit materialet e nevojshme mbledh në një vend gjërat e nevojshme për një punë. Përgatit zahirenë e dimrit. Përgatit valixhen (plaçkat) për rrugë. Përgatit dhomën e gjumit (shtratin). Përgatit tryezën.","E bëj diçka në një mënyrë të caktuar, përpunoj (duke përzier gjëra të ndryshme etj.); gatuaj. Përgatit gjellën (një pije). Përgatit një bar (një ilaç). Përgatit drekën (darkën).","Bëj a prodhoj diçka të re, krijoj; hartoj. Përgatitën një film të ri. Përgatiti një tekst më të mirë. Përgatitën modele të reja këpucësh (rrobash).","I jap dikujt njohuritë e shprehitë e nevojshme për të kryer një punë, e mësoj; e bëj dikë të aftë për diçka, duke e stërvitur rregullisht. Përgatitën ushtrinë (këmbësorinë). Përgatit punonjës të aftë. Përgatit mësues (inxhinierë, mjekë). I përgatitën për ndeshje (për gara të atletikës, për spartakiadën). E përgatiti për provime.","Ia them dikujt tërthorazi e jo menjëherë një lajm të keq, në mënyrë që të mos tronditet shumë kur ta mësojë plotësisht; e sjell në një gjendje që ta durojë të keqen, që ajo të mos i vijë si e papritur. E përgatiti shpirtërisht. E përgatiti për ta njoftuar për vdekjen e vëllait.","Kam ndër mend të bëj diçka, shestoj; ia hyj një pune për të arritur një qëllim; marr masat e nevojshme për të nisur diçka. Përgatitnin kurthe (plane) të reja. Përgatitin luftën (agresionin). Përgatitën sulmin. Përgatitnin kushtet për një mbledhje (për një marrëveshje) të fshehtë."]}]</script>
