<script>window.__INITIAL_DATA__ = [{"slug":"ccaj","term":"ÇAJ","attributes":["kal."],"definitions":["Ndaj në copa për së gjati duke e goditur me diçka të mprehtë a të fortë ose duke e prerë; i hap plasa të thella; ndaj më dysh. Çaj dru. Çan arra (bajame). Çaj fiqtë (ullinjtë). Çau një pjepër. Çaj një dërrasë. Çan akullin. Çaj me sëpatë (me pyka). I çau kokën me gur. E çau me thikë. Tërmeti i çau muret. E çau (më) dysh (katërsh). E vërteta çan (edhe) gurët. fj. u.","Pres thellë me diçka të mprehtë (për indet e buta të njeriut e të kafshëve); i bëj plasa të thella (për lëkurën); bised. e bëj operacion. Çau dorën. Çau këmbën me një gur. Gëlqerja t'i çan duart. I çau barkun. E çanë e operuan.","Copëtoj duke e shqyer me dhëmbë; mbyt duke e kafshuar thellë me dhembë. I çau dhentë ujku. E çau çakalli. Të çaftë ujku! mallk. Me gojë të lan, me dhëmbë të çan. fj. u. Të çajnë mushkonjat. bised. të thumbojnë keq mushkonjat; ka shumë mushkonja.","Hap diçka të re duke gërmuar ose duke punuar thellë a duke e bërë një punë për herë të parë. Çaj themelet. Çaj një rrugë. Çaj një kanal. Çaj tokën punoj tokën për herë të parë. Çaj qilizmë (ugar). Çaj një rrah. Çaj me parmendë.","edhe fig. Hap shteg përmes një pengese, duke e mënjanuar ose shkatërruar; shkoj përpara ose dal përtej duke mposhtur një qëndresë. Çaj dëborën. Çaj turmën. Çaj rrugën (shtigje të reja). Çaj rrethimin (bllokadën). Çaj frontin. Çaj mbrojtjen e kundërshtarit.","edhe jokal. Kaloj mes për mes, i dal matanë duke i shkuar në mes, kapërcej, përshkoj tejpërtej. Çau fushën. Çau malin (pyllin). Çau detin (ujin). Çan ajrin (qiellin). Treni çan mes për mes fushave.","bised. Përçaj. Kërkon t’i çajë. Mbahuni të mos ju çajnë bota!","jokal. edhe fig. Eci përpara, përparoj me përpjekje, duke kapërcyer ose mënjanuar pengesa e vështirësi; çel rrugën me forcë a me përpjekje. Çan përpara. Çau përmes njerëzve (dëborës). Çau me bërryla. Çan në jetë. Ka çarë me gjoks.","jokal. Iki me shpejtësi, largohem me vrap në një drejtim. Çau malit (përpjetë). Çau fushës (teposhtë). Çau nga fshati (nga pylli). Çau në krye (në ballë). Çau me vrap. Çau e iku (e krisi). Çau si rrufe.","vet. veta III jokal. (përdoret me një trajtë të shkurtër të përemrit vetor në r. dhanore). Më jep një dhembje therëse e të zgjatur, më ther. Më çajnë këmbët. Më çajnë kyçet.","fig. bised. Jam shumë i aftë për të bërë diçka, kam forcë të madhe për një punë. Të çan në matematikë. Ka një traktor që të çan.","fig. bised. Dëfrej me bujë të madhe, e tund, e bëj fora. Do të çajmë në dasmën tënde. E çanë atë natë. Çaje, se të erdhi dita! * Çaj (thyej) akullin libr. shih tek AKULL,~I. Të çan (të jep) në ballë shih te BALL/Ë,~I I. Çan dërrasa (kopalla, dokrra) flet kot, thotë gjepura; merret me punë boshe. Çau (rrahu, kërkoj) dheun (vendin, dynjanë) shih te RRAH. Çan ferrën (dushkun) iku me të katra, ua mbathi këmbëve. Të çan hundët ka një erë të fortë, të shpon hundët. Na çan kokën (kryet, veshët) a) na shqetësoi me një zhurmë të fortë ose të papëlqyeshme që përsëritet, na shurdhoi; b) na mërziti shumë me fjalë ose duke përsëritur shpesh diçka të papëlqyeshme. Nuk çan kokën a) nuk shqetësohet fare për diçka, nuk tregon asnjë kujdes, nuk e prish qejfin; b) nuk e lodh mendjen; c) nuk pyet fare për ato që i thonë të tjerët, për qortimet që i bëjnë etj. Çan llafe flet kot me kot, dërdëllit. çaj rrugën (udhën, shtigjet) eci i pari në një drejtim të ri; krijoj kushtet që dikush a diçka të ecë përpara. Është ta çash katërsh është shumë i shëndoshë, shumë i ngjallur. Çan e ndan përpiqet me ç’të mundet për të arritur diçka, bën çmos. Çau gur e dru shih te GUR,~I. Çante baltërat për të tjerët punonte për të tjerët, derdhte djersë e mundohej për botën. Çan dërrasa pa pykë lodhet e mundohet pa arritur ndonjë përfundim, lodhet kot. E çan (e ndan) qimen më dysh (me katërsh) shih te QIM/E,~JA. S’të jep as gur për të çarë kokën përçm. shih te GUR,~I. Është bërë për ta çarë me sharrë shak. shih te SHARR/Ë,~A. Gjuha çan gurin (çan shkëmbin, pret hekurin) fj,u. shih te GJUH/Ë,~A I."]},{"slug":"ccaj","term":"ÇAJ","attributes":["m."],"definitions":["bot. Shkurre, që rritet në disa vende të ngrohta, me lule të bardha, me gjethe përherë të gjelbra e me erë të këndshme, që thahen e përdoren për të përgatitur një pije të ngrohtë; çaj i zi, çaj Evrope; emërtim për disa lloje të veçanta bimësh barishtore të vendit tone, që përdoren për të përgatitur një pije të ngrohtë. Çaj mali bimë e tillë shumëvjeçare që rritet në malet e vendit tone, me kërcell e me gjethe në ngjyrë argjendi, me lule të verdha e me erë të këndshme. Gjethe çaji. Lule çaji. Një tufë çaj. Kuti me çaj. Mbledh çaj.","Pije e ngrohtë që përgatitet nga këto bimë; sasia e kësaj pijeje që nxë një filxhan a një gotë. Çaj i fortë. Lugë çaji lugë më e vogël se ajo e gjellës. Filxhan çaji. Ibrik çaji. Një gotë (një filxhan) çaj.","edhe sh. ~E, ~ET. Pije e ngrohë që përgatitet duke përvëluar a duke zier gjethet ose lulet e thara të disa bimëve me veti mjekësore. Çaj lule bliri (kamomili, rigoni, dëllinje, gorricash, hithrash).","Pritje para darke, në të cilën të ftuarve u nxjerrin zakonisht një pije të tillë të ngrohtë dhe ëmbëlsira. Dha një çaj. E ftuan për çaj."]}]</script>
