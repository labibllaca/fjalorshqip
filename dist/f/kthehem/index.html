<script>window.__INITIAL_DATA__ = [{"slug":"kthehem","term":"KTHEHEM","attributes":["vetv."],"definitions":["Vij prapë në vendin nga ku jam nisur; vij a paraqitem në vendin ku isha më parë. Kthehem në shtëpi. U kthye në atdhe. Kthehet vonë. Kthehem nga pushimet. Nuk ishte kthyer. Biletë për t'u kthyer.","Ndërroj qëndrimin e trupit duke u rrotulluar prapa ose anash, sillem nga ana tjetër ose në një drejtim tjetër nga ai që kisha; vihem me fytyrë në një drejtim të caktuar. Kthehem në shpinë (përmbys, në krah, në ijë). Kthehem mënjanë (në anën tjetër). Kthehem djathtas (majtas).","Ndryshoj drejtimin e lëvizjes, marr drejtim tjetër, shkoj në drejtim tjetër. Eci drejt, pastaj u kthye djathtas. Rruga kthehej majtas. Lumi kthehet nga jugu.","Ndaloj pak diku, hyj diku kalimthi (kur jam duke shkuar në një vend tjetër). U kthye tek e motra. U kthye në dyqan.","bised. shih KTHEJ","","bised. I drejtohem dikujt me fjalë, i vërsulem a i përgjigjem duke iu kërcënuar. Iu kthye fëmijëve. Iu kthye me të ashpër.","Filloj sërish diçka të lënë përgjysmë, rifilloj të bëj një punë që bëja më parë ose që nuk e kisha përfunduar, i përvishem përsëri një pune për ta çuar deri në fund. Iu kthye punës (shkollës). Iu kthye studimeve. Iu kthye bisedës.","vet. veta III. Shndërrohet në diçka tjetër, bëhet. Kthehet në gaz.","fig. Ndryshoj qëndrim a sjellje, ndërroj idetë a pikëpamjet; jam i paqëndrueshëm në bindjet e mia. U kthye në rrugë të drejtë. Kthehet nga të fryjë era.","vet. veta III (me një trajtë të shkurtër të përemrit vetor në r. dhanore). Vjen përsëri, përtërihet, ringjallet (siguria, besimi, shpresa etj.). Iu kthye besimi (gëzimi i mëparshëm). Iu kthyen shpresat.","Pës. e KTHEJ. * S'kthehet prapa dikush shih te PRAPA. Kthehet (shkon) nga të fryjë era shih tek ER/Ë,~A I. Shkoi (vajti) për lesh e u kthye (doli, erdhi) i qethur fj. u. iron. shih te LESH,~I. Nga lëviz qafa, kthehet koka fj.u. shih te QAF/Ë,~A."]}]</script>
