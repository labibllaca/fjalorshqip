<script>window.__INITIAL_DATA__ = [{"slug":"duroj","term":"DUROJ","attributes":["kal."],"definitions":["edhe jokal. I përballoj dhe i kaloj vështirësitë, dhembjet, shqetësimet, vuajtjet, fatkeqësitë etj. i qetë e gjakftohtë, pa u ankuar e pa u ligështuar; i bëj ballë a i qëndroj një ndikimi, një veprimi ose një ngacmimi të jashtëm; jam në gjendje të mposht një dëshirë, një nevojë, një kërkesë të organizmit që më tundon a më mundon. I duroi dhembjet (vuajtjet, fatkeqësitë). E duroi etjen (urinë). E duron të ftohtët (të nxehtët, vapën). I duroi torturat. Duroi pa ngrënë (pa pirë). S`e duroi dot lodhjen (pagjumësinë). S`e duron dot dritën (pluhurin). Duronte nga e keqja. Duroi disa ditë pa bukë. Duroi gjithë rrugën pa ujë. Duroi shumë. S`duron fare.","jokal. Kam durim, nuk ngutem, nuk rrëmbehem, përmbahem. S`duroi pa folur (pa pyetur).","jokal. Pres dikë a diçka i qetë për një kohë të gjatë; pres me durim. Duro, se do të të vijë radha! Do të durojmë sa të vijë edhe ai.","Pranoj një gjendje të caktuar, mësohem a pajtohem me një gjendje ose me diçka tjetër të papëlqyeshme, të keqe, të rëndë, të mërzitshme etj.; (zakon. me pjesëzën mohuese «s», ore «nuk» dhe me një trajtë të shkurtër të përemrit vetor në r. kallëzore) s`më pëlqen dikush a diçka, më ngjall neveri ose me mërzit, nuk e shoh dot me sy; s'pajtohem me të dhe e luftoj. Si e duron atë gjendje! S`i duron dot çrregullimet (shthurjet). Nuk i duron dot fjalët (shakatë) e rënda. S`e duron turpin. S`e duruan zgjedhën (robërinë). S`e duroj dot atë njeri. S`e durojmë armikun në vatër.","vet. veta III (zakon. me pjesëzën mohuese «s» ose «nuk» dhe me një trajtë të shkurtër të përemrit vetor në r. dhanore). Nuk e pëlqen, nuk e pranon, mezi e tret a nuk e tret dot; më prish a më dëmton, më bie rëndë (për ushqime, për pije etj.). S`ia duron stomaku turshitë. S`ma duron organizmi.","edhe jokal. vet. veta III. U qëndron kushteve a veprimeve të jashtme pa u dëmtuar, pa u prishur, pa humbur vetitë a cilësitë (për sendet, lëndët e
