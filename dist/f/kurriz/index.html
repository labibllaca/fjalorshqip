<script>window.__INITIAL_DATA__ = [{"slug":"kurriz","term":"KURRIZ","attributes":["m."],"definitions":["Pjesa e prapme e trupit të njeriut që nga qafa e supet deri te mesi; pjesa e sipërme e trupit të kafshës gjatë shtyllës kurrizore deri te vithet; shpinë. Me kurriz të drejtë (të kërrusur). Shtrirë në kurriz. Me duar pas kurrizit. Kruaj (fërkoj) kurrizin. Përkul (drejtoj) kurrizin. I ktheu kurrizin. I ra në kurriz. E marr në kurriz.","bised. Shtylla kurrizore. Palca e kurrizit. Rruazat e kurrizit.","Gungë që i del njeriut në shpinë; kjo pjesë e trupit, e kërrusur nga pleqëria, nga një sëmundje etj. Plak me kurriz. Ka kurriz.","Trina e dorës a e këmbës, shpinë; ana e sipërme e hundës së njeriut; kjo pjesë e hundës e dalë dhe e kthyer më shumë se zakonisht. Kurrizi i këmbës. Hundë me kurriz. I ra (e qëlloi) me kurrizin e dorës.","shih SHPIN/Ë,~A","Kurrizi i karriges (i kolltukut).","Pjesa e pasme e një veshjeje të sipërme, që mbulon trupin nga shpatullat e poshtë, shpinë. Kurrizi i trikos (i bluzës). Kurrizi i palltos. Pres kurrizin. Punoj kurrizin me shtiza.","shih SHPIN/Ë,~A","Kurrizi i shkollës. Në kurriz të shtëpisë.","Majë e zgjatur e një mali a vargmali; kreshta e një mali a e një kodre. Kurrizi i Dajtit. Mal me kurriz të gjerë (të ngushtë).","bujq. Pjesa e ngritur e dheut në mes të lehes në arë, që ka trajtën e shpinës së peshkut. E punojnë tokën me kurriz.","fig. shih SHPIN/Ë,~A","I ka hequr mbi kurriz. Bie (rëndon) në kurrizin e tij. E kam unë në kurriz.","me parafjalën në. Në dëm të dikujt a të diçkaje. E bëri në kurriz të të tjerëve. Nuk duhet bërë në kurriz të cilësisë. Sorollatjet shkojnë në kurriz të kohës së punës. * Bark e kurriz shih te BARK,~U. Ra në kurriz qeshi shumë, u shkri së qeshuri, u gajas së qeshuri. I fërkon kurrizin (krahët, shpatullat, shpinën, zverkun) dikujt shih te FËRKOJ. I ha (i kruhet) kurrizi (shpina) dikujt a) e kërkon sherrin vetë; b) bëhet shkaktar vetë që ta qortojnë e ta godasin. I hipi në kurriz (në shpinë) dikujt shih te SHPIN/Ë,~A. E hedh pas (prapa) kurrizit (krahëve, shpinës) diçka shih te KRAH,~U. Iu këput (i ra) kurrizi punoi shumë e u lodh së tepërmi, u këput. Nuk e kërrus (nuk e ul, nuk e përkul) kurrizin (shpinën) edhe poh. shih te KËRRUS. I ktheu (i solli) kurrizin (krahët, shpinën) shih te KTHEJ. Me kurriz (me shpinë) ulur shih tek ULUR. Ia la në kurriz (në shpinë) diçka ia la dikujt ta bëjë vetëm një punë a një detyrë që duhej ta bënin bashkë, ia vari atij. Nuk ia mban kurrizi (shpina) edhe poh. shih te MBAJ. Ia ndreqi (ia rregulloi, ia ujdisi) kurrizin (shpinën, samarin, bërroren) dikujt shih te NDREQ. Rronte në kurriz (në shpinë) të dikujt nuk punonte vetë e rronte me mundin e djersën e dikujt tjetër. Më vajti buka prapa (pas) kurrizit shih te BUK/Ë,~A. Kur të shohë kurrizin (shpatullat, veshët, zverkun, qafën)! shih te SHOH. E shtroi (e uli) kurrizin (qafën) përb. shih te SHTROJ. Ia zbuti kurrizin (shpinën, brinjët) keq. shih te ZBUT. Ia bëri kurrizin qull dikujt shih te QULL,~I. Nuk e ka trastën në kurriz nuk vuan, nuk i ndien vështirësitë, s'ka nevojë të kërkojë gjë. Luan stricë në kurriz të dikujt shih te STRIC/Ë,~A. Mëngë në mes të kurrizit shih te MËNG/Ë,~A. Iu ngjit barku me kurrizin (pas shpine) shih te BARK,~U. Më vajti barku prapa (në kurriz) shih te BARK,~U. Nuk ia ka zënë trari kurrizin dikujt shih tek TRA,~RI. Barkun petë, por kurrizin (shpatullat) drejt shih te SHPATULL,~A. Ia bëri kurrizin (shpinën) më të butë se barkun keq. e rrahu shumë, e zhdëpi në dru. Kthen kurrizin (shpinën, krahët, gëzofin, gunën) aga fryn era shih te KTHEJ. Ka lëkurën e ujkut në kurriz (në shpinë) shih tek UJK,~U. I nguli (i futi) thikën prapa kurrizit (pas shpine) veproi a bëri diçka me pabesi, e tradhtoi dikë, ia punoi me të pabesë. Palca e kurrizit (e shtyllës kurrizore) anat. shih te PALC/Ë,~A. Peshku i kurrizit anat. shtylla kurrizore. Shtylla e kurrizit anat. shtylla kurrizore."]}]</script>
