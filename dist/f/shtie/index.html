<script>window.__INITIAL_DATA__ = [{"slug":"shtie","term":"SHTIE","attributes":["kal."],"definitions":["Hedh në një enë një lëng ose një lëndë tjetër, që është zakonisht si pluhur a në trajtë kokrrizash; i shtoj diçkaje një lëng a një lëndë tjetër; fut, hedh. Shtie ujë (verë, raki, qumësht, çaj) në gotë. I shtiu ujë verës. I shtie vaj (uthull) sallatës. I shtie kripë gjellës. I shtie sheqer qumështit. Nuk i shtie piper. I shtie edhe një gotë. Shtie grurin në thasë (në hambar). Shtie ullinjtë në kosh. Shtie rrushin në voza. I shtie dy filxhanë oriz supës. U shtie pleh luleve. Shtie duhan në çibuk. Gëlqeres i shtiem ujë (rërë).","I jap dikujt për të ngrënë, i hedh ushqim. U shtie fëmijëve të hanë. Shtjerna supën (gjellën). U shtie tagji kuajve. I shtie bar gomarit. U shtie pulave. Shtjeru qeve!","Hedh, fut a vë diçka brenda në një vend të mbyllur ose të rrethuar, në një enë, brenda diçkaje etj.; fut dikë a diçka në një vend; e përfshij brenda diçkaje, e vë a e shtoj diku; kund. nxjerr; vet. veta III e lejon të kalojë diçka, e lë të hyjë. Shtie bukët (tavat, byrekët) në furrë. Shtie plaçkat (rrobat, enët) në dollap. Shtie librat në çantë. Shtie shaminë (duart) në xhep. Shtie krahun në mëngë. I shtie dru sobës. Shtie patatet në dhe. E shtinë në burg. E shtinë në dhe e varrosën. E shtifsha në dhe! mallk. Mikun e shtien në odën e mirë. E shtinë në listë. Shtjere brenda! Shtie këmbët në yzengji. Çatia na shtie shi çatia pikon. Na shtie tym oxhaku.","Vë për të zier (për ushqimet që janë kokrra a kokrriza, për makaronat etj.). Sot kemi shtënë fasule (thjerrëza). Do të shtie ca makarona (ca petë).","Kaloj diçka nëpër diçka tjetër, shkoj, fut, vë. Shtie perin në gjilpërë. Shtie duhanin në varg. I shtie shulin derës. I kishte shtënë krahun. I shtiu stërkëmbësin dikujt. Kush ka nge, shtie rruaza në pe. fj. u.","Lëviz dorën a një gjë tjetër drejt diçkaje, e shpie në një drejtim për të rrokur diçka, e çoj me vrull. Shtiu dorën në kobure. I shtiu thonjtë në fyt.","Vë diçka mënjanë për ta ruajtur për një kohë tjetër, përgatit e ruaj për dimër, vë zahire; grumbulloj a mbledh diçka; fut. Shtie drutë e dimrit. Shtie bukën e re. Shtiu zahire. Shtie ushqim për bagëtinë. Shtie lekë në arkën e kursimit. Shtimë të gjithë nga dhjetë lekë. Kishte shtënë shumë gjë e mall. Ka shtënë shtatëqind ditë-punë sivjet.","E fut dikë në punë, në shkollë etj., e vë të punojë, të mësojë etj. Shtie djalin në shkollë. I shtinin djemtë në zanat. E shtinë në punë (në fabrikë). E shtinë si ndërtues.","Fut, vë; hedh (edhe fig.). E shtie në punë diçka e përdor për diçka. E shtie në qarkullim një mall (një libër, një fjalë të re). E shtie në harresë e lë në harresë, e harroj.","I shtoj diçkaje një pjesë duke e qepur, duke e mbërthyer a duke e ngjitur. I shtie çarçafin jorganit. U shtie gjysma këpucëve. I shtiu një arnë.","edhe fig. E bëj dikë që të ndiejë diçka, i fut diçka në shpirt, e shpie në një gjendje shpirtërore të caktuar (zakonisht jo të mirë); fut, kall (edhe në një varg njësish frazeologjike). I shtiu frikën (tmerrin, lemerinë, datën). Më shtiu krupën (të keqtë). I shtiu ethet. Na shtiu të zezat. I shtiu zilinë. I shtiu besim në shpirt. U shtiu (u hodhi) shpirt u dha guxim. E shtiu në merak (në bela). E shtiu në mendime. E shtiu në ngasje e tundoi. Ka shtënë dashuri ka rënë në dashuri. Më shtinë të besoj se... Mos i shtjer hidhërim vetes! mos u hidhëro!","Vë një njeri të bëjë diçka për mua, fut, kall; i ngarkoj a i besoj dikujt një punë. Shtinin dorëzënë. Shtinë ndërmjetës. Shtinë pleqtë. Shtiu dikë për ta vrarë. Shtinë ustallarët për të bërë shtëpinë.","kryes. jokal. Gjuaj me gurë, me shkop etj.; qëlloj me shkelm, me pëllëmbë etj.; qëlloj me armë, i bie me pushkë. Shtiu me gur (me shkop). Shtinte me shkelma (me pëllëmbë, me grushte). Ajo mushkë shtie (shkelma). Shtie me pushkë (me revole, me çifte, me mitraloz, me mortajë, me top). Shtinin me shigjeta. Shtinin pa pushim. Shtiu nga larg (nga afër). Shtie në erë. Kjo pushkë shtie mirë. Di të shtiesh? Mos shtini! Pse i shtie?","jokal. vet. veta III. Bie diku, godet, gjuan, qëllon (për rrufenë). Rrufeja shtie në pyje. Shtiu afër.","I drejtoj diku (për sytë). Shtinte sytë në të katër anët. Mos i shtjer sytë andej.","Ia ngarkoj dikujt, ia bëj përsipër, ia hedh (fajin etj.). Ia shtinë fajin atij.","edhe jokal. vet. veta III. Pjell para kohe, dështon. Shtiu lopa. Shtinë dhentë (dhitë). Shtiu pela një mëz.","Hedh poshtë, rrëzoj përtokë; vras; vet. veta III nuk i mban kokrrat; i rrëzon gjethet (për pemët e drurët). Kjo mushkë të shtie. Breshri e shtiu fare grurin. E ka shtënë era. I shtiu fiku (molla) kokrrat. I shtiu përdhe. Shpardhi i shtie gjethet në vjeshtën e dytë.","vet. veta III. Lëshon a nxjerr diçka nga vetja. Mani ka shtënë degë të reja. Me shi shtie rrënjë duhani.","jokal. vet. veta III. krahin. Roit, luzmon, lëshon. Shtinë bletët.","Shkrif a shprish lesh. Shtie lesh. Shtie dyshekët (jastëkët).","Përdor fallin për të gjetur diçka (sipas besimeve të kota); përdor shortin a lotarinë për të vendosur ose për të fituar diçka. Shtinin fall. Shtinë short (shkurtën). Shtien çift a tek. Shtinte (në) lotari (me letra).","jokal. kryes. veta III. bised. Ngjan, shëmbëllen, anon, merr. Djali shtie nga e ëma. Këto vende këtej nuk shtien me vendet tona.","Përdoret së bashku me emra, zakonisht prejfoljorë e të paraprirë nga një parafjalë, dhe formon me ta togfjalësha me kuptimin e foljeve që kanë lidhje fjalëformuese me këta emra (edhe në një varg njësish frazeologjike). E shtiu nën kontroll e kontrollon, e zotëron. E shtie në be e vë të betohet, e detyroj të bëjë be, e përbej. * Aq ia shtie (ai) aq është në gjendje të mendojë e të kuptojë, s'kupton më tepër, aq ia pret (mendja). Si ia shtie unë sipas mendimit tim, ashtu si ma pret mendja mua. I shtiu (i kalli) ethet dikujt shih tek ETH/E,~JA","E shtie në amë shih tek AM/Ë,~A 1. Ç'i shtie bar! përb. shih te BAR,~I I. Shtie me bathë tall. shih te BATH/Ë,~A. E shtiu (e vuri, e futi) në bigë dikë shih te BIG/Ë,~A. Shtien brinjët punojnë e lodhen pa masë, u këputen brinjët, u bien kockat. Shtie (fut) cita (fite, fitme, fitila, kalla, kunja, spica) shih te FUT. Shtie çakthi mbi të tjerët shih te ÇAKTHI. Ka shtënë (ka hedhur) dashuri shih te HEDH. S'e shtie (s'e vë, s'e fut, s'e shkruan, s'e ka) në defter dikë a diçka edhe poh. shih te DEFTER, ~I. E shtiu (e futi) në dorë dikë a diçka shih te DOR/Ë,~A","Shtie (qëllon) në hi shih te HI,~RI. I shtiu këmbët e lodhi e e mundoi shumë, e këputi nga këmbët, i ranë këmbët. Shtie keq dikush fut fite. Shtiu (vuri, hodhi) kurorë vjet. shih te KUROR/Ë,~A. E shtie në mendje (në kokë) e ngulit mirë në mendje, e ngul në kokë. Ia shtie (ia fut) në (ndër) mend (në mendje) shih te MEND,~TË. S'e shtie (s'e vë, s'e zë, s'e fut) në numër shih te NUM/ËR,~RI. I shtiu pishat d i k u j t shih te PISH/Ë,~A. E shtiu te pleshtat dikë shih te PLESHT,~I. I shtiu (i hodhi) prangat shih te HEDH. Mos e shtjer në pus! shih te PUS,~I. E shtiu në rreth dikë shih te RRETH,~I. Shtie (hedh, lëshon, zë, ngul) rrënjë shih te RRËNJ/Ë,~A. Ia shtiu (ia vuri) syrin dikujt a diçkaje shih te SY,~RI. Nuk ia shtie sytë nuk e përfill, nuk e begenis. Shtie (hedh, qet) shkelma shih te SHKELM,~I. Shtie shurdhat e bën veshin të shurdhër. Shtie tehri shih tek TEHRI,~A. E shtiu (e futi) në thes (në grackë, në kurth, në tek, në kllapë) dikë a) e mashtroi, e gënjeu; b) e vuri në dorë. E shtie (e vë, e fut) në valle dikë shih te VALL/E,~JA","I shtiu (i futi) mizat (xixat) dikujt shih te FUT. I shtiu (i futi) veremin dikujt shih te FUT. Ia shtiu (ia futi) në vesh diçka shih te VESH, ~I. I shtiu zekthin dikujt e bën të nxitet e të përpiqet për diçka. Shtie zë e kërkon diçka me këmbëngulje, duke bërë të gjitha përpjekjet për ta siguruar. Po i shtie çyrekët të mirë (bukët të mira) po punon mirë, është e shkathët dhe e zonja (zakonisht për nuset). S'kam shtënë gjë në gojë s`kam ngrënë gjë prej gjëje, jam fare esëll. Nuk shtiu (nuk futi) gjë në thes shih te THES,~I. Nuk shtiu (nuk vuri) gjumë në sy shih te VË. Ia shtiu (ia vuri, ia futi) të dyja këmbët në një këpucë (në një opingë) dikujt shih te KËMB/Ë, ~A. Shtie (fut) kokën (kryet) në strajcën e tjetrit shih te STRAJC/Ë,~A. I shtiu (i vuri) krahët derës (murit) shih te KRAH,~U","Ia shtiu (ia futi) pleshtat në vesh dikujt shih te PLESHT,~I. Shtie (fut) rruaza në pe dikush shih te PE,~RI. I kanë shtënë (i kanë hedhur) trutë e gomarit shih te GOMAR,~I. E shtiu (e futi, e vuri) në varr (në dhe) për së gjalli (të gjallë) shih te VARR, ~I. I shtiu (i la) veshët në lesh shih te LESH,~I. Të shtie miza e s'të nxjerr bualli shih te MIZ/Ë,~A. E mori vesh (e kuptoi) ku i shtinte dyfeku shih te DYFEK, ~U. Kur i shtie drutë, hap sytë! fj. u. kur fillon një punë të rëndësishme, duhet të përgatitesh mirë e të kesh shumë kujdes. Mos shtjer kripë në gjellën e botës! fj. u. thuhet kur e këshillojnë dikë që të mos merret me punë që nuk i përkasin, të mos futë hundët në punët e të tjerëve. Po shtive, mizën (milingonën), të iku hambari fj. u një armik i brendshëm, sado i vogël qoftë, mund të të sjellë një dëm shumë të madh."]}]</script>
