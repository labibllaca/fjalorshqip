<script>window.__INITIAL_DATA__ = [{"slug":"iki","term":"IKI","attributes":["jokal."],"definitions":["Largohem nga një vend më këmbë ose me një mjet udhëtimi, lë një vend a drejtohem për në një vend tjetër; marr udhën për diku; largohem, shkoj; nisem; mërgoj. Iku djali në punë (në shkollë, në shtëpi, në Shkodër). Iku në fshat (në qytet, në mal). Do të iki nesër. Iku në mërgim (në dhe të huaj). Iki me makinë (me aeroplan, me vapor). Iku makina (treni). Iki me nxitim. Iku me bisht në shalë. bised. iku i turpëruar. Ikë andej (këtej)! Sapo iku. Ikë e ikë përdoret kryesisht në përrallat popullore për të treguar se të ecurit ka vijuar gjatë.","Largohem fshehurazi e me të shpejtë prej një vendi për të shpëtuar nga ndjekjet, nga ndonjë e keqe etj., arratisem; shpëtoj duke vrapuar, largohem me vrap nga rreziku. Iku nga burgu. Iku nga frika (nga tmerri). Iku fshehurazi (tinëz). Ik shpejt (sa më parë)! Iku me të katra. Krisi (çau) e iku.","I largohem, i shmangem dikujt ose diçkaje, i shpëtoj; largohem përkohësisht ose përgjithmonë nga një njeri, nga një vend, etj.; lë dikë ose diçka, e braktis. Iku nga i ligu. I ikën si vdekjes. I ikën miqtë (blerësit). Iku nga shtëpia (nga shkolla, nga puna, nga burri, nga gruaja). Lojtari u iku mbrojtësve. Mos i ik fjalës!","vet. veta III. Largohet nga një vend, shkon tutje; shpërndahet. Ikën retë. Iku mjegulla. Iku tymi (pluhuri).","vet. veta III. Derdhet, del, rrjedh. Ikën uji me rrëmbim. Më ikën gjak nga goja (nga hunda).","Shkon mënjanë, shtrembërohet, anohet. I kanë ikur supet. I kanë ikur sytë. I ka ikur fustani (xhaketa) mënjanë. Ka ikur muri. Ka ikur barra.","vet. veta III. Del, shkëputet e shkon tutje; më shpëton e bie. Iku rrota në njërën anë e timoni në anën tjetër. I iku tutje kapela. I ikën këpucët (dorezat). I iku topi nga këmbët. Më iku pjata nga duart.","Largohet, zhduket; s’është më, mbaron, merr fund, s’ka më. Iku boja (uji, era e keqe). I iku inati (zemërimi, dëshpërimi, qejfi, frika). Më iku gjumi. Më iku kolla (dhembja, zjarrmia, gripi). Më ikën ethet (të dridhurat). I iku qumështi. Më iku plaga (shenja).","vet. veta III. Mbaron, merr fund; shkon shpejt, kalon, fluturon (për kohën etj.). Iku vapa (të ftohtët). Iku dimri (vera, vjeshta). Iku mbrëmja (nata, dita, muaji, viti). S’ikën koha. Iku ajo kohë. I iku mosha u plak.","vet. veta III. Harxhohet shpejt, mbaron para kohe; shpenzohet, prishet, shkon kot. Iku buka (vaji, sheqeri). Ikën paratë. Iku djersa (mundimi) kot.","Vdes, mbaroj (për njeriun); vet. veta III dobësohet shumë e humbet aftësitë vepruese, nuk punon më, merr fund (për organe e pjesë të trupit të njeriut). Na iku një shok. I iku foshnja (fëmija). Thashë se ika. Iku me të shumtët. bised. vdiq. I iku goja (dora, këmba). Më ikën gjunjët. I ikën sytë (veshët). I iku zëri.","pavet. Nuk mund të largohesh, nuk mund të shkosh; nuk ke dëshirë të largohesh. S’iket këtej. S’i iket nga fshati.","përd. pasth. bised. Ashtu, vërtet, jo more! Ikë more! Ikë, se tallesh! * Më iku (m'u hap) barku shih te BARK,~U. I ka ikur (i ka luajtur) çikriku shih te ÇIKRIK,~U. I kanë ikur dërrasat shik te DËRRAS/Ë,~A. I iku (i shpëtoi) nga dora (nga duart) a) s’mundi të përfitonte nga një rast i mirë, s’e shfrytëzoi dot një mundësi që iu dha etj.; b) humbi kontrollin mbi dikë a mbi diçka, s’e ka më në dorë. I iku nëpër duar a) i vdiq e i shkoi dikush pa e kuptuar, e humbi shpejt e papritur dikë; b) i iku diçka a dikush pa e kuptuar, s’e mbajti dot. Më iku (më shpëtoi) zogu nga dora shih te ZOG,~U. I ikën furkat shih te FURK/Ë,~A. I iku gjaku (nga fytyra) shih te GJAK,~U. I kanë ikur iliqet (disa iliqe) shih tek ILI/K,~KU. Iku (ia mbathi...) me të katra shih te KAT/ËR,~RA (të). I iku (i shkoi) koka shih te KOK/Ë,~A","I iku (i luajti) mendja (e kokës) shih te MENDJ/E,~A. I ikën trutë (e kokës) shih tek TRU,~RI. Më iku (më luajti) kapaku (tabani, tepeleku) i kokës (kafka e kokës, tepja e kokës) shih te KAPAK,~U. Më iku nga sytë shih te SY,~RI. Më iku zemra (shpirti) shih te SHPIRT,~I. Ikën (largohet, r
