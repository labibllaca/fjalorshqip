<script>window.__INITIAL_DATA__ = [{"slug":"thekeer","term":"THEKËR","attributes":["f.","sh.","bot."],"definitions":["Bimë njëvjeçare që mbillet si drithë sidomos në zona malore, me kërcell si të grurit, me kokrra të murrme, të gjata e të holla; kokrrat e këtij drithi, që përdoret për ushqim. Thekër dimri thekër që mbillet në vjeshtë. Thekër vere thekër që mbillet në mars. Kashtë thekre. Bukë thekre. Arë me thekër. Mbjellin thekër. Është rritur si thekra pa bukë është zgjatur shumë. * E futi në thekër dikë e futi në ngatërresa, e futi në të thella, e ngatërroi. Ra në thekër e humbi toruan, u shushat. Ra si pula (si gjeli) në thekër ra në bollëk ushqimesh, ra në të ngrëna të bollshme. Kapardiset (krekoset) si maçoku në thekër shih te MAÇOK,~U. Mbeti (ra) si ujku (si zagari) në thekër shih tek UJK,~U I. Mbolli thekër e i doli grurë dikujt shih te MBJELL. Kur s’ke grurë, e mirë është edhe thekra fj.u. njeriu bën si të ketë, kënaqet me atë që ka; kur s’ke pulën, ha edhe sorrën. Thekra është e gjatë, po gruri hahet fj. u. vlen puna, jo pamja, mos i shih gunën, po punën. Hamë bukën tonë e rrahim thekrën (bëjmë davanë e botës) shih te BUK/Ë,~A. Bri thekre bot. shih te BRI,~RI."]}]</script>
