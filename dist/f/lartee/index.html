<script>window.__INITIAL_DATA__ = [{"slug":"lartee","term":"LARTË","attributes":["mb."],"definitions":["Që gjendet a që ndodh në largësi të madhe nga toka ose nga një sipërfaqe tjetër; që është në hapësirën mbi tokë; që ndodh në lartësi të madhe; kund. i ulët. Re të larta. Shtresat e larta të atmosferës. Fluturim i lartë. Shkreptima të larta. Tavan i lartë. Degë të larta.","Që është i gjatë në drejtimin pingul, që është mbi të tjerët nga gjatësia në drejtimin pingul; që shtrihet shumë lart, që ka lartësi të madhe; i gjatë; kund. i ulët; i shkurtër. Dru (lis) i lartë. Pyll i lartë. Mur (gardh) i lartë. Shtëpi e lartë. Pallate (oxhaqe, kulla) të larta. Katet e larta. Furrë e lartë furrnaltë. Tryezë e lartë. Me shtat (me trup) të lartë. Njeriu më i lartë në batë. Mal i lartë. Me taka të larta. Këpucë të larta këpucë me taka të gjata. Rritet i lartë.","Që është më lart se një rrafsh tjetër ose se sipërfaqja e detit; që ndodhet në male a në krahina malore; që ka mile, malor; kund. i ulët. Vend i lartë. Vende (zona, vise, toka) të larta. Kullota të larta. Liqene (këneta) të larta. Pjesa e lartë e vendit. Tomori është më i lartë se Dajti.","Që del mbi diçka tjetër ose më tepër se zakonisht, i dalë; i ngritur: Me ballë të lartë. Me gjoks të lartë. Me supe të larta.","Që ka forcë, që është në një masë të madhe a në një shkallë të ngritur; që është ose që bëhet në sasi të madhe a në numër të madh; i madh; që është a që ngrihet mbi nivelin mesatar a mbi normën e zakonshme; shumë i ngritur, shumë i mirë; shumë i zhvilluar e i përparuar; kund. i ulët. Temperaturë e lartë. Trysni e lartë. Tension i lartë. elektr. Prodhime (të korra) të larta. Prodhimtari e lartë. Rendiment i lartë. Kosto e lartë. Rroga (paga) të larta. Fitime (çmime) të larta. Ritme të larta. Cilësi e lartë. Teknikë e lartë. Zhvillim i lartë. Kalueshmëri e lartë. Notë e lartë. Mesatare e lartë. Me nivel shkencor (teorik) të lartë. Me kulturë të lartë. Me cilësi të larta morale. Me vetëdije (ndërgjegje) të lartë.
