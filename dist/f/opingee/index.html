<script>window.__INITIAL_DATA__ = [{"slug":"opingee","term":"OPINGË","attributes":["f.","kryes.","sh."],"definitions":["Lloj këpucësh të thjeshta, të bëra me lëkurë gjedhi, të mbledhur anës e të lidhur me retra a me gjalma (përdoreshin kryesisht nga fshatarët); lloj këpucësh të thjeshta krejt prej gome ose me pjesën e sipërme prej lëkure të trashë dhe me pjesën e poshtme prej gome të fortë. Opinga të lopërta. Opinga të sheshta. Opinga lëkure (gome, llastiku). Opinga me retra. Opinga me xhufka lloj opingash pa gjalma, të bëra prej lëkure të cilësisë së mirë, me syprinë zakonisht të kuqe dhe me një xhufkë të zezë në majë për zbukurim. Një palë opinga. Qepi opingat. Lidhi opingat.","fig. vjet. Shtresa e varfër e popullit, vegjëlia (përdorej me përbuzje nga shtresat e pasura). * Me gjithë opinga të tërin, pa lënë asgjë fare. Pa kësulë e pa opinga pa pasur asgjë. Të më marrësh opingat! thjeshtligj. a) po më kape a po më gjete, të më marrësh çdo gjë, të mos më lësh asgjë; b) s'më bën dot gjë, s`ke ç'të më bësh. I teri opingat (këmbët) dikujt përb. shih te TER. I bëhej baltë në opingë dikujt keq. i ngjitej shumë dikujt sa e mërziste, nuk i ndahej fare, i shkonte gjithnjë pas. Iu bë gur në opingë dikujt shih te GUR,~I. I ra guri në opingë shih te GUR,~I. I futi (i hodhi) një gur në opingë (në shollë, në këpucë) dikujt shih te GUR,~I. I ka hyrë (i është futur) me gjithë opinga diçkaje është futur i tëri në një punë, i është kushtuar krejtësisht diçkaje. Ishte me gjysmë opingë ishte shumë i varfër, jetonte në mjerim; ishte me shumë halle. Ishte pa opinga në këmbë ishte shumë i varfër, ishte fare i këputur. Ia dha opingat (këpucët) në dorë mospërf. shih te KEPUC/Ë,~A. T'i merr (t'i nxjerr) opingat nga këmbët shih te KËMB/Ë,~A. E pi rakinë me opingë e pi shumë rakinë, është pijanec i madh. Ia vuri (ia futi, ia shtiu) të dyja këmbët në një opingë (në një këpucë) dikujt shih te KËMB/Ë,~A."]}]</script>
