<script>window.__INITIAL_DATA__ = [{"slug":"shpoj","term":"SHPOJ","attributes":["kal."],"definitions":["Hap një vrimë në një send me diçka që ka majë të mprehtë ose me një mjet të posaçëm. Shpoj llamarinën. Shpoj murin. Shpoj akullin. Shpuan malin. Shpoi veshët për vathë. E shpuan plumbat (shigjetat, heshtat). Shpoj puse për naftë. Shpoj një vrimë. Uji shpon gurin. fj. u. Shpoj tejpërtej. Shpoj me gozhdë (me turjelë, me thikë, me fëndyell, me sondë). Të shpon me brirë.","Kaloj me forcë përmes diçkaje, shkoj tejpërtej, çaj (edhe fig.). E shpuan frontin në dy vende. Oxhakët shpojnë qiellin. Britma (kuja, ulërima) shpoi hapësirën. Aeroplanët shpojnë retë. Projektorët shpojnë errësirën.","I ngul dikujt në lëkurë diçka të mprehtë e me majë; takoj në diçka me majë të mprehtë a më ngulet diçka e tillë në lëkurë; vet. veta III të shkakton në lëkurë një ndijim të ngjashëm me atë kur të prek një send i mprehtë a me majë. Shpoj qetë me hosten. Shpoj kalin me mamuze. Këto çorape të shpojnë. Leshi i dhive të shpon. Shpova dorën (këmbën, gishtin) me gjilpërë (me gjemb).","Hap një vrimë në një plagë që të rrjedhë qelbi. Shpoj plagën (lungën, të thatin). Çibani u bë për të shpuar.","jokal. vet. veta III. Ka majë të mprehtë dhe mund të hapë një vrimë në një send ose të të ngulet në lëkurë. Kjo gjilpërë nuk shpon. Kishte një turjelë që nuk shponte fare.","fig. Vështroj dikë ngultas duke depërtuar në tërë qenien e tij, duke ia hetuar mendimet, ndjenjat, qëllimet. Sytë e tij të shponin tejpërtej. Kishte një vështrim që të shponte.","vet. veta III (me një trajtë të shkurtër të përemrit vetor në r. dhanore). Ndiej një dhembje të vazhdueshme sikur më ngul dikush diçka të mprehtë, më ther, më sëmbon; me ngacmon e më shqetëson fort, më godet një organ të trupit aq sa edhe ky mund të më dhembë a të më djegë. Më shpon në shpatull (në brinjë, në ijë). Më shpon gjuri. Më shpon plaga. Më shpoi hundën (era e rëndë, e keqe a e fortë e diçkaje). Më shpoi veshët (një zhurmë e fortë, e mprehtë).","fi
