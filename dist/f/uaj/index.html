<script>window.__INITIAL_DATA__ = [{"slug":"uaj","term":"UAJ","attributes":["jokal."],"definitions":["Lëviz vazhdimisht, hidhem e bredh andej-këtej në një shesh a në një vend tjetër për t'u argëtuar. Fëmijët luajnë në oborr. Luajtën gjithë ditën.","edhe kal. E shkoj kohën e lirë bashkë me të tjerë duke u marrë me diçka që më argëton, më jep kënaqësi e më çlodh; marr pjesë në një ndeshje sportive. Luan kukullash (guraçokthi, tresh, litarthi). Luante me macen (me këlyshin). Luanin letrash (me letra). Luaj shah (tavëll, domino). Luaj futboll (volejboll, ping-pong). Luajtën bukur (keq).","edhe kal. Mishëroj në skenë një rol të caktuar nga një vepër dramatike, interpretoj; marr pjesë në një shfaqje me një rol; heq valle. Luan rolin e punëtorit (rolin kryesor). Luan në film (në teatër, në një film me ngjyra). Luan bukur (me mjeshtëri). Luajtën një valle popullore.","edhe kal. I bie një vegle muzikore për të dhënë një melodi etj.; këndoj një këngë a një pjesë muzikore. Luajti tri këngë. Luan në piano (në violinë, në fizarmonikë). Orkestra luajti bukur.","E trajtoj me mospërfillje dikë a diçka, e marr me të qeshur, nuk e marr me gjithë mend; e quaj a e bëj si lojë; qesëndis, tallem me dikë a me diçka. Mos luaj me mua! mos u tall! Luan me fjalë. Mos luaj me njerëzit! Luan me jetën (me të ardhmen, me fatin) e dikujt. Luan me zjarrin.","bised. Prishem nga mendtë, çmendem. Paska luajtur fare.","edhe kal. bised. shih LËVIZ 1-8. E luajti më majtas (më djathtas, më përpara, më pas). S`ka luajtur fare nga fshati (nga shtëpia, së andejmi, që andej). Luaj buzët. Luan veshët. I luan një dhëmb. Luaj çelësin (rrotën e një mekanizmi). Fletët (gjethet) luajnë lehtë. Luajti toka nga tërmeti. Duhet të luajë edhe vetë. Po s’luajte, s’ia del dot. Nuk luajnë çmimet. S`ka luajtur koha (temperatura). Nuk luan nga fjala. Muri luan, burri s’luan. fj. u.","edhe kal., edhe fig. bised. E lëviz më me vrull diçka për ta mbaruar më shpejt një punë, një veprim etj., i jap; vet. veta III bëhet a ecën me gjallëri e me vrull, vlon. Luaje kazmën! puno më shpejt!, jepi kazmës! Luaji duart! puno më shpejt! Luaji këmbët ec më shpejt! Luaji dhëmbët! ha më shpejt! Luan puna vlon puna. Luan lopata vlon puna me lopatë. Luante druri (dajaku) vlonte druri. Kush luan këmbët, luan edhe dhëmbët. fj. u.","kal. bised. Marr një pjesë nga një send, vë dorë në të, e prek, e cenoj, e ndryshoj; ngacmoj, ngas dikë. Mos i luani këto mollë! S'e ka luajtur gjellën. Mos e luaj fëmijën! mos e ngacmo! S`e ka luajtur njeri, ashtu si qe është. S`ka luajtur asgjë në tekstin e mëparshëm. * Luan arushë me dikë keq. shih tek ARUSH/Ë, ~A. Luan (dredh, përdredh, lëviz) bishtin keq. shih te BISHT,~I. I luan (i tund) bishtin dikujt keq. shih te BISHT,~I. Luaj buzët flas; flas ngadalë e pa u ndier shumë. Luaj cicmic shih te CICMIC,~I. Luaj cingël me dikë shih te CING/ËL,~LI. Luaj cingëlthi me dikë shih te CINGËLTHI. Luan (tund) derën mospërf. shih te DER/Ë,~A. E luan gishtin (e pushkës) a) është i zoti e i shkathët; b) është trim i madh. E luan gishtin e shëllirës (e lëngut) dikush a) është i zoti e i shkathët për të bërë diçka, e luan mirë pjesën; b) është trim i madh. E ka luajtur gishtin dikush ka marrë pjesë në luftë; ka luftuar a ka qëlluar me pushkë. E luan nëpër gishta një lëndë shih te GISHT,~I. Luan (lëvizë) gurët përpiqet shumë, bën ç'është e mundur, përdor të gjitha mjetet e mënyrat për t'ia dalë mbanë një pune; përdor mjete e mënyra jo të rregullta për qëllime e interesa vetjake. Luaj (hedh, përdor) gurin (letrën, zarin) e fundit shih te FUNDIT (i, e). S'luajti (asnjë) këmbë s'luajti fare nga vendi ku ishte, nuk bëri asnjë hap përpara a prapa, qëndroi në vend. Luan lojën (lodrën) e dikujt vepron sipas udhëzimeve të dikujt, vepron në interes të tij, bën punën e tij. E luajti në litar dikë shih te LITAR,~I. E luan në tel dikë shih tek TEL,~I. Luajnë mbyllasyzash shih te MBYLLASYZASH. Luan mendsh për diçka a për dikë e do shumë, i pëlqen jashtëzakonisht. Luajti mendsh (nga mendtë, nga fiqiri) a çmend, u marros, shkalloi nga mendtë. Luajti nga kondaku shih te KONDAK,~U. I luajti (i iku, i kapërceu) mendja (e kokës) shih te MENDJ/E, ~A. I ka luajtur (i ka ikur) çikriku shih te ÇIKRIK,~U. I kanë luajtur (i janë liruar) vidhat (burgjitë, burmat) dikujt shih te VIDH/Ë,~A. Më luajti (më iku) kapaku (tepeleku, tabani) i kokës (kafka, tepja e kokës) shih te KAPAK,~U. E luan pjesën dikush mospërf. vepron me shkathtësi e me zgjuarsi sipas gjendjes, di t'u përshtatet rrethanave të çastit, bën ashtu si e do puna. Nuk luaj (nuk ndryshoj) asnjë presje shih te PRESJ/E,~A II. Nuk i luan (nuk i lëviz, nuk i dridhet) qerpiku (qepalla, syri, bebja e syrit) shih te SY,~RI. Luan rolin e dikujt shtiret si dikush tjetër; sillet ndryshe nga ç'është në të vërtetë për të arritur qëllime të caktuara. I luajti një rreng dikujt i ngriti një grackë; ia punoi keq, e mashtroi. Luan teatër me dikë tallet, qesëndis me dikë. I luan telat shih tek TEL,~I. S'e luan (s'e tund) (as) topi shih tek TOP,~I. Luan urët a) e nxit një punë që të marrë vrull, e bën diçka që të ecë, e shpon; b) keq. nxit dy vetë kundër njëri-tjetrit, ndez sherrin. Luaj vendit! shih te VEND, ~I. Më luan (më lëviz) zemra shih te LËVIZ. Diç (diçka) luan këtu (në këtë mes)! ka diçka të fshehtë, jo të çiltër e jo të qartë (një hile, një rreng etj.), nuk është plotësisht e pastër ose nuk është ashtu si duket kjo punë, lëvrin diçka. E bëri të luajë (të kërcejë, të hedhë valle) në tepsi shih tek TEPSI,~A. S'lë gur pa luajtur (pa kthyer, pa trazuar) shih te LË. Nuk luan as gishtin e dorës (e këmbës) nuk bën asgjë, nuk bën asnjë punë a veprim; nuk lëviz; nuk shqetësohet fare, nuk bëhet merak. E luan (e sjellë) në majë të gishtit (të gishtave) dikë shih te GISHT,~I. Sa t'i luajë këmba e dora shih te KËMB/Ë,~A. Luante qeni i kallajxhiut shih te KALLAJXHI,~U. Luan si qeni me leckë me dikë shih te QEN,~I. Luan stricë në kurriz të dikujt shih te STRIC/Ë,~A. I luan (i lëviz, i shket, i rrëshqet, i dridhet) toka (trualli) nën këmbë shih te DRIDHEM."]}]</script>
