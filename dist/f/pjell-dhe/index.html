<script>window.__INITIAL_DATA__ = [{"slug":"pjell-dhe","term":"PJELL dhe","attributes":["kal.","jokal."],"definitions":["Bën të voglin e saj të gjallë, kur ai ka arritur zhvillimin e plotë si qenie frymore (për kafshët gjitare). Polli lopa viç. Polli dhia një kec. Dosa polli tetë gica. Kanë pjellë delet. Polli para kohe. Mushka nuk pjell. Është shterpë, s'pjell.","bised. Bën fëmijë, lind (për gratë). Polli djalë (çupë).","Bën vezë (për shpendët dhe zogjtë). Pjell çdo ditë. E polli vezën.","bised. Lidh kokrra pema, bën fryt. Kanë pjellë shumë fiqtë sivjet. Paska pjellë kokrra lajthia.","fig. kryes. keq. Bëhet shkak për lidhjen e diçkaje, zakonisht jo të mirë; shpik; sajon. Prodhimi i vogël pjell kapitalizmin. Hiqen sikur punojnë, duke pjellë vendime. * Më polli (më ndezi) belaja (groshi) me dikë ndesh në vështirësi të paparashikuara në marrëdhëniet me dikë, ndodhem ngushtë, më ndez me të. Më polli djalli (dreqi) më dolën telashe e vështirësi të paparashikuara, më dolën ngatërresa të mëdha; më gjeti belaja, më ndezi. I pjell edhe kau (mushka) dikujt shih te KA,~U. I pjell edhe këndesi (kokoshi) dikujt shih te KËNDES,~I. I pjell (edhe) viçi atij shih te VIÇ,~I. I ka pjellë lopa dikujt është në gjendje të mirë, s'i mungon asgjë. I pjell mendja dikujt a) është i zoti për të shpikur dhe për të krijuar gjëra të reja; b) keq. sajon gjëra të paqena, trillon. Më polli sherri me dikë shih te SHERR,~I. Kur të pjellë mushka iron. shih te MUSHK/Ë,~A. E di ku pjell pula shih te PUL/Ë,~A. I erdhi veza për të pjellë thjeshtligj. shih te VEZ/Ë,~A. Nuk mbarset mushka të pjellë mëz fj. u. shih te MUSHK/Ë,~A. U mbars mali e polli një mi fj. u. shih te MAL,~I. Ç’pjell macja (ç'len prej maces), gjuan minj fj. u. keq. shih te MAC/E, ~JA."]}]</script>
