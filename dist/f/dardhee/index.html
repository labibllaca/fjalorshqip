<script>window.__INITIAL_DATA__ = [{"slug":"dardhee","term":"DARDHË","attributes":["f.","sh."],"definitions":["Dru frutor me gjethe gjatoshe e të ndritshme e me lule të bardha, që bën kokrra të tulta e të ëmbla, të zgjatura nga bishti e zakonisht me ngjyrë të verdhë kur piqen; kokrra e kësaj peme. Dardhë e butë. Dardhë e egër gorricë. Dardhë bishtje dardhë me bisht të zgjatur. Dardhë bulbe. Dardhë elbje dardhë që piqet në një kohë me elbin. Dardhë brumje dardhë që kur piqet, bëhet e butë si brumë. Dardhë dimërore (dimërake) dardhë që piqet vonë, nga fundi i nëntorit ose që lihet për t'u ndulkur në dimër. Dardhë gurje dardhë me tul të fortë. Dardhë mbytje. Një kokërr dardhë.","Send në formë të zgjatur nga bishti, që i ngjan frytit të këtij druri. Dardhë gome me ujë. Dardhë prej kauçuku. * Ka rënë në dardhë dikush ka rënë ngushtë, është zënë ngushtë, është në hall. I doli dardhë diçka nuk i doli mirë një punë, nuk i doli ashtu siç e parashikonte, i doli më e vështirë nga ç'mendonte; nuk i eci. Do t'i dalin dardhat dikujt do t'i dalin në shesh dallaveret që ka bërë, do t'i dalin të palarat. Do ta haje dardhën dikush shih te HA. Është rrëzuar (një herë) nga dardha dikush e ka pësuar një herë dhe ka vënë mend, është qen i rrahur; ka përvojë nga jeta, është i rrahur me jetën. Dardha në shënëndre gjepura, pallavra, punë boshe. S`bëjnë dardhat në shënëndre është e pamundur të bëhet a të ndodhë diçka, nuk ka mundësi të ngjasë; çdo punë do kohën e vet dhe kushtet e nevojshme. Kërkon dardha (thana, thanëza, rrush) në shënëndre (në dimër) kërkon të pamundurën, kërkon qiqra në hell. E shpunë (e çuan) dardhë u zunë njëri me tjetrin, bënë fjalë, u grindën; i keqësuan, i ashpërsuan marrëdhëniet. Dardha nën dardhë bie një njeri do t'u ngjajë pa tjetër të parëve të tij, vetitë e cilësitë e prindit do të shfaqen edhe te fëmijët. Kërkon dardha nga boriga shih te BORIG/Ë, ~A. Dardha e ka bishtin prapa fj. u. çdo punë, që mund të duket e lehtë e pa telashe, ka edhe pasoja të paparashikuara (zakonisht kur pasojat janë jo të mira). Është ende në fund të dardhës është ende prapa, është ende në bisht. Ai është në rrëzë të dardhës është pranë të mirave e përfiton prej tyre, është si veshka në mes të dhjamit. Sillet kot rreth (rreth e qark) dardhës dikush i vjen rrotull më kot dikujt me shpresë se do ta ndihmojë; i hyn kot një pune e shpreson më kot se do të ketë përfitim prej saj. Kush rri nën dardhë, i ha kokrrat fj. u. a) ai që bën punën, merr edhe shpërblimin; ai që përpiqet për diçka edhe fiton prej saj; b) edhe iron. kush rri pranë një njeriu që ka pushtet, pasuri, dituri etj. përfiton më tepër prej tij nga ata që janë larg. Nuk i hipën dot dardhës e i bie fikut fj. u. s'ka ç'i bën gomarit e i bie samarit. Pemën, kur s'pjell, e presin se i bën hije dardhës fj. u. shih te PEM/Ë,~A. Shushunja e dardhës zool. shih te SHUSHUNJ/Ë,~A."]}]</script>
