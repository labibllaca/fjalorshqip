<script>window.__INITIAL_DATA__ = [{"slug":"flakee","term":"FLAKË","attributes":["f.","sh."],"definitions":["Zjarr me dritë, që ngrihet lart valë-valë nga diçka që digjet; valë gazi ose avulli, e cila del nga disa lëndë që digjen dhe jep dritë e nxehtësi. Flakë e kuqe (e verdhë, e kaltër). Flakë verbuese. Flaka e zjarrit (e llambës). Flake alkooli. Flaka e mitralozit. Gjuhët e flakës. Bën (nxjerr, lëshon) flakë. Mori flakë u ndez menjëherë. Shuaj flakën.","fig. Shkëlqim; diçka që shkëlqen. Flaka e syve.","fig. Vrull, hov; ndjenjë e fuqishme, zjarr. Flaka e revolucionit (e kryengritjes). Flakët e luftës klasore. Flaka e atdhedashurisë. Flaka e miqësisë (e dashurisë). Flaka e zemërimit.","përd. mb. fig. Shumë i ndritshëm, që shkëlqen nga në është fare i ri a ngaqë ka ngjyra të ndezura (për një rrobë, për një send prej metali etj.); fare i ri. E kishte fustanin flakë. Me pushkët flakë.","përd. mb. fig. Që shkëlqen si zjarri, që shpreh një ndjenjë të zjarrtë; i zjarrtë. Me sytë e saj flakë.","përd. ndajf. Shumë, fare (zakonisht me mbiemrat i kuq, i ri). Flakë i kuq. E kuqe flakë. E re flakë (për një rrobë etj.).","përd. ndajf. Krejt, tërësisht; menjëherë. E mori flakë. * Flakë e flakë gjithandej, krejt, tërësisht. Flakë për (me) flakë aty për aty, në çast, menjëherë. I ka rënë flaka (zjarri, flama) diçkaje shih te BIE I. I doli flaka diçkajey a) u shkatërrua, mbaroi; b) doli në shesh, u zbulua; i doli tymi. Në flakë të agzotit shih tek AGZOT,~ I. Flakë (zjarr) kashte shih te KASHTË, ~A. Në flakë të pushkës (të dyfekut) me shpejtësi shumë të madhe, shumë shpejt; menjëherë, në çast. I futi flakën (zjarrin) shih te FUT. Hidhet (futet) në flake (në zjarr) bën diçka, Vepron pa përfillur fare rrezikun e madh. I dha flakë (zjarr) diçkaje shih te JAP. Merr flakë (shpejt) dikush inatoset menjëherë; zemërohet shumë; ndizet menjëherë. Merr flakë (zjarr) diçka merr hov e zhvillohet shpejt, arrin kulmin. I vuri flakën (zjarrin, fitilin, pishën) diçkaje shih te PISH/Ë, ~A, U bë flakë
