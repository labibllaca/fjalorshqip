<script>window.__INITIAL_DATA__ = [{"slug":"thelee","term":"THELË","attributes":["f.","sh."],"definitions":["Copë e vogël mishi, pjepri etj., zakonisht e prerë nga e tëra ose nga një pjesë më e madhe. Thelë e madhe (e vogël). Thelë mishi (peshku). Thelë shalqiri (pjepri molle). Thelë djathi. E bëri thela. E preu në thela.","Secila nga pjesët që përbëjnë kokrrën e disa fryteve e që zakonisht mund të ndahen njëra nga tjetra. Thelë portokalli (mandarine).","E çarë a plasaritje zakonisht në lëkurë, që është bërë me të prerë ose për ndonjë shkak tjetër. I është bërë një thelë në këmbë. I janë bërë duart thela.","fig. Pjesë nga një pasuri, nga një fitim etj., që e merr dikush. Mori thelën më të madhe. * Drejt e në thela bised. a) do menjëherë t'i plotësohen kërkesat më të mëdha kërkon menjëherë gjënë më të mirë e më me vlerë; b) drejtpërdrejt, jo rrotull e rrotull. Thelë me bisht e mirë mbi të mirën; e mirë nga s'e pret. U bënë thelë e copë u vranë e u prenë. Mbeti (katandisi) kokoshi (kaposhi) një thelë mbeti shumë më pak nga ç’ishte, mbeti fare pak u zvogëlua shumë diçka. Nuk u është puqur lëngu me thelë shih te LËNG,~U. Çon një pelë e ha një thelë shih te PEL/Ë,~A. Të jep një thel e të merr (të rrëmben) një pelë keq. të jep pak për të të marrë shumë; të jep kusinë e të merr shtëpinë. Lëre lëngun e hyr në thela! iron. shih. te LËNG,~U. Thela e madhe të ngec në fyt. fj. u. kush lakmon shumë, e pëson."]}]</script>
