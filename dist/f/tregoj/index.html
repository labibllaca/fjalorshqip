<script>window.__INITIAL_DATA__ = [{"slug":"tregoj","term":"TREGOJ","attributes":["kal."],"definitions":["Ia nxjerr përpara një gjë dikujt për ta parë, për t'u njohur me të a për të gjykuar mbi të; bëj të duket, zbuloj që të shihet, dëftej. I tregoi rrobat. I tregoi librat. I tregoi prodhimet. I tregoj punën. I tregoi dhëmbët (duart).","I shpjegoj dikujt, me fjalë ose ia shënoj me lëvizje të dorës diçka që dëshiron ta dijë a ta mësojë; e drejtoj për atje ku duhet, i kallëzoj vendin ku ndodhet diçka etj., i dëftej. I tregoj adresën e shtëpisë. I tregoi rrugën (ndërmarrjen, institutin). Ia tregoi në hartë.","Them me fjalë një ndodhi një histori etj., kallëzoj me gojë; rrëfej. Tregoj një përrallë (një histori, një ngjarje). E tregoi gjatë e gjerë (fije për pe, me hollësi). Tregon shumë bukur. S'di të tregojë.","I them dikujt një të vërtetë që ai nuk e di; i kallëzoj diçka, zakonisht të fshehtë, ose që ai nuk e di; rrëfej. I tregoi emrin. I tregoi të drejtën (të vërtetën). I tregoi të fshehtat. Ia tregoi së shoqes. I tregoi hallin. I tregoi zorrët e barkut ia tha të gjitha. Po ta tregoj vetëm ty. I tregoi kush foli (kush e mori). I tregoi kush e kush erdhi. I tregoi si ndodhi. Mos i trego kujt! Mos e trego!","bised. E kallëzoj te dikush; i jap njoftime dikujt për dikë a për diçka; padit. E tregoi tek i ati. Na tregoi spiuni. E shtrënguan të tregonte shokët.","Shfaq një veti a një aftësi, duke vepruar ose duke bërë diçka; i kushtoj kujdes a vëmendje dikujt ose diçkaje; e paraqit veten në një mënyrë të caktuar; e shfaq. Tregoi guxim (burrëri, heroizëm, trimëri). Tregoi zotësi (shkathtësi, mençuri, zgjuarsi). Tregon interesim për letërsinë, (për muzikën, për pikturën).Tregon kujdes (vëmendje) për dikë a për diçka. E tregoi veten se kush ishte. Puna e tregon njeriun. E ka treguar me vepra. Ç'ka zemra e tregon fytyra. fj. u.","vet. veta III. Dëshmon, provon, vërteton; nxjerr në shesh. Kjo tregon qartë (sheshit) se... Përvoja tregon se... Ngjarjet historike treguan se...","edhe jokal. Dukem; jap përshtypjen nga pamja (zakonisht për moshën); vet. veta III është shenjë për diçka, paralajmëron. Tregon i ri. Nuk tregon i më shumë se gjashtëdhjetë vjeç. Siç tregojnë shenjat. Siç tregon moti, do të kemi shi.","vet. veta III sh. Flasin, thonë. Tregojnë shumë gjëra për të. E tregonin shumë të zotin. E tregojnë të bukur. * Siç tregojnë (siç duken) bathët shih te BATH/Ë, ~A. I tregoi (i ktheu, i drejtoi) bërrylin dikujt e kundërshtoi dikë, nuk pranoi atë që i tha a që i kërkoi dikush; nuk i dha asgjë. I tregoi cepin dikujt shih te CEP,~I I. I tregoi derën dikujt shih te DER/Ë,~A. I tregoi (i dëfteu) dhëmbët dikujt a) e kërcënoi, iu kanos; b) i zbuloi qëllimet e veta grabitqare, armiqësore etj., e tregoi natyrën e vet të egër, e zbuloi veten. E tregojnë me gisht dikë shih te GISHT,~I. I tregoi grushtin dikujt shih te GRUSHT,~I. I tregoi (i nxori), gjoksin dikujt shih te GJOKS,~I. Nuk i tregon këmbët (i fsheh këmbët) shih te KËMB/Ë, ~A. Ia tregoi (ia rrëfeu) qejfin dikujt shih te QEJF, ~I. I tregoi (i rrëfeu) shkopin dikujt e kërcënoi. I tregoi (i rrëfeu) udhën (rrugën) dikujt mospërf. shih tek UDH/Ë,~A. I tregoi vendin dikujt shih te VEND,~I. I tregon (i rrëfen) babait arat iron. shih te BABA,~I. Tregoi fytyrën e vërtetë shih te FYTYR/Ë,~A. I tregon lëkurën e ujkut dikujt shih tek UJK,~U I. I tregoi se nga lind dielli iron. shih te LIND. Ia tregoi potkonjtë (këpucët) diellit (qiellit) përb. shih te DIELL,~I. Tregoi edhe qumështin e nënës shih te QUMËSHT,~I. I tregoi zorrët e barkut shih te ZORR/Ë,~A."]}]</script>
