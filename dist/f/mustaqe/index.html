<script>window.__INITIAL_DATA__ = [{"slug":"mustaqe","term":"MUSTAQE","attributes":["f.","kryes.","sh."],"definitions":["Tufë qimesh të gjata mbi buzën e sipërme të burrit. Mustaqe të gjata (të mëdha, të holla, të dendura). Mustaqe të zeza (të verdha, të thinjura). Mustaqe të dredhura (të përdredhura). Mustaqe të varura. Mustaqe si bigë (si shtëllungë). Maja e mustaqeve. Lë mustaqe. Pres (rruaj) mustaqet. I shkuli mustaqet. Fshiu mustaqet. I ka mustaqet vesh më vesh i ka mustaqet shumë të gjata.","Qimet që kanë në të dy anët e buzëve të sipërme disa kafshë dhe që u shërbejnë atyre si organ ndijimi. Mustaqet e maces (e qenit, e lepurit, e miut). Mustaqet e krapit (e fokës, e blinit).","Tufa e fijeve që nxjerr në majë kalliri i misrit, qimet e kallirit të misrit; fije të holla si qime që lëshojnë kallinjtë e disa bimëve. Mustaqe misri. * Burrë me (një barrë) mustaqe a) burrë që e mban fjalën, njeri i besës e i zoti; b) burrë me zakone të vjetra; burrë me sedër të madhe. I koriti mustaqet dikujt e turpëroi në pleqëri; e bëri që të mos e nderojnë më e të mos e quajnë më burrë. Qesh nën mustaqe (nën hundë) shih te HUND/Ë,~A. I janë varur mustaqet iron. i ka shkuar burrëria, s'është më për burrë, s'e quajnë më për burrë. U bë burrë me mustaqe dikush u rrit, u madhua, s'është më i mitur (thuhet për të rinjtë që e kanë kaluar moshën e miturisë). S’i ka djersitur (s'i ka dalë) ende (mirë) mustaqja shih te DJERSIT. Fshiji mustaqet (buzët) për murrizi (pas murrizit)! iron. shih te BUZ/Ë,~A. S'lind burri me mustaqe fj.u. nuk bëhet çdo gjë menjëherë, asgjë nuk vjen e gatshme; duhet mund e përpjekje për të bërë një punë të vështirë. S'njihet burri nga mustaqet nuk vlerësohet njeriu nga pamja e jashtme, por çmohet nga vetitë e brendshme që ka. U zunë (u shanë, u grinden) për mustaqet e Çelos u zunë kot së koti, për hiçmosgjë."]}]</script>
