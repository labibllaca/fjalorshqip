<script>window.__INITIAL_DATA__ = [{"slug":"gisht","term":"GISHT","attributes":["m.","sh."],"definitions":["Secili prej pesë zgjatimeve të lëvizshme në fund të çdo dore ose të çdo këmbe të njeriut; secila prej pesë pjesëve të dorezës, që mbulon këto zgjatime të duarve të njeriut. Gisht i shkurtër (i gjatë, i hollë, i trashë). Gishti i madh (i vogël, i mesëm). Gishti tregues (gishti i shëllirës). Gishti i unazës. Gishti i këmbëzës gishti i pushkës, gishti tregues. Gishti i veshit gishti i vogël i dorës. Gishtat e dorës (e këmbës). Gishtat e dorezave. Kyçet e gishtit. Mollëza (maja) e gishtit. Shenjat e gishtërinjve. Me të pesë gishtat. Lëviz gishtat. Ngre (çoj) gishtin. Vinin gishtin. Vinin shenjën e gishtit në letër (në vend të nënshkrimit). Prek (tregoj) me gisht. Numëroj me gishta.","Secili prej zgjatimeve fundore te putrat e disa kafshëve dhe te këmbët e disa shpendëve. Gishtat e majmunit (e maces). Gishtat e gjelit.","tek. Pjesë e një mekanizmi, që ka trajtën e një kunji të kthyer në majë. Gishti i autokombajnës. Gisht prej çeliku.","bised. Masë gjatësie ose vëllimi afërsisht sa trashësia e një gishti të dorës; masë a sasi shumë e vogël. Tre gisht i gjatë (i gjerë, i artë). Dy gisht ujë (verë). Dy gisht letër.","vet. sh. Vijat e ngjyrave të ndryshme që ndërthuren në një pëlhurë të endur; ujëset.","fig. bised., përb. Vegël. Ka qenë gisht i sulltanit (i Turqisë). Ishte gisht i fashistëve. Ishte gisht i beut. * U bë gisht u dobësua shumë, u lig (nga ndonjë sëmundje ose nga pleqëria). Ia bëj me gisht dikujt ia bëj me shenjë që të afrohet, që të largohet ose të heshtë. Fshihet pas (prapa) gishtit (pas hijes së gishtit) mundohet më kot të mbulojë një veprim të keq që ka bërë, të metat a diçka tjetër të keqe, mbrohet me mjete a me mënyra të dobëta. Fut gishtin diku futet, përzihet në një punë që s'i takon, fut hundët. Është i gishtit dikush është trim, është i pushkës. Ka gisht në diçka ka marrë pjesë, ka bashkëpunuar ose është përzier në një punë (zakonisht të keqe). I këndon gishti dikujt di të shtjerë mirë me pushkë, shtie mirë me pushkë. Kërcet gishtërinjtë shkon kohën kot, pa bërë asnjë punë, tund zinxhirin. E la gisht dikë e la pa asnjë mjet jetese, e la me gisht në gojë. Lidhe në gisht! mbaje mend mirë!, mos e harro!. Mos e lër në harresë! (i thuhet dikujt, të cilit i japim një porosi). E luan gishtin (e pushkës) shih te LUAJ. E luan gishtin e shëllirës (e lëngut) dikush shih te LUAJ. E ka luajtur gishtin dikush shih te LUAJ. E luan nëpër gishta një lëndë e di shumë mirë; e kupton dhe e zotëron shpejt. Mbeti gisht mbeti vetëm, mbeti pa njeri. E ka ngjyer gishtin diku është përzier në një vjedhje; ka marrë pjesë në një punë jo të mirë dhe ka nxjerrë një përfitim vetjak prej saj. Numëron gishtat i kanë rrjedhur trutë, është matufosur. Numërohen me gisht (me gishtat e dorës) janë shumë pak. Njihet me gisht njihet nga të gjithë si njeri i keq, shquhet midis të tjerëve për të metat dhe veset që ka. E tregojnë me gisht dikë e tregojnë për njeri të keq, e shquajnë midis të tjerëve për të metat a veset që ka. Vë gishtin mbi dikë a diçka a) caktoj dikë a diçka për një punë, zgjedh dikë a diçka; e shquaj, e dalloj; b) dyshoj për dikë. U vranë me gisht u përleshën keqas e u gjakosën; u vranë e u therën, u bë gjaku deri në gju. Zgjat gishtërinjtë (krahët, duart) keq. shih te ZGJAT. I ra me gisht të madh një pune e bëri shpejt e shpejt sa për të kaluar radhën, e bëri shkel e shko. E di (e njoh) në majë të gishtave e di shumë mirë diçka. Për dy gisht ballë shih te BALL/Ë,~I. Eci në majë të gishtave eci ngadalë e lehtë, pa u ndier. Erdhën (dolën) gisht pas gishti njëra çështje nxori tjetrën, dolën me radhë njëra pas tjetrës. Sa t'i futësh gishtat në sy shih te SY,~RI. Janë sa gishtat e dorës janë fare pak, numërohen me gisht. Janë si gishtat e dorës janë të lidhur, të bashkuar fort njëri me tjetrin. Është me gjashtë gishta shih te GJASHTË. Është për të lëpirë gishtat shih te LËPIJ. I dha një gisht mjaltë dikujt i dha një ryshfet të vogël dhe e bëri për vete, e ëmbëlsoi me një peshqesh të vogël, i dha një kockë. Japin e marrin me gishta janë të zgjuar e të shkathët, e kuptojnë njëri-tjetrin vetëm me shenja. E ka unazë në gisht shih tek UNAZ/Ë,~A. E lau me majë të gishtit një punë shih te MAJ/Ë,~A. Nuk luan as gishtin e dorës (e këmbës) shih te LUAJ. Mbeti (ngeli) me gisht në gojë a) mbeti pa asnjë mjet jetese, pa gjë, duarthatë; mbeti pa asnjë ndihmë e përkrahje; s'i mbeti asgjë nga ato që kishte ose s'i takoi asgjë nga diçka që u nda midis disa vetave; b) mbeti i habitur nga diçka e papritur; c) mbeti i turpëruar. E mban (e ka) gishtin në këmbëz (rri me gisht në këmbëz) shih te KËMBËZ, ~A. Mbeti si gisht i lëpirë shih te LËPIRË (i, e). E rrëzoi (e hodhi) me një gisht e rrëzoi shumë lehtë, pa përdorur fare forcë. E sjell (e luan) në majë të gishtit (të gishtave) dikë e vërtit nga të dojë e si të dojë, e sjell si lodër në duart e veta. I vë gishtin kokës (vë gishtin në kokë) shih te KOK/Ë,~A. Vë gishtin (dorën) në plagë shih te PLAG/Ë, ~A. E vura gishtin në tëmth shih tek TËMTH,~I. S'e vë as në majë të gishtit dikë as që mund të krahasohet me mua; nuk hahet dot ai me mua, s`dua t'ia di fare për të. Nuk i vjen (nuk i afrohet) as te gishti (as te thoi) i këmbës është shumë prapa tij, qëndron shumë më poshtë se ai, as që mund të krahasohet me të (për nga cilësitë e mira, për nga zotësia, trimëria etj.). S'janë të gjithë gishtërinjtë njësoj s'janë të gjithë njerëzit njësoj nga vetitë, nga aftësitë, nga sjelljet etj. Po i dhe (po i zgjate) gishtin, të merr (të rrëmben) dorën e shfrytëzon ndihmën, përkrahjen që i jep a një lëshim të vogël që mund t'i bësh për të nxjerrë përfitime të reja, për të rrëmbyer prej tjetrit më shumë sesa i takon, për të kërkuar lëshime gjithnjë e më të mëdha. Kam (marr, jap, ha) një majë gishti shih te MAJ/Ë,~A. Lëpi mjaltin, po mos e ha gishtin! fj.u. shih te MJALT/Ë,~I. E mban gishtin (dorën) në çark të pushkës shih te ÇAR/K,~KU. Mbyte në një gisht (pikë, lugë, gotë, filxhan) ujë mospërf. shih tek UJ/Ë,~I. Noton (lundron) në një (në dy) gisht ujë është shumë i zoti, të merr gjak në vetull. Mos e prek në bisht, se te ha në gisht! fj.u. shih te BISHT,~I. Vëri gishtat (majat) nga ke thembrat! shih te THEMB/ËR,~RA. Lule gishti bot. luletogëz."]}]</script>
