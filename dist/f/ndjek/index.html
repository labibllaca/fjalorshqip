<script>window.__INITIAL_DATA__ = [{"slug":"ndjek","term":"NDJEK","attributes":["kal."],"definitions":["Shkoj prapa dikujt a diçkaje për ta kapur, i vihem pas për ta zënë ose për ta dëmtuar a asgjësuar. Ndjek ujkun. Ndjek armikun (keqbërësin). E ndoqi këmba-këmbës. E ndjek nga pas. I ndoqi deri larg.","Eci pas dikujt a diçkaje që prin, i shkoj prapa pa iu ndarë. Ndjek të zotin. Ndoqëm udhërrëfyesin. Ndjek gjurmën. Ishte lodhur e nuk e ndiqte dot nga pas.","edhe fig. Ec në një rrugë a në një drejtim të caktuar. Ndoqën rrjedhën e lumit. Ndoqën vazhdën e gjurmëve. Ndjek një rrugë të caktuar (të drejtë, të gabuar).","Shoqëroj veprimet e një tjetri, e dëgjoj çfarë thotë ose përsërit atë që bën dikush tjetër. Ndjek fillin e mendimeve të dikujt. Mësuesi lexonte shpejt dhe nxënësit nuk po e ndiqnin dot. Nuk po më ndjek me vëmendje.","fig. Veproj ose sillem sipas shembullit të dikujt, e kam si udhëheqje a udhërrëfyes; jam ithtar, pasues a përkrahës i dikujt a i diçkaje. Ndjek mësimet (vijën) e Partisë. Ndjek një politikë parimore (të drejtë). Ndjek këshillat e dikujt. Ndjekin modën. Ndjek shembullin e të përparuarve. Ndjekin rrugën kapitaliste.","Vështroj diçka që lëviz, e shoqëroj me shikim. Ndjek me sy. E ndoqi deri sa u zhduk nga sytë.","Shoh ose dëgjoj një shfaqje, një program etj. Ndjek një ndeshje (një lojë). E ndoqi deri në fund.","fig. Mbikëqyr vazhdimisht për të parë si ecën e si zhvillohet diçka; kujdesem vazhdimisht për mbarëvajtjen e diçkaje, kam përsipër një punë për ta çuar deri në fund; shoh. Ndjek një çështje. Ndjek zbatimin e planit e të detyrave. Ndjek përparimin e nxënësve. Ndjek zhvillimin e ngjarjeve. Ndjek me vëmendje (me kujdes, me interesim, me kënaqësi, me padurim, me ankth) diçka.","fig. Synoj të arrij diçka. Ndjek një qëllim.","Shkoj rregullisht në një shkollë për të mësuar; vijoj. Ndjek shkollën (kursin). Ndjek mësimet (studimet). Ndjek klasën e parë.","bised. Dëboj; përzë. E ndoqën nga puna. I ndoqëm pushtuesit e huaj. Ndiqi ato mendime nga koka!","E trajtoj keq, duke përdorur mjetet e dhunës e të shtypjes që ka shteti, për ta penguar të shprehë pikëpamjet përparimtare ose të luftojë për liri e për drejtësi shoqërore (në vendet me regjime shtypëse). Ndjekin revolucionarë (patriotët).","vet. veta III jokal. Vjen në radhë pas dikujt a diçkaje, pason. Në kapitujt që ndjekin. Ndjek një hyrje e gjatë. * Ndjek gjurmët e dikujt veproj njësoj si një tjetër paraardhës, eci në rrugën e tij. Ndjekin pas qerres e dikujt shih te QERR/E,~JA. E ndjek (e marr) gjurmën mbrapsht shih te GJURM/Ë,~A. E ndjek në gur e në galinë shih te GUR,~I. E ndoqi pilë për pilë shih te PIL/Ë,~A I."]}]</script>
