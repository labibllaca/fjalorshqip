<script>window.__INITIAL_DATA__ = [{"slug":"drapeer","term":"DRAPËR","attributes":["m.","sh."],"definitions":["Vegël bujqësore e dorës, që përbëhet nga një presë si hark, e dhëmbëzuar lehtë, e nga një dorezë prej druri dhe që përdoret për të korrur të lashtat, barin etj. Drapër gruri (misri, bari). Drapër lejlek drapër me presë më të hapur e me bisht të gjatë. Koha e draprit koha e të korrave. Mpreh draprin. Korr me drapër. I vë draprin barit (grurit) e korr, e pres me drapër. Është bërë për drapër është bërë për t'u korrur. Bie (nis, fillon) drapri fillon korrja e të lashtave. I ka këmbët si drapër i ka këmbët të harkuara. * Drapër e çekan simboli i punës, i bashkimit të klasës punëtore me fshatarësinë punonjëse. Drapri i hënës poet. hëna kur ka nisur të përtërihet ose kur soset dhe ka trajtën e një vetulle. I drejtë si drapri iron. a) i shtrembër, në trajtë harku; jo i drejtë; b) që nuk vepron drejt, që të mashtron. U vuri draprin ( armiqve etj.) i vrau me shumicë, i korri, i griu. Nuk futet drapri në thes fj. u. e shtrembra ose gënjeshtra nuk mund të fshihen. Drapri në thes (brenda) e maja jashtë thuhet për një njeri të djallëzuar që kërkon të bëjë një të keqe fshehurazi, por nuk fshihet dot."]}]</script>
