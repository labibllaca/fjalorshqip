<script>window.__INITIAL_DATA__ = [{"slug":"shpatull","term":"SHPATULL","attributes":["f.","sh."],"definitions":["anat. Secila nga të dy kockat e gjera, rrasike e si trekëndësh, që janë djathtas e majtas pjesës së sipërme të shpinës së njeriut; zakon. sh. pjesa e shpinës rreth këtyre kockave; pjesa e trupit të kafshëve me katër këmbë, ku lidhet këmba e përparme me trupin; kocka e kësaj pjese. Shpatulla e djathtë (e majtë). Me shpatulla të gjera (të ngushta). Me shpatulla të forta (të njoma). Një shpatull qengji. Gjerësia e shpatullave. Jam ftohur në shpatull. Më dhembin shpatullat. E mori plumbi shpatull më shpatull. I kanë dalë shpatullat. E vuri me shpatulla në tokë (në sportin e mundjes).","vet. sh. fig. Shpina e supet e njeriut, si pjesa e trupit që mban peshën më të rëndë, punën më të vështirë, mundimet, vuajtjet etj.; kurriz. Rëndonte mbi shpatullat e popullit. E ka (e mban) ai mbi shpatulla. Qëndron në shpatullat e tij. S`ia mbajnë shpatullat nuk e përballon dot. E provoi mbi shpatullat e veta.","shih SHPAT/Ë,~A 3,6. Shpatull samari. Shpatullat e qerres.","shih SHPATËZ, ~A 1,2. Shpatulla e parmendës. I vuri dy shpatulla këmbës.","Vegël e përbërë nga një fletë çeliku në trajtë trekëndëshi e me një dorezë druri, që e përdorin zakonisht bojaxhinjtë për të kruar muret dhe për të mbushur me allçi vrimat e plasaritjet.","Pjesa e urës, e pendës së një lumi etj., që mbështetet në tokë, në faqen e malit a në breg të lumit. Shpatulla e urës (e pendës).","Shpat, shpatinë. Shpatullat e maleve (e kodrave).","bot. Bisk që del në rrëzë të trungut të një peme ose degë që shqitet nga pema për t'u mbjellë. Shpatull ulliri (fiku, ftoi). Shtohet me shpatulla. * I fërkon shpatullat (krahët, kurrizin, shpinën, zverkun) dikujt keq. shih te FËRKOJ. I rreh shpatullat (krahët, supet) dikujt shih te RRAH. S`ka shpatulla për një punë nuk është i zoti për ta bërë një punë nuk e përballon dot. I mbajnë shpatullat mund ta përballojë një punë a një detyrë, ka aftësi për të bërë punë edhe më të mëdha e më të vështira. I ktheu (i solli) shpatullat (krahët, kurrizin, shpinën) dikujt shih te KTHEJ. Të lan në shpatull a) mospërf. ha shumë, përlan çdo gjë që i vënë përpara; b) keq. është vjedhës i fortë, të qëron të bardhën e syrit. Marr mbi shpatulla (mbi supe, mbi vete) diçka marr përgjegjësinë, marr zotimin të bëj një punë të rëndë. Kur të shohë shpatullat (kurrizin, veshët, zverkun, qafën) shih te SHOH. I vuri shpatullat (krahët, gjoksin) diçkaje shih te KRAH,~U. S'kishte (s'i kishte mbetur) gjë në shpatull s'kishte gjë prej gjëje, s`i kishte mbetur asgjë në shtëpi. I kishte shpatullat të ngrohta shih te NGROHTË (i,e). Nuk e kishte as në shpatull të pulës nuk e përfillte fare, nuk e zinte fare në hesap. Kokën mbi shpatulla e ke mendohu vetë; ta kesh merak vetë; vepro me mend në kokë. Shpatullat s'bëhen tri fj. u. edhe mundësia a aftësia për të përballuar punët e vështirësitë ka një kufi. Shpatullat duan këmbë fj. u. për t'u bërë ballë detyrave a vështirësive duhet të i mbështetesh fort diku; duhet t'i mbështetësh këmbët në tokë. E vuri (e mbërtheu) me shpatulla pas murit (në mur) e mposhti kundërshtarin me argumente, me prova e fakte të padiskutueshme e të pamohueshme, e detyroi të dorëzohet. Barkun petë, por shpatullat (kurrizin) drejt! pranon të rrojë keq, por nuk i nënshtrohet armikut. Mos i shiko shpatullat, por shikoji zemrën! fj. u. nuk vlen ai që ka trup të madh, por ai që ka shpirt të madh, që është trim e zemërgjerë. Shpatullat me zemrën s`janë motra fj. u. mund të jetë dikush trupmadh, por frikacak, ndërsa dikush mund të jetë i imët nga trupi, por trim."]}]</script>
