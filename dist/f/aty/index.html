<script>window.__INITIAL_DATA__ = [{"slug":"aty","term":"ATY","attributes":["ndajf."],"definitions":["Në një vend të caktuar larg meje, po afër bashkëbiseduesit; në një vend të caktuar pranë një vendi tjetër të njohur; kund. këtu. Që këtu deri aty. Aty rri. E ke aty. Po vij aty. Mbeti aty. Po aty.","Në po atë vend ku kryhet edhe një veprim tjetër (e përsëritur në krye të fjalive); kund. këtu. Aty gatuante, aty lante.","Përdoret në fjalinë kryesore, me kuptimin «në atë vend», kur fjalia e varur fillon me ku, te; atje; kund. këtu. Do të kthehemi përsëri aty ku ishim. U shtri aty ku nuk e zinte era.","Rreth asaj kohe, afërsisht në atë kohë, atëherë. Aty nga shtatori. Aty nga dreka. Aty nga ora pesë. Aty nga mesi i natës. Aty lashti. bised. shumë kohë më parë. Aty shpejti. bised. ca kohë më parë, para pak kohësh. Aty e prapa që nga ajo kohë, që atëherë e paskëtaj.","Në të njëjtën kohë, po atëherë, herë... herë (e përsëritur në krye të fjalive). Aty skuqej, aty zverdhej. Aty qante, aty qeshte.","Përdoret bashkë me një emër me parafjalë a me një ndajfolje për të treguar në mënyrë më të përcaktuar vendin larg nesh, po afër një vendi të njohur, në të cilin është diçka a kryhet një veprim; përdoret para një ndajfoljeje për të përforcuar kuptimin e saj. Aty në dhomë. Aty te muri. Aty brenda. Aty pranë (lart). * Aty për aty menjëherë, në çast, shpejt e shpejt, sakaq; në atë çast. Aty afër afërsisht, rreth, pothuaj. Aty edhe... deri, edhe, madje. Aty ta kam! shih te KAM. Aty më rri thjeshtligj. ndalu në atë çështje, mos u largo nga ajo pikë. Lindi (leu) e mbin aty shih te LIND. Nuk e ka mendjen aty (në vend) shih te VEND, ~ I."]}]</script>
