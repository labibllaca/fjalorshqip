<script>window.__INITIAL_DATA__ = [{"slug":"miell","term":"MIELL","attributes":["m.","sh."],"definitions":["Pluhur i imët, që bëhet duke bluar drithin dhe që përdoret për të bërë bukë e për gatesa të tjera. Miell i hollë (i imët, i trashë). Miell i bardhë (i verdhë). Miell gruri (misri, orizi). Maja e miellit. Fabrika e miellit. Një dorë miell. Sit miellin. I butë si miell. Nuk mbahet shtëpia me miell hua. fj. u.","Pluhuri që del kur thërrmohen imët, bluhen ose përpunohen disa lëndë. Miell patatesh (salepi). Miell mishi (peshku). Miell gjaku (qumështi). Miell kockash (eshtrash). Miell druri (sharre). Miell guri (tullash). Miell bari (jonxhe, rrënjash). E bëri miell e bloi a e thërrmoi imët.","Përdoret si gjymtyrë e dytë në një varg emërtimesh të pathjeshta të disa kandrrave, që zakonisht ushqehen me miell. Brumbulli i miellit. Flutura (tenja) e miellit. Merimanga e miellit. * Bukë e një mielli keq. shih te BUK/Ë,~A. I ka rënë mielli është thinjur krejt. Bluan miell të hollë thotë gjëra të mençura, pret hollë, është i mprehtë nga mendja. E bën drithë e miell mospërf. shih te DRITH/Ë,~I. Është (ka rënë) si miu në miell është (ka rënë) në mes të gjitha të mirave, është si veshka në mes të dhjamit. Marrin miell hua shih te HUA,~JA. I merr krundet për miell mashtrohet lehtë, e merr sapunin për djathë. Nuk është miell i thesit të tij nuk ka dalë nga mendja e tij (për një punë, vepër, mendim etj), po është i tjetër kujt, i botës. Mielli nga thesi i botës (i huaj) iron. është punë a vepër e tjetërkujt, s`është vepër origjinale e dikujt; fjalë, mendim etj., që është marrë nga të tjerët. Kemi ngrënë një hambar miell (një furrë bukë, një thes a një barrë kripë) bashkë shih te FURR/Ë,~A. I lirë në miell, i shtrenjtë në krunde fj. u. nuk kursen aty ku duhet. Shto ujë e shto miell mospërf. shih te SHTOJ. Guri që punon shtruar bën miell të butë fj. u. shih te SHTRUAR."]}]</script>
