<script>window.__INITIAL_DATA__ = [{"slug":"ccelees","term":"ÇELËS","attributes":["m.","sh."],"definitions":["Mjet prej metali, i përbërë nga një pjesë e dhëmbëzuar dhe nga një rreth ku kapet me dorë, i cili përdoret për të hapur e për të mbyllur një brave ose një dry; hapës, kyç. Çelës i rremë. Çelësi i derës. Çelësi i dollapit (i arkës, i tryezës, i kasafortës). Çelësi i biçikletës. Çelësat e shtëpisë (e zyrës). Vrima e çelësit. Tufë çelësash. Rreth (unazë) çelësash. Fut (heq) çelësin. Mbyll (hap) me çelës. I vë çelësin derës e mbyll derën. Nuk i bën (i shkon, i bie) ky çelës.","tek. Vegël dore për të shtrënguar e për të liruar dadot, gypat e pjesët e tjera të mekanizmave, që mbërthehen duke u vidhosur. Çelës i përgjithshëm (universal). Çelës anglez çelës të cilit nofulla e poshtme mund t'i hapet e t'i mbyllet sipas nevojës me burmë. Çelës papagall çelës të cilit nofulla e poshtme mund t’i hapet e t’i mbyllet duke e ngecur në një kllapë. Çelësa me numra të ndryshëm. Çelësat e tornos. Çelës gypash. Shtrëngoj (zbërthej) me çelës.","Mjet i thjeshtë për të hapur diçka, për të vënë në lëvizje një mekanizëm duke e rrotulluar zemberekun, për të shtrënguar telat e veglave muzikore etj. Çelës shishesh. Çelës konservash. Çelësi i sahatit. Çelësi i ziles së orës. Çelësi i lodrës. Çelësat e violinës (e kitarës). Hap me çelës. Kurdis (shtrëngoj) me çelës.","Mjet për të lëshuar dhe për të ndërprerë rrymën elektrike, që lidhet me përcjellësit në një pikë të qarkut; mjet për të lëshuar dhe për të mbyllur rrymën e një lëngu ose të një gazi. Çelës elektrik. Çelësi i dritës. Çelësat e radios. Çelësi i ujit (i gazit). Çelësi i makinës larëse. Çelës me vaj. Çelësat e komandimit. Hap (mbyll) çelësin. Shtyp (rrotulloj) çelësin.","fig. Mjet që ndihmon për të zgjidhur, për të shpjeguar ose për të kuptuar diçka; hallka që përcakton zgjidhjen ose suksesin e diçkaje. Çelës magjik. Çelësi i sukseseve (i fitoreve). Çelësi i punës. Çelësi për një problem. I gjej çelësin. I jap çelësin. Shërben si çelës. Kam çelësin në dorë.","muz. Shenjë që vihet në krye të pentagramit dhe që tregon notën, sipas së cilës caktohet shkalla e lartësisë për notat e tjera të pjesës muzikore. Çelësi i solit. Çelësat e muzikës.","Tërësia e shenjave, shkronjave e shifrave, të cilat ndihmojnë për të zbërthyer një tekst të shifruar, një vizatim të ndërlikuar etj.; sistemi i shenjave ose i parimeve që shërbejnë për të kuptuar një tekst. Çelësi i shifrës. Çelësi i hartës. Gjej çelësin. I jap çelësin. Zbërthej me anë të çelësit.","ndërt. Guri i sipërm ose i mesëm, që mban të shtrënguar gurët e tjerë në një qemer. Çelësat e oxhakut. Çelësi i qemerit. I luan çelësi.","anat. krahin. Nyjë e eshtrave, kyç. Çelësat e trupit. Çelësat e duarve. * Çelës i artë libr. shih tek ARTË (i, e). Çelës kopil shih te KOPIL,~I. Dorëzoi çelësat a) hoqi dorë nga një punë, e la një punë a një detyrë; b) dështoi, doli me këpucë të kuqe. I vuri çelësin (kyçin, drynin) diçkaje shih te KYÇ,~I. Ka (mban) çelësat (hapëset) e kashtës iron. shih te KASHT/Ë,~A. S’ka çelës që i bie nuk i nxjerr dot para nga duart, është koprrac i madh. E mbylli me shtatë pale çelësa (me shtatë kyçe) shih te SHTATË. I vuri çelësin (kyçin, drynin) shtëpisë shih te KYÇ,~I. Çelës automatik bravë me mekanizëm të ndërlikuar për t’u hapur vetëm me çelësin e vet dhe që mbyllet vetvetiu."]}]</script>
