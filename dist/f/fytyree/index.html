<script>window.__INITIAL_DATA__ = [{"slug":"fytyree","term":"FYTYRË","attributes":["f.","sh."],"definitions":["Pjesa e përparme e kokës së njeriut, që përfshin ballin, faqet, mjekrën, gojën, hundën, sytë dhe veshët; pamja e jashtme e pjesës së përparme të kokës së njeriut; shprehja e jashtme e dikujt, që pasqyrohet në këtë pjesë të trupit. Fytyrë e mbushur (e dobët, e hequr, e thatë, e zbehtë). Me fytyrë të qeshur (të bukur, të ëmbël, të ngrysur, të vrarë, të vrenjtur). Tiparet (pjesët) e fytyrës. Muskujt e fytyrës. Laj (fshij) fytyrën. Kthej fytyrën nga ana tjetër. S’ia pa fytyrën. E njoh (duket) që në fytyrë. U prish në fytyrë. Nuk i qesh fytyra. Mori tjetër fytyrë.","edhe fig. Tërësia e tipareve të jashtme të diçkaje, pamja e jashtme; faqe. Ndërroi fytyrë toka (vendi, fshati). Ia ndërruam fytyrën vendit.","bised. Pjesa e sipërme a sipërfaqja e diçkaje, ana e sipërme ose e përparme e diçkaje; ballë. Fytyra e tokës. Fytyra e lëkurës. Fytyra e orës (e sahatit) fusha e orës. Fytyra e ndërtesës. Me fytyrë nga rruga.","fig. Emri i mirë i dikujt, nderi. Ia mori fytyrën. S’ka fytyrë. E preku në fytyrë. S’i ka mbetur fytyrë. Është njeri pa fytyrë. S’ka dert për fytyrë është i pacipë, s’ka turp, e ka ngrënë turpin me bukë. E bëri për fytyrë e bëri për të ruajtur nderin. Me mirë të shkojë koka se fytyra fj. u. Dy gishta fytyrë ka njeriu nderi, emri i mirë është diçka kryesore, prandaj duhet ruajtur me kujdes të madh.","spec. vjet. Figura. Fytyrë letrare. Fytyrë e shquar. Libër me fytyra. * Me fytyrë fytyrëvrenjtur; i zemëruar, i mërzitur. Me dy fytyra (me dy faqe) hipokrit. Fytyrë për fytyrë me dikë ballë për ballë, sy për sy. Fytyrë e ndyrë (e fëlliqur) shih te NDYRË (i, e). I iku (iu pre) fytyra u zbeh shumë në fytyrë (nga një shqetësim i madh e i papritur). I dha fytyrë dikujt shih te JAP. I dha fytyrë diçkaje shih te JAP. Ka një fytyrë dikush është njeri i ndershëm e i çiltër, nuk është njeri me dy faqe. Kthej fytyrën nga diçka shih te KTHEJ. Merr fytyrë diçka shih te M
