<script>window.__INITIAL_DATA__ = [{"slug":"peshoj","term":"PESHOJ","attributes":["kal."],"definitions":["Përcaktoj peshën e një trupi a të diçkaje në një peshore ose duke e krahasuar me një tjetër, i mat peshën. Peshoj grurin (misrin). Peshoj fëmijën. Peshoj në kandar. Peshoi me dorë diçka e ngriti diçka dhe e mbajti në dorë, për ta parë sa rëndon.","fig. E shqyrtoj diçka me kujdes për ta vlerësuar si duhet, gjykoj; vlerësoj. E peshoi mirë punën (çështjen). I peshuan mirë fuqitë e veta. I peshuan anët e mira dhe të këqija të dikujt. I peshoi mendimet e shokëve.","fig. Bëj me maturi e me kujdes të posaçëm një punë a një veprim; e mendoj mirë e pastaj e them (një fjalë). Peshon çdo lëvizje (çdo veprim). I peshon fjalët që thotë.","fig. Ia di vlerën dikujt; e njoh dhe e çmoj, e vë në kandar; ia kam frikën, e marr parasysh; e përfill (sidomos në shprehje mohuese). S'e peshonin fare s'e nderonin fare, nuk e vlerësonin fare, nuk ia vinin veshin fare. Nuk na peshonin për komb.","jokal. Kam një peshë të caktuar; jam i rëndë, rëndoj. Peshon lehtë (rëndë). Peshon më shumë se i vëllai. Peshon dhjetë kuintalë. Më peshojnë këpucët.","jokal. kryes. veta III fig. Ka rëndësi, ka vlerë; ushtron ndikim; nderohet, dëgjohet nga të tjerët. Veprat (punët) peshojnë. I peshon fjala. Peshonin disa rrethana. Peshon më shumë cilësia se numri.","jokal. vet. veta III. Bie, rëndon. Përgjegjësia peshon mbi ju. Hallet peshonin mbi të. Të gjitha punët peshonin mbi ne. * Të peshonte në flori shih te FLORI,~RI. I peshon arrat pa i shkundur flet pa u menduar; vendos para kohe, është i rrëmbyer."]}]</script>
