<script>window.__INITIAL_DATA__ = [{"slug":"thanee","term":"THANË","attributes":["f.","sh."],"definitions":["Bimë që rritet e lartë a si shkurre, me dru të fortë, me gjethe të vogla vezake e të ashpra, që lulëzon herët në pranverë dhe bën kokrra të kuqe, gjatoshe si ulli me shije të athët; kokrrat e kësaj bime. Thanë e butë (e ëmbël). Dru (shkop) thane. I fortë si thana (si dru thane). I kuq si thana me shëndet shumë të mirë. Lëng (shurup) thanash. Si fletë thane i ashpër.","përd. mb. fig. Jo i ëmbël, pak si i athët; jo shumë i këndshëm a i pëlqyeshëm; i thartë, i ka fjalët thanë. E ka gojën thanë. * Si kokërr thane (molle) shih te MOLL/Ë,~A. Thanat nuk numërohen fj. u. gjërat pa vlerë nuk numërohen; gjërat e vogla e pa rëndësi nuk duhen vënë re megjithëse mund të mos na pëlqejnë. Ka ngrënë lule thane a) ka shëndet të mirë, i ecën shëndeti; b) i ka marrë masat me kohë. I ka mendtë majë thanës nuk i ka mendtë në kokë, është shumë mendjelehtë e i papjekur. Kërkon thana (thanëza, dardha, rrush) në shënëndre (në dimër) shih te DARDH/Ë,~A. Ia vuri kufijtë te thana dikujt nuk e lejoi të ndërhynte në punët e veta, i tregoi vendin. Sa thana janë, kokrra s’bëjnë fj.u. sa fjalë fliten, nuk duhen besuar. Flet si e ëma e Zeqos majë thanës thjeshtligj. flet kot së koti, në tym e pa asnjë nevojë; flet pa e menduar shumë atë që thotë. Djemtë (fëmijët) hanë thana (kumbulla), pleqve u mpihen dhëmbët iron. shih te MPIHEM. Thanë e egër bot. thanukël. Thanë ujku bot. thanukël."]}]</script>
