<script>window.__INITIAL_DATA__ = [{"slug":"mjaltee","term":"MJALTË","attributes":["m."],"definitions":["Lëng i trashë e shumë i ëmbël, në ngjyrë të qelibarit, që e bëjnë bletët me nektarin e disa luleve dhe që përdoret si ushqim. Mjalti i pavënë në zjarr (i pazier, i tretur, i vinë në zjarr). Mjaltë sherbele (bliri). Pitet (hojet) e mjaltit. Sherbet mjalti. Karamele (petulla) me mjaltë. I ëmbël si mjalti shumë i ëmbël. Mbledh mjaltin. Lyej bukën me mjaltë.","Lëngu i trashë që nxjerr kokrra e fikut kur piqet shumë, rrëshira e fikut.","përd. mb. Shumë i ëmbël. Pjepri ishte mjaltë. Është pjekur rrushi e është bërë mjaltë.","përd. ndajf. fig. Shumë mirë; pa halle e pa brenga, ëmbël. E shkon jetën mjaltë. I rrjedhin ditët mjaltë. U shkon muhabeti mjaltë.","përd. ndajf. Përdoret me mbiemrin «i ëmbël» për të treguar shkallën më të lartë të ëmbëlsirës së diçkaje (me kuptimin «shumë»). Ishte mjaltë i ëmbël. * Ka rënë në mjaltë ka rënë në një gjendje shumë të mirë, në një familje a rreth shoqëror shumë të mirë, është si veshka në mos të dhjamit, jeton në mes të gjitha të mirave. Mjaltë e qumësht një lloj melhemi popullor, me të cilin lyhet vendi i kafshuar nga nusja e lalës. Muaji i mjaltit shih te MUAJ,~I. Vesa e mjaltit shih te VES/Ë,~A. I ra sëpata (shpata, luga, thika, sqepi) në mjaltë rastisi në rrethana shumë të përshtatshme e pati shumë përfitime; i eci mbarë një punë. Është mjaltë e qumësht është shumë i mirë, shumë i këndshëm. E ka mjaltë e sheqer (mjaltë e qumësht, mjaltë e gjalpë) me dikë shkon shumë mirë me dikë, ka marrëdhënie shumë të mira me të; e duan shumë njëri-tjetrin. I dha një gisht mjaltë dikujt shih te GISHT,~I. Ka ngrënë bukë e mjaltë me dikë ka shkuar shumë mirë me të. Ka ngrënë më shumë mjaltë se bukë a) ka trup të shëndoshë e të lidhur mirë, është i hijshëm e plot shëndet; b) është gojëmbël e zemërmirë. U lëshuan si miza në mjaltë shih te MIZ/Ë,~A. Mjalti i tërheq mizat fj. u. thuhet kur dikush i bën lajka e i sillet rrotull një njeriu të pasur a të pushtetshëm për të nxjerrë përfitime prej tij. Çdo mizë nuk bën mjaltë fj. u. shih te MIZ/Ë,~A. I nxjerr (i rrjedh, i kullon, i buron) goja mjaltë flet mirë e bukur, flet ëmbël; është gojëmbël. Nxjerr (lëshon, derdh) mjaltë (sheqer) nga goja është gojëmbël. Nxjerr mjaltë (vaj) nga guri dikush është shumë i zoti, i shkathët e këmbëngulës, nxjerr dhjamë nga pleshti. Këmbë për baltë, gojë për mjaltë fj. u. shih te BALT/Ë,~A. Lëpi mjaltin, po mos e ha gishtin! fj. u. fol e bëj shaka, po mos e tepro; ki kujdes, mos lakmo aq shumë, se e pëson. Ka (kërkon të ketë) njërën dorë në bakllava dhe tjetrën në mjaltë (në revani, në kabuni) përb. shih te DOR/Ë,~A."]}]</script>
