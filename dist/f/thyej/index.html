<script>window.__INITIAL_DATA__ = [{"slug":"thyej","term":"THYEJ","attributes":["kal."],"definitions":["E ndaj një gjë më dysh a në shumë copa me dorë ose duke e përpjekur pas diçkaje të fortë; e bëj pjesë-pjesë a copa-copa diçka të ngurtë, e copëtoj, duke e goditur me diçka a duke e përpjekur pas diçkaje të fort. Thyej shkopin. Thyej bukën. Thyej pemën (degët). Thyej vezët (arrat). Thyej pjatën (gotën, xhamin). Thyej këmbën (dorën, dhëmbët).","E përkul, e lakoj a e harkoj diçka; e bëj më dysh, më tresh etj., e palos. Thyej trupin (mesin, gjunjët, duart). Mos i thyej gishtërinjtë! Thyej më dysh letrën.","fiz. I kthen drejtimin dritës, rrezes etj., e bën të ndërrojë drejtimin, e përthyen. Prizmi e thyen dritën. I thyen rrezet.","Kthej a këmbej një monedhë në disa njësi monetare më të vogla, që përbëjnë të njëjtën sasi parash a të cilat të gjitha së bashku janë të barasvlershme me të, shkoq; kthej paratë e huaja në para vendi, e këmbej një çek me para e kthej çekun në të holla. Thyej qindëshen me dhjetëshe e pesëshe. Theu dollarët (florinjtë). E theu çekun në bankë. Kë të ma thyesh? S'kam të t'i thyej.","fig. Veproj në kundërshtim me diçka jopërparimtare, që ka qenë e zakonshme në të kaluarën e që tani pengon zhvillimin, e mohoj atë, e hedh poshtë përfundimisht si të papërshtatshme e të keqe; shkatërroj diçka të keqe. Thyejmë konceptet e vjetra (paragjykimet, besëtytnitë, zakonet prapanike). Kemi thyer çdo gjë të vjetër (të prapambetur). E thyen mitin për diçka. E thyem aparatin e vjetër shtetëror.","fig. Prish a shkel diçka të pranuar ose të vendosur që më parë, nuk i qëndroj besnik asaj, e ha, e mohoj (fjalën, besën etj.); shkel a cenoj diçka, nuk e zbatoj, e prish. Nuk e thyen fjalën (besën, marrëveshjen). Theu disiplinën. Theu urdhrin. Mos i thyej rregullat! Armiqtë nuk e thyejnë dot bashkimin tonë.","fig. E mund dikë në një luftë, në një betejë, në një ndeshje, në një lojë etj., e bëj që të dorëzohet, të jepet, të tërhiqet etj.; e mposht diçka, e përballoj dhe e kapërcej me sukses diçka. E thyen ushtrinë armike (armikun, kundërshtarin). E theu mbrojtjen (sulmin).Nuk e thyen dot kryengritjen (qëndresën, luftën).Thyejmë çdo bllokadë. Nuk e thyen vështirësitë (pengesat, vuajtjet, torturat). Nuk e theu dot as me para dikë nuk e bleu dot me para, nuk e bëri dot për vete me para. I thyen me forcë (me dredhi). E thyen shpejt (lehtë, plotësisht).","fig. (me një trajtë të shkurtër të përemrit vetor në r. kallëzore). I pres dikujt forcat, e bëj të pafuqishëm, e dobësoj, shumë; e rrëzoj, shumë nga shëndeti, e vras shpirtërisht. Nuk e theu sëmundja (mosha, pleqëria).E theu moralisht. E theu keq. Nuk e thyen dot.","fig. E shuaj a e zhduk diçka; nuk e lë diçka të veprojë a të jetë ashtu si më parë; i pakësoj forcën, e dobësoj, e bëj të ulet a të bjerë; ia ul ia zbres vlerësimin. I theu vullnetin (besimin, vrullin). Thyej urinë (gjumin). Ia thyen notën e sjelljes.","fig. Arrij të tejkaloj diçka, kapërcej caqet e vendosura për një punë a të arritura më parë; Thyen parashikimet. Thyejnë normat. Theu rekordin.","jokal. vet. veta III fig. Shkon, kapërcen në pjesën e fundit, i afrohet mbarimit (për ditën dhe natën). Po thyen dita (nata). * Thyej (çaj) akullin libr. filloj i pari diçka të re, kapërcej i pari pengesat që dalin etj. Na theve brinjët! a) iron. lëre se na bëre të qeshim, nuk shikon, na shkule së qeshuri b) keq. na gënjeve rëndë!; na mbushe me gënjeshtra! Ia theu bririn shih te BRI,~RI. Thyej dorën fitoj pak nga pak, duke i ushtruar, aftësinë e shkathtësinë e nevojshme për të bërë një punë, nis t'ia marr dorën një pune. Theu dhëmbët humbi keq, pësoi humbje të rëndë, u dëmtua shumë. I theu (i dërrmoi) dhëmbët (hundët, brinjët, turinjtë, nofullat, fulqinjtë) dikujt përçm. a) e rrahu paq, e rrahu mirë, e shqepi në dru; b) i tregoi vendin; ia mblodhi mirë; s'e la të shiste mend, ia uli hundën. I thyen (i prishën) fjalët u grindën, u shanë, u zunë keqas. Theu gërmicën mospërf. shih te GËRMIC/Ë,~A II. Thyej gjuhën fitoj një farë aftësie për të folur një gjuhë të huaj; filloj të flas kryesisht në gjuhën letrare e jo në dialekt; përziej të folurit në dialektin amtar me mjaft ndikime të një dialekti tjetër. E theu këmbën përb. a) u shporr, iku theu qafën; b) vdiq. Ia theu kockat shih te KOCK/Ë,~A. Theu kokën ra e u vra keq, u bë copë. Ia theu (ia shtypi, ia këputi) kokën shih te SHTYP. E theu në mes a) e dëmtoi rëndë, i prishi shumë punë, e këputi në mes; b) e dëshpëroi shumë, i shkaktoi një gjendje aq të rëndë shpirtërore sa nuk ngre dot kokë; c) e rrahu keq, e ngordhi në dru. Nuk ia ka thyer (nuk ia ka lëshuar) poganikun a) dikujt nuk e njeh mirë, s'ka pasur rast ta njohë si duhet, dikë; b) diçkaje nuk i ka vënë emër, nuk e ka përcaktuar mirë natyrën e vlerën e saj; nuk e ka quajtur ende me emrin e vet. Thyej (këput) prangat (vargonjtë) shih te KËPUT. Thyej (këput) arrëzën (qafën)! keq. largohu që këtej!, shporru! Theu (këputi) qafën (zverkun, arrëzën) a) ra e u vra keq, u bë copë-copë; b) u largua më në fund, u shporr. Theu turinjtë (hundët) a) ra e u vra keq, u bë copë; b) pësoi dështim të plotë, u dëmtua rëndë në vend që të kishte ndonjë përfitim. Ia theu zemrën ia prishi shumë qefin e brengosi, e hidhëroi pa masë. Të thyen arrën në dorë a) është shumë i zoti, të merr gjak në vetull; b) keq. ta hedh lehtë, ta hedh kur të duash; c) keq. vjedh shumë e me marifet, të qëron të bardhët e syrit. Nga theva këmbën e dola (e vajta e shkova e erdha )! ç'm'u desh që dola (që vajta, që shkova, që erdha!), ç'bëra që dola (që vajta, që shkova, që erdha). Të thyente kokën (kryet) me para ishte shumë i pasur, kishte shumë para. Bie miu e thyen kokën, është bosh, s'ka asgjë brenda (për hambarin etj.). Mendja e madhe të thyen qafën (zverkun) fj.u. shih te MENDJ/E,~A. Gjuha kocka s'ka e kocka thyen fj. u. shih te GJUH/Ë,~A I."]}]</script>
