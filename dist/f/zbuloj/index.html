<script>window.__INITIAL_DATA__ = [{"slug":"zbuloj","term":"ZBULOJ","attributes":["kal."],"definitions":["Ia heq ose ia ngre mbulesën një njeriu a një sendi, ia heq veshjen një trupi ose mbështjelljen diçkaje; kund. mbuloj. Zbuloi fytyrën (krahët, këmbët, kurrizin). Zbuloi bustin (pllakën përkujtimore). Zbuloi tasin (tenxheren). Zbuloi kosin. Zbuloi gropën. Zbuloi makinën. Zbuloi çatinë.","Gjej diçka të mbuluar në tokë duke gërmuar etj., pasi e kam kërkuar për njëfarë kohe; bëj që të duket, bëj që të dalë në dritë diçka e fshehur a e mbuluar. Zbuloi thesarin. Zbuluam vendvarrimin e Skënderbeut. Zbuluan muret (themelet) e kështjellës. Zbuluan një vendburim të ri (rezerva të mëdha nafte).","Gjej për herë të parë një vend të panjohur; arrij të gjej për herë të parë, të përcaktoj mirë dhe të bëj të njohur për të tjerët diçka të panjohur, nxjerr në dritë për herë të parë diçka që nuk njihej më parë; bëj një zbulim. Zbuloi një ishull të ri. Zbuloi strofkën e dhelprës. Zbuloi një gjuhë të panjohur. Zbuloi radio-aktivitetin. Zbuloi një ligj të fizikës (të natyrës).","E diktoj dikë që mundohet të fshihet a që e kërkoj; gjej diçka të fshehtë, diktoj diçka që është bërë në fshehtësi; nxjerr në shesh, marr vesh një të fshehtë. E zbuluan armikun. Zbuloi tanket (artilerinë) e armikut. Zbuloi vrasësin (vjedhësin, dëmtuesin). Zbuloi krimin (vjedhjen, tradhtinë, kurthin). E zbuloi me kohë.","fig. Arrij të marr vesh, arrij të kuptoj diçka që nuk e dija a që nuk e kisha kuptuar më parë; arrij të përcaktoj qartë diçka, duke u menduar, duke bërë analizë e duke nxjerrë përgjithësime, gjej; nxjerr në shesh. I zbuloi mendimin. Zbuloi shkakun (gabimet, dobësitë, të metat, anët e dobëta). Zbulon mundësi të mëdha. Zbuluan rrugë (metoda, mënyra) për të rritur prodhimin. Zbulon tiparet e ndryshme të heronjve.","I bëj të ditur dikujt një vendim, një çështje, një gjendje etj., i njoftoj; parashtroj, shtjelloj para dikujt. Zbuloi para botës gjendjen e vërtetë në kolonitë. * I zbuloi (i zbrazi, i hapi) barkun dikujt shih te ZBRAZ. Zbulon (zbardh, hap) dhëmbët keq. shih te ZBARDH. I zbuloi (i hapi) kartat (letrat) shih te HAP. I zbutoj rrënjët dikujt a diçkaje s'lë gjë pa mësuar për të, ia gjej të gjitha. E zbuloi veten e tregoi veten se ç'është, nuk fshihet më; demaskoi vetveten."]}]</script>
