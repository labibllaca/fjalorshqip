<script>window.__INITIAL_DATA__ = [{"slug":"doree","term":"DORË","attributes":["f.","sh."],"definitions":["Secila nga dy gjymtyrët e sipërme të njeriut, që nga supi e deri te gishtat; pjesa e fundit e këtyre gjymtyrëve që nga kyçi, e cila ka pëllëmbën e pesë gishtat dhe shërben për të prekur, për të kapur, për të marrë sendet, për të bërë punë e veprime të tjera. Dora e djathtë (e majtë). Me duar të mëdha (të vogla, të holla, të trasha, të gjata, të bardha). Me duar të forta (të shkathëta). Me duar të mbledhura grusht. Me duar të lidhura. Me dorë të lirë pa tendosur muskujt e dorës, lirshëm. Me duart plot. Duart lart! urdhër për t'u dorëzuar. Dorë burri dorë e fuqishme. Gishtat e dorës. Pëllëmba (shuplaka) e dorës. Shpina e dorës. Kurrizi i dorës. Qafa e dorës. Kyçi i dorës. Kockat e dorës. Tund (ngre, ul, shtrin, hap, mbyll) dorën. Lau (fshiu, thau, ngrohu, fërkoi) duart. Përplas duart. Shtrin (kryqëzon) duart. Ngre (çon) duart lart. I shtrëngon dorën dikujt. I puth dorën (duart). I përdredh dorën. I lidh (i zgjidh) duart. I dha (i zgjati) dorën dikujt. I kërkoi (i lypi) dorën. vjet. e kërkoi për grua. I shkau (i vajti) dora padashur. Prek (fërkon, kap, zë, merr, ngre) me dorë. Përshëndet me dorë. E kapi për dore. E shtrëngon (e tërheq) me një dorë. E shtyu me të dyja duart. Ia bën me dorë dikujt e përshëndet me dorë. Ia mori nga duart i shkoi dorën përsipër. Kap (shtrëngon) kokën me duar. Merr (mban) fëmijën në duar. I shpëtoi (i shkau) pjata nga dora (nga duart). Hedh e pret ndër duar. E ka shkruar me dorën e vet. Ishin kapur (ishin zënë) dorë për dorë (dorë me dorë).","fig. bised. Forcë pune, njeri që është i aftë të punojë (në punët bujqësore, në punë me krah etj.). krah pune. Janë shumë duar në kooperativë. Ka pesë duar që punojnë. Ushqeheshin (mbaheshin) me duart e tyre.","Kjo gjymtyrë si përfaqësuese e njeriut që kryen një veprim, që është nxitës a shkaktar i diçkaje ose si treguese e mënyrës a e mjeshtërisë me të cilën është bërë diçka; përfundimi i punës a pasoja e veprimeve të njeriut, që ka gjurmët e vetive e të cilësive të tij. Dora gjakatare (tradhtare, mizore). Dora vetë autori i vërtetë. Dora e artistit (e mjeshtrit) popullor. Është dora e tij. E njoh dorën e saj. Duket dora e gruas (e bujkut, e punëtorit). Ka dorë të mirë (mjeshtri). Vepron dora e armikut. Ka edhe ai dorë në atë punë. E kanë trazuar shumë duar. Janë futur (janë përzier) lloj-lloj duarsh. E ka prishur dorën nuk punon më me atë mjeshtëri që punonte më parë, nuk bën më punë me cilësi aq të mirë si më përpara. Nxjerr gështenjat nga zjarri me duart e botës. fj. u.","Kjo gjymtyrë si përfaqësuese e njeriut që zotëron diçka, që ka fuqinë a pushtetin mbi dikë ose mbi diçka; njeriu vetë si zotërues a pronar ose e drejta e tij për të zotëruar, për të urdhëruar, për të vepruar etj. (edhe në disa togje frazeologjike). Dorë e hekurt (e fortë), libr. a) drejtues i aftë a udhëheqje e zonja, që nuk lejon lëshime e çrregullime; pushtet i fortë; b) sundim i ashpër a diktaturë e egër, despotizëm. Dora e drejtësisë fuqia vepruese e ligjit dhe e organeve të drejtësisë. Dora e qeverisë. bised. forca vepruese e pushtetit. Ndërroi dorë ndërroi pronar. Shtrin (zgjat) dorën diku përpiqet të shtrijë sundimin. E hodhi (e vuri, e shtiu, e futi) në dorë dikë a diçka a) u bë pronar i diçkaje, u bë zot i saj; b) e bëri dikë që t'i jepet. Shtiu në dorë qytetin (kështjellën) e pushtoi. I ra në dorë dikush a diçka a) iu dha, iu dorëzua dikush; b) u bë e tij diçka. Është në dorë (në duar) të dikujt varet krejtësisht prej dikujt, është nën urdhrat a nën pushtetin e tij, e ka në dorë ai. E ka në dorë dikë e ka nën urdhrat e tij, është i varur krejtësisht prej tij, bën si të dojë vetë me të. I vjen në dorë dikush e sjell rasti t'ia ketë nevojën, të varet prej tij ose t'i tregojë forcën a aftësitë e tij. S`e kam në dorë unë diçka s'varet prej meje, është jashtë mundësive a fuqive të mia. S`e ka në dorë veten bën veprime të pandërgjegjshme pa e kuptuar se si; s'e zotëron dot veten, s'përmbahet. E merr veten (situatën) në dorë. I bashkoi (i përqendroi) forcat në një dorë i përqendroi forcat te një njeri, në një vend. I ka dokumentet në dorë. I mbeti në dorë tërë pasuria. Kaloi nga dora në dorë (nga një dorë në një tjetër). Ka kaluar në shumë duar (duar me duar). Ka rënë në duar të mira (të këqija, të liga, të huaja). E mori punën në duart e veta filloi të merret vetë me një punë e të vendosë vetë për të. E mori pushtetin në duart e tij. Pushteti kaloi në duart e klasës punëtore. Gjithçka është në dorën tonë gjithçka varet nga ne. E kemi vetë në dorë ta zgjidhim.","fig. Ndihmë a përkrahje që i jepet dikujt për të bërë diçka që ai nuk e përballon dot vetë; kujdes a mbrojtje për dikë që është më i vogël, më i dobët etj. (edhe në disa togje frazeologjike). Me dorë të huaj. E ndjeu dorën e shoqërisë (e prindërve). I dhanë dorën e ndihmuan, e përkrahën. I dhanë një dorë dhe e nxorën nga balta. T'i japim të gjithë nga një dorë! I ka hedhur dorën dikujt e ndihmon, kujdeset për dike. I jep dorë (në punë) e ndihmon. E ka lënë dikë a diçka në dorë (në duar) të dikujt ia ka lënë a ia ka besuar për t'u kujdesur për të a për ta mbrojtur. E ka lënë në dorë të fatit dikë a diçka nuk kujdeset a s'pyet fare për të, e ka braktisur fare.","Punë që bën njeriu njëherësh për diçka; njëra nga radhët a ndarjet e një pune ose të një lojë, që bëhet pjesë-pjesë. Dora e parë (e dytë, e tretë...). Punim në dorë të parë. I dha një dorë. I dha dorën e fundit e kreu përfundimisht, e përfundoi. I ka kaluar dy duar. Ka (ndan) dorën. Luajti në dorën e dytë (me letra). Bënë një dorë letra. Mbaruan tri duar domino. I humbi të gjitha në dorën e fundit.","Tërësi sendesh, prodhimesh, të ardhurash etj. që merren njëherësh, që përdoren a që shfrytëzohen në të njëjtën kohë etj. Dorë e pasur. Dora e parë e të korrurave (e prodhimit, e grurit, e panxharit). Mbjell (vjel) në dy (tri) duar. Mori një dorë të mirë të hollash.","Sasi afërsisht sa nxë një grusht njeriu, dorëz, grusht; sasi sa mund të kapim a të marrim me të gjithë gishtat. Një dorë oriz (grurë). Një dorë kripë (sheqer). Nja dy duar lesh. Mbledh një dorë bar.","përd. përem. (me numërorin themelor një). Pak; shumë pak. Një dorë miell (kripë). Një dorë muhabet.","Doreza e një mjeti, e një vegle etj.; vegjë, vesh; vegël a pjesë vegle në trajtë të pëllëmbës ose të grushtit. Dorë e metaltë. Dora e shpatës. Dora e kazanit. Dora e havanit shtypësi.","Përdoret si gjymtyrë e dytë, zakonisht në rasën rrjedhore pa parafjalë, në disa togfjalësha që tregojnë diçka të bërë me dorë, një mjet a vegël që vihet në lëvizje me krah, që mbahet në dorë etj. Punë dore a) punë a sende që bëhen me dorë, jo në fabrikë (sidomos ato që bëjnë gratë me gjilpërë, me shtiza e grep); b) lëndë mësimore në shkollë që u jep nxënësve njohuri për këto punë. Shkrim (shkronjë) dore. Bombë (granatë) dore. Llambë (thikë, pompë, karrocë, sharrë) dore. Frena (levë) dore. Shami (çantë, orë) dore. Penj dore penj për të qepur me gjilpërë e jo me makinë. Top dore. Lojërat me dorë. sport. lojërat që luhen me top jo me këmbë (si p.sh. basketbolli, volejbolli dhe hendbolli).","bised. Dëftesë; shënim. Mori një dorë. I dha (i lëshoi) një dorë për të hyrë në klasë.","fig. Cilësia a vlera e diçkaje; shkalla që zë nga rëndësia, nga vetitë etj. diçka (edhe në disa togje frazeologjike). Miell i dorës së parë miell shumë i mirë, i një cilësie të lartë. Me rëndësi të dorës së parë me rëndësi të madhe, kryesore. Luan rol të dorës së dytë nuk luan rol kryesor. Është i dorës së dytë nuk është i cilësisë së lartë. I dha rëndësi të dorës së fundit.","bised. Shtresë shoqërore e caktuar ose grup njerëzish që kanë një gjendje shoqërore e ekonomike; tërësi njerëzish me veti, me sjellje etj. pak a shumë të njëjta; shkallë, sërë. Njerëzit e dorës së ulët. Është i dorës sonë. Është nga dora jonë. Janë të një dore.","Pjesa e fundit (putra me gishta) në gjymtyrët e përparme të majmunëve. Dora e majmunit (e gorillës, e shimpanzesë). * Nën dorë keq. fshehurazi dhe jo sipas rregullave të zakonshme të tregtisë (për shitjen e blerjen e diçkaje). Këso dore a) në këtë mënyrë; b) i këtij lloji, i kësaj trajte. Me të dy (me të dyja) duart a) pa kufi, shumë; me bujari, pa u kursyer, sa të mundet; b) me gjithë zemër, me gjithë qejf, me shumë dëshirë. Me armë në dorë shih tek ARM/Ë,~A. Sa i arrin dora sa të mundet, me sa fuqi që ka. S'më arrin dora shih tek ARRIJ. Bën dorë ia fillon punës për diçka, nis një punë. S'më bën dora më dhimbset a më vjen keq ta bëj diçka a ta prek; nuk kam dëshirë ta bëj diçka. I ra në dorë a) diçka e gjeti rastësisht diçka, i erdhi, i qëlloi ta ketë a ta shohë; b) dikush e solli rasti që mund të bëjë ç'të dojë me dikë. I bukuri i dorës (i unazës) bised. shih te BUKUR,~I (i). Më doli nga dora (dore, duarsh) a) diçka nuk e kam me timen diçka, më iku nga dora; b) dikush më shpëtoi nga kontrolli, ka marrë rrugë të gabuar, është bërë i keq. Dorë me dorë duke kaluar nga njëri tek tjetri varg. Dorë për (me) dorë bashkë, krah për krah, të pandarë. Dorë për dorë hëpërhë, tani për tani, përkohësisht. Dorë pas dore herë pas here. Dora e djathtë e dikujt shih te DJATHTË (i, e). Me dorë të dridhur shih te DRIDHUR (i, e). I dorës së fundit shih te FUNDIT (i, e). Në dorë të fundit shih te FUNDIT (i, e). Me dorën në kobure shih te KOBUR/E,~JA. Me dorë të lëshuar shih te LËSHUAR (i, e). Me duar lidhur shih te LIDHUR. Me duar të lira shih te LIRË (i, e). Me dorë në qafë shih te QAF/Ë,~A. Në dorën tënde si të duash ti, si të mendosh a si të kesh ti dëshirë. Dora vetë (shkurt. d.v.) zyrt. shënim që vihet në kopjet e një shkrese pranë emrit të titullarit, kur ky ka nënshkruar vetëm origjinalin. Me dorë në zemër (me zemër në dorë) a) me drejtësi, pa anësi; b) me dhembshuri; me keqardhje; c) bujarisht; me ngrohtësi; çiltërisht; d) me frikë se mos ndodhë a bëhet diçka, me ankth; me padurim; dh) me përulje. I dridhet dora a) nguron, s'është i vendosur, tutet të bëjë diçka; b) lëkundet, nguron, mezi e nxjerr a mezi e jep (kur paguan ose kur fal diçka). Fërkon duart (barkun) keq. shih te FËRKOJ. Fut duart diku keq. shih te FUT. Hodhi dorë shih te HEDH. Heq dorë nga dikush a nga diçka shih te HEQ. I holloi duart (së fërkuari) iron. shih te HOLLOJ. I hyri dorë dikujt a diçkaje shih te HYJ. I iku (i shpëtoi) nga dora (nga duart) shih tek IKI. I iku nëpër duar shih tek IKI. Jap dorën shih te JAP. I dha duart dikujt shih te JAP. Ia jap në dorë diçka (dikujt) shih te JAP. Ka dorë keq. a) e ka zakon të rrahë a të qëllojë të tjerët; b) vjedh. E kam në (nëpër) duar diçka po përgatit diçka, po e punoj, po merrem me të, nuk e kam përfunduar. I kap dora shih te KAP. Me këmbë e me duar shih te KËMB/Ë,~A. Në këmbë e në dorë (në duar) shih te KËMB/Ë,~A. Ia ktheu dorën shih te KTHEJ. Nuk kthen dorë edhe poh. shih te KTHEJ. I lau (i fshiu) duart nga dikush a nga diçka shih te LAJ. Me laps (me kalem) në dorë shih te LAPS,~I. Larg duart nga... (një vend)! libr. mos ndërhyni atje, largohuni e mos e prekni (kundër pushtuesve e agresorëve). Ia lehtësoi dorën dikujt shih te LEHTËSOJ","E la dora shih te LË","E lë në dorë të dikujt lë dikë të veprojë si të dojë, e lë të vendosë për diçka. E lë pas dore nuk kujdeset a nuk shqetësohet më për të, e lë mënjanë a e lë në harresë. Lëshoi dorë kundër dikujt shih te LËSHOJ. E lëshon dorën shih te LËSHOJ. E lëshoi dore dikë shih te LËSHOJ. E lëshoi në dorë të dikujt a) bëri që ta kapë dikush, ia dorëzoi; e tradhtoi dikë; b) ia la dikujt në dorë një çështje, ia besoi atij. S'e lëshon (s'e lë, s'e heq) nga dora diçka a) e marr me kujdes, zakonisht për të mos e humbur; e mban përgjithmonë diçka që ka arritur, që ka fituar etj.; b) e mban gjithmonë me vete diçka, e përdor vazhdimisht, merret me të gjithmonë. Lidh (kryqëzon) duart shih te LIDH. Ia ka lidhur duart (krahët) shih te LIDH","Iu lidhën duart (krahët) shih te LIDHEM. E liroi dorën shih te LIROJ. Luaji duart! shih te LUAJ","I ka lyer duart në diçka shih te LYEJ. Ia leu dorën (duart) dikujt keq. shih te LYEJ. Ia marr dorën (krahun, anën) një pune shih te MARR. I marr dorën dikujt shih te MARR. Ia mori nga duart dikujt ia rrëmbeu dikë a diçka një tjetri para syve. Mbaj dorën shih te MBAJ. Mbaje dorën! shih te MBAJ","Ia mbaj dorën dikujt shih te MBAJ. Mbaj në dorë shih te MBAJ. Të mbetet (të ngelet) në dorë (ndër duar) dikush a diçka a) është shumë i dobët, është aq i sëmurë sa mezi mbahet; b) është i një cilësie aq të keqe sa ke frikë ta përdorësh, mund të dëmtohet a të prishet menjëherë, është shumë i brishtë; c) i bie vlera e s'ke ku ta përdorësh, s'të hyn më në punë. I mëshoi dorës mbi dikë shih te MËSHOJ. I ndal dorën shih te NDAL. I ndej dorën shih te NDEJ. Nuk e ndyj (nuk e fëlliq) dorën me dikë shih te NDYJ. Ngre (çon) dorë (dorën) kundër dikujt a diçkaje shih te NGRE. I ngjit dorën (krahun) dikujt shih te NGJIT 1. Nxjerr nga dora (nga duart) prodhoj a krijoj diçka me dorën time. Ia njomi (ia lagu) dorën dikujt shih te NJOM. Ora me dorë (ora me një) shih tek OR/Ë,~A 1. Me para në dorë duke i paguar të hollat aty për aty. I plasi në duar (në dorë) diçka i dështoi një plan kur s'e priste, nuk arriti ta vërë në jetë; iu zbuluan papritur qëllimet e synimet. Të puth dorën! iron., tall. shih te PUTH. I puth dorën (pëqirin, gjunjët, këmbët, këmbë e dorë) dikujt keq. shih te PUTH. I qiti në dorë diçka i dha a i dërgoi dikujt para, dhurata, ryshfet etj. E rëndoi dorën mbi dikë shih te RËNDOJ. I shkau nga duart (nga dora) dikush a diçka shih te SHKAS. Ia shkurtoi (ia preu) dorën (duart) dikujt nuk e la të veprojë (një vjedhës, një keqbërës etj.), e ndaloi menjëherë. I shkurtoi (i preu, i thau) duart (dorën, krahët) a) e dëmtoi rëndë, i prishi shumë punë; b) e la në gjendje shumë të vështirë, pa ndihmë e pa përkrahje. I shpëlau (i lau) duart nga dikush shih te SHPËLAJ. E shtrëngoi (e rrudhi) dorën shih te SHTRËNGOJ. I shtrëngoj dorën dikujt shih te SHTRËNGOJ. I shtriu (i zgjati) dorën dikujt shih te SHTRIJ. Iu thanë duart shih te THAHEM. T'u thaftë dora! mallk. shih te THAHEM","Me thonjtë e duarve shih te THUA, THOI. Thyej dorën shih te THYEJ. Të thyhet në dorë është shumë i brishtë, është delikat. Vë dorë mbi dikë a mbi diçka a) ndërhyn për të vënë diçka në rregull, ndihmon që të përmirësohet një gjendje etj.; b) keq. e ngacmon dikë; e rreh; c) keq. merr diçka që s'është e tij, vjedh; e prek; e trazon. Më vjen dora a) fitoj shkathtësi për të përdorur diçka me dorë, për të gjuajtur në shenjë etj.; b) më shkon mbarë (në lojën me letra). I vjen (i shkon) për dore (ndoresh) ka aftësi a shprehi ta bëjë mirë e shpejt diçka, e ka të lehtë, i jepet për një punë. Zunë dorë shih te ZË. S'e zë (s'e kap) me dorë diçka nuk merret fare me një punë; nuk e mëson, s'e përgatit (një mësim), s'e prek fare. I zgjidh duart dikujt shih te ZGJIDH. U bë një dorë (një grusht) njeri u mblodh kruspull, u bë sa një grusht, u rrudh (nga hallet, nga frika, nga të ftohtët etj.); u dobësua shumë, u tret (nga sëmundjet). S'bëhet dora topanxhë fj. u. shih tek TOPANXH/Ë,~A. U bë këmbë e dorë shih te KËMB/Ë,~A. Duket (shihet) si në pëllëmbë të dorës shih te PËLLËMB/Ë,~A. I ka futur duart deri në bërryl keq. shih te BËRRYL,~I. Me hanë duart (për punë) shih te HA","Ha duart (veten) me dhëmbë shih te DHËMB,~I. I iku (i shpëtoi) zogu nga dora shih te ZOG,~U. Është dora vetë a) është po ai njeri, po i njëjti, jo tjetërkush; b) për diçka është shumë i zoti a i aftë për diçka, është i vetmi për të bërë një gjë, s'i gjendet shoku. Janë si gishtat e dorës shih te GISHT, ~I. I dha (i la) dorë të lirë dikujt shih te LIRË (i, e). Ia dha këpucët (opingat) në dorë mospërf. shih te KËPUC/Ë,~A. Ia dha leckat në dorë dikujt mospërf. shih te LECK/Ë,~A. Ia dha nderin në dorë (në grusht) dikujt shih te NDER,~I. Ia dha veshët (flokët, leshrat) në dorë shih te JAP. I ka duart flori nxjerr punë të një cilësie të lartë; është i zoti për çdo punë, i zë dora çdo gjë. E ka dorën grusht shih te GRUSHT, ~I. E ka dorën të gjatë (i ka duart të gjata) keq. shih te GJATË (i, e). I ka duart me kallo shih te KALLO, ~JA. Ka dorë (e ka dorën) të lehtë shih te LEHTË (i, e)10. I ka duart të lidhura (të zëna) shih te LIDHUR (i, e). Ka dorë të lirë (i ka duart të lira) shih te LIRË (i,e). E ka dorën të lire shih te LIRË (i, e). Ka dorë të mbarë shih te MBARË (i, e)4. Ka dorë (e ka dorën) të rëndë shih te RËNDË (i, e). I ka duart të shkurtra shih te SHKURTËR (i, e). I ka duart (këmbët) të shpenguara shih te SHPENGUAR (i, e). E ka dorën të shpuar shih te SHPUAR (i, e). I ka duart të thara përb. shih te THARË (i,e)","E ka dorën të thatë shih te THATË (i, e). Sa të kem këmbë e dorë (e duar) shih te KËMBË, ~A. E kam (e njoh) në pëllëmbë të dorës shih te PËLLËMB/Ë,~A. E kapën (e zunë, e gjetën) me presh në dorë (me duar në presh) shih te PRESH,~I. S’kapet qielli me dorë fj. u. shih te QIELL,~I. Sikur ka kapur (ka zënë, ka rrokur) qiellin me dorë iron, shih te QIELL, ~I. Kërkoftë murin me dorë! mallk. shih te MUR,~I. E la me duar në gji shih te GJI,~RI. Ia la lëpendrat në dorë dikujt shih te LËPEND/ËR,~RA. U lidh këmbë e duar shih te LIDHEM. Nuk luan as gishtin e dorës (e këmbës) shih te LUAJ. Sa t'i luajë këmba e dora shih te KËMB/Ë,~A. I ka lyer (i ka bërë) duart me gjak shih te GJAK,~U 1. Mban barkun me dorë shih te BARK,~U. Mbaj barkun (brinjët, ijët) me dorë shih te BARK,~U. E mban në pëllëmbë (në shuplakë) të dorës dikë shih te PËLLËMB/Ë,~A. Mbeti me duar në gji shih te GJI,~RI. Ngriti (çoi) duart (lart, përpjetë) shih te NGRE. Numërohen me gishtat e dorës shih te GISHT, ~I. E nxori (e përcolli, e qiti) me duar thatë (me duar bosh, me duar zbrazur) shih te THATË","I plasi bomba në duar shih te BOMB/Ë,~A. I plasi (i shpërtheu) mina ndër duar shih te MIN/Ë,~A. Rri me duar në ije (në mes, në brez, në bel, në gji, në xhepa) shih tek IJ/E,~A. Rri me duar kryq rri pa punë, nuk bën asgjë, nuk zë punë me dorë; bën sehir. S'i rrinë duart (rehat) a) s'mund të rrijë pa bërë një punë, pa u marrë me diçka; b) trazon shumë, është trazovaç. I rri me hanxhar në dorë shih te HANXHAR,~I. Rri me dorë në xhep shih te XHEP,~I. I shpëlau duart nga kazma (nga lopata, nga çekani, nga bishti i lopatës) iron. shih te SHPËLAJ. I shpëton shparca nga duart shih te SHPARC/Ë,~A. (Si) iu thanë duart dhe (që) s'e bëri diçka shih te THAHEM. (Si) s'iu thanë duart, po (kur, që, dhe) e bëri diçka shih te THAHEM. Të thyen arrën në dorë shih te THYEJ. I ka vënë duart (shkelmin, këmbën) në fyt (në grykë, në gjoks) dikujt shih te SHKELM,~I. Për të vënë duart në kokë shih te KOK/Ë,~A. Vë dorën (gishtin) në plagë shih te PLAG/Ë,~A. Vë dorën në zemër për dikë shih te ZEM/ËR,~RA. I vë (i lë) zemrën në dorë i jap besim të plotë, i besoj plotësisht për gjithçka. Vë (fut) duart (dorën) në zjarr (në prush) për dikë shih te ZJARR, ~I. Vjen me duar plot shih te PLOT. Vjen (shkon) me duar në xhepa shih te XHEP,~I. Vjen (kalon) me urë (me pishë) në dorë shih tek UR/Ë,~A II. Zë brinjët me duar shih te BRINJ/Ë,~A. I zë dora (çdo gjë) shih te ZË. Nuk zë gjë me dorë nuk punon fare, është dembel. Zë kokën me dorë shih te ZË. S'e zë (s'e kap) njeri me dorë (për bishti) shih te ZË. E zunë me pelë për dore shih te PEL/Ë,~A. Fug peshën e fsheh dorën shih Hedh gurin e fsheh dorën te HEDH. Hedh gurin e fsheh dorën shih te HEDH. Po i dhe (po i zgjate) gishtin, të merr (të rrëmben) dorën shih te GISHT,~I. Po i dhe (po i zgjate) dorën, të merr (të rrëmben) krahun shih Po i dhe (po i zgjate) gishtin, të merr (të rrëmben) dorën te GISHT,~I. Dy duar për një kokë (janë) secili i del vetë zot vetes së tij, çdo njeri është në gjendje të mbrojë vetveten. T'i lë këmbët e arushës në dorë shih tek ARUSH/Ë,~A. Ia merr pula bukën nga dora mospërf. shih te BUK/Ë,~A. Nuk mbahen dy kunguj (dy shalqinj) në një dorë (nën një sqetull) fj. u. shih te KUNGULL, ~I. E mban dorën (gishtin) në çark të pushkës shih te ÇARK,~U. Ka në dorë të gjithë gurët shih te GUR,~I. Ka në dorë edhe gurin edhe arrën shih te GUR,~I. Të jep ujë me shpinë të dorës shih Të jep ujë me bisht (me shpinë) të lugës te BISHT,~I. Shkund me duar e shtyp me këmbë bën diçka të dobishme, por vetë e prish menjëherë; e mbush kusinë dhe pastaj e derdh me një shkelm. E jep me dorë dhe e merr me këmbë e jep diçka me bujari dhe e merr me vështirësi të madhe (thuhet kur një njeri s'është mirënjohës e s'ta kthen vetë huan a sendin që i ke dhënë). Syri plot e dora thatë shih te SY,~RI. Ç'i zë (ç'i sheh) syri ia bën (ia zë) dora shih te SY,~RI. Kur ka mashën, pse të djegë dorën? fj. u. shih te MASH/Ë,~A","Ka (kërkon të ketë) njërën dorë në bakllava dhe tjetrën në revani (në mjaltë, në kabuni) keq. ka gjithë të mirat, s'heq dorë nga asnjë e mirë a kënaqësi. Vezët në shportë e shportën në dorë! fj.u. shih te SHPORT/Ë,~A. Vrau veten me dorën e tij shih te VRAS. Njëra dorë lan tjetrën, të dy-ja lajnë fytyrën (faqet) fj. u. duke ndihmuar njëri-tjetrin bëhen mirë të gjitha punët. Mbaje (ruaje) zogun sa e ke në dorë! fj. u. shih te ZOG,~U. Asnjë s'të kruan si dora jote fj. u. shih te KRUAJ. Për çdo punë puth dorën e tij shih te PUTH. Në njërën dorë kazmën dhe në tjetrën pushkën shih te KAZM/Ë, ~A. Qerre dore vjet. shih te QERR/E, ~JA."]}]</script>
