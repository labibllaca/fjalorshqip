<script>window.__INITIAL_DATA__ = [{"slug":"lesee-i","term":"LESË I","attributes":["f.","sh."],"definitions":["Vegël bujqësore, që bëhet me disa drurë, të thurur me thupra e zakonisht me kunja të vegjël nga poshtë dhe që përdoret për të copëtuar plisat, për të shtruar dheun ose për të mbuluar farën në arë; trinë. Lesë e lehtë (e rëndë). Lesë druri (hekuri). I shkoi (i hoqi) lesën e lesoi. Merr lesë mund të lesohet. Rri mbi lesë.","Derë e vogël e thurur me thupra për të mbyllur vathën a ndonjë shteg tjetër kalimi; gardh thuprash për të rrethuar diçka; trinë. Lesa e kasolles (e oborrit, e vathës, e gardhit). E mbyllin shtegun me lesë. I rrethojnë pemët me lesa.","Thurimë me purteka, me kallama të hollë ose me kashtë që përdoret për të nderë gjëra të ndryshme mbi të, për të mbuluar diçka etj.; trinë e thurur rrallë, mbi të cilën rrahin me shkop kallinjtë e misrit kur i shkoqin. Lesë druri (kashte). Lesë duhani. Lesë tavani. Lesë për të zënë peshq. E mbuloi me lesë. E shkoqnin misrin në lesë. I ndejnë fiqtë në lesë për t’i tharë.","Tezgë, zakonisht prej thuprash, që përdoret për të mbartur pleh, kashtë etj.; vig.","Lloj saje që shërben për të mbartur diçka, duke e tërhequr mbi borë, rrëshqitëse. Lesë bore. * U bë lesë u bë tapë. E bëri për lesë dikë e rrahu fort, e shqepi në dru, e bëri për vig. I bëri (i thuri) lesa dikujt i bëri një kurth, i ngriti grackë. E vuri (e futi) në lesë dikë e futi në kurth, e futi në grackë. I vuri lesë dikujt a diçkaje e ndaloi, e pengoi, ia preu hovin, i vuri gardh. I vuri lesën diçkaje e mbylli një çështje, i vuri kapak. Për çdo derë (për çdo shteg) ka një lesë nuk ka të metë a dobësi që nuk mund të ndreqet, çdo të keqeje a plage i gjendet ilaçi."]}]</script>
