<script>window.__INITIAL_DATA__ = [{"slug":"ojee-i","term":"OJË I","attributes":["f.","sh."],"definitions":["Veprimi sipas kuptimeve 1 e 2 të foljes LUAJ. Loja me top. Loja me letra. Ndalohet loja në rrugë.","Tërësia e lëvizjeve dhe e veprimeve të tjera që bëjnë ata që luajnë (në kuptimin 1 e 2); ndeshje sportive; lloji i mënyrave dhe i mjeteve që përdorin ata që luajnë; mënyra si luan dikush. Lojë e bukur (argëtuese, edukuese). Lojërat popullore. Lojëra sportive. Lojërat ballkanike (olimpike). Lojëra për fëmijë (për të rinj). Loja e futbollit (e basketbollit, e shahut). Pjesa e parë e lojës. Gjyqtari i lojës. sport. Edukimi i fëmijëve nëpërmjet lojës. Mori pjesë në lojë. E fitoi (e humbi) lojën. I pëlqen loja. Është dhënë pas lojës.","Send a tërësi sendesh që përdorim për të luajtur, lodër. Lojëra fëmijësh. Bleu lojëra të reja.","art. Veprimet e lëvizjet që bën një aktor kur luan një rol në skenë; mënyra si e luan rolin e tij; mënyra si luhet një pjesë a një vepër muzikore. Loja skenike (teatrale). Lojë e shkathët. Loja e aktorit (e artistit).","fig. Sjellje e shtirur e veprime dredharake për të mashtruar të tjerët; diçka që organizohet me dredhi për t'ia hedhur një njeriu ose për t'u tallur me të; shaka. Lojë e rrezikshme. I luajti një lojë. Mos i bëj lojëra! E ka për lojë. Bëri lojë me dikë u tall; bëri shaka me të.","usht. vjet. Stërvitje luftarake, që kryhej nga forcat ushtarake të njësive të ndryshme sipas një plani të organizuar për të arritur një qëllim të caktuar. Lojë luftarake (operative). Loja e trupave.","Tërësia e veprimeve që kryhen nga forcat e sigurimit të shtetit, nga zbuluesit etj. për të mashtruar kundërshtarin, për të shpëtuar prej tij a për të fituar kundër tij. Hyri (mori pjesë) në lojë.","fig. Këmbim i shpejtë i njollave të dritave, të ngjyrave etj.; ndryshimi i shpejtë e i shpeshtë a i përsëritur i diçkaje. Lojë dritash. Loja e flakëve. Loja e çmimeve të tregut. Loja e bursës. * U bë lojë e dikujt e tallin a e qeshin të tjerët, u bë gazi i botës. Bën lojën e dikujt a) shtiret për të ngatërruar të tjerët, bën veprime mashtruese për t'ia hedhur dikujt; b) sillet e vepron si ia do puna një tjetri, është vegël e dikujt. Doli nga loja u largua nga një punë e vështirë, e rrezikshme a e ndërlikuar, doli nga vallja. Hyri në lojë hyri në një punë të vështirë, të rrezikshme a të ndërlikuar, hyri në valle. E humbi lojën shih te HUMB. Lojë fëmijësh punë shumë e thjeshtë, që kryhet fare lehtë. Lojë fjalësh diçka që thuhet për shaka a për qëllime të tjera, duke përdorur fjalë që tingëllojnë njësoj a në mënyrë të ngjashme, por që kanë kuptime të ndryshme; fjalë që thuhen sa për të kaluar radhën dhe që nuk i japin zgjidhje a përgjigje të vërtetë një çështjeje. Luan lojën (lodrën) e dikujt shih te LUAJ. E vuri në lojë (në lodër) dikë e talli, e qesëndisi. Bën lojën e strucit libr. shih te STRUC,~I."]}]</script>
