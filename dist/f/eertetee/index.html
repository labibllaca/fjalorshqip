<script>window.__INITIAL_DATA__ = [{"slug":"eertetee","term":"ËRTETË","attributes":["f.","sh."],"definitions":["Diçka që është e vërtetë, ajo që përputhet me realitetin; fakt a diçka tjetër që nuk mund të hidhet poshtë, që nuk mund të mohohet, që është vërtet i tillë; diçka që është e sigurt dhe e saktë; kund. gënjeshtër. E vërtetë e pamohueshme. Tha (tregoi) të vërtetën. Mbroj të vërtetën. E mbuloi (e fshehu, e shtrembëroi) të vërtetën. Si është e vërteta? E nxori në shesh të vërtetën. Doli në shesh e vërteta. Ia tha të vërtetën në sy. Më mirë një e vërtetë e hidhur se një gënjeshtër e ëmbël. fj.u.","Gjendja reale, kushtet e vërteta që na rrethojnë; realiteti objektiv. E vërteta në jetë. Përshkruan të vërtetën.","filoz. Dije që e pasqyron drejt realitetin objektiv në ndërgjegjen e njerëzve, dije që përputhet me realitetin dhe është provuar në praktikë. E vërteta absolute dije e plotë, e gjithanshme dhe përfundimtare për realitetin objektiv, që nuk ndryshon me zhvillimin e mëtejshëm të dijeve dhe të praktikës. E vërteta objektive dije që përputhet me realitetin objektiv, që nuk varet nga subjekti dhe është vërtetuar nga praktika. E vërteta relative dije objektivisht e drejtë për realitetin, po jo e plotë, që me kalimin e kohës saktësohet, bëhet më e thellë e më e plotë.","Ide a tezë që shtjellohet ose që arrihet nga një shkencë e caktuar, që pasqyron drejt realitetin objektiv dhe vërtetohet nga praktika e nga përvoja e njeriut; gjykim a mendim i shëndoshë që përputhet me realitetin ose me faktet reale. E vërteta historike. E vërteta matematike.","Diçka që është e drejtë, e mirë dhe në përputhje me moralin, ajo nga e cila njeriu duhet të udhëhiqet në punën dhe në veprimet e tij; e drejta. Rruga e së vërtetës rruga e drejtë, rruga që të çon drejt së mirës e së drejtës. Jeton (rron) me të vërtetën jeton ndershmërisht, me drejtësi. Shkoftë kohë e shkoftë mot, e vërteta del më not. fj.u. e vërteta del kurdoherë në shesh. * Me të vërtetë vërtet. Ç’është e vërteta (e drejta...) fj. ndërm. përdoret për të theksuar atë që thuhet, me kuptimin «në të vërtetë, pa dyshim; sigurisht». Të them (të themi) të vërtetën fj. ndërm. përdoret për të theksuar më shumë vërtetësinë e asaj që thuhet, me kuptimin «sigurisht, vërtet». E shikon të vërtetën në sy i vlerëson gjërat ashtu siç janë, i sheh gjërat drejt. Ia tha të katër të vërtetat në sy ia tha gjërat hapur, nuk i fshehu asgjë, ia tha copë të gjitha."]},{"slug":"eertetee","term":"ËRTETË","attributes":["mb."],"definitions":["Që përputhet me gjendjen e gjërave ashtu siç janë, që i përgjigjet realitetit objektiv, që e paraqet diçka ashtu siç është në jetë; që nuk të ngjall asnjë dyshim, i sigurt e i saktë; që përmban në vetvete të vërtetën, që mbështetet në të vërtetën; kund. i gënjeshtërt; i rremë. Lajm i vërtetë. Ngjarje e vërtetë. Tregim i vërtetë. Emri i vërtetë. Është e vërtetë. Tregoi fytyrën e vërtetë.","Që i përmbahet fort asaj që thotë, besnik gjer në fund ndaj dikujt a diçkaje, i hapur, i çiltër e i vendosur; i tillë siç duhet të jetë, që përbën në vetvete shembullin më të mirë të diçkaje, jo i shtirur; i drejtë; kund. i rremë. Revolucionar i vërtetë. Burrë (njeri) i vërtetë. Mik i vërtetë. Unitet i vërtetë. Miqësi (dashuri) e vërtetë. Kjo është rruga e vërtetë.","Që ka të gjitha vetitë a cilësitë e duhura; i pastër, i thjeshtë; natyror. Ar i vërtetë. Qelibar i vërtetë. Verë e vërtetë. Lesh i vërtetë.","Që vjen nga një burim i njohur, që është siç është bërë në fillim, jo i kopjuar, origjinal. Dorëshkrimi i vërtetë. Dokument i vërtetë. Tabloja e vërtetë e piktorit.","Që është provuar shkencërisht a që është vërtetuar nga praktika. Teori e vërtetë. Përfundim i vërtetë. * Në kuptimin e vërtetë të fjalës shih te FJAL/Ë,~A."]}]</script>
