<script>window.__INITIAL_DATA__ = [{"slug":"varem","term":"VAREM","attributes":["vetv.","pës."],"definitions":["Kapem në një degë, në një litar a në diçka tjetër dhe qëndroj pa u mbështetur poshtë, mbahem diku lart dhe rri pezull. U var në një pemë (në një degë). U varën në hekur.","Var veten me litar a me diçka tjetër.","Kapem pas dikujt a pas diçkaje, që është zakonisht në lëvizje, qepem a mbështetem. Varem pas makinës (pas traktorit). Iu var në sup (në krah). Iu var në qafë.","Ulem poshtë, përkulem; vet. veta III lëshohet diçka poshtë, rri varur. Varem mbi pus (mbi ujë). Mos u varni në dritare (jashtë dritares). U var mbi mua. I varen këmbët (krahët). Iu var koka. Iu varën rrobat. Iu var fustani mënjanë. Iu varën faqet.","Shkoj nga një vend më i lartë në një vend më të ulët, ulem tatëpjetë, zbres; fundosem, bie më poshtë. U varën shkallëve. U var malit (kodrës). Po varet dielli. U varën retë. U var bagëtia. U varën nga shkëmbi me litar. U varën poshtë (tatëpjetë). U var toka.","fig. Jam nën varësinë a nën urdhrat e dikujt, përgjigjem para tij për diçka, i marr urdhrat e udhëzimet prej dikujt; vet. veta III është në dorë të dikujt. Varet nga ministria. Varet kokë e këmbë (tërësisht) nga të tjerët.","fig. I vardisem dikujt, i qepem; i bëhem barrë. Iu var prindërve.","vet. veta III fig. Kushtëzohet nga diçka, përcaktohet. Andej varet suksesi. Nga kjo varet shpëtimi (çlirimi). Nga këto kushte varet zhvillimi i ekonomisë. Varet nga puna që do të bëjë (nga vullneti që ka, nga kushtet e rrethanat). Varet nga mosha. Kjo s'varet prej meje.","fig. Shpresoj, kam besim ose mbështetem te dikush a te diçka. Varej tek i vëllai. Varej pas fjalëve të tij.","vet. veta III gjuh. Ka varësi gramatikore, është si gjymtyrë e varur. Varet nga fjalia kryesore.","Pës. e VAR 1-3. * Po i varet koka dikujt po dremit, po kotet, po e zë gjumi. I janë varur mustaqet iron. shih te MUSTAQE,~T. I varet në qafë dikujt shih te QAF/Ë~A. Varet (mbahet) në një qime shih te QIM/E,~JA. M'u var zëri e humba zërin; u ngjira. S'kishte ku i varej trasta ishte shumë i varfër, ishte i mjerë. Varet (qëndron) në fije (në fill) të perit (të flokut) shih te FIJ/E~A. Iu var (i mbeti) samari nën bark dikujt shih te SAMAR,~I. Çdo mish (berr) varet nga këmbët e veta (në çengelin e vet) fj.u. shih te MISH,~I. I qan hallin kalorësit se i varen këmbët shih te KALORËS,~I."]}]</script>
