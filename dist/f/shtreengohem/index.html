<script>window.__INITIAL_DATA__ = [{"slug":"shtreengohem","term":"SHTRËNGOHEM","attributes":["vetv."],"definitions":["Mblidhem e ngjishem pas dikujt a pas diçkaje, afrohem shumë te dikush a te diçka; pushtoj fort dikë a diçka duke iu ngjeshur pas, i afrohem e i ngjitem. U shtrëngua pas s`ëmës (pas murit). Shtrëngohuni edhe pak!","Lidhem a mbështillem fort me diçka rreth trupit. Shtrëngohem me brez (me rrip, me litar). Shtrëngohej me korse.","Mbledh muskujt që t`i jap forcë trupit, i jap fuqi (kur bëj diçka të rëndë a të vështirë). Shtrëngohet, po s`del dot. Ç`ke që shtrëngohesh ashtu?","bised. Vishem e mbathem; ngjesh armët. U shtrënguan për luftë (për rrugë). U shtrëngua në armë.","Detyrohem të bëj diçka a të veproj në një mënyrë të caktuar kundër vullnetit e dëshirës sime. U shtrëngua të largohej (të ikte, të mërgonte). U shtrëngua të ndërronte emrin. Shtrëngoheshin të linin shkollën.","Mbahem fort, nuk e lëshoj veten, qëndroj; përgatitem të përballoj diçka të vështirë a të rrezikshme; bashkohem fort. U shtrënguan burrat për qëndresë. U shtrënguan të gjithë në një besë. Të shtrëngohemi burra! Shtrëngohu, he burrë!","Jetoj me ngushtë për të përballuar një shpenzim, kursej më shumë. U shtrënguan ca dhe i lanë borxhet.","Nxitohem që ta bëj një punë sa më parë, ngutem, shpejtohem. Nuk para shtrëngoheshin që ta merrnin. Pse shtrëngohesh kështu?","Pës. e SHTRËNGOJ. * U shtrëngua puna nuk mund të kalohet si përpara, nuk është më aq lehtë, është bërë e vështirë që të arrish a të bësh diçka. Më shtrëngohet zemra (shpirti, kraharori) kam një shqetësim të madh, ndiej diçka të rëndë në shpirt; më vjen shumë keq për dikë a për diçka, më dhemb zemra. Iu shtrëngua litari për gryke (në fyt) dikujt shih te LITAR,~I."]}]</script>
