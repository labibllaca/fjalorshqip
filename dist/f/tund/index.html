<script>window.__INITIAL_DATA__ = [{"slug":"tund","term":"TUND","attributes":["kal."],"definitions":["Lëviz dikë a diçka disa herë e në mënyrë të rregullt sa nga një anë në anën tjetër, sa lart poshtë; lëkund, përkund. Tund djepin (krevatin). Tund fëmijën. Tund shilarësin. Tund litarin.","Lëkund a shkund fort, zakonisht disa herë, sa nga një anë në tjetrën, sa para prapa ose sa lart poshtë; lëviz nga një anë në tjetrën ose para e prapa (kokën, krahët etj.). Tund degën (pemën). Tund kokën përshëndet dikë; pohoj ose mohoj diçka. Tund bishtin. Tund këmbët. E tund nga supet. I tund dorën dikujt e përshëndet dikë. Zogu tundte krahët. Mos e tund, se po fle. Tërmeti i tundi shtëpitë. Na tundi makina tërë rrugës. Tund shishen kur e laj.","Lëkund lehtë; bën të lëvizë lehtë a të valëvitet diçka në ajër (për gjethet, për flamurin etj.). Era tundte gjethet (flamurët, rrobat, barin).","Rrah në një enë me një mjet të posaçëm qumështin a kosin për të nxjerrë gjalpë etj. Tund qumështin (kosin). Tund me tundës.","edhe fig. E lëviz dika nga vendi ku është ngulur, e bëj të luaj nga vendi; e shkundë nga plogështia, e bëj të punojë, e lëviz. Mezi e tundi nga vendi. S’ka njeri që e tund atë.","moh. Nuk më bën të jepem a të luaj nga imja; s’tutem, s’më trembet syri. S’e tund asgjë. S’më tund dot nga imja. As e vrau, as e tundi.","bised. Shquhem, dallohem në një veprimtari a në ndonjë rast tjetër, veproj me forcë, me vrull e me guxim, e bëj fora, lë nam. E tundën partizanët në luftë. E tundi në mbledhje! E kemi tundur mbrëmë!","Bëj gjithçka, s’lë gjë pa bërë për të arritur një qëllim; bëj përpjekje e zhurmë të madhe për të arritur timen. Tundi malet. Tundi dynjanë. E tundi, po s’nxori gjë. Do ta tundë për këtë punë. * I tund (i luan) bishtin dikujt keq. shih te BISHT, ~I. Tund (luan) derën mospërf. rri kot; merret me punë pa vlerë, sa për të kaluar kohën. S’i ka tundur djepin dikujt nuk ia di moshën, s’ka nga t’ia dijë se ç’moshë ka. I tundi (i shkuli) dhëmballët (dhëmbët) dikujt shih te SHKUL. Tundi këmbën mospërf. vdiq. Tundi këmbët a) grindet, bën sherr e kërcënohet; e kërkon diçka me këmbëngulje; b) lëviz e përpiqet për të siguruar diçka. Tundi paratë a pagoi me para në dorë, nxori menjëherë paratë nga xhepi. Tundi rrjetën sport. shënoi gol. I tundi shkopin dikujt e kërcënoi, iu kanos për ta frikësuar; i tundi shpatën. I tundi shpatën (pallën) dikujt e kërcënoi dikë me armë, e fiksoi me diçka. S’e tund (s’e luan) as topi shih tek TOP,~I. Tund (dredh) zinxhirin (tespihet) shih te ZINXHIR,~I. Është tund e mos u shkund punon, por pa dobi; nuk i ka duk puna. Tund degën e ullirit iron. shih tek ULLI,~RI. Tund këmbët në diell mospërf. shih te DIELL,~I. Hyr e dil e tund peshqirin mospërf. shih te HYJ."]}]</script>
