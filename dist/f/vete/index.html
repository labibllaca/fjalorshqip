<script>window.__INITIAL_DATA__ = [{"slug":"vete","term":"VETE","attributes":["përem.","vetv."],"definitions":["Përdoret për të treguar zakonisht njeriun (më rrallë kafshën a sendin), që në të njëjtën kohë e kryen dhe e pëson një veprim; unë, ti, ai (ajo) ose ne, ju, ata (ato) e jo një tjetër a të tjerë. Është i zoti i vetes. Laj veten. E ndiej veten mirë (keq). E ruan veten. S'u dhimbset vetja. Ç'i duket vetja? I dha zemër vetes. Mori veten më qafë. Vrau veten. Ia bëri të keqen vetes. Nuk e kontrollon dot veten. Mban veten me shpresë. Ta shohim veten si në pasqyrë.","Përdoret me parafjalë me kuptimin e përemrave vetorë të çdo vete e të çdo numri dhe i përgjigjet kryefjalës në fjali. Kërkon shumë nga vetja. Flet me vete. Tha me vete. E mori (e solli) me vete. E pleqëroi me vete. Punon për vete. E mbajti për vete. Kujdesej vetëm për vete. E mori pas vetes. Unë për vete, ... unë.. . , unë vetë..., nga ana ime...","si em. Një njeri i veçantë, person. Mos mendo vetëm për veten tënde! Këtë e kam nga vetja ime.","si em. euf. Vendi ku janë herdhet, vendi i hollë, vendi i keq; herdhet. I dhemb vetja. I ra në vete. I ra vetja u rrënxua. U këput ndër vete u rrënxua. * Më vete a) veçan, veç e veç; i ndarë; i pavarur nga të tjerët, që s'ka lidhje me të tjerët, i mëvetësishëm, i vetëm; b) i veçantë, që s'ngjan me të tjerët, që ka një vlerë a rëndësi të veçantë, jo i rëndomtë. S'e bëj veten shih te BËJ. U bë (doli) më vete u veçua, u nda. E bëri me (për) vete (pas vetes) dikë e tërhoqi dikë, e bëri që ta dojë, i fitoi zemrën; e bëri që të veprojë sipas qëllimeve a interesave të tij. Bie në vete (në mendje) shih te BIE I. U çel ndër vete shih te ÇELEM. S'e deshi veten (të gjallët) shih te DUA. Digjet ndër vete shih te DIGJEM. Gënjen veten mbahet me shpresa të kota, shpreson më kot. Grihet me vete shih te GRIHEM. E gjeti veten libr. e kuptoi, i përcaktoi mirë prirjet e veta; filloi t'i shfaqë në shkallën më të lartë aftësitë e veta. Nuk është në vete mendon, sillet a vepron në mëny
