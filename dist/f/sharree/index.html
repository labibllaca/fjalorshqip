<script>window.__INITIAL_DATA__ = [{"slug":"sharree","term":"SHARRË","attributes":["f.","sh."],"definitions":["Vegël me përmasa, me trajta e me pajisje të ndryshme, që ka si pjesë kryesore një rrip a një disk prej çeliku me dhëmbë të mprehtë dhe që përdoret për të prerë dru, metale e trupa të tjerë të fortë, duke u vënë në lëvizje me forcën e krahut ose me një forcë tjetër; rripi a disku prej çeliku i kësaj vegle, që shërben për të prerë; makinë me një vegël të tillë. Sharrë e madhe (e vogël). Sharrë elektrike. Sharrë prerëse. min. Sharrë dore (krahu). Sharrë shirit. Sharrë disk. Sharrë hekuri (druri). Sharrë trupash. Sharrë mermeri. Doreza (fleta) e sharrës. Dhëmbët e sharrës. Pluhur sharre.","Punishte në pyll pse afër pyjeve, e pajisur me vegla të tilla, ku nxirren dërrasa, trarë etj. nga trungjet. Sharrë uji. Sharrat e Pukës. Ndërmarrjet e sharrave. Trupa sharre. Punon në sharrë.","Vargmale me maja të thepisura që duken dhëmbë-dhëmbë; tokë e gërryer shkallë-shkallë nga rrëketë; vend me shkrepa e me gurë; grill. I doli sharra tokës. Iu rrëzua kali në ato sharra. S`i ngjitej dot asaj sharre.","gjeogr., det. Shkëmb a varg shkëmbinjsh të thepisur, që gjenden brenda në det dhe janë të rrezikshëm për anijet. Hasi barka në sharrë.","Shtylla kurrizore, peshku i kurrizit; kurrizi (zakonisht për kafshët e trasha). Ka me sharrë të bardhë. Theu sharrën e kurrizit.","Misërishte e përcëlluar në zjarr, e cila përdoret për të shkoqur misrat. Sharrë misri. Shkoq me sharrë.","mjek., veter. Sharrëza; sëmundja e tokës. E kapi sharra. I rëntë sharra! mallk.","përd. mb. Që është dhëmbë-dhëmbë, me dhëmbëza, si sharrë; i valëzuar, i dredhur; shumë i mprehtë (për dhëmbët). Thikë sharrë. Makarona sharrë. I ka dhëmbët sharrë.","përd. mb. Që është bërë dhëmbë-dhëmbë, që nuk pret, i topitur (për thikat); që është dhëmbë-dhëmbë a shkallë-shkallë e me thepa (për një vend). U bë sharrë thika. Ishte vendi sharrë. * I ha sharra shih te HA. I ka prerë një sharrë janë të tërë njësoj. E sharroftë sharra! mallk. vdektë!, u shkretoftë! I vuri sharrën diçkaje e prishi diçka krejt, e shkatërroi. Është bërë për ta çarë me sharrë shak. është shëndoshur shumë. S'e kapte as sharra, as lima ishte shumë i varfër, ishte krejt i këputur. I zuri (i ndeshi, i hasi, i ra) sharra në gozhdë i doli përpara një vështirësi e pakapërcyeshme dhe e paparashikuar. I ngeci (i ngeli) sharra në gozhdë ngeci në vend nga një pengesë e pakapërcyeshme, nuk shkon dot më tej. Sharra që pret, shkëlqen edhe vetë fj.u. ai që mëson e ndihmon të tjerët, mëson e përfiton edhe vetë prej tyre. Lule sharrë bot. shih te LUL/E,~JA."]}]</script>
