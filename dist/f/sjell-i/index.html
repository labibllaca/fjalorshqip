<script>window.__INITIAL_DATA__ = [{"slug":"sjell-i","term":"SJELL I","attributes":["kal."],"definitions":["Mbart diçka nga vendi ku është dhe e vë diku me afër, bie; e mbart dikush nga larg dhe e bie në vendin ku jam unë; kund. shpie, çoj. Solli plaçkat. Solli orendi të reja. E solli në krah (me kalë, me kamion). Sille këtu! Na sollën veglat e punës. Sollën ujin në fshat. Më sill pak ujë!","Marr e bie dikë a diçka me vete; bie; kund. shpie, çoj. Solli një letër (një libër). Solli edhe djalin. E solli me zor (zvarrë). E solli me vete. E solli uji (lumi, rryma).","Vij dhe bëj të ditur; vij e njoftoj diçka nga ana e një tjetri, bie një lajm a diçka tjetër; bie; kund. dërgoj, çoj, shpie. Solli një lajm të mirë. Na solli shumë lajme të reja. Na solli të fala. Nuk i solli përgjigje. Sjell mendimet e masës. Sjell zërin e klasës punëtore.","Nxjerr dhe parashtroj, paraqit; e nxjerr atje ku dua, e bie (bisedën, fjalën). Solli shumë prova. E solli si shembull. E solli fjalën (bisedën) te dikush a te diçka.","Bëj që të vijë diçka si rrjedhim a si pasojë, shkaktoj. Të sjell gjumë. Sjell shi (stuhi, borë). Sjell dobi (dëm). Sjell pengesa (shqetësime). Solli përmirësime (ndryshime). I solli gëzim (kënaqësi). Sjell mërzi. I solli vdekjen. Kjo sjell me vete... kjo ka si pasojë, shkakton.","fig. I siguroj a i dhuroj dikujt diçka që kërkon përpjekje e luftë për t'u arritur. I solli lirinë (shpëtimin). U solli fitoren.","E bie diçka deri në një cak a përfundim; e bëj një punë a diçka deri në një pjesë. E solli gjer në mes punën. E ka sjellë në fund. E solli në të mbaruar. Deri atje ku e kishin sjellë studiuesit paraardhës.","E bëj dikë a diçka të jetë a të vijë në një gjendje të caktuar (të mirë a të keqe). E solli në vete (në udhë të mbarë). E solli në qejf. E solli punën në vijë (në rregull). E solli në fitore. Ai e solli në këtë gjendje (në këtë ditë). Ja ku e solli kokëfortësia (mendjemadhësia, pakujdesia).","E tërheq dikë për të ardhur në një vend; e bëj të vijë a të kthehet diku. E solli malli për fshatin (për vendlindjen). Ç`e solli këtu?","vet. veta III. Bën që të vijë a të ndodhë rastësisht ose pa e pritur e pa e kërkuar; më detyron të shkoj diku. E solli koha (rasti). E solli puna (nevoja). E solli hera (fati).","E vë të punojë në një organ drejtues a i jap një pozitë drejtuese; e pranoj në një organizatë etj. E sollën në fuqi (në pushtet). Sollën punëtorë në udhëheqje (në organet e pushtetit).","I kthej njërën anë diçkaje ose e kthej nga njëra anë; i paraqit njërën anë; drejtoj. I solli fytyrën (kurrizin) diellit. E solli përmbys. Sille nga ana tjetër! Mos i sill sytë nga rruga! Sille kokën prapa!","bised. E shqep një rrobë dhe e qep nga faqja tjetër, kthej. Solli pallton (pantallonat).","E bëj që të vijë rrotull a të ecë përqark; rrotulloj. Sjell rrotën. E sjell rrotull. E solli përqark shtëpisë.","fig. bised. Nuk ia mbaroj një punë dikujt dhe ia zvarrit për një kohë të gjatë; e vonoj dikë, e sorollat. E solli ditë të tëra kot. Mos i sill njerëzit! Po i sjell poshtë e përpjetë (rrugëve).","Ringjall në kujtesë. Sjell ndërmend kujtoj. E solli në hatër. bised. e kujtoi, e solli në kujtesë. Ia solli ndër mend ia kujtoi. * Këtu ma solli (ma solli këtu) shih te KËTU. E solli në biçim dikë a diçka shih te BIÇIM,~I. E solli me bisht dikë shih te BISHT,~I. E solli çarku shih te ÇARK,~U. E solli (e pruri) në din dikë shih te DIN,~I. Ia sjell (i vete, i shkon) djathtazi shih te DJATHTAZI. E sjell dokërr dikë shih te DOK/ËRR,~RRA. E ka sjellë era dikë a diçka shih tek ER/Ë,~A I. E solli (e pruri) kokën mospërf. shih te KOK/Ë,~A. I solli (i ktheu) krahët (shpinën, kurrizin) dikujt shih te KTHEJ. E ka sjellë laraska iron. shih te LARASK/Ë,~A. E sjell në rreth dikë a diçka shih te RRETH,~I. E sjell rrotull (vërdallë) dikë shih te RROTULL. E sjell (e marr, e çoj) për veshi dikë shih te VESH,~I. Solli (futi) zjarrin (në shtëpi) shih te ZJARR,~I. Gjumi sjell gjumin shih te GJUM/Ë,~I. Sjell (kthej) në një emërues të përbashkët libr. shih tek EMËRUES,~I. Ia sjell (ia bie, ia hedh) fjalën rrotull (larg e larg) shih te RROTULL. E sjell gajtan muhabetin shih te GAJTAN, ~I I. Ia solla në grykë të pushkës dikë a diçka shih te PUSHK/Ë,~A. Ia solla gjakun në vend dikujt shih te GJAK,~U I. E sjell (e luan) në majë të gishtit (të gishtave) dikë shih te GISHT,~I. E solli (e ktheu) mbrapsht shtëpinë shih te MBRAPSHT. Ia sjell mendjen rrotull (vërdallë, përqark) dikujt shih te MENDJ/E,~A. Ma solli (ma pruri) shpirtin në fyt (ndër dhëmbë) shih te FYT,~I. Ma solli (ma pruri) shpirtin në majë të hundës shih te HUND/Ë,~A. Nuk hahen ato petulla që t'i sjell (t'i jep) shigjetulla fj.u. shih te PETULL,~A. Ç'sjell minuta, s'e sjell ora (s'e sjell moti) fj.u. shih te MINUT/Ë,~A."]}]</script>
