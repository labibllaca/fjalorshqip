<script>window.__INITIAL_DATA__ = [{"slug":"humbur","term":"HUMBUR","attributes":["mb."],"definitions":["Që më ka humbur dhe nuk e di se ku e kam, që e kam lënë diku dhe s'e gjej më; që nuk e llogarit më si timin; që ia kam dhënë dikujt dhe nuk shpresoj më të më kthehet. Gjë e humbur. Sende (para) të humbura.","Që prej shumë kohësh nuk gjendet më në atë vend ku rri zakonisht, që s'e dinë ku është, që është larguar a është zhdukur diku. Djalë i humbur. E dinin (e quanin) të humbur prej kohësh.","Që ka shkuar kot, që nuk ka ndonjë vlerë a që nuk sjell ndonjë dobi; që ka vajtur dëm, që nuk është shfrytëzuar fare ose që nuk është përdorur aq sa duhet; kund. i fituar. Punë e humbur. Kohë e humbur. Ditët e humbura. Shpenzime të humbura. Përpjekje të humbura.","Që ka dalë me dëm, që ka pësuar dëm në diçka; kund. i fituar. Doli i humbur.","Që ka përfunduar me humbje, që nuk është fituar prej dikujt; kund. i fituar. Betejë (luftë) e humbur. Lojë e humbur.","fig. I shushatur e i hutuar; që nuk është i zoti për asgjë. Njeri i humbur.","Që është shumë larg e i veçuar nga qendrat e banuara; që nuk është i njohur, që është fare i vogël e pa rëndësi; që s'është shkelur prej kohësh prej të tjerëve. Vend (fshat) i humbur. Rrugica të humbura. Edhe në skajin (në këndin) më të humbur.","Që është i futur përbrenda nga dobësia ose nga lodhja e madhe, i rrufitur; i dobët e i thatë. Me faqe të humbura. I ka sytë të humbur. Me atë trup të humbur.","Që është vrarë, është shkatërruar ose ka dalë jashtë luftimit. Njerëzit e humbur. Forcat e humbura.","Që është fare i pafuqishëm, që vjen shumë i dobët; që shuhet dalëngadalë, që mezi dëgjohet. Zë (rënkim) i humbur.","Që është zhytur thellë në diçka dhe s'di ç'bëhet përreth; që është përqendruar shumë diku. Me vështrim të humbur. Me pamje të humbur. E dëgjonte i humbur.","Përd. em. sipas kuptimeve 2,4,6,9 të mbiemrit. I humburi i botës! E humbura e dynjasë. Qante për të humburit."]},{"slug":"humbur","term":"HUMBUR","attributes":["ndajf."],"definitions":["Pa pasur ndonjë dobi, pa fituar gjë, kot, dëm. Vajti malli humbur. I shkoi mundi (puna) humbur."]}]</script>
