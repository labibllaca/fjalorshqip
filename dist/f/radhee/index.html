<script>window.__INITIAL_DATA__ = [{"slug":"radhee","term":"RADHË","attributes":["f.","sh."],"definitions":["Varg njerëzish, kafshësh ose sendesh që janë vënë njëri pas tjetrit ose njëri krahas tjetrit në një vijë; varg dukurish ose ngjarjesh, që vijnë njëra pas tjetrës. Radhë njerëzish. Radhë shtëpish (dritaresh, librash). Radhë kutish (arkash, karrigesh). Dy radhë pemësh. Një radhë numrash. Radhë makinash. Në mes të dy radhëve. I vë në radhë radhit.","Varg ushtarësh, nxënësish etj., të vënë njëri pas tjetrit ose njëri përbri tjetrit, sipas një rregulli të caktuar, rreshtim, rresht. Radha e parë (e majtë, e djathtë). Radhë treshe (katërshe). Radhët e togës (e çetës). Në krye të radhës. Largësia midis radhëve. Vihem në radhë. Hyj në radhë. Dal nga radha. Mbaj (prish) radhën. Shtrëngojmë radhët. Qëndroj gatitu në radhë. Eja në radhë! usht. komandë për të ardhur në një vijë të drejtë në rresht njëri përbri tjetrit. Plotësojnë radhët e fundit.","Një brez ose një shtresë sendesh të vena në një vijë njëri pranë tjetrit, një sërë tullash në një mur, një varg fijesh në një diçka të thurur etj. Një radhë tullash (gurësh, dërrasash). Një radhë drush (arkash). Një radhë çorapesh (trikosh). Heq (vë) një radhë. Nis (mbaroj) një radhë. Prish një radhë.","Varg karrigesh par t'u ulur në kinema, në teatër, në një sallë ose në një mjet udhëtimi; varg bankash në një klasë. Radha e parë (e dytë...).. Radhët e fundit. Karriget (bankat) e radhëve të para. Ulem (rri, zë vend) në një radhë.","Varg fjalësh, shkronjash ose shenjash të tjera, të shkruara në një vijë me dorë ose të shtypura në një faqe; varg shkronjash të renditura në shtypshkronjë për t'i shtypur; rresht. Radhë të ngushta (të dendura). Radhët e librit (e fletores). Faqe me tridhjetë e dy radhë. Në krye të radhës. Heq (prish, fshij, ndreq, shtoj) një radhë. Kapërcej dy radhë. Mungon një radhë. E lexoj radhë për radhë. I shkrova nja dy radhë. Asnjë radhë tjetër.","kryes. nj. Rresht njerëzish që presin për të marrë a për të dhënë diçka ose për një punë tjetër. Radhë e madhe (e gjatë). Radhë për bileta. Radhë në dyqan. Hyj (futem) në radhë. Qëndroj (pres, rri) në radhë. Zë radhën. Mbaj (lëshoj) radhën. Jam në radhë. Ka radhë.","vet. sh. fig. Tërësi njerëzish, që janë të lidhur ngushtë nga interesa e marrëdhënie të përbashkëta ose që bëjnë pjesë në një organizatë, në një parti etj. mjedis shoqëror. Radhët e partiake. Radhët e organizatës. Radhët e ushtrisë. Nga radhët e klasës punëtore (e rinisë, e ushtrisë). Brenda (jashtë) radhëve. Hyj (futem) në radhët e... Dal (përjashtohem, largohem) nga radhët e... Zgjerojnë (plotësojnë, mbushin, rritin) radhët. Forcojnë (shtrëngojnë, shtojnë, pakësojnë) radhët. Mbetem në radhët e ...","fig. bised. Shtresë ose grup njerëzish, që kanë tipare të përbashkëta ose gjendje shoqërore të njëjtë, sërë. Nga radha jonë. Njeri (djalë, burrë) i radhës së tij. Nuk është i radhës sonë. Janë të një radhe. Sipas radhës që ka. Hyri në radhën e pleqve (e nuseve).","Një numër i pacaktuar njerëzish, sendesh ose dukurish, një sasi jo e madhe, një varg, sërë. Një radhë vendesh (rastesh, ngjarjesh, faktesh). I bëri një radhë pyetjesh. Bëri një radhë veprimesh.","Rendi ose rregulli sipas të cilit bëhet diçka, vijueshmëria në një mënyrë të caktuar për të kryer një veprim; vendi në këtë rend ose vijueshmëri, që i përket dikujt për të vepruar. Me (pa) radhë. Jashtë radhe. Sipas një radhe. Radha e punës (e veprimeve). Radha e përgjigjes (e provimit, e hyrjes). Radhë e pa radhë. Shërbim jashtë radhe. Mbaj (ruaj) radhën. Me vjen (me kalon) radha. Posta e radhës. Fisheku i radhës. Më bie radha. Pres radhën. I lëshoj (i zë) radhën. Hyjnë (dalin, vijnë) me radhë. E tregoi me radhë. I mori (i zuri) me radhë. Flisni me radhë. I pyeti me radhë. Kur t'i vijë radha. E bëjmë me radhë. Kush e ka radhën? Kam radhën e pastrimit (e rojës).","Vijueshmëri pa ndërprerje (për periudhat e kohës). Disa herë me radhë. Tre muaj me radhë. Dy net me radhë. Për vite me radhë. Shekuj me radhë.","Kohë e shkurtër midis dy periudhave, herë. Këtë (atë) radhë. Radhën tjetër. Radhën e parë. Nuk e takova këtë radhë.","përd. ndajf. bised. Radhazi. Filloi radhë. Ha radhë. I mori radhë. * Në radhë të parë shih te PARË (i,e). Në radhët e para (në rreshtat e parë) shih te PARË (i,e). Radhë e pa radhë pa një rregull të caktuar, si t'i teket a t`i vijë mbarë. E kështu me radhë e të tjera. I bëj (i lë) radhë dikujt e lë të flasë ose të bëjë diçka, nuk e pengoj. Sa për të shkuar (për të kaluar) radhën dosido, pa i kushtuar vëmendje; sa për të thënë. Si e do radha ashtu si duhet, si kërkohet dhe është më mirë. Shtrëngojmë (ngjeshim) radhët shih te SHTRËNGOJ. Vë në një radhë me dikë a me diçka e quaj të një shkalle a të një vlere me një tjetër. Vihem në një radhë me dikë eci në një hap me të tjerët, kapërcej prapambetjen. Filloj radhë të re ndryshoj krejt qëndrimin ose mënyrën e veprimeve, heq dorë nga mënyra e kaluar e punës dhe e sjelljes dhe nis një rrugë të re. Lexoj në mes të radhëve (të rrashtave) libr. gjej kuptimin e brendshëm të diçkaje që është shkruar, kuptoj mendimet e fshehta që përmban diçka e shkruar."]}]</script>
