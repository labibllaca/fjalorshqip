<script>window.__INITIAL_DATA__ = [{"slug":"zgjat","term":"ZGJAT","attributes":["kal."],"definitions":["E bëj të gjatë a më të gjatë diçka, duke e shtuar ndonjë pjesë tjetër, duke e tërhequr a duke e shtrirë etj.; kund. shkurtoj. Zgjat rripin (telin). Zgjat fustanin (fundin, mëngët). Zgjat vijën (diagonalen, mesoren). mat. Zgjat rrugën (hekurudhën, trasenë). Zgjat hapin.","Shtrij diçka në një drejtim të caktuar ose e afroj në drejtim të dikujt a të diçkaje tjetër. Zgjati kokën. Zgjati dorën. I zgjati gotën (shishen, cigaret, shkrepësen, letrën, telegramin, librin). Zgjati këmbët te zjarri. Zgjati shkopin drejt hartës.","Lë diçka të bëhet e gjatë a më e gjatë. Ia zgjati flokët vajzës. Ia zgjatën lastarët hardhisë.","Shtyj kohën, gjatë së cilës bëhet diçka, e shtoj kohën dhe e vijoj diçka më tej; shtyj më tej a vonoj përfundimin e diçkaje. E zgjati afatin. E zgjati punën (lejen, diskutimin). I zgjati jetën. I zgjati ditët. E zgjati gjendjen e jashtëzakonshme. Zgjat zërin (zanoren). Ç`e zgjat? Ç'ta zgjat? Pa e zgjatur. Ia zgjat dikujt (edhe moh.) nuk ia prish qejfin, e merr me të mirë. S`e zgjati më. E zgjati me sot e me nesër. E ka zgjatur shumë me të. Nuk ia zgjati nuk u mor shumë me të, ia preu shkurt. Mos ia zgjat! prija shkurt!","jokal. vet. veta III. Vijon pa ndërprerje për një kohë të caktuar; kalon një kohë, gjatë së cilës kryhet diçka. Pritja zgjati një orë. Udhëtimi zgjati shumë. Shiu zgjati tërë natën. Kjo punë (gjendje) zgjati me vite. Dasma zgjati deri në të gdhirë. Heshtja zgjati disa minuta. Sa zgjat shfaqja? Ndërtimi zgjati deri në dimër. Dita dhe nata zgjatin njëzet e katër orë. Nuk zgjati shumë dhe vdiq.","jokal. vet. veta III. Bëhet më e gjatë, zgjatohet (për kohën). Zgjati dita (nata). * I zgjati (i shtriu) dorën dikujt shih te SHTRIJ. E ka zgjatur gjuhën (gojën) keq. është bërë llafazan, merr nëpër gojë dikë a diçka, flet shumë kundër dikujt a diçkaje, e shan dikë; merret me thashetheme. Zgjati hundët keq. u përzie në punët e dikujt tjetër, fut hundët në çështje që nuk i përkasin. Zgjat krahët (duart, gishtërinjtë) keq. shtrin e përhap ndikimin e vet. E zgjat muhabetin me dikë bëhet i afërt me dikë, afrohet shumë me të. I zgjat (i shtrin) qafën dikujt shih te QAF/Ë,~A. I zgjati veshët u mundua të dëgjojë një zë të largët a të dobët, vuri veshin me kujdes për të dëgjuar diçka; përgjoi. I zgjati (i hoqi, i tërhoqi, i shkuli) veshin (veshët) dikujt shih te VESH,~I. Ia zgjati veshët dikujt ia rriti mendjen me lëvdata, e lëvdoi më shumë nga sa e meriton. Më zgjate veshët shih te VESH,~I. E zgjati gjuhën si lëpjetë (si lëpushkë) keq. foli jashtë mase, foli gjëra të panevojshme ose të papëlqyera e të pahijshme. Zgjati (shtriji) këmbët sa ke jorganin (plafin, shtratin) fj.u. shih te JORGAN, ~I."]}]</script>
