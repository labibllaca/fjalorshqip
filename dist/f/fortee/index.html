<script>window.__INITIAL_DATA__ = [{"slug":"fortee","term":"FORTË","attributes":["mb."],"definitions":["Që i qëndron peshës, shtypjes a veprimit të një force të jashtme, që nuk thyhet, nuk thërrmohet, nuk çahet, nuk këputet a nuk prishet lehtë; i ngjeshur, i ngurtë, i qëndrueshëm; kund. i dobët. Tullë e fortë. Mur i fortë. Themele të forta. Dru i fortë. Litar i fortë. Digë e fortë. Shkëmb i fortë. Arrë e fortë. Laps i fortë. Tokë e fortë. Bukë e fortë. I fortë si gur.","Që nuk ndryshon lehtë trajtën e vet kur ushtrohet mbi të një forcë, që nuk epet a që nuk shtypet lehtë; që përkulet a që përpunohet me vështirësi (për metalet); kund. i butë. Gur i fortë. Dyshek i fortë. Tel i fortë. Metal i fortë. Sustë e fortë.","Që është i ashpër në sipërfaqe, që të shpon a të vret kur e prek; kund. i butë. Sipërfaqe e fortë. Mjekër e fortë. Qime të forta.","Që ka forcë të madhe trupore, që ka qëndresë, i fuqishëm; i shëndetshëm, jo i sëmurë; kund. i dobët. Burrë (plak) i fortë. Grua e fortë. Kalë i fortë. Me trup të fortë. Me këmbë (me duar) të forta. Ka mushkëri të forta (zemër të fortë). Është bërë i fortë.","Që del ose që shfaqet me forcë të madhe dhe të vret veshin a syrin, që vepron shumë mbi dikë a mbi diçka, jo i shtruar, jo i butë, jo i ëmbël; kund. i butë. Zë i fortë. Dritë e fortë. Ngjyra të forta.","fig. Që ka karakter të qëndrueshëm e vullnet të çeliktë, që nuk trembet nga vështirësitë, që i duron pa u epur vuajtjet, që nuk përkulet; që nuk ndikohet lehtë e nuk preket shpejt, që e përmban veten në rrethana e kushte të rënda; kund. I butë. Njeri i fortë. Me zemër të fortë. Tregohem (bëhem) i fortë. I ka nervat të forta është i durueshëm.","Që ka pjerrësi të madhe; që formon menjëherë një kënd të ngushtë dhe kalohet me vështirësi; kund. i butë. E përpjetë (e tatëpjetë) e fortë. Kthesë e fortë.","Që bie me forcë e në sasi të madhe (për shiun etj.); që ka forcë e shpejtësi të madhe (për erën); i madh. Shi (breshër) i fortë. Erë e fortë.","Që shoqërohet me të ftohtë të madh, me ngrica, me acar e me stuhi (zakonisht për dimrin); i ashpër, i madh; kund. i butë. Dimër i fortë.","Që ka forcë të madhe ose është i armatosur mirë e nuk mund të thyhet a të mposhtet me lehtësi; që ka themele të qëndrueshme, lidhje të ngushta me masat, unitet të plotë e organizim të përsosur, që ka autoritet të madh e aftësi të madhe vepruese; i fuqishëm; kund. i dobët. Ushtri e fortë. Shtet (pushtet) i fortë.","I fuqishëm; që përballohet me vështirësi e me mundime të mëdha; që është i rreptë e i përgjakshëm; i ashpër; kund. i dobët. Sulm (grusht) i fortë. Goditje e fortë. Ndeshje e fortë. Lojë e fortë. Qëndresë e fortë.","fig. I rreptë, i prerë e pa lëshime. Disiplinë e fortë. Rregull i fortë. Kërkesa të forta. Masa të forta. Censurë e fortë.","shih FUQISH/ËM (i), ~ME (e) 3, 5-7. Ekonomi e fortë. Kooperativë e fortë. Nxitje e fortë. Mjet i fortë. Përkrahje e fortë. Teleskop i fortë.","Që vepron me forcë të madhe, që shfaqet në një shkallë të lartë; i qëndrueshëm. Grip i fortë. Ethe të forta. Kujtesë e fortë. Vullnet i fortë. Mbështetje e fortë.","I rreptë, i ashpër; i vrazhdë; që ka forcë të madhe goditëse; kund. i butë. Fjalë (përgjigje) e fortë. Notë e fortë. Kritikë (fletërrufe) e fortë. Shaka e fortë.","Që karakterizohet nga një luftë e madhe mendimesh e pikëpamjesh, që ka kritikë të ashpër; i zjarrtë, i flaktë. Mbledhje e fortë. Diskutim i fortë.","Që i përvetëson mirë njohuritë që jepen, që ka përparim të mirë në mësime; që e kryen shumë mirë detyrën e vet, që ka përparime e suksese në punë, i aftë, i zoti; kund. i dobët. Nxënës (student) i fortë. Këngëtar (lojtar) i fortë. Klasë e fortë. Organizator i fortë. Kolektiv i fortë. I fortë në mësime (në matematike).","Që të lë gjurmë të thella, që nuk shlyhet lehtë nga kujtesa, që të prek e të mallëngjen shumë, i thellë. Mbresa (përshtypje) të forta. Ndjenja të forta.","Që ka baza të shëndosha e të mbush mendjen, bindës. Arsye të forta. Argument i fortë. Logjikë e fortë.","Që ka alkool ose thartor në sasi të madhe; që të djeg fytin kur e pi a kur e thith (për pijet, duhanin); kund. i butë. Raki (verë) e fortë. Konjak i fortë. Uthull e fortë. Duhan i fortë.","Që përmban shumë lëndë të tretur në të dhe që vepron menjëherë në organizëm. Kafe e fortë. Çaj i fortë. Bar (ilaç) i fortë. Helm i fortë.","Përd. em. sipas kuptimeve 4, 6, 10, 17 të mbiemrit. * Me të fortë me zor, me pahir. Është kockë e fortë shih te KOCK/Ë,~A. Ka limë të fortë dikush shih te LIM/Ë,~A. Ka zdrukth të fortë dikush shih Ka lime të fortë te LIM/Ë,~A. Shkalla e lartë do (kërkon) këmbë të forta fj.u. shih te SHKALL/Ë,~A. Uthulla e fortë prish enën e vet fj.u shih tek UTHULL,~A. Myka e di sa e fortë është gozhda fj. u. shih te MYK/Ë,~A. Grurë i fortë bot. shih te GRUR/Ë,~I. Ujë i fortë (i rëndë) kim. shih tek UJ/Ë,~I."]}]</script>
