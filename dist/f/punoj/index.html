<script>window.__INITIAL_DATA__ = [{"slug":"punoj","term":"PUNOJ","attributes":["jokal."],"definitions":["Bëj një punë të caktuar duke përdorur forcën e krahut e të mendjes dhe vegla e mjete pune për të prodhuar diçka, për të ndërtuar, për të krijuar etj. Punon në uzinë (në fabrikë, në kombinat, në kooperativë, në fermë, në arë, në fushë). Punon në arsim (në ndërtim, në bujqësi, në transport). Punon me zell (me këmbëngulje, me ngulm, me mish e me shpirt, me nder). Punon me lopatë (me kazmë, me çekiç). Punon me shtiza (me grep). Punon me traktor (me qe). Punon edhe jashtë orarit (me orar të zgjatur). Punonin me mëditje. Punonte si kalë. Punojnë për ndërtimin e hidrocentralit. Punon mirë (pastër). Punonte shkel e shko. Kemi punuar bashkë. Punon pa u lodhur (pa u kursyer). Kush punon, gëzon. fj. u. Kush s`punon, dheut i rëndon. fj.u. Kush nuk punon, nuk ha. fj. u. Punove - gëzove. fj. u.","Ushtroj një mjeshtëri a profesion të caktuar; jam në një punë a në një detyrë të caktuar. Punon si marangoz (si traktorist, si minator, si murator, si shofer, si mësues, si agronom, si llogaritar). Punon në torno (në tezgjah). Ka punuar argat (bari).","Zhvilloj një veprimtari a kryej një veprim me vetëdije, sillem a veproj në një mënyrë të caktuar; përpiqem për të mirën e dikujt a të diçkaje. Punon me mend në kokë. Punon haptazi (fshehurazi). Ka punuar nën rrogoz (pas shpine). Mos puno me kokën tënde!","vet. veta III. Zhvillon punën a veprimtarinë e vet, është i hapur dhe kryen shërbime (për një ndërmarrje, institucion, dyqan etj.); funksionon. Kursi ka punuar rregullisht. Biblioteka punon tërë ditën. Libraria punon vetëm paradite.","vet. veta III. Është në gjendje pune, nuk është i prishur (për një makinë a një mekanizëm); kryen punën e vet, është i aftë për punë (për një organ a gjymtyrë të trupit); funksionon, shkon. Makina (motori, ora) punon në rregull. S`i punoi pushka nuk i ndezi pushka, nuk i shkrepi. Telefoni nuk punonte. I punon zemra. Si punojnë sytë (mirë) nuk sheh mirë. S’i punon më dora nuk është më i zoti për punë. Nuk i punonin më këmbët nuk ecte dot më. Sa të më punojë këmba e dora. I punon mendja për shumë gjëra i vete mendja për shumë gjëra. I punon fantazia atij.","Bëj punë edukuese, sqaruese etj. me dikë për ta bindur e për ta ngritur nga ana politike, ideologjike, kulturore etj. Punon me pionierët (me fëmijët, me rininë).","vet. veta III (kryes. me një trajtë të shkurtër të përemrit vetor në r. dhanore). Më vete mbarë, më ecën; vepron. I punoi fati (zari). S`na punoi koha (moti) sivjet. Koha punon për ne.","vet. veta III. Mbledh qelb, nuk është mbyllur ende (për një plagë). I punonte plaga.","vet. veta III bised. Ka vlerë, ka rëndësi; është i dobishëm, i nevojshëm a i domosdoshëm; të mbaron punë, hyn në punë. Sot punon shkolla. Atëherë punonte hanxhari. Ajo shkresë nuk punonte andej.","vet. veta III. Shkon e vjen, kalon; përdoret, vihet në përdorim. Atje punojnë kafshët. Në atë rrugë punon treni. Këtej punojnë makinat çdo ditë. Ajo rrugë nuk punon më. Ky va nuk punon shumë.","bised. Kam lidhje ose marrëdhënie me dikë a me diçka, marr e jap me të; lidhem. Korça me Beratin punonin me mushka. Elbasani punonte me Durrësin. Ne punonim më shumë me Tiranën. Kjo odë punon me çardhakun.","kal. Lëroj, rrëmih (për tokën). E punuan arën (tokën) me traktor. Ia punonin tokat argatit. Toka i përket atij që e punon.","kal. Përpunoj një lëndë të parë dhe nxjerr prodhime të ndryshme; e përpunoj diçka për t'ia përmirësuar cilësinë ose për ta bërë të gatshme për t'u përdorur. Punon lëkurën (drurin, baltën, hekurin). Punon pemët (ullinjtë, qumështin). Punon leshin (lirin). Miellin dhe vezët i punojnë bashkë.","kal. Bëj a prodhoj diçka. Punon voza (arka). Punon çorape (triko). Punonin qymyr. Punonte djathë (gjalpë). Kishte punuar një kukull të bukur. Ia punuan shtëpinë shokët.","kal., bised. E vë në lëvizje a në veprim diçka, e përdor, e luaj. Punoi shulin e pushkës. E punonte lopatën (kazmën) me vrull. Ai punonte rremat (lopatat). E punonte shpatën me lehtësi. E punonte dyfekun. S`e punonte dot makinën.","kal. fig. Zbërthej e shpjegoj një fjalim, një temë, një artikull a diçka tjetër dhe nxjerr përfundime e detyra. Punuan artikullin (fjalimin, vendimin). Punoi me nxënësit një temë politike.","kal. E ngre diçka në një shkallë më të lartë, e përmirësoj, e përsos, e përpunoj. Punoi gjuhën (stilin). Punon shijen muzikore.","kal. bised. Merrem rregullisht me një punë a me një veprimtari të caktuar; ushtroj. Punon bujqësinë. Punonte kurbetin. vjet. Punonte zanatin e vet.","kal. bised. E përdor për të kaluar në të, e rrah (një rrugë); jap e marr kryesisht për punë tregtie me një vend. Nuk e punonim më atë udhë. Ai punonte rrugën e Vlorës. Ata punonin Elbasanin.","kal. fig. bised. I bëj dikujt një të keqe; e mashtroj dikë, ia hedh; bëj diçka të keqe. I punoi të zezën (qindin). I punoi një rreng (një hile). Ia punoi mirë. Harrove ç`na punoi? Ç`i punoi atij të gjorit! Ia punoi prapa krahëve. E di ç`të punoj? Të punon atë që s'ta pret mendja! * Punon si sahat shih te SAHAT,~I. Sa i punoi zëri me gjithë forcën e zërit, aq sa i hante zëri. Nuk ka punuar vera sivjet ka qenë verë me shira ose e ftohtë, nuk ka qenë verë e nxehtë si zakonisht, nuk ka shkuar mirë vera. Punon sot, ha sot shih te SOT."]}]</script>
