<script>window.__INITIAL_DATA__ = [{"slug":"frymee","term":"FRYMË","attributes":["f."],"definitions":["Ajri që thithim e që nxjerri nga mushkëritë. Frymë e ngrohtë. Frymë e rënd ë(e keqe). Fryma e njeriut. Vegël fryme vegël frymore. Marr frymë. Nxjerr frymën. Mbushem me frymë.","Frymëmarrje. Mbaj frymën. Më merret (më zihet) fryma. Deri në frymën e fundit.","Ajri që ndodhet brenda një sendi, që fryhet e shfryhet. Kacek me frymë. I doli fryma topit.","Era që fryn; erë e fuqishme. Frymë e fortë (e madhe). Frymë e ftohtë (e ngrohtë). E zë (e rrok, e kap) fryma një vend. E ka rrëzuar fryma misrin.","bised. Erë e mirë ose e keqe që mban diçka, kundërmim. Fryma e hudhrës (e qepës). Ndiej frymën.","kryes. sh. ~Ë, ~ËT. Banor; vetë, njeri (zakonisht kur e japim me një numër). Fshat me një mijë frymë. Shtëpi me shtatë frymë. Prodhimi për frymë.","fig. Parim themelor a tërësi parimesh, pikëpamjesh, synimesh që përcaktojnë sjelljen e njerëzve, qëndrimin e tyre, mënyrën si veprojnë etj.; thelbi i diçkaje, vetitë karakteristike a prirjet themelore të diçkaje; ideja kryesore që përshkon një vepër letrare a shkencore, qëllimi që na frymëzon në një punë. Fryma e përgjithshme. Frymë e re. Frymë e vjetër (e sëmurë). Frymë luftarake. Fryma kombëtare. Frymë demokratike. Fryma e kohës. Fryma e një vepre. Fryma e aksionit. Fryma e bashkëpunimit.","Jetë; vjet. shpirt. Me gjysmë fryme gati si i vdekur. I doli fryma vdiq. Nuk ka më frymë ka vdekur. Është me frymë është i gjallë, nuk ka vdekur. Mbeti pa frymë vdiq. Dha frymën (e fundit) vjet. vdiq. Mezi e mbanin frymën.","bised. përd. pakuf. Asnjë. Frymë njeriu nuk erdhi. Frymë gjëje nuk dallohej nga larg. * Në frymë të dikujt a të diçkaje fare pranë, shumë afër dikujt a diçkaje. Në frymën e... sipas, në bazë të... Me një frymë me ngut, me nxitim, shpejt; menjëherë. Frymë më frymë shumë afër njëri-tjetrit, fare pranë. I ka dalë fryma diçkaje i ka dalë lezeti, është bërë pa shije. I doli fryma (shpirti, xhani) dikujt shih te SHPIRT,~I. I doli në frymë dikujt u ndesh ballë për ballë me dikë, i doli përpara. Me frymën (me zemrën) pezull shih te PEZULL. Me frymën e shenjtë iron. shih te SHENJTË (i, e). Deri në frymën e fundit shih te FUNDIT (i,e). Harxhoj frymën (kot) shih te HARXHOJ. Është si fryma është shumë mendjelehtë. I jap frymë dikujt shih te JAP. S'kam frymë ndjehem i pafuqishëm, s'kam fuqi, Ja këputi frymën dikujt shih te KËPUT. Marr frymë shih te MARR. Marr frymë lirisht çlirohem nga një gjendje e vështirë, qetësohem. Sa të marrësh frymë shih te MARR. I marr frymën dikujt shih te MARR. Nuk merr frymë shih te MARR. E mbajti (la) frymën diku arriti në një vend me vrap e me nxitim, nga që e ndiqte dikush. Sa për të mbajtur frymën (shpirtin) shih te MBAJ. Ta ndal frymën dikush është shumë i fortë, ka fuqi të madhe trupore. E ngre me frymë dikë i bërtas fort dikujt, i kërcënohem a i hakërrohem. Iu sos fryma (jeta) shih te JET/Ë,~A. I erdhi fryma erdhi në vete, u qetësua pas një gjendjeje frike a ankthi. I zuri frymën dikujt shih te ZË Mezi merr frymë a) s'ka nge të marrë frymë; b) është në gjendje shumë të vështirë, s'di nga t'ia mbajë. Nuk e lë të marrë frymë dikë. a) e ndjek hap pas hapi, nuk i ndahet për asnjë çast; b) e mundon shumë, e lodh dikë. S'ka nge të marrë frymë ka shumë punë, është shumë i zënë."]}]</script>
