<script>window.__INITIAL_DATA__ = [{"slug":"flas","term":"FLAS","attributes":["jokal."],"definitions":["edhe kal. Nxjerr me anë të organeve të të folurit tinguj të artikuluar dhe formoj fjalë e fjali për të shprehur e për të kumtuar mendimet, shqiptoj fjalë; kam prej natyre aftësinë për të shqiptuar fjalë; i shqiptoj tingujt e fjalët në një mënyrë të caktuar; shprehem në një gjuhë të caktuar, zotëroj një gjuhë. Flas shqip. Flet anglisht (frëngjisht, turqisht). Flet me zë të ulët (me zë të lartë). Flet me hundë. Flet qartë. Zë (nis) të flasë. Nuk di (nuk ka filluar) të flasë.","edhe kal. Shpreh me fjalë një mendim, një gjykim etj.; i drejtohem dikujt me fjalë; them; zë në gojë, përmend. Flas të drejtën (të vërtetën). Flet fjalë me vend. Flet gënjeshtra (gjepura). Flet qartë (mirë, keq). Flet shumë (rrallë). Flet drejt (hapur). Flet kot. Flet shtruar (rrjedhshëm). Flet përçart. Flet pa gabime. Flas me bindje. Flas me shaka. Foli me zemërim. Flet me vete. Flet nëpër dhëmbë. Flet me këmbë e me duar flet duke bërë lëvizje të shumta. Flet me thumba (me gjemba, me spica, me cep). Flet mbarë e prapë. Flet si t’i (ç`t`i) vijë për goje. Flet si për pasnesër flet kot, flet pa përgjegjësi, pa u menduar. Flet në erë (në hava, në tym). Flet kodra pas bregut. Flet udhë e përmbi udhë. Flet va e pa va. I foli në vesh. E bëj të flasë. S’e la të flasë. Mos e fol atë fjalë! Çfarë flet ashtu?","edhe kal. Marr fjalën në një mbledhje, mbaj një fjalim para disa njerëzve; zhvilloj një temë, trajtoj a shtjelloj diçka; shpreh para të tjerëve pikëpamjet e mia ose diskutoj për diçka. Flas në mbledhje (në konferencë, në kongres). Flas në radio (në televizion). Foli pa letër. Foli për Naim Frashërin. Na foli gjatë.","Hyj në bisedë me dikë, bisedoj me dikë për një çështje. Foli me drejtorin (me shokët). Flas me telefon. Folëm gjatë. Folën për të gjitha çështjet. Folën me zemër të hapur. Kemi shumë për të folur. Gjeti me kë të flasë!","Bisedoj me të tjerët gojë me gojë për dikë a për diçka, marr nëpër gojë. Flet bota. Për këtë flisnin të gjithë. Për të flet tërë fshati.","bised. Bëj fjalë, grindem a zihem me dikë, përflitem. Folën e u përfolën.","kal. bised. E qortoj me fjalë dikë, i foli ashpër (rëndë, shumë).","kal. bised. I bëj zë dikujt, e thërras; ftoj. Foli djalit! I flas në emër. Foli të vijë! Me foli për darkë.","kal. bised. Ngushëlloj dikë në rast vdekjeje. Shkova për t’i folur.","kal. I pëshpërit diçka në vesh dikujt; e nxit, e shtyj kundër dikujt. I flisnin të tjerët.","edhe kal. Tregoj a shpreh me shkrim, bëj fjalë për diçka. Aty shkrimtari flet për klasën punëtore. Autori flet për çështje të rëndësishme.","edhe kal. vet. veta III fig. Shpreh a shfaq diçka pa fjalë, me shenja, me lëvizje; tregon. Flisnin sytë e saj. Vështrimi (qëndrimi) i tij fliste shumë.","vet. veta III fig. Është dëshmi për diçka, dëshmon; shpreh diçka, provon. Flasin faktet (përfundimet, shifrat). Flasin dokumentet. Flet vetë gjendja (puna vetë). Flet historia.","vet. veta III fig. I takon të vendosë për diçka, e ka fjalën; vendos. Atëherë fliste xhepi. Flet pushka.","kal. krahin. I jap fjalën dikujt për diçka, i premtoj diçka. * Flet me bërryl shih të BËRRYL,~I. I foltë hoxha (prifti). mallk. vjet. shih te HOXH/Ë,~A. Kur të flasin lopët iron. shih te LOP/Ë,~A. Flet në mulli tall, shih te MULLI,~RI. Flet e shflet nuk e bën atë që thotë, nuk e mban fjalën. Ma flet (ma thotë, ma ndien, ma ndjell) zemra shih te ZEM/ËR,~RA. Fliste nën zë shih te ZË,~RI. Flasin gjuhë të ndryshme nuk e kuptojnë njëri-tjetrin, nuk merren vesh, secili me të vetën. Flas ndryshe me të ia ndreq unë atij! (me kërcënim). Fol e rruaj vezë shih te RRUAJ. Kujt i flet, murit? është kokëfortë dhe nuk kthen përgjigje fare ose nuk bindet. Fol o gur, fol o mur! shih te GUR,~I. I flas derës të dëgjojë qilari e them diçka tërthorazi, e hedh fjalën në bisedë me dikë që të dëgjojë një tjetër, i bie pragut të dëgjojë dera. Kija inatin dhe foli hakun (kija matin po hakun mos ia ha) fj.u. shih tek INAT,~I. Të rrimë shtrembër e të flasim drejt! fj.u. shih te SHTREMBËR. Vetë flet, vetë dëgjon s’e dëgjon asnjeri, nuk ia vë veshin kush; flet kot."]}]</script>
