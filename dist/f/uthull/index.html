<script>window.__INITIAL_DATA__ = [{"slug":"uthull","term":"UTHULL","attributes":["f."],"definitions":["Lëng i thartë që del nga tharmëtimi i lëngut të rrushit ose i lëngjeve të tjera alkoolike dhe që përdoret për gjellë, për konserva etj. Uthull e fortë (e butë). Uthull e prishur. Uthull vere. Shishe uthulle. Ngjyrë uthulle. Sallatë me uthull. I hedh uthull. Fërkoj me uthull.","përd. mb. Shumë i thartë. Qenka uthull ky rrush. * U bë uthull u nxeh, u inatos shumë. Pi uthull! tall. i thuhet me shpoti dikujt që nxehet menjëherë. E bëri për vaj e për uthull dikë shih te VAJ,~I I. U derdh vaji në uthull (u derdh vaji e ra në uthull) nuk u bë ndonjë dëm, ra vaji në lakra, gjalpi po në lakrorë mbeti. S'hahet as me vaj, as me uthull shih te VAJ,~I I. Pi macja uthull iron. i thuhet zakonisht një të vogli kur e shohim që pi duhan, raki a diçka që është për të rriturit. Nuk pi macja uthull iron. është diçka e pa mundur, është gjë që s'bëhet. I rrahur (i regjur) me vaj e me uthull shih te VAJ,~I I. Ia veshi këmishën me uthull dikujt e rrahu keqas, ia bëri kurrizin copë. Laje gojën mirë me uthull! iron. shih te LAJ. Flet për uthullën e kapërcen të qumështi nuk i shtron sipas radhës gjërat në një bisedë, kalon pa pritur nga një çështje të një tjetër që nuk lidhet drejtpërdrejt me të. I rri punës përsipër si vaji mbi uthull nuk i ndahet punës, kujdeset natë e ditë për një punë a detyrë që ia kanë ngarkuar. Uthulla e fortë prish enën e vet fj. u. thuhet për dikë që nxehet shpesh, pa shkak dhe që kështu dëmton veten. Vaj e verë e uthull bised. ylberi."]}]</script>
