<script>window.__INITIAL_DATA__ = [{"slug":"shteg","term":"SHTEG","attributes":["m.","sh."],"definitions":["Vend i ngushtë i hapur në një gardh, në një ledh a në një mur, nëpër të cilin mund të kalohet në anën tjetër. Shteg i ngushtë. Hap një shteg. Gjeti një shteg dhe doli. Kaloi nëpër shteg. Mbyll (zë) shtegun.","Udhë e ngushtë këmbësore në mal a në pyll për njerëzit e për kafshët; udhë e ngushtë, e vështirë dhe zakonisht jo shumë e rrahur ose e panjohur, nëpër të cilën depërtojmë ose arrijmë diku; vend i ngushtë në rrugët e kalimit të kafshëve të egra, i përshtatshëm për të zënë pritë. Shteg i ngushtë. Shtigje malore. Shteg i parrahur. Nëpër shtigjet partizane. Shteg kalimi. Shtigjeve të luftës. Shteg pa krye. I doli (i erdhi) gjahu në shteg. Ruaj shtegun. E priti në shteg. I njeh të gjitha shtigjet. I zunë shtigjet nga mund të kalonte armiku.","fig. Rrugë e vështirë dhe zakonisht e panjohur për të arritur një qëllim; mënyrë e stërholluar për të dalë nga një gjendje e vështirë a e padëshirueshme ose për të zgjidhur një çështje të ngatërruar; rrugëdalje. I vetmi shteg. Pa shteg pa rrugëdalje. Shtegu i shpëtimit. Çajmë shtigje të reja. Ecim nëpër shtigje të panjohura. E gjeti në shteg. E nxori (e qiti) në shteg e ndihmoi për të gjetur rrugën e daljes a të zgjidhjes.","fig. Pikë e dobët ku mund të goditet më me lehtësi kundërshtari; vend a rast i volitshëm që e kërkojmë dhe e gjejmë vetë a na del përpara; shtrungë. Ia gjeti shtegun. I erdhi (i doli, i ra) në shteg. E zuri (e kapi) në shteg.","Vija e drejtë që formohet kur i krehim flokët duke i ndarë në mes a në anë, shtegth; pjesa e ballit midis vetullave. Shtegu i flokëve. Shtegu i ballit. Vija e shtegut.","krahin. Udhë, udhëtim, rrugë. Bëj shteg bëj rrugë. Një shteg shkonte ai, një shteg i vëllai. Kush ka shteg, s’ka mot të lig. fj. u. kush ka rrugë për të bërë, nuk pyet për mot të keq; ai që synon të arrijë pa tjetër një qëllim, nuk do t`ia dijë për vështirësitë.","krahin. Herë, radhë; vakt. Shtegu i mbramë hera
