<script>window.__INITIAL_DATA__ = [{"slug":"nxjerr","term":"NXJERR","attributes":["kal."],"definitions":["E heq nga brenda, e marr nga brendësia e diçkaje dhe e vë jashtë; e bëj të dalë përjashta; qit; kund. shtie, fut. Nxjerr shaminë (paratë). Nxjerr plumbin. Nxjerr shpatën (koburen). Nxjerr nga xhepi (nga gjiri). Nxjerr nga dhoma. Nxjerr nga pusi (nga gropa, nga hendeku). Nxjerr nga furra (nga zjarri). Nxjerr nga uji. Nxjerr jashtë. Nxjerr ujë me kovë.","E shpie jashtë caqeve ose kufirit të diçkaje; e bëj të dalë përtej vijës së sipërfaqes së një sendi; e vë përjashta, në vend të hapur. Nxjerr topin jashtë fushës. Nxjerr kokën nga dritarja. Nxjerr gjuhën nga lodhja (nga vapa). Nxjerr qilimat në diell. Nxjerr në ajër të pastër.","Heq prej diku ku ishte ngulur ose ku kishte zënë vend; shkul; lëviz nga vendi i vet i zakonshëm. Nxjerr patatet (panxharin). Nxjerr një gozhdë. Nxori dhëmbin. Nxori krahun (dorën) ndrydhi krahun (dorën). I nxori syrin. E nxorën nga toka. E nxori me gjithë rrënjë.","Shtrij përpara; e bëj të dalë përpara ose më lart. I nxjerr dorën një makine. Nxjerr gjoksin. I nxjerr këmbën për ta penguar. Ka nxjerrë bark muri.","Lë të dalë, të përhapet, të mbijë, të rrjedhë etj. nga vetja, lëshoj. Nxjerr tym (avull, gaz). Nxjerr ujë (lëng). Nxjerr djersë (lot, gjak). Nxjerr flakë (xixa, shkëndija). Nxjerr bisk (lule, kalli, gjethe). Nxjerr zë (klithma). Nxjerr tinguj (melodi). Nxjerr frymën (ajrin). Nxjerr flluska. Nxjerr bakër ena. Nxjerr helm.","vet. veta III. E lëshon, nuk e mban. E nxjerr bojën. E nxjerr ujin. E nxjerr tymin (ajrin).","thjeshtligj. Heq një veshje, një rrobë etj. nga trupi. Nxjerr pallton. Nxjerr këpucët. Nxjerr maskën.","I heq cipën e sipërme a mbulesën; e bëj të duket pa atë që e mbulonte sipër, e zbuloj, e tregoj të zhveshur(edhe fig.) I nxjerr bojën. I nxjerr kallajin. I nxjerr shtresën e sipërme. I nxjerr llërat (supet). I nxori fytyrën e vërtetë. I nxori (i qiti) të palarat.","Largoj prej diku; heq, dëboj. I nxirrnin nga puna (nga dimi.","Arrij në një përfundim pasi bëj llogaritjet; përcaktoj pas një shqyrtimi ose shoshitjeje. Nxjerr shumën. Nxjerr përfundimin. Nxjerr rrënjën katrore. Nxjerr largësinë. Nxjerr evidencën. Nxjerr shkaqet (arsyet).","fig. Përfitoj; mësoj nga përvoja. Nxjerr mësime. Nxjerr përfundime.","Parashtroj, paraqit. Nxjerr kërkesa. Nxjerr kundërshtime (justifikime). Nxjerr arsye (shkaqe).","I shkaktoj diçka të padëshirueshme; i krijoj rrethana të vështira. I nxjerr pengesa (telashe). I nxjerr bishta (yçkla). I nxjerr ngatërresa. Na nxori punë.","I krijoj kushtet dikujt që të paraqitet në një mënyrë të caktuar; e paraqit në një mënyrë të caktuar pas shqyrtimit e vlerësimit nga disa anë. Na nxori faqebardhë (fitimtarë). E nxorën të pafajshëm. E nxorën të dalluar. I nxori të paaftë. E nxori të sëmurë.","Plotësoj, kënaq një dëshirë, një ndjenjë; heq, largoj një ndjenjë, një gjendje shpirtërore, shfryj. Nxjerr dufin (inatin). Ja nxori frikën. I nxori gjumin e zgjoi. I nxori pijen e bëri esëll. Nxjerr mallin e vendlindjes çmallem me vendlindjen. Më nxjerr (më heq) mallin e dikujt a të diçkaje më kujton dikë a diçka të dashur, që nuk e kam parë prej shumë kohësh.","E bëj që të flasë; e bëj që të tregojë diçka të fshehtë; flas, tregoj. Nuk ia nxorën dot emrat e shokëve. Ia nxori fjalën me zor (me çengel, me grep, me darë). Nuk i nxori shokët. Ai nuk nxjerr gjë. Nuk nxori fjalë nga goja.","E shpëtoj nga një gjendje e vështirë ose e keqe. E nxorën ndërmarrjen nga prapambetja. E nxori nga telashet. E nxori nga balta. 31. E detyroj të ndërpresë një punë, një veprimtari etj., e bëj të paaftë, të pavlefshëm etj. (zakonisht në disa togje të qëndrueshme). E nxorën jashtë përdorimit. E nxorën jashtë luftimit. E kishte nxjerrë birërie nuk e quante më për bir a për bijë. 32. E vë në një vend të caktuar kundrejt të tjerëve, i jap një vend në marrëdhënie me dikë a me diçka tjetër. E nxori në krye (në ballë). E nxori në fund. E nxorën në plan të parë. E nxorën në rendin e ditës. 33. Vë për të shitur. E nxorën në shitje (në treg). E nxori në ankand. 34. Riprodhoj nga një gjë tjetër ose sipas diçkaje tjetër. Nxjerr një (disa, shumë) kopje. Nxjerr në fotografi fotografoj. 35. I vë përpara dikujt; e gostit, e qeras. U nxori raki (kafe, duhan, gliko, llokume). Ua nxori përpara. U nxori nga një cigare. 36. Kaloj një periudhë kohe, kapërcej, hedh; i bëj të mundur të kapërcejë një periudhë kohe. I nxorën bagëtitë nga dimri. E nxjerr lopën deri në vjeshtë. S`e nxjerr dot dimrin me këtë pallto. I sëmuri nuk e nxori dimrin vdiq. 37. bised. Krijoj, bëj; trilloj. I nxorën një këngë. I nxorën fjalë. Nxirrte thashetheme. 38. E përcjell në një mënyrë të caktuar. E nxori duarbosh (duarthatë). E nxori pa pjesë. * E nxjerr (dal) në anë shih tek AN/Ë,~A I. Nxjerr (vë) në ankand diçka shih tek ANKAND,~I. E nxori (e qiti, e ngriti, e çoi) nga balta dikë shih te BALT/Ë,~A. Ia nxori bishtin një pune e teproi në një punë. Ia nxori (ia hoqi, ia qiti) bojën keq. shih te BOJ/Ë,~A I. E nxori (e qiti) në breg dikë shih te BREG,~U. Nxjerr brirët (brirë) keq. shih te BRI,~RI. Nxjerr për brirësh shih te BRI,~RI. Ia nxjerr cifundin shih te CIFUND,~I. E nxori (e bëri, e qiti) çirak dikë edhe iron. shih te ÇIRAK,~U I. Ia nxjerr (fjalët) me darë shih te DAR/Ë,~A. E nxori në diell dikë shih te DIELL,~I. I nxori djersë dikujt e lodhi shumë, e mundoi jashtë mase, e bëri të djersinte. Nxjerr nga dora (nga duart) shih te DOR/Ë,~A. E nxori (e qiti) në dritë shih te DRIT/Ë,~A. E nxjerr (e qit) nga dheu shih te DHE,~U. E nxori në faqe diçka shih te FAQ/E,~JA. E nxori (e qiti) fare shih te FAR/Ë,~A. I nxori (i gjeti, i qiti) fundin diçkaje shih te FUND,~I. E nxori në furkë diçka shih te FURK/Ë,~A. E nxori (e qiti) për fushe (në fushë) diçka shih te FUSH/Ë,~A. E nxjerr nga guri diçka shih te GUR,~I. I nxori (i tregoi) gjoksin dikujt shih te GJOKS,~I. I nxori gjuhën dikujt shih te GJUH/Ë, ~A I. Ia nxori gjuhën (një pëllëmbë, një pash) shih te GJUH/Ë,~A I. Po e nxjerr gjuhën (ka nisur t'i dalë gjuha) shih te GJUH/Ë,~A I. I nxori hanxharin dikujt shih te HANXHAR,~I. Ia nxori (ia qiti) nga hundët (nga hunda, për hundësh) diçka keq. shih te HUND/Ë,~A. Sikur e ka nxjerrë nga hunda (për hundësh) shih te HUND/Ë,~A. Ia nxori inatin dikujt e trajtoi keq dikë a e ndëshkoi pa të drejtë në inat e sipër; shfreu në dikë zemërimin që i kishte ngjallur dikush a diçka tjetër. Ia nxori kallajin shih te KALLAJ, ~I. Të nxirrte (të qiste) pa kapuç shih te KAPUÇ,~I. Nxjerr (qit) krye (kokë) fillon të duket; përpiqet të gjallërohet përsëri. Nxjerr (qit) më (në) krye diçka shih te KRYE,~T. Nuk e nxori në kut shih te KUT,~I. Ia nxori (ia qiti) në lëndinë diçka shih te LËNDIN/Ë, ~A. E nxori (e qiti) lyç diçka shih te LYÇ. E nxjerr në majë diçka shih te MAJ/Ë,~A. Nxori (vuri, zuri) mend shih te MEND,~TË. Ia nxori (ia qiti) mendtë (trutë) dikujt shih te MEND,~TË. E nxori (e luajti, e prishi) mendsh dikë shih te MEND,~TË. Nxjerr në pah shih te PAH,~U II. E nxori në mezat diçka shih te MEZAT, ~I. E nxora për qafe diçka shih te QAF/Ë,~A. Nxjerr (vë) në reliev libr. shih te RELIEV,~I. E nxori (e pruri, e çoi) rruga (udha) shih te RRUG/Ë,~A. Nxjerr sy (syrin) diçka sapo fillon të duket diçka; duket paksa diçka që ishte e fshehur ose nuk shihej. Nxjerr sytë lodhem duke lexuar, duke qepur a duke bërë diçka që kërkon shikim të përqendruar për një kohë të gjatë. I nxori (i qiti) sytë dikujt e dëmtoi rëndë, i bëri dëm në pikën më të rëndësishme. Le të nxjerrë sytë të bëjë si të dojë; nuk dua të di për të ose për vështirësitë e telashet e tij me diçka. Nxjerr në shesh shih te SHESH, ~I. I nxori (i mori, i qiti) shpirtin dikujt shih te SHPIRT,~I. E nxori (e qiti) në shteg shih te SHTEG, ~U","I nxori tabanin diçkaje shih tek TABAN,~I. Ia nxori (ia qiti) tëmthat dikujt shih tek TËMTH, ~I. Ku ta nxjerrë trapi shih tek TRAP,~I I. Më nxori thinjat shih te THINJ/Ë,~A. I nxjerr ujët dikujt shih tek UJË,~T. E nxori në va dikë shih te VA,~U. I nxori vaj dikujt shih te VAJ,~I I. Nxori (qiti) veshët keq. shih te VESH,~I. I nxori (i shurdhoi, i qiti) veshët shih te SHURDHOJ. Nxjerr (lëshon, vjell) vrer (helm e vrer) shih te VRER,~I. Nxjerr (çel) zogj iron. shih te ZOG,~U. Nxori zorrët (zorrët e barkut, bark e zorrë) shih te ZORR/Ë,~A. Ia nxori të palarat (sheshit) shih te PALARA,~T (të). S’ka ku të nxjerrë (të gjejë) qime shih te QIM/E,~JA. E nxori (e përcolli, e qiti) me duar thatë (me duar bosh, me duar zbrazur) shih te THATË","I nxori dhëmbë e dhëmballë shih te DHËMB,~I. Nuk nxjerr (nuk qit) gjë në breg shih te BREG,~U. Nuk nxjerr gjë në dritë shih te DRIT/Ë,~A. Nuk nxjerr (nuk qit) gjë në shesh (në treg) shih te SHESH, ~I. Nuk nxjerr gjë në vijë shih te VIJ/Ë,~A. Ta nxjerr gjuhën nga qafa dikush shih te GJUH/Ë,~A 1. E nxori hundën jashtë iron. shih te HUND/Ë,~A. Ia nxori (ia qiti) için lakrorit shih tek IÇ,~I. T'i nxjerr (t'i merr) këpucët (opingat) nga këmbët shih te KËMB/Ë,~A. I nxjerr (i lëshon, i qit) koka tym shih tek TYM,~I. Ia nxori (ia qiti) lakrat në shesh shih te LAK/ËR,~RA. Nuk nxjerr (nuk çon, nuk qit) lepur nga strofulli shih te LEPUR,~I. Nxjerr (lëshon, derdh) mjaltë (sheqer) nga goja shih te MJALT/Ë,~I. Nxjerr mjaltë (vaj) nga guri dikush shih te MJALT/Ë,~I. E nxjerr në portë të pazarit dikë shih te PAZAR,~I. Nuk e nxjerr dot pulën nga kopshti shih te PUL/Ë,~A. S'e nxjerr qimen nga qulli shih te QIM/E,~JA. E nxjerr në rrasë të gjallë shih te RRAS/Ë,~A. I nxjerrin (i bëjnë, i lëshojnë) sytë çika (xixa, shkëndija) shih te SY,~RI. I nxori shkumë nga goja a) e rrahu shumë, e ngordhi në dru; b) e mundoi shumë. Nxjerr ujë në vatër shih te VAT/ËR,~RA. I nxori ujë të zi shih tek UJ/Ë.~I. Ai nxjerr të vdekurin nga varri është shumë i prapë, nuk lë gjë pa bërë; është shumë i keq e mizor. I ha shyta e i nxjerr me brirë shih te SHYT/Ë, ~A. Hidh (qit) farë, nxirr (merr) farë! shih te FAR/Ë, ~A. Ç’ka barku e nxjerr bardhaku fj. u. shih te BARDHAK,~U. Korbi korbit (sorra sorrës) s'ia nxjerr sytë fj. u. shih te KORB,~I. E nxorën nga dera, hyri nga deriçka (nga dritarja) shih te DER/Ë,~A. I nxjerr gështenjat (nga zjarri) me duart e të tjerëve (e botës) shih te GËSHTENJ/Ë,~A. Do të nxjerrë prush me këmbët e maces keq. shih te PRUSH, ~I. Rrit sorrën të të nxjerrë sytë shih te SORR/Ë,~A. Të fut në ujë (në lumë, në pus, në det) e të nxjerr pa u lagur shih te LAGEM. Të shtie miza e s'të nxjerr bualli shih te MIZ/Ë,~A. I zoti e nxjerr (e qit) gomarin nga balta fj. u. shih te BALT/Ë,~A. Të jep thonjtë e bufit për të të nxjerrë sytë keq. shih te SY,~RI. Në vend që t'i vinte vetulla, i nxori sytë shih te VETULL,~A. Një thumb, njëqind herë të rrahësh, një majë nxjerr fj. u. shih te THUMB ~I. Shqiptarin nuk e ka nxjerrë lokja prej barkut, por huta prej çarkut fj.u. shih te HUT/E, ~A II."]}]</script>
