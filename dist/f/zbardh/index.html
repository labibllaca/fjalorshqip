<script>window.__INITIAL_DATA__ = [{"slug":"zbardh","term":"ZBARDH","attributes":["kal."],"definitions":["E bëj diçka krejt të bardhë, duke e lyer me gëlqere, me bojë të bardhë etj.; e mbuloj me diçka të bardhë, e vesh me një shtresë të bardhë; kund. nxij. Zbardh shtëpinë (muret, tavanin) me gëlqere. Dëbora e zbardhi vendin (malin, fushën). Zbardhi fytyrën me pudër. E zbardhën nusen e lyen nusen me pudër, me krem etj. për ta zbukuruar.","E bëj të bardhë diçka, duke i hequr ngjyrën që ka pasur, çngjyros; e bëj diçka fare të bardhë, më të bardhë se ç'është; e pastroj, e laj (për rroba të bardha që janë fëlliqur). Zbardh pëlhurën (çarçafët, këmishën, leshin). Zbardh sheqerin. E ka zbardhur dielli.","I heq shtresën e sipërme diçkaje dhe e bëj të ndritshme, duke e larë, duke e fërkuar etj.; zhvesh (misrin, orizin etj.). Zbardh argjendin. Zbardh misrin (orizin). Zdrukth për të zbardhur. Dhia e zbardhi pemën.","E ndriçoj, i jap dritë, ndrit. Drita zbardhi majat. Llamba e zbardhi dhomën.","I nxjerr thinjat dikujt, e thinj. E ka zbardhur pleqëria. Vitet ia zbardhën flokët. Hallet e zbardhën para kohe.","fig. I jap nder e lavdi, e nderoj, e nxjerr faqebardhë; e ndrit; e bëj më të lumtur. Ia zbardhi faqen (fytyrën) babait (familjes, shkollës, ndërmarrjet). Na i zbardhën armët. I zbardhi jetën. Ajo e zbardhi atë shtëpi. Lëre, se e zbardhe! iron.","Rishkruaj qartë e me kujdes diçka që e kam shkruar më përpara shpejt e shpejt, jo qartë e me korrigjime, hedh në të pastër. Ka dhjetë fletë për të zbardhur.","jokal. vet. veta III. shih ZBARDHOJ","Zbardh dëbora (pambuku). Zbardhin malet. Zbardh shtëpia.","jokal. vet. veta III. Agon, gdhin (edhe fig.). Zbardhi drita. Sapo zbardhi. Sa të zbardhë. Zbardhi dita e re. Nga lindja nisi të zbardhte. * Zbardh (hap, zbulon) dhëmbët keq. zgërdhihet; qesh me të tallur. Zbardhi sytë mospërf. vdiq."]}]</script>
