<script>window.__INITIAL_DATA__ = [{"slug":"lakeer","term":"LAKËR","attributes":["f.","sh."],"definitions":["bot. Një nga perimet kryesore të vjeshtës e të dimrit që mbillet në kopshte e rritet si kokërr e madhe me gjethe të gjera, të mbledhura e të ngjeshura njëra mbi tjetrën. Lakër e bardhë (e kuqe). Lakër turshi. Një kokë lakër. Koçani (kërcelli) i lakrës. Fletët (gjethet) e lakrës. Supë (sallatë) me lakër. Japrak me lakër. Mish me lakër.","Përdoret si pjesë e dytë e disa emërtimeve të pathjeshta që shënojnë dëmtues ose sëmundje të kësaj bime. Çimka (tartabiqja) e lakrës. zool. Futura e lakrës. zool. Miza e lakrës. zool. Morri i lakrës. zool. Pleshti i lakrës. zool. Tenja e lakrës. zool. Turigjati i lakrës. zool. Vemja e lakrës. zool. Vrugu i lakrës.","bot. zakon. sh. Barishte të ndryshme të egra e të buta (si lëpjetë, laboti, nenët, hithra, spinaqi etj.) që përdoren si ushqim për njerëzit e për kafshët. Lakra të egra (të buta). Lakra dimri (behari). Lakra mali. Byrek (lakror) me lakra. Gjellë me lakra. Mbledh lakra. Grij lakrat.","vet. sh. fig. bised. Mendime të gabuara të turbullta e prapanike ose mendime të kundërta me botëkuptimin tonë socialist, që ka dikush në kokë e që duhet t'i heqë. Njeri me lakra. Ka lakra në kokë. Ia hoqën (ia shkulën) lakrat nga koka. * E bëri lakër a) diçka e bëri copë-copë, e copëtoi, e griu; b) dikë e rrahu fort, e bëri fërtele, e lakanisi. U bë lakër u këput e u zdërlaq nga lodhja, nga vapa e madhe ose nga një sëmundje. Grin lakër (sallatë) shih te GRIJ. Hyri nëpër lakra u përzie kot në një punë të ngatërruar a në diçka që nuk i takon. Lëng ndër lakra shih te LËNG,~U. I ndau (i qëroi) lakrat (llogaritë, hesapet) me dikë shih te NDAJ. E zuri (e kapi, e gjeti) ndër lakra e zuri dikë duke bërë një punë të keqe, e zuri me presh në duar. U bë si lakër e bujtur nuk ka më lezet, u bë i mërzitshëm; i ra rëndësia, s'ia var më njeri. I ka rënë shiu në lakra i shkon puna shumë mirë. I dolën (iu zbuluan) lakrat lakrorit iu zbuluan dikujt të f
