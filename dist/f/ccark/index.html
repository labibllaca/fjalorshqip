<script>window.__INITIAL_DATA__ = [{"slug":"ccark","term":"ÇARK","attributes":["m.","sh."],"definitions":["Mjet për të kapur minj, zogj ose kafshë të egra, që ngrihet zakonisht duke i vënë pak ushqim dhe që shkrehet me forcë; kurth. Çark i ngrehur. Çark minjsh. Çark zogjsh. Çark ujqish (dhelprash). Ngreh çarkun. Vë çarqe. Kap me çark. Zë në çark. Bie në çark. Si miu në çark në gjendje shumë të vështirë, shumë ngushtë, pa rrugëdalje.","fig. Grackë që ngrihet për të kapur dikë, kurth; mënyrë për ta tërhequr me mashtrim dikë që të futet diku e të mos dalë dot më prej andej. I ngre çarkun. Bie në çark. Kap (zë) në çark. E fut në çark.","Mekanizëm i thjeshtë, i përbërë zakonisht prej një pjese të rrumbullakët si rrotë ose me thupra, që lëviz duke u rrotulluar dhe që shërben për të mbledhur diçka, për të vënë në rrotullim një pjesë tjetër ose për një punë të caktuar; pjesa që rrotullohet e këtij mekanizmi. Çark dore (këmbe). Çark dërstile. Çark ullinjsh. Çarku i poçarit. Çarku i mullirit (i tezgjahut). Çarku i sharrës me ujë. Çarku i pusit çikrik. Çark për mprehje. Punoj me çark. Mbledh litarin (fillin) në çark.","Pjesë e armëve me strall, që shërben për të ndezur barutin duke u shkrehur; mekanizmi i shkrepjes. Çarku i pushkës (i çiftes). Pushkë me çark. Heq çarkun. Ngreh (shkreh) çarkun. S’i ndezi çarku.","Vegël e thjeshtë me një thikë, që përdoret për të grirë duhanin. Çark duhani. Thika e çarkut. Duhan çarku. Mpreh çarkun. Grij me çark.","Kornizë druri që rrethon diçka; rreth druri; skelë druri që shërben për të mbajtur diçka. Çarku i dritares. Çarku i vatrës. Çarku i dyshemesë. Çarku i çatisë. Çarku i qerres. Çark për trungje. Çark për të mbajtur.","vjet. Vegël që përdorej për t'i marrë gjak një njeriu të sëmurë; vizgator. Merrnin gjak me çark.","anat. bised. Varg eshtrash të trupit, të lidhura njëra me tjetrën; nyjë e eshtrave të lidhura, kyç. Çarku i kokës. Me dhembin çarqet. Me ftohen çarqet.","bised. Rreshti i dhëmbëve në gojë, dhëmbë të vënë. Çarku i dhëmbëve. Vë
