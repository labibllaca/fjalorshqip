<script>window.__INITIAL_DATA__ = [{"slug":"dobeet","term":"DOBËT","attributes":["mb."],"definitions":["Që e ka trupin të pafuqishëm ose të hollë, të thatë e të brishtë; që e ka lënë fuqia (nga mungesa e ushqimit, nga ndonjë sëmundje, nga lodhja, mundimet etj.) (për njerëzit e për kafshët); që ka pak forcë fizike, që nuk i ka të gjitha vetitë e aftësitë e duhura fizike për t'i kryer mirë funksionet e veta; që mezi u qëndron kushteve të vështira natyrore, punëve të lodhshme, sëmundjeve etj. (për pjesët e organet e trupit); jo i shëndoshë; kund. i fortë, i shëndoshë. Fëmijë (plak) i dobët. Kalë (ka) i dobët. Me trup të dobët. Me krahë (me muskuj, me qafë) të dobët. I dobët nga trupi (nga krahët, nga këmbët). Me duar (me këmbë) të dobëta. E ka zemrën të dobët. I ka mushkëritë (veshkat) të dobëta. I ka veshët (sytë, nervat) të dobët. Ka lindur (ka mbetur) i dobët. E la sëmundja të dobët.","Që nuk ka dhjamë e që ka pak vlera ushqyese, që nuk është i majmë (për mishin e për kafshët që theren); kund. i shëndoshë; i majmë. Mish i dobët. Berra të dobët.","Që thyhet, këputet, griset, çahet, shthuret, shprishet, rrëzohet a prishet lehtë, kur mbi të ushtrohet një forcë e jashtme (për shkak të vetive të lëndës, nga e cila përbëhet ose të mënyrës së punimit a të ndërtimit); që nuk mban a nuk duron shumë; i paqëndrueshëm, jo i fortë, i brishtë; kund. i fortë, i qëndrueshëm. Dru i dobët. Tulla (tjegulla) të dobëta. Letër e dobët. Xham i dobët. Mur (gardh, ledh, cfrat) i dobët. Urë e dobët. Shkallë (shtylla) të dobëta. Me themele të dobëta. Pe (tel, krehër) i dobët. Pëlhurë (stof, lëkurë, mushama) e dobët. Këpucë (çorape) të dobëta.","Që nuk është i lidhur e i shtrënguar fort, i lirshëm; që nuk është i ngjitur mirë. Nyjë e dobët. Lidhje e dobët. Ngjitje e dobët.","Që nuk ka shumë forcë, që shfaqet, lëviz a vepron me fuqi të paktë e ngadalë; jo i theksuar; kund. i fortë. Erë e dobët. Rrjedhë (rrymë, dallgë) e dobët. Goditje e dobët. Puls i dobët. Tërmet i dobët. Dritë e dobët. Zë i dobët.","edhe fig. Që nuk është shumë i qartë e i dukshëm, që nuk është i thellë, i theksuar a i përvijuar mirë; i zbehtë, i cekët; kund. I thellë; i qartë. Gjurmë (shenja, vija) të dobëta. Ngjyra të dobëta. Mbresa (përshtypje) të dobëta. Parafytyrim i dobët.","Që është në një shkallë më të ulët nga mesatarja për shkak të të metave të ndryshme të organeve të trupit; kund. i fortë; i mprehtë. Shikim i dobët. Nuhatje e dobët. Ndijim i dobët. E ka kujtesën të dobët.","Që ka pak fuqi lëvizëse a tërheqëse, që ka pak energji; që ka aftësi vepruese të kufizuar; kund. i fuqishëm (edhe spec). Motor i dobët. Rryma të dobëta. elektr. Pushkë (kobure) e dobët. Hark i dobët.","Që nuk vepron menjëherë ose në mënyrë të ndjeshme në organizëm (për ilaçet etj.); që nuk ka shumë alkool ose thartor, i butë (për pijet etj.); kund. i fortë. Bar (ilaç) i dobët. Duhan i dobët. Raki (verë) e dobët. Uthull e dobët. Tretësirë e dobët.","Që nuk ka aftësi të madhe sulmuese a mbrojtëse dhe frymë të lartë luftarake, që mund të thyhet me lehtësi; kund. I fortë, i fuqishëm. Ushtri e dobët. Njësi e dobët. Mbrojtje kundërajrore (bregdetare) e dobët. Pikë e dobët e frontit.","Që nuk ka ekonomi të shëndoshë, organizim të mirë politik e ushtri të fortë; që nuk mbështetet në baza të qëndrueshme, nuk ka ndikim të gjerë te njerëzit, nuk gëzon përkrahjen e masave dhe nuk ka pushtet të fortë e autoritet, i pafuqishëm; kund. i fortë, i fuqishëm. Shtet (vend) i dobët. Qeveri e dobët. Regjim i dobët. Parti (organizatë) e dobët. Klikë e dobët.","Që nuk ka ekonomi të zhvilluar e të fuqishme, që prodhon pak e që ka pak të ardhura; i varfër; kund. i fortë. Ekonomi e dobët. Kooperativë e dobët.","Që është i një cilësie jo të mirë, që nuk plotëson kërkesat e duhura. Prodhime (mallra) të dobëta. Grurë (misër, pambuk) i dobët. Tokë e dobët tokë e varfër, jopjellore. Gjellë e dobët. Vepër (vjershë) e dobët. Roman (tregim, artikull, studim) me përmbajtje (me gjuhë) të dobët.","Që nuk është ose nuk bëhet në masën, në shkallën a në lartësinë e duhur, që ka mjaft të meta; jo i plotë, i pamjaftueshëm, i pakënaqshëm. Punë (stërvitje) e dobët. Lojë e dobët. Mësim i dobët. Disiplinë e dobët. Kontroll i dobët. Ndihmë e dobët. Kritikë (autokritikë) e dobët. Lidhje të dobëta. Pjesëmarrje e dobët.","Që ka dije, aftësi e shprehi të pakta ose i përvetëson këto me vështirësi; që nuk e zotëron mirë profesionin e vet, që nuk e kryen mirë detyrën a punën e vet ose që nuk e njeh mirë një lëndë a një fushë të caktuar; që nuk ecën përpara si duhet në një punë; i paaftë; i pazoti; kund. i fortë. Nxënës (student) i dobët. Mësues (mjek, shkrimtar, lojtar) i dobët. Klasë (skuadër, brigadë) e dobët. Orkestër e dobët. I dobët në matematikë (në fizikë, në gjuhë).","Që nuk ka baza të shëndosha dhe që nuk të bind, që nuk ka forcë bindëse; që nuk mbështetet në diçka të sigurt. Argumente (prova) të dobëta. Arsyetim i dobët. Mbrojtje e dobët. Shpresa të dobëta.","Që nuk bëhet me tërë forcën e duhur, me këmbëngulje dhe në mënyrë të vendosur e të plotë. Kërkesa të dobëta. Përpjekje (përçapje, orvatje) të dobëta. Protesta (kundërshtime) të dobëta.","fig. Që nuk ka karakter a vullnet të fortë, që ligështohet para vështirësive e goditjeve, që nuk ka kockë të fortë; që ndikohet e preket lehtë, që nuk e përmban veten në rrethana të rënda dhe përkulet shpejt, tepër i butë e i prekshëm; që nuk është i qëndrueshëm, i vendosur e i patundur; kund. i fortë. Njeri i dobët. Me karakter (me vullnet) të dobët. E ka zemrën të dobët. U tregua i dobët.","Që ka veti të ulëta ose qëllime e synime të këqija; që bie në kundërshtim me rregullat e me normat morale të shoqërisë dhe nuk pëlqehet e nuk pranohet prej saj; i ulët. Njeri i dobët. Sjellje e dobët. Qëndrim (veprim) i dobët. Me moral të dobët.","Përd. em. sipas kuptimeve 1, 11, 15, 18, 19 të mbiemrit. * Ana e dobët e dikujt a e diçkaje e metë e dikujt a e diçkaje. Pikë e dobët e dikujt anë ose hallkë e karakterit, e biografisë a e veprimtarisë së dikujt që mund të shfrytëzohet nga të tjerët për ta goditur a për t'ia arritur një qëllimi; gjëja në të cilën dikush e ndien veten të pafuqishëm të veprojë a të kundërshtoj. Është pikë e dobët është diçka shumë delikate, që kërkon kujdes të veçantë."]},{"slug":"dobeet","term":"DOBËT","attributes":["ndajf."],"definitions":["Me pak fuqi, jo fort, pak, lehtë; kund. fort. E goditi dobët topin.","Jo shtrënguar, jo fort, lirshëm; kund. fort. E ka lidhur dobët.","Me forcë të paktë; lehtë; kund. fort. Fryn dobët. Ndriçon dobët.","Pak, jo mirë, mezi. Sheh dobët. Dëgjon dobët. Ndien dobët.","Keq nga ana ekonomike, jo mirë. Parvjet dolën më dobët si kooperativë.","Jo në masën, në shkallën a në lartësinë e duhur; me mjaft të meta; në mënyrë të pamjaftueshme a të pakënaqshme; jo mirë, jo si duhet; keq. Mëson (punon, luan) dobët. U përgjigj dobët. Është përgatitur (punuar) dobët."]}]</script>
