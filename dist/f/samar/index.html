<script>window.__INITIAL_DATA__ = [{"slug":"samar","term":"SAMAR","attributes":["m.","sh."],"definitions":["Lloj shale prej druri me dy kaptej të lidhur me brinjë, me stele të mbushur me kashtë nga brenda, që u vihet në kurriz kafshëve për t`u ndenjur në shpinë ose për të mbajtur barrët. Samari i kalit (i mushkës, i gomarit). Kaptelli i samarit. Litari i samarit. Stela e samarit. Drurët e samarit. Kafshë samari kafshë ngarkese. I vuri (i hoqi) samarin. E vret samari. I bie (i varet) samari. Një samar dru një barrë dru.","iron. Kurrizi i njeriut. I mban samari. E mban mbi samar.","Jastëk prej mesi i mbushur me kashtë etj., që e vënë mbi kurriz punëtorët mbartës për të mos i vrarë barra.","Guaska e breshkës, rrashti; guaska ku futet kërmilli. Samari i breshkës. Kërmij me samarë.","Eshtra e gjoksit të pulës bashkë me mishin, kraharori i pulës.","Pjesa e ngritur si gungë e diçkaje; kurriz. Hundë me samar.","Copë druri që vihet në fund të kutisë së një vegle muzikore me tela për t'i mbajtur ata të ngritur. Samari i violinës (i mandolinës). * Kërcu përmbi samar shih te KËRCU,~RI. Shalë mbi samar shih te SHAL/Ë, ~A. Ia ndreqi (ia rregulloi, ia ujdisi) samarin (bërroren, kurrizin, shpinën) dikujt shih te NDREQ. Po e vret samari dikë iron. po e shqetëson diçka që i kanë thënë, po e djeg fjala që ka dëgjuar. S'e ka vrarë samari (këpuca) shih te VRAS. I erdhi fundi me samar e përfundoi jetën keq, me vuajtje e mundime. Ia bëri samarin copë a) e mundi, e theu keqas; b) e qortoi, e kritikoi rëndë. I këndon gjeli në samar shih te GJEL~I. Ia lanë samarin nën bark dikujt e lanë të vuante e të mundohej vetëm, nuk e ndihmuan në vështirësi, nuk ia lehtësuan vuajtjet. Ia lëshoi samarin nën bark (nëpër këmbë) dikujt i nxori pengesa të mëdha, i krijoi kokëçarje e vështirësi të mëdha. I mbeti (iu var) samari nën bark dikujt iu krijua një kokëçarje a pengesë e madhe, ra në hall, e gjeti belaja, e pësoi keq. E vë barrën pas samarit tall. shih te BARR/Ë, ~A. E di (vetë) gomari ku e vret samari ai që merret me një punë ia di edhe vështirësitë e pengesat. Zbriti (u ul) nga shala e hipi në samar iron. shih te SHAL/Ë,~A II. S'ka ç'i bën gomarit e i bie samarit fj. u. nuk arrin ose nuk guxon të dënojë fajtorin e vërtetë dhe i shkarkohet dikujt tjetër; e nxjerr zemërimin në kurriz të dikujt që nuk ka faj, e shfren dufin aty ku mundet, pa dënuar fajtorin e vërtetë."]}]</script>
