<script>window.__INITIAL_DATA__ = [{"slug":"ndez","term":"NDEZ","attributes":["kal."],"definitions":["I jap zjarr, e bëj që të digjet diçka; kund. shuaj, fik. Ndez zjarrin. Ndez fitilin. Ndez furrën (sobën).","bised. I vë zjarrin cigares a duhanit dhe nis ta thith; kund. shuaj, fik. Ndez një cigare (një duhan). E ndezim nga një! Nuk e ndez (fare) nuk e pi (fare) duhanin.","I jap flakë diçkaje për të bërë dritë; e bëj që të japë dritë; kund. shuaj, fik. Ndez dritën. Ndez qiriun (llambën). Ndez kandilin.","Bëj që të nisë punën një pajisje që punon me djegie të brendshme ose me rrymë elektrike; vë në veprim; kund. shuaj, fik. Ndez motorin (tornon). Ndez makinën. Ndez radion (televizorin).","fig. Bëj që të nisë; jap shkas që të fillojë me vrull, që të marrë hov, shkaktoj. Ndezën luftën (betejën). Ndezi diskutimet. Ndezi grindje (sherr). Ndezi këngën. E ndezën bisedën. Ndezi zjarrin (flakën) e diçkaje.","fig. E bëj të gjallërohet e të marrë hov, e ngre peshë. U ndezi zemrat. I ndezi shpirtin. Ua ndezi gjakun. I ndezi dëgjuesit. E ndezi kolektivin.","fig. E bëj t'i shfaqet një ndjenjë, një dëshirë etj., i ngjall me forcë, nxit. I ndezi dëshirën. I ndezi shpresat (dashurinë). I ndezi ndjenjat. I ndezi kureshtjen (zemërimin, urrejtjen). I ndezi një zjarr në gji.","fig. bised. E bëj të zemërohet, të marrë zjarr ose të mos përmbahet. I ndezi loja (rakia). E ndezi me fjalë. E ndezi më tepër (më keq). Donin ta ndiznin.","E bëj të ketë ose të ndiejë shumë të nxehtë; skuq. E ndezi vapa (pija). I ndezi faqet (fytyrën). Më ndezën këto rroba.","fig. bised. Qëlloj me forcë; godas me diçka, i bie. Ia ndezi me shuplakë (me shqelm). Ia ndezi fytyrës (prapa veshit). Ia ndezi me top.","jokal. vet. veta III. Merr zjarr; shkrep (për armët). Nuk i ndezi eshka. Nuk i ndezi pushka.","jokal. vet. veta III fig. bised. Më ecën, ia arrij asaj që dua, më ndrit (zakonisht me mohim). Nuk i ndezi me të. Nuk po i ndez gjëkundi. E pa që s`i ndezi. Nuk i ndezi fjala.","jokal. vet. veta III fig. bised. Më gjen një e keqe, nga e cila nuk shkëputem dot, më zë; bie keq me dikë, gjej belanë nga dikush. I ndezi me atë njeri të keq. Më ndezi me të. Më ka ndezur keq. Ç'më ndezi kështu! * Më ndezi (më polli) belaja (groshi) me dikë shih te PJELL. Nuk i ndezi fisheku shih te FISHEK, ~U. I ndezi (i nxehu) gjakrat shih te GJAK,~U. Ia ndezi mizat dikujt e inatosi, e bëri të zemërohet. I ndezën qiririn dikujt shih te QIRI,~U. Ndezi shkëndijën dha shkas i pari, u bë shkaktari i parë për diçka. As ndez, as shuan është njeri i plogët, që nuk merr pjesë gjallërisht në diçka, as ndreq, as prish. I ndezi trutë dikujt e vrau, ia hodhi trutë në erë. Është ndiz e shuaj shih te SHUAJ. I ndez pushka në ujë dikujt shih tek UJ/Ë,~I. Ia ndezi zemrën flakë (zjarr) i dha hov e dëshirë të madhe për të bërë diçka. I ndezi zemrat horë shih te HOR/Ë,~A II. E ndez zjarrin në ujë shih tek UJ/Ë,~I. Tjetrit i digjet mjekra, ai kërkon të ndezë cigaren shih te MJEK/ËR, ~RA."]}]</script>
