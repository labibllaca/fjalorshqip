<script>window.__INITIAL_DATA__ = [{"slug":"shpinee","term":"SHPINË","attributes":["f.","sh."],"definitions":["Pjesa e prapme e trupit të njeriut nga qafa e supet deri te mesi; pjesa e sipërme e trupit të kafshëve gjatë shtyllës kurrizore deri te vithet; kurriz. Shpinë e drejtë (e kërrusur). Shpinë me shpinë. Muskujt e shpinës. Rruazat e shpinës shtylla kurrizore. Çantë shpine. Not në shpinë. I ktheu shpinën. Më dhemb shpina. E marr (e mbaj) në shpinë. Shtrihem (bie, fle) në shpinë. Armiku nuk na e ka parë ndonjëherë shpinën. Partia ua hoqi grave barrën nga shpina.","Trina e dorës a e këmbës, kurriz; ana e sipërme e pjesës së mesme të gjuhës. Shpina e dorës (e këmbës). Shpina e gjuhës.","Mbështetësja e prapme e karriges, e kolltukut etj., shpinore. Shpina e bankës (e karriges).","Pjesa e prapme e një veshjeje të sipërme, që mbulon trupin nga shpatullat e poshtë, kurriz. Shpina e palltos (e xhaketës). Shpina e trikos. Punoj shpinën.","Ana e prapme e një ndërtese, kurriz. Shpina e shtëpisë (e dyqanit). Në shpinë të shkollës.","Shpat ose kurriz mali a kodre.","Ana jo e mprehtë e thikës a e shpatës, ana pa dhëmbë e sharrës.","Vendi ku janë ngjitur a janë lidhur fletët e një libri, të një fletoreje etj.; pjesa e prapme e mbulesës së një libri, ku ngjiten kapakët. Shpina e librit (e fletores). Emri i autorit dhe titulli janë shtypur në shpinë.","fig. Vetja, kurriz. E provoi në shpinën e vet. Kishte dhjetë shpirt mbi shpinë (për t'i ushqyer). Rëndon mbi shpinën e tjetrit.","fig. Prapavijë, pjesa e prapme e frontit. Mbroj (siguroj) shpinën. I mori shpinën armikut. E sulmoi armikun në shpinë (nga shpina).","bised. Pjesa e sipërme, sipërfaqja. Shpina e detit. Mbetën të vrarët në shpinë të tokës. Doli në shpinë të ujit. Eci në shpinë të borës (kur ngrin bora). * I fërkon shpinën (krahët, kurrizin, shpatullat, zverkun) dikujt keq. shih te FËRKOJ. I ha (i kruhet) shpina (kurrizi) dikujt shih te KURRIZ, ~I. E hedh pas (prapa) shpinës (krahëve, kurrizit) diçka shih te KRAH,~U. I h
