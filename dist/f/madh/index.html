<script>window.__INITIAL_DATA__ = [{"slug":"madh","term":"MADH","attributes":["as.","vjet."],"definitions":["Vlera a madhe e dikujt a e diçkaje, rëndësia; madhështi; krenari. Të madhtë e tij. Mbahej më të madh krenohej, ishte mendjemadh; mburrej.","Të qenit i madh në vëllim a në përmasa; madhësi."]},{"slug":"madh","term":"MADH","attributes":["m.","sh."],"definitions":["Ai që ka arritur moshën a pjekurisë dha ka përvojë nga jeta; i rritur; kund. i vogël. Rroba (këpucë) për të mëdhenj. I madhi është në shkollë të lartë. Erdhën me të mëdhenj e me të vegjël.","bised. Kryetar i një shteti a udhëheqës i një populli; ai që ka një detyrë të lartë shtetërore. Mbledhja e të mëdhenjve."]},{"slug":"madh","term":"MADH","attributes":["mb."],"definitions":["Që ka vëllim a përmasa mbi mesataren, që e kalon masën e zakonshme në krahasim me sendet e tjera; që zë një sipërfaqe a një vëllim jo të vogël, që nxë shumë; i gjerë, i shtrirë; që ia kalon nga përmasat diçkaje tjetër të ngjashme; kund. i vogël. Gur (shkëmb, mal) i madh. Qyp i madh. Tepsi e madhe. Anije e madhe. Sipërfaqe e madhe. Qytet (port, vend, shtet) i madh. Shtëpi (dhomë) e madhe. Vrimë (e çarë) e madhe. Me duar të mëdha. Me sy të mëdhenj. Xhaketë e madhe. Lumë (hendek) i madh. Largësi (thellësi) e madhe. Gishti i madh i dorës. Plagë e madhe. Truri i madh. anat. Qarkullimi i madh i gjakut. anat. E ka këmbën të madhe. Ecte me hapa të mëdhenj.","Që ka shtat të gjatë, me trup mbi mesataren, trupmadh; që ka trup të zhvilluar plotësisht, i rritur; i lartë; kund. i vogël. Djalë (burrë) i madh. Vajzë e madhe. Lis i madh. Pemë e madhe.","Që është në një sasi mbi mesataren, i shumtë; që përbëhet nga shumë njësi, pjesë, frymorë, sende etj.; që është a që shfaqet me shumicë ose mbi mesataren; kund. i vogël. Tufë (kope) e madhe. Grup i madh. Sasi (shumë) e madhe. Peshë e madhe. Numër i madh njerëzish. Popullsi e madhe. Familje e madhe. Borë e madhe. Baltë e madhe. Shi i madh. Harxhime (shpenzime) të mëdha. Shumëfishi më i madh i përbashkët. mat. Kishte rrogë të madhe.","Që bëhet nga shumë njerëz, ku marrin pjesë shumë vetë a shumë mjete; që është i gjerë e i gjithanshëm. Luftë (betejë) e madhe. Festë (dasmë) e madhe. Pritje e madhe. Mbledhje e madhe. Miting i madh. Shkolla e madhe e jetës. Organizimi i madh i punës.","Që ka shumë njerëz, mjete, tokë etj. dhe zhvillon veprimtari të gjerë prodhuese, kërkimore, mësimore etj. Ndërmarrje e madhe. Industri e madhe. Ekonomitë e mëdha bujqësore. Institut i madh. Shkollë e madhe.","Që bëhet për një kohë të gjatë; që vijon a zgjat më shumë sa zakonisht; kund. i vogël; i shkurtër. Pushimi i madh. Ndërprerje (vonesë) e madhe. Heshtje e madhe.","Që ka shumë forcë, që shfaqet me forcë; që është i një shkalle më të lartë se zakonisht a i një shkalle shumë të lartë. Shpejtësi e madhe. Me nxitim të madh. Vapë e madhe. Të ftohtë të madh. Erë (ngricë) e madhe. Errësirë e madhe. Dendësi e madhe. Zhurmë (britmë) e madhe. Uri (etje) e madhe. Dhembje e madhe. Hidhërim (shqetësim) i madh. Dashuri e madhe. Me frikë të madhe. Më vëmendje të madhe. Me kujdes të madh. Me forcë të madhe.","Që ia kalon nga mosha dikujt tjetër; që ka arritur moshën a pjekurisë dhe ka përvoja nga jeta; i vjetër (për moshën); kund. i vogël; i ri. Djali (vëllai) i madh. Motra (kunata) e madhe. Në moshë të madhe. Është i madh tani. U bë i madh u rrit, arriti një moshë madhore. Është më i madh se shokët.","Që dallohet nga të tjerët për aftësitë e cilësitë e veçanta fizike, mendore e morale, që shquhet në veprimtarinë shoqërore, politike, ushtarake, shkencore, artistike etj.; i përmendur, i shquar, i famshëm. Njeri (mendimtar, dijetar) i madh. Udhëheqës (strateg, politikan, luftëtar) i madh. Figurat e mëdha të së kaluarës. Shkrimtar (poet, artist, muzikant, aktor) i madh. U bë i madh u bë i përmendur; zuri një pozitë shtetërore a shoqërore të lartë.","Që punon e vepron me shumë zell: keq. që e bën diçka me tepri, që a kalon masën a kufirin. Punëtor i madh. Pastërtore e madhe. Llafazan (grindavec, gënjeshtar, dembel) i madh. Pijanec i madh. Hamës (grykës) i madh. Gjumash i madh.","Që ka shumë prona a pasuri, që është i fuqishëm nga ana ekonomike, i pasur; kund. i vogël. Pronar i madh. Zejtarët e mëdhenj. hist. Borgjezia e madhe në vendet kapitaliste. Derë e madhe. bised. vjet. familje e pasur.","Që ka vlerë a rëndësi të jashtëzakonshme, që ka karakter të tillë, rrënjësor; vendimtar, që i shërben një qëllimi të lartë e fisnik, i lartë; madhështor, i shënuar. Çështje (vepër) e madhe. Zbulime të mëdha. Kthesë e madhe. Qëllime (synime, interesa) të mëdha. Revolucion i madh. Festat e mëdha të Nëntorit. Ditë e madhe. Ka luajtur një rol të madh.","Që sjell pasoja të rënda për dikë a për diçka, që sjell shumë dëm. Humbje e madhe. Gabim (faj) i madh.","keq. Që ka karakter tepër mburrës, lavdërues, premtues, kërcënues etj. nga jashtë, por nga përmbajtja është i zbrazët; i fryrë. Flet me fjalë të mëdha.","si em. ~E, ~JA (e) f. Diçka që është në shkallë të lartë; diçka që shfaqet me shumë forcë; gjë kryesore a e rëndësishme. Qeshi (thirri) me të madhe. E ngriti (e shtroi, e theksoi) me të madhe. * Batall i madh (fort) iron. shih te BATALL,~I. E bëri të madhe diçka bëri shumë zhurmë a bujë rreth diçkaje, e zmadhoi tepër, e paraqiti në mënyrë të fryrë. Çudi e madhe! shih te ÇUDI,~A","Fle të madhin euf. mospërf. shih te FLE. Gajle e madhe iron. shih te GAJL/E,~JA. Gjumi i madh (i përjetshëm) euf. shih te GJUM/Ë,~I. E zëntë gjumi i madh! mallk. shih te GJUM/Ë,~I. Kokë e madhe njeri i zoti e i shquar, njeri i madh. I madh e i vogël të gjithë pa përjashtim. Nevoja e madhe euf. shih te NEVOJ/Ë, ~A","Ujët e madh (e trashë) euf. shih tek UJ/Ë,~I","Punë e madhe! mospërf. shih te PUN/Ë,~A. Është punë e madhe është shumë e mirë diçka, të kënaq, s'ke ç'i thua. E preu me sëpatë të madhe (me sëpatën e dardharit) shih te SËPAT/Ë,~A. Kishte emër të madh ishte shumë i njohur e i përmendur, kishte nam të madh. Zemër e madhe njeri zemërmadh, njeri bujar. Me zile të madhe shih te ZIL/E,~JA. I ra me gisht të madh një pune shih te GISHT,~I. Është shpellë e madhe shih te SHPELL/Ë,~A. E hodhi (e flaku, e nxori, e la) në rrugë të madhe (në mes të rrugës, në mes të katër rrugëve) shih te RRUG/Ë,~A. Mbeti në rrugë të madhe (në mes të rrugës, në mes të katër rrugëve) dikush shih te RRUG/Ë,~A. Mori udhën e madhe (udhët) shih tek UDH/Ë,~A. E pafsha në rrugë të madhe! mallk. shih te RRUG/Ë,~A. E ka fytin të madh (të gjatë) shih te GJATË (i,e). E ka për gjë të madhe a) e quan shumë të rëndësishme, si diçka që vlen shumë; b) e ka tepër të vështirë diçka për ta bërë, nuk ia hyn a nuk e merr përsipër. E ka gjuhën (llapën) të madhe (të gjatë) shih te GJATË (i, e). E ka hundën të madhe (të gjatë) shih te GJATË (i, e). E ka lafshën të madhe shih te LAFSH/Ë,~A. E kishte plafin të madh dikush shih te PLAF,~I. Ka prerë para të madhe dikush shih te PRES I. E ka syrin të madh për diçka lakmon gjëra të mëdha; kërkon të bëjë gjëra jashtë mundësive të veta. I ra me lugë të madhe diçkaje shih te LUG/Ë,~A. Kërkon të hajë me lugë të madhe keq. shih te LUG/Ë,~A. I vogël për prehër, i madh për zemër fj. u. shih te PREH/ËR,~RI. Luga e madhe të zë fytin (të shqyen gojën) fj. u. shih te LUG/Ë,~A. Thela e madhe të ngec në fyt fj. u. shih te THEL/Ë,~A. Ku të tregojnë copën e madhe, merr lugën e vogël fj. u. shih te LUG/Ë,~A. Arusha e Madhe astr. shih tek ARUSH/Ë,~A. Qerrja e Madhe astr. shih te QERR/E,~JA. Java e madhe fet., vjet. shih te JAV/Ë,~A. Lia e madhe mjek. lia e dhenve. E premtja e madhe (e zezë) fet. shih te PREMT/E,~JA (e)."]}]</script>
