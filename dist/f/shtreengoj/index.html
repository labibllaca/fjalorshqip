<script>window.__INITIAL_DATA__ = [{"slug":"shtreengoj","term":"SHTRËNGOJ","attributes":["kal."],"definitions":["E rrok dikë a diçka dhe e mbaj me forcë; e shtyp duke e pushtuar nga të gjitha anët a duke e ngjeshur, pas diçkaje; afroj pranë njëri-tjetrit dy a më shumë sende ose pjesë të një sendi dhe i ngjesh a i shtyp. Shtrëngoj dhëmbët (nofullat, buzët, sytë). Shtrënguan duart. I shtrëngoi dorën. Shtrëngoj grushtet. Shtrëngoj armën (pushkën). Mos e shtrëngo penën (lapsin)! E shtrëngoi në gjoks (në gji). E shtrëngoi në fyt. E shtrëngoi me krahë (me dhëmbë). E shtrëngoi pas murit. E shtrëngoj fort.","E tërheq diçka duke e bërë më të ngushtë, e ngushtoj me forcë; e lidh fort, e mbledh, e ngjesh a e tkurr diçka duke tërhequr fort një fill, një rrip, një litar etj., që ia kam shkuar përreth; mbledh, tkurr (muskujt etj.); kund. liroj. Shtrëngoj rripin (pantallonat). Shtrëngoj mesin (belin). Shtrëngoj kokën (ballin) me shami. Shtrëngoi lakun (nyjën). Shtrëngoi frerin (kapistrën, litarin, nënbarkjen, rripin). Shtrëngoj dengun (duajt e grurit). Shtrëngoj muskujt. Shtrëngoj me tel.","E rrotulloj diçka për ta vidhosur deri në fund që të zërë vend mirë e të mos lëvizë; e mbërthej më fort diçka në vendin e vet me dorë a me një mjet; kund. liroj. Shtrëngoj vidhën. Shtrëngoj bravën (dorezën). Shtrëngoj me dorë (me darë).","vet. veta III fig. Bëhet më e fortë a më e mprehtë, më ngacmon shumë, s'më lë të qetë; ndiej nevojë të ngutshme të dal jashtë. E ka shtrënguar uria. Më shtrëngoi reumatizmi (rrufa, kolla). E shtrëngoi ujët e hollë.","Më rri e ngushtë e më vret pak (për këpucët, veshjet etj.). Më shtrëngojnë këpucët. Më shtrëngojnë mëngët. Më shtrëngon xhaketa te sqetullat.","E detyroj dikë të veprojë në një mënyrë të caktuar kundër vullnetit e dëshirës së tij. E shtrëngoi skamja. E shtrënguan me dhunë. E shtrënguan, po nuk tregoi. E shtrënguan të largohej. Nuk e shtrëngoi njeri të nisej.","E ngjesh dikë duke u ulur pranë tij në një vend të ngushtë. Na shtrënguan shumë. Ec më tutje se na shtrëngove!","fig. I vë fre, e disiplinoj, e kufizoj në sjellje e në veprime. Shtrëngoji ca fëmijët!","jokal. Fillon e bëhet më i fortë, shtohet, rritet, dendësohet etj. Shtrëngoi vapa (të ftohtët). Shtrëngoi dimri. Shtrëngoi era (shiu, dëbora). Shtrëngoi puna u shtua puna shumë. * I shtrëngoi burgjitë (vidhat, çivitë) dikujt e detyroi të sillet a të veprojë në një mënyrë të caktuar, ia mblodhi mirë. Ia shtrënguan darët dikujt e detyruan me forcë; ia mblodhën rripat. Ia shtrëngoi dizgjinët dikujt ia mblodhi, nuk e la të bënte sipas qejfit, ia mblodhi frerin. E shtrëngoi (e rrudhi) dorën nisi të kursejë më shumë, e përdor diçka më me kursim, u bë më i kursyer. I shtrëngoj dorën dikujt e uroj dhe e përgëzoj dikë për një punë të mirë që ka bërë; e përshëndet dhe e lavdëroj. Shtrëngon (kërcet) dhëmbët mbledh të gjitha fuqitë për të kryer një punë të rëndë a për të përballuar një gjendje të vështirë. Shtrëngon grushtet shih te GRUSHT,~I. Shtrëngoj këmbët shpejtoj, nxitoj. Nuk e ka shtrënguar këpuca (ndonjëherë) nuk e ka ndier veten ngushtë ndonjëherë: s'ka qenë nevojtar, s'di ç'është skamja. Nuk ia vret (nuk ia shtrëngon) këpuca këmbën shih te VRAS. Ia shtrëngoi lakun dikujt shih te LAK,~U. Shtrëngoi puna duhet përfunduar a duhet zgjidhur sa më parë një punë, nuk pret më, nuk duron më. Shtrëngojmë (ngjeshim) radhët bashkohemi edhe më fort për të përballuar diçka. Shtrëngoi rripin u detyrua të jetoj me më pak mjete e më keq, në kushte më të vështira. Shtrëngo rripat! bëhu gati!, qëndro!, trimërohu! Ia shtrëngoi (ia mblodhi) rripat (frerin) dikujt shih te MBLEDH. Ia ka shtrënguar vegjës (avlëmendit) i është futur punës si duhet, po punon me të gjitha forcat. E shtrëngoi veza shih te VEZË,~A. Ia shtrëngon dhëmbët nganjëherë e qorton rëndë a e rreh nganjëherë; ia mbledh mirë, ia tregon qejfin. Ia shtrëngoi frerin gojës (gjuhës) shih te FRE,~RI. Shtrëngoje (mbaje) gjuhën pas (prapa) dhëmbëve (ndër dhëmbë, në mes të dhëmbëve) shih te GJUHË,~A 1,3."]}]</script>
