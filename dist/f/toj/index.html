<script>window.__INITIAL_DATA__ = [{"slug":"toj","term":"TOJ","attributes":["kal."],"definitions":["Rrit numrin, i bëj më shumë sesa janë, shumoj; kund. pakësoj. Shtoj tufën (bagëtinë, gjënë e gjallë, lopët, kuajt, pulat, derrat).","Rrit vëllimin, zgjeroj sipërfaqen a zmadhoj sasinë e diçkaje, e bëj më të madh, më të gjatë a më të gjerë, e zmadhoj; kund. zvogëloj. Shtojmë tokat e bukës. Shtojmë prodhimin. I shtoi kursimet (shpenzimet). I shtuan një kat (një krah, dy dhoma) shtëpisë. Shtoj çarçafin (fustanin). Na shtuan punë.","Them a shkruaj diçka për të plotësuar atë që kam thënë a kam shkruar më parë. Shtoj dy radhë (një paragraf, një kapitull). Shtoj disa fjalë. S`kam gjë për të shtuar. Dua të shtoj se.. .","E bëj më të fortë, e përforcoj, e rrit (një veprim, një ndjenjë, një veti a një cilësi). Shtoj shpejtësinë. Ia shton bukurinë. Na e shton gëzimin (lumturinë, hidhërimin, dashurinë). Na e shton besimin. E shton veprimtarinë (ndikimin). Shtojmë aftësinë luftarake (fuqinë mbrojtëse). Shtojnë lavdinë e kësaj toke.","I zmadhoj e i zbukuroj ato që kam dëgjuar a kam parë, duke shpikur nga vetja hollësira të paqena; zmadhoj. E ka zakon t`i shtojë gjërat. Mos shto!","jokal. Bëhem më i rëndë në peshë, vë mish, shëndoshem. Shton në peshë. Ka shtuar tri kile. Nuk shton fare. Shton nga pak.","jokal. I rritet vëllimi a fryhet duke zier. Orizi i vendit shton shumë. Shtojnë makaronat (fasulet). * Shton nga xhepi dikush shih te XHEP,~I. Shto ujë e shto miell mospërf. e zgjat a e zvarrit një punë pa fund, duke e zmadhuar pa nevojë vëllimin e saj. Kali i mirë e shton (vetë) tagjinë fj. u. shih tek TAGJI,~A."]}]</script>
