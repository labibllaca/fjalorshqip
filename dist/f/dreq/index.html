<script>window.__INITIAL_DATA__ = [{"slug":"dreq","term":"DREQ","attributes":["kal."],"definitions":["Kthej në gjendjen e mëparshme diçka që është prishur a dëmtuar; bëj të përshtatshëm përsëri për të punuar ose për ta përdorur, ujdis, rregulloj; kund. prish. Ndreq urën (rrugën) e prishur. Ndreq këpucët (çizmet). Ndreq orën (radion, televizorin). Çoj për të ndrequr.","Sjell përsëri në rregull, vë për fije, rregull Ndreq shtëpinë (dhomën). Ndreq shtratin. Ndreq flokët.","Përmirësoj diçka në krahasim me të kaluarën. Ndreq notat. Ndreq rezultatin e garave.","fig. I mënjanoj a i zhduk gabimet, të metat dobësitë, e sjell dikë në rregull; e përmirësoj. Ndreq gabimet. Ndreq shokun. Ndreq veten.","fig. bised. Zgjidh një mosmarrëveshje a grindje, pajtoj; ujdis. I ndreqi me të mirë. Hyri në mes dhe i ndreqi. E ndreqi punën. Kush e ndreq me ta!","bised. I bëj shërbimet e nevojshme, i jap të hajë e të pijë, i shtroj për të fjetur etj. Ndreq fëmijët. Ndreq kalin. I ndreqi miqtë. Ndreq tryezën shtroj tryezën.","bised. Përgatit diçka për të ngrënë më të gjatë që duhen; i shtoj diçka gjellës për t'i përmirësuar shijen; ndërtoj. Ndreq gjellën me erëza.","bised. Drejtoj. Ndreq shtatin (trupin).","vjet. Paguaj detyrimin që kam ndaj dikujt. Ndreqi punëtorët. Ndreqi borxhlinjtë. * Ndreq (drejto, rregullo) gojën! shih te GOJ/Ë, ~A. I ndreqi hesapet me dikë mori hak kundër dikujt, i lau hesapet me dikë. Ia ndreqi kryqet dikujt shih te KRYQE,~T. I ndreqi orët me dikë keq. shih tek OR/Ë,~A I. Ia ndreqi (ia rregulloi, të ujdisi) qejfin (kokën) nuk e la të vepronte sipas trilleve të tij; ia ndreqi samarin. Ia ndreqi (ia rregulloi, ia ujdisi) samarin (bërroren, kurrizin, shpinën) dikujt e rrahu, e ndëshkoi rëndë për një faj ose kur nuk bindej; i dha përgjigjen e merituar, i tregoi vendin dikujt. As prish, as ndreq (punë) shih te PRISH. S'di kujt t'ia prish e kujt t'ia ndreq shih te PRISH",""]},{"slug":"dreq","term":"DREQ","attributes":["m.","sh."],"definitions":["fet., mit. shih DJALL,~I 1. Kujtonin se ishin punët e dreqit. E marrtë (e hëngërt) dreqi! mallk. I hipën dreqërit u zemërua keq, u egërsua shumë, u tërbua nga inati. Ka dreqin në bark është smirëzi; nuk do t'i shohë të tjerët mirë, u do të keqen të tjerëve. I ka hyrë dreqi në bark është bërë smirëzi e shpirtkeq; është tërbuar nga inati.","fig. thjeshtligj., keq. Njeri dinak, shpirtkeq e smirëzi; njeri i prapë, i prirur për prapësira; djall. S`bëhet punë me atë dreq. Ngatërroi tërë botën, dreqi.","thjeshtligj., edhe përk. Njeri shumë i zgjuar e i shkathët, njeri që i punon mendja për shumë gjëra e di të gjejë zgjidhje edhe në gjendje të vështira; njeri që di të përfitojë në çdo rast e rrethanë; djall. Është dreqi vetë. Ik, ore dreq!","thjeshtligj. (me përemrin pyetës ç`dhe me ndajfoljet pyetëse si?, ku?). Përdoret për të përforcuar shprehjen e pakënaqësisë, të mërzitjes, të zemërimit etj. Ç`dreq kërkon? Ç`dreq (ç’dreqin) pati? Ç`dreqin do? Si dreqin nuk e takove? Ku dreqin e humbët?","përd. mb. thjeshtligj. Që të mundon shumë, që të pëlcet shpirtin; shumë i keq; djall. Një dreq kollë. Ajo dreq sëmundje. * U bë për dreq (për djall) shih te DJALL, ~I. U bind dreqi thjeshtligj. shih te BINDEM. E dërgoi (e çoi) në dreq (në djall) dikë a diçka thjeshtligj., keq. shih te DJALL,~I. Dreqi (djalli) me të birin thjeshtligj. shih te DJALL,~I. Dreq (djall, shejtan) me brirë thjeshtligj. shih te BRI,~RI. Dreqi (djalli) e di (e merr vesh) thjeshtligj. shih te DJALL,~I. Një dreq (një djall) e gjysmë thjeshtligj. shih te DJALL, ~I. Dreq (djall) o punë! thjeshtligj. shih te DJALL,~I. I kalli dreqin (djallin) dikujt a diçkaje thjeshtligj. shih te KALL I. E mori (e hëngri) dreqi (djalli) thjeshtligj. përfundoi keq, e mori lumi. Plasi dreqi shih te PLAS. Më polli dreqi (djalli) shih te PJELL. Punë dreqi! çështje shumë e ngatërruar; telash i madh. Ia bëri pajë dreqit (shejtanit) shih te PAJ/Ë,~A I. Ka sa të hajë dreqi thjeshtligj. shih te HA. Dreqi (djalli) nuk është aq i zi sa duket shih te DJALL,~I."]}]</script>
