<script>window.__INITIAL_DATA__ = [{"slug":"eeshoj","term":"ËSHOJ","attributes":["kal."],"definitions":["E lë të bjerë nga lart poshtë; e lë të varet lirisht poshtë ose të mbështetet mbi diçka tjetër, e ul. Lëshoi një gur (një tullë) nga lart. E lëshoi në lumë (në det, në gropë). E lëshoi nga duart. E lëshoi nga dritarja (nga kati i dytë). Lëshoj perden. I lëshoi krahët poshtë. I lëshoi flokët mbi supe (krahëve).","E vë dikë a diçka në një vend në një mënyrë të caktuar, lë. E lëshoi fëmijën në shtrat. E lëshoi në tokë. E lëshoi përmbys (në shpinë, në këmbë). E mori dhe e lëshoi pas derës.","E lë të lirë diçka a dikë që e mbaj me duar, që e kam kapur, e kam lidhur, e kam mbyllur etj., e lë që të ikë, të lëvizë, të rrjedhë etj., ia heq pengesën. Lëshoj kazmën (lopatën, belin). E lëshoi timonin. E lëshoi degën e pemës. E lëshoi zogun. E lëshoi qenin nga zinxhiri. Lëshoi bagëtinë (lopët, dhentë, dhitë).E lëshoi kalin me vrap. I lëshoi ujin arës. Lëshoi rrymën elektrike. E lëshoi pikë-pikë.","E vë në lëvizje diçka që të punojë; e vë në punë për herë të parë. Lëshoj motorin. Lëshuan edhe turbinën e dytë.","E lë të lirë diçka që ka qenë e zënë, e liroj për të kaluar nëpër të ose për të ndenjur në të; ia lë a ia jap diçka dikujt që ta përdorët; e lë një vend që ta zërë një tjetër, e braktis që ta pushtojë një tjetër; heq dorë. I lëshoi udhë dikujt. I lëshoi karrigen (vend). Lëshoje rrugën. I lëshoi një dhomë me qira (shtëpinë). Nuk e lëshuan kështjellën (qytetin). Nuk lëshojmë asnjë pëllëmbë nga toka jonë. E lëshuan fenë. bised. hoqën dorë prej saj, e braktisën fenë. E lëshoi punën e la punën, e braktisi.","E rrëzoj përtokë diçka, e hedh; lë. E lëshoi lisin (pemën) përtokë i preu. E lëshoi të vdekur (top, shakull). E lëshoi pa ndjenja (sa gjatë gjerë). E lëshoi në dëborë (në baltë). Kati i huaj të lëshon në ujë. fj. u.","vet. veta III bised. (me një trajtë të shkurtër të përemrit vetor në r. kallëzore). Më lë, më ndahet, më largohet, s'më mban më (një sëmundje, një dhimbje etj.). E lëshoi ngërçi (kolla, gripi). E lëshuan ethet. E lëshoi koka (barku, dhëmballa) nuk i dhemb më koka etj., nuk ka më dhimbje. E lëshuan dhimbje (të prerat, të dridhurat). E lëshoi gjumi u zgjua.","kryes. veta III edhe fig. Nxjerr diçka nga vetja, e bën të dalë jashtë vetes, hedh; nxjerr nga vetja e përhap rrotull diçka; hap, çel; jep, krijon; lë. Lëshoi lëng. Gjarpri lëshon helm. I lëshojnë lot sytë. Lëshon tym. Lëshon erë të mirë. Lëshon tinguj të hollë. Lëshoi kujën (piskamën) nisi të qante me të madhe. Ka lëshuar mjekër. Lëshoi lule (gjethe, lastarë, rrënjë, kokrra). Lëshoi kalli gruri. Lëshoi xhufkë misri. Zjarri lëshon xixa (shkëndija, afsh të nxehtë). Dielli lëshon rreze. E lëshon bojën kjo rrobë. Ka lëshuar bark (gushë) është shëndoshur shumë. Lëshon hije pema bën hije. Lëshoi vrer volli vrer. Ka lëshuar urdhrin (thirrjen). Lëshoi parullën. Lëshoi kushtrimin.","E hedh diçka a e nis dikë me vrull në një vend të caktuar, e drejtoj në një pikë, e përqendroj diku; ia çoj, ia drejtoj, ia lë (edhe fig.). Lëshoi një raketë. E lëshoi topin drejt portës. sport. I lëshoi trupat në luftë. Lëshoi të gjithë kalorësinë. I lëshoi dritën diçkaje. I lëshoi sytë (shikimin, vështrimin). I lëshoi një fjalë. I lëshoi një thumb. I lëshoi një të sharë. Ia lëshoi atij fajin.","bised. E lë, e ndaj (gruan a burrin). E lëshoi gruan (burrin).","vet. veta III (me një trajtë të shkurtër të përemrit vetor në r. kallëzore) edhe fig. Nuk më punon më një pjesë e trupit, s'kam më fuqi ose aftësi trupore a mendore, më dobësohet a më pakësohet shumë, më lë, më bie. E lëshuan fuqitë. E lëshuan këmbët nuk qëndron dot më në këmbë ose nuk ecën dot a ecën me vështirësi nga një sëmundje a nga pleqëria. E lëshoi kujtesa.","jokal. vet. veta III bised. Roit (për bletën). Lëshoi bleta.","bised. Ia shes një gjë dikujt (zakonisht me një çmim të përshtatshëm për të), ia jap dikujt, ia lë. S`e lëshonte më lirë.","jokal. vet. veta III bised. Del me shumicë, vërshon. Lëshuan ujërat. Ka lëshuar lumi.","jokal. Bëj lëshime për diçka. S`është nga ata që lëshojnë. * Lëshoi (dorëzoi, dha, hodhi, la, uli) armët shih tek ARM/Ë,~A. S'lëshon ashkël shih tek ASHK/ËL, ~LA. E lëshon bajgën thjeshtligj. shih te BAJG/Ë,~A. Lëshon bark diçka nis të përkulet në një anë, shtrembërohet; bëhet gati për t’u shembur (një mur). Lëshoi be për diçka u betua për diçka. I lëshoi (i qiti) be iu lut me të madhe për diçka, iu përgjërua duke e lidhur me be. Lëshoi dorë kundër dikujt e qëlloi, e goditi. E lëshon dorën tregohet dorëlirë, prish me tepri; nuk i peshon mirë qëndrimet a veprimet e veta. E lëshoi dore dikë e braktisi, e ndau, e largoi. E lëshoi në dorë të dikujt shih te DOR/Ë, ~A. S'e lëshon (s'e lë, s'e heq) nga dora diçka shih te DOR/Ë,~A. Ia ka lëshuar fillin dikujt e ka lënë të lirë të veprojë si të dojë, nuk e mban më nën kujdes e s'e kontrollon më. Ia lëshoi (ia liroi) frerin (kapistallin, kapistrën) dikujt keq. e ka lënë të lirë të veprojë si të dojë, nuk e mban më nën një kontroll të rreptë. E ka lëshuar gojën (gjuhën, llapën) flet shumë, me vend e pa vend; është bërë gojështhurur. I lëshoi gojë dikujt e shau dikë. S'e lëshon (s'e heq, s'e lë, s'e ndan) nga goja dikë a diçka shih te GOJ/Ë, ~A. E ka lëshuar kripa dikë bën shaka vend e pa vend, flet mbarë e prapë. I lëshoi litar dikujt i bëri lëshime. E lëshuan mendtë dikë u prish nga mendtë, shkalloi. Lëshoi pe (vend) bëri lëshime. Lëshoi loze a) dikush e zgjati një punë, një bisedë etj.; b) diçka u rrit e u zhvillua, u zgjerua e përparoi. Ka lëshuar (ka zënë) merimangë toka shih te MERIMANG/Ë,~A. Lëshofsh mjekër! u plaksh shëndoshë! Nuk ia ka lëshuar (nuk ia ka thyer) poganikun diçkaje shih te THYEJ. E kanë lëshuar (i janë liruar) rrathët shih te RRETH,~I. Lëshon (hedh, ngul zë) rrënjë shih te RRËNJ/Ë,~A I. I lëshoi rripin dikujt e la të vepronte si të donte, e la të lirë, ia lëshoi kapistallin. I lëshoj (i bëj, i hap) rrugë (udhë) dikujt shih te RRUG/Ë,~A. E kanë lëshuar (e kanë lënë) sendet dikë shih te SEND,~I. I lëshoi spangon diçkaje filloi ta maste, i vuri kutin, i vuri metrin. Nuk e lëshon (nuk e heq) nga sytë nuk ia ndan sytë, nuk ia shkëput vështrimin. Ka lëshuar (ka hedhur) shtat shih te SHTAT,~I. Lëshoi vendin (fronin) e la punën që kishte, ra nga fuqia. I lëshoj vendin dikujt shih te VEND,~I. E lëshoi veten nuk u qëndroi dot vështirësive a fatkeqësive, u dha, u dorëzua, u lëshua, s'e mban më veten. I lëshoi (i lëvari, i vari) vetullat shih te VAR. Lëshon (nxjerr, vjell) vrer (helm e vrer) shih te VRER, ~I. E lëshoi zemra e humbi guximin, nuk ka më forca për të përballuar diçka, iu prenë fuqitë. I lëshoi (i bëri) zë dikujt e thirri dikë. Lëshoi brezin (i pari) a) dha shkak për grindje, hapi sherr; ishte gati të ndeshej me dikë; b) bëri lëshime, hapi rrugë; u tërhoq. I lëshoi (i lëvari, i vari) buzët (hundët, turinjtë) një pëllëmbë shih te VAR. Nuk e lëshon fjalën nga goja flet shumë, është llafazan. I lëshon fjalët veresie keq. shih te VERESIE","Ia lëshoi frerin gojës (gjuhës) shih te FRE,~RI I. Më lëshon (më rrjedh, më shkon) goja lëng shih te LËNG,~U. I lëshon (i nxjerr, i qit) koka tym shih tek TYM,~I. E lëshuan (e lanë) leqet e këmbëve shih te LAK,~U. Të lëshon litarin nëpër këmbë shih te LITAR,~I. Ia lëshoi samarin nën bark (nëpër këmbë) dikujt shih te SAMAR,~I. I lëshojn ë(i bëjnë, i nxjerrin) sytë xixa (çika, shkëndija) shih te SY,~RI. S'i lëshon udhë as më të mirit (askujt) është ndër më të mirët, s'ka më të mirë se ai. I lëshon shumë ujë mullirit mospërf. flet shumë e pa i peshuar gjërat mirë. Lëshon hije pa dalë dielli mospërf. shih te HIJ/E,~A."]}]</script>
