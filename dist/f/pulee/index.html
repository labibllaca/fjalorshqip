<script>window.__INITIAL_DATA__ = [{"slug":"pulee","term":"PULË","attributes":["f.","sh."],"definitions":["Shpend shtëpiak, me trup të vogël e me krahë të shkurtër, që mbahet për vezët dhe për mishin; femra e gjelit; m. sh. tërësia e këtyre shpendëve (meshkuj e femra). Pulë e bardhë (e zezë). Pulë e majme. Pulë pikaloshe. Pulë këmbëleshe. Pulë shqerake (fushe) pula e zakonshme. Pulë e pjekur. Pulat e kooperativës. Mish (vezë) pule. Koteci i pulave. Ndjell pulat. Theri një pulë. E vuri pulën klloçkë. Ra dhelpra në pula.","Kokërr misri e pjekur, por që nuk ka plasur ose nuk është bërë pupagjel. Misri mbeti pulë.","fig. Njeri i urtë dhe i ndrojtur, njeri tepër i butë; njeri frikacak që përulet e nënshtrohet lehtë. E bëri pulë dikë e nënshtroi, e vuri nën urdhrat e veta; e shtroi, ia theu krenarinë. U bë pulë. * Fle me pulat shih te FLE. Si pula pa krye (pa kokë) i shushatur, i hutuar. Me pula e me zogj me gjithë njerëzit e shtëpisë, me qen e me mace. Si qifti pulën shih te QIFT,~I. Rri si pulë rri shumë urtë, nuk lëviz nga vendi e s`bën zë fare; rri i ndrojtur e i përulur. Ra si pula në gurë (në mulli) ra në mes të gjitha të mirave, gjeti të gjitha ç`i duhen; s`i mungon asgjë, është në gjendje shumë të mirë. Ra si pula (si gjeli) në thekër shih te THEK/ËR,~RA. S’na i ka çukitur (s`na i ka ngrënë, s’na i ka pirë) pula (sorra) mendtë shih te SORR/Ë,~A. E di ku pjell pula e di ku është e mira, e gjen të mirën vetë. Ka ngrënë plëndës pule shaka. flet shumë, është llafazan i madh. Sikur i ka ngrënë pula kapsollën në gjendje shumë të vështirë, shumë ngushtë; sikur i ka ngrënë macja brumin. S'ia ha pulat dhelpra dikujt është i zoti, nuk ia hedh dot, s'ia ha qeni shkopin. Ku ha pula gurë (strall) shih te GUR,~I. S’ha pulë të ngordhur shih te NGORDHUR (i, e). I ha pula qurrat mospërf. nuk është i zoti as për vete, është shumë i ngathët e i qullët. Humbi si shurra e pulës thjeshtligj. shih te SHURR/Ë,~A. Bën si pula kur i vjen veza nuk rri në një vend, lëviz andej-këtej, s`i zë vendi vend. Kakaris si pula në veri (si pula pa grurë) flet fare pa nevojë e pa u menduar, flet shumë dhe kot më kot. S’ka pulë në tra (s'ka një pulë përpara derës) është shumë i varfër. Nuk e kishte as në shpatull të pulës shih te SHPATULL, ~A. E lëshon si pula glasën thjeshtligj. shih te GLAS/Ë, ~A. Nuk e nxjerr dot pulën nga kopshti është shumë i ngathët, nuk është i zoti për asgjë. E pagoi sa frëngu pulën shih te FRËNG,~U. Rri si pulë e lagur përçm. shih te LAGUR (i, e). Shkruan si me këmbët e pulës shih te KËMB/Ë,~A. Vë pulën në zogj shih te ZOG, ~U. U bë veza të mësojë pulën! iron. shih te VEZ/Ë, ~A. Kur s'ke pula, mos bëj «ish»! fj. u. thuhet kur e këshillojnë dikë të mos përzihet në punët që s'i takojnë. Kur s'ke pula, pse hahesh me dhelpra? (mos u merr me dhelprat!) kur s'ke pula, mos bëj «ish»! Kur s'ke pulën, ha (edhe) sorrën thuhet kur je i detyruar të pranosh diçka më të keqe nga ajo që dëshiron a kërkon; për të theksuar se njeriu bën si bën, mësohet edhe me kushte të vështira. Ia merr pula bukën nga dora mospërf. shih te BUK/Ë,~A. Më mirë një vezë sot, se një pulë mot fj. u. shih te VEZ/Ë,~A. Pula e botës duket më e madhe fj. u. iron. thuhet kur ajo që nuk të përket ty ose ajo që nuk e njeh të duket më e mirë. Pula e fqinjës të duket patë shih te PAT/Ë,~A. Shumë pula e pak vezë shumë zhurmë, por pak punë, shumë miza e pak mjaltë. Atë që ul qafën, e dhjesin pulat fj. u. thjeshtligj. atë që gjunjëzohet ose nënshtrohet e marrin të gjithë nëpër këmbë. Mos u përziej me krundet, se do të të hanë pulat! (po të përzihesh me krundet, të hanë pulat) fj. u. shih te KRUNDE,~T. Ka ngordhur ajo pulë, që bënte ato vezë ka ikur ajo kohë, s`janë më ato kohëra. Meli i pulës bot. kostreve. Rrush pule bot. mana toke. Thua pule bot. thuapulë. Verbëria e pulave mjek., veter. shih te VERBËRI,~A. PULË DETI zool. Shpend i madh shtëpiak, me pupla zakonisht në ngjyrë të errët e pika-pika, me krahë të shkurtër, me kokën dhe një pjesë të qafës pa pupla, që rritet kryesisht për mis
