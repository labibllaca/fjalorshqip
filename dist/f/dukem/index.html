<script>window.__INITIAL_DATA__ = [{"slug":"dukem","term":"DUKEM","attributes":["vetv."],"definitions":["Jam në një vend ku mund të më shohin të tjerët, shihem, dallohem. Duket mali (fusha, qyteti, fshati). Duken dritat. Dukej mirë (qartë). Duket nga lart. Sa mezi duket. Fshihu se dukesh!","Shfaqem përpara syve të dikujt, dal në një vend ku më rrok syri i dikujt a ku vihem re mirë nga dikush, shfaqem; kund. zhdukem. U duk dielli (hëna). U dukën re të zeza. U dukën dy njerëz. U duk atje tej. U duk në horizont. Nuk u duk gjëkundi.","bised. Shkoj diku për të parë a për të takuar dikë. Dukej rrallë nga këto anë. Duku nga shtëpia! Mos u duk me këtej!","Lë një përshtypje a krijoj një ide të caktuar te të tjerët; lë një përshtypje a krijoj një ide tjetër, jo të saktë ose të gabuar, lë përshtypjen sikur jam i tillë, shfaqem si ...; shëmbëllej me dikë a me diçka. Duket i ri (plak, i shëndoshë, i sëmurë, i lodhur, i gëzuar, i hidhëruar, i lumtur). Duket si i përdorur. Duket si i vëllai (si e motra). Si të duket? Kushedi ç`i duket vetja vlerëson shumë veten, mbahet me të madh.","vet. veta III (zakonisht me një trajtë të shkurtër të përemrit vetor në r. dhanore). Kam një mendim, një ide ose një përshtypje të caktuar për dikë a për diçka; kujtoj se është kështu ose ashtu, më ngjan, më bëhet sikur, pandeh. Më duket i drejtë (i padrejtë). M`u duk shumë i nxehtë (shumë i ftohtë). Më duket se është nisur mund të jetë nisur. Më duket e udhës. S`më duket gjë dikush a diçka s'e vlerësoj fare, s'ma mbush syrin; s'më tërheq, s'më hyn në sy. Kështu më duket. Si të të duket më mirë. Më duket se ka të drejtë.","Jam në një gjendje të caktuar trupore a shpirtërore, ndihem; jam; kam këto ose ato përfundime, arritje në punë a në jetë; shkoj. Sot duket më mirë (me keq). Si dukesh me shëndet? Si duket sot i sëmuri? Si duken punët? Si dukesh me punë?","Shfaq veten përpara të tjerëve me të gjitha vetitë e tiparet që kam, zbuloj vetveten, e tregoj kush jam. U duk se kush është. Miku i vërtetë duket në ditë të vështira. fj. u. Kapiteni i mirë duket në furtunë. fj. u.","keq. Përpiqem të dal mbi të tjerët, bëj çmos që të bie në sy a të dallohem për çdo gjë. Kërkon (i pëlqen) të duket. Nuk punon për t`u dukur. S`e bëri për t`u dukur.","vet. veta III bised. Dallohet qartë (nga tiparet, nga cilësia, nga shenjat, nga trajta a pamja e jashtme etj.), vihet re, bie në sy menjëherë; është fare e qartë, merret vesh, kuptohet; mund të merret me mend qysh tani përfundimi i një pune; ndihet. Duket puna (dora) e dikujt. Duket ndikimi i dikujt a i diçkaje. U duk kjo punë. Duket sheshit. Duket që është i ri (i vjetër, i përdorur, i mbajtur, i paprekur, i shëndoshë). Duket që është i përgatitur (që ka mësuar). Duket që është vepër e mirë. Duket që e duan shumë njëri-tjetrin. Siç duket... fj. ndërm. Me (nga) sa duket... fj. ndërm.","vet. veta III bised. Botohet, del në qarkullim, del në dritë. Kohët e fundit janë dukur shumë vepra të reja. * Sa për t'u dukur sa për të kaluar radhën, sa për formë; sa për sy e faqe. Siç duken (siç tregojnë) bathët shih te BATH/Ë,~A. S'iu duk (s'iu gjend) binaja shih te BINA,~JA. Duket breshka shih te BRESHK/Ë,~A. Nuk i duket (i humbi, i treti) boja shih te BOJ/Ë,~A I. Dielli duket (shihet) që në mëngjes (që kur lind) fj. u. shih te DIELL,~I. I duket hunda dyfek keq. shih te DYFEK,~U. I duken malet shesh shih te SHESH,~I. Dita e mirë (moti i mirë) duket që në mëngjes fj. u. shih te MËNGJES, ~I. Djalli (dreqi) nuk është aq i zi sa duket shih te DJALL,~I. Fshati që duket s'do kallauz fj. u. shih te FSHAT,~I. Pula e botës duket më e majme iron. fj. u. shih te PUL/Ë,~A. Qimja e tjetrit të duket tra shih te QIM/E,~JA. Gjithkujt murrizi i vet i duket i njomë fj. u. shih te MURRIZ, ~I."]}]</script>
