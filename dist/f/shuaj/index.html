. Bëj diçka me tepri, shemb, kërdis. Më shuan me gënjeshtra.","Prish diçka të shkruar duke e fshirë me gomë ose duke hequr vizë mbi të; e heq dikë nga një listë duke ia shlyer emrin; prish, shlyej; fshij (edhe fig.). Shuaj një fjalë (një rresht). Shuaj emrin e dikujt. E shuaj me gomë. E shuan nga lista. E shuaj nga kujtesa (nga mendja).","I shtie zakonisht ujë diçkaje që ta tret, ta zbut etj. Shuaj rakinë (uzon). Shuaj gjellën me ujë (me verë, me uthull) (kur është duke zier në zjarr). Shuaj gëlqeren e shtie gëlqeren e pashuar në ujë, që të bëhet e përshtatshme për t'u përdorur.","jokal. bised. Vdes; mbaroj (edhe fig.). Shoi ndaj të gdhirë. Shoi së qari fëmija. * As ndez, as shuan shih te NDEZ. E shoi (e fshiu, e shleu, e hoqi) nga defteri dikë a diçka shih te DEFTER,~I. Të shuan derën (binanë, pishën) të bën dëm të madh, të shkatërron a të rrënon krejt, të fik, të merr në qafë; të zhduk fare, të vret. Ia shoi (ia humbi, ia treti) farën dikujt a diçkaje shih te FAR/Ë,~A. Shuaj (ftoh, ul, shtroj, zbut) gjakrat shih te GJAK,~U. Ia shoi (ia mbylli) oxhakun shih te MBYLL. E shoi zjarrin e mbylli me qëllim një çështje të acaruar, e qetësoi qëllimisht gjendjen. Është ndiz e shuaj merret me punë të kota, s'e ke për gjë. E shoi (e zhduku, e fshiu) nga faqja e dheut shih te FAQ/E,~JA."]}]</script>
