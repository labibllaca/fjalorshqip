<script>window.__INITIAL_DATA__ = [{"slug":"ditee","term":"DITË","attributes":["f.","sh."],"definitions":["Koha kur lind dielli e derisa perëndon, koha që kur gdhin e derisa ngryset; drita e diellit gjatë kësaj kohe; moti gjatë kësaj kohe; kund. natë. Ditë e gjatë (e shkurtër). Ditë të bukura. Ditë të kthjellëta (të vrenjtura). Ditë e ftohtë (e nxehtë). Gjithë ditën e ditës nga mëngjesi deri në mbrëmje. Gjatë ditës. Fillimi (mesi, mbarimi) i ditës. Zgjatet (rritet, shkurtohet, zvogëlohet) dita. Mori dita u rrit, u zgjat. U thye dita kaloi mesdita, erdhi pasdrekja. Është ditë. U bë ditë u gdhi. Iku (u ngrys) dita u ngrys. Me ditë me dritë dielli, pa u errur. Pa hapur (pa gdhirë, pa zbardhur) dita. Sa pa rënë dita. E bëri ditë. Ditë me re (me shi, me diell). Dita e mirë duket që në mëngjes. fj.u.","Koha prej njëzet e katër orësh, gjatë së cilës Toka bën një rrotullim të plotë rreth boshtit të vet; koha prej njëzet e katër orësh, që llogaritet zakonisht prej mesnate në mesnatë dhe që merret si masë. Ditë kalendarike. Ditë diellore koha nga një mesditë në mesditën tjetër. Ditë hënore kohë prej katërmbëdhjetë ditësh. Ditët e vitit (e muajit, e javës). Para (pas) disa ditësh. Kaluan edhe dy ditë. Mbushi pesë ditë foshnja. Ka shumë ditë që s’e kam parë. Është punë (çështje) ditësh do të kryhet, do të arrihet etj. së shpejti.","Një kohë e caktuar brenda javës, muajit a vitit, gjatë së cilës kryhet a vazhdon një punë, një veprimtari; koha e zënë ose jo me një punë a veprimtari; koha e punës brenda njëzet e katër orëve; puna që bëhet gjatë kësaj kohe. Ditë e lodhshme (e ngarkuar, e qetë). Ditë pune. Ditë mësimi. Ditë punëtore. bised. ditë pune. Ditë aksioni. Ditë pazari. Ditë pushimi. Ditë feste. Dita e punës. Dita e pastrimit. Nxënës (student) i ditës. Shërbimi i ditës. Roja e ditës. Paguhen për ditën e sotme (e djeshme, e nesërme). I shkoi (i iku) dita. Ka munguar pesë ditë. Ka bërë dy ditë më shumë. Do (kërkon) dy ditë kjo punë. E paguante me ditë.","bised. Paga për punën
