<script>window.__INITIAL_DATA__ = [{"slug":"rusht","term":"RUSHT","attributes":["m.","sh."],"definitions":["Dora me gishtërinj të mbledhur fort, dora e mbyllur dhe e shtrënguar. Shtrëngoj (hap) grushtin. Nderoj (përshëndet) me grusht. I ra me grusht.","Goditja me dorë të mbyllur e të shtrënguar; forca e kësaj goditjeje. Grusht i fuqishëm (i rëndë). Grusht boksieri. I dha një grusht. Ka grusht të fortë. U zunë me grushte. Krisi grushti filluan të zihen me grushte.","fig. Goditje e fortë që i jepet armikut dhe që e dëmton rëndë ose e shkatërron plotësisht. Grusht i rëndë (i befasishëm, i rrufeshëm). Grushti i fundit. Grusht vdekjeprurës (asgjësues, vendimtar, dërrmues). Grushte pas grushtesh.","Sasi sa nxë dora e mbledhur, sasi shumë e vogël. Një grusht miell (kripë, sheqer). Një grusht lajthi (bajame). Një grusht ujë.","Diçka e vogël dhe e mbledhur kruspull (përdoret së bashku me numërorin një). Ishte tretur, kishte mbetur një grusht.","Një hapësirë ose sasi fare e vogël, një pakicë; një pëllëmbë (përdoret si bashku me numërorin një përpara një emri tjetër në r. emërore ose rrjedhore). Një grusht njerëzish (komunistësh). Një grusht vend. Një grusht njeri njeri me trup shumë të vogël, një pëllëmbë njeri.","përd. ndajf. fig. Me radhë të ngjeshura e të shtrënguara, shtrënguar si grusht, duke qenë i bashkuar fort me të tjerë. Jemi grusht. Bëhemi grusht.","përd. ndajf. Kruspull, lëmsh. U mblodh (u bë) grusht. * Grusht i blinduar shih te BLINDUAR (i, e). Grusht për grusht dhëmb për dhëmb, pa u frikësuar. Jepte (merrte, fitonte, i kishte) me grusht (me grushte) jepte (merrte, fitonte, i kishte) me shumicë, në sasi të madhe (zakonisht për paratë). E ka (e mban) në grusht e ka nën zotërim të plotë, e ka në dorë. Ngre grushtin shpreh kundërshtimin ndaj dikujt a diçkaje, protestoj; jam gati të ndeshem, të luftoj me dikë. Shtrëngon grushtet mblodh forcat e përgatitet për t'u ndeshur me dikë, për një punë që kërkon guxim e përpjekje. I tregoi grushtin dikujt e kërcënoi dikë; i dha të kuptojë se ishte gati të përleshej me dikë, nuk iu nënshtrua. I bie gjoksit me grushte shih te GJOKS,~I. I bie kokës me grushte shih te KOK/Ë,~A. Ia dha nderin në grusht (në dorë) shih te NDER,~I. Ua futi një grusht miza i futi në sherr, e ndezi sherrin. E ha barutin me grushte është trim i madh, është luftëtar i zoti. E ka dorën grusht është dorështrënguar. E përcolli me një grusht miza (pleshta) shih te MIZ/Ë,~A. Politikë e grushtit të hekurt politikë e forcës dhe e dhunës. I rri me grushte hundëve dikujt keq. shih te HUND/Ë,~A. Erdhi me një grusht miza shih te MIZ/Ë,~A. Ha bukë me grushte barkut ha shpejt e shpejt pothuajse pa e përtypur ushqimin, e rras ushqimin në bark pa e përtypur mirë. Më sa bëhen bashkë (bashkohen) një grusht pleshta iron. shih te PLESHT,~I. Që në gusht nga një grusht fj. u. rezervat sigurohen duke i mbledhur me kohë, pak e nga pak; për të arritur përfundime të mira në një punë duhet filluar me kohë, duke punuar çdo ditë, pak e nga pak. Grusht hidraulik tek. rritje shumë e madhe, më tepër sesa lejohet, e trysnisë nëpër tuba, që shkaktohet nga zvogëlimi i menjëhershëm i shpejtësisë së lëvizjes së lëndës brenda në ta. Grusht shteti ndërrimi i menjëhershëm me dhunë i qeverisë a i formës së qeverisjes, që përgatitet fshehurazi dhe bëhet nga një grup i vogël njerëzish pa u mbështetur te masat e popullit."]}]</script>
