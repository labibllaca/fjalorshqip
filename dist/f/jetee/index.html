<script>window.__INITIAL_DATA__ = [{"slug":"jetee","term":"JETË","attributes":["f."],"definitions":["Veti thelbësore e qenieve të gjalla, që lindin, zhvillohen, ndryshojnë e vdesin dhe që kanë dukuri fiziologjike pak a shumë të njëjta e të përbashkëta, pavarësisht nga veçoritë e gjinisë, të llojit etj.; ekzistenca e qenieve të gjalla në lëvizje e në ndryshim të pandërprerë, si formë e ekzistencës së materies në një etapë të caktuar të zhvillimit të saj. Jeta mbi Tokë. Jeta rreth nesh. Trup pa jetë. Lindja e jetës. Ligjet e jetës. Baza e jetës. Gjurmë (shenja) jete. S'ka jetë. Sa të jetë jeta përgjithmonë. Për (në) jetë të jetëve përgjithmonë. Për jetë e mot përgjithmonë. Nis jeta.","Gjendja fiziologjike e qenieve të gjalla, organizmi i të cilave ka aftësi të kryejë e të plotësojë funksione të veçanta që në lindje (gjatë rritjes, shumëzimit e zhvillimit) dhe deri sa vdes; të qenët gjallë; kund. vdekje. Jeta e njeriut (e kafshëve, e bimëve). Lufta për jetën. Çështje jete (a vdekjeje) çështje me rëndësi vendimtare. Për jetë a për vdekje me ashpërsi të madhe; me vendosmëri për ta çuar deri në fund diçka (luftën, çështjen) pa bërë asnjë lëshim. Jap (fal) jetën bëhem theror, flijohem, vdes për dikë a për diçka. I dhuroi jetën e lindi. I dha fund jetës vrau veten. I dhimbset jeta. E do jetën. E ktheu në jetë. I shpëtoi jetën dikujt. I mori jetën e vrau, e bëri të vdesë. Mbahet në jetë jeton. Vë jetën në rrezik. E dua më shumë se jetën. Jeta ime! i dashuri im!, i shtrenjti im!","Koha sa jeton një qenie e gjallë, koha që nga lindja deri në vdekjen e saj; koha gjatë së cilës një njeri jeton e punon në një vend (zakonisht një kohë e gjatë). Jetë e gjatë (e shkurtër). Gjithë jetën. Gjatë jetës. Në fillim (në fund) të jetës së tij. Në lule të jetës. Gjysmën e jetës. Shoku i jetës bashkëshorti. Shoqja e jetës bashkëshortja. Një jetë të tërë. Me jetë të gjatë! ur. çastet më të bukura të jetës. Në jetën time. Jeta në konvikt (në shkollë). Jeta në mërgim. Jeta në luftë. Pati gjashtëdhjetë vjet jetë. E kaloi jetën me punë. I zgjati (i shkurtoi) jetën.","Mënyra se si rron një njeri, një grup njerëzish a një shoqëri, tërësia e kushteve në të cilat jeton dikush, jetesë. Jetë e mirë. Jetë e ndershme. Jetë e rëndë (e vështirë, e rehatshme, e zbrazët). Jetë endacake (baritore). Jetë beqari (studenti). Jeta e fshatit (e qytetit). Jeta në vendet kapitaliste. Kushtet e jetës. E bëjmë jetën më të mirë. Ai bën jetë. bised. jeton me të mira e gëzime. Ka parë jetë ka jetuar mirë.","Tërësia e ngjarjeve që i kanë ndodhur dikujt; puna dhe veprimtaria që ka kryer ai sa ka qenë gjallë; përshkrimi i këtyre ngjarjeve, i kësaj veprimtarie etj., jetëshkrim. Jetë e pasur. Jetë e gjallë (aktive). Jeta e poetit. Jeta dhe vepra e shkrimtarit. Foli për jetën e tij.","Mjedisi që na rrethon, sendet, dukuritë, rrethanat etj., në mes të të cilave jeton e punon dikush, realiteti, bota; përvoja e fituar, ajo që ka mësuar, ka njohur a ka përjetuar dikush, praktika. Jeta socialiste. Mosnjohja e jetës. Shkalla (përvoja) e jetës. Lidhja me jetën. E njeh jetën. I përgatitur për jetën. Si të sillemi në jetë.","Veprimtaria e një njeriu, e një grupi njerëzish, e një organizate, e një shoqërie etj. në një lëmë a në një fushë të caktuar; tërësia e dukurive, e normave, e parimeve etj. që shfaqen ose që zbatohen në një fushë të caktuar. Jeta ekonomike (politike). Jeta artistike (sportive, shkencore). Jeta shoqërore (familjare,vetjake). Fushat (sektorët) e jetës. Revolucionarizimi i gjithë jetës së vendit.","Gjallëri, lëvizje; shfaqje forcë, energjie etj. Qytet (fshat, rrugë) plot jetë. Fytyrë plot jetë. Merr jetë gjallërohet, forcohet. I jep jetë e gjallëron, e bën të jetojë e të zhvillohet.","Koha sa zgjat diçka; periudha sa mund të përdoret një gjë, koha derisa del jashtë përdorimit. S'pati jetë (një ngjarje, një dukuri, një lëvizje). Kanë jetë të gjatë (veglat, aparatet). I zgjat jetën (një makine etj.). * Bëj jetë shih te BËJ. E pruri (e solli, e qiti) në jetë e shpëtoi nga një gjendje e mjeruar, e bëri të jetojë mirë, e qiti në dritë. Ia biroi jetën shih te BIROJ. E bukura e jetës arb. shih te BUKUR, ~A (e). Del në jetë shih te DAL. Gjen jetë shih te GJEJ. Humbi jetën shih te HUMB. Hyj në jetë a) rritem e nis të punoj; b) mësohem në jetë, marr pjesë gjallërisht në të. Jap gjakun (jetën) shih te JAP. Lidh jetën me dikë shih te LIDH","Ndërroi jetë lart., vjet. shih te NDËRROJ. U nda nga jeta (nga gjiri ynë) shih te NDAJ. Ia nxiu jetën shih te NXIJ. Pleqtë e jetës (plakat e jetës) pleq shumë të moshuar, pleqtë më të moshuar (plakat më të moshuara), pleqtë që kanë jetuar afro 100 vjet a më shumë. Ia preu jetën (orën, ditën) dikujt shih te PRES. Rrahu jetë shih te RRAH. Iu sos jeta (fryma) vdiq. Vë në jetë zbatoj, kryej, plotësoj. Iu bë jeta burg dikujt shih te BURG~U. Ia bëri jetën pus dikujt shih te PUS,~ I","I hoqi spik jetës shih te SPIK,~U. Iu lidh nyjë jeta shih te NYJ/Ë, ~A. Ia zuri jetën (në) gjak dikujt shih te GJAK,~U."]},{"slug":"jetee","term":"JETË-","attributes":["fjalëform."],"definitions":["Pjesa e parë e fjalëve të përbëra që u përgjigjet kuptimeve të fjalës jetë (p.sh. jetëbardhë, jetëdhënës, jetëshkurtër etj.)."]}]</script>
