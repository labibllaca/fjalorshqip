<script>window.__INITIAL_DATA__ = [{"slug":"ujk-i","term":"UJK I","attributes":["m.","sh."],"definitions":["zool. Kafshë e egër mishngrënëse, e ngjashme me qenin, me qime të përhime në të verdheme, me veshë të drejtë e me majë, që sulmon shpesh bagëtitë. Ujk i murrm ë(i kuqërremë). Ujk i madh. Ujk i uritur. Kope (lukuni) ujqish. Këlysh ujku. Lëkurë ujku. Strofull e ujkut. Angullima e ujkut. Të çaftë (të preftë) ujku! mallk. Delen (dhinë) që ndahet nga tufa, e ha ujku. fj. u. Ujku mjegull do. fj. u. Kur thonë «ngordhi ujku», atëherë ruaje gomarin. fj. u. Qeni i keq e sjell ujkun në vathë. fj. u. Nuk fle (nuk kullot) delja me ujkun bashkë. fj. u. Ujku bari s'bëhet. fj. u.","fig. keq. Njeri shumë i egër e i pamëshirshëm; ai që kërkon të vrasë të tjerët e të gllabërojë gjithçka; lakmues i pangopshëm. Ujqit imperialistë.","fig. bised. Njeri shumë i fortë e i shëndoshë; njeri shumë i aftë për punë. Është ujk. * Iu bë ujk diçka iu mërzit shumë diçka, i doli fare nga zemra, s'e duron dot, s'e sheh dot me sy. U bë ujk (bishë) shih te BISHË,~A. Në gojë të ujkut rrethuar nga armiq të egër, fare pranë një rreziku të mundshëm. I kalli ujkun thjeshtligj. shih te KALL. Ujk me brirë thjeshtligj. shih te BRI,~RI. Ujk deti njeri i regjur me vështirësitë e detit, detar i vjetër e me përvojë. Ujk i vjetër (plak) njeri i rrahur me jetën; ai që e njeh mirë një punë. Fut ujkun në vathë shih te VATHË. Ka lëkurën (qimen) e ujkut e ndjekin gjithmonë të këqijat, nuk i ndahen të zezat; i vërsulen të gjithë edhe pa të drejtë. I la një qime ujku te dera (te pragu) dikujt i la një ngatërresë, i la një çështje të ngatërruar për ta zgjidhur, një grindje etj. Mori udhën e ujqve mori një rrugë të shtrembër, hyri në një udhë të keqe. Mbeti (ra) si ujku (si zagari) në thekër mbeti në gjendje të vështirë, shumë ngushtë, sa s'ka ku të vejë më keq, pa përkrahje, pa rrugëdalje, pa shpresë. E pagoi si ujku me lëkurë mori dënimin e merituar, e pagoi shtrenjtë, me kokë një veprim të keq. E shikon (e vështron) si ujku hënën e shikon me inat. E ka parë ujkun që i vogël (që në vogëli, që foshnjë) është njeri i rrahur me jetën, ka parë e ka kaluar shumë të këqija e rreziqe, nuk trembet nga rreziqet e nga kërcënimet. I tregon lëkurën e ujkut dikujt e frikëson, e tremb dikë duke iu kanosur me diçka. S'trembet ujku nga mushkonjat fj. u. thuhet për dikë që nuk do t'ia dijë fare kur e kërcënon një kundërshtar i pafuqishëm. Ujk me lëkurë qengji njeri i pabesë, që i mbulon qëllimet e veta grabitqare duke u shtirë sikur është i mirë. Prej ujkut ra në gjarpër shih te GJARPËR,~RI. Vuri (bëri) ujkun bari shih te BARI,~U I. Ka lëkurën e ujkut në kurriz (në shpinë) është me turp mbi shpinë; ka shumë faj. Leshtë e ujkut, thonjtë e bufit fj. u. kundër të keqit e të egrit duhet përdorur forca. I vari ujkut mëlçitë në qafë iron. shih te VAR. Ujku qimen ndërron, por zakonin s'e harron thuhet për dikë që hiqet sikur ka ndryshuar qëllimet dhe natyrën e tij, por që në të vërtetë është po ai i pari. Unë them «ja ujku!», ti kërkon gjurmët (kur ke ujkun, mos i kërko gjurmët!) fj. u. thuhet për dikë që kërkon të fshehë diçka që duket fare qartë ose që e kërkon të vërtetën jo aty ku ajo duket qartë, por aty ku ajo mbulohet e errësohet. Çakalli bëri kërdinë, ujkut i doli nami fj. u. thuhet për dikë që ka bërë shumë të këqija, por është fshehur pas dikujt tjetër që njihej nga të gjithë si keqbërës. Dhentë pa bari i ha ujku një nga një fj. u. shih te BARI,~U I. Gojë ujku bot. gojujk. Gjemb ujku bot. ashe. Thanë ujku bot. shih te THAN/Ë,~A."]}]</script>
