<script>window.__INITIAL_DATA__ = [{"slug":"vras","term":"VRAS","attributes":["kal."],"definitions":["E bëj një njeri të vdesë ose një kafshë të ngordhë, duke e qëlluar me armë a me ndonjë mjet tjetër, i marr jetën. Vrau një fashist. Vrau një ujk. Vranë rosa të egra. E vrau një të pabesë (prapa shpine). E vrau rrufeja. E vraftë pika! mallk. Më vraftë buka! vjet. betim.","Godit një pjesë të trupit tim ose një tjetër me diçka a pas diçkaje, duke shkaktuar dhembje e plagë; e bëj me gjak, e gjakos. I vrau syrin. E vrau mushka. Vrau këmbën (dorën, gjurin). Vrau ballin. E vrau pas gurit. Ku je vrarë kështu?","vet. veta III. Më shtrëngon, më rri ngushtë e s'e duroj dot; më shkakton dhembje kur rri në të, kur e prek etj. Më vret rripi. Më vret këpuca. Më vret dysheku.","kryes. veta III. Prek e dëmtoj, i shkaktoj dëm; prish. Të vret ushqimi i tepërt. Bryma i vret disa perime. Të ftohtët (ngrica) i vret bimët. E vrau vrugu duhanin. Dielli i fortë i vret lulet.","vet. veta III. Nuk më lë të shoh mirë. Më vret sytë dielli (drita e fortë).","fig. E prek thellë në ndjenja a në sedër, e lëndoj shumë; i shkaktoj dikujt dëshpërim a dhembje të madhe shpirtërore, e pikëlloj, e hidhëroj shumë. E vrau me fjalë. Më vrau në zemër më dëshpëroi shumë, më lëndoi keq. E vrau ndërgjegjja e ndjeu veten fajtor për diçka dhe u pendua. Atë nuk e vret turpi. Më vrave! më shkaktove një dhembje të thellë! më there! (i thuhet dikujt që na jep një lajm shumë të hidhur).","E mundoj shumë dikë, e detyroj të punojë jashtë mundësive që ka, e rraskapit; e ngarkoj shumë, e rëndoj; e bëj që të bjerë nga shëndeti të plaket më shpejt (edhe fig.). Nuk e ka vrarë puna. S'e ka vrarë trupin. Mos e vra kafshën e barrës. E kishte vrarë lodhja (pagjumësia). E kishte vrarë jeta e rëndë. E ka vrarë sëmundja. E kishte vrarë kurbeti. I vritnin taksat shumë. I vriste qiraja e lartë.","bised. Shtyp me dorë a me diçka tjetër për ta zbutur etj.; thërrmoj. Vras brumin. E vrau sallatën me kripë. Vrasin plisat (tokën).","Ia thyej pak ngjyrën e fortë me një bojë tjetër, ia ndërroj pak ngjyrën. E vrau gëlqeren me pak bojë të verdhë. E vrau të kuqen me pak të bardhë. * As të fal as të vret shih te FAL. Të vret barkun iron. të pëlqen shumë diçka, ke qejf ta hash. Vret degë më degë shih te DEG/Ë, ~A. Vret kohën rri pa punë, harxhon kohën kot. Vret (pret) larg shih te LARG. Vret (rreh) lart (rëndë) shih te LART. Nuk e vret mendjen (kokën) për diçka edhe poh. nuk mendohet shumë për diçka, nuk përpiqet shumë për ta zgjidhur diçka, nuk e lodh mendjen. Vret (numëron, zë) miza (gjithë ditën) mospërf. shih te MIZ/Ë,~ A. Të vret (të ther) e s'të paguan shih te THER. Të vret me pambuk shih. te PAMBUK,~U. Vriste e priste a) fliste ashpër, fliste rëndë e sillej keq me të tjerët; mburrej se do t'ia bënte një të keqe dikujt; b) bënte si i donte qejfi. Të vraftë qulli! tall. përdoret kur i drejtohemi dikujt që s'është i zoti të bëjë edhe një punë fare të lehtë. Po e vret samari dikë shih te SAMAR,~I. S'e ka vrarë samari (këpuca) nuk ka rënë ndonjëherë ngushtë a në gjendje të vështirë, s'ka pasur ndonjëherë shqetësime e telashe; nuk e ka pësuar; nuk ka vuajtur ndonjëherë, nuk ka hequr keq; Më vret sytë diçka nuk e duroj dot diçka që është bërë keq, që është shëmtuar ose që nuk më pëlqen a nuk e dua. Të vrisje shtatë (nuk gjeje) shih te SHTATË. Vret (shet) të trasha (të rënda) mburret shumë, shet mend. Më vret (më shpon) veshin (veshët) diçka shih te VESH,~I. Vrafsh veten! i thuhet me qortim dikujt që i kemi dalë nga borxhi me kuptimin: «mirë të të bëhet se fajin e ke vetë!; bëj ç'të duash vetë, mos prit ndihmë nga të tjerët!» E di se ku më vret barra e di ku më çalon puna, e di ku, e kam një pikë të dobët. Vret barkun në hije iron. nuk i pëlqen të punojë, është dembel e rri pa punë. Do vrarë më bukë në gojë shih te BUK/Ë, ~A. Vret gjetkë ai (fjala e tij) e ka fjalën gjetkë, ai flet me nënkuptime, synon diçka tjetër. Nuk ia vret (nuk ia shtrëngon) këpuca këmbën nuk është nevojtar, nuk është ngushtë, s'di ç'është skamja. E di gomari ku e vret samari fj.u. shih te GOMAR,~I. Të vret natën e të qan ditën është i pabesë; është me dy faqe; ta bën të keqen fshehurazi dhe në sy të të tjerëve hiqet sikur të ka dashur. Vrau veten me dorën e tij ia bëri të keqen vetes. Me një gur (me një të shtënë) vret dy zogj shih te GUR,~I."]}]</script>
