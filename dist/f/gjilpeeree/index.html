<script>window.__INITIAL_DATA__ = [{"slug":"gjilpeeree","term":"GJILPËRË","attributes":["f.","sh."],"definitions":["Fill i hollë çeliku me majë të mprehtë e me vrimë në fund, që përdoret për të qepur; fill i tillë pa vrimë, që përdoret për t`u ngulur. Gjilpërë e hollë (e trashë). Gjilpërë qepëse. Gjilpërë kapëse karficë. Gjilpërë dore (makine). Gjilpërë me kokë gjilpërë pa vrimë e me një kokë të rrumbullakët në fund. Maja (vrima) e gjilpërës. Jastëku i gjilpërave. Qep me gjilpërë. Shkoj perin në gjilpërë. Ngul gjilpërën. Shpim me gjilpërë. mjek. akupunkturë.","Shufër çeliku e hollë dhe me majë në një mekanizëm, e cila shërben për qëllime të ndryshme. Gjilpëra e pushkës (e topit). Gjilpëra e gramafonit. Gjilpëra e kompasit. Gjilpëra e sahatit. Susta e gjilpërës. I heq (i ndërroj) gjilpërën.","Gyp shumë i hollë metalik me majë të mprehtë që vihet në shiringë e ngulet në trup për të futur një bar të lëngshëm për mjekim; bised. bari që futet në trup me këtë mënyrë. Gjilpërë në damar. Gjilpërë kundër tetanosit. Bëri një gjilpërë. Ziej gjilpërat. Thith me gjilpërë.","Shigjetë metalike, që lëviz a rrotullohet në fushën e një aparati matës ose tregues; akrep. Gjilpërë magnetike. Gjilpërë e busullës.","bised. Gjethe e hollë e pishës dhe e drurëve të tjerë halorë, halë. Gjilpërat e drurëve.","bised. Zgjatim i hollë në trupin e disa kafshëve; gjemb. Gjilpërat e iriqit.","Diçka e hollë e me majë. Gjilpëra akulli.","Secili nga dy direkët e derës ose të dritares, ku mbërthehen kanatet ose fletët. Gjilpëra e derës (e dritares).","fig. keq. Njeri dinak që të bën një të keqe prapa krahëve pa e marrë vesh. * Fill e gjilpërë (në majë të gjilpërës, majë gjilpëre) hollësisht, fill e për pe. I futi gjilpërat dikujt i kalli spicat. Me pe e me gjilpërë (në pe e në gjilpërë) shih te PE,~RI. Rri si mbi gjilpëra nuk rri aspak i qetë, është shumë i shqetësuar, rri si mbi gjemba. S'bëhet pusi me gjilpëra fj. u. duhen mjetet e nevojshme për diçka, nuk bëhet një punë pa veglat e mjetet e nevojshme. Nuk çahet pisha me gjilpëra nuk mund të bëhet një punë pa veglat e mjetet e nevojshme, duhen mjetet e nevojshme për diçka, s'bëhet pusi me gjilpëra. Del nëpër vrimë të gjilpërës është shumë i zoti, di të dredhojë, është i shkathët. E futi (e kaloi, e shkoi) në vrimë të gjilpërës dikë a) e shtrëngoi shumë dikë; e qortoi rëndë dikë; b) e studioi imtësisht dikë, e shoshiti mirë. Të fut (të kalon, të shkon) në vrimë të gjilpërës është shumë i zgjuar a shumë i zoti. Humbi si gjilpëra në kashtë humbi pa lënë asnjë gjurmë, si kripa në ujë. Nuk humbi (s'u shua) pazari për gjilpëra fj. u. shih te HUMB. Është sa një majë gjilpëre është shumë i vogël. Është si maja e gjilpërës (është gjilpërë) të thumbon e të ther me fjalë, është gjuhustër. S'të jep as një majë gjilpëre (as një majë thoi) shih te MAJ/Ë,~A. S'të jep as sa maja e gjilpërës (as sa maja e thoit) shih te MAJ/Ë,~A. Kërkon gjilpërën (qimen) në kashtë (në bar, në mullar) kërkon kot, kërkon diçka që nuk mund të gjendet. Marr pe e gjilpërë shih te PE,~RI. S'mbushet pusi me gjilpëra (me pështymë) fj. u. shih te PËSHTYM/Ë,~A. Shpëtoi për majë të gjilpërës (për një majë gjilpëre) shpëtoi për pak gjë, shpëtoi për një qime. Di të qepë me dyzet gjilpëra është shumë i zoti a i shkathët. Ku futet gjilpëra do futet edhe peri fj. u. shih te PE,~RI. Me sa hyn bualli në veshin (në vrimën) e gjilpërës shih te BUALL,~I. I kanë (i kanë vënë, i mbajnë) gjilpërat majë me majë shkojnë shumë keq njëri me tjetrin, kanë marrëdhënie shumë të acaruara, nuk i bëjnë asnjë lëshim njëri-tjetrit. S'ke ku të hedhësh majën e gjilpërës (mollën) shih te HEDH. S'vihen dy gjilpëra majë me majë është një punë që s'bëhet, s'mbahen dy kunguj nën sqetull. Për një pe, për një gjilpërë, shkoi dëm një gunë e tërë fj. u. shih te PE,~RI."]}]</script>
