<script>window.__INITIAL_DATA__ = [{"slug":"lopee","term":"LOPË","attributes":["f.","sh."],"definitions":["Kafshë e madhe shtëpiake femër, që mbahet për qumështin, mishin e lëkurën, mëshqerrë që ka pjellë viç, femra e kaut; gjedh femër i rritur. Lopë barrsë (pëlle). Lopë qumështore. Lopë vendi (race). Qumësht (mish, gjalpë) lope. Lëkurë lope. Opinga lope. Tufa e lopëve. Bariu i lopëve. Ethet lopa kërkon dem. Pëllet lopa.","keq., shar. Vajzë a grua me trup të madh e të shëndoshë dhe shumë e ngathët. * U bë lopë u shëndosh shumë nga trupi. Kur të flasin lopët iron. kurrë. E ka lëpirë lopa shih te LËPIJ. Ia ka lëpirë lopa trutë (mendtë) dikujt tall. shih te LËPIJ. I ka pjellë lopa dikujt shih te PJELL. Ka sa të hanë lopët (qentë) thjeshtligj. shih te HA. I rri si lopës pa viç dikujt e merr me të mirë, ia plotëson të gjitha kërkesat; sillet shumë mirë me të. I ikën lopa me gjithë viç shih te VIÇ,~I. Ta merr lopën me gjithë viç shih te VIÇ,~I. I lëshon fjalët si lopa bajgën thjeshtligj. shih te BAJG/Ë,~A. Lopa në mal, përsheshi në vatër (në xham) fj. u. peshku në det, tigani në zjarr. Gjuhë lope bot. shih te GJUH/Ë,~A I. Lopë deti zool. gjitar me trup shumë të madh, që ka jetuar në tufa kryesisht në Oqeanin e Ngrirë të Veriut dhe që tani është zhdukur."]}]</script>
