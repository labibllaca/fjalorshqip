<script>window.__INITIAL_DATA__ = [{"slug":"deri","term":"DERI","attributes":[],"definitions":["I. parafj. 1. Përdoret me një ndajfolje vendi për të treguar cakun e lëvizjes së dikujt a të diçkaje, kufirin e fundit ku arrin dikush a diçka, vendin a pikën e fundit ku vete a shtrihet diçka. Deri këtu. Deri aty. Deri jashtë. Deri brenda. Deri lart. Deri poshtë. Deri ku do të shkojmë? Nga lart deri poshtë.","Përdoret me një ndajfolje kohe ose me një emër në rasën kallëzore (të prirë ose jo aga një numëror themelor), për të treguar cakun kohor kur kryhet një veprim, çastin e fundit kur mbaron diçka a kohën sa zgjat një punë, një veprim etj. Deri sot. Deri nesër. Deri dje. Deri tani. Deri vonë. Deri atëherë. Deri dy orë më parë. Deri tre vjet të shkuara. Deri kohët e fundit. Deri orën (minutën) e fundit. Deri natën vonë. Deri ditët e para të muajit. Deri atë kohë. Deri kur do të të pres?","Përdoret me një numëror themelor ose me një përemër që tregon masë a sasi të pacaktuar, për të shënuar kufirin e fundit të madhësisë ose të sasisë së sendeve, frymorëve etj. Bari arrinte deri një metër. Kishte deri dy metra borë. Deri sa ke arritur të bësh?","përd. pj. Përdoret bashkë me parafjalët në, me, mbi, nga, te(k), ndaj etj. dhe formon me to lokucione që së bashku me emrat e ndajfoljet tregojnë cakun më të tejmë të një vendi a të një kohe ose shkallën më të tejme në të cilën arrin një veprim a një gjendje. Shkoi deri në Tiranë. U përkul deri në tokë. E preu deri në rrëzë. Duron deri në gjashtë muaj. Bari ishte deri në gju. Deri në mëngjes. I vendosur deri në fund. Besnik deri në vdekje. I kërkoi llogari deri në një (në pikën e fundit). I shfrytëzonin deri në palcë. I armatosur deri në dhëmbë. Deri më sot. Deri mbi çati. Arriti deri nën dritare. Deri te porta. Nga peri deri te gjilpëra. Deri ndaj të gdhirë. Shkoi deri te ministri.","përd. pj. Përdoret përpara parafjalëve në (më) e në bashkëvajtje me parafjalën nga dhe formon me to lokucionin lidhëzor nga... deri në (më), që, së bashku me emrat, tregon kufijtë e një periudhe të caktuar kohe ose caqet e një vendi, të një hapësire a largese. Nga mëngjesi deri në darkë. Nga shtata deri më dymbëdhjetë. Nga Tirana deri në Elbasan.","përd. pj. Përdoret bashkë me lidhëzat ku a kur dhe formon me to lokucione që shërbejnë për të lidhur fjali të varura, të cilat shprehin marrëdhënie vendore a kohore. E përcolli deri ku fillonte rruga. E prita deri kur mbaroi. II. pj. Përdoret për të përforcuar a për të theksuar edhe më shumë kuptimin e fjalës, me të cilën lidhet; edhe, bile. Erdhën deri pleqtë. Kishin marrë deri fëmijët e kopshtit. Tregon kujdes deri për vogëlsira të panevojshme. * Deri diku shih te DIKU."]}]</script>
