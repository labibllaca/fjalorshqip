<script>window.__INITIAL_DATA__ = [{"slug":"dobeesi","term":"DOBËSI","attributes":["f.","sh."],"definitions":["Të qenët i dobët nga trupi a nga shëndeti; gjendje jo e shëndoshë e gjithë trupit ose e një pjese a e një organi të tij; gjendje e tillë, kur dikujt i janë pakësuar fuqitë e aftësitë fizike; pafuqi. Dobësi e madhe (e përgjithshme). Dobësia e trupit (e krahëve, e këmbëve, e muskujve, e zemrës, e trurit, e syve, e veshëve). Dobësia e pleqërisë. Ndien dobësi pas sëmundjes. E ka nga dobësia.","Vetia dhe gjendja e diçkaje që është e dobët, e pafuqishme, e paqëndrueshme, e brishtë, e zbehtë, e pamjaftueshme, e pakënaqshme etj. ose e dikujt që ka karakter e vullnet të dobët, forcë morale të paktë, aftësi mendore, njohuri e shprehi mjaft të kufizuara etj. Dobësia e qelqit (e letrës). Dobësia e pulsit. Dobësia e erës (e rrjedhës së lumit). Dobësia e dritës. Dobësia e ngjyrave. Dobësia e zërit. Dobësia e nuhatjes (e ndijimit, e kujtesës). Dobësia e rrymës elektrike. Dobësia e borgjezisë (e armikut, e kundërshtarit). Dobësia e shtetit (e regjimit, e organizatës). Dobësia e ekonomisë. Dobësia e argumenteve (e arsyetimit). Dobësia e vullnetit (e karakterit).","Anë e dobët, e metë e dikujt a e diçkaje; mungesë, zbrazëti. Dobësitë e nxënësve (e mësuesve, e klasës). Dobësitë e prindërve. Dobësitë e romanit (e studimit). Dobësitë në punë (në stërvitje, në lojë). Dobësitë në sulm (në mbrojtje). Dobësitë në formimin e përgjithshëm. Dobësitë në përgatitjen e specialistëve. Ka dobësi të vogla (të mëdha). Luftojnë për të zhdukur dobësitë e të metat.","Shfaqje e një dashamirësie a dashurie të veçantë për dikë a për diçka, prirje për ta parapëlqyer ndër të tjerët a të tjerat; dëshirë e veçantë, e theksuar për diçka. Ka (ndien) dobësi për dikë a për diçka. Ka një dobësi për futbollistët (për skuadrën «Partizani», për punëtorët, për malësorët, për shkodranët...). Ka një dobësi për motrën e vogël. Ka një dobësi për këpucët me qafa (për filmat me luftë)."]}]</script>
