<script>window.__INITIAL_DATA__ = [{"slug":"huaj","term":"HUAJ","attributes":["kal."],"definitions":["I jap hua dikujt. I huajti një shumë të madhe. I huajti një libër.","Marr hua prej dikujt; e marr prej dikujt tjetër. Huajti para (drithë). Ia huajti vëllait.","gjuh. Huazoj. Çdo gjuhë ka huajtur fjalë nga gjuhë të tjera."]},{"slug":"huaj","term":"HUAJ","attributes":["m.","sh."],"definitions":["Ai që ka lindur nga një tjetër, ai që nuk është i barkut tim.","Ai që është jashtë rrethit familjar ose miqësor, ai që nuk bën pjesë në këtë rreth dhe që nuk e afron gjë me të; ai që nuk bën pjesë fare në një grup njerëzish, të cilët punojnë a janë të lidhur bashkë, ai që është i jashtëm për ta. I huaji i sheh menjëherë ndryshimet. Ndalohet hyrja për të huajt! Më mirë të të rrahë yti, sesa të të puthë i huaji. fj. u.","Ai që është nga një vend a nga një shtet tjetër, pjesëtar i një popullsie tjetër, ai që nuk është shtetas ose i atij vendi ku ndodhet. Një grup të huajsh. Të huajt për vendin tonë. Na shkruajnë të huajt."]},{"slug":"huaj","term":"HUAJ","attributes":["mb."],"definitions":["Që është pronë e një tjetri, që i përket dikujt tjetër; që është bërë nga dikush tjetër. Gjë (plaçkë) e huaj. Sende të huaja. Mall i huaj. Tokë (arë, kullotë) e huaj. Kalë i huaj. Shtëpi e huaj. Shkrim i huaj. Dora e huaj s'di të kruajë. fj. u.","Që ka lindur nga një tjetër, që është pjellë e dikujt tjetër, që nuk është i barkut tim. Fëmijë (djalë) i huaj. Vajzë e huaj.","Që është jashtë rrethit familjar ose miqësor, që nuk bën pjesë në këtë rreth dhe që nuk e afron gjë me të; që nuk ka të bëjë fare me një grup njerëzish, të cilët punojnë a janë të lidhur bashkë, që është i jashtëm për ta. Njeri i huaj për ne. Ndalohet hyrja për njerëzit e huaj.","Që është nga një vend a nga një shtet tjetër, që është pjesëtar i një popullsie tjetër; që është jashtë vendit tonë; që i përket një vendi a një popullsie tjetër; që është bërë jashtë, që nuk është i vendit; që është marrë nga një gjuhë tjetër, i huazuar. Shtetas i huaj. Turistë të huaj. Vendet e huaja. Sunduesit (pushtuesit) e huaj. Zgjedha e huaj. Sundimi i huaj. Gjuhë e huaj. Fjalë të huaja. Valle e huaj. Zakonet e huaja. Shtypi i huaj. Letërsia e huaj. Valuta e huaj. Kapitali i huaj.","Që është i panjohur për të tjerët, që nuk dihet prej tyre; që nuk është i zakonshëm. Njeri i huaj. I tingëlloi si një zë i huaj. Për të gjithçka ishte e huaj.","fig. Që nuk është i afërt e i përzemërt si zakonisht, që nuk është i ngrohtë; që qëndron larg të tjerëve, që nuk afrohet me ta; i ftohtë. Vështrim i huaj. Sillej i huaj me të.","fig. Që i kundërvihet frymës sonë nga përmbajtja e nga idetë ose që është larg saj, që nuk ka të bëjë fare me pikëpamjet dhe mendimet tona, që është në kundërshtim me idetë e marksizmit dhe pengon zhvillimin e shoqërisë. Shfaqjet e huaja. Qëndrim i huaj. Sjellje e huaj. Konceptet e huaja në ndërgjegjen e njerëzve. Kjo është e huaj për ne.","Që është bërë me diçka tjetër, që ka veti krejt të tjera; që sjell dëm dhe shkatërron bimët përreth. Përzierje e huaj. Pastroj arin nga bimët e huaja.","Përd. em. f. sipas kuptimeve 3,7 të mbiemrit. Kombëtarja dhe e huaja. * Në derë të huaj në shtëpinë e tjetrit, jo në familjen e vet a tek të afërmit. Me xhepin e huaj me paratë a me shpenzimet e një tjetri. Hyri në livadh të huaj shih te LIVADH,~I. Kryeplak në fshat të huaj shih te KRYEPLAK,~U. Miell nga thesi i huaj (i botës) iron. shih te MIELL,~I. Kali i huaj (i botës) të lë në mes të udhës fj. u. shih te KAL/Ë,~I. Mish i huaj a) mjek. tumor që zhvillohet në pjesët e sëmura të organizmit; b) fig. diçka ose dikush që nuk pajtohet me mjedisin ku është dhe që pengon punën ose zhvillimin e përgjithshëm. Trup i huaj a) mjek. diçka që ka hyrë në organizëm nga mjedisi i jashtëm dhe ka zënë vend në indet, në organet ose në zgavrat e trupit; b) fig. mish i huaj."]}]</script>
