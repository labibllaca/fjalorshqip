<script>window.__INITIAL_DATA__ = [{"slug":"gjumee","term":"GJUMË","attributes":["m."],"definitions":["Gjendje e njeriut që fle, kur pushon trupi, ndërpritet pjesërisht ose plotësisht veprimtaria e vetëdijes dhe dobësohen disa procese fiziologjike; nevoja, dëshira ose mundësia për të fjetur. Gjumë i lehtë (i rëndë, i thellë, i qetë). Gjumi i parë gjumi i orëve të para, që zakonisht është i thellë. Gjumi i natës (i mëngjesit, i drekës). Gjumë qengjash. bised. gjumë i qetë, i ëmbël. Gjumë qensh. bised. gjumë i shqetësuar, copa-copa. Dhoma e gjumit. Dhomë gjumi. bised. shih te DHOM/Ë, ~ A","Sëmundja e gjumit. Një natë pa gjumë. Kam gjumë. E zuri (e mori, e kapi) gjumi fjeti. E mundi gjumi. Me vjen gjumë. Bie në gjumë. I doli gjumi u zgjua. I iku gjumi. Iu tremb (iu çakërdis) gjumi. Zgjohem (ngrihem, çohem) nga gjumi. Nuk më zë gjumi. I prish (i heq) gjumin. Më la pa gjumë. Rri pa gjumë. Jam pa gjumë. E la (e gjeti) në gjumë. Vë në gjumë fëmijët. E lë gjumin mangët. Vdiq (mbaroi, u fik, u këput) për gjumë. bised. i vjen shumë për të fjetur; ka nevojë të madhe të flejë. Flet nëpër gjumë. Është nëpër gjumë është përgjumësh, gjysmë i fjetur. Ngopem me gjumë. Iu bë (iu shfaq) në gjumë e pa në ëndërr. E ka gjumin si të lepurit. E ka gjumin si të pleshtit. Ia këput gjumit. thjeshtligj. fle pa merak. Gjumin e ëmbël! urim për atë që shkon të flejë.","fig. Gjendje plogështie, kur dikush nuk bën punë të gjallë ose e ka fjetur mendjen për gjithçka dhe është i papërgatitur për të papriturat e rreziqet; amulli në një punë a veprimtari; gjumësi. Bie në gjumë. Vë në gjumë. E gjeti (e zuri, e kapi) në gjumë. E nxori nga gjumi. Ia prishi gjumin. E tundi (e shkundi) nga gjumi. I ka kapur (i ka zënë) gjumi.","Ulje e theksuar e veprimtarisë jetësore të disa gjitarëve e të disa kafshëve me gjak të ftohtë, që flenë për një kohë të gjatë në dimër për shkak të të ftohtit ose në verë për shkak të të nxehtit e të thatësirës. Gjumi i ariut në dimër. Bie në gjumë bretkosa (gjarpri, hardhuca).","fig. Gjendje e fjetur e natyrës në dimër, kur gjithçka duket sikur ka humbur gjallërinë jetësore. Gjumi i natyrës. Toka bie në gjumë. Pyjet (drurët) bien në gjumë. * Si nëpër gjumë në mënyrë të turbullt, jo qartë. Bën gjumë shih te BËJ. Gjumi i të drejtit shih te DREJT/Ë,~I (i). Gjumë gjarpri shih te GJARP/ËR, ~RI. Gjumi i madh (i përjetshëm) euf. vdekja. Gjumi i vdekjes shih te VDEKJ/E,~A. Paska qenë në gjumë! s'paska ditur gjë fare! (thuhet për një njeri që e merr vesh tepër vonë diçka). E ka lënë në gjumë diçka nuk kujdeset për ta bërë a për ta përfunduar sa më shpejt diçka, nuk e shtyn një punë. E vë në gjumë dikë a) bën që të mërzitet dhe të humbasë interesin e vëmendjen për të dëgjuar; b) bën që të humbasë vigjilencën e gatishmërinë, e bën që ta flejë mendjen e të jetë i papërgatitur përballë një rreziku etj. Nuk më zë gjumi për diçka e kam kujdesin ose mendjen vazhdimisht te diçka, jam i shqetësuar vazhdimisht për diçka. Bëri (mori) një sy gjumë fjeti pak. Fle gjumin e vdekjes (fle gjumin e madh, fle të madhin) shih te FLE. Gjumi sjell gjumin nuk arrihet gjë po të rrish pa vepruar e në plogështi. E kalon gjumë e brumë e kalon jetën pa punuar e duke ngrënë mirë. Nuk vuri (nuk shtiu) gjumë në sy shih te VË. E ka zënë gjumi (fle, prehet) mbi dafina shih te DAFIN/Ë,~A. E zëntë gjumi i madh! mallk. vdektë! Gjumi është vëllai i vdekjes fj. u. a) në gjumë mund të ndodhë çdo gjë, se nuk ndien fare; b) kur njeriu fle është njësoj sikur nuk jeton."]}]</script>
