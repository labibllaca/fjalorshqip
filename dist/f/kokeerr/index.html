<script>window.__INITIAL_DATA__ = [{"slug":"kokeerr","term":"KOKËRR","attributes":["f.","sh."],"definitions":["Fryti i rrumbullakët i disa pemëve, drurëve ose bimëve, që përmban edhe farën e shumëzimit; fryti mishtak që prodhon një pemë ose një bimë. Kokërr e madhe (e vogël). Kokërr e rrumbullakët (gjatoshe). Kokërr molle (dardhe, qershie, pjeshke, ulliri). Kokërr gruri (misri, fasuleje, orizi). Kokërr kafeje. Kokërr patateje (qepe). Kokërr rrushi. Kokërr për kokërr për çdo kokërr. Bën (lidh) kokrra. Këput (ha) një kokërr. Nuk i mban kokrrat.","Diçka që është si topth a si rruzull i vogël; copë e vogël (sheqeri, qymyrguri etj.). Kokërr breshri. Kokërr rëre. Dy kokrra vezë. Kokërr loti. Kokërr sheqeri. Kokrra e syrit kokërdhoku.","Copë a njësi; kokë (për një numër të pakët sendesh a frymorësh). Disa kokrra gozhdë. Pesë kokrra bagëti.","bised. Çështje, punë; hall. Tjetërkund është kokrra. Na doli kokrra.","Përd. mb. sipas kuptimeve 1, 2 të emrit. Misër kokërr. Kafe kokërr. Pleh (kimik) kokërr. Sheqer kokërr. * Kokërr për kokërr me imtësi, hollësisht, një për një. Deri në një kokërr gjithçka, pa lënë asgjë. U bë kokërr (qiqër) shih te QIQ/ËR,~RA","Si kokërr molle (thane) shih te MOLL/Ë, ~A. Kokrra e motit rrufeja. Pemë pa kokrra njeri që s'të mbaron punë, njeri nga i cili nuk ke dobi; njeri që punon, por nuk ka përfundime të mira në punë; diçka e pafrytshme. I rri (i qëndron) kokërr nuk i trembet fare, i rri ballë për ballë e me guxim. Bathë, bathë, po një kokërr shih te BATH/Ë,~A. U bënë kashtë e kokërr u shpërndanë andej-këtej; u shpartalluan. Bie (fle, rri) në kokërr të shpinës bie në kurriz; shtrihem në shpinë. Bluan si mulliri pa kokrra (pa ujë) flet kot më kot, thotë fjalë boshe, grin kot. S'e ha atë kokërr ulliri shih te HA. E ka syrin kokërr (pishë) shih te PISH/Ë,~A. Të merr kokrrën (koqen) e melit para gjelit është shumë i shkathët. Ndaj bykun (kashtën) nga kokrrat shih te BYK,~U. Sa thana janë kokrra s'bëjnë fj. u. shih te THAN/Ë,~A. Kokrra e keqe (e zezë) m
