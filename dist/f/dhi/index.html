<script>window.__INITIAL_DATA__ = [{"slug":"dhi","term":"DHI","attributes":["f.","sh."],"definitions":["Kafshë shtëpiake përtypëse me brirë e me lesh të gjatë, të drejtë e të ashpër, e cila mbahet për qumështin, leshin, mishin dhe lëkurën. Dhi e bardhë (e zezë, e larme). Dhi shytë. Dhi malteze dhi e një race të mirë që jep shumë qumësht. Dhi cjapore dhi me brirë si të cjapit. Rritja e dhive. Mish (lesh, qumësht, gjalpë, lëkurë) dhie. Bari dhish. Brirë dhie. * Dhia e shëllirës shih te SHËLLIR/Ë,~A. Si dhia në gjollë shih te GJOLL/Ë,~A. Si dhia në mes të dhenve keq. që bie në sy për keq në mes të të tjerëve, që nuk i përshtatet mjedisit ku ndodhet, që është i huaj për rrethin ku jeton. Mblidh dhitë! mblidh mendjen, eja në vete! I mungojnë dhitë nuk është në rregull nga mendja, i mungojnë ca dërrasa. Rrugë (udhë) dhish dhiare. U bënë si këmbët e dhisë a) s'merret vesh se kush është i madh e kush i vogël, kush është në krye e kush vjen pas etj., u bënë të gjithë njëlloj; b) s'i përfill njeri. S'jemi si këmbët e dhisë s'jemi të gjithë njëlloj për nga mosha, për nga rëndësia etj. Ha si dhi në rrushkull shih te RRUSHKULL,~I. Ndaj dhentë (delet) nga dhitë dalloj njërën nga tjetra dy gjëra që s'duhen ngatërruar, sqaroj mirë gjërat; ndaj shapin nga sheqeri. E pret si dhia thikën ka shumë frikë nga diçka, e pret diçka me zemër të ngrirë. Dhia në malësi, delja në vërri fj.u. secili duhet të qëndrojë në vendin e vet, gjithçka duhet vënë në vendin që i përket; secili duhet të gjejë vendin e tij në punë, në jetë sipas vetive e vlerave që ka. Dhia mish e cjapi tavë (cjapi mish e dhia tavë) shih te CJAP,~I. Dhi e zgjebosur (e zgjebur, e ngordhur) e bishtin përpjetë (bishtpërpjetë) tall, shih te ZGJEBOSUR (i,e). Milte dy qyqe dhi (dele) shih te MJEL. Pesë dhi, gjashtë zile shih te GJASHTË. Është një nga dhia dy nga vija i kanë hedhur ujë (për qumështin). Dhentë e dhitë e Zeres, nami i Kapllan Qeres shih të DHEN,~TË. Ku di dhia ç'është tagjia mospërf. nuk është i zoti të vlerësojë atë që është me të vërtetë e mirë dhe me vlerë (thuhet zakonisht për dikë që është i prapambetur e i pagdhendur). Ç'i bën dhia shqemes, shqemja ia bën lëkurës shih te SHQEM/E, ~JA. Gjej një herë bari, pastaj shko e bli dhi! fj.u. shih te BARI,~U."]}]</script>
