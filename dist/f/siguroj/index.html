<script>window.__INITIAL_DATA__ = [{"slug":"siguroj","term":"SIGUROJ","attributes":["kal."],"definitions":["Marr masat e nevojshme që dikush a diçka të mos pësojë ndonjë rrezik a të keqe të papritur, e vë jashtë çdo rreziku. Siguroi krahët (prapavijën). Siguron vendin (mbrojtjen e vendit). U siguroi rrugën (kalimin mbi urë). E siguroi me mbështetëse.","Arrij me përpjekje që ta kem të sigurt diçka ose i krijoj kushtet një tjetri për këtë; e bëj të mundshme e të sigurt; garantoj. Siguron fitoren (suksesin). I siguroi lirinë. I siguron të drejtën. U siguron një të ardhme të lumtur. U siguron punën. I siguroi pleqërinë.","Gjej a arrij të kem me punë e me përpjekje diçka të nevojshme ose ia gjej këtë një tjetri; arrij ta kem a ta prodhoj diçka në sasi të mjaftueshme; nxjerr. Siguruan ushqimet për dimër. E siguruan bukën në vend. I siguroi veglat bujqësore kooperativës. I siguroi një biletë për teatër. E siguroi me punë (me djersë).","Përpiqem të largoj çdo dyshim, në lidhje me veprimet e mia, i jap siguri, e bëj të më besojë; zotohem se do të kryej diçka, jap fjalën. E siguroi për qëllimet e veta. Ju sigurojmë se do ta kryejmë brenda afatit. Na siguroi se do të vinte (se nuk do të mungonte). Të siguroj se është e vërtetë.","Lidh një marrëveshje dhe paguaj rregullisht një shumë të caktuar për jetën ose pasurinë pranë një institucioni shtetëror a një shoqërie, që janë të detyruar të më shpërblejnë dëmin e pësuar në rast fatkeqësish. Siguroi jetën (shtëpinë). Siguruan gjënë e gjallë. E siguroi nga zjarri."]}]</script>
