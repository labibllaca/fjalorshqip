<script>window.__INITIAL_DATA__ = [{"slug":"und","term":"UND","attributes":["m."],"definitions":["Ushqim që ndodhet në plëndësin e bagëtisë.","Diçka e thërrmuar a e shtypur. U bë und druri."]},{"slug":"und","term":"UND","attributes":["m.","sh."],"definitions":["Trualli a shtresa e tokës që ndodhet nën ujin e detit, të liqenit a të një pellgu, të lumit etj.; pjesa e poshtme e një vendi të thelluar në tokë. Fund ranor (shkëmbor, i gurtë, lymor). Fund me baltë (me zhavorr). Fundi i detit (i oqeanit, i liqenit, i lumit, i rezervuarit). Fundi i pusit. Fundi i gropës (i humnerës, i greminës, i llogores). Gërryej (thelloj) fundin. Ra (u zhyt) në fund. Mbeti në fund. E nxorën nga fundi i detit.","Pjesa e poshtme e një ene, e një arke,e një shporte, e një anijeje etj., e cila është zakonisht e sheshtë e shërben edhe si pjesë mbështetëse. Fund i sheshtë (i rrumbullakët). Fund i gjerë (i ngushtë). Fund i hollë (i trashë). Fundi i kazanit (i tenxheres, i kusisë, i kovës, i fuçisë, i gjymit). Fundi i shishes (i vazos, i damixhanës). Fundi i gotës (i filxhanit). Fundi i tasit (i pjatës, i tepsisë). Fundi i tundësit (i havanit). Fundi i arkës (i hambarit, i kutisë, i shportës). Fundi i anijes (i barkës). Pastroj (kruaj) fundin. Kulloi (ra) në fund. Iu ça (iu shpua) fundi. Rrjedh nga fundi. E piu me fund e piu të gjithë deri në fund; s'la asnjë pikë. I doli fundi (një ene) u zbraz, u boshatis krejt. I nxori (i gjeti) fundin (një ene me ushqim) e hëngri a e piu të gjithë ç'përmbante ena, e s'la asnjë lugë a asnjë pikë.","Pjesa e poshtme e diçkaje që mbështetet në tokë e që ngrihet mbi të ose që është ngulur në tokë; vendi ku lidhet me trupin një gjymtyrë a organ i veçantë ose ku lidhet me trungun një degë; rrëzë; taban. Fundi i malit (i kodrës, i shkëmbit). Fundi i kalasë (i murit, i pendës, i digës). Fundi i lisit (i shtyllës). Fundi i krahut (i këmbës, i gishtit, i gjuhës, i veshit). Fundi i këpucës tabani, shualli i këpucës. U këput dega në fund. E shembi (e rrënoi) deri në fund. E preu pemën deri në fund. Ia prenë krahun (këmbën) deri në fund. Në fund të fshatit.","Diçka në sasi të vogël, që ka mbetur në pjesën e poshtme të një ene a të një vendi të thelluar. Piu fundin e shishes (e gotës). Hëngri fundin e tenxheres. Bloi edhe fundin e hambarit. E derdhi fundin e fuçisë. Ka mbetur fundi.","Caku e skaji ku mbaron diçka që shtrihet në hapësirë (një sipërfaqe, një rrugë, një varg sendesh a frymorësh, një shtrojë a mbulojë, një tel a litar i gjatë etj.); skaji më i largët i një vendi a i një hapësire të madhe; mbarimi, pjesa e skajshme e një sendi a e një hapësire; kund. krye, fillim. Fundi i fushës (i arës, i kopshtit). Fundi i qilimit (i jorganit, i krevatit). Në fund të sheshit (të oborrit, të rrugës, të bulevardit). Në fund të botës (të dynjasë). Fundi i vargmalit. Fundi i rreshtit (i vargut të njerëzve, i kolonës së automjeteve, i vagonëve, i karvanit). Fundi i litarit (i vijës telefonike, i trarit). Fundi i cigares bishti i cigares. Fundi i faqes së gazetës (së revistës). Në fund të librit. Fundi i një fjale. E ka theksin në fund. Në fund të librit (të regjistrit). E kapi nga fundi. Këmishë (mëngë) e qëndisur (e zbukuruar, e kthyer) nga fundi. S'ka fund. Pa anë e pa fund.","Pjesa e fundit e një vepre të shkruar a e një shfaqjeje; kund. fillim. Fundi i librit (i romanit, i artikullit).Fundi i filmit (i dramës, i shfaqjes).","Veshje e sipërme grash ose pjesë e kostumit të grave, që mbulon trupin nga mesi e poshtë. Fund i gjerë (i ngushtë, i gjatë, i shkurtër). Fund me pala (me kinda). Vë (heq) fundin.","vet. m. sh. ~RA, ~RAT. Mbeturina, fundërrina. Mblidhte fundrat.","Caku që shënon mbarimin e një kohe; pjesa e kohës që lidhet me këtë cak; caku kohor që shënon mbarimin e një pune, të një veprimi a të një veprimtarie etj.; pjesa e fundit e një pune a veprimtarie; mbarim, përfundim; kund. fillim. Fundi i vitit (i muajit, i ditës). Fundi i shekullit. Në fund të javës. Fundi i punës. Fundi i lojës (i ndeshjes, i shfaqjes). Fundi i luftës. Aty nga fundi i mbledhjes.","bised.. Mbarimi i jetës, vdekja. Fund i parakohshëm (i hidhur). I erdhi fundi. Ka shkuar në fund është duke vdekur, i erdhi vdekja. * Deri (gjer) në fund krejt, plotësisht. Më në fund a) në fund të diçkaje, tekembramja; b) si përfundim. Pa anë e (pa) fund shih tek AN/Ë,~ A","Ballë e fund shih te BALL/Ë,~I. Fundi i arkës rrobat më të mira. Në fund e në bisht më në fund. Fundi i fjalës shkurt, me një fjalë; si përfundim. Në fund të fundit tekembramja, më në fund. Fundi i fundit tekembramja, më në fund; sido që të jetë. Në fund të herës shih te HER/Ë,~ A. Fundi i kazanit gjella që ka mbetur, ushqimi më i keq. Fund e krye krejt, plotësisht. Në fund e në krye (në majë) tejpërtej; krejt. Nga fundi në krye (nga kreu në fund) krejt, tejendanë. Nga fundi (nga thelbi) i zemrës (i shpirtit) shih te ZEM/ËR,~RA. I doli fundi diçkaje mbaroi, përfundoi. I doli në fund diçkaje e kreu, e mbaroi a e përfundoi me sukses, i doli mbanë. I jap fund diçkaje shih te JAP. I nxori (i gjeti, i qiti) fundin diçkaje e studioi thellë diçka, e shqyrtoi me themel. Shportë pafund shih te SHPORT/Ë,~A. I vuri fund diçkaje e përfundoi; i vuri kapak. U bë pus pa fund shih te PUS,~I. I doli fundi i shpuar mbeti a doli pa gjë. Ia di (ia njoh) fundin e barkut shih te BARK,~U. Zë fundin e barkut shih te BARK,~U. I ra (i vajti, i shkoi) gjaku në fund të këmbëve (te këmbët) shih te GJAK,~U I. Është ende në fund të dardhës shih te DARDHË,~A. I ka trutë në fund të këmbëve shih tek TRU,~RI","Dhëndri rruhet në fund shih te DHËND/ËR,~RI. Fund fjale gjuh. shih FUNDOR/E,~JA."]}]</script>
