<script>window.__INITIAL_DATA__ = [{"slug":"ngel","term":"NGEL","attributes":["jokal."],"definitions":["Ndal në vend, sepse s`kam mundësi për të lëvizur më tej, nuk kam më fuqi të eci më tej; pushon së lëvizuri a së punuari diçka ngaqë i pakësohet forca; mbetem, ngec. Ngeli kali (mushka, gomari). Ngeli makina (karroca) në baltë. Ngeli në vend s'lëviz dot as para as prapa. Ngeli prapa. Ngeli në rrugë. Ngeli ora. Ngeli motori.","Nuk e kaloj dot një klasë të shkollës ose një provim. Ngeli në klasë. Ngeli në vitin e parë. Ngeli në provim (në gjuhë).","Qëndroj gjatë në një vend; merrem vazhdimisht me diçka, nuk pushoj së bëri diçka, nuk i ndahem. Ngeli në shtëpi. Ngeli brenda. Ngeli gjithë ditën atje. Ngeli duke qarë (duke u ankuar, duke qeshur). Ngeli mbi libra.","vet. veta III. Nuk më shkëputen sytë a vëmendja nga dikush a nga diçka. I ngelën sytë tek i biri. Më ngeli mendja tek ato fjalë.","Nuk arrij ta bëj diçka, nuk gjej kohë ose mundësi për të bërë diçka; mbetet pa u bërë. Ngela pa shkuar. Ngeli pa ngrënë darkë. Ngeli pa u martuar. Na ngeli edhe këtë javë kjo punë. Na ngeli pa zgjidhur ky problem.","Bie në një gjendje të caktuar; ndodhem në rrethana a në kushte zakonisht të padëshiruara; mbetet. Ngeli i kënaqur (i zemëruar, i dëshpëruar). Ngeli keq (ngushtë). Ngeli pa shtëpi (pa të holla). Ngeli vetëm. Ngeli pa përkrahje (pa ndihmë). Ngeli i ve (pa grua). Ngelën pa mësues (pa udhëheqje). Ngeli pa frymë iu mor fryma. Ngeli toka djerr. Ngeli kërcu (qyqe) mbeti pa asnjë fëmijë ose pa asnjë njeri të shtëpisë.","vet. veta III. Mbetet diçka pa u shpenzuar, pa u përdorur etj. nga një shumë ose tërësi; kam ende të lirë për të përdorur një shumë, një pjesë kohe. Më ngelën edhe dyqind lekë. I ngelën dhjetë pula nga njëzet. Na ngelën edhe njëzet minuta kohë. Nuk na ka ngelur edhe shumë.","vet. veta III. Më duhet edhe diçka, kërkohet edhe pak për ta përfunduar një punë; më mbetet për të bërë! Na ngelën edhe dy kilometra rrugë. U ngelën edhe dy vija për të prashitur. Na ngeli edhe një pikë për të shqyrtuar. Nuk na ngel gjë tjetër, veç...","Shpëtoj pa u dëmtuar, pa u cenuar ose pa u shkatërruar, mbetem; ruhet. Ngeli gjallë. Ngeli më këmbë shtëpia. I ngelën vetëm muret.","kal. bised. Nuk e lë një nxënës a një student të kalojë një klasë më lart në shkollë ose të kapërcejë një provim. E ngeli në klasë. E ngeli në provim. E ngeli për vjeshtë e detyroi (një nxënës a një student) të rijapë një provim a disa provime në vjeshtë. * Ngeli (ngeci, mbeti) në baltë shih te BALT/Ë,~A. Ngeli (mbeti) brisk shih te BRISK, ~U. Më ngeli (më mbeti) në derë dikush a diçka shih te DER/Ë, ~A. I ngeli (i mbeti) goja shih te GOJ/Ë,~A. I ngeli kërrabëza shih te KËRRABËZ,~A. Më ngeli (më mbeti) në qafë dikush shih te QAF/Ë,~A. I është (i mbeti) qejfi shih te QEJF,~I","Ngeli (mbeti) me gisht në gojë shih te GISHT,~I. I ngeli (i ngeci) sharra në gozhdë shih te SHARR/Ë,~A."]},{"slug":"ngel","term":"NGEL","attributes":["m."],"definitions":["Ngërç. I zuri ngeli këmbën. E ka kapur ngeli."]}]</script>
