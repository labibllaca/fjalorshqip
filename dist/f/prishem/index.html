<script>window.__INITIAL_DATA__ = [{"slug":"prishem","term":"PRISHEM","attributes":["vetv."],"definitions":["vet. veta III. Rrëzohet përdhe diçka e ndërtuar, bëhet copë-copë, rrënohet, shembet, shkatërrohet. U prish shtëpia (muri, çatia).","vet. veta III. Vjen në një gjendje të tillë sa nuk punon më, dëmtohet sa s’hyn më në punë; del jashtë përdorimit, bëhet i papërdorshëm. U prish ora (motori, aeroplani).","vet. veta III edhe fig. Ngatërrohet, çrregullohet, pështjellohet diçka. Iu prishën flokët. U prish puna.","fig. Pësoj humbje të mëdha materiale ose ekonomike, dëmtohem rëndë, shkatërrohem, rrënohem. U prishëm gjatë Luftës por fituam lirinë. U prish vendi (ekonomia), por u rimëkëmb shpejt.","vet. veta III. Fshihet, shuhet, zhduket. I janë prishur shkronjat. Iu prish boja. U prishën gjurmët.","vet. veta III edhe fig. Dëmtohet diçka, shkatërrohet; keqësohet. Iu prishën dhëmbët. U prishën të mbjellat. Iu prish shëndeti. Na u prish puna.","Dobësohem, tretem; humbas shëndetin e bukurinë, shëmtohem. Pse ishte prishur ashtu?","vet. veta III edhe fig. Humbet vlerën a cilësitë e mira; zvetënohet, bastardohet. I prishet shija.","fig. Shthurem nga ana morale, bëhem i keq, marr udhë të keqe duke mësuar vese. Qe prishur ai djalë, por tashti erdhi në udhë të mbarë.","bised. Shtrembërohem në fytyrë për të shprehur një dhembje, një pakënaqësi etj. U prish në fytyrë.","vet. veta III. Kalbet, qelbet e zë erë të keqe (për mishin a për lëndë të tjera organike); thartohet. U prish mishi. U prishën gjellët. U prish qumështi.","vet. veta III. Mban erë, merr erë të keqe; fig. ndyhet, fëlliqet. U prish ajri. U prish atmosfera.","vet. veta III. Bie, nuk mbahet më, shkatërrohet. U prish krushqia (miqësia). Nuk u prish bashkimi.","vet. veta III (kryes. me një trajtë të shkurtër të përemrit vetor në r. dhanore) fig. Nuk e kam më një dëshirë, një gjendje shpirtërore etj., më ikën diçka që kisha, që ndjej etj.; zemërohem, fyhem. Nuk më prishet qejfi. Iu prish rehatia (gjumi). Iu prish oreksi.","vet. veta III. Merr një drejtim tjetër; kalon në një gjendje tjetër, luan nga qëndrimi i parë. Iu prish drejtimi (ekuilibri).","Ndërpres marrëdhëniet e mira që kam pasur me dikë; zihem me dikë. Për pak u prisha me të.","vet. veta III. Vishet me re, vrenjtet (për qiellin); bëhet më e ftohtë a me reshje (për kohën); ndryshon për keq, egërsohet. U prish moti (koha). U prish deti filluan dallgët.","vet. veta III bised. Dështon (për bagëtinë). U prish një dhi (një dele).","Pës. e PRISH. * Nuk u prish bota (dynjaja)! mospërf. s'ka ndodhur ndonjë e keqe e madhe!, nuk u bë kiameti! Iu prish çarku shih te ÇARK,~U. Iu prish (iu turbullua) gjaku u tremb, u frikësua shumë; u trondit shumë, u shqetësua shumë. M’u prish gjiza! thjeshtligj., iron. shih te GJIZ/Ë,~A. M'u prish mendja fillova të mendoj ndryshe, m'u kthye mendja; u hutova. U prish (u çart) nga mendtë (nga mendja, mendsh, nga fiqiri) u çmend; u marros. M'u prish puna! mospërf., iron. nuk ka rëndësi për mua!, s'bëhem merak!, s'më bëhet vonë!, aq më bën!, punë e madhe fort! S'prishet dasma për një qepë (për një limon) fj. u. shih te DASM/Ë,~A."]}]</script>
