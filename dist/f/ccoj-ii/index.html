<script>window.__INITIAL_DATA__ = [{"slug":"ccoj-ii","term":"ÇOJ II","attributes":["kal."],"definitions":["Shkëput diçka nga toka ose nga dyshemeja dhe e mbaj pezull në duar, marr diçka nga vendi i vet dhe e mbaj në dorë ose e vë më lart, ngre; kund. ul. Çoj thesin (barrën, valixhen).Çoj tezgën (vigun). Çoj dorezën e telefonit. E çoj peshë. Çoj lart.","Drejtoj lart, zhvendos në drejtimin nga poshtë lart. Çoj dorën (gishtin). Çoj kokën. Çoj grushtin. Çoj vetullat përpjetë.","Bëj që të ngrihet lart a më lart nga ç'është, ngre. Çon shumë pluhur (era). Çoj degën e pemës.","E kaloj nga gjendja e shtrirë në qëndrimin pingul; bëj që të qëndrojë lart diçka që ishte e shtrirë, e varur dhe e kapur diku; ngre; kund. ul. Çoj rrasën. Çoj kapakun. Çoj jakën e palltos (e xhaketës). Çoj perdet. Çoj velat e barkës.","Kthej në gjendjen e mëparshme më këmbë ose pingul diçka që ishte rrëzuar, përmbysur ose rrokullisur; bëj që të ngrihet në këmbë dikush që ishte ulur a shtrirë, ngre. Çoj karriget (bankat, tryezat). Çoj gardhin. Çoj fëmijën e rrëzuar. E çoi plakun.","E bëj që të lëvizë a të ngrihet nga vendi, ngre. Çoj nga vendi (nga karrigia). E çoj në mësim (në dërrasë të zezë) e thërres për t'u përgjigjur në mësim.","I prish gjumin dikujt; e ngre, zgjoj. Çoj nga krevati (nga shtrati). E çoj nga gjumi. Çoje djalin! E çoi herët (vonë).","gjah. Nxjerr nga strofka a nga vendi ku ishte fshehur një kafshë a një shpend për të gjuajtur. Çoj rosat (shkurtat... ). E çoi lepurin qeni.","E bëj diçka më të lartë nga sa ishte; ngre diçka. I çoj themelet mbi tokë. E çoj shtëpinë edhe një kat. Çojnë mullarë. I çojmë fitilat.","E bëj më të madh, i shtoj madhësinë, vlerën, masën a shkallën diçkaje; ngre (edhe fig.) Çoj çmimin. Çoj normat. Çoj rendimentin (prodhimin). E çoi moshën. I çoj moralin.","E bëj të dëgjohet më shumë, e bëj më të lartë a më të fortë; forcoj. Çoj zërin. Çoj radion.","fig. E bëj dikë që të marrë pjesë gjallërisht në një luftë të drejtë, në një aksion a në një veprimtari të rëndësishme shoqërore; frymëzoj për diçka, i jap zemër; ngre. Çuan popullin. I çoi në luftë (në aksion).","bised. Heq diçka nga një vend dhe e shpie në një vend tjetër. Çoj tryezën heq enët dhe ushqimet nga tryeza pas të ngrënit.","Bëj punimin e parë të tokës; lëroj, kthej. Çoj tokën (arën). Çoj ugarin.","fig. I ngjall a i shkaktoj diçka, zgjoj. Më çon mallin. I çon etjen. I çon vaj.","bised. Mbledh, grumbulloj. Çoj ushtri. * E çoi (e ngriti, e nxori, e qiti) nga balta dikë shih te BALT/Ë,~A. Çon (ngre) dorë (dorën) kundër dikujt shih te NGRE. Çoi (ngriti) duart lart (përpjetë) shih te NGRE. Çoj (ngre) gotën (dollinë, kupën, shëndetin) shih te NGRE. Një gur s'çon (s'bën) mur fj.u. shih te GUR,~I. Çon (ngre) hundën (përpjetë) shih te HUND/Ë,~A. Nuk çon (nuk ngre) kandar (peshë) edhe poh. shih te KANDAR,~I. S'e çon (s'e ngre, s'e mban, s'e heq) kandari shih te KANDAR,~I. Çoj (ngre) kokë (krye) shih te NGRE. Çon kokën (kokë) mëkëmbet, e merr veten nga ana ekonomike; përmirësohet, e merr veten pas një sëmundjeje të rëndë. S'e çon (s'e ngre) kokën nga diçka shih te NGRE. E çoi (e ngriti) në (më) këmbë shih te KËMB/Ë,~A. Më çon (më nxjerr) mallin e dikujt a të diçkaje shih te NXJERR. Çon (ngre) peshë dikë shih te PESHE. Çon (ngre) peshë (mendjet, zemrat) shih te PESHË. E çoj (e ngre, e hipi) në qiell shih te QIELL,~I. Çoj (ngre, mbledh rrudh) supet shih te NGRE. Çon (ngre) veshët shih te VESH,~I. Çoj (ngre) zërin (në qiell) shih te NGRE. Ul e ço (ngre) shih tek UL. I çoi (i ngriti, i bëri) këmbët bigë mospërf. shih te BIG/Ë,~A,. Nuk çon (nuk nxjerr, nuk qit) lepur nga shtrofulla shih te LEPUR,~I. I çoj peshë zemrën dikujt shih te PESHË."]}]</script>
