<script>window.__INITIAL_DATA__ = [{"slug":"gomar","term":"GOMAR","attributes":["m.","sh."],"definitions":["Kafshë njëthundrake, që mbahet në shtëpi për ngarkesë, me trup me të vogël se kali, me kokë të madhe, me veshë të gjatë dhe me qime zakonisht në ngjyrë të hirtë. Veshët e gomarit. Kërriç gomari. Ngarkoj gomarin. Palli gomari. I bie gomarit. Punon si gomar punon shumë. Duron si gomar duron shumë. Këndon si gomar këndon keq.","Sasia e barrës a ngarkesa që mban kjo kafshë. Një gomar dru. Tre gomarë drithë.","fig. thjeshtligj., shar. Njeri i trashë nga mendja, budalla; hajvan. Gomar i madh. Mori mendjen e atij gomari. Gomar qenka! Gomar me veshë. thjeshtligj., keq.","Përd. mb. sipas kuptimit 3 të emrit. * (Punonte) për shpirt të gomarit punonte kot, i shkonte mundi humbur. Sa gomarë buzëbardhë (ka)! iron, shih te BUZËBARDHË. S'çalon gomari nga veshët fj.u. shih te ÇALOJ. S'di si (nga) lidhet gomari mospërf. shih te LIDHEM. Ia ha bukën gomari mospërf. është shumë i ngathët dhe i mefshtë. Kur të hipë gomari (derri) në fik (në majë të fikut) thjeshtligj. kurrë, asnjëherë. I kanë hedhur (i kanë shtënë)trutë e gomarit nuk vepron sipas mendjes së tij, por bën si i thonë të tjerët, ia kanë marrë mendjen të tjerët. I lan kokën (kryet) gomarit shih te LAJ. Nuk i shkoi gomari (kali) në udhë (në urë) edhe poh. shih te UDH/Ë,~A. I shkon (i ka hije) si shala gomarit iron. shih te SHAL/Ë,~A II. vuri lëkurën e gomarit dikujt shih te LËKUR/Ë,~A. S’di gomari ç'është bari mospërf. nuk është i zoti të vlerësojë atë që është me të vërtetë e mirë e me vlerë, nuk di dhia ç'është tagjia. E di gomari ku e vret samari fj.u. secili i di vetë punët e hallet e tij, e di i zoti ku i pikon çatia. S'di t'i japë ujë (as) gomarit dikush mospërf. është i trashë nga mendja ose fare i pazoti. Kali humbi, gomari s'duket fj. u. është rrëmujë e madhe, nuk e merr vesh i pari të dytin. Prit gomar të mbijë bar! mos prit kot; s'dihet kur do të bëhet një punë a kur do të vijë dikush, mund të mos bëhet a të
