<script>window.__INITIAL_DATA__ = [{"slug":"baltee","term":"BALTË","attributes":["f."],"definitions":["Dhe i përzier me ujë, tokë e qullët zakonisht në fushë, nëpër udhë etj. Baltë e kuqe (e zezë). Baltë e madhe. Baltë vjeshte. Ngjyrë balte. Vend me baltë. Këpucë me baltë. Bëhet baltë. Bëhem me baltë. Zë baltë (udha). Lyej me baltë. Eci nëpër baltë. Bie (ngec) në baltë. Fshij baltën.","edhe sh. ~A, ~AT ose ~ËRA, ~ËRAT. Vend me dhe të përzier me ujë; copë dheu e njomur ose stërpikë uji e përzier me dhe. Pastroj baltërat. Heq baltat. Shkoq baltën.","Tokë në përgjithësi; truall, dhe; poet. toka mëmë, atdheu. Balta jonë. Balta arbërore. Ka lindur në këtë baltë.","Dhe (zakonisht deltinë), i përzier me ujë, i ngjeshur e i mbrujtur për të bërë enë, tulla etj. ose për të lyer murin. Baltë e pjekur. Baltë shtambash. Enë (poçe, tas) balte. Kandil balte. Mur me baltë. Kasolle prej balte. Gatuaj (përziej) baltën. Lyej me baltë.","Lënda, me të cilën është bërë një gjë; fig. brumë. Baltë e dobët. Unazë me baltë të keqe.","Lymi i disa ujërave minerale, që përdoret si mjet kurimi. Baltë llixhe. Banjë me baltë.","edhe sh. ~ËRA, ~ËRAT. Mbeturina të një lëngu që kullojnë në fund, fundërri, llum; papastërti që zë diçka, zgjyrë. Baltë kafeje. Baltë vaji. Baltë duhani. Balta e kokës. Baltë veshi. Baltë dhëmbësh. Balta e dyfekut. I pastroj baltën çibukut.","fig. keq. Send a njeri pa vlerë; diçka që kushton fare lirë. U bë baltë dikush a diçka.","edhe sh. ~ËRA, ~ËRAT fig. keq. Diçka e ndyrë, ndyrësi, diçka e pandershme. Baltërat e shekujve. Balta e turpit. Pastroi baltërat. * Baltë e dobët a) njeri i dobët nga trupi, që nuk u qëndron dot sëmundjeve, lodhet shpejt etj.; b) keq. njeri i pakarakter; njeri i paqëndrueshëm, njeri i lëkundshëm. Baltë e ngjitur keq. shih te NGJITUR (i, e). Bën baltë tall. rri kot, rri pa punë ose merret me diçka të padobishme. E bëri baltë dikë e shkatërroi, e shpartalloi, e bëri pluhur e hi. E bëri baltë diku ka shkuar dendur te dikush, e ka tepruar me vizita të shpeshta. U bë baltë (në fytyrë) u zverdh, u zbeh shumë, u bë dhe (nga frika, nga tronditja etj.). I bëhej baltë dikujt (bëhej baltë para dikujt) i përulej shumë, i vinte pas i nënshtruar e i poshtëruar, i bëhej këpucë. U bë baltë e pluhur u përul para dikujt, u nënshtrua, u bë urë. Ra në baltë u fut padashur në një gjendje të keqe, ra në rrethana të vështira. Doli (u ngrit) nga balta doli nga një gjendje e vështirë, e prapambetur ose poshtëruese; shpëtoi nga një hall, vështirësi a e keqe. Flori në baltë (në pleh) shih te FLORI,~RI. Hëngri baltë përçm. shih te HA. Hedh në baltë hedh poshtë si diçka pa vlerë, shkel me këmbë, ndyn, njollos. I hedh baltë dikujt (hedh baltë mbi dikë) shih te HEDH. Me këmbë prej balte shumë i fuqishëm në dukje, por me mbështetje të dobët, i paqëndrueshëm. E la në baltë (në batak) dikë a) e la në vështirësi kur duhej ta ndihmonte, nuk i dha ndihmën që priste, i doli i pabesë dhe e braktisi në rrethana të vështira; b) ia kaloi një tjetri, e la prapa; ishte më i aftë e më i zoti, më i fuqishëm etj. se ai; qëndron shumë më lart se një tjetër. Mbeti (ngeli, ngeci) në baltë ra në një gjendje të keqe, nuk i kapërceu dot vështirësitë e pengesat, nuk doli dot nga gjendja e vështirë. E nxori (e qiti, e ngriti, e çoi) nga balta dikë e ndihmoi që të dilte nga gjendja e vështirë, e shpëtoi nga një vështirësi, hall a e keqe. E tërhoqi (e hoqi) në baltë dikë e shpuri në udhë të keqe, e çoi në rrugë të gabuar. I bëhet balta flori dikujt shih te FLORI,~RI. I bëhej baltë në opingë dikujt keq. shih tek OPING/Ë, ~A. Çante baltërat për të tjerët shih te ÇAJ. E kam gojën baltë kam një shije të keqe në gojë. Nuk i la baltë nën thua dikujt ia nxori të palarat në shesh, ia zbuloi të gjitha të metat e gabimet. Mbuloi balta baltën përb. thuhet kur vdes një njeri i keq, i pavlerë a i poshtër, që ka bërë shumë të liga (në kuptimin «mirë bëri që vdiq»). Iu ngjit si balta (si bajga) pas këpucës thjeshtligj. shih te BAJG/Ë~A. Nuk lyhet (nuk fëlliqet) dielli me baltë fj. u. shih te DIELL,~I. I zoti e nxjerr (e qit) gomarin nga balta fj. u. punën e kryen ai që e ka përsipër, i zoti i punës e nxjerr atë në krye. Ajo baltë për atë mur është përçm. ka gjetur shoku-shokun, ka gjetur tenxherja kapakun; sipas kokës edhe festen. Këmbë për baltë, gojë për mjaltë fj. u. ai që punon, ka edhe të hajë. Baltë e bardhë (baltë kreu, baltë koke) një lloj deltine e bardheme që përdorej për të larë kokën, botë. Baltë xhamash lëndë e posaçme si brumë, që përdoret për të zënë anët e xhamave."]},{"slug":"baltee","term":"BALTË","attributes":["mb."],"definitions":["Që është prej balte, i bërë me baltë. Enë e baltë. Qyp i baltë. Tava të balta."]}]</script>
