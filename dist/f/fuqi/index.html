<script>window.__INITIAL_DATA__ = [{"slug":"fuqi","term":"FUQI","attributes":["sh."],"definitions":["Aftësia e njeriut ose e qenieve të tjera të gjalla për të vepruar, për të bërë punë ose lëvizje duke tendosur muskujt; mundësia trupore e një njeriu a e një kafshe për të bërë diçka; forcë fizike. Fuqi e madhe. Fuqi trupore (fizike). Fuqia e krahut. Me tërë fuqinë. Kam fuqi. Mbledh fuqitë. Më pritet (më ka lënë) fuqia. Me sa kam fuqi. Bashkimi bën fuqinë. fj. u.","Aftësia e njeriut për veprimtari mendore, për të shfaqur vetitë dhe tiparet e tij shpirtërore; forca a thellësia e shfaqjes së një ndjenje etj.; shkalla e kësaj shfaqjeje. Fuqi mendore. Fuqi shpirtërore. Fuqia e mendjes (e vullnetit, e karakterit).","Aftësia që ka diçka për të kryer një veprim ose për të vepruar mbi një send; aftësia e diçkaje për punë; shkalla e kësaj aftësie; forcë. Fuqia blerëse. Fuqia shprehëse. Fuqia tërheqëse e makinës. Fuqia rrotulluese e mekanizmit.","shih FORC/Ë,~A 3, 4, 6,","Fuqia ekonomike. Fuqi e armatosur. Fuqia tokësore (detare, ajrore). Fuqia e popullit. Fuqia e fjalës.","fiz. Energjia që çlirohet a që harxhohet në një njësi kohe për të bërë një punë ose për të vënë në lëvizje diçka; energjia që ushtrohet mbi një trup, e cila bëhet shkak për të prishur gjendjen e tij të qetësisë ose të lëvizjes. Fuqia elektrike. Fuqi kalorifike. Fuqia e makinës (e motorit). Fuqia e rrymës. Fuqia e ujit.","drejt. E drejta a mundësia ligjore, që ka ose që i jepet dikujt për të vepruar a për të bërë diçka, pushtet. Fuqi të pakufizuara (të plota). Fuqi juridike. Ka fuqi. Hipi (e solli) në fuqi.","Të qenët i vlefshëm, të qenët në veprim (për një ligj, për një urdhëresë etj.). Fuqi ligjore. Mbetet (është) në fuqi. Hyn në fuqi. Bie nga fuqia shfuqizohet.","Njerëzit, qeniet e tjera të gjalla dhe mjetet që përdoren për të kryer një veprimtari të caktuar ose për të bërë shndërrime të mëdha; çdo gjë lëndore që bëhet burim për lëvizje dhe për ndryshime; forcë. Fuqitë e natyrës. Fuqia punëtore tërësia e punëtorëve. Fuqia motorike makineria bujqësore. Fuqia tërheqëse kafshët që përdoren për punimin e tokës.","Shtet, vend që ka forca të mëdha ekonomike e ushtarake dhe ndikim të gjerë në jetën politike ndërkombëtare. Fuqitë e mëdha. Fuqitë ndërluftuese. Fuqitë imperialiste.","mat. Prodhimi që del nga shumëzimi i një numri bazë me veten e tij aq herë sa është treguesi i tij. Fuqi e dytë (katrore). Fuqi e tretë (kubike). Fuqia e një numri (e një thyese). Treguesi i fuqisë. Baza e fuqisë. Ekuacion i fuqisë së parë (së dytë). Ngre në fuqi. * Fuqi (forcë) madhore shih te MADHOR,~E. Fuqi e mbinatyrshme perëndia, zoti (sipas botëkuptimit idealist e fetar). Hipi në fuqi shih te HIPI. Zbriti nga fuqia shih te ZBRES."]}]</script>
