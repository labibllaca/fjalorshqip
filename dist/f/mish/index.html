<script>window.__INITIAL_DATA__ = [{"slug":"mish","term":"MISH","attributes":["as."],"definitions":["Mish. * Iu ngjeth (iu drodh) mishtë a) u trondit shumë, iu drodh trupi nga frika, u tmerrua; b) u prek thellë në shpirt, u mallëngjye shumë."]},{"slug":"mish","term":"MISH","attributes":["m.","sh."],"definitions":["Pjesa e tultë e trupit të njeriut a të kafshëve, që përbëhet nga indet e buta të muskujve dhe mbështjell eshtrat. Mishi dhe kockat. Mishi i njeriut (i kafshëve, shpendëve, i peshqve). Mishi i dhëmbëve pjesa e tultë ku janë ngulur dhëmbët, trysa. Mishi i varfër. bised. diafragma. Ngjyrë mishi ngjyrë trëndafili e ndezur. Ia nguli gjilpërën në mish. I qëroi (i hoqi) mishin. Më dhëmbin mishrat. E zuri në mish.","Copë nga trupi i kafshëve të therura, që përdoret për ushqim. Mish i njomë (i butë). Mish i tharë (i tymosur) pastërma. Mish i hollë mish bagëtish të imëta. Mish i trashë mish bagëtish të trasha, mish gjedhi. Mish i njomë (i shëndoshë, i dobët). Mish i pjekur (i skuqur, i zier). Mish i shijshëm. Mish tul (pa kocka). Mish i grirë. Mish lope (viçi, dashi, qengji, derri, kali, lepuri). Mish pule (pate, rose). Mish gjahu. Mish kutie. Mish me patate (me fasule). Lëng mishi. Thelë mishi. Makinë (grirëse, rrahëse) mishi. Kombinati i mishit. Dyqani i mishit. Çmimi i mishit. Një kilogram mish. Një copë mish. Gjellë me mish. S'e ha mishin.","bised. Bagëti e therur për të ngrënë ose e caktuar për t'u therur. Mish i therur. Mishra të pjekura. Theri dy mishra. Poqi një mish. Solli një mish për dasmë.","Pjesa e jashtme e zbuluar e trupit të njeriut, trupi lakuriq; lëkura. I doli mishi i duket lëkura. E preku në mish. Mbeti në mish mbeti lakuriq. Kish dalë në mish kish dalë lakuriq. E vë (e vesh, e mban) fanellën në mish.","bised. Pjesa e tultë e kokrrës së disa pemëve, që mbështjell bërthamën a farat dhe që zakonisht hahet, tul. Mishi i mollës (i dardhës, i pjeshkës, i kumbullës). Mishi i ullirit. Mishi i pjeprit. Ka shumë mish. * Ka (shumë) mish është i shëndoshë, po jo i shkathët. Ka vënë mish është shëndoshur shumë, është ngjallur. Ka këputur mish shih te KËPUT. Ka lidhur mish shih te LIDH. Mish i huaj shih te HUAJ (i, e). Me mish e me gjak (me kocka) i gjallë, i tëri, ai vetë (për dikë që ngjan shumë me një tjetër). Me mish e me shpirt me të gjitha forcat e mundësitë; me gjithë zemër, me dëshirë të madhe; fort, shumë. Mish pas lajmësi shih te LAJMËS,~I. Mish në mashë i zhveshur e i zbathur, lakuriq. Mishi i mishit fëmija i fëmijës tim (si më i dashur e më i ëmbël për mua). As mish as peshk i papërcaktuar mirë, pa tipare të dalluara mirë e pa një vlerë të qartë, as verë as uthull. Mish për top keq. shih tek TOP,~I. Ia nxiu mishrat e rrahu fort, e shembi në dru. Iu bënë duart (këmbët) mish iu gjakosën duart nga puna e rëndë a këmbët nga të ecurit zbathur, i ranë duart (këmbët) copë. E bëri mish e gjak shih te GJAK,~U I. U bë lesh e mish me dikë shih te LESH,~I. U bë mish për hell shih te HELL,~I. Një copë mish me dy sy mospërf. njeri i trashë që s'kupton kurrgjë, buf. I ra mishi për truall hoqi e lëngoi shumë, u stilit. I ka hyri frika në mish (në palcë, në bark) shih te PALC/Ë,~A. Nuk i ka mish brinja shih te BRINJ/Ë,~A. E ka gojën mish e ka gojën të përkuqur e të pezmatuar nga një sëmundje. Ia la plumbin në mish (në lëkurë, brenda) shih te LËKUR/Ë, ~A. Janë mish e gjak janë një e të pandarë, janë të lidhur fort njëri me tjetrin. Janë si mishi me thuan (me kockën) janë një e të pandare janë të lidhur fort njëri me tjetrin. S'ndahet mishi prej thoit fj. u. përdoret kur flasim për dy vetë që janë të lidhur ngushtë njëri me tjetrin. Shumë pupla e pak mish fj. u. shih te PUP/ËL,~LA. Mish me presh e presh me mish mospërf. po ajo gjë, e njëjta gjë. Dasmë pa mish nuk ka (nuk bëhet) fj. u. shih te DASMË,~A. Çdo mish (berr) varet nga këmbët e veta (në çengelin e vet) fj. u. a) secili përgjigjet vetë për punën e vet secili i del zot vetes; b) çdo njeri duhet trajtuar dhe vlerësuar sipas veçorive që ka, duhet parë më vete pa e futur në një thes me gjithë të tjerët. Edhe mishi të piqet, edhe helli të mos digjet fj. u. ta bëjmë një punë pa dëmtuar tjetrën (thuhet kryesisht, kur përpiqemi ta ndihmojmë dikë). Pre mish e ha në asnjë mënyrë, e pamundur, kurrsesi. Ia qiti mishin copë dikujt shih te QIT. E ruan si qeni mishin (si qeni mëlçitë) iron. shih te QEN,~I. I do qethur mishi me gërshërë shih te QETH. Cjapi mish e dhia tavë (dhia mish e cjapi tavë) shih te CJAP,~I. Hyri mish e doli peshk mospërf. nuk mësoi asgjë, nuk zuri mend. Pret thika në mish të botës keq. shihte THIK/Ë,~A."]}]</script>
