<script>window.__INITIAL_DATA__ = [{"slug":"thith","term":"THITH","attributes":["kal."],"definitions":["Tërheq me buzë ose me hundë një lëng a diçka tjetër; e pi diçka duke e tërhequr me buzë; fut thellë deri në mushkëri ajrin, tymin etj., duke marrë frymë me gojë a me hundë. Thith qumështin (verën). Thith palcën nga kocka. Thith ajër të pastër. Thith cigaren (duhanin, tymin). Thith çibukun. Thith burnotin. Foshnja thith gjirin (sisën) foshnja pi qumësht nga nëna. Shushunjat thithin gjakun. Thith thellë. Thith pak raki me hundë (kur dikush ka rrufë).","Tërheq e nxjerr me pompë a me një pajisje tjetër të posaçme lëngun, gazin, pluhurin etj. që gjendet brenda diçkaje. Thith ujin me pompë. Thith avujt (gazin). Thith pluhurin.","E fut një lëng, nxehtësinë etj. në brendësi, e tërheq diçka dhe e mbaj brenda vetes, e përthith; e marr, e pi (zakonisht ujin). Rrobat kanë thithur ujë (lagështirë). E thithi ujin toka. Thith ngrohtësinë (avujt, rrezet). E thithi me leckë.","fig. E përvetësoj diçka, e bëj timen; i marr a i rrëmbej gjithçka, nuk i lë gjë; përpij, përlaj. I thithi pasurinë (të ardhurat). Ia thithi shëndetin. Kurbeti i thithi djalërinë (rininë). Më thithi të gjitha energjitë (forcat).","fig. E kuptoj a e kap menjëherë diçka; e përvetësoj menjëherë dhe thellë; e përpij. Ta thith fjalën nga goja. I thithi mendimet (idetë). E thithi thelbin e çështjes (e problemit). E thithi mësimin menjëherë.","fig. Më tërheq shumë, më bën për vete të tërin. E kishte thithur puna (studimi, muzika).","jokal. vet. veta III. Heq, tërheq (për oxhakun etj.). S'thith oxhaku. Gypat e gjerë (të sobës) thithin mirë. * I thithi (i piu) gjakun shih te PI. E thithi (e piu e përpiu, e rrufiti) dheu dikë shih te DHE,~U. Ia thithi vlagën dikujt shih te VLAG/Ë,~A. E ka thithur bashkë me qumështin e nënës shih te QUMËSHT,~I."]},{"slug":"thith","term":"THITH","attributes":["m.","sh."],"definitions":["Maja e gjirit, thumbi i sisës, thimthi. Thithi i gjirit.","Boshti i çivisë a i rezes së derës së drita
