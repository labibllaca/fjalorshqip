<script>window.__INITIAL_DATA__ = [{"slug":"leeviz","term":"LËVIZ","attributes":["kal."],"definitions":["E shpie diçka a dikë nga vendi ku është në një vend tjetër, zakonisht duke e hequr zvarrë ose duke e shtyrë; e largoj diçka a dikë nga vendi i vet, i ndërroj vendin, e zhvendos; jokal. nuk qëndroj në vendin ku jam, por shkoj në një vend tjetër, zhvendosem; nuk qëndroj në një vend por eci; vet. veta III ecën, shkon, rrjedh në një drejtim të caktuar; largohem nga një vend; iki nga një vend për një kohë të gjatë a përgjithnjë. Lëviz karriget (tryezat, bankat). E lëviz më majtas (më djathtas, më përpara, më prapa). Lëvizën shumë dhe. Lëviz shpejt (ngadalë). Mezi lëviz nga vendi. Nuk lëviz nga shtrati. Njerëzit lëviznin lart e poshtë. Retë lëviznin drejt veriut. Hëna lëvizte ngadalë. Treni lëvizte me shpejtësi. Uji lëvizte teposhtë. S`ka lëvizur njeri nga fshati. Të mos lëvizë njeri nga shtëpia! Rrinte pa lëvizur fare.","Ndryshon qëndrimin e trupit a të një pjese të tij, nuk e lë në gjendje të qetë; jokal. vet. veta III nuk rri në gjendje të qetë, ndryshon qëndrimin a vendin. Lëviz trupin (kokën, krahët, këmbët). Lëviz buzët. Lëviz vetullat (qerpikët). Lëvizte sytë. Duart i lëviz anash. Qerpikët nuk i lëviznin fare. Këmba nuk i lëvizi më.","Rrotulloj, luaj, shkel a shtyp diçka për të vënë në punë motorin ose një mekanizëm tjetër. Lëviz marshin (timonin, çelësin e motorit). Lëviz rrotën e një mekanizmi.","Tund lehtë diçka; jokal. vet. veta III bën që të lëkundet ose të valëvitet në ajër, lëkund; tundet lehtë a valëvitet në ajër (për gjethet, shaminë etj.). Veriu lëvizte gjethet e pemëve (kallinjtë e grurit). Dikush po lëvizte shaminë (flamurin). Majat e plepave lëviznin. Era lëvizte lehtë sipërfaqen e ujit.","fig. E caktoj dikë me punë a e emëroj me detyrë në një vend tjetër; jokal. ndërroj punë a detyrë, kaloj në një vend tjetër. Lëviz kuadrin. E lëvizën në një detyrë tjetër. Lëvizën disa veta nga ndërmarrja.","jokal. fig. Shkoj përpara, përparoj; vet. veta III zhvillohet diçka. Jeta lëviz përpara. Nuk ka lëvizur nga vendi diçka ka mbetur në atë gjendje a në atë shkallë zhvillimi ku ishte.","fig. I shtoj dikujt vrullin për punë ose për të kryer diçka, e nxit, e shtyj për diçka, e vë në lëvizje; jokal. vë në lëvizje, i përvishem një pune a një vepre, lëviz masat (popullin). Njerëzit lëvizin kudo ku punojnë. Le të lëvizin vetë!","jokal. vet. veta III. Ndryshon, nuk qëndron në vend, lëkundet, luhatet. Lëviz tensioni i gjakut. Nuk lëvizin çmimet. Lëviz temperatura. Nuk po lëviz gjendja e të sëmurit.","fig. E bëj të paqëndrueshme diçka; i ngjall dikujt mosbesim e pasiguri, e lëkund, e tund; jokal. vet. veta III nuk është i qëndrueshëm, luan; lëkundet. Lëvizën themelet e perandorisë (e botës kapitaliste). Nuk e lëviz dot nga e tija. Fjalët nuk e lëvizën fare. Nuk lëviz nga fjala.","jokal. bised., keq. Nuk ka qëndrim të mirë moral, është e lëvizshme, e luan bishtin (për femrat).","jokal. bised. Çmendem, më luan mendja. Paska lëvizur fare! * Lëviz (dredh, përdredh, luan) bishtin keq. shih te BISHT,~I. Lëviz (luan) gurët shih te LUAJ. Nuk i lëviz (nuk i dridhet, nuk i luan) qerpiku (qepalla, syri, bebja e syrit) shih te SY,~RI. S'lëviz (s'tundet) nga vendi shih te VEND,~I. Më lëviz (më luan) zemra ndiej shqetësim të madh për diçka; më hyn shumë frika. S’lë gur pa lëvizur shih te LË. I lëviz (i shket, i rrëshqet, i luan, i dridhet) toka (trualli) nën këmbë shih te DRIDHEM. Nga lëviz qafa, kthehet koka fj.u. shih te QAF/Ë,~A. Kur rri (kur fle) koka, lëviz gjuha fj.u. shih te KOK/Ë,~A."]}]</script>
