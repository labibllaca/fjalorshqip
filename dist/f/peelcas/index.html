<script>window.__INITIAL_DATA__ = [{"slug":"peelcas","term":"PËLCAS","attributes":["jokal."],"definitions":["edhe kal. Bëj që të shpërthejë menjëherë me forcë e me zhurmë një lëndë; vet. veta III shpërthen menjëherë, me forcë e me krismë të madhe (për një lëndë si dinamiti, baruti etj.):, shpërthen një armë zjarri që përmban lëndë të tilla. Pëlcasin minat. Pëlciti një bombë. Plasi dinamiti (fuqia e barutit). Plasën predhat.","edhe kal. Çaj me shpërthim diçka të fryrë tepër; vet. veta III çahet dhe shpërthen me zhurmë a me krismë diçka që fryhet tepër me ajër, me një gaz ose me një lëndë tjetër. E plasi topin. Pëlciti kamerdarja (tullumbacja). Plasi kaldaja. Ka plasur një gyp. I plasi goma biçikletës (makinës). I plasi zorra (stomaku). I plasi tyta pushkës (topit).","edhe kal. E çaj diçka, e plasarit, e kris (me të nxehtë, me soditje të lehta etj.); vet. veta III çahet diçka vende-vende, merr një të çarë; plasaritet (nga nxehtësia, nga soditjet e lehta etj.). Të nxehtët e pëlcet gotën. Gëlqerja t'i pëlcet duart. Plasi gota (xhami). Ka plasur toka (korja e tokës). I plasi lëkura. Më kanë plasur duart.","vet. veta III bised. Vërshon a del me vrull nga shtrati i vet (lumi etj.). Plasi lumi. Pëlcitën përrenjtë.","vet. veta III fig. Ndodh menjëherë një ngjarje; shfaqet një dukuri në mënyrë të papritur e me vrull dhe përhapet me shpejtësi, shpërthen. Plasi zjarri. Plasi shiu. Plasi lufta (kryengritja). Plasi sherri (grindja). Plasën mosmarrëveshje të rënda.","vet. veta III fig. Del në shesh menjëherë e me vrull diçka që ishte e fshehur, shpërthen diçka e mbuluar. Plasi e vërteta. Plasën pakënaqësitë e vjetra. Nuk i lë të pëlcasin hasmëritë.","fig. Kam një dëshirë të madhe e të papërmbajtur për diçka, bëj çmos, s'duroj dot; jepem shumë pas dikujt a pas diçkaje. Pëlcet pas tij, s’ndahet dot. Pëlcet ta bëjë. Pëlcet të vejë atje. Plasi, po s’e mori dot. Të pëlcasësh e s’ke për ta gjetur.","fig. Ndiej shumë lodhje për diçka, më mundon shumë, më këput, ma merr frymën. Plasëm nga
