<script>window.__INITIAL_DATA__ = [{"slug":"lidhur","term":"LIDHUR","attributes":["mb."],"definitions":["Që është shtrënguar ose është kapur pas diçkaje me litar, me zinxhir etj. për të mos luajtur a për të mos u larguar prej andej; që është lidhur; kund. i zgjidhur. Qeni ishte i lidhur. E la të lidhur. Me këmbë (me duar) të lidhura.","Që është mbledhur bashkë e është shtrënguar me pe, me tel, me rrip etj.; që është bërë tufë e është lidhur me diçka; që është mbështjellë në çarçaf, në shami etj., që është lidhur; kund. i zgjidhur. Duaj të lidhur. Grurë (misër) i lidhur. Qepë të lidhura. I mban flokët të lidhur.","Që është mbështjellë me një rrip pëlhure a me diçka tjetër (për një pjesë të trupit, për plagët etj.); kund. i zgjidhur. Me dorë (me këmbë) të lidhur. Me kokën të lidhur. Me sy të lidhur.","Që është kapur mirë me diçka tjetër; që i ka të bashkuara fort pjesët me njëra-tjetrën; i fortë, i qëndrueshëm; që nuk luan nga vendi, që nuk rrëshqet. Gurë të lidhur. Mur i lidhur. Tokë e lidhur.","Që përbëhet nga një varg fjalësh a shprehjesh, të cilat kanë lidhje të caktuara ndërmjet tyre e shprehin një mendim të caktuar; që zhvillohet rrjedhshëm e bukur. Të folurit e lidhur. Lojë e lidhur. sport.","spec. Që i ka të mbërthyera a të bashkuara pjesët ose detalet; i mbyllur, i kyçur. Qark i lidhur. fiz.","Që është i fortë, i shëndoshë, i zhvilluar mirë e i hijshëm (për trupin); që është i ngjeshur mirë nga trupi e i shëndoshë, truplidhur. Me trup të lidhur. Djalë i lidhur. * I lidhur bisht më bisht thjeshtligj. shih te BISHT, ~I. I ka duart të lidhura (të zëna) nuk vepron dot, sepse e pengon dikush a diçka. I ka këmbët të lidhura nuk shkon dot asgjëkund a diku, sepse e pengon dikush a diçka."]},{"slug":"lidhur","term":"LIDHUR","attributes":["ndajf."],"definitions":["Në gjendje të lidhur; duke i pasur duart ose duart e këmbët të lidhura. E mban qenin lidhur. E morën (e sollën, e shpunë) lidhur.","Duke e pasur një pjesë të trupit të mbështjellë me diçka. Me krahun (me gishtin) lidhur. E kishte kokën lidhur.","Pa e lënë të lirë të ikë a të veprojë, pa i dhënë përgjigje përfundimtare, pa ia zgjidhur një punë përfundimisht, pa ia shkëputur një çështje; varur. E mbante lidhur. * Lidhur me... në lidhje me... Me duar lidhur pa bërë asgjë, pa vepruar, duarlidhur, duarkryq."]}]</script>
