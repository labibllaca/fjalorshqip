<script>window.__INITIAL_DATA__ = [{"slug":"gjendem","term":"GJENDEM","attributes":["vetv."],"definitions":["Jam në një vend, ndodhem diku; bie, shtrihet diku, ka zënë vend, është diku. Gjendet në mal. Gjendet në veri (në jug). Gjendet jashtë qytetit. Gjendet larg. Vendi ku gjendet.","Ndodhem rastësisht ose papritur diku. U gjend majë malit (buzë lumit). U gjendën në fushë të hapur. U gjendën ballë për balli. Nuk u gjenda aty.","fig. Jam ose bie në një gjendje që nuk e prisja, ndodhem padashur përpara diçkaje ose ndeshem me diçka, zakonisht të papëlqyeshme; ndodhem, jam. U gjend ngushtë (keq). U gjend në befasi. U gjendën në ditë të keqe. U gjend përpara një rreziku (një të papriture). U gjend midis dy zjarreve.","fig. (përdoret me një trajtë të shkurtër të përemrit vetor në r. dhanore). Ndihmoj dikë në rrethana të vështira, i ndodhem pranë dikujt për çdo gjë dhe i bëhem krah. Iu gjend vëlla. Iu gjend nënë e baba. Iu gjend te koka. Iu gjend në çaste të vështira. I është gjendur ditën dhe natën.","kryes. veta III. Del a shfaqet papritur si për ta ngatërruar a vështirësuar më tepër diçka. — Ku u gjend edhe ai?","vet. veta III. (përdoret me një trajtë të shkurtër të përemrit vetor në r. dhanore). Kam me vete rastësisht diçka, më ndodhet. S’iu gjendën para me vete. I priti me ç`i gjendej. Mos ju gjendet një laps?","vet. veta III. Quhet, pranohet, shihet. U gjend e drejtë (e arsyeshme). U gjend me vend.","vet. veta III. Ndodhet, është, ka; haset, ndeshet; ndodhet në sasi të caktuar, është pjesë përbërëse e diçkaje. Gjendet në gjak (në tru, në palcë). Gjendet rrallë (shpesh). Gjendet në ujë. Gjendet në popull. Gjendet me shumicë në treg.","GJETA (u) GJETUR. Pës. e GJEJ. U gjet libri. U gjet rruga (mënyra, mjeti, zgjidhja). U gjet shkaku (arsyeja). Iu gjet ilaçi. * S'i gjendet ana diçkaje shih tek AN/Ë,~A I. S'iu gjend (s'iu duk) binaja shih te BINA,~JA. Sa për t'u gjendur në fjalë (në muhabet) sa për të thënë diçka, duke folur për gjëra të parëndësishme ose që nuk kanë të
