<script>window.__INITIAL_DATA__ = [{"slug":"rreembej","term":"RRËMBEJ","attributes":["kal."],"definitions":["Marr me dhunë diçka a dikë dhe e çoj tutje, e grabit; ia heq nga duart me forcë a kundër dëshirës, ia marr me forcë. U rrëmbenin bagëtinë. U rrëmbenin tokën (prodhimet). Ua rrëmbyem armët pushtuesve. Dikur i rrëmbenin nuset. Në vendet kapitaliste i rrëmbejnë njerëzit (fëmijët) në mes të ditës. Ia rrëmbeu nga duart. Skifteri rrëmbeu një pulë. Rrëmbeu ç`mundi. Kush e kush të rrëmbente më shumë.","fig. I heq dikujt një të drejtë etj. duke përdorur dhunën; shtie në dorë me forcë, përvetësoj. I rrëmbyen lirinë (pavarësinë). I rrëmbeu të drejtat. I rrëmbyen fitoret. I rrëmbeu rastin. Rrëmbyen pushtetin.","vet. veta III. Merr me vete me forcë a me vrull dhe e çon tutje; e përfshin, e përlan. I rrëmbeu deti (vala, lumi). E rrëmbeu era (furtuna). E rrëmbyen flakët.","vet. veta III fig. I merr jetën, e merr, e përlan. E rrëmbeu sëmundja. E rrëmbeu vdekja. E rrëmbeu brenda pak ditësh (pa mëshirë).","Kap diçka me vrull e shpejt, e marr shpejt dhe e shtrëngoj fort për të kryer një veprim; rrok. Rrëmbej pushkën (shpatën). Rrëmbej kazmën (lopatën, sëpatën, kërrabën). Rrëmbej penën (për të shkruar). Rrëmbej shkopin (mashën). Rrëmbej shishen (gotën). E rrëmbeu për këmbësh (nga krahët). E rrëmbeu në krahë (në gjoks).","fig. E bëj për vete dikë, i fitoj zemrën dikujt. I rrëmbeu zemrën. Ua rrëmbeu mendjen të gjithëve. I rrëmbeu me sjelljen e tij (me zërin e tij).","vet. veta III fig. Më pushton diçka me forcë, më tërheq tërësisht, më bën t'i kushtohem me gjithë shpirt; më thith. E rrëmbeu kënga (muzika). Më rrëmbeu libri (filmi). E rrëmbeu puna (lufta, vrulli, hovi i rinisë). E rrëmbeu vala e përgjithshme. Më rrëmbeu gjumi. Bukuri që të rrëmben. Fjalët e tij të rrëmbejnë.","fig. Nxjerr me mund e me djersë, ia marr me punë të madhe. E rrëmbejnë bukën nga shkëmbi. I rrëmbejnë tokës mineralin.","edhe jokal. fig. bised. Kuptoj shpejt, e kap menjëherë mendimin e një tjetri. Rrëmben shpejt ai djalë. Ta rrëmben (ta merr) fjalën nga goja e kap menjëherë mendimin, është shumë i zgjuar e i mprehtë.","vet. veta. III fig. bised. Kap rrëshqitazi, rrok kalimthi e vetëm pjesërisht, zë. Ma rrëmbeu veshi. Ma rrëmbeu syri.","vet. veta III. E përcëllon, e përskuq a e djeg pak (diçka që piqet në zjarr). E rrëmbeu saçi (flaka, zjarri, furra) bukën (mishin, tavën).","jokal. vet. veta III bised. Kapërcen pak nga madhësia, nga mosha etj., është pak më tepër. Rrëmben nga i ati dy gisht. Po rrëmbente nga të gjashtëdhjetat.","vet. veta III jokal. Peshon, rëndon nga njëra anë, anon. Kandari rrëmben pak këtej.","jokal. Prirem nga një anë, marr anën e dikujt, anoj. Ai rrëmben pak nga vetja. * Rrëmbej (rrok) armët (pushkët) ngrihem në luftë, ia filloj luftës; ngjesh armët. Ia rrëmbeu fjalën dikujt e ndërpreu, nuk e la të fliste më tej. I rrëmbej kohën dikujt e bëj të humbasë kohën kot për shkakun tim, e mbaj me fjalë të kota, nuk e lë të punojë, i ha kohën. Është për t'i rrëmbyer (për t'i prerë) kokën është shumë e bukur, e mirë sa s'bëhet (zakonisht për vajzat). E rrëmbeu (e vodhi) me sy dikë shih te SY,~RI. Ta rrëmben (ta merr) fjalën nga goja shih te MARR. I rrëmbeu (i mori) kafshatën nga goja dikujt shih te KAFSHAT/Ë,~A. Po i dhe (po i zgjate) gishtin, të rrëmben (të merr) dorën shih te GISHT,~I. Të jep një thelë e të rrëmben (të merr) një pelë keq. shih te THEL/Ë,~A. Po i hape derën, të rrëmben shtëpinë shih te DER/Ë,~A. Kujto (zër në gojë) qenin, rrëmbe (bëj gati) shkopin fj. u. shih te QEN,~I."]}]</script>
