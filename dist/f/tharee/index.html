<script>window.__INITIAL_DATA__ = [{"slug":"tharee","term":"THARË","attributes":["mb."],"definitions":["Që i është hequr uji ose lagështia që ka pasur brenda a në sipërfaqe, që i është avulluar a i ka ikur lagështia. Rroba të thara. Çorapet e thara. Dru të thara. Bojë e tharë. Me flokë të thara.","Që i është hequr uji, që ka kulluar; që ka shteruar (për një burim etj.). Toka të thara. Kanal i tharë. Lumë (përrua) i tharë. Kënetat e thara.","Që i ka ikur njomështia e lëngu, që nuk është më i njomë e me lëng (për pemë, për barishtore, për perime, për ushqime etj.); i pjekur shumë; që nuk është më i butë, i përtharë. Fiq të tharë. Domate të thara. Duhan i tharë. Sherbelë e tharë. Lëkura portokajsh të thara. Bukë e tharë. Petë të thara. Është e tharë. Peshk (mish) i tharë. Është shumë i tharë.","Që nuk ka asnjë pikë qumësht, që nuk milet; që është vërë shterpë. Me gjinj të tharë. Lopë e tharë.","Që s’ka jetë, që nuk ushqehet me gjak nuk punon (për pjesët e trupit); i prishur, që nuk jeton më, që nuk prodhon më (për bimët, për pemët e për pjesët e tyre). Me këmbë të thara. Degë (gjethe, pemë ) të thara. E ka të tharë dorën (krahun, këmbën).","Shumë i dobët, i tretur i holluar, që është bërë kockë e lëkurë, i thatë. I tharë në fytyrë.","fig. Që është si pa jetë, që mezi punon a mezi vihet në lëvizje, shumë i ngathët (në disa njësi frazeologjike). I ka duart të thara. përb. a) është dembel, nuk zë gjë me dorë; i bien sendet nga dora; b) nuk i del dot zot vetes, nuk di të mbrojë veten (kur e ngacmojnë, kur e rrahin etj.). i ka këmbët të thara mezi ecën, mezi i hedh këmbët, është shumë i ngathët në ecje, mezi lëviz nga vendi; s’i bëjnë këmbët të ecë. I ka krahët të tharë është i ngathët; s’i bëjnë krahët të punojë; është dembel, nuk zë gjë me dorë, s’punon fare.","bised., keq. Përd. em. f. sipas kuptimit 5 të mbiemrit. Luaji të tharat! Luaji duart (këmbët), që i ke si të thara!"]}]</script>
