<script>window.__INITIAL_DATA__ = [{"slug":"marr","term":"MARR","attributes":["kal."],"definitions":["E kap diçka a dikë me dorë a me një send tjetër dhe e heq nga vendi i vet; e rrok me duar a me diçka tjetër dhe e mbaj. Mori bukën (kazmën, librin, penën, rrobat). Mori gotën e çajit (e rakisë, e qumështit). Marr topin. Merrni nga një mollë! E mori me duar (me mashë, me lugë, me pirun). E mori me dhëmbë. E mori për krahu (për flokësh, për veshi). Ia mori me forcë.","E shpie diçka a dikë në një vend tjetër duke e mbartur a mbajtur vetë ose me një mjet, e çoj diku; sjell me vete; mbaj me vete. E mori thesin (dengun në krah. E mori në shpinë (në duar, në krahë, në qafë). E mori hopa. E mori për dore (zvarrë). I mori fëmijët me vete. Nuk e kishte marrë letërnjoftimin (me vete). E mori lumi (era).","Më bie në dorë një send që ma dërgon dikush ose diçka që më takon për punën a për veprat që kam kryer etj.; fitoj; më vjen diçka që është për mua; fig. e dëgjoj a e mësoj diçka, më bëhet e njohur diçka. Mori një letër (një telegram, një lajmthirrje). Mori pakon. Mori një njoftim (një lajm). Mori emërimin. Mori urdhra (udhëzime) të reja. Mori një porosi të veçantë. Mori urimet. Marr rrogën (pagën mujore). Mori shpërblim. Sa merr në muaj (në ditë)? Morën flamurin. Morën diplomat (fletëlavdërimet, medaljet). Mori titullin «docent». Marr lejen e zakonshme.","bised. Blej; porosit diçka për të ngrënë a për të pirë në kafe, në restorant etj. Mori ushqimet (bukën, qumështin, një palë këpucë, një kostum, një biçikletë). Mori biletën. I morëm në dyqan (në pazar, në qytet, në fshat). E mori për nënën (për gruan, për fëmijët, për vete). Mori një kafe (një raki, një birrë, një kos). E mori lirë (shtrenjtë). Sa (ku) e more?","Nxjerr një prodhim duke përpunuar ose duke shfrytëzuar diçka, siguroj një sasi të caktuar prodhimi; nxjerr fitime, të ardhura etj. nga diçka. Mori pesëdhjetë kuintalë për hektar. Morën prodhime të bollshme. Nga delja marrim leshin, qumështin, mishin. Marrim qymyrgurin (naftën, mineralet) nga toka. Marrin të ardhura të mëdha.","Kërkoj një shumë a shpërblim të caktuar për diçka; zgjedh diçka nga një tërësi, nga një grumbull gjërash etj., heq, veçoj a nxjerr një pjesë nga diçka për qëllime të caktuara. Merrnin taksa. Merrnin të dhjetat. Sa merrnin për të qepur një kostum? Merrnin shtrenjtë. Marr për prova (kafshë, bimë, minerale). I marr gjak (për analiza).","vet. veta III. Kërkon (një sasi të caktuar lënde, sendesh, kohe etj.). Stërvitja i merr shumë kohë. Ndërtesa mori shumë tulla (çimento, gëlqere). Dyert (dritaret) morën shumë bojë.","edhe fig. Pajisem me diçka, gjej a siguroj diçka për vete; e shtie në dorë a e bëj timen diçka për ta pasur përgjithnjë ose për ta përdorur përkohësisht; përvetësoj. Mori shtëpi (dy dhoma e një kuzhinë). Morën traktorë të rinj. Kanë marrë ujë të pijshëm (energji elektrike). Mori një taksi. Marr për një vit (për një muaj, për një natë). E mori me qira. E mori falas. Kanë marrë dije (njohuri) të thella. Mori një mijë lekë hua (borxh). I mori një libër. Ka marrë huqet e t`et. Kanë marrë mënyrën e huaj të jetesës (modën e huaj).","Shtie në dorë diçka, me luftë a me përpjekje, pushtoj një vend; arrij të siguroj, të fitoj, të kaloj a të kapërcej diçka, ia dal në krye diçkaje. Morën qytetin (kështjellën). Morën pushtetin (fuqinë). I mori provimet. E mori klasën. Mori diplomën (patentën). Mori kategorinë e dytë. E morën me sulm (me dredhi). E mori me vështirësi (me punë).","Ia rrëmbej dikujt diçka a dikë; ia fitoj dikujt në lojë; i heq dikujt të drejtën a mundësinë për të përdorur ose për të shfrytëzuar diçka. I morën paratë (pasurinë, tokën, pronat, çifligjet). U merrnin fshatarëve drithin (bukën, kafshatën e gojës). I morën patentën (diplomën). I mori dy pikë (një lojë). sport. I mori tre ushtar ë(kalin, mbretëreshën). shah. I morën fëmijët peng.","bised. Fejohem a martohem me dikë. E mori nuse. E mori për burrë (për grua). Morën njëri-tjetrin. E mori me dashuri. E merrnin me mblesëri (burrin, gruan). Nuk e mori vetë, ia dhanë. Lum ai që e merr atë vajzë!","bised. E tërheq dikë nga një vend a nga një grup njerëzish dhe e çoj diku; e arrestoj. E mori mënjanë (më tutje). E morën natën. E morën fshehurazi (me forcë).","bised. Heq, fshij, pastroj. Marr pluhurat. Marr me fshesë (me leckë).","Pres a shkurtoj (për flokët); ha, zvogëloj, ngushtoj (një rrobë). Marr flokët (anët). I mori lart (poshtë). E mori pak te mënga (te supi, te beli).","E pranoj a e emëroj dikë në një punë, e caktoj me një detyrë; e pranoj dikë në gjirin e familjes a të një grupi njerëzish ose e lejoj të marrë pjesë diku; e thërres dikë të kryejë një shërbim të detyrueshëm; i ngarkoj vetes një detyrë; pranoj të bëj diçka, i dal zot një pune; i përvishem një pune a një detyre në një mënyrë të caktuar. Morën një punëtor (një murator, një mësues). E morën në punë. E morën në çetë (në brigadë). E mori në shtëpi. E morën në fshat. E morën si ndihmës (si brigadier). E morën si ekspert (si arbitër). E morën në arsim (në teatër, në skuadër). E morën ushtar. E morën për ta edukuar (për ta mësuar, për ta stërvitur). Marr një temë studimi. Mori shërbimin. E morën për botim. Morën zotime të reja. E mori me qejf (me dëshirë, me guxim, me frikë, me shaka) punën (detyrën) që i ngarkuan. E mori shtruar (rrëmbyer, me rrëmbim). E mori në provim (në pyetje).","Më ngjitet a më zë një sëmundje. Ka marrë të ftohur. Mori zgjeben.","vet. veta III. Nxë, përmban (një masë të caktuar, një vëllim, një sasi etj.). Merr dy litra (pesë kilogramë). Merr dy shtretër (dhoma). Merr dyqind veta (salla). Merr shumë (makina, ena, thesi). Sa merr?","vet. veta III bised. E përmbledh, e përfshin, e zë (një ndarje administrative, një ligj, një detyrim etj.); përmbahet brenda në diçka, e parashikon a e ka diçka (ligji, gazeta etj.). E merr rrethi i Tropojës. E merr plani i qytetit. Ç`merr nga Korça në Bilisht. E merr edhe ligji. E ka marrë gazeta.","bised. E sjell dikë a diçka për shqyrtim, si shembull etj., përqendroj a tërheq vëmendjen e të tjerëve te diçka; flas për diçka, e trajtoj, e parashtroj. Le të marrim çështjen e... (problemin e...). Marrim një pikë (një drejtëz, një rrafsh). Marrim kohën e luftës... Marrim për shembull fshatarët... (punonjësit...). E marr në shqyrtim e shqyrtoj.","Sillem a veproj me dikë ose me diçka në një mënyrë të caktuar. E mori me të mirë (me të egër, me të keq, me lajka). E morën me të fishkëllyera (me dru, me domate).","E quaj, e vlerësoj; e mbaj; më duket se është i tillë ose i atillë, e kujtoj, më duket; e kuptoj, e gjykoj në një mënyrë të caktuar. E merrnin për të zgjuar (për budalla, për të vdekur, për të huaj). E mori për të vëllanë (për mjek, për njeri të mirë). E marr si shembull. E mori pazinë për spinaq. Sido (ngado) që ta marrësh. Merre si të duash.","edhe fig. Pësoj një goditje, më zë diçka, ha; më qëllojnë a më gjuajnë me diçka. Mori një grusht (një shuplakë, një shkelm). Mori një plumb. Mori një dru të mirë e rrahën mirë. Mori përgjigjen e duhur.","vet. veta III fig. E zë, e kap diçka; arrin ta kapë, mund ta kapë e të veprojë mbi të, e ha. E mori plumbi në ballë (në kokë, në shpatull, në ijë, në gjoks, në zemër). E mori shkarazi (mirë, drejtpërdrejt). E mori uria (etja). E mori të qeshurit (gazi, vaji, frika). Është tepër larg, nuk e merr pushka (plumbi). Nuk e merr era (dielli). I merr mirë qimet brisku.","edhe jokal., edhe fig. bised. Shkoj, lëviz në një drejtim, ia mbaj nga...; ndjek një rrugë; shkoj drejt një gjendjeje (edhe në një varg njësish frazeologjike). Mori arave (bregut, pyllit, maleve). Mori malet doli në mal. Mori kthesën. Flaka mori qiellin flaka u ngrit deri në qiell. Mori nga e djathta (nga e majta, nga jugu). Mori përpjet ë(lart, poshtë, tatëpjetë, anës). Mori për keq (për mirë). Mori shtrembër (gozhda, vidha). Mori për në fshat (për në qytet, për në veri). Mori anës lumit (anës bregut). Po merr udhë të mbarë (të shtrembër). Ka marrë të tatëpjetën. Moti po merr për mbarë. Ç'fill do të marrë?","bised. Hipi në një mjet udhëtimi për të shkuar diku. Mori trenin e pasdites (e orës 10). Mori autobusin e unazës.","Nis diçka; filloj; vet. veta III nis. Mori hov (vrull, shpejtësi). Mori valë filloi të valojë. Mori vrapin. Merr zhvillim nis të zhvillohet. Merr cifël nis të prishet, merr të krisur. Merr të krisur nis të kriset. Merr të skuqur (të nxirë) nis të skuqet (të nxihet). Merr zgjerim nis të zgjerohet.","Filloj të këndoj a të hedh valle ose të luaj një pjesë muzikore (me një vegël). Mori një këngë (një valle). Ia morën këngës shtruar (bashkë). Ia morën labçe. Ia merrte me të qarë. E merrte me fyell. Njëri ia merr, tjetri ia kthen (ia pret).","jokal., vet. veta III. Fillon të ndizet a të digjet, ndizet flakë; shkrep (arma). S'marrin (mezi marrin) drutë. S`mori zjarri. Mori eshka. Morën mullarët. S`mori pushka. Mori baruti. Mori menjëherë. Merr shpejt (ngadalë).","fig. Shkëput nga dikush një gjë që më hyn në punë ose që është në dobinë time, i kërkoj dikujt një mendim, një këshillë etj. me qëllim që të përfitoj. Marr mendimin e masave. Marr pëlqimin. Marr përvojën (mjeshtërinë)e dikujt. Marr këshilla nga dikush këshillohem me dikë. I marr fjalën dikujt e bëj të më japë fjalën, të zotohet. Ia mori zemrën ia fitoi zemrën, e bëri për vete. Mori një mësim të mirë përfitoi shumë, vuri mend.","vet. veta III fig. Fillon të ketë një vlerë, rëndësi a kuptim të caktuar, fiton. Merr rëndësi (vlerë). Merr domethënie të madhe. Merr një kuptim të ri. Merr një trajtë (një ngjyrë) tjetër. Mori përpjesëtime të mëdha. 31. jokal., vet. veta III (zakonisht me një emër të mashkullit të një kafshe). Ndërzehet; mbarset. Mori dash delja. Mori dem lopa. Mori derr dosa. S`mori lopa sivjet. 32. vet. veta III. E bën që të mos lëvizë a të mos punojë më, e paralizon (për pjesë ose organe të trupit). Sëmundja i mori gojën (sytë, këmbën, duart). 33. Përdoret zakonisht me emra veprimi për të formuar togfjalësha me vlerë foljesh, të cilat lidhen si nga kuptimi ashtu edhe nga ana fjalëformuese me emrat përkatës (edhe në një varg njësish frazeologjike). Merr ajër ajroset. Mori arratinë u arratis. Merr fotografi fotografoj. Merr fund përfundon, mbaron. Merr gjallëri (fuqi, forcë) gjallërohet (fuqizohet, forcohet). Marr guximin guxoj. Marr hak hakmerrem. Marr lidhje me dikë lidhem. Merr masa. Merr ngjyrë ngjyroset. Marr shënim shënoj. Marr vendim vendos. Merr zgjidhje zgjidhet. Marr për bazë bazohem. Marr në dorëzim më dorëzohet. Marr nën mbrojtje mbroj. Marr nën kujdes kujdesem. Marr për qafe (për gryke) e përqafoj. Mori bark. Merr anë anon nga njëra anë. Mori erë u qelb. Mori zjarr u ndez. Mori frikë (tmerr) u frikësua (u tmerrua). Marr inat (mëri) inatosem. 34. Përdoret si folje gjysmëndihmëse, me kuptimet «filloj, nis, zë; përpiqem, matem». Marr të dal (të hyj, të flas, të ngrihem, të shkoj, ta kap). * Jap e marr përpiqem të gjej rrugëdalje, bëj çmos për të zgjidhur diçka, për të kryer një punë etj. Japin e marrin a) kanë marrëdhënie të mira midis tyre, hyjnë e dalin; b) bëjnë tregti midis tyre. As jep, as merr nuk bën asnjë lëvizje, nuk lëviz, nuk shkon më tutje; ngec. As japin, as marrin (edhe poh.). etnogr. nuk bëjnë krushqi midis tyre. S'merr amë nga diçka shih tek AM/Ë,~ A II. Marr anë shih tek AN/Ë, ~A I. Më merr ana shih tek AN/Ë, ~A I. Ia ka marrë anën (krahun, dorën) një pune ka fituar njohuritë e shprehitë e nevojshme për të bërë diçka, është bërë i aftë për diçka pasi e ka ushtruar ca kohë, ia ka marrë dorën. I marr (i ha) arrat dikujt shih tek ARR/Ë, ~A. E mori arratia shih tek ARRATI,~A. S'merr ashkë shih tek ASHK/Ë,~A. Ka marrë nga i ati (nga e ëma) ka disa tipare, veti, vese etj. nga i ati (nga e ëma), i ngjan t'et (s'ëmës). Marr avull shih tek AVULL, ~I. Ia marr avullin dikujt a diçkaje shih tek AVULL,~I. Ia mori avullin dikujt shih tek AVULL, ~I. Të merr barkun të prek thellë, të pikëllon në zemër, të mallëngjen. I mori bashkën dikujt shih te BASHK/Ë,~A. E mori në bisht shih te BISHT,~I. Si të marrë bora shih te BOR/Ë,~A. Mori botën (dynjanë) u përhap kudo, u përhap anembanë. Mori fjala dheun (dynjanë) u përhap një lajm në të katër anët, e morën vesh të gjithë, e mori vesh gjithë bota. Mori brinjën (fushat) iku nga mundi, mori malet; iku nga e shpinin këmbët. E merr me bu shih te BU. E mori me cep shih te CEP,~I I. E ka marrë për cep dikë shih te CEP,~I I. Merr dallgë shpërthen me vrull, nuk përmbahet dot më. Morën dërrmën u shpërndanë nga të katër anët pa ditur se ku vinin, u çoroditën. Merr dita zgjatet dita, bëhet më e gjatë. I marr dorën dikujt a) e pyes dikë a i marr lejë për diçka; b) e përshëndes dikë me mirënjohje, e përshëndes duke i puthur dorën. Ia mori nga duart dikujt shih te DOR/Ë,~A. Marr drejtqëndrimin a) usht. rri «gatitu» përpara një eprori; b) bindem, i nënshtrohem dikujt. E mori (e hëngri) dreqi (djalli) thjeshtligj. shih te DREQ,~I. Mori erë diçka shih tek ER/Ë, ~A II. E merr era dikë shih tek ER/Ë,~A I. E mori era diçka shih tek ER/Ë,~A I. I marr erë lules (gjellës) e nuhat me hundë. S'merr erë nga diçka edhe poh. shih tek ER/Ë,~A II. Ia ka marrë erën dikujt a diçkaje shih tek ER/Ë, ~A II. Mori faqe shih te FAQ/E,~JA. Merr fije diçka shih te FIJ/E,~A. Marr në fill shih te FILL, ~I. Ka marrë fitilin shih te FITIL, ~I. Mori fjalën filloi të flasë, u ngrit të flasë. Merr flakë (shpejt) dikush shih te FLAK/Ë, ~A. Merr flakë (zjarr) diçka shih te FLAK/Ë, ~A. Marr frym ë a) thith ajër, thith frymë; b) jetoj, rroj. Nuk merr më frymë ka vdekur. I mori frymën dikujt e mundoi shumë, i mori shpirtin. Mezi merr frymë shih te FRYM/Ë, ~A. Sa të marrësh frymë shumë shpejt, menjëherë. Ia mori fytyrën shih te FYTYR/Ë,~A","Merr fytyrë diçka merr një trajtë të caktuar, fiton tipare të caktuara; konkretizohet. Mori gardhin diçka shih te GARDH, ~I. E merr (e mban, e heq) nëpër gojë dikë a diçka shih te GOJ/Ë,~A. Marrin nëpër gojë të tjerët flasin keq prapa krahëve për të tjerët, i përgojojnë; merren me thashetheme. Marr (zë) në gushë dikë shih te GUSH/Ë,~A. I marr gjurmën dikujt a diçkaje shih te GJURMË, ~A. E marr në gjurmë dikë shih te GJURM/Ë, ~A. Mori hamull shih te HAMULL, ~I. Më marrtë hijen! mallk. shih te HIJ/E,~A. Merr hundë për diçka shih te HUND/Ë, ~A. Mori huq shih te HUQ, ~I. I mori jetën e vrau. E mori (e kapi, e zuri) kalemi dikë shih te KALEM, ~I. E mori karravesh (fjalën) shih te KARRAVESH, ~I. Më marrsh të keqen (të ligat)! mallk. përdoret kundër dikujt që mundohet më kot të na bëjë ndonjë të keqe ose që nuk e duam, me kuptimin «shko, thyej qafën, se s'ta kemi as nevojën, as frikën!». Të marrsha të keqen (të ligën, të ligat)! përdoret për t'iu lutur dikujt për diçka ose në shenjë përkëdheljeje, sidomos ndaj fëmijëve. Na (e) mori të keqen (të ligën) mospërf. vdiq, mbaroi, e pësoi keq; s'pati ç'të na binte (për dikë që nuk e duam). Mori këmbë diçka shih te KËMB/Ë,~A. Mori këmbë (fjala) shih te KËMB/Ë,~A. I mori këmbën dikujt shkoi a veproi në vend të një tjetri, zëvendësoi dikë tjetër, shkoi në këmbë të një tjetri. Mori këmbët shih te KËMB/Ë, ~A. E merr nëpër këmbë dikë a diçka shih te KËMB/Ë, ~A. I mori kokën i preu kokën, e vrau. Sa t'i marrësh (t’i këputësh) kokën (kryet) shih te KOK/Ë, ~A. Merr kot a) zemërohet pa ndonjë shkak të rëndësishëm; b) i duket nganjëherë vetja sikur është njeri me rëndësi, ngrefoset kot. Mori (mbajti) krahun e dikujt shih te KRAH, ~U. Mori krahë (fletë) shih te KRAH, ~U. I morën krahët (kundërshtarit) a) i dolën prapa krahëve; b) e mundën jo haptas e drejtpërdrejt po me dredhi. Kanë marrë krye kanë filluar të mos binden a të veprojnë sipas kokës së vet; janë ndërkryer, janë tërbuar. E mori lumi (deti) shih te LUM/Ë,~I. Ka marr llasë (llastim) është llastuar, është përkëdhelur tepër. Mori malet u çmend. Më merr (më zë, më kap) malli për dikë a për diçka shih te MALL,~I I 1. Nuk më merr malli për dikë mospërf. shih te MALL, ~I I. Merre ta marrim thuhet për dikë që bën një punë a vepron si t'i vijë, si të mundë. Merr mend dikush shih te MEND, ~TË. Na mori mendsh shih te MEND,~TË. Ia mori mendtë (mendjen) dikujt shih te MEND, ~TË. E marr me mend shih te MEND vende, ku nuk shkoi; b) iku nga sytë këmbët; mori arratinë. Mori të keqen (të ligën) në sy shih te SY,~RI. E ka marrë vdekjen ndër sy shih te SY, ~RI. Merr shatë toka mund të prashitet, të punohet lehtë. E ka marrë (në) shenjë dikë a diçka shih te SHENJ/Ë,~A. Mori sheshin doli haptas, e shohin të gjithë, doli sheshit. Marr (mbaj) shënim për diçka marr njoftim për diçka dhe i kushtoj kujdes e vëmendje, e kam parasysh diçka për ta ndjekur e për ta zgjidhur. Marr mbi shpatulla (mbi supe, mbi vete) diçka shih te SHPATULL,~A. Mori shpirt u gjallërua. I mori (i nxori, i qiti) shpirtin dikujt shih te SHPIRT,~I. Nuk e ka marrë (s'e ka) me tapi shih te TAPI,~A. Mori tatëpjetën (teposhtën) shih te TATËPJET/Ë,~A. Të marrin me teneqe shih te TENEQE,~JA. Mori tesqerenë mospërf. shih te TESQERE,~JA. Mori trastën shih te TRAST/Ë,~A. Merr (zë) në thua shih te THUA, THOI. Marr vesh a) diçka dëgjoj, marr njoftim për diçka; b) nga diçka e njoh një punë, një çështje a një fushë të dijes, e kuptoj, e di. S'merr vesh dikush nuk bindet, nuk i mbushet mendja, nuk dëgjon. E mori veten a) u bë më mirë, u përmirësua mjaft nga shëndeti; b) u përmirësua nga gjendja ekonomike, u mëkëmb. I mori ymrin dikujt shih tek YM/ËR,~RI. Mori zemër mori guxim, u trimërua. Mori të zezën u shkatërrua krejt, mori të tatëpjetën e ra në mjerim. Mori zjarr (hëna, horizonti) u bë flakë i kuq, u skuq. Mori zjarr (puna etj.) mori vrull të madh, u ndez me vrull. E merr (e tërheq) zvarrë diçka shih te ZVARRË. S'e lë të marrë frymë dikë shih te FRYM/Ë,~A. S`ka nge të marrë frymë shih te FRYM/Ë,~A. Ka marrë detin me sy dikush shih te SY,~RI. Marrsh nga ditët e mia! ur. shih te DIT/Ë, ~A","Mori dritë filmi u zbardh, u prish nga drita. I ka marrë erë barutit shih te BARUT,~I. Ia kishte marrë era çatinë shih tek ER/Ë,~A I. Fjalët i merr era fj. u. shih tek ER/Ë,~A I. Merr (nxirr) fare, hidh (qit) fare shih te FAR/Ë,~A. E mori ferra uratën shih te FERR/Ë,~A. Ta merr (ta rrëmben) fjalën nga goja është shumë i zgjuar e i mprehtë. I ka marrë flokët të birit etnogr. është bërë nun, është kumbarë. E mori frerin nëpër këmbë shih te FRE,~RI. Marr frymë lirisht shih te FRYM/Ë, ~A. I mori fytyra zjarr shih te FYTYR/Ë,~A. Të merr gjak në vetull shih te GJAK, ~U I. Merr hekurat zvarrë shih te HEKUR, ~I. I mori horë (flakë) shpirti shih te SHPIRT, ~I. I mori (i rrëmben) kafshatën nga goja dikujt shih te KAFSHAT/Ë,~A. E mori kalanë nga brenda shih te BRENDA. Të merr (të nxjerr) këpucët (opingat) nga këmbët shih te KËMB/Ë, ~A. E jep me dorë e merr me këmbë shih te DOR/Ë, ~A. I mori këmbët mbi supe (në krahë) ia mbathi vrapit, iku me të katra, s'pa nga iku. I ka marrë koka (kryet, mendja) erë shih te KOK/Ë, ~A. I merr krundet për miell shih te MIELL,~I. Ka marrë lëng nën bisht dikush shih te LËNG,~U. Nuk i merr (nuk i ngre, nuk i zë) lopata (shata) ujë edhe poh. shih te LOPAT/Ë, ~A. Ta merr lopën me gjithë viç shih te VIÇ,~I. Ia mori lumi të keqen shih te LUM/Ë, ~I. Ia merr macja bukën nga dora (ia ha macja bukën në dorë) dikujt mospërf. shih te MAC/E,~JA. Mori malin me sy dikush shih te SY,~RI. I mori mbrapsht (prapa) fjalët shih te MBRAPSHT. Ia ka marrë mendtë era dikujt shih tek ER/Ë,~A I. Të më marrësh opingat! thjeshtligj. shih tek OPING/Ë,~A. E mori ora e ligë shih tek OR/Ë, ~A II. Marr pe e gjilpërë shih te PE,~RI. Ka marrë pisha nga të dy anët (nga të dy krerët) shih te PISH/Ë,~A. Ia merr pula bukën nga dora mospërf. shih te BUK/Ë, ~A. E morën punën me valë shih te VALË, ~A. Mori rrethin e daulles iron. shih te RRETH, ~I. Mori sokakun përpjetë shih te SOKAK, ~U. Mori (bëri) një sy gjumë shih te GJUM/Ë, ~I. S'e ka marrë shpirtin me qira shih te QIRA, ~JA. Mori udhën e ujqve shih tek UJK,~U I. Merr (mbush, mban) ujë me shoshë (me shportë) shih te SHOSH/Ë, ~A. Merr nga torba e hedh në thes shih te THES, ~I. Mori valë puna (biseda) shih te VAL/Ë, ~A. Nuk i merr vesh koka shih te VESH, ~I. Nuk e merr vesh (nuk e njeh) i pari të dytin shih te PAR/Ë, ~I (i)."]}]</script>
