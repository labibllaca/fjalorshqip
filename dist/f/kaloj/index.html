<script>window.__INITIAL_DATA__ = [{"slug":"kaloj","term":"KALOJ","attributes":["jokal."],"definitions":["Shkoj më këmbë a me një mjet udhëtimi nga një vend në një vend tjetër, eci, vete diku; lëviz në një drejtim të caktuar; shkoj nëpër diçka ose pranë diçkaje. Kalojmë këmbë (me biçikletë, me kalë). Kaloj në rrugë. Kaloj përmes njerëzve. Kalojnë nëpër qytet. Kaluan nëpër disa fshatra. Kaloj në dhomën tjetër. Kaluam nga shtëpia e tij. Kaluan njëri pas tjetrit (një nga një). Kaloi majtas (djathtas). Kalojnë krah për krah. Kaluan përpara. Kaloi si furtunë (si era) kaloi me shpejtësi të madhe. I kaloi pranë. I kaloi nën hundë i kaloi fare afër. E pashë duke kaluar. Lëre të kalojë! Nuk e lejoi të kalonte. Nuk kalon dot aty. Kudo që kaluam...","vet. veta III. Lëviz duke përshkuar një hapësirë, një vend etj., bën rrugën (për mjetet e udhëtimit, për predhën etj.); shtrihet në një vend (për udhën etj.); rrjedh nëpër një hapësirë a prej diku (për lumin, gjakun etj.). Treni kalon në tunel (mbi urë) i kalonin lotët çurkë. I kaloi plumbi nëpër mushkëri.","vet. veta. III. Shkon, ikën, rrjedh (për kohën). Kalon koha. Kalojnë vitet (muajt, ditët). I kaloi shpejt jeta. Kanë kaluar dhjetë vjet. Vitin (javën) që kaloi.","kal. E bëj diçka që të lëvizë a të shkojë diku ose që të përshkojë një gjë. Kaloj dorën mbi flokë. Kaloj perin në gjilpërë. Kaloj një kafshatë (një aspirinë) e kapërdij, e kapërcej, e përcjell.","kol. Përshkoj një hapësirë, një vend etj.; kapërcej një pengesë natyrore a një cak, një shifër, një moshë etj.; lë prapa; tejkaloj. E kaluam stacionin. Kaluan një hendek (murin, lumin). Kaloi kufirin. E kaloi lartësinë 5 m. E kalon shifrën","I kaloi t ëdyzetat. E kaloi moshën. E kaloi kamionin. E kaloi me vrap. Kalon normën çdo ditë.","kal. fig. Kapërcej, lë prapa; e tejkaloj; e teproj. I kaloi parashikimet. Ia kalon në mësime (në aftësi). I kalon forcat e mia. E kaloi kufirin (masën).","kal. E përcjell diçka në një vend a te dikush tjetër, ia përcjell dikujt a një zyre, një organi etj. për ta vlerësuar, për ta gjykuar, për ta miratuar etj. Ia kaloi (shkresën) për shqyrtim (për miratim, për nënshkrim). Materialet ia kaluan drejtorisë përkatëse (këshillit shkencor, komitetit ekzekutiv). Ia kaloi topin portierit. sport.","zakon. veta III. Përcillet nga një dorë në një tjetër, nga një brez në brezin tjetër; transmetohet; përhapet. Kaloi dorë më dorë. Lajmi kaloi gojë më gojë. Kalon nga njëri brez në tjetrin. Pushteti kaloi në duart e klasës punëtore.","edhe kal. Paraqitem vetë diku ose çoj një tjetër për kontrollim mjekësor, doganor etj. Kaloj në vizitë mjekësore. E kaloi mallin nga dogana. Kaloi në kontroll.","edhe kal. Ndërroj gjendje a vend, shkoj vetë ose çoj dikë në një punë a detyrë tjetër; bie a ngrihem vetë ose ul a ngre dikë në një shkallë tjetër; shkoj nga një gjendje në një gjendje të re. Kaloi (e kaluan) në prodhim. Kaloj në sulm (në mbrojtje). Kaloi në shërbim (në vartësi) të... Kaloi (e kaloi) në vend të parë. Kalon në plan të dytë. Kaloi (e kaluan) në kategorinë e dytë (e parë). Kaloi në klasën e pestë. Kalojmë nga fitorja në fitore.","vet. veta III. Mbaron së qeni, nuk është më; i afrohet fundi ose përfundon; zgjat pak; ikën, humbet. Kaluan pushimet. I kaloi koha u vjetrua. I kaluan dhembjet. I kaloi zemërimi. I kaloi verdhëza. Kaloi gripi. Kaloi e keqja. Kaloi afati. Kaloi mosha. Më kaloi radha.","vet. veta. III. Bëhet, zhvillohet, kryhet (një punë, një veprim etj.). Aksioni kaloi si duhej. Operacioni kaloi me sukses. Dasma (mbrëmja) kaloi mirë.","edhe kal. Jam; jetoj; e shkoj a e përdor kohën në një mënyrë të caktuar; bëj. Si (ia) kaloni? Kalojnë mirë (pa grindje). Ia kaluam mirë. E kalojmë kohën me mësime (me punë). Sa për të kaluar kohën. E kaloi natën pa gjumë. E kalonte kohën kot. I kaloi pushimet në plazh. E kalojnë jetën në gëzime (të lumtur). Kaloi vite të vështira. Kaluam çaste të paharruara. Kaloi pesë vjet në Shkodër (në fshat, në malësi).","vet. veta. III. Duket e zhduket, shfaqet e largohet shpejt. I kaloi një buzëqeshje në fytyrë. Më kaluan mornica nëpër trup. Më kaloi një e therur në gjoks.","fig. Filloj të flas për diçka tjetër të re; hidhem në një çështje tjetër. Kalojmë në një çështje tjetër. Kalojmë në pikën e dytë të rendit të ditës. Kaloi në hollësira.","kal. Përballoj e kapërcej sëmundjen që më kishte zënë, shërohem; shpëtoj prej diçkaje të padëshirueshme. E kaloi linë (kollën e mirë). E kalova gripin. E kaloi rrezikun. I kaluam vështirësitë.","kal. Lë. E kaloi në heshtje diçka e la me qëllim pa e përmendur.","kal. Kryej, mbaroj, fitoj; hidhem në një klasë tjetër. E kaloi klasën e parë. E kaloi provimin (me sukses).","vet. veta III. Më shpëton, më ikën. Më kaloi pa e vënë re. I kanë kaluar ca gabime. * Kaloi (doli, iku) nga faza thjeshtligj. shih te FAZ/Ë, ~A. I kaloj anash shih tek AN/Ë,~A I. E kaluam trashë diku shih tek TRASH. E kaloi hendekun e kapërceu një vështirësi. I kaloi mendja luajti nga mendtë, i iku mendja, u çmend. I kaloi (i shkoi) koha dikujt a diçkaje shih te SHKOJ. E kaloi në sitë diçka shih te SIT/Ë ~A. E kaloi (e mbushi) të shtatën shih te SHTAT (i,e). Sa për të kaluar (për të shkuar) radhën shih te RADH/Ë,~A. I kaloi (i ra) gur më gur shih te GUR,~I. Ka kaluar (ka rrjedhur) shumë ujë shih tek UJ/Ë,~I. E kalon gjumë e brumë shih te GJUM/Ë,~ I. E kaloi lumin në va shih te VA,~U. E kaloi (e futi, e shkoi) në vrimë të gjilpërës dikë shih te GJILPËR/Ë,~A. Ta kalon (ta shkon, ta fut, ta lëshon, ta çon) ujët nën rrogoz (nën hasër, nën vete) shih te RROGOZ,~I. E kaloi (e hodhi, e kapërceu) lumin pa u lagur (pa lagur këmbët) shih te LAGEM."]}]</script>
