<script>window.__INITIAL_DATA__ = [{"slug":"derdhem","term":"DERDHEM","attributes":["vetv."],"definitions":["vet. veta III. Rrjedh a del jashtë nga gryka ose nga një e çarë e një ene, e një thesi etj. dhe përhapet në tokë a mbi sipërfaqen e një sendi ose bie në një enë tjetër (për një lëng a për diçka të imët); zbrazet një enë, një thes etj. U derdh uji (vaji, qumështi). U derdh mielli (sheqeri, orizi). Iu derdhën mollët (portokajtë). U derdhën thasët. Iu derdh shporta. Po derdhet shishja. Derdhet pika-pika (ngadalë, çurkë). Ç`është derdhur këtu? Ra e u derdh.","vet. veta III. Shkon e i derdh ujërat në det, në liqen etj.; bised. vërshon (për një lumë, një përrua etj.); bie shumë e me vrull (për shiun). Derdhet shiu me shtamba (me rrëshekë). Shkumbini derdhet në detin Adriatik. Derdheshin lumenjtë e mbytnin fushat.","vet. veta III. Varet poshtë e përhapet, lëshohet lirshëm; me vjen sipas trupit. Flokët iu derdhën mbi supe. I derdhej fustani pas trupit.","vet. veta III. Vjen e shtrihet, shpërndahet, përhapet (edhe fig.). Drita u derdh mbi fshat. Errësira u derdh anembanë. Mjegulla u derdh nëpër fushë. Iu derdh një i kuq në fytyrë. Derdhej era e trëndafilave. Kënga u derdh valë-valë. U derdh anembanë gëzimi i popullit.","fig. Dal e vërsulem në një drejtim të caktuar, vërshoj bashkë me të tjerë për diku; lëshohem përpara me vrull; nisem me të shpejtë e shkoj me vrull diku. Populli u derdh nëpër rrugë. Demonstruesit u derdhën drejt sheshit. Korrëset u derdhën fushave. Partizanët u derdhën nga malet. U derdh nga Shkodra në Tiranë. U derdh përpara.","I hidhem dikujt me rrëmbim për ta kapur, për ta përqafuar etj.; i lëshohem, i vërsulem, i turrem dikujt (edhe fig.). Iu derdh në qafë. Fëmijët iu derdhën nënës (mësueses). Partizanët iu derdhën armikut. Iu derdhën qentë (ujkut). Iu derdh me të shara (me hakërrima).","vet. veta III bised. Shkrifërohet e shkoqet (për tokën). Toka iu derdh nëpër duar.","Pës. e DERDH. U derdh në bronz. * Është derdhur gjak është bërë luftë e madhe e janë vrarë njerëz. U derdh kupa kaloi çdo masë e kufi, nuk mund të durohet më. Ia derdh si shirit shih te SHIRIT,~I. Ia derdhën trutë dikujt thjeshtligj. mbeti në vend, vdiq (kur është goditur në kokë). Iu derdhën zorrët thjeshtligj. u vra, ra i vdekur përtokë (kur është goditur në bark). U derdh gjaku pellg shih te PELLG,~U. Gjalpi në lakror derdhet (bie, mbetet) fj. u. shih te BIE I. U derdh vaji, s'mblidhet më fj. u. shih te VAJ,~I I."]}]</script>
