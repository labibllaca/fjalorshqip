<script>window.__INITIAL_DATA__ = [{"slug":"perde","term":"PERDE","attributes":["f.","sh."],"definitions":["Copë pëlhure me pala që mbulon diçka ose që ndan një kthinë nga një tjetër; pëlhurë e tillë ose copë stofi, e cila varet përpara dritares, derës etj. që të mos na shohin nga jashtë, që të mos hyjë drita a për zbukurim. Perde të holla (të trasha, të rënda). Perde të bardha (me lule). Perde kadifeje (mëndafshi, tymi, basme). Perde dritaresh. Xhufkat e perdes. Kapëse perdesh. Kornizë për perde.","Copë e gjatë dhe e gjerë pëlhure, kadifeje, stofi etj., që varet para skenës në teatër dhe që mund të hapet dhe të mbyllet ose të ngrihet e të ulet sipas kërkesave të shfaqjes. U hap (u mbyll) perdja. Ra perdja.","kim. Pëlhurë e bardhë e vendosur pingul dhe e tendosur mirë diku, mbi të cilën shfaqen filma, ekran. Film me perde të gjerë.","anat. Cipë e hollë që vesh syrin dhe që pengon shikimin, lëbyr. I kanë zënë ( i kanë vënë) sytë perde.","Mur i hollë prej dërrase, prej tullash etj., që ngrihet për të ndarë një hapësirë, për të fshehur diçka, për të penguar lëvizjen e diçkaje etj. Perde ndarëse prej dërrase.","Kapak, mbulesë, veshje etj. Që mbron diçka; rrjetë teli a prej shufrash metali që zë një hyrje. Perde teli. Perde mbrojtëse. Perde xhami e papërshkueshme nga plumbat.","Shtresë tymi, mjegulle etj., që të pengon të shohësh në anën përtej. Perde tymi. Perde avujsh. Perde e hollë mjegulle. U ngrit një perde pluhuri.","opt. Pllakë prej lënde të posaçme e vendosur në aparate fotografike e kinematografike, ku riprodhohen figura, sinjale etj.; ekran.","muz. Secila fletë e hollë e metaltë në bishtin e disa veglave me tel, ku shkelin gishtat për të nxjerrë tinguj të ndryshëm; çdo ndarje me fletë të tilla.","fig. bised. Turp, cipë; nder. Njeri me (pa) perde. Nuse me perde. I ka plasur perdja. S’kishin perde fare.","fig. Diçka që përdoret për ta mbuluar e për të fshehur një gjë zakonisht jo të mirë. I hodhi (i vuri) një perde. Ia hoqën (ia grisën) perden. S’ka perde me mua! fol hapur me mua!, mos m’i fshih gjërat!","bised. Perçe grash. Gratë rrinin me perde. * Prapa (pas) perdes fshehurazi, tinëzisht. Nuk ka perde dikush nuk ka vesh, për muzikë. Nuk këndon me perde dikush nuk këndon mirë, e shtrembëron melodinë sepse nuk i kap mirë notat. I kanë vënë (i kanë zënë) sytë perde është verbuar e nuk kupton ç’po i bëjnë, nuk e sheh të keqen që i kanoset nga afër. Perde zjarri usht. breshëri predhash që lëshohen në një hapësirë të caktuar kundër objekteve ajrore që fluturojnë ulët a të cilëve u dihet drejtimi i lëvizjes por jo koordinatat e vendndodhjes ose që hidhen për të penguar sulmin e forcave të armikut."]}]</script>
