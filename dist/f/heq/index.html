<script>window.__INITIAL_DATA__ = [{"slug":"heq","term":"HEQ","attributes":["kal."],"definitions":["E ngre dhe e shpie një njeri a një send nga vendi i tij në një vend tjetër, ia ndërroj vendin duke e zhvendosur, e largoj nga vendi ku ka qenë; kund. vë, vendos. Heq enët (gotat, pjatat) nga tryeza. Heq plaçkat. Heq orenditë nga dhoma. Heq thasët nga qerrja. Heq të sëmurin nga shtrati. Heq dëborën nga çatia. Heq librat nga rafti. Heq shkallët nga muri. Heq trupat nga fronti. E heq mënjanë. E heq me ngadalë. E heq me fshesë (me furçë, me leckë).","E shkëput a e nxjerr diçka nga vendi ku është vënë a mbërthyer, ku është varur, mbështetur, lidhur ose shtrënguar; e zgjidh, e shqit nga vendi ku është ngjitur a është qepur, e këput; e nxjerr nga vendi dhe e marr diçka; e pastroj nga diçka që është ngjitur në të; kund. vë; mbërthej; lidh; qep; var; ngjit. Heq dritaren (kornizën) nga muri. I heq rrotën qerres. I heq shulin armës (derës). Hoqi koburen nga brezi. Hoqi thikën nga këllëfi (shpatën nga milli). Nuk e heq pushkën nga krahu. Heq perdet nga dritarja. Heq pallton nga gozhda. Ia heq çarçafin jorganit. Heq kollaren. I heq frerin (kapistrën) kalit. I heq qetë nga zgjedha (nga kulari). I heq pullën zarfit. I heq bojën i gërryej bojën. I heq kallajin. U heq baltën këpucëve. I heq rrodhet leshit. I heq kokrrat misrit. I heq morrat (mizat) pemës. Hiqe dorën!","I largoj diçkaje kapakun, mbyllësen etj. për ta hapur; kund. vë; mbyll, zë. I heq kapakun kutisë (tenxheres). I heq tapën shishes.","E nxjerr nga vendi ku është ngulur a është futur, e largoj a e shkëput nga vendi ku është vendosur ose është përqendruar, e qit jashtë duke e tërhequr, e shkul (edhe fig.); kund. vë; ngul; fut. Heq drurët. Heq shtyllat. Heq misrin. Heq pykën (gozhdët, vidhat). Heq dhëmballën (dhëmbët). Heq çelësin nga brava. I heq pendët (puplat, qimet). I heq sytë nuk shikoj më në atë vend. Heq shikimin. Heq faqe shkul qimet e fytyrës me agda.","E nxjerr a e qit jashtë një gjë që është brenda diçkaje; e ndaj; kund. fut. I hoqën plumbin nga trupi. I heq bërthamën kumbullës. I heq farat pjeprit. Heq të brendshmet e bagëtisë (të shpendëve, të peshkut). I heq të bardhën vezës.","Zhvesh a zbath diçka; e lëviz diçka nga vendi ku ka qenë si mbulesë (zakonisht duke e ngritur) dhe e vendos në një vend tjetër. Heq pallton (xhaketën, këmishën). Heq rrobat (ndërresat) nga shtati. Heq këpucët (çizmet, çorapet). Heq dorezat. Heq kapelën nga koka. Heq maskën nga fytyra. I hoqi shalën kalit. I hoqi samarin.","E ndaj a e shqit një gjë që mbështjell ose që mbulon diçka; qëroj; rrjep; çmbështjell diçka të mbledhur. I heq lëkurën qengjit. I heq lëvoren drurit. I heq lëkurën mollës. I heq lëvozhgën vezës. I heq fashën këmbës.","E kap dhe e lëviz pas vetes dikë a diçka pa e ngritur peshë; tërheq diçka (edhe fig.). Kali heq karrocën. Qetë heqin parmendën. E heq për dore. E heq zvarrë (pas vetes). E heq për kapistre. I heq veshin dikujt. I heq këmbëzën pushkës. Mos më hiq kështu!","Pi a thith diçka (raki, duhan etj.); e fut në mushkëri, e shkoj poshtë; tërheq. Heq një gllënjkë raki. Hoqi nga shishja (nga paguri). E heq thellë duhanin. Heq burnot. E heqin shumë rakinë këtej.","E kërkon, e tërheq nga vetja; i shkon, i bie; e thith (edhe fig.). Pyjet e heqin shiun. Oxhaku e heq tymin. E heq udha këtej. Nuk ia heq shtëpia (dera) nuk e ka traditë, nuk e ka zakon. Heq fjala fjalën. Heq gota gotën.","fig. Bëj që të mos shitet, të mos përdoret a të mos qarkullojë më diçka. E heq nga tregu (nga shitja). E heq nga qarkullimi (nga përdorimi).","fig. bised. E marr mbrapsht, e tërheq diçka. E hoqi padinë (kërkesën). E hoqi urdhrin. E hoqi fjalën.","E ndërpres a e pres përgjithmonë, e lë; nuk e përdor, nuk e mbaj a nuk e vijoj më tej. E hoqi zinë nuk mban më zi. E hoqën rrethimin (shtetrrethimin). E hoqën karantinën.","bised. E largoj nga një punë, nuk e lë më të kryejë një detyrë, e pushoj; e përjashtoj; kund. fut. E hoqën nga puna. E hoqi nga shkolla (nga zanati). E hoqën nga skuadra.","E zhduk diçka, bëj që të mos jetë a të mos duket më (duke e pastruar, duke e fshirë, duke e hekurosur); fshij. I heq njollat. Heq pluhurin e mobilieve. Heq rrudhat e pantallonave me hekur.","fig. E nxjerr jashtë, e përjashtoj diçka; e fshij, e shlyej; kund. vë, fut. E hoqën nga rendi i ditës. E hoqën nga lista. Heq një radhë nga teksti. Hoqi disa pjesë nga romani (nga studimi).","edhe fig. Nuk ia jap më atë që i kam dhënë më parë; e bëj që të mos e ketë më diçka që ka pasur; nuk e mbaj më diçka, e largoj. Ia hoqën mërzinë (merakun, dyshimin). Nuk e hoqi përgjegjësinë nga vetja. E hoqi shpresën nuk shpreson më. I hoqi veset e këqija.","E pres diçka nga një e tërë, e shkëput; pres, krasit, shkurtoj. U heq degët pemëve. I hoqi flokët me gërshërë. I hoqi një ashkël me sëpatë. Ia hoqën zorrën e verbër. I hoqi dhjamin mishit.","mat. Zbres. Pesë heqim dy. Dhjetë heqim tre.","Ndaj mënjanë një pjesë nga paratë, nga prodhimet, nga ushqimet etj. dhe i ruaj diku për t'i përdorur më vonë ose i përdor menjëherë për një qëllim të caktuar; vë mënjanë. Hoqi para mënjanë. Hoqi harxhet e dasmës. Heq grurin e farës.","Bëj një vijë a një shenjë mbi diçka. Heq vija. Heq një drejtëz (një lakore). Heqim një rreth.","bised. Veproj mbi diçka me një mjet, zakonisht një herë dhe shpejt, kryej një punë a një veprim me një mjet; i shkoj. I hoqi një parmendë arës e punoi arën me parmendë një herë. I hoqi një kazmë (një shat) e punoi me kazmë (me shat). I hoqën një kosë e kositën një herë. I hoqi një lesë tokës e lesoi tokën një herë. I hoqi një fshesë oborrit e fshiu oborrin një herë. I hoqi një shoshë drithit (miellit) e shoshi drithin (miellin) një herë. U hoqi një krehër flokëve u dha një të krehur flokëve. U hoqi një hekur rrobave i hekurosi rrobat. I hoqi një brisk mjekrës u rrua. I hoqi një lexim e lexoi një herë shpejt.","bised. I bie a e qëlloj me diçka; e rrah, e godit. I hoqi një pëllëmbë (një shuplakë, një flakërimë, një shkelm). Ia hoqi surratit (turinjve). I hoqi një dru të mirë e rrahu shumë. Ia hoqi me pushkë e vrau. Ia hoqi vetes vrau veten.","bised. I jap, i bëj. I hoqën një vërejtje (një qortim, një kritikë). I hoqi një të sharë (një mallkim).","Prij, përçoj, udhëheq, drejtoj, çoj. I heq udhën dikujt. Heq vallen. I hoqi për në sulm. I hoqi për nga pylli. Të heq vetë rruga. Na hoqi udha gjer këtu. E hoqi rasti.","edhe jokal. bised. Shkoj, eci; drejtohem diku. Heq udhën shkoj udhës. Hiq udhës drejt! Hiq përpara! Hoqi në shtëpi të mikut.","edhe jokal. fig. Vuaj, kaloj diçka të rëndë; ndiej dhimbje trupore ose shpirtërore; i bëj ballë, përballoj. Hoqi një sëmundje. Hoqi një dënim. E kam hequr vetë. Hoqi të zitë e ullirit vuajti shumë. Hoqi pikën e zezë vuajti shumë. Ç`e zë njeriun e s'e heq. Heq zor e ka të vështirë, është ngushtë. Hoqi shpenzimet (harxhet).","fig. bised. E mbaj a e quaj veten; shtirem; e quaj për diçka. E heq veten filozof. E heq veten si mik. E heq për mish viçi (dashi).","jokal. vet. veta III. bised. Bie shumë, hedh (për shiun dhe borën). Hoqi borë dje sa s'rrëfehet.","edhe jokal. vet. veta III. bised. E rrit, e zhvillon, e bën mirë; rritet a zhvillohet, bëhet. E heq shumë duhanin toka jonë. I heq vendi pemët këtej. 31. bised. Ndërzej, mbars. E heq pelën me kalë (me gomar). E heq lopën me mëzat (me dem). Cjapi heq dhitë. Qeni heq buçën. * Më heq ana me dikë a me diçka shih tek AN/Ë,~A I. E hoqi (e tërhoqi) në baltë dikë shih te BALT/Ë,~A. Më heq (më shkon, më vete) bark shih te BARK,~U","Ia hoqi (ia nxori, ia qiti) bojën keq. shih te BOJ/Ë, ~A. Ia hoqi bricën shih te BRIC/Ë, ~A. E hoqi (e fshiu, e shoi, e shleu) nga defteri dikë a diçka shih te DEFTER,~I. I hoqi dorezat dikush shih te DOREZ/Ë,~A. Heq dorë nga dikush a nga diçka a) shkëput lidhjet me dikë a me diçka, s'pyes më, s'interesohem më për dikë a për diçka, nuk merrem më me të; e braktis a e lë; jap dorëheqjen nga një punë a detyrë; b) nuk mendoj më si më parë, ndërroj mendje, nuk i përmbahem një mendimi, një ideje etj. S'e heq (s'e lëshon, s'e lë) nga dora diçka shih te DOR/Ë,~A. I hoqi një dredhë a) e rrahu shumë me kamxhik, i dha një të rrahur; b) e qortoi a e kritikoi rëndë, i hoqi një dajak. I hoqi (ca) fasha shih te FASH/Ë,~A. Ia hoqi fillin dikujt a diçkaje shih te FILL,~I. E heq (e merr, e mban) nëpër gojë dikë a diçka shih te GOJ/Ë,~A. S'e heq (s'e ndan, s'e lëshon) nga goja dikë a diçka shih te GOJ/Ë,~A. Mos ia hiq gunën! shih te GUN/Ë,~A. Ka hequr gjakun me të ka hequr të zitë e ullirit me të, e ka munduar shumë, i ka marrë shpirtin. Ia hoqi hallkën dikujt nuk kujdeset më për dikë, s'pyet më për të, ia hoqi fillin; e la të bëjë ç'të dojë e si të dojë. Ia heq hunda diçka shih te HUND/Ë, ~A. E heq (e tërheq) për hunde (për hundësh) dikë shih te HUND/Ë,~A. S'e heq (s'e mban, s'e ngre, s' e çon) kandari shih te KANDAR,~I. I heq kapelën (shapkën) dikujt e nderoj veçanërisht për një punë të madhe e të rëndësishme që ka bërë, për meritat e aftësitë e tij etj. Ia ka hequr kapistallin (kapistrën) dikujt nuk bëhet më merak për dikë; e ka lënë të lirë e pa mbikëqyrje. E heq (e tërheq) për kapistalli (për kapistre) dikë shih te KAPISTALL, ~I. Hiq (tërhiq) e mos e këput me të shtyrë, zvarrë. I hoqi (i vuri) kryq dikujt a diçkae shih te KRYQ,~I. Heq lotarinë provon fatin. Më heq (më nxjerr) mallin e dikujt a të diçkaje shih te NXJERR","E hoqi maskën libr. e zbuloi fytyrën e vërtetë, e tregoi se kush ishte në të vërtetë. E hoqi (e largoi) mendjen nga dikush a nga diçka shih te MENDJ/E,~A","E hoqi nga mendja e harroi krejt; e largoi nga mendja. Hiqe mys diçka shih te MYS. Heq paftë tek. shih te PAFT/Ë,~A. E heq nga palltoja dikë shih te PALLTO,~JA. E hoqi qafe dikë a diçka shpëtoi prej dikujt, bëri që të mos i bjerë më në qafë. E hoqi sysh dikë shpëtoi prej dikujt, bëri që të mos e ketë më përpara syve. Nuk ia heq (nuk ia ndan, nuk ia shqit) sytë shih te SY,~RI. I hoqi shkallët dikujt i krijoi një gjendje të vështirë për ta dëmtuar; e la pa mbështetje e pa përkrahje. Po heq (po jep) shpirt (po heq për shpirt) vjet. shih te SHPIRT, ~I. Heq (humbas, pres) shpresën (shpresat) shih te SHPRES/Ë,~A 1. Heq (numëron) tespihet e shkon kohën kot. I heq udhën vjet. udhëheq, prij. Heq valle kërcej. I heq velenxën dikujt shih te VELENX/Ë,~A. E heq (e tërheq) për veshi shih te VESH,~I. I hoqi (i tërhoqi, i zgjati, i shkuli) veshin (veshët) dikujt shih te VESH,~I. Hiq e vër atë vetë tamam, gjallë ai. I hoqi (i futi, i vuri) vizë (vijë) dikujt a diçkaje shih te VIZ/Ë,~A. Heq në zemër për dikë a për diçka shih te ZEM/ËR,~RA. Ma heq zemra diçka e pëlqej diçka, e dua, ma do zemra. Më heq zemra te dikush dyshoj te dikush, më bren dyshimi për dikë. Më heq zemra për diçka kam dëshirë për diçka, e dëshiroj a e dua, ma do zemra. E heq (e tërheq) zvarrë një punë shih te ZVARRË","Ua hoqën dushkun fjalëve shih te DUSHK, ~U. I hoqi gurin e fundit dikujt a) s'la gjë pa i thënë, ia numëroi të gjitha; b) e dëmtoi, e la pa mbështetje, ia preu rrënjët. E hoqi (e tërhoqi) këmbën zvarrë (rrëshqanë) shih te ZVARRË. I heq (i tërheq) kërraba nga vetja keq. shih te KËRRAB/Ë,~A. Ia hoqi petën lakrorit shih te PET/Ë,~A. I heq spik jetës shih te SPIK,~U. I ka hequr shumë lëkura shih te LËKUR/Ë, ~A","Ia hoqi vellon nuses shih te VELLO,~JA. Heq (vë) shenjën (vijën) e barazimit shih te BARAZIM,~I. E heq shkopin zvarrë shih te SHKOP,~I. S'ia heq zhiblën nga syri dikujt shih te ZHIB/ËL,~LA. Ishte lëkurë për të hequr shih te LËKUR/Ë,~A. I ka thonjtë pa hequr keq. shih te THUA, THOI."]}]</script>
