<script>window.__INITIAL_DATA__ = [{"slug":"shoh","term":"SHOH","attributes":["kal."],"definitions":["jokal. Kam aftësinë të perceptoj me anën e shqisës së të parit sendet e ndryshme të botës, kam aftësinë e të parit. Shoh mirë. Fëmija ka nisur të shohë. Macet shohin edhe natën. Bufi nuk sheh ditën. Shqiponja sheh larg. Mezi sheh. Nuk sheh pa syze. Nuk sheh fare me njërin sy. Ia lidhën sytë që të mos shihte. Me sy shohim, me veshë dëgjojmë. Nuk sheh syri, po sheh mendja. fj. u.","Rrok dikë a diçka me sy. Shoh detin (lumin). Nuk i shoh më zjarret. S`të sheh më syri këneta. Armiku s'na e pa kurrë shpinën. E pashë dje në rrugë. E kam parë në film. E pashë me sytë e mi (me këta sy). S`e kam parë ndonjëherë. Ç`po më shohin sytë! Ç`i sheh syri, ia bën dora. Kur të shoh me sy, më bie ndërmend për ty. fj. u.","Vë re, shquaj; dalloj; diktoj. Nuk e pashë gropën (hendekun). I pa nga vrima e çelësit. S`pashë gjë. I pashë të gjitha! Të pa njeri? Mos na shohin? Shihni si u skuq. Shih si je bërë! Pa diçka që lëvizte. Pa fytyrën e vet në ujë. Iku pa e parë kush.","shih SHIKOJ 1,2,5,6. Pa orën. E pa në fytyrë. I pa plagën. Shih këtu (më poshtë, në faqen 12). Shihnin borën që binte. Shoh llogarinë. Shih fjalorin (hartën...). Shoh shtypin (gazetën). E pa mjeku. Të shohim a është bërë. Të shohim ç`do të thotë. Pa nëpër shtëpi. Shoh gjellën për kripë. E pe si t`u përgjigj? Shih të na nderosh. Shih fëmijët! Shih zjarrin mos shuhet!","Gjej diçka, e zbuloj diku, e vë re, e diktoj, e ndiej se është i pranishëm; më duket i tillë a i atillë, e gjej, e quaj; e kuptoj, e njoh. Pamë gëzimin e punëtorëve (e fshatarëve). E shoh që je i lodhur (i sëmurë, i mërzitur). E shoh që s`të pëlqen (që s'ke qejf, që s`do). Nuk shoh ndonjë rrezik (asgjë të keqe). E shoh të arsyeshme (të dobishme, të drejtë, të mjaftueshme, të udhës). E shoh me vend. E pe ç`pësove? Siç e shihni... siç është tashmë e qartë për ju. E shoh që s'më ke harruar. E shoh që gabova. E pashë që s'i pëlqeu. E panë se s`kishin nga t`ia mbanin. Do të me shohin se kush jam! Dale pa të më shohë! Ke për të parë!","Takoj dikë; ndesh; vete tek ai ta takoj a të rri me të, vizitoj. Kishte një vit pa e parë djalin. S`e kam parë prej kohësh. S’e ka parë ai si ti! S`ka vajtur ta shohë askush. Nuk do të shohë njeri. Kam parë e s`kam parë, po si atë s`kam parë! Mos ia pafsha sytë (surratin)! përçm. as që dua ta takoj ndonjëherë, as që dua të kem të bëj me të! (për dikë që e urrejmë a e përbuzim).","Përfytyroj, më duket sikur e kam përpara syve, më del në ëndërr; më shfaqet në gjumë. E kam parë në ëndërr. Shoh shumë ëndrra. Sikur e shoh të gjallë. Sheh ëndrra me sy hapur.","Jam dëshmitar a i pranishëm në një ngjarje, në një punë etj., jam spektator në një shfaqje, në një garë a ndeshje sportive etj. Pamë parakalimin (ndeshjen, një shfaqje të bukur, një film të ri). E ke parë vetë, apo ta kanë treguar? Ç`na kanë parë sytë! ndodhi diçka e tmerrshme para syve tanë.","Vizitoj një vend, një qendër pune, një vepër industriale, një ekspozitë a muze etj.; këqyr me kujdes nga të gjitha anët diçka për ta njohur mirë. Pamë Beratin (Kalanë e Gjirokastrës, kombinatin metalurgjik, Muzeun e Armëve). Qyteti më i bukur që kam parë. Kanë vajtur të shohin shtëpinë e re. Panë vendin ku do të ndërtohet fshati i ri.","Shqyrtoj diçka, e studioj për të formuar një mendim ose për ta zgjidhur, e trajtoj diçka në këtë ose në atë mënyrë. Shoh projektin e një vepre. E panë në drejtori (në byro, në organizatë). E pamë edhe një herë (nga të gjitha anët, mbarë e prapë). E kemi parë e stërparë këtë çështje. E shoh në një dritë të re (nga një kënd vështrim i ri). E shoh me syrin politik (klasor). Duhet parë ndryshe kjo punë. E pa gjendjen në vend. Ta shohim veten si në pasqyrë!","fig. E vlerësoj dikë a diçka në një mënyrë të caktuar, e quaj; mbaj këtë ose atë qëndrim, sillem në këtë a në atë mënyrë. E shohim si shfaqje të luftës së klasave. E kanë parë si forcën lëvizëse kryesore. E shoh si një çështje themelore. E shoh me një sy tjetër (me sy të mirë, me sy të keq). E shihte shtrembër (vëngër, ftohtë).","fig. Përjetoj; provoj, heq, vuaj. Ka parë shumë në jetë ai. Ka parë lemeri (kiametin) me sy. Sa ka parë ky vend (ky popull, kjo botë)! Ç`të keqe ke parë nga ai? Atëherë pamë ç`pamë!","vet. veta III. Është i kthyer në një anë a në një drejtim të caktuar, shikon, vështron, bie. Dritaret shohin nga lindja. Njëra dhomë sheh nga deti, tjetra nga kopshti.","vet. veta III. I bien rrezet e diellit, e ndriçon dielli. Nuk e sheh dielli. S`ka parë diell.","Vërej dikë a diçka në një gjendje të caktuar shpirtërore, shoqërore etj.; jetoj me dikë një gjendje të caktuar a rrethana të caktuara. Dua të të shoh të qeshur (të lumtur, të gëzuar). Dua t'ju shoh mirë e më mirë. Të pafsha me zemrën plot! ur. Mos pafsh njeri pa punë! E pa veten keq (ngushtë). Sikur s`të shoh mirë! Kështu e pafsha! mallk.","fig. Ia arrij ta jetoj (zakonisht për diçka që e dëshiroj), ia arrij diçkaje. Nuk e pa lirinë. E pamë edhe në këtë ditë.","bised. I zgjidh dikujt një çështje, duke i dhënë të drejtën që i takon; mbroj të drejtën në gjykimin e një çështjeje. Partia (pushteti popullor) sheh të drejtën. Kurrkush s'ua shihte hallin fukarenjve.","vet. urdh. bised. Përdoret me kuptim pasthirrmor për të shprehur habinë e folësit për diçka, për të tërhequr vëmendjen e dëgjuesit ose për të thumbuar a për të tallur dikë. Shih ç`i pjell mendja! Shih ç`na bëri. Pa shih, pa shih ç`na qenka! * Ke parë ti... fj. ndërm. përdoret kur shprehim habi për diçka që nuk e pritnim të ndodhte a që s'e kemi menduar. Pa ç'pa ... u shtrëngua të bëjë diçka kundër dëshirës së tij, s'kishte si t’ia bënte ndryshe, s’e zgjati më. Shohim e bëjmë (duke parë e duke bërë) të presim një herë si do të vejë puna, të mos e vendosim që tashti, të veprojmë si të na mësojë puna vetë. Sheh përtej bjeshke (prapa malit) shih te BJESHK/Ë, ~A. Sa për «shihni botë» sa për t'u dukur, sa për sytë e botës. Nuk ia ka parë derën dikujt nuk i ka shkelur në shtëpi, nuk i ka vajtur kurrë. Pa dritën libr. u shtyp, u botua (për një vepër). I sheh me dylbi (gjërat) dikush shih te DYLBI,~A. E pafsha të ftohtë! mallk. shih te FTOHTË (i,e). E ka parë gulç shih te GULÇ,~I. I pa hairin dikujt a diçkaje shih te HAIR,~I. E sheh nën hundë dikë shih te HUND/Ë, ~A. Ka parë jetë ka jetuar mirë, nuk i ka munguar asgjë në jetë. Sheh (shikon) larg shih te LARG. I pa (i bleu) mendjen deshi të kuptonte se ç'mendonte për një çështje të caktuar, deshi të merrte vesh se ç'kishte ndër mend të bënte. Nuk e shoh dot me sy (s'dua t’ia shoh sytë) shih te SY,~RI. Ia pa sherrin dikujt a diçkaje shih te SHERR,~I","S'pa (udhën) nga shkoi (nga vajti) iku menjëherë e me nxitim, iku nga sytë këmbët, ia mbathi udhë pa udhë (nga frika etj.). Shih e shkruaj! shih te SHKRUAJ. I sheh edhe shpina shih te SHPIN/Ë,~A. Kur të shohë shpatullat (kurrizin, veshët, zverkun, qafën)! kurrë, asnjëherë, kurrën e kurrës. Sheh zi sheh vetëm anën e keqe të diçkaje, mendon vetëm për të këqijat që mund të vijnë nga diçka. I sheh (gjërat) bardhë e zi shih te BARDHË. Ulu (poshtë) se të panë! iron. shih tek ULEM. Ka parë botë (dynja) me sy ka shëtitur në shumë vende. Nuk sheh buallin para sysh shih te BUALL,~I. E ka parë diellin para teje ka lindur më parë se ti, di dhe ka më shumë përvojë në jetë se ti, sepse është më i madh. E pa sa ishte sahati shih te SAHAT,~I. Nuk sheh më larg (më tutje) se hunda e vet (përtej hundës së vet) shih te HUND/Ë,~A. Nuk pa i pari të dytin shih te PARË (i,e). Sheh puna punën shohim e bëjmë. E pafsha në rrugë të madhe! mallk. shih te RRUG/Ë~A. E pashë me sytë e ballit (me këta sy) shih te SY,~RI. Mos i paftë syri keq! ur. qoftë gjithnjë i lumtur! Nuk i shohin sytë këtej nuk ia mban të vijë këtej, s'guxon të vijë. E sheh (e shikon) me syze të errëta shih te SYZE,~T. Pa vdekjen me sy gati vdiq, sa s'vdiq, rrezikoi jetën; vuajti shumë, u sfilit. Shih me sy e plas me zemër (shih me sy e s'është për ty) shih te SY,~RI. S'sheh syri, sheh mendja shih te SY, ~RI. Sheh tym e bën konak iron. shih tek TYM,~I. Sheh yllin e merr pyllin shih tek YLL,~I. Sheh (shikon) qimen në syrin e tjetrit e nuk sheh (nuk shikon) trarin në syrin e vet shih te QIM/E,~JA. E pafsha në (nëpër) dyert e botës (dyerve të botës)! mallk. shih te DER/Ë,~A. Dielli shihet (duket) që në mëngjes (që kur lind) fj. u. shih te DIELL,~I. Mos mburr degët pa parë rrënjët fj. u. shih te RRËNJ/Ë,~A. Sheh rrushi rrushin (fiku fikun) e piqet fj. u. shih te RRUSH,~I. Kur t'i hipësh kalit, shihi potkonjtë fj. u. shih te POTK/UA,~OI."]}]</script>
