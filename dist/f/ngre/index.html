<script>window.__INITIAL_DATA__ = [{"slug":"ngre","term":"NGRE","attributes":["kal."],"definitions":["Çoj nga poshtë lart; i shtoj lartësinë; e marr nga vendi ku ndodhet dhe e vë diku më lart; ngjit; kund. ul. Ngre barrën (drutë, thesin). Ngre hekurin e anijes. Ngre flamurin. Ngre në katin e tretë. Ngre lart.","Shkëput diçka nga toka ose nga dyshemeja dhe e mbaj pezull në duar. Ngre valixhen. Ngre tezgën (vigun). Ngre dorezën e telefonit. Ngre fëmijën në duar.","Drejtoj lart, zhvendos në drejtimin nga poshtë lart; bëj që të çohet lart; kund. ul. Ngre kokën. Ngriti dorën (gishtin). Ngriti krahët (grushtin). Ngriti sytë. Ngriti vetullat përpjetë. Ngre pluhur (era). Ngre dallgë (deti).","E kaloj nga gjendja e shtrirë në qëndrimin pingul; bëj të qëndrojë lart diçka që ishte e shtrirë, e varur a e kapur diku; mbledh; hap; kund. ul. Ngriti kapakun. Ngre jakën e palltos. Barka ngriti pëlhurat (velat). Ngre perdet. Ia ngriti flokët era.","Kthej në gjendjen e mëparshme me këmbë ose pingul diçka që ishte rrëzuar, përmbysur ose rrokullisur; bëj të ngrihet në këmbë dikë që ishte ulur a shtrirë. Ngriti karriget. Ngriti një fëmijë që u rrëzua. E ngriti plakun dhe e uli në karrige.","E bëj që të çohet nga vendi; i prish gjumin, e zgjoj; çoj. E ngriti nxënësin (në mësim). E ngriti nga vendi. E ngriti nga shtrati (nga gjumi).E ngre herët (vonë).","gjah. Nxjerr nga strofka a nga vendi ku është fshehur një kafshë a një shpend; çoj. Langoi i ngriti lepujt (shkurtat, rosat).","E bëj më të lartë nga ç'ishte (një mur, një ndërtesë etj.). E ngriti murin. E ngritën shtëpinë edhe një kat.","Ndërtoj e krijoj diçka të re; themeloj; bëj. Ngritën familje. Ngritën një shtëpi (një shkollë, një spital). Ngritën barrikada. Ngriti folenë (çerdhen). Ngritën një lapidar (një monument). Ngritën kooperativën. Ngritën një këngë. Ngriti një kor (një grup teatral).","fig. I vë diçka përpara për ta penguar; i përgatit diçka të papritur për ta kapur a për ta dëmtuar. I ngriti një mur (një gardh). I ngre pengesa. I ngriti një lak (kurth, pusi).","Marr diçka nga një vend dhe e shpie në një vend tjetër, mbaj; heq nga një vend. I ngriti plaçkat nga shtëpia. Ngritën drithin dhe e çuan në depo. Ngre tryezën heq enët dhe ushqimet nga tryeza.","fig. E bëj të madh; i shtoj madhësinë, vlerën, masën a shkallën, zmadhoj. Ngritën çmimet. Ngrenë taksat (qiratë). Ngrenë normat. Ngre shpenzimet (koston). Ngre rendimentin (prodhimin). Ngre moshën. Ngre temperaturën (shtypjen, trysninë).","fig. I shtoj vrullin ose shkallën e shfaqjes a të zhvillimit, i shtoj forcën, e forcoj. Ngre ndjeshmërinë. Ngre vigjilencën (shpirtin luftarak, frymën revolucionare). Ngre moralin (gjendjen shpirtërore, humorin). I ngre nervat dikujt e nevrikos.","I shtoj cilësitë ose vlerën, e ngjit në një shkallë më të lartë. Ngre aftësinë (mjeshtërinë). Ngre dijenitë. Ngre stilin. Ngre në një shkallë të re. Ngre nivelin e veprës (e shfaqjes). Ngre në art i jap vlerë artistike; e paraqit me art.","E bëj të ndriçojë ose të dëgjohet më shumë, e bëj më të lartë, forcoj. Ngre dritën (fitilin, llambën). Ngre zërin. Ngre radion.","fig. E caktoj në një detyrë më të lartë; i besoj një pune më të rëndësishme e më me përgjegjësi. E ngritën në detyrë (në përgjegjësi). E ngritëm në rangun e...","Bëj që t'i çmohen më shumë cilësitë e meritat nga të tjerët; lartësoj, çmoj. Ngre autoritetin (emrin, prestigjin). E ngre lart. Ngre veten e çmon veten shumë, e vlerëson në mënyrë të veçantë. I ngre lart emrin e bëj të çmohet e të vlerësohet në mënyrë të veçantë nga të tjerët.","fig. Shtroj diçka për t'u shqyrtuar, për t'u gjykuar, për t'u zbatuar a për t'u zgjidhur nga të tjerët; parashtroj. Ngriti një çështje (një tezë) të rëndësishme. Ngre në shtyp (në gazetë, në fletërrufe). Ngre para masës. Ngre me të madhe (me forcë) diçka. Ngre akuza. Ngre një padi. drejt. Ngre në gjyq dikë e padit, e hedh në gjyq.","fig. E bëj dikë të marrë pjesë gjallërisht në një punë, e veprimtari të gjerë; frymëzoj për diçka, i jap zemër. Partia ngriti popullin (masat) në luftë (në aksion). Ngre shpirtërisht (moralisht).","fig. E bëj më të zhvilluar, më të përparuar, i jap arsim e kulturë; e bëj të dalë në dritë. Socializmi i ngre gjithnjë më lart masat punonjëse. Shkolla e ka ngritur.","mat. Shumëzoj me vetveten një shifër ose një shprehje për një numër të caktuar herësh. Ngre në katror. Ngre në fuqi të katërt.","bised. Mbledh, grumbulloj njerëz. Ngritën ushtarë. Ngritën vullnetarë. * E ngriti (e nxori, e qiti) nga balta dikë shih BALT/Ë,~A. Ngre ballin (lart) fitoj besim në vete, bëhem i guximshëm; eci ballëhapur. Ngriti bishtin keq. a) u bë gati për të nisur një veprim; b) nisi të shthurej moralisht (sidomos për femrat); c) iu rrit mendja; mbahet me të madh, ka kërkesa të tepërta. I ngriti (i mblodhi, i mori) çoparkat iron. shih te ÇOPARKA,~T. Ngre (çon) dorë (dorën) kundër dikujt a diçkaje godit, qëllon dikë a diçka; nis luftën kundër dikujt a diçkaje. Ngriti (shpalosi) flamurin doli i pari për të mbrojtur a për të shprehur diçka. Ngre (bën, gjen, zë) fole shih te FOLE~JA, Ngre (çoj) gotën (dollinë, kupën, shëndetin) pi për nder të dikujt duke e uruar për diçka. Ngre (çon) hundën (përpjetë) për diçka shih te HUND/Ë, ~A. Ka ngritur hundën me dikë keq. është zemëruar me dikë. Nuk ngre (nuk çon) kandar (peshë) edhe poh. shih te KANDAR,~I. E ngriti (e çoi) në (më) këmbë dikë a diçka shih KËMB/Ë ~A. Ngre (çoj) kokë (krye) a) çohem në luftë kundër dikujt për të hedhur poshtë zgjedhën e tij, bëj kryengritje; b) dal kundër dikujt, kundërshtoj hapur, nuk pranoj t'i nënshtrohem më; c) vet. veta III shfaqet përsëri, fillon përsëri të dalë (diçka e padëshirueshme, e dëmshme). S'e ngre (s'e çon) kokën nga diçka punon pa ndërprerje, me ngulm. Ngriti (mblodhi) leckat (rraqet, rreckat) mospërf. u shpërngul i detyruat nga dikush, u bart kundër dëshirës, duke marrë me vete gjithçka. Ia ngriti (ia mblodhi) leckat (rraqet) dikujt mospërf. a) e shpërnguli me pahir në një vend tjetër, e përzuri diku me zor, e dëboi nga një vend; b) e hoqi nga një detyrë a përgjegjësi që nuk e meritonte ta mbante. I ngriti monument libr. shih te MONUMENT,~I. Ngre orën kundër dikujt shih tek OR/Ë ~A II. Ngre (çon) peshë dikë shih te PESHË. Ngre (çon) peshë (mendjet, zemrat) shih te PESHË. Ngre (vë) në piedestal dikë libr. shih te PIEDESTAL,~I. I ngriti (i mblodhi, i ngarkoi) plaçkat iron. shih te PLAÇK/Ë,-A. Mos ngri (mos ço) pluhur! shih te PLUHUR,~I. Ngrije qafën! shih te QAF/Ë,-A. E ngriti (e hipi, e çoi) në qiell shih te QIELL,~I. Ngriti spirancën (çengelat) shih te SPIRANC/Ë,~A. Ngre (çoj mbledh rrudh) supet shfaq habi a dyshim për diçka që nuk e di, zakonisht duke lëvizur shpatullat. Më ngre vendi shih te VEND,~I. Ngre (çon) duart lart shih te VESH,~I. I ngriti (i krekosi) veshët shih te VESH,~I. Ngre (çoj) zërin (në qiell) flas me të madhe për të kërkuar diçka a për të vënë në vend diçka që më duket e padrejtë; ngul këmbë me forcë ose kundërshtoj. Ul e ngre (ço) shih tek UL. Ngre (çon) duart lart (përpjetë) a) dorëzohet para dikujt; b) përkulet para një vështirësie; pushon së luftuari a heq dorë nga përpjekjet për të kapërcyer vështirësitë. Më ngre (më hedh) dheu përpjetë shih te DHE, ~U. Ngriti flamurin e bardhë shih te BARDHË (i, e). I ngriti (i bëri, i çoi) këmbët bigë (çift) mospërf. shih te BIG/Ë,~A. E ngriti (e hodhi, e ktheu) me këmbë përpjetë mospërf. shih te KËMB/Ë,~A. Ngre (bën, ndërton) kështjella në erë (në ajër) keq. shih te KËSHTJELL/Ë,~A. Ngre kodra përmbi det iron. shih te KOD/ËR,~RA. Nuk e ngre kurrë qafën shih te QAF/Ë, ~A. E ka ngritur lafshën përpjetë shih te LAFSH/Ë,-A. I ngre lart zemrën dikujt shih te ZEM/ËR,~RA. Ngre (çon) pluhur në llaç dikush shih te PLUHUR,~I. E ngritën (e shkulën) me rrënjë e me degë shih te RRËNJ/Ë, ~A. I ngrinin (i mbanin) sytë nga qielli shih te QIELL,~I. Ngre ujin përpjetë shih tek UJ/Ë,~I. Nuk i ngre (nuk i merr, nuk i zë) ujë lopata (shati) shih te LOPAT/Ë~A. Ngre veshët çark shih te ÇARK, ~ U. I ngre veshët çip shih te ÇIP,~I. I ngre (i mban) veshët pipëz shih te PIPËZ,~A. Ngre këmbën e i bie kokës shih te KËMB/Ë,~A. Ngre këmbën e vë gozhdën shih te KËMB/Ë,~A. Ka ulur pak hundën, por ka ngritur sqepin iron. shih tek UL."]}]</script>
