<script>window.__INITIAL_DATA__ = [{"slug":"botee-i","term":"BOTË I","attributes":["f."],"definitions":["Rruzulli i Tokës; dheu me gjithçka që është në të, sipërfaqja e Tokës dhe gjithë qeniet që jetojnë në të, dheu, toka. Lëmshi (rruzulli) i botës. Harta e botës. Kontinentet (shtetet) e botës. Lumenjtë (ujërat) e botës. Rreth botës. Në fund të botës. Në të katër anët e botës. Udhëtim nëpër botë. Sa të jetë bota përjetë të jetëve.","sh. ~Ë, ~ËT. Trup qiellor; planet. Botë të panumërta. Botët e gjithësisë.","Tërësia e formave të materies, realiteti; tërësia e çdo gjëje që është pavarësisht nga ndërgjegjja. Bota objektive (materiale). Bota e jashtme. Njohja e botës. Uniteti i botës. Pasqyrimi i botës. Prejardhja e botës.","përmb. bised. Njerëzit e tjerë, gjindja që na rrethon, njerëzia; njerëzit e huaj, me të cilët nuk kemi të bëjmë; një njeri tjetër, dikush. Gjithë bota. Si gjithë bota. Në shtëpi të botës. Fjalët (gojët) e botës. U bë gazi i botës. Malli i botës mall i huaj. Në dasmë të botës. Me fjalët e botës. Çuditet gjithë bota. E di (flet) e gjithë bota. U rrit në dyert e botës. Hyri botë hyri si i huaj në shtëpinë e një tjetri. Jam botë për të jam njeri i huaj e i panjohur për të, s'jam i tij. Mos hyr në pus me litarin e botës. fj. u. Mos shtjer kripë në gjellën e botës! fj. u. Pret thika në mish të botës. keq. Hanë bukën tonë e bëjnë davanë e botës (rrahin thekrën e botës). I nxjerr gështenjat (nga zjarri) me duart e botës. Nuk shikon traun e tij, po shikon qimen e botës. E pafsha nëpër dyert e botës! mallk.","edhe sh. ~Ë, ~ËT. Shoqëria njerëzore e një vendi ose e disa vendeve, që është organizuar sipas një rendi të caktuar dhe që dallohet nga tipare historike e kulturore të veçanta; mënyra e jetesës dhe e organizimit shoqëror në një vend, në një grup vendesh ose në një periudhë historike. Bota e re. Bota e vjetër. Bota shqiptare. Bota antike. Bota ilire (greko-romake, arabe). Bota socialiste. Bota kapitaliste (feudale). Bota perëndimore. Bota e Lindjes. Bota a bota; sillet ndryshe nga të gjithë e jo ashtu si duhet. Është prapa botës (prapa dynjasë) a) është i paditur, ka mbetur prapa, nuk është i zhvilluar me kohën; b) nuk di se ç'bëhet, nuk merr vesh të rejat. Mori botën (dynjanë) shih te MARR. Mori botën (dheun) ndër (në) sy shih te MARR. Në sy të botës (të dynjasë) para të tjerëve, haptas, botërisht. Sa për sy (sa për faqe) të botës shih te SY,~RI. I shtiu botën i kalli tmerrin, i shtiu frikën. U bë përrallë e botës dikush shih te PËRRALL/Ë,~A. S'është në këtë botë (në këtë dynja) s'merr vesh çfarë po bëhet. Ka parë botë (dynja) me sy shih te SHOH. Që kur bota është botë prej kohësh shumë të lashta. Edhe sikur bota (dynjaja) të përmbyset! çfarëdo që të ndodhë, edhe e keqja më e madhe po të ndodhë, në asnjë mënyrë, kurrsesi. Bota është e rrumbullakët fj.u. shih te RRUMBULLAKËT (i,e). Miell nga thesi i botës (i huaj) iron. shih te MIELL,~I. Kali i botës të lë në udhë fj. u. gjëja e huaj s'të mbaron punë. S'merret bota në krahë (në kurriz) fj.u. nuk është e mundur të bëhen a të mbarohen të gjitha punët menjëherë, punët duhen bërë me radhë sipas kushteve e mundësive. Pula e botës duket më e majme fj.u. iron. shih te PUL/Ë,~A."]}]</script>
