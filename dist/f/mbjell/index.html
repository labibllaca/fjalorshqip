<script>window.__INITIAL_DATA__ = [{"slug":"mbjell","term":"MBJELL","attributes":["kal."],"definitions":["Hedh farën e një bime në tokë të punuar me qëllim që të mbijë e të japë prodhim. Mbjell grurë (misër, fasule). Mbjell tokën (arën) me pambuk (me patate). E mbjellim në fole. E mbollën shpejt (herët, vonë).","Ngul në dhe fidanë barishtesh, pemësh e drurësh, duke u bërë shërbimet e duhura, me qëllim që të zënë e të zhvillohen; mbëltoj, vë. Mbollën kumbulla (qershi, mollë, pemë). Mbjellin duhan (presh, domate). Mbjell lule. Mbollën filiza (fidani). Mbjellin hardhi. Mbjellin drurë zbukurimi.","fig., kryes. shaka. Lëshoj një nga një, shpërndaj, përhap; humb (zakonisht kur diçka na bie në tokë pa e kuptuar). I mbolli plaçkat rrugës. I mbolli paratë.","fig. Përhap, shtrij; fut, shkaktoj. Mbollën lirinë. Mbollën qytetërimin (diturinë). Mbolli farën e patriotizmit. Mbillte mosbesim (përçarje, grindje, frikë, pakënaqësi, dyshim). Mbollën vëllavrasjen. Mbillnin kob e zi. Pushtuesit mbollën vdekjen. * Mbjell në dushk shih te DUSHK,~U. Mbjell ferra nëpër këmbë bëhet pengesë, fut ngatërresa. Është mbill e mos korr (një punë, një gjendje) është rrëmujë e madhe, është puna lëmsh, s'e merr vesh i pari të dytin. Ku mbjell nuk korr dikush nuk qëndron kurrë në një vend, s`i zënë këmbët dhe bredh pa pushim rrugëve, është rrugaç. Ç'të mbjellësh, do të korrësh fj.u. sipas punës do të kesh edhe shpërblimin; ç'të bësh, do të gjesh. Mbjell misër e korr tallë shih tek TALL/Ë,~A. Mbolli thekër e i doli gruri dikujt i vete mbarë gjithçka, i shkon puna shumë mirë. Mbolli bostan e i dolën kastravecë iron. ndryshe e mendoi e ndryshe i doli, mendoi për mirë, po i doli keq. Kush mbjell erën, do të korrë furtunën (stuhinë) fj. u. libr. kush bën një të keqe, do ta pësojë nga një e keqe më e madhe."]}]</script>
