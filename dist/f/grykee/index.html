<script>window.__INITIAL_DATA__ = [{"slug":"grykee","term":"GRYKË","attributes":["f.","sh."],"definitions":["Pjesa e sipërme e gypit nëpër të cilin kalon ushqimi nga goja në stomak, pjesa e prapme e gojës që lidhet me gypin e ushqimit dhe të frymëmarrjes; pjesa e përparme e qafës; fyt. I dhemb gryka. M`u tha gryka. Shtrëngoj (rrok, mbërthej) për gryke. I ngeci (i mbeti) në grykë. Iu hodh në grykë. Flet me grykë flet duke i shqiptuar fjalët me grykë. Deri në grykë.","Pjesa e sipërme dhe me e ngushtë e një shisheje, e një ene a e diçkaje tjetër; pjesa e përparme e një gypi, nga ku del ujë a një lëng tjetër; vend i ngushtë, nga ku futet brenda ose nga ku del diçka; vrimë në trajtë hinke a kanali. Gryka e shishes. Gryka e gjymit. Gryka e pusit pjesa e sipërme e pusit, e rrethuar me mur. Gryka e vullkanit. Gryka e thesit. Gryka e çorapit. Gryka e çizmes. Mbush deri në grykë. Me grykë poshtë.","sh. ~A, ~AT bised. Sasia e ujit a e një lëngu tjetër që përcjellim në stomak me një gllënjkë; sasia e ujit ose e një lënde tjetër që del nga një tub. Marr një grykë ujë. Pi dy-tre gryka.","sh. ~Ë, ~ËT bised. Goja. Ka pesë grykë për të ushqyer. Iu mbyll gryka. Kyçe grykën! S'ka grykë të flasë. Ia mbylli grykën ia mbylli gojën, nuk e la të flasë; e bëri që të mos ketë ç’të thotë.","sh. ~A, ~AT tek., usht. Pjesa e përparme e tytës së një arme, vrima e tytës së një arme nga ku del predha; tytë. Gryka e pushkës (e topit, e çiftes). Grykë zjarri armë artilerie, top. Kundërajror me katër gryka.","vet. sh. ~Ë, ~ËT mjek., bised. Gjëndrat në trajtë të bajames që ndodhen në të dy anët e fytit, rrëzë gjuhës; bajamet; sëmundje që shfaqet me pezmatimin dhe qelbëzimin e këtyre gjëndrave. I dhembin (e zunë) grykët. Hoqi grykët.","sh. ~A, ~AT. Këmishë me mëngë të gjera e me jakë të mbyllur; mitan me jakë të mbyllur.","Pjesë e këmishës, e fustanit etj. që rrethon qafën, jakë; jaka e një këmishe a fustani të mbyllur; grykëse, Gryka e këmishës (e trikos, e fustanit). Këmishë pa grykë. Mbërthej (zbërthej) grykën.","Pjesa e kthyer e shtizës së parmendës që lidhet me plorin, shtizë.","sh. ~A, ~AT gjeogr. Vend i ngushtë dhe i thellë midis dy maleve, zakonisht gjatë rrjedhës së një lumi a përroi; ngushticë a shteg i thellë mali ku mund të kalohet. Grykë shkëmbore. Grykë mali. Grykë lumi (përroi).","sh. ~A, ~AT gjeogr. Vendi ku derdhet lumi në det, në oqean etj.","sh. ~A, ~AT gjeogr. Gji në det ose në liqen midis brigjesh të larta, pjesa e detit që hyn si një rrip brenda në tokë. Grykë deti.","fig. Pjesa e sipërme, më e yndyrshme dhe më e mirë e një gjelle a e një ushqimi tjetër të lëngshëm; kreu, krenaja; ajkë. Gryka e gjellës. Gryka e qumështit ajka. Gryka e kazanit të rakisë. Marr grykën e grykën.","fig. bised. Fillimi i një kohe; pragu i një ngjarjeje ose pikënisja e saj. Në grykë të javës (të muajit). Në grykë të festës. Në grykë të kryengritjes.","përd. ndajf. Fytafyt, grykas; në grindje të vazhdueshme njëri me tjetrin. Shkojnë grykë. * E gënjeu gryka u gënjye nga diçka e jashtme, nuk i doli ashtu siç e priste, u mashtrua. Grykë për (me) grykë fytafyt, fytas, grykas. Me grykën e pushkës (nga gryka e pushkës) shih te PUSHK/Ë,~A. Nën grykën e pushkës (e topit) duke e kërcënuar a duke e frikësuar me armë. Iu hodh në grykë (në fyt) dikujt a) iu vërsul, e sulmoi; b) nuk e la të vijonte me tej diçka që nuk i pëlqente. Ia hodhi grykës shih te HEDH. Ia kthen me grykë shoqëron një këngë (labe) duke kënduar me grykë. E njomi grykën (fytin, gurmazin) shih te NJOM","Iu tha gryka (goja, buza, gurmazi) për diçka shih te THAHEM. E theri në grykë i bëri dëm të madh, e mori në qafë. I zë grykën dikujt shih te ZË. I zëntë grykën (fytin) mallk. shih te FYT,~I. U zu (u kap) për gryke (për fyti) me dikë shih te FYT,~I. E zuri (e kapi, e mbërtheu) për gryke (për fyti) shih te FYT,~I. Iu bëftë halë në grykë! mallk. shih te HAL/Ë,~A. M'u bë lak në grykë (në fyt) shih te LAK,~U. I derdh (i tret) plumb në grykë (në gojë) shih te DERDH. Është në grykë (në buzë, në zgrip) të varrit shih te VARR,~I. Është me litar në grykë dikush është përpara një rreziku të madh, është përpara varjes a pushkatimit; është në hall të madh, është përpara një nevoje a vështirësie të madhe a përpara një detyrimi të rëndë. Ha (pi) me dy gryka është i pangopshëm, është grykës i madh. I hodhi (i vuri) lakun (litarin) në grykë (në fyt, në qafë) dikujt shih te LAK,~U. E kishte halën në grykë shih te HAL/Ë,~A. E kishte lakun (litarin, thikën) në grykë (në fyt) shih te LAK,~U. E ktheu thesin me grykë poshtë i harxhoi të gjitha ç'kishte, i zbrazi hambarët, mbeti pa gjë në shtëpi. Iu lidh buka (në grykë, në fyt) shih te LIDHEM. Iu lidh (iu bë, ia mblodh) një nyjë në grykë (në fyt) shih te NYJ/Ë,~A. I mbeti (i ngeci, i ngriu) fjala në grykë (në buzë, në gojë, në fyt) shih te FJAL/Ë,~A. E mori me qafë gryka a) u shkatërrua nga shpenzimet e tepërta për të ngrënë e për të pirë; b) u shkatërrua nga të pirët, e mori më qafë rakia. U ngop deri (gjer) në grykë hëngri jashtë mase, aq shumë sa s'mundet më. Ia solli në grykë të pushkës dikë a diçka shih te PUSHK/Ë,~A. Iu shtrëngua litari në grykë (në fyt) dikujt shih te LITAR,~I. Iu tha pështyma në grykë (në fyt) shih te PËSHTYM/Ë, ~A. Thes me dy gryka njeri me dy faqe. E vuri në grykë (në bisht) të lahutës dikë shih te LAHUT/Ë,~A. I ka vënë shkelmin (këmbën, duart) në grykë (në fyt, në gjoks) dikujt shih te SHKELM,~I. I vuri thikën (thonjtë) në grykë (në fyt) dikujt e shtrëngoi që të bënte diçka patjetër, e detyroi me mjete a me mënyra të egra e pa mëshirë, i vuri litarin në gryke. I ka ardhur mëlçia në grykë shih te MËLÇI,~A. Iu ngritën (iu mblodhën, i erdhën) zorrët në grykë (në fyt, te goja) shih te ZORR/Ë,~A. Të zë në grykën e këmishës shih te KËMISH/Ë,~A. Iu zgjidh (iu çel) gryka thesit filloi të flasë e t'i tregojë të gjitha sa mbante të fshehura. Bie shi me grykë pusi (gjymi, shtambe) shih Bie shi me gjyma (me shtamba, me legenë, me kova, me ibrikë) te GJYM,~I. Është futur në borxhe deri në grykë ka marrë borxh shumë para e te shumë veta, është mbytur në borxhe. Nuk e fut dot në grykën e pushkës është trim e dinak, di t'i bëjë dredha plumbit. Të puthsha grykën e pushkës! ur. shih te PUTH. Grykët e bardha (gryka e keqe, gryka e ligë) mjek. bised. difteria."]}]</script>
