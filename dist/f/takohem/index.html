<script>window.__INITIAL_DATA__ = [{"slug":"takohem","term":"TAKOHEM","attributes":["vetv."],"definitions":["Ndeshem me dikë në rrugë arë një vend tjetër; i jap dorën dikujt a përshëndetem me dikë kur e ndesh diku, piqem me një njeri që më del përpara. U takua me shokun (me mikun, me një të njohur). U takuan padashur (rastësisht). Takohen çdo ditë. Mali me mal s’takohet, njeriu me njeriun takohet. fj.u.","Piqem me një mik, me një të njohur, me një të dashur etj. dhe rri me të një kohë për t'u çmallur, për të biseduar etj.; i dal përpara dikujt për ta përshëndetur, e pres si mik. Takohem me një shok (me një shoqe). Takohem me miqtë. U takua me delegatët. U takuan në mbrëmje.","Shkoj te dikush a thërres dikë për t'i thënë diçka, për të zgjidhur një çështje, për t'i marrë mendimin a për t'i dhënë llogari, për t'iu ankuar, për t'i kërkuar diçka etj.; mblidhem së bashku me të tjerë për të rrahur një çështje, për të vendosur për një gjë etj. Takohemi me punëtorët (me fshatarët). U takua me zgjedhësit. U takua me kryetarin (me ministrin, me shkrimtarin). U takuan në kongres (në mbledhje).","vet. veta III. Puqet një gjë me një tjetër, afrohen dy a më shumë gjëra sa të piqen njëra me tjetrën; bashkohet me një tjetër. Takohen çatitë (majat e pemëve). Takohen anët (buzët) e dy dërrasave. Takohen dy shkronja. Takohet t-ja me h-në. Ku takohet qielli me tokën ku duket sikur qielli prek tokën.","vet. veta III. Ndeshet diçka në jetë, në punë etj., haset, del përpara. Mund të takohen disa vështirësi (pengesa). Takohen dukuri të panjohura. Takohet nganjëherë (shpesh, rrallë).","sport. Ndeshem me një tjetër, zhvilloj një garë sportive me dikë, luaj me dikë. U takuan në fushë asnjanëse.","Pës. e TAKOJ 4,6,9. * Më takohen sytë me dikë shkëmbej vështrimin me një tjetër, shihem sy ndër sy me dikë. Kur të takohet (të bashkohet, të puqet) qielli e toka (qielli me tokën) iron. shih te QIELL,~I."]}]</script>
