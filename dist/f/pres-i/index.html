<script>window.__INITIAL_DATA__ = [{"slug":"pres-i","term":"PRES I","attributes":["kal."],"definitions":["Heq një pjesë nga e tëra me një përdorëse a mjet të mprehtë (me thikë, me gërshërë, me sëpatë etj.); ndaj diçka në pjesë, e bëj pjesë-pjesë me një vegël të tillë. Ia prenë degët e thata. Pres anët e letrës (e teneqesë). Pres bukën (mollën, pjeprin, mishin). Pres dru bëj dru në pyll. Preu shiritin (kur inaugurohet një vepër) inauguroi, përuroi. Pres me thikë (me sëpatë, me gërshërë, me sharrë). Pres me dysh (me tresh). E preu thela-thela (copa-copa). E preu për së gjati (për së gjeri).","Shkurtoj, heq, krasit, korr, kosit, rrafshoj etj. diçka me një përdorëse a mjet të mprehtë. Preu flokët i shkurtoi ose i hoqi fare. Pres thonjtë. Pres misrin korr misrin. Prenë pyllin. E preu mollën se u tha. Ia prenë këmbën (dorën, gishtin). Ia prenë kokën. I preu kërthizën. Prenë vreshtin e krasitën.","Çaj së gjati një pjesë të trupit me thikë, me brisk, me sëpatë, me sharrë etj., plagos me një mjet të tillë. Preu gishtin (dorën, këmbën). E preu pak berberi. E preu me brisk (me xham). E ka prerë thellë.","bised. Ther me thikë a me një vegël tjetër të mprehtë. Preu një dele (një dash, një pulë). Ia prenë djalin nazistët.","Vras në masë, ther shumë vetë; shfaros me shumicë, grij. Armiqtë vranë e prenë pleq, gra e fëmijë. E prenë armikun në qafë të malit. E prenë bletën e mbytën bletën për t'i marrë mjaltin. Ia preu lia pulat. E preftë murtaja (kolera, e zeza, mortja)! mallk.","jokal. vet. veta III. Është i mprehtë, mund të ndajë lehtë një pjesë nga e tëra, të çajë diçka etj. (për thikën, gërshërën, sëpatën etj.). Thika (sëpata) nuk priste mirë. Ky brisk nuk pret. Sharra priste shumë.","E çaj me diçka të mprehtë; vet. veta III hyn në mish dhe e çan si me thikë; futet diku dhe e çan. I ka prerë këmbët nëpër truskë. I preu gishtin një gjethe (një rrasë e hollë, një xham). M`i preu spangoja duart. E ka prerë litari. E preu me dhëmbë.","Ndaj me gërshërë një copë stofi, basme etj. Në pjesë sipas përmasave të trupit kur qep një kostum, një fustan etj.; qep një petk të ri. Pres një kostum (një pallto, një palë pantallona, një fustan, një këmishë). Di të presë e të qepë.","Caktoj a shënoj me përpikëri kufijtë e diçkaje, i vë shenjë kufiri; e ndaj a e bëj diçka sipas një forme, një kallëpi etj. Prenë themelet e ndërtesës. Presin tulla (tjegulla). Pres me vija.","Ndaj me diçka, e bëj në pjesë; vet. veta III e takon dhe e ndan më dysh, më tresh etj. E preu me një vijë. E preu arën me katërsh me hendek. Lumi e pret fushën më dysh. E pret pak në cepa. Vija AB pret vijën CD. gjeom.","Prodhoj e nxjerr në qarkullim një monedhë të re (zakonisht të metaltë). Këtë monedhë e kanë prerë ardianët.","Marr një biletë, një faturë etj. kundrejt një pagese; marr një dokument për një porosi a për diçka tjetër. Premë bileta për teatër. Preu fletëdaljen (fletëporosinë, faturën).","Kapërcej rrugën kryq përpara dikujt; i dal përpara dikujt në rrugë dhe e pengoj të shkojë më tej; i zë udhën, e ndaloj ose i ndërroj drejtimin; kthej. Na preu rrugën një gjarpër. U pres ballin deleve i kthej në një drejtim tjetër. Prite kalin (dhinë) se iku!","edhe jokal. bised. Kaloj drejt e mes për mes një hapësire nga bie më shkurt; i bie, shkoj; kthej; bie. Prenë djathtas (majtas). Prenë në një rrugë anësore. Preu përmes arave (fushës, pyllit). E preu timonin majtas (djathtas). Pret shkurt (gjatë) rruga andej.","fig. Them diçka shpejt dhe në mënyrë të vendosur; i përgjigjem menjëherë e shkurt për të mos e lënë dikë të flasë a të vijojë më tej. S`është ashtu - ia preu tjetri. Ia preu shkurt (ashpër). Ia preu aty për aty. Ma preu më tha fjalën e fundit, më tha mendimin e tij të pandryshueshëm.","fig. bised. Caktoj diçka përfundimisht (një çmim, një dënim, një afat etj.); vendos, e ndaj mendjen. Nuk ia preu çmimin (pazarin). Prenë ditën e dasmës. Nuk e ka prerë ç`zanat do të marrë. E prenë të niseshin bashkë.","vet. veta III (me një trajtë të shkurtër të përemrit vetor në r. kallëzore) fig. Më than, më ngrin; më hyn deri në palcë. Më preu era. Na preu të ftohtët (acari, dimri). Të pret veriu (thëllimi).","jokal. vet. veta III (me një trajtë të shkurtër të përemrit vetor në r. dhanore) fig. Më dhemb shumë, më ther, më sëmbon (një pjesë e trupit). Më pret barku. Më pret në shpatull.","fig. Ndaloj diçka që kam nisur, e lë, ndërpres punën e dikujt a të diçkaje; nuk e lë të vijojë tutje, e ndal, ndërpres. E preu duhanin (rakinë) e la, nuk e pi më. I prenë punimet. E preu këngën (bisedën, punën, lojën). I prenë shakatë. Na e prenë ndihmën. U prenë ujin (dritën). Ia preu gjakun. I pritnin rrogën (bukën). Ia preu sisën foshnjës. Ia preu fjalën (në mes) nuk e la të fliste më; e ndërpreu kur fliste. E preu shoqërinë me të. I prenë marrëdhëniet.","fig. (me një trajtë të shkurtër të përemrit vetor në r. kallëzore). E dobësoj a e pakësoj diçka; ia ul ose ia ndal forcën, vrullin etj.; shkurtoj, këput. Ia preu vrullin (hovin). Ia preu vrapin. Ma preu fuqinë. Ia preu oreksin. M`i preu këmbët (gjunjët, krahët, duart). Na preu e përpjeta na lodhi shumë, na këputi. E preu vdekja e djalit (ai lajm i hidhur). Ai bar ua pret qumështin bagëtive.","I shtie supës diçka zakonisht të thartë për ta përgatitur lëngun sipas një mënyre të veçantë; i hedh qumështit, hirrës etj. tharm ose diçka tjetër për ta mpiksur; mpiks. E preu qumështin djathë (gjizë). E preu supën me limon (me vezë). Preu pekmezin.","fig. Nuk e mbaj fjalën a besën që i kam dhënë dikujt; e tradhtoj dikë, i dal i pabesë, e lë në baltë. E preu në besë nuk ia mbajti besën e dhënë. E preu në fjalë nuk e mbajti fjalën, e gënjeu.","edhe jokal. fig. bised. Kap, kuptoj; mendoj, e marr me mend. Siç ma pret mua. Ashtu ma preu. Aq ia pret atij. Nuk ia pret fare. Pret hollë. Nuk ia pret mendja. S`ia pret mendja (koka, fiqiri, poçi) edhe poh. Nuk ma priste mendja se...","fig. bised. (me një trajtë të shkurtër të përemrit vetor në r. kallëzore). Kam shumë nevojë për dikë a dëshirë për diçka, këputem për të; s'duroj dot pa të, e dua shumë; kam nevojë të ngutshme për të bërë diçka, mezi duroj, s'më durohet. E preu për gjumë i flihet shumë. Më preu për bukë (për të ngrënë) më hahet shumë. Nuk më preu për atë njeri nuk kam mall për atë njeri, aq më bën për të. E preu uria. E preu ujët e hollë.","Ia marr këngës pas këngëtarit të parë me zë plotësues, ia kthej me zë të dytë. Njëri ia merr e tjetri ia pret. Ia priste bukur. * I preu bishtin dikujt ia hoqi gjërat e tepërta që ka e nuk i meriton. Ia preu me brisk shih te BRIS/K, ~KU. Ia preu me cakorre dikujt shih te CAKORR/E, ~JA. E preva derën e dikujt nuk shkoj më te dikush. Ia preu derën d i k u j t nuk e lë të hyjë e të dalë diku, ia mbylli hyrjen; nuk e qas më në shtëpi. Ia preu (ia shkurtoi) dorën (duart) dikujt shih te DOR/Ë,~A. I preu (i shkurtoi, i thau) duart (dorën, krahët) shih te DOR/Ë,~A. I ka prerë një gërshërë (janë prerë me një gërshërë) shih te GËRSHËR/Ë,~A. Ia prenë gëzofin shih te GËZOF,~I. E preu gojën dikush a) është në agoni, po vdes e nuk flet dot; b) nuk flet më; nuk kërkon dot më asgjë. Preu gozhdë (thumba) mërdhiu shumë, ngriu së ftohti. Ia preu me hanxhar shih te HANXHAR,~I. Sikur i ka prerë kërthizën shih te KËRTHIZ/Ë,~A. E pres kokën! e them me bindje të plotë diçka, jam shumë i sigurt. I ka prerë kokën dikujt i ka ngjarë krejtësisht, është gjallë ai. I preu (i këputi) lakun dikujt shih te LAK,~U. Pret (vret) larg shih te LARG. Ia preu litarin dikujt shih te LITAR,~I. E preu malli (barku) për dikë a për diçka! iron. nuk e merr malli për të, as që do ta shohë me sy. Ta pret mendja! sigurisht, natyrisht, vetëkuptohet. I pret edhe myka shih te MYK/Ë, ~A. Ia preu orën (ditën, jetën) dikujt e vrau, e vdiq. Pret perin dikush është shumë i hollë nga mendja, është shumë i zgjuar e i mprehtë. Pret e qep dikush ç'thotë ai bëhet, ka në dorë edhe gurin edhe arrën. Ia pres rrënjët diçkaje e zhduk me rrënjë diçka në mënyrë të tillë që të mos shfaqet më. Pres (shkul, përmbys) nga rrënjët (me rrënjë) shih te RRËNJ/Ë,~A. I pres rrugën (udhën, shtegun) diçkaje marr masa që më parë që të mos ndodhë a të mos zhvillohet më, ia mbyll shtegun, e ndaloj. Ia preu (i ra) me sëpatë shih te SËPAT/Ë,~A. I ka prerë një sharrë shih te SHARR/Ë,~A. E pres (e ndaj) me thikë diçka shih te THIK/Ë,~A. Ia preu thonjtë dikujt shih te THUA, THOI. Ia preu veshët dikujt e bëri që të mos mbahet më të madh, ia uli hundën, e bëri që t'i bien pendët. Ta pret xhokën dikush të bën zap, ta mbledh, t'i fut të dyja këmbët në një këpucë. Vriste e priste shih te VRAS. Gjuha pret hekurin (çan gurin, çan shkëmbin) fj. u. shih te GJUH/Ë,~A I. I preu drutë shkurt me dikë shih te SHKURT. I pret me dy teha dikujt shih tek TEH,~U. I pret gjuha (goja) brisk (gozhdë, hekur) flet rrjedhshëm dhe me mprehtësi; ta jep përgjigjen menjëherë; është shumë i zgjuar. Preje (shkurtoje) gjuhën! shih te SHKURTOJ. Është për t'i prerë (për t'i rrëmbyer) kokën shih te RRËMBEJ. Është «pre e mos kosit» flet shumë dhe vend e pa vend, flet kot. Pre mish e ha shih te MISH,~I. S'ia pret njeri qimen (perin) është i zoti e i zgjuar, nuk mund t'ia hedhë dot njeri, s'e mashtron dot. Ka prerë para të madhe dikush ka fituar shumë para. Ia preu thekun gruas vjet. shih te THEK,~U I. I priste shpata (palla, kordha, jatagani, sëpata) djathtas e majtas (nga të dyja anët) fliste e vepronte si donte vetë, s'pyeste për të tjerët. Nga një anë të puth, nga tjetra të pret keq. shtihet si i mirë, por s'është i tillë, të vret natën e të qan ditën, është njeri me dy faqe. Preje për vete e vishma mua! mendo edhe për të tjerët si për vete. Mat tri (shtatë, dhjetë) herë e pre një herë! fj. u. shih te MAT."]}]</script>
