<script>window.__INITIAL_DATA__ = [{"slug":"bie-i","term":"BIE I","attributes":["jokal."],"definitions":["Rrëzohem nga një vend i lartë në një vend më të ulët, këputem nga lart posht ë(për trupat nën veprimin e peshës së tyre). Ra një tullë (një gur, një kokërr). Ra tavani. Ra një yll. Ra një aeroplan. Ra nga shkëmbi (nga buza, nga bregu). Ra nga pema (nga dega). Ra nga çatia (nga muri, nga dritarja, nga kati i dytë). Ra nga kali (nga biçikleta, nga makina). Ra zogu nga çerdhja. Ra nga qielli. Më ra nga duart. Më ra nga xhepi. Bie nga lart. Ra në pus (në gropë, në humnerë, në lumë, në përrua, në det). Bie në fund. Bie përtokë (përdhe). Bie shpejt (lirisht, butë, me forcë). Ra më këmbë. Dardha nën dardhë bie. fj.u.","Rrëzohem përdhe, kur humbas mbështetjen, lidhjen ose drejtpeshimin; rrëzohem padashur, gremisem, shembem. Ra lisi (mullari). Ra shtëpia (muri, gardhi). Ra makina. Ra në borë (në baltë, në rrugë, në kalldrëm, në dysheme). Ra me bark (përmbys, më hundë, sa gjatë gjerë). Ra i vdekur (top, shakull, në vend, pa ndjenja). Ra e u vra (theu këmbën). U pengua (rrëshqiti) e ra. Mbaje të mos bjerë! Lëre të bjerë! Gati (desh) rashë. Ka rënë gruri.","vet. veta III. Shqitet, hiqet a shkëputet nga një vend ose nga e tëra, rrëzohet. Bien gjethet. I ranë qimet (flokët). Po i bie lëkura. I ranë dhëmbët. I ranë pendët. I ra pushi. I ra korja (plagës). Më ra thoi. Ra suvaja. I ka rënë boja. I ka rënë pulla (zarfit). I ra gjuha këmborës. Bie një rrokje (një tingull). gjuh.","Ulem vetë ndenjur, më gjunjë ose shtrirë; shtrihem; hidhem, lëshohem drejt dikujt a diçkaje. Bie në shtrat (në krevat, në rroba, në dyshek). Bie barkas (më gjunjë, përmbys, në shpinë). Bie poshtë shtrihem të fle. Bie të fle. I ra në krahë (në prehër, ndër këmbë). Ra i sëmurë zuri shtratin nga një sëmundje. Ra lehonë qëndroi e shtrirë në shtrat si lehonë; nisi lehoninë. Bie me pulat. bised. shtrihet të flejë shumë herët.","Rrëzohem i plagosur ose i vdekur; vritem a vdes, jap jetën për një çështje të drejtë. Ra në betejë (në luftë, në fushën e nderit, në krye të detyrës). Ra dëshmor (si hero, heroikisht). Ra për liri (për atdhe). Ra fli (theror). Një bie, mijëra ngrihen.","vet. veta III. Rrjedh teposhtë, kullon, del e shkon poshtë; bised. derdhet (për lumin, përruan etj.). Bie ujëvara (rrëkeja, çurka). Më bien lot. Më bie gjak nga hundët. I bien jargë. Më bien djersë. Bie pikë-pikë. Lumi bie në det.","vet. veta III. Rrëzohet mbi tokë nga lart (për reshjet); përhapet mbi tokë e mbi sendet, mbulon tokën e sendet. Bie shi (borë, breshër, llohë, vesë). Bie brymë. Bie mjegull. Bie pluhuri (tymi). Bie me shtamba (me rrëshekë). Fryn e bie.","vet. veta III. Varet lirshëm teposhtë; ulet e mbështetet lirshëm mbi diçka tjetër, shtrihet mbi diçka. Bie perdja. I ranë krahët poshtë. I kanë rënë supet. I ranë pantallonat. I ra koka në gjoks. I bien flokët mbi supe (mbi ballë). I bie kapela mbi sy. I ka rënë gusha. I kanë rënë faqet.","Heq dorë nga qëndresa, pushoj qëndresën, dorëzohem (për kala, për qytete, për shtete). Ra qyteti. Ra kështjella (kalaja). Ra perandoria. Ra pa luftë.","Zbres nga fuqia, humbas pushtetin, vendin, detyrën etj.; caktohem në një detyrë më të ulët; vet. veta III humbet fuqinë vepruese, nuk vepron më, shfuqizohet (për ligjet. etj.). Ra qeveria (kabineti). Ra nga fuqia (nga froni). Bie një ligj nga fuqia. Ra ky mendim.","vet. veta III. Zbret pjerrtas ose pingul, shkon drejt një vendi më të ulët. Shkëmbi bie thikë. Shpati bie pingul (pjerrtas). Kodra bie butë. Bie shkallë-shkallë.","Shikoj në një drejtim, përshkoj; i dal; vet. veta III kalon, del. I bie fushës (bregut të lumit). Bjeri vaut! I bie nga kjo rrugë. I bie shkurt (drejt, rrotull, qark, anash, nga e majta, nga qendra). I ra kryq e tërthor (pash më pash). I ra lumit tej për tej. I ra me not. I bie përpara i dal përpara. I ra prapa (pas) e ndoqi riga pas. I ka rënë botës mbarë.","Zbres, lëviz tatëpjetë; shpërngulem e zbres nga një krahinë më e lartë dhe vendosem në një më të ulët; vij a shpërngulem nga malësia në fushë ose nga fshati në qytet. Ra në fushë. Ranë në Shkodër.","bised. Vete për të bujtur, shkoj për të kaluar natën. Ranë te një mik. Ra në hotel. I ra në shtëpi.","vet. veta III. Ulet, pakësohet (si numër, si sasi, si vëllim etj.); edhe veta I më ulet vlera, humbas cilësinë, zbres në një shkallë më poshtë. Bie numri. Ra çmimi. Ranë aksionet. Ra kursi. Ra shpejtësia. Ra prodhimi. Ra lumi. Ra niveli. Ra në kategorinë e dytë. Ra goma u shfry goma. I ra barku. I ra vlera (ndikimi, autoriteti).","vet. veta III. Pakëson a humbet forcën e vet, i ulet vrulli, dobësohet, zbutet. Ra era (deti). Ra të nxehtët (të ftohtët). Flakët po binin. Bie fashë qetësohet, pushon. I ranë ethet. I ra temperatura. Ra trysnia. Ra vrulli (ritmi). I ra gëzimi (entuziazmi). I ra inati (zemërimi). Biseda ra. Ra kureshtja (interesimi). Puna nuk binte.","fig. Humb vlerat a cilësitë e mira; më keqësohet gjendja; ulem nga ana morale, marr të tatëpjetën. Ra nga mjeshtëria (nga zanati). Ka rënë në mësime. Bie nga shëndeti. Ra nga gjendja. Ra në sytë e të tjerëve. Ra moralisht (shpirtërisht). Ka rënë, s'është më i pari. Sa poshtë ka rënë.","vet. veta III. Ndodh, vjen rastësisht; qëllon. rastis; e merr, e prek, e përfshin (kryes. me një trajtë të shkurtër të përemrit vetor në r. dhanore). Më ra udha (rruga). Më ra rasti. Më ra puna. I ra (e zuri) lotaria. Më ra ndër mend. I ranë sytë mbi diçka. Më ra (më hyri, më shkoi, më erdhi) në vesh. Më ra papritur (e papritur, befas). Ra fjala. Sido që të bjerë puna. Lajmi ra si bombë. Ra biseda (muhabeti). Ra tërmeti. Me ç'të më bjerë në dorë. I ra një vdekje. I ra plani një shtëpie etj.","vet. veta III. Qëllon në një kohë të caktuar, e ka kohën në një vit, në një muaj, në një javë a në një ditë të caktuar, rastis. Bie të hënën. Bie në fund të javës. Kur bie Viti i Ri? Ra në pranverë.","edhe fig. Ndodhem papritur ose padashur në rrethana zakonisht të këqija e të vështira; arrij në një gjendje të caktuar, kaloj në një gjendje shpirtërore; hyj, futem (edhe në një varg njësish frazeologjike). Ra në grackë (në lak, në kllapë, në kurth, në grep). Ra në greminë. Ra në pritë (në pusi). Ra në rrezik (në fatkeqësi). Ra në hall (në vështirësi, në bela). Ra rob (pre, viktimë). Ra në burg. Ra brenda. thjeshtligj. e futën në burg. Ra në duart (në thonjtë, në kthetrat) e dikujt. Ra nën sundimin (nën ndikimin) e dikujt. Ra ngushtë (keq). Ra në gjak (në armiqësi). Ra në zi. Ra në gabime. Ra borxh. bised. Ra në përleshje (në luftë, në përpjekje). Ra në varfëri (në mjerim, në skamje). Bie në mendime (në mëdyshje). Ra në të thella. Ra në të zeza u zhyt në mendime të këqija. Ra në dëshpërim (në hidhërim). Ra në dashuri. Ra në plogështi. S'bie në vetëkënaqësi (në shkollarizëm, në formalizëm). Ranë në oportunizëm (në idealizëm, në subjektivizëm). Ranë kllapi. Bie në gjumë (në qetësi, në heshtje). Ra në krizë (në amulli). Ra me barrë. Ra klloçkë pula. Më ranë veshët rehat. bised. Ra si miu në hauz (në poç). Shpëtoi nga shiu e ra në breshër. fj.u. Shpëtoi nga lumi e ra në det. fj.u. Iku nga tymi e ra në zjarr. fj.u.","Ndesh papritur në diçka; gjej;. befas diçka, zakonisht me shumicë; turrem i etur mbi diçka. Ra në tokë të butë. Ra sharra në gozhdë. Ramë në një pyll. Gjeologët ranë në bakër. Ra në para (në bollëk). Ranë në mina. Bie në gjurmë. Delet ranë në kripë. Ra si kali në tagji.","Qëlloj në një grup njerëzish, rastis me të tjerë, hyj rastësisht në marrëdhënie me dikë ndodhem. Ra në një familje (në një kolektiv) të mirë. Kishte rinë me shokë të këqij. Ra në një klasë të dalluar. Ra me ca udhëtarë të njohur.","edhe fig. E godit, e qëlloj me diçka (zakon. me një trajte të shkurtër të përemrit vetor në r. dhanore). I ra me gur (me grusht, me shkelma, me pëllëmbë, me shkop, me kamxhik). I ra me pushkë (me kobure, me top, me shpatë, me shigjetë). I ra kokës (turinjve). I ra në kurriz (në krah). I ra kalit. I bie topit. I bie tokës me këmbë. Më ra era në shpatulla. I ra rrufeja. I ra nga prapa. I ra në lule të ballit. S'bie rrufeja dy herë në një lis. fj. u. Nuk bie reja (rrufeja) në hithra. tall. Nuk i hipën dot dardhës, i bie fikut. fj. u. S’ka ç'i bën gomarit, i bie samarit. fj. u.","vet. veta III edhe fig. Drejtohet, shkon në një pikë a në një vend të caktuar, përplaset a zë vend diku; më prek a më godit një nga shqisat a një organ te trupit (për dritën për erën, për zërin etj.); më prek a më godit ndjenjat. Ra në shenj. I bie drita. Më bien rrezet në sy. Topi ra në mur. I ra dielli në kokë. Më ra rëndë ushqimi. I ra rëndë ajo fjalë. Më ra si plumb,(si rrufe).","Godit diçka: për të nxjerrë një tingull a një zë, bëj të tingëllojë; vet. veta III nxjerr një tingull a një zë kur goditet, tingëllon; dëgjohet (një zë, një krismë etj.). I bie derës (ziles, çangës). I bie daulles. I bie fort (ngadalë). Bie dera (zilja, kambana, telefoni, ora). Bie, boria (sirena). Bien pushkë. I bie pragut të dëgjojë dera (i bie derës të dëgjojë qilari) e hedh fjalën për diçka. Kur ta varësh zilen, duhet t'i biesh. fj. u.","Luaj me një vegël muzikore; luaj një pjesë muzikore; vet. veta III nxjerr tinguj një vegël muzikore, dëgjohet, tingëllon. I bie një vegle:I bie lahutës (fyellit, çiftelisë, gajdes, violinës, pianos). Nuk di t'i bie kitarës:Binte muzika. Binin sazet. I bie një kënge popullore (një valsi, një tangoje)","Sulem mbi dikë a mbi diçka, vërsulem; e sulmoj dhe e godit. Ranë mbi armikun. I ranë pushtuesit. Bini mbi ta! I ranë qytetit. Ra ujku ndër dhen. Ra bisha në bagëti. Ra dhelpra në pula.","fig. bised. Sulmoj me fjalë, qortoj a kritikoj rreptë; i vërsulem, e godit. I ra kundërshtarit. I ra një vepre (një romani). I ra pa të drejtë. I ra në kokë. I ra pas shpine (prapa krahëve).","vet. veta III. Ndodhet në një vend, gjendet, shtrihet në një anë, është. Bie në veri. Bie afër (larg). Bie nga e majta (djathtas). Ku bie ky fshat? Na bie në rrugë. Bie nga oborri. Bie në Shqipëri. Bie i treti (i fundit). Theksi bie në fund. gjuh.","vet. veta III. Fillon, vjen dhe përhapet, shtrihet e sundon mbi dikë a mbi diçka, mbulon, pllakos. Bie errësira (nata, mbrëmja, muzgu). Ra agu (mëngjesi). I bie drita (hija). Ra drita zbardhi agoi. Ra dielli doli dielli. Ra qetësi (heshtje). Ra zjarr. I ra flaka. I ra, një çehre (një ngjyre) e verdhë. 31. vet. veta III fig. Vjen e përhapet; me kap, më zë, më prek, më godit; më vjen. Ra gripi (kolera). I ra një sëmundje. I ra barku i verës. I ra sëmundja e tokës. U ra flama (pulave). I ra pika (damllaja). U ra krimbi. I ra të fikët. I ra në zemër. Më ra për thonjsh (nga të ftohtët). I ra gjaku e zuri gjaku. Më ra vera në kokë. I ra një fatkeqësi (një e keqe). I kanë rënë halle. I ra mbi kokë (barra e një pune). Dyshimi binte mbi të. I rëntë flama! mallk. I rëntë pika! Pika që s'i bie! maspërf. 32. Hyj në marrëveshje me dikë, hyj në marrëdhënie të caktuara me të; pajtohem në mendime a në veprime me dikë, lidhem. Bie në marrëveshje (në ujdi, në fjalë). Bie në kuvend. Ranë në pazar. S’bie në kompromis. libr. Ra në grindje,(në sherr). Bie në kundërshtim me dikë; a me diçka. 33. bised., Kam lidhje gjaku, farefisnie ose afërsie. Më bie kushëri i parë (kunat). Bien baxhanakë (krushq). 34. bised. Bëj një punë shpejt me një vegël; heq a pastroj me një mjet; punoj me një vegël, i jap (zakon. me një trajtë të shkurtër te përemrit vetor në r. dhanore).I rashë me fshesë dhomës. U bie më furçë këpucëve (rrobave, mureve). I bie me brisk mjekrës (faqes). I bie me drapër (me kosë). Ra drapri (në ara) nisën te korrat. I bie kosës me grihë (me limë). I bie me zdrukth. Bjeri kazmës! puno! 35. bised. Jepem pas diçkaje, më tërheq shume diçka; lidhem me dikë a me diçka dhe kujdesem shumë për të. Bie pas muzikës (pas pikturës, pas artit; pas sportit). Bie pas bujqësisë. Bie pas gjahut. Ka rënë pas librave. Bie pas punëve. Kishte rënë pas qejfeve (pas rehatit, pas rakisë). Bie pas fëmijës. 36. fig. Lodhem shumë, duke bërë të njëjtën gjë vazhdimisht, këputem se beri diçka pa pushim (edhe në disa njësi frazeologjike). Më ranë këmbët (copë) së ecuri (së kërkuari). U ranë krahët (së punuari). I binin thonjtë (së lari rroba, së bëri çorape). U ranë kryqet (kërbishtet).U ra bretku (kurrizi) në punë. Më ra goja (së thëni, së foluri). Më ra buza (gjuha). Na binin brinjët ( kockat). 37. bised. Nis diçka shtruar dhe i jap fund, e faroj diçka; filloj të ha me ngulm një gjellë a diçka tjetër ose të pi diçka dhe e mbaroj shpejt; i futem, i përvishem (një gjelle etj.). I ra kosit (byrekut, bakllavasë, verës). U ra fasuleve (patateve). I ra pjatës (tepsisë). U ra mollëve. U ranë shqerrave e i therën (i shitën). 38. vet. veta III. Më nxë, më vjen për shtat, më rri si duhet, më bën. Më bien mirë këpucët. S'i bie fustani. Më bien tamam. Mezi më bien. 39. vet. veta III fig. Më vjen për shtat, përputhet, pajtohet me diçka, më shkon, më vjen në një mënyrë (me një trajtë te shkurtër të përemrit vetor në r. dhanore). Na bie mirë (keq).I bie mbarë. I bie për shtat i pëlqen, i vjen ashtu si do ai. I binte pas qejfit (pas midesë, pas dëshirës). 40. vet. veta III edhe fig. bised. Më kushton; më qëllon ta blej, ta paguaj diçka (lirë a shtrenjte). Na ra lirë (shtrenjtë). U ra sa qimet e kokës e blenë shumë shtrenjtë. 41. Më përket; më takon, e kam unë përsipër. I ra në pjesë (në hise). Nga sa na bie? Më bie radha. Më bie barra (përgjegjësia). I bie për detyrë. I ra atij të fliste. Të bie ty të shkosh. I bie merita (nderi). Ra në kurrizin tim. Ra mbi supet (mbi shpatullat) e mia. Shpenzimet bien mbi të. Mos fut hundët tek s'të bie! 42. Them diçka, flas në një mënyrë. I bie drejt (shkurt anës e anës, larg e larg). I bie copë. Mirë i ka rënë. 43. vet. veta III. Lëshon, ka. Bie erë. I bie erë të keqe (goja, plaga). Bie era shkrumb. Bie erë barut. Po s'hëngre hudhra, s'bie erë. fj. u. 44. përd. pavet. sipas kuptimeve 4, 12, 14,20, 23, 25-28, 32, 34, 37, 42. S'i bihet murit me kokë. fj. u. * Ra në baltë shih te BALT/Ë,~A. Ra në bark shih te BARK,~U. S'i bie barku shih te BARK,~U. I ra në besë shih le BES/Ë~A","Ra në bigë shih te BIG/Ë,~A. Ra në bisht shih te BISHT, s shih te HIL/E, ~JA. I ra hunda tall. shih te HUND/Ë,~A. I ra në hundë diçka shih te HUND/Ë,~A. I ka rënë hunda në dhe (përdhe) iron. shih te HUND/Ë,~A. Nuk i bie hunda në shesh shih te HUND/Ë,~A. Binte jashtë vjet. shih te JASHTË. I bie jongarit shih te JONGAR,~I. I ranë (i zbritën) kacabunjtë shih te KACABUN,~I. I ranë (i zbritën) xhindët (qipujt) shih te XHIND,~I. Ra kalaja shih te KALA,~JA. Ra nga kali shih te KAL/Ë,~I. Bie kambana shih te KAMBAN/Ë,~A. Të gjithë i bien një kambane shih te KAMBAN/Ë,~A. I bie kavallit (fyellit) shih te KAVALL,~I. I ra këmbës shih te KËMB/Ë,~A. U ra (ua mbathi, ua dha) këmbëve shih te KËMB/Ë,~A. Më ra këmisha shih te KËMISH/Ë,~A. I bie kokës, (në kokë) shih te KOK/Ë,~A. I ra në kokë shih te KOK/Ë,~A. I bie kokës me grusht e shih te KOK/Ë,~A. I bie krahëve dikujt shih te KRAH,~U. I bie supeve (i rreh supet) dikujt shih te SUP,~I. Ra (u hodh) në krahët e dikujt shih te KRAH,~U. Ra në kurriz shih te KURRIZ ~I. I bie lapsit (kalemit) i bën mirë hesapet; e llogarit diçka si i del më mirë. I bie legenit thjeshtligj. shih te LEGEN,~I. I bie rrangallës shih te RRANGALL/E,~JA. I bie teneqes tall. shih te TENEQE,~JA. I ra me limë shih te LIM/Ë,~A. Ka rënë në llum (në batak) shih te LLUM,~I. I ra maska shih te MASK/Ë,~A","Bie në mendje (në vete) vjen në vete; mbledh mendjen. I bie mendjes (prapa) shih te MENDJ/E,~A. Ra mësysh vjet. shih te MËSYSH. I ra moh (hasha) shih te MOH. I bie ndesh shih te NDESH. I ra ndore dikujt shih te NDOR/E,~JA 1. I ra më not diçkaje shih te NOT,~I. Ra ora për diçka shih tek OR/Ë,~A1. I ran ë(i zbritën) orët shih tek OR/Ë,~A. I bie pas (prapa) dikujt a diçkaje shih te PAS. I bie sherrit prapa shih te PRAPA. I ranë (iu rrëzuan) pendët (puplat) dikujt shih te PEND/Ë,~A. I ra pikës shih te PIK/Ë,~A. Ka rënë poshtë dikush a diçka shih te POSHTË. S'bie poshtë shih te POSHTË. Ra (u hodh) në prehrin e dikujt shih te PREH/ËR,~RI","Ra (mbeti) pykë shih te PYK/Ë, ~A. I ra në (më) qafë dikujt shih te QAF/Ë,~A. I ra qarit sh
