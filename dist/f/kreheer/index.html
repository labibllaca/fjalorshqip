<script>window.__INITIAL_DATA__ = [{"slug":"kreheer","term":"KREHËR","attributes":["m.","sh."],"definitions":["Mjet i thjeshtë prej briri, prej druri, prej kocke, prej plastike etj., me një varg dhëmbëzash të holla në një anë a në të dyja anët, që përdoret për të krehur a për të ndrequr flokët ose për t'i mbajtur ata që të mos lëvizin. Krehër i shpeshtë (i dendur, i rrallë). Dhëmbët e krehrit. U thye krehri. Krihem me krehër.","Pjesë e avlëmendit, që përbëhet nga disa dhëmbë të hollë të vendosur njëri pranë tjetrit, nëpërmes të cilëve kalojnë fijet për të endur pëlhurën; shpatë. Krehri i avlëmendit (i vegjës). I vë krehrat.","Vegël për të lënurur leshin, që përbëhet nga dy kapakë me dhëmbëza prej metali, njërin prej të cilëve e lëvizin mbi tjetrin duke e tërhequr, gërhanë, shutra. Kapakët (dhëmbët) e krehrit. Kreh leshin në krehër.","Vegël bujqësore, që përbëhet nga një pjesë e metaltë me dhëmbë e nga një bisht prej druri dhe që përdoret për të mbledhur barin, kashtën etj. Mbledh kashtën (barin) me krehër.","Pajisje e metaltë e një arme (e pushkës, e automatikut, e mitralozit etj.), që mban fishekët; sasia e fishekëve sa mban një pajisje e tillë. Krehër pushke (mitralozi). Një krehër fishekë. Zbrazi një krehër të tërë. * Lule krehri bot. shih te LUL/E,~JA."]}]</script>
