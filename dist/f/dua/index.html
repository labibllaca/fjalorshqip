<script>window.__INITIAL_DATA__ = [{"slug":"dua","term":"DUA","attributes":["f.","sh."],"definitions":["fet. Lutje drejtuar zotit, që bëhet nga hoxha në xhami; lutje që i bën hoxha zotit gjoja për të shëruar një të sëmurë, për të larguar një të keqe etj.; letër ku shkruhet kjo lutje dhe që mbahet si nuskë (në vendet ku vepron feja myslimane). Bënte dua. Këndonte duanë. Shkroi një dua.","bised. vjet. Lutje. Bëj dua lutem. * Ha bukën e mikut e bën duanë e armikut thuhet kur dikush punon për kundërshtarin ose armikun e atij që e mban, e ushqen a e mbron."]},{"slug":"dua","term":"DUA","attributes":["kal."],"definitions":["Kam një ndjenjë dashurie, miqësie e dhembshuri për dikë a për diçka, e dëshiroj me gjithë zemër, është i shtrenjtë a i vyer për mua; kund. urrej. Dua Atdheun (popullin, vendin, fshatin, vendlindjen). Dua shokun (mikun). E dua me gjithë zemër (me shpirt). E dua shumë. S`e do gjëkundi. E dua si sytë e ballit (si dritën e syve). E do si prushin (si zjarrin) në gji (si kripën në sy). iron. nuk e do fare.","Kam dashuri për një njeri të seksit tjetër, e dashuroj. Do një vajzë. Do një djalë. E donte shumë (si i marrë). E duan njëri-tjetrin.","Më pëlqen shumë diçka, ma ka ënda, e kam qejf; më tërheq shumë diçka, kam dëshirë të merrem me të. E do natyrën (detin). E dua punën. E dua shkencën (sportin, muzikën).","Dëshiroj të kem diçka që më mungon, për të cilën kam edhe nevojë, dëshiroj të plotësoj një kërkesë timen; kërkoj të kem ose të bëj diçka; kam dëshirë; më pëlqen. Dua punë. Dua pak bukë (pak ujë...). Do muhabet. Dua fjalën dua të flas. Ma do zemra (shpirti) dëshiroj me gjithë zemër (me gjithë shpirt). Ma do qejfi kam qejf, më pëlqen. Ç'të të dojë zemra. Kur (si) të më dojë qejfi. Si të duash. Dua të shkruaj (të lexoj, të këndoj). Dua të ha (të pi). Dua të punoj (të shëtit). Donte të martohej. Dua të pushoj (të çlodhem, të prehem). Dua të njihem. Duan të bashkohen. Duan t`i përçajnë (të mbjellin grindje). Duan të çlirojnë vendin. Dua të di (të gjej, të zbuloj) të vërtetën. Duan të hapin një shkollë. Nuk duan të largohen. Ka do ta nxjerrësh? Dua të të kujtoj një gjë. Ç’doni të thoni me këtë? Çfarë do? Do e thua ashtu ashtu të pëlqen ty të flasësh. Do të jetojë i lirë. Bëri si deshi. Ku të duash shko. Kur të duash. Si të duash si të kesh qejf. Në çdo orë që të doni.","I dëshiroj diçka dikujt; i uroj diçka. I dua të mirën. Nuk ia donte të keqen. Të dua të bëhesh i mbarë!","Pranoj me qejf a me dëshirë, dëshiroj. A doni miq? Po të doni (në qoftë se doni), mund të rrini me ne. Vetë nuk deshi.","Kam nevojë të madhe për dikë a për diçka, më lipset, është i domosdoshëm a i nevojshëm për mua; e kërkoj patjetër dikë a diçka. I sëmuri do qetësi. Bima do ajër (dritë). Toka do ujë (pleh). Të lashtat duan shi. Do krahë të fortë kazma. Do kujdes të madh (kohë, mundim) kjo punë. Ç`i do ata. S`ke ç`e do. Shkalla e lartë do këmbë të forta. fj.u.","Thërres dikë, e ftoj të vijë tek unë; kërkoj të më paraqitet (për një punë, për një çështje etj.). Të do babai. E donte përgjegjësi (drejtori). Të donte një shok (një mik...). E duan të vijë këtu (të paraqitet menjëherë).","vet. veta III. E kërkon patjetër, e lyp medoemos është në dobi a në të mirë të dikujt a të diçkaje, është në përputhje me diçka. E do puna është për të mirën e punës. E do nevoja është e nevojshme. E do zakoni është në përputhje me zakonin. Ma do puna jam i detyruar të veproj a të sillem në këtë mënyrë. Si e do radha ashtu si duhet. Si ta dojë rruga si të jetë nevoja, si të jetë më mirë.","bised. Më pëlqen, më është bërë shprehi a zakon, jam mësuar që ndaj meje të sillen a të veprojnë në një mënyrë të caktuar, duhet a është e nevojshme të më trajtojnë në një mënyrë të caktuar. E duan më të mirë (më të butë, më të keq). E do me kobure (me revole) kokës (me kërbaç). E do me thumb. E do me mykë kokës.","kryes. veta III. E ka hak diçka, e meriton, e kërkon vetë. Do dru (dajak). Do plumbin ballit. Derri do plumb. fj. u. Ajo kokë atë festë do. fj. u.","bised. Kërkoj një shumë a çmim të caktuar për një mall. Sa do për një copë? Donte shtrenjtë.","pavet. Duhet (përpara një pjesoreje). Do bërë (do ndrequr). Do parë. Do pyetur. Do thënë troç.","pavet. Duhet, është e domosdoshme, është e nevojshme. Do edhe dy javë të dalë dimri. Do edhe ca ditë të piqet rrushi. * Ç'e do s`ka vlerë a dobi, sa para bën. Sa të duash pa masë, boll, shumë. Aq (kaq) dua! shih tek AQ. Këtu të dua! në këtë fjalë qëndro!, mos e ndërro bisedën!; më ke dalë në shteg. Dua s'dua pavarësisht nga vullneti im ose nga dëshirat e mia. Nuk do t'ia dijë shih te DI","S'do fjalë (pa fjalë) shih te FJAL/Ë, ~A. I do në gojë keq. shih te GOJ/Ë,~A. Ia do hunda diçka shih te HUND/Ë,~A. Ma do mendja besoj, kujtoj. S'do mend shih te MEND,~TË. E do qofte shih te QOFT/E,~JA. S'e deshi veten (të gjallët) a) u turpërua shumë, a prek pa masë në sedër; b) u mërzit, u pikëllua pa masë. E do (e kërkon) si breshka gozhdën shih te BRESHK/Ë,~A. Do bukë mbi pogaçe shih te POGAÇ/E,~JA. E do si djalin e shemrës iron. shih te SHEM/ËR,~RA. I do drutë të shkurtra shih te DRU,~JA. E do si kau kashtën iron. shih te KA,~U. E do si kripën në sy dikë iron. shih te KRIP/Ë,~A. Do edhe Muçoja kafe tall. shih te KAF/E,~JA. Shpatullat duan këmbë fj. u. shih te SHPATULL,~A. Ashtu (kështu) i do mushka drutë shih te MUSHK/Ë,~A. Ia do buza, por s'e lë hunda shih te LË. Fshati që duket s'do kallauz fj. u. shih te FSHAT,~I. Do të dijë ku e ka pleshti syrin shih te PLESHT,~I."]}]</script>
