<script>window.__INITIAL_DATA__ = [{"slug":"mblidhem","term":"MBLIDHEM","attributes":["vetv."],"definitions":["zakon. sh. Grumbullohemi në një vend; afrohemi e bashkohemi diku; vet. veta III bëhet grumbull, tufë etj. U mblodhën shumë njerëz. U mblodhën te sheshi. U mblodh i gjithë fshati. Fëmijët a mblodhën kokë më kokë. U mblodhën pranë vatrës (rreth nënës, në qoshe). U mblodhën pulat (dhentë). Uji u mblodh nëpër gropa. U mblodh shumë dëborë para shtëpisë. Gjethet e rëna u mblodhën në cep.","vet. veta III. Bën mbledhje për të shqyrtuar diçka, për të zgjidhur një çështje etj. (për një organizatë, forum, organ drejtues, njësi prodhimi etj.); zakon. sh. për të gjitha vetat bashkohemi në një vend për një punë a veprimtari; grumbullohemi me rastin e një feste, të një gëzimi etj. U mblodh kongresi (konferenca, plenumi). U mblodh kryesia (drejtoria, brigada). U mblodh organizata (kolektivi). Mblidhemi në klasë (në sallë, në fushë). Mblidhemi një herë në muaj. U mblodhën me rastin e Ditës së Çlirimit (e ditëlindjes).","bised. Kthehem në shtëpi (zakonisht në mbrëmje); bashkohem me pjesëtarët e tjerë të familjes dhe rri me ta. Mezi mblidhet në shtëpi. Fëmijët mblidhen herët dhe bien të flenë. Me kë do të mblidhet kur të ikë i biri?","Mbledh gjymtyrët, trupin etj.; edhe fig. zvogëlohem, rrëgjohem, shtrëngohem e strukem (nga të ftohtët, nga sëmundja, nga frika etj.). U mblodh grusht (shuk, lëmsh, kruspull). U mblodh në një qoshe. U mblodh për t`u hedhur. U mblodh e u përmblodh u bë sa një grusht, s'dinte ku të futej, u struk (nga frika etj).","vet. veta III. Tkurret, hyn (për një plaçkë kur laget ose kur lahet). Mblidhet doku (basma, këmisha) nga të larët. Mblidhet shumë (pak). Nuk mblidhet fare.","Mbështillem me diçka, mbulohem nga të gjitha anët me një rrobë etj. U mblodh me gunë. U mblodh me shall.","fig. Bëhem i urtë, shtrohem. Djali (vajza) është mbledhur mjaft. Duke u rritur e duke u mbledhur.","fig. (me një trajtë të shkurtër të përemri vetor në r. dhanore). Më përqendrohet në një vend, më bëhet si lëmsh e më shtrëngon; më zë frymën, më mundon. M`u mblodh lëmsh (nyjë) diçka. M`u mblodh (diçka) në grykë (në fyt, në zemër). Iu mblodh inati (zemërimi, mëria, urrejtja).","Pës. e MBLEDH. * U mblodh (u mbështoll) në guaskën e vet shih te GUASK/Ë,~A. Iu mblodhën këmbët mospërf. vdiq. Iu mblodh (iu mbështoll) lëmshi dikujt iu afrua vdekja, i erdhi fundi, është afër mbarimit të jetës, po i mbaron koha. Iu mblodh (iu shkurtua) litari (laku) a) e ka punën keq, e ka pisk; b) po i afrohet fundi, po i vjen vdekja. U derdh vaji, s'mblidhet më fj.u. shih te VAJ,~I. M'u mblodh zemra lëmsh (shuk) shih te LËMSH,~I. Iu mblodhën (i erdhën, iu ngritën) zorrët te goja (në grykë, në fyt) shih te ZORR/Ë,~A. S’mblidhen pleshtat në grusht (s'futen pleshtat në thes) fj.u. shih te PLESHT,~I."]}]</script>
