<script>window.__INITIAL_DATA__ = [{"slug":"thatee","term":"THATË","attributes":["m.","sh."],"definitions":["Pezmatim në lëkurë që fryhet e mbledh qelb, çiban, lugë. I doli një i thatë në qafë (në sqetull). I mblodhi një i thatë. Iu hap i thati. Vuan nga të thatët."]},{"slug":"thatee","term":"THATË","attributes":["mb."],"definitions":["Që s'ka ujë ose lagështi jo i lagur, jo qull, jo i njomë; që s'ka fare lagështi ose që ka fare pak lagështi; kund. i njom. Rroba të thata. Dru (dërrasa) të thata. Kripë e thatë. Tokë (kullotë) e thatë. Ajër i thatë.","Që ka shteruar që ka mbetur pa ujë e pa lagështi. Lumë (përrua, krua) i thatë.","Që s'ka reshje, pa shira, pa lagështi; jo i lagësht. Kohë e thatë. Mot i thatë. Stinë (vjeshtë) e thatë. Erë e thatë. Klimë e thatë. Dëborë e thatë. Të ftohtë i thatë.","Që s’ka njomështi, që s'ka lëng, jo i njomë i përtharë e shumë i fortë; që është tharë për t’u ruajtur për një kohë të gjatë, që është bërë duke tharë diçka. Rrush (fiq) të thatë. Kumbulla të thata. Fasule të thata. Qep (hudhra) të thata. Bukë e thatë. Kore (thembra) të thata. Lëkurë e thatë. Ushqim i thatë ushqim jo i lëngshëm. (si p.sh djathë; sallam etj.). Mish i thatë pastërma. Peshk i thatë peshk i kripur dhe i tharë.","Pa bimësi, pa gjelbërim, i zhveshur. Toka (vende, krahina) të thata: Mal i thatë. Ishuj të thatë.","I dobët; i ligur; i hollë. Grua (vajzë) e thatë. Burrë (djalë, plak) i thatë. Me duar (me këmbë) të thata. I thatë nga trupi.","mjek. Që nuk zë ujë a lëng, që zhvillohet pa ujë brenda (për disa, sëmundje). Plevit i thatë. Kollë e thatë kollë pa këlbazë.","fig. Që nuk ka bukuri e ëmbëlsi, pa ndjenja e pa ngrohtësi, që nuk të tërheq, i ftohtë; pa fuqi shprehëse; i varfër nga përmbajtja, etj.; që bëhet shpejt e pa hollësi. Fjalë të thata. Përgjigje e thatë. Tregim (fjalim) i thatë. Njoftime të thata. Mësim (leksion) i thatë. Bisedë e thatë. Urdhra të thata. Shembuj të thatë. Zhurmë e thatë zhurmë e fortë dhe që zgjat shumë pak. Me ton (me zë) të thatë. Me një
