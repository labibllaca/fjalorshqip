<script>window.__INITIAL_DATA__ = [{"slug":"shkul","term":"SHKUL","attributes":["kal."],"definitions":["Nxjerr me forcë ose me një lëvizje të menjëhershme një gjë që është e ngulur a e futur diku; nxjerr me gjithë rrënjë një bimë etj.; nxjerr me vrull e me forcë diçka nga vendi; kund. ngul. Shkul një hu (një shtyllë). Shkul gardhin. I shkuli pendët këndesit. Shkul thinjat (qimet). Shkul gozhdët. Shkul preshtë (qepët, hudhrat). Shkul lirin. Shkul barërat e këqija (hithrat, ferrat). Shkul një dhëmb (një dhëmballë). Shkul gurë me kazmë.","E heq menjëherë e me forcë, e shkëput nga vendi, shqit. Shkuli derën. Mezi ia shkulën nga duart. Këtu të shkul era.","Tërheq diçka me forcë gati sa nuk e këput. Ia shkuli veshët. I shkuli faqet. Shkulte flokët (leshrat). Ia shkuli mjekrën.","fig. Heq krejtësisht nga mendja a nga ndërgjegjja e dikujt një mendim ose një pikëpamje të ngulitur, një ndjenjë etj.; e bëj ta harrojë fare diçka; zhduk me rrënjë një dukuri; çrrënjos; kund. ngul. I shkulim nga rrënjët besëtytnitë e paragjykimet fetare. Nuk ia shkulën dot nga zemra (nga mendja). Mezi ia shkulën nga koka.","fig. E detyroj dikë të ngrihet e të ikë nga vendi ku është, e përzë, e ndjek; e marr me vete me zor ose mezi e bind të vijë me mua. I shkulëm italianët nga Vlora. I shkulëm me zjarr nga llogoret. I shkulën nga fshati (nga vatrat e tyre). Kush e shkul atë që andej? Mezi e shkula nga shtëpia.","fig. Ia dal t'i shkëput dikujt një gjë; e bëj që të flasë. Ia shkuli lejen me pahir. Nuk i shkulën dot asnjë fjalë.","fig. Largoj, heq, shkëput (vështrimin, sytë). Nuk ia shkulte sytë.","fig. Më lodh e më mërzit me të thirrura e me të bërtitura ose me zhurmë të vazhdueshme, më bën që të më dhembë koka etj. Më shkuli nga mendtë (nga koka). Më shkuli mendjen e kokës (kokën). Na shkulën nga veshët.","E bëj të qeshë fort, e gajas; më mundon, më këput. Na shkuli gazit (së qeshuri). Më shkuli kolla.","fig. bised. Ia marr këngës bukur a i fryj bukur një vegle muzikore, e tund. Ia shkulën këngës që ç`ke me të. A ia shkulim një herë labçe? Shkulja një her ëzamares ashtu si di vetë! * E shkulëm barkun folëm e bërtitëm, po nuk na dëgjoi kush. I shkuli (i tundi) dhëmballët (dhëmbët) dikujt e detyroi dikë të përgjigjej gjer në një për një veprim a për një sjellje të padrejtë, e ndëshkoi rreptë. Shkul (përmbys, pres) nga rrënjët (me rrënjë) shih te RRËNJ/Ë,~A I. I shkuli (i hoqi, i tërhoqi, i zgjati) veshin (veshët) dikujt shih te VESH,~I. Më shkuli zorrët nuk e duroj dot, më nxori zorrët, më vjen për të vjellë prej tij. Shkul një gur nga një mur (shkul një qime nga një derr) është shumë dorështrënguar, mezi e nxjerr lekun nga xhepi. E shkulën (e ngritën) me rrënjë e me degë shih te RRËNJ/Ë,~A I. Ngul hunj e shkul hunj shih te HU,~RI. Ngul qepë e shkul hudhra shih te QEP/Ë,~A."]}]</script>
