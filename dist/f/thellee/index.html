<script>window.__INITIAL_DATA__ = [{"slug":"thellee","term":"THELLË","attributes":["mb."],"definitions":["Që ka largësi të madhe nga lart poshtë, duke u nisur nga sipërfaqja e tokës a e ujit; që shkon shumë poshtë sipërfaqes, që ka thellësi; që është, që bëhet a që futet në thellësi; që e ka fundin shumë poshtë nga pjesa e sipërme ose nga buzët, kur e krahasoj më me sende të tjera të njëllojta, që nuk është i nderë a i përfushtë; i futur mjaft a shumë brenda; kund. i cekët. Gropë e thellë. Hendek (pus) i thellë. Minierë e thellë. Lumë (det, liqen) i thellë. Në vende (në shtresa) të thella. Tas i thellë. Pjatë (tepsi) e thellë. Lërim (punim, shpim) i thellë. Rrënjë të thella. Me sy të thellë. Rrudha të thella. Plagë e thellë.","Që është larg nga kufiri, nga skaji a nga fillimi i një vendi ose larg nga bregdeti; që shtrihet larg në brendësi. Krahinat (zonat) e thella malore. Vende të thella.","Që mbush gjithë mushkëritë, që është i plotë; që del nga brendësia e kraharorit dhe është i ulët e i mbytur: Frymëmarrje e thellë. Zë i thellë. Rënkim i thellë. Psherëtimë e thellë.","fig. I një kohe të largët, shumë i hershëm. Në mesjetën e thellë. Në lashtësinë e thellë.","E mbyllur, e errët (për ngjyrat). Blu e thellë.","fig. Që hyn mirë në thelbin e gjërave, i mbështetur e i arsyetuar mirë, që mbështetet në një zbërthim e në një përgjithësim të shumanshëm të gjërave; që i di me themel gjërat, i përgatitur mirë e i pjekur; kund. i cekët. Studim (shqyrtim )i thellë. Njohje e thellë. Njohuri të thella. Mendime të thella. Gjykim i thellë. Kritikë, (autokritikë) e thellë. Analizë (sintezë) e thellë. Njeri (mendimtar, studiues)i thellë. Është i thellë ai.","fig. Shumë i madh, i theksuar; i fortë; i plotë. Përkulje e thellë. Krizë e thellë. Fitore e thellë. Kontradikta të thella. Dallime (ndryshime) të thella. Errësirë (natë) e thellë. Qetësi (heshtje) e thellë. Gjumë i thellë.","fig. Që arrin në një shkallë shumë të lartë, shumë i fuqishëm; që depërton në thellësi të botës së brendshme të njeriut (për ndjenjat). Ndjenjë e thellë. Dëshpërim i thellë. Keqardhje (dashuri, urrejtje, përshtypje) plot kuptim, vështrim që shpreh një ndjenjë të fuqishme.","fig. Që mbahet i mbyllur e ruhet me kujdes pa ua treguar të tjerëve, që nuk zbulohet, që nuk duket e nuk kuptohet lehtë. E fshehtë e thellë.","përd. em. ~A, ~AT (të) f. sh. bised. Mendime a punë të vështira për t’u kuptuar, çështje të mbyllura e të ngatërruara. E futi në të thella. Hyri në të thella. Merrej me të thella. I ka të thella ai. * E ka shpirtin të thellë nuk vdes a nuk ngordh lehtë e shpejt. Shtyp e thellë shtypshkr. mënyrë shtypi në të cilën shkronjat, figurat, skicat etj. gdhenden në një fletë të hollë dhe dalin në letrën e shtypur të dalluara për shkak të trashësisë së ndryshme të shtresës së bojës."]}]</script>
