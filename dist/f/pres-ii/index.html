<script>window.__INITIAL_DATA__ = [{"slug":"pres-ii","term":"PRES II","attributes":["kal."],"definitions":["edhe jokal. Rri në një vend për një kohë derisa të vijë dikush, të ndodhë diçka, të mbarojë një punë etj. Pres autobusin (trenin). Pres të më vijë radha. E prita gjithë pasditen. Të pres në shtëpi (në orën nëntë). Pret gjahun. Pret në radhë. Pres me padurim. Priti dy orë. Pritmë pak, se erdha! Ke kohë që po pret? Priti shumë (deri në darkë). S`mund të pres më (më gjatë). Më fal, se të bëra të presësh! Pres të pushojë shiu. Priti sa priti, pastaj iku. U lodh (u mërzit) duke pritur. Më doli mjekra duke pritur.","vet. veta III. Është gati për dikë a për diçka, mund të përdoret, të fillohet etj.; kërkon, do punën a dorën tonë, është për t'u nisur, për t'u bërë etj. Po ju pret dreka. Një veturë po e priste përjashta. Po vajti ora, treni s`të pret. Ajo punë pret zgjidhje. Detyra të mëdha na presin.","Ruaj, përgjoj; gjej; rri gati për të vepruar. Pret rastin (çastin) e volitshëm. Pret fjalën e tij. Pret ditën (orën, kohën) kur... Presim urdhrin e komandantit. Pres njoftimin.","Besoj se do të vijë dikush ose se do të ndodhë diçka, e quaj të mundshme; e dëshiroj të vijë a të ndodhë; shpresoj të kem diçka; parashikoj, mendoj, kujtoj. Pres letër (përgjigje, fjalë) nga vëllai. Ajo pret fëmijë do të lindë së shpejti. Ata presin që unë të kthehem sot. Ai pret ndihmë nga ne. I binim armikut aty ku nuk e priste. S`e prisja këtë prej teje! E ç`pret prej tij?! Mos prit gjë (ndonjë të mirë) prej tij. Atdheu pret shumë nga ne. Prisja tjetër gjë. Ç`prisja e ç`më doli! Diçka pret. Prisnin shumë nga jeta.","Kam përpara diçka që do të ndodhë patjetër dhe përgatitem për të; jam përpara diçkaje që do të vijë. E presim festën (kongresin) duarplot. E prisja këtë. Na pret e ardhmja e sigurt. Tradhtarët i pret plumbi.","edhe jokal. Bëj durim, duroj; lë të kalojë një kohë para se të bëj diçka, të marr një vendim etj. Do të presësh ca, se puna nuk zgjidhet menjëherë. Presim edhe pak para se të vendosim! Priti sa priti, pastaj doli.","E rrok me dorë ose me një gjë tjetër dikë a diçka që vjen drejt meje, e kap diçka që më hidhet. Trill topin (mollën). Prite, se e hodha! E priti në prehër (me çarçaf). E priti me një dorë.","Pranoj dikë për vizitë; pranoj një shok, një mik a të ftuar në shtëpi; gëzohem kur më vjen dikush në shtëpi dhe e mbaj mirë, e gostit me të gjitha ç'kam. Është njeri që të pret është mikpritës. Shtëpi që pret miq. Na pritën mirë. Të pret me buzë në gaz (me dashamirësi, krahëhapur). Pret e përcjell është shumë mikpritës; i vijnë shumë miq në shtëpi, ka shumë hyrje e dalje.","Dal në mënyrë të organizuar në vendin ku do të arrijë dikush për ta përshëndetur a për t'i uruar mirëseardhjen. Populli priti delegatët e kongresit.","I gjendem pranë dikujt, rri afër për t'i ardhur në ndihmë. Fëmijën e priti mamia.","I dal përpara dikujt që niset drejt meje, i bëj pritë. Armiqtë i presim me pushkë.","E pranoj dikë për të zhvilluar bisedime, e lejoj të hyjë në zyrë për një punë, për ndonjë kërkesë etj.; takohem me dikë; e lejoj dikë të vijë të më takojë e të flasë me mua. Në ç’orë pret drejtori?","Shpreh qëndrimin e mendimin tim për dikë a për diçka; i përgjigjem aty për aty (me fjalë, me veprime etj.) duke shprehur mendimin e qëndrimin tim për diçka. E pritën mirë ardhjen e tij. E priti mirë (keq) kritikën.","përd. pj. Dale. Prit ta shoh! Prit se s’e mora vesh. Prit t’ia tregoj. * I pret ditën dikujt e ruan ta zërë ngushtë, i ruan rastin që ta ketë në dorë. E priti me hundë (me turinj, me hundë e buzë) shih te HUND/Ë,~A. Pa pritur e pa kujtuar menjëherë; papandehur. Prit të presim! thuhet kur dikush rri gjatë duke pritur. Nuk vepron a nuk lëviz ose e bën diçka me ngadalësi të madhe. Nuk më pret puna (koha) nuk kam kohë e mundësi; ngutem, shpejtoj. E priti me këmbët e para shih te KËMB/Ë,~A. S'ia pret luga lugën shi te LUG/Ë,~A. Kape laro, prite balo! tall. shih te LARO,~JA. Njëri ia thotë e tjetri ia pret shih te THEM. Prit gomar të mbijë bar! shih te GOMAR,~I. Presin të ngordhë gomari (kali) që të marrin potkonjtë përb. shih te GOMAR, ~I."]}]</script>
