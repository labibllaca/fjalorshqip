<script>window.__INITIAL_DATA__ = [{"slug":"mbushem","term":"MBUSHEM","attributes":["vetv."],"definitions":["vet. veta III. I futet një lëng a një lëndë tjetër brenda derisa nuk nxë më a derisa rrafshohet, bëhet plot (për enët a për diçka tjetër të zbrazët a të thelluar); zihet a mbulohet krejt me diçka një vend i zbrazët a një hapësirë; kund. zbrazet. U mbush ena (shtamba, shishja, gota). U mbush gropa me dhe (me baltë). U mbush hendeku me ujë. U mbush fusha me lym. U mbush shtrati i lumit (i përroit).","vet. veta III. Shtohet shumë numri i njerëzve diku, zihet me njerëz aq sa s'ka më vend; bëhet i plotë, plotësohet, rritet. U mbush dhoma (sheshi, vendi) me njerëz. U mbushën radhët e rinisë.","vet. veta III edhe fig. Bëhet e plotë diçka e mangët, plotësohet ajo që mungon ose që nuk është bërë. U mbush hëna. U mbush numri. U mbushën vendet. U mbushën zbrazëtitë.","Ngjallem, shëndoshem, bëhem i mbushur në trup, në fytyrë etj. vet. veta III e zmadhon vëllimin e vet, bëhet i plotë, i fryrë etj. Qenka mbushur mirë në trup (në fytyrë). Iu mbushën faqet (krahët, këmbët). Iu mbushën kokrrat fikut. U mbushën kallinjtë.","vet. veta III. Mbulohet tërësisht a pothuajse tërësisht me diçka; ka me shumicë a me tepri, bëhet plot me diçka (edhe fig.). U mbushën malet me borë. U mbush qielli me re. U mbushën arat me grurë. U mbush livadhi me bar të njomë (me lule). U mbushën pemët (kumbullat, qershitë, pjeshkat) me kokrra. U mbushën malet me partizanë. Iu mbush koka (u mbush) me thinja. U mbush qeni me pleshta. U mbush dhoma me tym (me një erë të mirë). U mbush çerdhja (kopshti, shkolla) me zërat e fëmijëve. Pylli u mbush me cicërimat e zogjve. Ishte mbushur fshati me thashetheme.","Marr a më sjellin diçka me shumicë aq sa të mos kem më nevojë për të; pajisem me të gjitha sa më duhen (edhe fig.). U mbush me libra (me rroba, me këpucë). U mbush me dhurata (me para, me ushqime). U mbush shtëpia me të gjitha të mirat.","fig. bised. Ngopem. U mbush me bukë. S`mbushej dot me frymë.","fig. Më ngjallet një ndjenjë e fortë (kënaqësie, gëzimi, hidhërimi etj.); pushtohem i tëri nga kjo ndjenjë. U mbushëm me gëzim (me hare, me besim). U mbush me hidhërim (me urrejtje, me inat).","vet. veta III. Plotësohet një kohë a një afat i caktuar; arrin një moshë e caktuar. U mbush java (muaji, viti). U mbushën dy orë. Iu mbush mosha për në shkollë. U mbush afati.","vet. veta III fig. bised. Përmbushet, plotësohet. Iu mbush dëshira.","bised. Iki me vrap, vrapoj me të gjitha forcat, ua mbath këmbëve. Mbushu! keq. ik, shporru që këtej, m'u hiq sysh, këput qafën!","Pës. e MBUSH 1. * S’i mbushet barku (plëndësi) mospërf. s'ngopet kurrë, nuk ndien të ngopur. Është mbushur deri (gjer) në fyt (në grykë) a) është mërzitur pa masë i ka ardhur deri në fyt; b) është zemëruar pa masë, mezi po e mban inatin. Nuk i mbushet koka (kryet) nuk do ta kuptojë, nuk bindet, është kokëfortë. U mbush kupa kaloi çdo kufi, nuk durohet më. M'u mbush syri (plot) shih te SY,~RI. M'u mbush zemra (plot) shih te ZEM/ËR,~RA. Iu mbush mendja qyp shih te MENDJ/E, ~A. M'u mbush syri me gjumë u ngopa me gjumë pas një kohe të gjatë pa fjetur. Iu mbushën sytë me lot u mallëngjye, u bë gati për të qarë. S’mbushet pusi me pështymë (me gjilpëra) fj.u. shih te PËSHTYM/Ë,~A."]}]</script>
