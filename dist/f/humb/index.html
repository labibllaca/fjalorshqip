<script>window.__INITIAL_DATA__ = [{"slug":"humb","term":"HUMB","attributes":["kal."],"definitions":["edhe jokal. Mbetem pa diçka a pa dikë që e kam pasur më parë dhe nuk e di më se ku është; nuk e kam më diçka, ngaqë e kam harruar diku a më ka rënë diku pa e vënë re; nuk e kam më pranë dikë, sepse është ndarë prej meje dhe nuk e di ku ndodhet; më zhduket nga sytë diçka a dikush dhe nuk e di se ku është a s`e gjej dot; kund. gjej. Humbi çelësin (çadrën, paratë). Humbi biletën (dokumentet). Humbi dhitë (lopët, qetë). I humbi shokët. E humbi në rrugë. I humbi lapsi (kapela). I humbi letërnjoftimi. I humbi një dele. I humbi fëmija. Ka humbur një fëmijë. Mos ju ka humbur gjë? Në humbi unazat, gishtërinjtë i ka. fj.u.","Ma merr një gjë dikush tjetër, nuk është më imja, s'e kam më pronë a pasuri timen; kund. fitoj. Humbnin paratë në bixhoz. Humbnin shtëpinë (pasurinë) në kumar. Humbiste shpesh në lojë.","edhe jokal. Mbetem pa një pjesë të trupit, nuk e kam më një pjesë a një organ të tij; më ikën a më prishet fare diçka, që ka lidhje me trupin. Humbi krahun (këmbën) në luftë. Humbi një sy. Humbi shumë gjak. Humbi shëndetin u dobësua.","edhe jokal. Më ikën fare një shprehi a aftësi, nuk e kam më një veti ose cilësi trupore a shpirtërore, mbetem pa një tipar a veçori që kam pasur; bie a ulet krejt shkalla e forca e diçkaje; dobësohet a shuhet diçka dalëngadalë. Humbi zërin (shikimin). I humbi të parët (dëgjimi). Humbi sytë u verbua, u qorrua, nuk sheh më. I humbi ngjyra (era). Humbi bukurinë (gjallërinë, shpejtësinë). Humbi forcën (fuqinë, peshën, lartësinë). Ka humbur në peshë. Humbi kujtesën (arsyen, gjykimin). I humbi vrulli (gjallëria, shpejtësia, forca, fuqia). Humbi shijen për diçka. Humbi durimin (gjakftohtësinë). Humbi guximin (trimërinë, besimin). Humbi nderin. Humbi vigjilencën. Nuk i ka humbur besimi në vetvete. Kënga humbi dalëngadalë në largësi. Ka humbur në përkthim një vepër.","Nuk kam më diçka që është e mirë për mua e që më shërben; nuk kam më të drejtë për diçka, më hiqet diçka që gëzoja më parë; kund. fitoj. Humbi dashurinë (miqësinë, besimin, nderimin) e të tjerëve. E humbi autoritetin. I humbi të drejtat. Humbi shtetësinë. Humbi lirinë. Humbi punën.","jokal. Zhytem brenda në diçka, futem diku a pas diçkaje, fshihem dhe nuk dukem më. Humbi në ujë (në det, në rërë, në dhe). Humbi në bar (në kashtë, në mes të grurit). Humbi në mjegull (në errësirë, nëpër natë). Humbi midis njerëzve (midis turmës). Humbi në pyll. Humbi këmba në baltë (në llucë). Burimi humb në tokë (nën shkëmb). Humbi pas kodrës (pas bregut, pas qafës). Humbi dielli. bised. perëndoi dielli.","jokal. Zhdukem, nuk dukem gjëkundi; nuk shkoj tek të tjerët, nuk dal ndër njerëz. Na humbi nga sytë. Ku humbe kështu? Ku ke humbur kaq ditë? Na ke humbur fare. Humbi si kripa në ujë (pa nam e pa nishan).","jokal. vet. veta III. Ka dalë diçka nga përdorimi, nga qarkullimi, nga shitja etj., nuk gjendet më, nuk është më sot; nuk përdoret më; pushon së qeni, nuk është më në jetë. Humbën ato lloje këpucësh. Humbi ajo veshje. Humbi ai zakon. Nuk humb folklori. Kjo fjalë (kjo shprehje, ky kuptim) ka humbur. Kjo gjuhë ka humbur. Ka humbur në shekuj (në errësirën e kohës).","edhe jokal. Më vdes dikush, ndahem nga dikush përgjithnjë; nuk e kam më një të afërm ose një mik; vdes a vritet dikush duke i lënë të tjerët në pikëllim. E humbi babanë (nënën). I humbi fëmijët (të afërmit). E humbi burrin në luftë. E humbi shokun (mikun). Humbi një trim i rrallë (një luftëtar, një atdhetar). Humbi një poet i madh (një burrë i shquar).","bised. E vras dikë, e asgjësoj; e zhduk dikë a diçka nga faqja e dheut. Donin ta humbnin mësuesin liridashës. Çoi njerëzit e vet për ta humbur djalin. E humbën fare malarien.","edhe jokal. Lë të më shkojë kot; kalon kot, vete dëm; më ikën pa e shfrytëzuar fare ose pa e përdorur sa duhet, më shpëton; e çoj dëm, e harxhoj kot. Humb kohën (ditën). Humbi vite të tëra. Pa humbur asnjë çast. S`kemi kohë të humbim. Humbi vitin (klasën, provimin) nuk e fitoi vitin (klasën...). Humb topin (golin). sport. E dëgjonte pa humbur asnjë fjalë. E humbi fjalën kot. E humbi jetën kot. I humbi koha (dita) kot. I humbi një javë. I humbi një rast i mirë.","jokal. kryes. veta III. Vete dëm nga pakujdesia a nga shpërdorimi; dëmtohet, prishet, shkon kot; më ikën nga duart. Humbi kot gjithë kjo letër. Humbën gjithë ato tulla në shi. Humbi duhani (pambuku, misri) sivjet. Humbi ai njeri. Humbi për mendtë e kokës. Humbi si sëpata pa bisht. Për një gozhdë humb potkoi. fj. u.","edhe jokal. Ngatërroj rrugën a gaboj drejtimin, nuk di nga të vete më tej; s'e gjej më a nuk e ndjek dot më tej një gjurmë, një shenjë etj. (edhe fig). Humb udhën (rrugën, drejtimin). Humb gjurmët. Humb fillin e bisedës. Humbi në pyll (në qytet).","fig. Largohem nga rruga e nisur, detyrohem të heq dorë nga synimet, nga ëndrrat etj.; nuk di më si të eci në jetë. Humbi qëllimin (synimin). Humb ëndrrat (shpresat). Humbi drejtimin në jetë.","edhe jokal. Dal i mundur në një luftë, në një ndeshje, në një lojë etj., nuk fitoj; dal me humbje, pësoj dëm (edhe fig.); kund. fitoj. E humbi luftën (betejën). E humbi lojën (ndeshjen). E humbi bastin. E humbi gjyqin. Humbi skuadra kundërshtare. Humbi në llogari (në shitje, në pazar).","Ma merr kundërshtari, më del jashtë loje. Humb një figurë (damën, kalanë, një ushtar).","jokal. fig. Jepem shumë pas diçkaje, përqendrohem i tëri në diçka dhe s'kujtohem më për asgjë tjetër; zhytem tërësisht në diçka dhe s'di ç'bëhet përreth. Humbi pas punës (në punë). Humbi pas lojës (në lojë). Humbi pas librave (pas studimit). Humbi në mendime (në ëndërrime). Humbi në gjumë ra në gjumë të thellë.","Bie në një gjendje, në të cilën nuk më bën përshtypje asgjë e nuk kundërveproj, s'di si të sillem a nuk e përmbaj dot veten (nga hutimi, nga frika, nga dëshpërimi, nga një tronditje shpirtërore, nga uria a nga ndonjë vuajtje e madhe trupore etj.). E humbi fare (krejt). Pse e ke humbur kështu? E humb për hiçmosgjë. S'e humb kurrë ai. * I humbi batha shih te BATH/Ë,~A. E humbi barkun i ra barku, u dobësua. I humbi (i treti, nuk i duket) boja shih te BOJ/Ë,~A. E humbi davanë shih te DAVA,~JA. E humbi derën e harroi dikë dhe nuk i vete prej shumë kohësh në shtëpi, nuk i shkon më dikujt. I humbtë (iu shoftë, iu harroftë) emri! shih tek EM/ËR,~RI. I humbi (iu shua, iu tret) fara dikujt a diçkaje shih te FAR/Ë,~A. Ia humbi (ia shoi, ia treti) farën shih te FAR/Ë,~A","I humbtë (iu shoftë, i daltë) fara! mallk. shih te FAR/Ë,~A. E humbi fillin (fijen) shih te FILL,~I. Humb flamurin libr. nuk e mbaj dot atë që kam fituar, më ikën një fitore. E humbi gojën a) u bë memec, nuk flet dot; b) pushoi së foluri për diçka, nuk flet më, nuk ndihet më nga që e sheh se s`ka të drejtë ose nga që nuk guxon. I ka humbur guri dikujt shih te GUR,~I. I humbi (i mbuloi, i fshehu) gjurmët shih te GJURM/Ë,~A. Ia humbi gjurmët diçkaje shih te GJURM/Ë,~A. Humbi jetën vdiq, u vra. I humbi krakëllima shih te KRAKËLLIM/Ë,~A. Ka humbur lidhjet me dikë është shkëputur nga dikush për një kohë të gjatë ngaqë s'e di se ku është. E humbi lojën dështoi në diçka, e humbi davanë. I humbtë mandata! mallk. shih te MANDAT/Ë,~A. E humbi mendjen (fiqirin) është dhënë aq shumë pas dikujt a pas diçkaje, sa s'është më në gjendje të gjykojë në mënyrë të shëndoshë; s'është më në vete. Për të humbur mendjen shih te MENDJ/E,~A. U humbi (s'u gjendet) nishani shih te NISHAN,~I. I humbi pikët para dikujt nuk e meriton më besimin që ka pasur, i ra vlera, nuk e gëzon më atë nderim që ka pasur. I humbi pisha shih te PISH/Ë,~A. E humbi pusullën nuk është në gjendje të gjykojë drejt; u hutua dhe e humbi fillin krejt. I ka humbur rrumbi dikujt i shkon puna keq nga që i mungon diçka e domosdoshme ose për një arsye tjetër, mbeti batall. Humbi në sytë e dikujt i ra vlera përpara dikujt, nuk gëzon më atë nderim që ka pasur nga dikush. Humbi pa shenjë (e pa dukë) shih te SHENJ/Ë,~A. Humb tokë libr. e detyron dikush të tërhiqet ca nga një qëndrim i caktuar, nga diçka që ka fituar etj. E humbi toruan shih tek TORUA. I ka humbur triva diçkaje shih tek TRIV/Ë,~A. Humbi vetëdijen libr. a) i ra të fikët, humbi ndjenjat; b) nuk është më i vetëdijshëm për diçka. E humbi vulën shih te VUL/Ë,~A. I humbi vula dikujt shih te VUL/Ë,~A. I humbtë vula (nami, nishani)! mallk. shih te VUL/Ë,~A. E ka humbur (fare) yzengjinë dikush shih tek YZENGJI, ~A. Humbi zemrën u bë frikacak, nuk ka më guxim. I humbi zëri dikujt shih te ZË,~RI. Për një gozhdë (thumb) humbi (shkoi) potkoi fj.u. shih te GOZHD/Ë,~A. Humbi dritën e syrit (e syve) a) u verbua, u qorrua, nuk sheh më; b) humbi djalin e vetëm. Humbi si fasulja në vegsh shih te FASUL/E,~JA. I humbi filli i lëmshit shih te FILL,~I. I humbi fjala nga goja shih te FJAL/Ë, ~A. Humbi (treti) mendtë e kokës e la mendja, doli mendsh, shkalloi; u shastis nga diçka e papritur, e jashtëzakonshme, shumë e bukur etj. Humbi (shkoi, e pësoi) për mendtë e kokës shih te MEND,~TË. Nuk humbi (s’u shua) pazari për gjilpëra. fj.u. nuk është gjë që s'e gjen dot. Ka humbur rripin e këmborës flet e vepron pa u menduar. E ka humbur rrumbin e këmborës a) e ka humbur fillin e mendimeve; b) ka rënë nga gjendja e mëparshme. E humbi rrumbi kambanën shih te RRUMB,~I. E humb (e humbet) udhën në oborr shih tek OBORR,~I. I humbtë varri e dërrasa! mallk. shih te VARR,~I. E humbi si Xhaferi simiten u hutua shumë, e humbi fillin fare. Humbi kokën e pyet për flokët. fj. u. humbi qetë e pyet për brirët. Humbi qetë e pyet për brirët fj. u. ka humbur diçka të madhe e kryesore dhe shqetësohet për gjëra të vogla. Humbi në vaj e fitoi në presh fj.u. shih te VAJ,~I I. Kali humbi, gomari s'duket fj.u. shih te GOMAR,~I."]}]</script>
