<script>window.__INITIAL_DATA__ = [{"slug":"eermbys","term":"ËRMBYS","attributes":["kal."],"definitions":["E kthej a e vë përmbys; e kthej me kokë poshtë, e kthej me këmbë përpjetë a me rrota përpjetë; e rrëzoj përtokë me forcë (zakonisht nga një vend i lartë). Përmbysi gotën (filxhanin, tenxheren, kusinë, arkën, thesin). Përmbysi tryezën (karrigen). Dallgët e përmbysin lundrën. Demonstruesit përmbysën veturat e kapitalistëve. Partizanët përmbysën një tren ushtarak të fashistëve.","E shtrij dikë barkas; e rrëzoj me fytyrë përdhe.","bujq. Kthej tokën, i bëj lërimin e parë; i hedh tokës plehun dhe e punoj. Përmbysën tokën (ugarin). Përmbysën plehun.","fig. Bëj rrëmujë diku, s'lë gjë pa lëvizur nga vendi, e kthej gjithçka mbrapsht. E kontrolluan dhe ia përmbysën shtëpinë (dhomën). Ia përmbysën plaçkat.","fig. E vendos diçka në një drejtim të kundërt me atë që ka pasur; e shpie fundin në fillim dhe fillimin në fund. Përmbys rendin e fjalëve në fjali.","fig. E mund keqas dikë, e vë poshtë, e mposht. E përmbysëm armikun.","fig. Bëj që të ndryshojë në mënyrë rrënjësore një gjendje, e ndryshoj që nga themelet; e sjell në një gjendje të kundërt a i jap një vlerë të kundërt në krahasim me të mëparshmen. E përmbysën situatën (gjendjen). I përmbysën marrëdhëniet e mëparshme.","fig. Prish nga themelet diçka që ishte vendosur më parë; rrëzoj me luftë a me revolucion një rend të vjetruar, një klasë sunduese etj.; i heq fuqinë e pushtetin dikujt me dhunë; zhduk. Përmbysëm fashizmin (rendin feudo-borgjez, pushtetin e çifligarëve). Përmbysëm të vjetrën (zakonet prapanike, paragjykimet fetare).","fig. Hedh poshtë me argumente e me fakte diçka që mbahej si e vërtetë, që mbizotëronte në mendjet e njerëzve deri në atë kohë, rrëzoj. Materializmi dialektik e historik përmbysi pikëpamjet idealiste mbi natyrën (mbi jetën, mbi shoqërinë). Përmbys një teori (një tezë) të vjetruar (të gabuar).","thjeshtligj. Bëj qejf në një dasmë a në një gosti duke kënduar e duke vallëzuar me zhurmë. E përmbys
