<script>window.__INITIAL_DATA__ = [{"slug":"rrit","term":"RRIT","attributes":["kal."],"definitions":["E mbaj, e ushqej dhe e edukoj dikë për një kohë të gjatë, derisa të bëhet i zoti i vetes. Rrit fëmijët (djalin, vajzën). E rrit me bukë. E ka rritur me shkollë. E ka rritur me kujdes (me dashuri, me përkëdheli, me mundime, me një mijë të mira). E rriti, e bëri burrë. E ka rritur me gji e ka ushqyer me gji, pa i dhënë ushqim tjetër plotësues (për foshnjat).","fig. E edukoj në një mënyrë të caktuar, e përgatit me punë e me kujdes të veçantë me një synim të caktuar; i fut në shpirt një ndjenjë, e ushqej me ndjenja e mendime të caktuara. E ka rritur trim. Rrit luftëtarë. I rritim me dashuri për atdheun.","Mbaj e ushqej kafshë shtëpiake dhe kujdesem për to që të japin prodhim e të shtohen; mbjell bimë dhe u bëj shërbimet që të zhvillohen mirë e të japin prodhim. Rritin pula (derra). Rritin bletë. Rritin bagëti. Rrit lule.","vet. veta III. E bën që të zhvillohet, i jep ushqim që të marrë mbarë; e nxjerr, e bën diçka dhe e mban derisa të zhvillohet; e bën të madhe diçka. Kjo tokë e rrit mirë misrin. Plehu i rrit të lashtat. Uji i rrit bimët. Nuk i rrit gjethet (kokrrat) shumë nuk i bën gjethet (kokrrat) shumë të mëdha.","E lë që të zhvillohet e të bëhet më i madh, nuk e pres ose nuk e pengoj të zhvillohet. I rriti flokët për t'i bërë gërsheta. I ka rritur thonjtë.","I shtoj sasinë, madhësinë, vëllimin a vlerën në krahasim me gjendjen e mëparshme; ngre; zmadhoj; kund. ul; pakësoj. E rritën numrin (sasinë). E rritën prodhimin. E rritën sipërfaqen e mbjellë. E kanë rritur normën (planin, vëllimin). E rriti moshën. E rritën qarkullimin. I rritën të ardhurat. Ia rritën pagën.","fig. E ngre në një shkallë më të lartë; e bëj më të madh, më të fuqishëm, më të njohur etj. Ia rriti besimin. Ia rriti lavdinë (emrin, autoritetin). E rritën kujdesin për fëmijët. E rriti hovin (vrullin). E rritën vigjilencën (frymën luftarake). I rritën kërkesat.","fig. I jap një vend pune a një gradë më të lartë; e ngre në detyrë a në përgjegjësi. E rritën në përgjegjësi.","fig. E shtoj më tepër sesa duhet, e kapërcej masën, e teproj. Nganjëherë e rrit punën e vet. Mos e rrit veten aq shumë! * Ia rrit fjalën dikujt keq. ia miraton e ia përkrah ato që thotë pavarësisht nëse e ka mirë ose jo, ia ushqen fjalën. Ia rrit mendjen (ia rrit veshët) dikujt i bën lëvdata të tepruara, e bën të mburret e t'i pëlqejë vetja. Rrit (mbaj) gjarprin në gji shih te GJARP/ËR,~RI. Rrit sorrën të të nxjerrë sytë shih te SORR/Ë,~A."]}]</script>
