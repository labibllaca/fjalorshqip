<script>window.__INITIAL_DATA__ = [{"slug":"idh","term":"IDH","attributes":["kal."],"definitions":["Bashkoj skajet e një filli, të një litari etj. ose skajet e fijeve të ndryshme e i shtrëngoj së bashku nyjë; bëj nyjë në një fill; var a kap diçka në trup ose në një vend tjetër, duke bashkuar e duke shtrënguar fijet a rripat që ka; kund. zgjidh. Lidh perin (spangon, litarin, telin). Lidh fjongon (lidhëset e këpucëve). Lidh përparësen. Lidh kravatën (shallin).E lidh nyjë (komb, fjongo, pisk). E lidh fort (shtrënguar).","Shtrëngoj ose kap pas një sendi dikë a diçka me litar, me zinxhir etj. që të mos luajë a të mos largohet prej andej; i kap e i shtrëngoj dikujt duart a këmbët me litar, me zinxhir etj.; kund. zgjidh. Lidhi qenin (lopën, viçin). E lidhi pas shtyllës (pas pemës). Lidh domatet nëpër hunj. E lidh me litar (me zinxhir, me tel). Ia lidhën duart (këmbët). E lidhën me hekura (me pranga).","Mbledh bashkë disa gjëra dhe i shtrëngoj me pe, me tel, me litar, me rrip etj.; bëj tufë diçka dhe e shtrëngoj me pe, me spango, me rrip etj.; e mbështjell diçka në shami dhe i shtrëngoj nyjë skajet e kësaj; mbështjell foshnjën me shpërgënj e me dizgje; kund. zgjidh. Lidh duajt e grurit. Lidh preshtë (qepët) në tufa. I lidh flokët prapa. Lidh grykën e thesit. Lidh bukën në shami. Lidhi djalin në djep. E lidhi foshnjën kopanec. Lidhte cigare. bised. dridhte cigare.","Mbështjell një pjesë të trupit, një plagë etj. me një rrip pëlhure a me diçka tjetër; kund. zgjidh. Ia lidhën këmbën (dorën, gishtin) e vrarë. Ia lidhën sytë ia zunë sytë me një rrip pëlhure.","Bashkoj fletët e një libri etj., i kap e i shtrëngoj me diçka dhe i mbështjell me kapakë. Lidh librat (fletoret, blloqet). E ka lidhur bukur albumin.","I kap mirë sendet njëri me tjetrin; i ngjit a i bashkoj fort pjesët e diçkaje, e bëj më të fortë a më të qëndrueshme diçka; jokal. vet. veta III bashkohet e ngjit mirë, kap, mban. Lidh gurët e themelit. Murin e ka lidhur me llaç. Plehu e lidh tokën. Tullat kanë lidhur mirë.","bised. E vë një kafshë pune në zgjedhë a në karrocë për ta tërhequr; mbrej. Lidh qetë. Lidh kalin në karrocë.","spec. Mbërthej a bashkoj një pjesë me një pjesë tjetër ose me tokën, me një send etj.; mbyll, kyç. Lidh në qark të shkurtër. fiz. E lidh me tokën elektr. e tokëzoj. E lidh me rrjetin. elektr.","kim. Bashkoj grimcat e një elementi kimik me ato të një tjetri dhe i ndryshoj gjendjen e tij të lirë (në kiminë joorganike); bashkoj një element kimik me një tjetër (në kiminë organike). Lidh kimikisht.","edhe jokal. vet. veta III. Formon frytin, bën kokrra; zë bukë (për pemët, drithërat e bimët e tjera). Lidh pema (rrushi, shega). Lidh kalli gruri. Kanë lidhur arrat. Ka lidhur bukë misri (gruri). Lidhi boçe pambuku. Lidhën domatet. I lidhën kokrrat. Sa lule çelin, të gjitha nuk lidhin. fj.u.","fig. I rreshtoj e i thur mirë fjalët, i shpreh qartë e rrjedhshëm mendimet; e hartoj bukur diçka, duke i arsyetuar gjërat mirë e qartë. Lidh mendimet (fjalët). S`di të lidhë as dy fjalë nuk di të flasë e të shprehë qartë mendimet. E ka lidhur mirë atë letër.","Vë në marrëdhënie ose bashkoj me rrugë a me një mjet ndërlidhjeje dy qendra të ndryshme, dy qytete etj., që janë larg njëri prej tjetrit. E lidh me telefon (me radio). E lidhi me Tiranën. Të gjitha qytetet dhe shumë fshatra i kemi lidhur me rrugë automobili.","fig. Afroj dy vetë ose dy palë, i vë në marrëdhënie të ngushta e të drejtpërdrejta, i bashkoj; vet. veta III e bashkon, e afron diçka a dikë me një tjetër. E lidhi me shokë të mirë. Lidhi jetën me të u martua me të. Ç'e lidh me të? S'e lidh asgjë me mua.","fig. Bëj një marrëveshje me dikë; bashkohem me dikë për një veprimtari të caktuar; vendos marrëdhënie të afërta me dikë. Lidhën kontratën. Lidhën besën (fjalën, kuvendin). Lidhën krushqi. Lidhën miqësi u bënë miq. Lidhën fejesë u fejuan.","fig. E vë në marrëdhënie të ngushta a të pa ndara me diçka; përcaktoj se me kë a me se ka të bëjë diçka ose nga varet. Fjalën e lidh me veprën. Lidh mësimin me punën (me jetën). Lidh teorinë me praktikën. Veprimet e tij i lidhin me shkaqe (me ndikime) të ndryshme.","fig. bised. I jap një rrogë a një pension që ta ketë përgjithmonë (sipas një rregulli), i caktoj. Lidhën rrogë dikujt. I kanë lidhur pension pleqërie.","fig. bised. E pengoj dikë të merret me diçka a të veprojë, nuk i jap mundësi që të shkojë e të largohet nga vendi ku jeton a punon; nuk e lë diçka të zhvillohet. E kanë lidhur fëmijët. E ka lidhur puna është i zënë me punë dhe s'mund të vejë gjëkundi. Ia ka lidhur duart (krahët) nuk e lë të lirë të veprojë, i është bërë pengesë e pakapërcyeshme. Ia ka lidhur këmbët a) dikujt nuk e lë të shkojë gjëkundi; b) diçkaje po ia pengon zhvillimin, nuk e lë të zhvillohet.","fig. vjet. I bëj magji dikujt për ta penguar që të ketë marrëdhënie me një femër; i bëj magji për diçka (sipas besimeve të kota); kund. zgjidh. Kujtonte se e kishte lidhur magjistarja. Besonin se orët lidhnin e zgjidhnin.","fig. bised. E ndërpres a e pres fare një ushqim, nuk e ha a nuk e pi më diçka. E ka lidhur rakinë e ka prerë rakinë, nuk e pi më. Lidhnin mishin. vjet. e ndërpritnin mishin për një kohë të caktuar (gjatë kreshmëve). Lidhnin kreshmët. fet., vjet. nuk hanin mish e bulmet gjatë kreshmëve.","fig. bised. Nuk e lë dikë të gjejë rrugëdalje për të përligjur a arsyetuar diçka, e zë ngushtë dikë, ia mbyll gojën; e bëj të ngecë. E lidhi me fjalë. E ka lidhur keq. * Korr e mos (e nuk) lidh shih te KORR. I ka lidhur (i ka mbledhur) dengjet shih te DENG,~U. Lidh (kryqëzon) duart s'bën asnjë përpjekje për të ndihmuar dikë që ka nevojë, rri e pret, nuk vepron; rri duarkryq. Lidhe në gisht! shih te GISHT,~I. Ia lidhi gjuhën dikujt ia mbylli gojën që të mos flasë, e detyroi të mos i thotë mendimet që ka; e detyroi ta mbajë të fshehur diçka. Ka lidhur inat ka vënë inat. Lidh këmbë për diçka ngul këmbë. Ia lidhi (ia zuri, ia ngujoi) këmbët shih te ZË. Ia lidh kryet diçkaje e përfundoj, i jap fund. Ka lidhur mish është shëndoshur, ka vënë mish. Lidh mendjen vendos për të bërë diçka. S'lidh para nuk sjell shumë fitim po të shitet. I lidhën (i vunë) qafolin dikujt shih te QAFOL,~I. E lidhi qesen i kurseu paratë; u tregua dorështrënguar. I kanë lidhur (i kanë gjetur, i kanë rregulluar) telat bashkë shih tek TEL,~I. Lidh e zgjidh dikush bën si do vetë, nuk pyet njeri; vendos vetë, ka në dorë edhe gurin edhe arrën; bëhet ashtu siç thotë a siç do ai. S'di të lidhë ushkurin (ushkurët) mospërf. është njeri i humbur, s'di të bëjë asgjë, nuk është i zoti as për veten e tij. Ia lidhi gojën me fashë shih te FASH/Ë,~A. E lidhi këmbë e duar dikë shih te KËMB/Ë,~A. Lidh këmbët me gjalmat e mi shih te GJALM/Ë,~I. Lidh krye me krye shih te KRYE,~T. E lidh lekun (paranë) nyjë shih te NYJ/Ë,~A. E lidh lekun me ushkur mospërf. shih tek USHKUR,~I."]}]</script>
