<script>window.__INITIAL_DATA__ = [{"slug":"thikee","term":"THIKË","attributes":["m.","sh."],"definitions":["Mjet i vogël, me një presë të gjatë të metaltë e me një dorezë prej druri a prej një lënde tjetër, që përdoret për të prerë bukë, mish, pemë, perime, në mjekësi etj. Thikë e mprehtë. Thikë buke. Thika e duhanit. Thikë operacioni. Thikë me majë. Thikë me dy presa. Thikë sharrë. Doreza (presa, maja) e thikës. Tehu i thikës. Mpreh thikën. E preu (e griu, e theri, e çau) me thikë. I nguli thikën. I ra me thikë.","Pjesë e metaltë dhe e mprehtë e një almiseje, e një pajisjeje etj., që shërben për të prerë a për të grirë diçka ose për të lëmuar a për të rrafshuar sipërfaqen e diçkaje. Thikë rrethore. Thikë prerëse (ndarëse). Thika e zdrukthit. Thika e tornos. Thika e parmendës. Thika e makinës grirëse.","fig. Vend shumë i pjerrët, që vjen gati, pingul. Shkuan nëpër rripa e thika.","përd. mb. Shumë i pjerrët, që vjen a që zbret gati pingul. Vend thikë. E përpjet ë(e tatëpjetë) thikë. Nëpër faqet thikë të malit (të kodrës). Ishte thikë rruga (bregu).","përd. ndajf. Pingul. Vjen ( zbret, ngrihet, bie) thikë.","fig. Dhembje e fortë që të pret si thikë, sëmbim i fortë, therje në një pjesë të trupit. Kam një thikë në shpatull. E zuri një thikë në gjoks (në mes, në bark). Më dha një thikë. * U bë për thikë u bë për të therur, do therur (për kafshët). U bënë për thikë u zunë keq, arritëm deri atje sa mund të thereshin me njëri-tjetrin, sa mund të vritnin njëri-tjetrin. Hyri në thikë bised. shih te HYJ. Janë në thikë janë zënë e janë grindur keq, janë armiq të papajtueshëm. E ndau (e preu) me thikë diçka e ndau shumë qartë, e veçoi mirë, e dalloi në mënyrë të prerë një gjë nga gjërat e tjera. Është e prerë me thikë diçka shih te PRERË (i, e). I shkoi në thikë i theri të gjithë. Me thikë ndër dhëmbë keq shih te DHËMB,~I. Si thika në gjalpë shih te GJALP/Ë,~I. Thikë pas shpine keq. shih te SHPIN/Ë,~A. Thikë në zemër goditje shumë e rëndë shpirtërore. I ra (iu ngul, i mbeti) thikë në zemër i erdhi shumë keq për diçka, i shkaktoi dhembje të madhe; e dëshpëroi pa masë, e vrau rëndë shpirtërisht. E ka thikë në zemër i ka ardhur shumë keq për diçka dhe s'e harron dot, ndien dhembje të madhe kur e kujton dikë a diçka. I vuri në thikë i bëri të zihen keq; i bëri të theren e të vriten njëri me tjetrin. I ra thika (sëpata, luga, sqepi, shpata) në mjaltë shih te MJALT/Ë,~I. Është (qëndron) në teh (në presë) të thikës (të briskut të shpatës) shih tek. TEH,~U. Është thikë (presë) me dy presa (tehe) ka sa të mira aq edhe të këqija, sa mund të të ndihmojnë aq edhe të dëmtojë; kërkon kujdes të madh. Janë thikë më thikë i kanë acaruar keq marrëdhëniet, janë armiq të papajtueshëm, janë dhëmb për dhëmb. Janë në thikë e në pikë i kanë acaruar marrëdhëniet sa më s'bëhet, janë bërë armiq të papajtueshëm. E kishte thikën (lakun, litarin) në grykë (në fyt) shih te LAK,~U. I nguli (i futi) thikën prapa kurrizit (pas shpine) shih te KURRIZ,~I. E pret si dhia thikën shih te DHI,~A. Me thikë (me shpatë, me pallë) zhveshur shih te ZHVESHUR. Shkojnë (janë) thikë e brisk (brisk e thua) shkojnë shumë keq njëri me tjetrin; i kanë acaruar, shumë marrëdhëniet. I vajti thika në heqës shih te HEQËS,~I II. I ka shkuar, (i ka vajtur) thika, në kockë (në asht, në palcë) është në gjendje shumë të rëndë e në hall të madh, ka arritur në një gjendje që s'mund ta durojë më. I vuri thikën (thonjtë) në grykë (në fyt) dikujt shih te GRYK/Ë,~A. Dhurata e armikut o helm o thikë fj.u. shih te HELM,~I I. Përpara rripë e prapa thikë shih te RRIP/Ë,~A. Pret thika në mish të botës thuhet kur dhembja e tjetrit, gjendja e tij e vështirë etj. s'i bëjnë përshtypje dikujt. Të mos na presë thika vetëm në njërën anë të mos shohim vetëm gabimet, mungesat e të metat e tjetrit, por edhe tonat, të mos jemi të njëanshëm."]}]</script>
