<script>window.__INITIAL_DATA__ = [{"slug":"ndahem","term":"NDAHEM","attributes":["vetv."],"definitions":["Largohem nga një njeri a nga shumë veta, me të cilët isha bashkë; veçohem, shkëputem. U nda nga shokët (nga radhët, nga turma). I zunë dhe u ndanë. U ndamë nëpër klasa (në grupe). U nda mënjanë (veç). Sapo u ndamë prej tij. Delja që ndahet nga shoqet e ha ujku. fj. u.","Shkëputem nga bashkëshorti, pres marrëdhëniet bashkëshortore, prish martesën; nuk rroj më së bashku me dikë, dal si familje veçan; largohem nga dikush, me të cilin kam pasur lidhje të ngushta, ndërpres marrëdhëniet për shumë kohë ose përgjithnjë, iki, i lë lamtumirën dikujt. U nda nga i shoqi. U nda nga vëllezërit (nga prindërit). U ndanë me mall. Nuk ndahej dot nga e ëma. U nda me vete. Nuk ndahen nga fshati. U ndamë për së gjalli kemi një kohë të gjatë pa u takuar.","(me pjesëzat mohuese nuk, s', mos). Ndjek me ngulm dikë, i vihem pas; i rri vazhdimisht pranë; i bie më qafë, e shqetësoj vazhdimisht, nuk i hiqem, nuk i largohem. Nuk iu nda për asnjë çast. Mos iu ndani! S'iu ndanë ethet (sëmundjet,. kokëçarjet). Nuk iu nda shati nga dora. E mira mos t`u ndaftë ur. Njeri që s'të ndahet. Nuk më ndahet një mendim (një dyshim). Nuk u ndahet shokëve ecën në një hap me të tjerët, punon njësoj si të tjerët.","fig. (me pjesëzat mohuese nuk, s', mos) i vihem diçkaje me zell, e bëj vazhdimisht e pa ndërprerje, i rri përsipër. Nuk i ndahet punës. Nuk u ndahet librave (mësimeve). Nuk u ndahet arave (bagëtive).","fig. Dal nga një gjendje e vështirë; kapërcej disa rrethana a kryej diçka me një përfundim të caktuar. U ndanë me nder (me faqe të bardhë, faqebardhë). U ndamë mirë (keq). Nuk ndahemi shëndoshë (do të ndahemi keq) mosmarrëveshja ose grindja do të ketë pasoja shumë të rënda. Si u ndatë me të korrat sivjet?","Jam i një mendimi tjetër, nuk bashkohem me mendimet ose me veprimet e një tjetri, ndryshoj. Ndahemi në mendime. Në këtë pikë ndahemi. Mbledhja u nda me dysh.","vet. veta III. Copëtohet në pjesë të veçanta (një e tërë), pjesëtohet; i shkëputet një pjesë; përbëhet nga pjesë të veçanta. U nda me dysh (me katërsh, përgjysmë). Ndahet në degë. Rruga ndahet më dysh. Ndahet në shtresa. Ndahet në grupe (në klasa).","Pës. e NDAJ. Ndahet me mur (me gardh). U ndanë të hollat. U ndanë rolet (detyrat). U nda dita e martesës. Nuk ndahet nga larg. * U ça e u nda shih te ÇAHEM. U nda nga jeta (prej nesh, nga gjiri ynë) vdiq. Ndahet (është) në shenjë shih te SHENJ/Ë, ~A. S'u ndahet shpirti shih te SHPIRT,~I. Më ndahet zemra dysh shih te ZEM/ËR, ~RA. S'ndahet mishi prej thoit fj.u shih te MISH,~I."]}]</script>
