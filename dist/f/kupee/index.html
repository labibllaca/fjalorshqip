<script>window.__INITIAL_DATA__ = [{"slug":"kupee","term":"KUPË","attributes":["f.","sh."],"definitions":["Enë e thellë prej qelqi, prej metali etj., e rrumbullakët e zakonisht pa dorezë, që përdoret për të pirë ujë ose pije të ndryshme (verë, raki etj.); gotë uji; sasia e ujit a e pijes sa nxë kjo enë. Kupë kristali (ari, argjendi). Kupa pijesh (vere). Më jep një kupë ujë! Piu dy kupa.","Tas prej balte për të ngrënë gjellë, kupore. Ha në kupë.","Kupac. Mori një kupë me ullinj. I shtypin hudhrat në kupë.","kryes. sh. Gota të posaçme qelqi, me buzë të trasha, të cilat i hidhen zakonisht në shpinë dikujt që ka marrë të ftohtë a që ka dhembje në trup. Hedh kupa. Heq kupat. I zunë mirë kupat.","sport. Vazo e bukur prej qelqi a prej metali, që i jepet ekipit ose lojtarit fitues në një kampionat, në një garë a në një ndeshje. Kupa e Republikës. Kupa ballkanike. Kupa e kupave. Ndeshje për kupën. Fituesja e kupës. Mori kupën.","anat. Eshtër rrotullore ose në trajtë gjysmërruzulli në gju ose në kokë. Kupa e gjurit eshtra rrotullore dhe e lëvizshme e gjurit. Kupa e kokës kafka. E goditi në kupë të gjurit.","Diçka që vjen a që duket si gjysmërruzull i zgavërt. Kupa e qiellit hapësira e qiellit e kufizuar nga horizonti, qielli. Kupa e tavanit. Kupa e liqenit. Është mbushur kupa e rezervuarit me llum.","bot. Fletë të vogla të gjelbra, të vendosura në trajtë hinke, që mbështjellin dhe mbrojnë burbuqen e lules. Kupa e lules (e karafilit, e trëndafilit).","fig. bised., keq. Vesi i të pirit alkool; rakia. Ishte dhënë pas kupës. Nuk e la kupa. E mori më qafë (e shkatërroi, e rrënoi) kupa.","Një nga katër llojet e letrave të bixhozit, me shenjë si zemër në ngjyrë të kuqe; letra me këtë shenjë; në sh. lojë me letra, në të cilën vlerën kryesore e kanë letrat me këtë shenjë. Kam dy kupa. Hedh kupën. Luajnë kupat. * E derdhi kupën e ka kaluar masën (në sjellje e në veprime të këqija), e ka tepruar, nuk durohet më. E mbushi kupën (gotën) shih te MBUSH. U mbush kupa shih te MBUSHEM. Ngre (çoj) kupën (gotën, dollinë, shëndetin) shih te NGRE. Për ta pirë në kupë shih te PI. Ia thau kupën shih te THAJ. Të than kupën shih te THAJ. Çirret (bërtet, thërret) në kupë të qiellit shih te QIELL,~I. Ha bukën e përmbys kupën shih te HA. E piu (gjithë) kupën (e hidhërimit, e mjerimit) libr. pësoi një fatkeqësi të madhe, u dëmtua dhe u hidhërua shumë. Ka pirë kupën e hidhur libr. shih te HIDHUR (i, e)."]}]</script>
