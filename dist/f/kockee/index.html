<script>window.__INITIAL_DATA__ = [{"slug":"kockee","term":"KOCKË","attributes":["f.","sh."],"definitions":["Secila nga pjesët e veçanta që përbëjnë skeletin e njeriut dhe të kafshëve kërbishtore; lënda që përbën skeletin ose copë e thyer a e prerë prej tij; eshtër. Kocka e këmbës (e dorës). Kockat e gishtërinjve. Me kockë të trashë kockëtrashë. Iu thye (iu ngjit) kocka. Më dhembin (më therin) kockat ndiej dhembje në trup (nga lodhja ose nga një sëmundje). Mish pa kocka s'ka. fj. u. Gjuha kocka s`ka e kocka thyen. fj. u.","në sh. Mbeturina pjesësh të skeletit të një njeriu që ka vdekur ose të kafshëve kërbishtore të ngordhura prej kohësh.","Ashik me të cilin lozin fëmijët.","fig. Gjë e vogël e pa vlerë të madhe, që i jepet si ryshfet dikujt për ta mashtruar ose për ta bërë për vete. I dhanë një kockë. Fitoi vetëm ca kocka.","fig. Pjesa kryesore, më e fortë e më e shëndoshë e diçkaje; pjesa thelbësore, thelbi; tipari themelor i një njeriu me karakter të fortë e të qëndrueshëm, forcë karakteri; njeri me karakter të tillë a me trup të fortë. Ka kockë të fortë. S'ka kockë. Është kockë e fortë a) është njeri që nuk mposhtet lehtë, është njeri i papërkulshëm; b) është njeri që rron shumë, është i qëndrueshëm dhe në gjendje të punojë edhe në pleqëri. * Deri në kockë shumë thellë, deri në palcë. I ranë kockat u lodh shumë së bëri një punë; u dërrmua. Deri sa të më bien kockat derisa të jem gjallë, derisa të marr frymë. Cipë e kockë shih te CIP/Ë,~A. I kanë dalë kockat është dobësuar shumë. S'ka kockë (për të bërë një punë) nuk ka fuqi, nuk është në gjendje ose nuk është i zoti për të bërë atë punë. Kjo kockë e di unë vetë, që kam hequr, e di si është puna. La kockat (lëkurën, leshtë) keq. a) vdiq, u vra diku; b) u mundua shumë në një punë. I la kockat udhëve (rrugëve) vdiq në një vend të largët, larg shtëpisë e të afërmve. Mbledh (shpij) kockat çlodhem pas një pune të madhe a pas një rruge të gjatë. Me mish e me kockë (me gjak) shih te MISH,~I. Ia theu kockat e rrahu shumë, e zhdëpi në dru. U bë kockë e lëkurë a) u dobësua shumë, u tret e u tha (nga të pangrënët a nga ndonjë sëmundje); b) u bë shumë i varfër e i këputur. Lëpin kockat e hedhura shih te LËPIJ. Ka zemër me kockë ka zemër të fortë, është trim. Janë si mishi me kockën (me thuan) shih te MISH,~I. I mbeti kocka në fyt nuk ia arriti dot qëllimit për të përfituar diçka. I ka vajtur (i ka shkuar) thika në kockë shih te THIK/Ë,~A. Kocka e thatë nuk lëpihet fj. u. mos kërko aty ku nuk ka gjë prej gjëje, s'ke ç'merr aty ku s'ka gjë."]}]</script>
