<script>window.__INITIAL_DATA__ = [{"slug":"valee","term":"VALË","attributes":["f.","sh."],"definitions":["Shtresë uji në sipërfaqen e detit, të liqenit, të lumit etj., që lëviz, ngrihet e ulet zakonisht nga era dhe që duket sikur zhvendoset drejt bregut; dallgë, shkulm. Valë e madhe (e fuqishme). Valë të shkumëzuara. Valët e detit (e lumit). Lartësia e valës. Kreshta e valës. Det me valë. Bën valë. Ngrihen valë. Sjell valë. Përplasen (thyhen) valët. Çau valët. Vjen vala. Ujitje me valë ujitje duke lëshuar ujin me vrull në gjithë arën, ujitje me përmbytje.","Diçka që i ngjan dallgës së ujit ose që lëviz dallgë-dallgë; turmë njerëzish që lëvizin në trajtën e dallgëve; rrymë. Valët e rërës. Valët e grurit në arë. Valët e flamurit. Valët e flokëve. Valë të nxehta ajri. Valët e demonstruesve. Vala goditëse e ajrit rrymë e fortë ajri, që shkaktohet nga shpërthimi i një arme bërthamore.","spec. Dridhje të rregullta të ajrit, në trajtë dallgësh të vogla, që shkaktohen nga lëkundjet e një trupi tingëllues në një mjedis; dallgë drite ose dallgë grimcash elektromagnetike, që krijojnë një fushë e përhapen në një drejtim a në një mjedis të caktuar. Valë tërthore (gjatësore). Valë të gjata (të mesme, të shkurtra). Valë elektromagnetike. Valë televizive. Valë zanore. Valët e zërit. Valët e dritës. Valët e radios. Gjatësia e valës. Përhapja e valëve. Kapja e valëve.","Gjendja e ujit, e qumështit etj. kur valon; ujë që valon a që ka valuar, ujë shumë i nxehtë. Tas me valë. Gatuaj bukën me valë. Është në valë. Merr valë valon. I dha një valë e valoi.","bised. Enë prej metali (gjym, kusi etj.), që vihet në zjarr për të zier ujë. Vuri valën në zjarr. Lepuri në mal e vala në zjarr. fj. u. iron.","kryes. sh. ~A, ~AT. Bula a flluska me ajër, që formohen në ujë ose në një lëng kur zien. Lëshon vala.","krahin. Gjellë që bëhet me bukë të përsheshur në ujë të valuar e me yndyrë ose në qumësht të valuar; papare. Valë e ngrohtë. Valë çobanësh. Valë me qumësht.","fig. bised. Radhë, herë. Valën tjetër. Këtë valë. Valë pas vale herë pas here. Kishte valën.","fig. Lëvizje përpara e me vrull e diçkaje, që rritet gjithnjë e më shumë; pika më e lartë e një veprimtarie a e një pune, kulmi; shfaqja më e fortë e një ndjenje; rrjedhë a rrymë e fortë, dallgë vrull. Valë e fuqishme. Valë revolucionare. Valë patriotike. Valë gëzimi (dashurie, zemërimi, entuziazmi). Vala e urrejtjes. Vala e sëmundjes. Valët e jetës. Valët e luftës revolucionare (klasore). Valë terrori. Valë grevash (demonstratash, protestash). Vala e aksioneve. Në valët e revolucionit. Jemi në valën e punës. U ngrit (ra) vala. E mori vala. I dha valë i dha vrull. Mori valë puna mori vrull.","përd. mb. Shumë i nxehtë, që të djeg, që të përvëlon; shumë i ngrohtë. Ujë valë. Gjella është valë. Dhoma ishte valë. Shtrati është valë. E bëri valë e ngrohu shumë, e nxehu mirë. U bë valë u ngroh shumë, u nxeh mirë.","përd. ndaj. Përdoret për të shprehur shkallën e lartë të nxehtësisë me kuptimin «shumë». I nxehtë valë. * Pikë e valë shih te PIK/Ë,~A. Në valë të gjakut shih te GJAK,~U I. Vala e shpirtit grahma e vdekjes. I ka rënë një valë mbi kokë (mbi krye) dikujt a) e ka pushtuar një dëshirë e zjarrtë, dashuria për dikë etj.; i është ngulur në kokë një mendim që e mundon; b) e ka zënë një hall i madh, po i zien koka. E morën (punën) me valë e morën me rrëmbim a me të ashpër. Mori valë puna (biseda) u acarua, u ashpërsua puna (biseda)."]},{"slug":"valee","term":"VALË","attributes":["mb."],"definitions":["Shumë i ngrohtë që të përvëlon, që të djeg, shumë i nxehtë (zakonisht për ujin e për lëngje të tjera). Ujë i valë. Gjellë (bukë) e valë. Afsh i valë. Djersë të vala. * I ra uji i valë u tremb, u shqetësua shumë nga diçka që i erdhi papritur."]}]</script>
