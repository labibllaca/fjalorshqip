<script>window.__INITIAL_DATA__ = [{"slug":"dridhem","term":"DRIDHEM","attributes":["vetv."],"definitions":["vet. veta III. Rrotullohet vetë disa herë rreth vetes në një drejtim e shtrëngohet; përdridhet; kund, zhdridhet. U drodh peri (filli, litari). Iu drodh gjalmi.","bised. Rrotullohem në një drejtim, rrotullohem nga njëra anë në tjetrën, kthej trupin, kthehem; përdridhem. U drodh majtas (djathtas). Dridhet e përdridhet.","vet. veta III. Merr trajtë të valëzuar, bëhet dredha-dredha; përdridhet. Kanë filluar t'i dridhen flokët.","bised. Ndërroj a kthej rrugën, lë rrugën që kam nisur e marr një tjetër, kthehem, dredhoj. U drodh nga e majta. U drodhën prapa kodrës.","vet. veta III. Lëviz shpejt e shumë herë, bën lëkundje të shpeshta, ka dridhje. Dridhen gjethet e pemëve. Dridhet teli. I dridhet dora. I dridhej buza (mjekra). I dridhen gishtërinjtë. Dridhet si purteka në ujë. Dridhet flaka.","Më zënë të dridhurat, rrëqethem (nga ethet, nga të ftohtët etj.); kam të dridhura a rrëqethje në trup nga një ndjenjë e fortë; fig. drithërohem. Dridhej nga të ftohtët (nga ethet). Dridhej nga inati (nga dëshpërimi, nga frika). Dridhej për të birin.","edhe fig. bised. Tundet që nga themelet diçka, tundet a lëkundet fort, tronditet; më zë një frikë e madhe, më hyjnë dridhmat, trembem shumë, tmerrohem. Dridhej toka prej tij. Dridhej para tij.","vet. veta III. Del duke lëvizur lehtë më lart e me poshtë se toni kryesor, ngrihet e ulet pak (për zërin). I dridhej zëri nga mallëngjimi (kur këndonte).","vet. veta III. Jep një shkëlqim herë të fortë e herë të dobët, vezullon. Dridheshin yjtë. Dridhet drita. Në sy i dridhej një dritë.","Pës. e DREDH. * I dridhet buza (mjekra) shih te BUZ/Ë,~A. I dridhet dora shih te DOR/Ë,~A. Iu drodhën flokët (qimet e kokës, leshrat e kokës) shih te FLOK,~U. I dridhet (i ngatërrohet) gjuha mezi i nxjerr fjalët nga goja, mezi flet, i ngatërron fjalët (nga frika, nga një shqetësim i madh, nga mallëngjimi etj.). I dridhen gjunjët (leqet e këmbëve) shih te GJU,~RI. Ia drodhën këllqet shih te KËLLK,~U. I dridhet (i ngjethet) mishtë shih te MISH,~I. Dridhet e përdridhet i shmanget përgjigjes së drejtpërdrejtë; përpiqet t'i shpëtojë me dredhi një gjendjeje të vështirë; ndryshon shpejt e disa herë qëndrimin e vet. S'i dridhet pushka edhe poh. shih te PUSHK/Ë, ~A. Iu drodh zemra (shpirti) shih te ZEM/ËR,~RA. Nuk i dridhet (nuk i luan, nuk i lëviz) bebja e syrit (syri, qepalla, qerpiku) shih te SY.~RI. Iu drodh këmisha në trup (në shtat) shih te KËMISH/Ë,~A. I dridheshin plaçkat e barkut shih te BARK,~U. Ia drodhën telat e zemrës edhe iron. shih tek TEL,~I. I dridhet (i rrëshqet, i shket, i luan, i lëviz) toka (trualli) nën këmbë a) gjen qëndresë të fortë dhe nuk po e mban dot të pushtuar një vend; b) mezi mbahet, shkon drejt rënies e shkatërrimit. Dridhej foshnja (fëmija, barra) në barkun e nënës ishte një gjendje plot tmerr, të gjithë kishin shumë frikë."]}]</script>
