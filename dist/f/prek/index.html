<script>window.__INITIAL_DATA__ = [{"slug":"prek","term":"PREK","attributes":["kal."],"definitions":["Përkas a takoj lehtë me dorë ose me diçka tjetër, çik pak dikë a diçka; arrij ta takoj me dorë, me gishta etj. Preku flokët. Preku murin. E preku në sup (në krah). Prek me dorë (me gisht, me shkop). Prek lehtë (pak). Mos e prek, se e fëlliq! E bardhë është edhe bora në mal, por po ta prekësh mërdhin. fj. u. jo çdo gjë që është e bukur a e ndritshme, është doemos edhe e mirë; pamja të gënjen.","edhe jokal. Has a takoj në diçka; çik, përkas; zë. Preku në mur (në tavan). Topi preku rrjetën. Nuk e preku plumbi fare. Anija preku fundin e detit. Preku në fund të lumit. Degët prekin në tokë. Nuk prekte në tokë. Sapo prekën rrezet e diellit në majat e maleve.","Vë dorën, gishtin etj. mbi diçka; provoj me dorë a me gisht; marr pak nga një ushqim që hahet për ta provuar ç'shije ka etj., zë me dorë, ngas. I preku pulsin (ballin). E preku me gisht. Mos e prekni bukën (mishin) përpara se ta blini! Nuk e preku fare gjellën (byrekun). Preke pak këtu!","vet. veta III fig. Ka të bëjë, lidhet me diçka; përket, çik. Nuk e prekën fare atë çështje në mbledhje. Forcimi cilësor i shkollës prek në radhë të parë brendinë e mësimit dhe të edukimit.","Marr diçka që zakonisht nuk më takon; e trazoj a e ngacmoj diçka a dikë me dorë a me diçka tjetër për të luajtur etj., nuk e lë të qetë; ngas. S`e prek gjënë e huaj. Mos i prekni pemët! Ku s`ke vënë mos prek! fj. u. Mos më prek! Qan pa prekur. S`e preku askush. Mos e prek macen, se të gërvisht! Mos e prek gjarprin në bisht, se të ha në gisht! fj. u.","fig. Cenoj diçka që mbahet si e shenjtë a e shtrenjtë; shkel diçka që mbrohet nga ligji ose nga shoqëria; vë dorë, cenoj; dhunoj. I preku nderin. U prekën të drejtat. Prek interesat e dikujt.","Merrem pak me një punë a me një veprimtari të caktuar (zakonisht me mohim); bëj; mësoj, studioj pak. S’prekte asnjë punë në shtëpi. Nuk e kishte prekur algjebrën fare dje. Nuk preku asnjë mësim. Nuk ka prekur gjë me dorë sot.","Bëj ndryshime në një dorëshkrim a në diçka tjetër, vë dorë. E preku thellë romanin. Nuk e ka prekur shumë. I kishte prekur pak këngët popullore të mbledhura nga bashkëpunëtorët.","vet. veta III. I bie, e zë, e kap (një sëmundje); i bie dhe e prish pak, e godit, e dëmton, e cenon. E ka prekur tuberkulozi. Sëmundja preku pulat (pëllumbat). I ka prekur vrugu fasulet. I preku bryma domatet. I preku moti i keq (lagështia) pemët.","fig. I ngjall dikujt ndjenja të thella, i lë mbresa, e mallëngjej; i shkaktoj dhembje shpirtërore, e shqetësoj shumë, e trondit; e fyej. E preku shumë qortimi i mësuesit. E preku në sedër. Më preku fjala (sjellja) e tij. Na preku të gjithëve ajo ndodhi. Qe një histori që të prekte.","vet. veta III. Vepron mbi dikë a mbi diçka dhe lë gjurmë, ushtron ndikim, kap, përfshin, shtrihet, përhapet. Greva preku shumë qytete. Papunësia ka prekur gjithë botën kapitaliste. Kriza ka prekur thellë dollarin amerikan.","fig. Shtjelloj shkurt a kalimthi një çështje, një problem etj., flas shkurt për diçka; çek, zë në gojë, përmend. Preku vetëm thelbin e çështjes. Preku shumë gjëra, por nuk u thellua. Këto çështje i prekën parafolësit. Mos e prek atë punë! * E preku (e shkeli) në kallo (në lyth) dikë shih te KALLO,~JA. E preku në plagë dikë i përmendi diçka të hidhur a diçka që i shkakton dhembje shpirtërore, i ngacmoi plagën. Ia preku (ia gjeti) telat dikujt shih tek TEL,~I. E preku në tela dikë shih tek TEL,~I. S'e prek tokën dikush a) mbahet më të madh, e mban hundën përpjetë, i duket vetja se kushedi se ç'është; b) nuk ka lidhje me masat e gjera, nuk e njeh bazën, jetën e gjallë. I preku xhepin dikujt shih te XHEP,~I. Më preku në zemër (në shpirt) shih te ZEM/ËR,~RA. Ecën (vrapon) pa pre kur në tokë ecën (vrapon) shumë shpejt, fluturon. I preku buza në gaz dikujt buzëqeshi lehtë, vuri paksa buzën në gaz. S'e prek dot as me pupël (as me pendë) dikë shih te PUP/ËL,~LA."]}]</script>
