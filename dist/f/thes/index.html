<script>window.__INITIAL_DATA__ = [{"slug":"thes","term":"THES","attributes":["m.","sh."],"definitions":["Trastë e madhe prej pëlhure të trashë (prej kërpi, liri, pambuku etj.) ose prej letre të trashë etj., të palosur më dysh për së gjati dhe të qepur në tri anë, që shërben si enë për të shtënë në të lëndë të ndryshme në trajtë kokrrizash, copash të vogla, pluhuri a fijesh (drithë, miell, sheqer, çimento, lesh etj.) dhe që lidhet a qepet në grykë; sasia e lëndës (e drithit, e miellit, e çimentos etj.), që përmban një enë e tillë, aq sa nxë kjo lloj traste e madhe. Thes i vjetër ( i grisur, i shpuar). Thes i mbushur (i zbrazur). Thes liri (letre). Thes çimentoje. Një thes me oriz (me sheqer). Një thes me qymyr (me kashtë, me lesh). Një thes gurë. Një gjysmë thesi misër. Katër thasë miell. Gryka e thesit. Fundi i thesit, mbush (zbraz, shkund, lidh, zgjidh) thesin. Ngarkoi thasët. Qep thasë. I rrinë rrobat si thes i rrinë rrobat shumë të gjera, shumë lirshëm.","fig. Sasi e madhe, shumicë. Një thes me fjalë (me budallallëqe). Një thes me pyetje (me premtime). Gënjeshtra me thes. Gabon me thes. Fitonte me thes. Ka çrregullime me thes. * Derr në thes keq. pa ditur gjë, pa e parë ose pa e njohur fare dikë a diçka. E futi (e shtiu) në thes (në grackë, në kurth, në lak, në kllapë) dikë shih te SHTIE. E fut në një thes (me një tjetër) e barazon me dikë a me diçka tjetër, e quan njëlloj me të, e ngatërron me një tjetër; përzien njerëz a gjëra që nuk janë njësoj. Është thes përrallash (fjalësh, llafesh) dikush është llafazan i madh; i thotë të gjitha ç’di, s’mban gjë të fshehtë, s’i mban gjë goja. E ka në thes dikë e ka në dorë dhe bën ç’të dojë me të. Me krye (me kokë) në thes (në torbë, në trastë) shih tek TORB/Ë,~A. E mbushi thesin e teproi me gabime e me të këqija, e mbushi kupën. E shkundi thesin shih te SHKUND. As në thes as në torbë i paqëndrueshëm, që s’gjen karar. Thes me dy gryka shih te GRYKË,~A. Thes (harar) i shpuar (i grisur) shih te SHPUAR (i,e). Thes me pleshta diçka krejt e pamundshme, stan me lepuj. E zbrazi thesin shih te ZBRAZ. E zgjidhi thesin shih te ZGJIDH. Është bërë si thes me lesh është fryrë shumë, është shëndoshur jashtë mase. Nuk drejtohet litari (tërkuza, konopi) në thes fj.u. është e pamundur të bëhet, s’ka s’i bëhet (një punë). Nuk fshihet derri në thes fj.u. shih te DERR,~I. Nuk futet (nuk hyn, nuk fshihet) minarja (hosteni) në thes fj. u. shih te MINAR/E,~JA. S’futen pleshtat në thes (s’mblidhen pleshtat në grusht) shih te PLESHT,~I. Gjeti hajduti thesin (u poq hajduti me thesin) fj. u. keq. gjeti tenxherja kapakun, gjeti rrasa vegshin. Hyn në një thes me dikë a me diçka edhe moh. barazohet me dikë a me diçka tjetër, merret si i njëjtë a quhet i njëllojtë me dikë a me diçka tjetër. Kemi ngrënë një thes (një barrë) kripë (një furrë bukë, një hambar miell) bashkë shih te FURR/Ë,~A. S’më hyn gjë në thes s’më përket mua, s’është puna ime; s’përfitoj gjë unë. S’është në shesh, po në thes është i fshehur. U ka dhënë një thes bukë i ka ndihmuar shumë, i ka ndihmuar me diçka të domosdoshme. Kishte para me thasë (me thes) dikush kishte shumë para ishte shumë i pasur. E la thes në vend e vrau në vend, e la top në vend. Mbeti thes në vend vdiq në vend, ra vdekur. Miell nga thesi i botës (i huaj) iron. shih të MIELL,~I. U ndesh arna me thesin shih tek ARN/Ë, ~A. Shiko drithin e jo thesin! fj.u. shih DRITH,~I. E shtie (fut) shejtanin (dreqin, djallin) në thes (në shishe) shih te SHISH/E,~JA. Nuk shtiu (nuk futi) gjë në thes nuk përfitoi ndonjë gjë për vete; s’arriti të nxirrte gjë për vete. Ulërimë me thes në kokë diçka e tmerrshme, për të vënë duart në kokë. Iu zgjidh (iu çel) gryka thesit shih te GRYK/Ë,~A. E di mesi se ç’ka thesi fj.u. shih te MES,~I. Drapri në thes (brenda) e maja jashtë shih te DRAP/ËR,~RI. Fjalë të mira e gurë në thes (në trastë, në torbë) shih te GUR,~I. Është ngordhja me thes në kokë është shumë ftohtë, po bën të ftohtë i madh. Nuk është miell i thesit të tij shih te MIELL,~I. E ktheu thesin me grykë poshtë shih te GRYK/Ë,~A. Merr nga torba e hedh në thes merr nga ai që ka pak e ia jep atij që ka shumë; merr nga i varfëri e ia jep të pasurit. Ruan me trastë e prish me thasë fj.u. shih tek TRAST/Ë,~A. Thesi bosh (i zbrazur, pa gjë) s’qëndron (s’rri) më këmbë fj.u. njeriu nuk jeton e nuk punon dot pa ngrënë."]}]</script>
