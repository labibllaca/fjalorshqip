<script>window.__INITIAL_DATA__ = [{"slug":"qaj","term":"QAJ","attributes":["jokal."],"definitions":["Derdh lot me dënesë ose pa zë nga dhembja e madhe, nga hidhërimi ose nga një ndjenjë tjetër tronditëse; lotoj; kund. qesh. Qan me (pa) lot. Qan me (pa) zë. Qan me dënesë (me ngashërim). Qan me të madhe. Qan nga hidhërimi (nga inati, nga gëzimi). Qan foshnja në djep. Qan e bot. bised. derdh lot pa pushuar, me të madhe. Qan si fëmijë. Zuri (nisi, filloi) të qante. Plasi së qari. E bëri të qante. I vjen për të qarë.","vet. veta III (me një trajtë të shkurtër të përemrit vetor në r. dhanore). Më rrjedhin lot (nga sytë). Më qajnë sytë.","vet. veta III. Pikon, rrjedh nga pak ose nxjerr bula të vogla uji në sipërfaqe. Qan toka (ara). Qan hardhia. Qan fuçia (voza, shtamba). Qan muri.","vet. veta III. Vishet me pika uji nga avulli (zakonisht për xhamat ose për anët e një ene prej qelqi). Qajnë xhamat. Qan gota.","vet. veta III. Nxjerr një zë të zgjatur e të çjerrë, gërvin. Qan dera (dritarja). Qan çikriku i pusit. Qajnë rrotat e qerres.","vet. veta III fig. E ndien shumë mungesën e dikujt a të diçkaje; e kërkon me të madhe, e pret me padurim. Qan shtëpia për burrë. Qan puna për lot. Qan toka (ara) për ujë. Qan pylli për sëpatë. Qajnë gurët e oborrit për të.","fig. vjet. Ankohem për diçka a kundër dikujt, qahem. Qan pa të drejtë.","kal. Vajtoj për humbjen e një të afërmi a për vdekjen e dikujt; shpreh me lot e me fjalë hidhërimin mbi trupin e një të vdekuri sipas zakonit për ta nderuar. Qau vajzën (djalin, burrin). Qan me ligje (me fjalë). E qau i gjithë fshati. E qau i madh e i vogël. Qafsh kokën tënde! mallk. vdeksh. Qafsha nënën (babanë!, të gjithë!). bised. betim për kokën e nënës (e babait, e të gjithëve) për të dëshmuar se ajo që themi është e vërtetë. Të qafsha! bised., shak. i thuhet me përkëdheli zakonisht një fëmije të hijshëm ose që bën diçka tërheqëse. Më qafsh! bised. i thuhet një njeriu të afërm kur i lutemi të bëjë diçka me kujdes a shpejt.","kal. fig. bised. Vajtoj për diçka të humbur ose që nuk kthehet më; e quaj të humbur diçka pa asnjë shpresë që ta gjej ose që të më kthehet. E qau rininë. Qante verën në dimër. Qaje atë kohë! E qau orën (kuletën). I qau paratë.","kal. fig. bised. Bëj në mënyrë të përkryer një punë që kërkon mjeshtëri të veçantë, shprehi e aftësi jo të zakonshme; e shkrij. E qan violinën (çiftelinë, gërnetën). E qante atë këngë. E ka qarë me lot përkthimin (hartimin, portretin). Ajo e qan byrekun (bakllavanë). E kishte qarë fare.","kal. thjeshtligj. E ha ose e pi diçka të tërën, s'lë asnjë çikë a asnjë pikë, e thaj. E qau glikonë. E qau gotën e rakisë. * Lan e qan shih te LAJ. E qau gërmadha shih te GËRMADH/Ë,~A. I qaj hallin dikujt a) i tregoj hallin tim dikujt për t'u këshilluar me të ose për të kërkuar ndihmë; b) më vjen keq për dikë, marr pjesë në hidhërimin e dikujt; shqetësohem e merakosem për dikë. Mos i qaj hallin atij! mos u bëj merak për të! (thuhet kur dikush shqetësohet për një njeri që është në gjendje të mirë ose që mund t'i përballojë vështirësitë a pengesat vetë a me ndihmën e miqve që ka). Ia qan piten diçkaje thjeshtligj. është shumë i zoti e i shkathët për të bërë diçka, ia del në krye shumë mirë një pune, e bën në mënyrë të përsosur një punë që kërkon aftësi e mjeshtëri të veçantë. Të qan (të than) qoshen e bën shumë mirë diçka, e kryen një punë me mjeshtëri. As qan, as qesh as i mirë, as i keq; as të ngroh, as të ftoh. Qan pa rrahur s'ka asnjë arsye që të jetë i pakënaqur, ankohet kot. I qan syri (i qajnë sytë) për dikë a për diçka e dëshiron shumë dikë a diçka. I qan shpirti (zemra) për dikë a për diçka a) vuan shumë për dikë a për diçka; b) ka dëshirë të madhe që ta ketë pranë dikë a të bëjë diçka. Më qan zemra te dikush dyshoj te një njeri, kam dyshim te dikush (për një vjedhje, për një shpifje, kallëzim etj.). Për të qeshur e për të qarë shih te QESH. Ishte bërë për të qarë me lot ishte në gjendje shumë të keqe, ishte në gjendje të vajtueshme. I fundit o qesh o qan. fj.u. ai që mbetet në fund kur ndahet diçka në pjesë o fiton o humbet (sepse mund t'i mbetet një pjesë më e madhe, por mund t'i mbetet edhe një pjesë më e vogël). ishte për të qarë hallin shih te HALL, ~I. Mos të qaftë syri kurrë! ur. shih te SY,~RI Qesh, se s’qan dot tregohet i gëzuar sa për sy e faqe, nuk ndjen gëzim me të vërtetë, qesh nga e keqja. Qesh me sy e qan me zemër nuk e shfaq përpara te tjerëve dhembjen a hidhërimin që ka. Sa të qajnë qetë, qan qerrja shih te KA,~U. Të vret natën e të qan ditën shih te VRAS. Kur të ikën koka (kur të presin kokën), mos qaj për flokët! fI. u. shih te KOK/Ë,~A. Po nuk qau fëmija, nuk i jep nëna (e ëma) sisë (gji, të pijë) fj. u. thuhet për një njeri që nuk flet për nevojat, për kërkesat ose për të drejtat e veta, por pret që t'ia plotësojnë vetiu. I qan hallin kalorësit se i varen këmbët shih te KALORËS,~I."]}]</script>
