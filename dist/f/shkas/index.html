<script>window.__INITIAL_DATA__ = [{"slug":"shkas","term":"SHKAS","attributes":["jokal."],"definitions":["Nuk më qëndrojnë këmbët atje ku shkel dhe zakonisht humbas drejtpeshimin e rrëzohem; më shkon këmba tutje kur shkel në një sipërfaqe të lëmuar, të pjerrët a mbi diçka të butë, nuk qëndron dot në një sipërfaqe të tillë, shkon tutje dhe mund të dalë nga rruga a nga drejtimi ose mund të rrëzohet, rrëshqas. Shkau në baltë (në akull, në bar). Shkau, po nuk ra. Shkau kali (mushka). Shkau makina. Shkau shkalla. Më shkau këmba. Më shkasin këpucët (çizmet). I shkanë gomat makinës.","shih RRËSHQAS","Shkas mbi akull.","vet. veta III. Ecën lehtë e pa pengesa mbi ujë, mbi binarë etj. (për mjetet e transportit); lëviz lehtë (për retë, mjegullën). Treni shket mbi shina (mes fushave). Shket anija përmbi valë. Shkasin retë në qiell.","vet. veta III. Rrjedh në mënyrë të njëtrajtshme a të qetë dhe pa u ndalur e pa pengesë; shkon poshtë duke rrjedhur; rrëshqet. Shket lumi mes fushës. Shket çeliku i shkrirë. I shkanë lotët nëpër faqe.","vet. veta III fig. Ikën shpejt e pa u ndier, rrjedh, rrëshqet. Shkasin ditët (javët, muajt). Shket koha.","Shkëputem e bie tatëpjetë; kryes. veta III ikën nga vendi e bie poshtë; shkëputet e ikën tutje; më ikën, më shpëton nga duart. Shkau në një greminë. Shkau një gur nga mali. Shkau nga pema (nga çatia). Më shkau sapuni (gota, shishja) nga dora. I shkau litari. I shkau këpuca nga këmba. I shkau palltoja nga krahët. I shkau nga duart si ngjalë.","vet. veta III. Shkëputet nga vendi dhe ulet poshtë, shembet pak nga pak ose përnjëherë, rrëshqet. Shket dheu (toka). Shket vendi atje. Ka shkarë ledhi.","vet. veta III. Zbret pak më poshtë nga vendi i vet, varet. I shkanë pantallonat. I ka shkarë fundi mënjanë. I ka shkarë stomaku.","Iki fshehurazi, largohem pa u vënë re e pa u ndier, rrëshqas, përvidhem. Shkau përjashta pa u kuptuar.","fig. I bëj bisht, i dredhoj, i shmangem, i rrëshqas. I shkau përgjigjes. U shkau pyetjeve. I shkau kontrollit (përgjegjësisë). I shkau nga fjala. Shket si ngjalë dredhon, nuk ia ngarkon dot fajin a përgjegjësinë.","vet. veta III fig. Kalon lehtë e shpejt mbi diçka; endet andej-këtej e shkon e bie mbi dikë a mbi diçka. Vështrimi i shkau nëpër fusha. Sytë i shkanë tek ajo.","kryes. veta III fig. Bëj padashur një veprim të gabuar, diçka që s'duhet bërë; më shpëton një gabim më kalon pa e kapur; them padashur diçka që nuk duhej thënë; më shpëton. Më shkau goja (gjuha). I shkau një fjalë. I shkau kalemi (pena). I shkau dora e i hodhi gjellës shumë kripë. I kanë shkarë shumë gabime. Si më paska shkarë kjo? Këtu shkave!","fig. Largohem pjesërisht ose tërësisht, pak nga pak e ndonjëherë pa e vënë re as vetë, nga pozitat e drejta dhe filloj të mbaj qëndrime të gabuara. Shkau nga vija (nga parimet). Shkau nga e djathta (në oportunizëm). Shkau në idealizëm (në ekonomizëm, në reformizëm). Shkau në gabime. * I shkanë burgjitë (vidhat) dikujt ka luajtur nga mendtë, s'është më në vete, s'është më në terezi, lajthiti. I shkau nga duart (nga dora) dikush a diçka e humbi kontrollin mbi të, s`e zotëron dot më, nuk e ka më në dorë. Më shkau (me rrëshqiti) gjuha (goja) shih te GJUH/Ë,~A 1. I shkanë (i rrëshqitën) këmbët (i shkau këmba) dikujt ka bërë një gabim dhe si pasojë humbi pozitën që kishte, ra. I shket pena dikujt është i zoti t'i hedhë në letër me lehtësi mendimet e veta; është i aftë për të shkruar artikuj a vepra të tjera. I ka shkarë syri dikujt e ka parë dhe e ka pëlqyer dikë, i është mbushur mendja për të. I shkau (i rrëshqiti) shëndeti dikujt shih te SHËNDET, ~I 1. I shkanë (i kanë shkarë) trutë dikujt s`është më i aftë të arsyetojë e të gjykojë drejt e në mënyrë të shëndoshë, ka humbur qartësinë mendore, s'është në vete. I shkanë themelet dikujt a diçkaje nuk ka më një mbështetje të sigurt, ndodhet përpara shembjes, rënies, shkatërrimit a humbjes; nuk e ka jetën të gjatë. I shket (i dridhet, i rrëshqet, i luan, i lëviz) toka (trualli) nën këmbë shih te DRIDHEM."]}]</script>
