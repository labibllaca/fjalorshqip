<script>window.__INITIAL_DATA__ = [{"slug":"copee","term":"COPË","attributes":["f.","sh."],"definitions":["Pjesë e diçkaje të ngurtë, që është thyer, është shkëputur ose është ndarë nga e tëra. Copë e vogël (e madhe). Një copë bukë (djathë, mish). Një copë byrek. Copë teli. Copë tulle (guri, druri). Copë predhe. Copë pasqyre. Një copë letre. Copëra metali. I këput një copë. Thyej një copë. Heq një copë. Ha një copë. Pres në copa. Ndaj në dy copa. Kush kërkon copën e madhe, humbet edhe të voglën. fj.u.","Pjesë e diçkaje në përgjithësi, pjesë e një të tëre; një pjesë kohe, jete etj. Një copë tokë. Një copë rrugë. Një copë e jetës. Një copë kohë. Një copë herë një farë kohe, ca kohë, jo gjatë. Copëra bisedash. Gjumë me copa gjumë i ndërprerë, gjumë copa-copa. E bëj rrugën me copa e bëj rrugën pjesë-pjesë, duke u ndalur kohë pas kohe, jo menjëherë. Një copë një të tërë, pa e ndarë në pjesë.","Pjesë e shkëputur nga një vepër letrare ose artistike. Copa këndimi. Copa letrare. Copa muzikore. Copa melodish. Copa të zgjedhura.","Pjesë e një stofi ose e një pëlhure, që mjafton për të qepur një veshje, stof ose pëlhurë aq sa na duhet për një veshje; stof a basmë. Copë e bukur (e shtrenjtë, e lirë). Copë për fustan (për fund). Copë pantallonash. Blej një copë. Çoj një copë për të qepur.","sh. ~Ë, ~ËT. Një send i veçantë në numrin e sendeve të njëjta (si njësi numërimi); një send si njësi për të llogaritur normën, punën, pagesën etj. Njëqind copë libra. Dyqind copë dërrasa. Pesë copë fshatra. Punë me copë. Shpërblim (pagesë) me copë. Shiten me copë.","fig. Përdoret pranë një emri për të treguar me mospërfillje një send a një njeri të vogël e të pavlerë; përdoret pranë një emri për të treguar, zakonisht me keqardhje, një njeri që është i pafuqishëm, i dobët e fatkeq, që është për t'u mëshiruar. Një copë letër. Një copë burrë. Një copë grua. Një copë nuse. Një copë mësues. Një copë plakë. Një copë fëmijë. Atë copë shtëpi","Pjesë e një dege të njomë ose e një filizi të një bime, që përdoret për shumëzimin e saj; kalem. Copa ulliri. Copa për mbjellje. Shumëzim me copa. Shtoj me copa.","thjeshtligj. Vajzë a grua e bukur. Alamet copë. * Bëhem copë (copa, copash) a) plagosem, vritem rëndë, dërrmohem, copëtohem keq; b) përpiqem me të gjitha forcat, bëj ç'është e mundur për të arritur diçka; përpiqem shumë për dikë, nuk kursehem, s’lë gjë pa bërë për të. E bëri copë (thërrime, copë e çikë, copë e kothere, copë e thërrime, copë e grimë) shih te BËJ. E bëri copë (këmbën etj.) e plagosi rëndë, e vrau keq, e dërrmoi, e copëtoi keq. Bie copë a) përpiqem me të gjitha forcat, bëj çmos; jepem me mish e me shpirt pas diçkaje; b) robtohem e lodhem sa s’ka ku të vejë më. I ra copë iu ça e iu sëmur keq (një pjesë e trupit). Copë të bëhet! të ngjasë ç'të ngjasë!, të bëhet ç’të bëhet!, çfarëdo që të ndodhë le të ndodhë! Dy copash të bëhesh! të mos lësh gjë pa bërë; copë të bëhesh! Copë e çik (copë e gojë, copë e trokë, copë e kothere, çikë e thërrime) i grisur si mos me keq, rrecka-rrecka. Ia thashë copë dikujt. Ia thashë hapur në sy, troç; ia thashë një të vërtetë ashtu siç është, pa zbukurime dhe prerazi. (Një) copë mish me dy sy përçm. shih te MISH,~I. Si një copë bukë shih te BUK/Ë, ~A. Më ranë këmbët copë nuk lashë vend pa kërkuar dikë a diçka. Iu bë zemra (shpirti) copë (plagë) u pikëllua shumë, ndjeu një dhembje të madhe. U bënë thelë e copë shih te THEL/Ë,~A. Ia bëri samarin copë shih te SAMAR,~I. U bë copë e thërrime shih te THËRRIM/E,~JA. Ku të tregojnë copën e madhe marr lugën e vogël fj. u. shih te LUG/Ë,~A."]}]</script>
