<script>window.__INITIAL_DATA__ = [{"slug":"reendoj","term":"RËNDOJ","attributes":["kal."],"definitions":["I vë një peshë të rëndë, e ngarkoj shumë; e bëj më të rëndë, i shtoj peshën; kund. lehtësoj. E rëndoi kalin (mushkën). E rëndoi makinën. E rëndoi valixhen. Bora i rëndon lisat. E rëndoi ca stomakun.","fig. I vë një barrë a një detyrë të rëndë, e ngarkoj më tepër sesa duhet, i vë përsipër diçka që i sjell vështirësi, pengesa etj. E rëndoi planin (ekonominë, buxhetin). E rëndoi ndërmarrjen. I rëndoi nxënësit. Ia rëndoi kujtesën. E rëndoi veprën (pikturën, qëndismën). I rëndojnë me detyrime (me taksa). E rëndoi me detyra (me mësime). E rënduan mbledhjen me shumë pika.","fig. Ia bëj më të rëndë; e sjell në një gjendje më të rëndë a më të vështirë; keqësoj. Ia rëndoj fajin (dënimin). Ia rëndoi sëmundjen (plagën, kollën). Ia rëndoi gjendjen.","E bëj të ndiejë një peshë që e pengon lëvizjen; e plogështoj, e lodh. M`i rëndoi krahët. Pleqëria (sëmundja) ia ka rënduar gjymtyrët. Ia rëndoi gjumi qepallat (sytë).","fig. I flas dikujt me fjalë të rënda, e prek thellë në sedër, e lëndoj; e fyej. E rëndoi me fjalë (me të shara). E rëndoi vajzën. E rëndoi rëndë (ligsht). Mos më rëndo!","jokal. Vij i rëndë në peshë; kam një peshë, peshoj. Rëndon barra (pesha, ngarkesa). Nuk rëndon shumë. Sa rëndon? Rëndon më tepër.","jokal. Peshoj me forcë mbi diçka, mëshoj; ka një peshë, që i rri përsipër. Rëndoj mbi dërrasa. Rëndojnë ahet sa thyhen. Rëndojnë pemët nga kokrrat.","vet. veta III jokal. E ndiej si peshë përsipër; e kam të rëndë sa më pengon të lëviz a të bëj diçka. I rëndon thesi në kurriz. Më rëndojnë krahët (këmbët). I rëndojnë qepallat (nga gjumi) etj. Më rëndon koka.","vet. veta III jokal. fig. E ndej si barrë të rëndë përsipër, e kam si ngarkesë të tepërt, që më sjell vështirësi, më pengon etj.; e kam në kurriz. Punët (hallet) rëndojnë mbi të. Rëndon mbi ekonominë (mbi planin). Rëndon mbi nxënësit (mbi punëtorët). Rëndon mbi supet e mia (mbi kurrizin tim). Rëndon si ankth. Na rëndojnë vitet mbi supe.","vet. veta III jokal. fig. Bie mbi dikë, i takon, i përket (diçka e padëshirueshme, e keqe etj.). Përgjegjësia (faji, gabimi, dëmi, humbja) rëndon mbi të. Shpenzimet rëndojnë mbi ndërmarrjen. Mbi të rëndon nëma (gjaku).","vet. veta III jokal. fig. Më ngjall një ndjenjë të rëndë, më vjen shumë keq, më pikëllon, më brengos. Më rëndoi në zemër vdekja (humbja, sëmundja) e dikujt. Më rëndon shumë që po ikën.","vet. veta III jokal. fig. I ecën, i shkon, i peshon (fjala). I rëndon fjala atij.","jokal. fig. Theksoj; i mëshoj. U rëndoi fjalëve. E rëndoi zërin.","fig. Anon nga një anë. Rëndon nga ne. Mos rëndo vetëm nga njëra anë!","jokal. bised. Bëj punë të rëndë, merrem me punë të rënda. Rëndonin gjithë ditën në shtëpi. Rëndoi plot pesëdhjetë vjet. Punon e rëndon bën punë të rënda.","vet. veta III jokal. Keqësohet, acarohet, ftohet (për motin, stinët). Rëndoi dimri (moti). * Aq i rëndojnë aq ia pret, aq mend ka. E rëndoi dorën mbi dikë e rrahu rëndë (zakonisht pa të drejtë a pa qenë nevoja). I rëndon (i rëndet) dheut mospërf. është e kotë që jeton, më mirë të mos ishte gjallë (për një njeri të keq ose që është dembel e nuk bën asgjë). E rëndoi (e prishi, e ndyu, e fëlliqi, e qelbi) gojën shih te GOJ/Ë,~A. Po rëndon moti po keqësohet gjendja, po acarohen punët."]}]</script>
