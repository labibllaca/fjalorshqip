<script>window.__INITIAL_DATA__ = [{"slug":"ccelem","term":"ÇELEM","attributes":["vetv."],"definitions":["vet. veta III. Lëviz një derë, një kanat etj. duke u lënë i lirë kalimi për të hyrë diku a për të dalë prej andej ose për t’u lidhur mjedisi i brendshëm me të jashtmin; hapet; kund. mbyllet. U çel dera. U çelën dritaret. U çel vetë.","vet. veta III. I hiqet tapa, kapaku, mbyllësja a mbështjellja diçkaje të mbyllur ose të mbështjellë; hapet. U çel shishja. U çel zarfi. U çel kutia.","vet. veta III. Shpaloset diçka e palosur, e mbledhur a e mbyllur; veçohen e largohen anash dy pjesë a dy anë të puthitura ose të afruara të diçkaje; hapet; kund. mbyllet. U çel libri. Iu çelën sytë. Iu çel goja. Iu çelën gishtat.","vet. veta III. Nis nga puna a nga veprimtaria diçka, pasi janë bërë të gjitha përgatitjet e nevojshme; hapet; kund. mbyllet. U çelën shkollat. U çel ekspozita (muzeu). U çel dyqani.","vet. veta III. Nis një veprimtari; fillon diçka; ka si fillim, nis. U çel biseda. U çel mbledhja. U çel kongresi. U çel fushata. U çel gjyqi.","vet. veta III. I hiqen pengesat, bëhet i lirë kalimi; kund. zihet. U çel rruga. U çel shtegu. U çel kufiri. vet.","veta III fig. Krijohet mundësia për të ecur përpara a për të arritur diçka, hapet. U çelën perspektiva (horizonte) të reja. U çelën mundësi të gjera.","vet. veta III. Shtrihet përpara pa ndonjë pengesë; duket në gjithë gjerësinë e vet, hapet. Përpara çelej një pamje e bukur.","Marr fuqi e gjallërohem pas një sëmundjeje, me vjen shëndeti, marr një pamje me të shëndetshme e me të gjallë, mëkëmbem, këndellem. Është çelur djali (vajza).","Bëhem i qeshur në fytyrë, marr pamje të gëzuar e të afruar; kund. vrenjtem. Iu çel fytyra. U çel në fytyrë.","fig. Bëhem më i gjallë e më i zhdërvjellët në jetë a në marrëdhëniet me të tjerët. U çel pas ca kohësh.","fig. I zbuloj një tjetri mendimet, ndjenjat e të fshehtat e mia, i hap zemrën. Mua me çelet. Nuk çelet me këdo.","vet. veta III. Pastrohet nga retë, kthjellohet, hapet. U çel koha (moti).U çel qielli.","vet. veta III. Tingëllon më i qartë e më i pastër (për zërin), jep zë më të pastër. Iu çel zëri. Iu çel fyti.","vet. veta III. Çahet a plasaritet thellë (për lëkurën dhe indet e buta). M’u çelën duart.","Pës. e ÇEL 1-15,17,18. * Iu çel (iu hap) dera dikujt shih te HAPEM. Iu çel (iu hap) goja shih te HAPEM. M’u çel (m’u hap) oreksi shih te HAPEM. I qe çelur qimja shih te QIM/E, ~JA. I janë çelur (i janë hapur) sytë shih te HAPEM. U çel ndër vete u dëkua, u rrënxua. Iu çel (iu zgjidh) gryka thesit shih te GRYK/Ë,~A."]}]</script>
