<script>window.__INITIAL_DATA__ = [{"slug":"ngroh","term":"NGROH","attributes":["kal."],"definitions":["E bëj të ngrohtë, i ngre pak temperaturën; i heq të ftohtët, i kthej ngrohtësinë; kund. ftoh. Ngroh dhomën (zyrën, shtëpinë) Ngroh ujin (qumështin, gjellën). Ngroh duart (këmbët). Ngroh në zjarr. Fërkoj duart për t`i ngrohur. Ngroh vezët rri sipër vezëve derisa të dalin zogjtë (për shpendët).","vet. veta III. Lëshon ngrohtësi, jep ngrohtësi Ngroh dielli. Ngroh zjarri (soba).","fig. I jap zemër me fjalë të mira e me qëndrim të afërt; i ngjall besim e shpresë për diçka; e afroj. I ngroh zemrën (shpirtin). Fjalët e tij na ngrohën. Lajmi na ngrohu. Ai s'më ngroh nuk kam shumë shpresë tek ai, nuk i kam aq besim. Kjo punë s'më ngroh. Ato fjalë s'më ngrohin. * As të ngroh, as të ftoh a) nuk të bën as mirë, as keq; nuk shqetësohet fare; b) nuk të lë mbresa, nuk të prek fare (një njeri, një vepër etj.); c) është pa vlerë, pa dobi. E ngroh (e mbuloj) në hi shih te HI,~RI. Ngroh vezët rri kot, rri pa punë; e merr një punë tepër ngadalë. Ia ngrohu xhepin dikujt ia mbushi xhepin me para, i dha një shumë të mirë të hollash. S`ma ngroh zemrën nuk më kënaq, nuk më pëlqen; nuk kam besim se mund të arrihet një gjë ose se dikush mund ta kryejë një punë. Dielli ngroh (lind) për të gjithë fj. u. shih te DIELL~I. Flaka të djeg, prushi të ngroh fj. u. shih te PRUSH,~I."]}]</script>
