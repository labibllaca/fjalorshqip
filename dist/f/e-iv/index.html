<script>window.__INITIAL_DATA__ = [{"slug":"e-iv","term":"E IV","attributes":["lidh."],"definitions":["Përdoret për të lidhur dy gjymtyrë fjalie a dy fjali të një fare ose dy fjali të bashkërenditura këpujore a shtuese; dhe. Klasa punëtore e fshatarësia kooperativiste. Shkoi e u kthye shpejt. Të vriste natën e të qante ditën.","Përdoret për të lidhur dy fjalë a dy trajta të së njëjtës fjalë në togje me bashkërenditje, që tregojnë zakonisht përsëritje ose vijimësi veprimi a gjendjeje, që shprehin përforcim etj. Tani e tutje. Vetëm e vetëm. Një herë e përgjithmonë. Rreth e rrotull. Për orë e orë të tëra. Keq e mos më keq. Mirë e më mirë. Ec e ec e s`ka të sosur. Bie e fle. Zë e gërhet. Ka gojë e flet.","Përdoret për të kundërvënë dy gjymtyrë të një fjalie a dy fjali të një fare; dhe, edhe. Duhet punë e jo fjalë. Duhej t’ia kishe thënë e jo të heshtje.","Përdoret te numërorët e përbërë për të lidhur klasat e ndryshme të tyre (njëshet, dhjetëshet etj.). Njëzet e dy. Dyqind e tridhjetë. Një mijë e nëntëqind e shtatëdhjetë e tre.","përd. pj. Përdoret në fillim të një togfjalëshi a të një fjalie për të theksuar kuptimin që shprehet prej tyre. E sot fshati duket si në festë. E u nis pastaj tërë gëzim."]}]</script>
