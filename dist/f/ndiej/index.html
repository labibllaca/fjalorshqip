<script>window.__INITIAL_DATA__ = [{"slug":"ndiej","term":"NDIEJ","attributes":["kal."],"definitions":["Kap me anë të shqisave ngacmimet dhe dukuritë e botës së jashtme, pasqyroj në ndijimet; ndijoj. Ndiej zërin (shijen, erën). Ndien të ftohtët.","Kap tingujt me vesh; dëgjoj. Nuk ndien mirë. I ndjeu zërin. E kam ndier nga të tjerët. Të ndjefsha të mirën! ur. Ndjefsha mirë për ty! ur. Të ndjefsha zërin e mirë! ur.","Provoj në të gjithë trupin ose në një pjesë të tij një gjendje fizike të caktuar. Ndiej dhembje. Ndiej të ftohtë. Ndien lodhje (këputje, rraskapitje). S'i ndiej gjunjët (kurrizin) më janë bërë si të huaj nga lodhja. E ndien veten mirë (keq). E ndjeu veten lehtë (rëndë, të fortë, të përtërirë). S'e ndiem rrugën nuk u lodhëm gjatë ecjes ose udhëtimit. E kam ndier në kurrizin tim.","Kap me anë të shqisave në përgjithësi a me anë të intuitës një dukuri nga bota që na rrethon; vë re, nuhat, kuptoj. Ndiej ndërrimin e motit. Shpesët e mejnë tërmetin. Pa e ndier fare. E ndjeu që po binte (po rrëzohej). S'e ndiem beharin (dimrin)nuk pati verë shumë të nxehtë (dimër shumë të ftohtë).","Provoj një ndjenjë a një gjendje shpirtërore, kam. Ndiej kënaqësi (mërzi, bezdi). Ndien gëzim (hidhërim, pezmatim). Ndien një dëshirë. Ndiente frikë. Ndien neveri (krupë). Nuk ndien asgjë për të nuk e do, nuk e dashuron.","Kuptoj pasojat e një veprimi, prekem moralisht për diçka; kam vetëdije për një gjendje. E ndien përgjegjësinë. E ndjeu gabimin. E ndiente veten fajtor ndien veten borxhli. E ndiej veten ngushtë (pisk), ndien nevojën (mungesën) për diçka. E ndien për detyrë. E ndien thellë.","Jam në gjendje të shijoj të bukurën, e cila më bën përshtypje të thellë. E ndien muzikën (poezinë).","Kuptoj me anë të intuitës; e kuptoj nga disa shenja të jashtme se po ndodh diçka, parandiej. Ndiente ftohtësinë e tij. E ndiente se po afrohej rreziku. E ndjeu si do të përfundonte.","(me pjesëzat mohuese nuk, s, mos). S'dua t'ia di për diçka, s'më bën përshtypje; s'pyes, nuk shqetësohem dikë a
